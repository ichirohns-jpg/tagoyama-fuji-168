  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 225, 110, 0.18), rgba(0, 0, 0, 0) 36%),
        linear-gradient(180deg, #221600 0%, #070707 48%, #000000 100%);
      color: #fff7ca;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .page {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 12px 48px;
    }

    .hero {
      text-align: center;
      margin: 0 0 16px;
    }

    .logoBox {
      width: 100%;
      max-width: 620px;
      margin: 0 auto 14px;
      border-radius: 28px;
      overflow: hidden;
      border: 3px solid rgba(255, 220, 95, 0.80);
      background: #000000;
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.50),
        0 0 18px rgba(255, 210, 80, 0.22);
    }

    .logoBox img {
      display: block;
      width: 100%;
      height: auto;
    }

    .siteTitle {
      margin: 0;
      font-size: clamp(36px, 10vw, 70px);
      line-height: 1.16;
      font-weight: 900;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.92),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .siteSub {
      margin: 10px 0 0;
      font-size: clamp(20px, 5.5vw, 34px);
      line-height: 1.45;
      font-weight: 900;
      color: #fff3c4;
      text-shadow: 0 3px 3px rgba(0, 0, 0, 0.88);
    }

    .card {
      margin: 16px 0;
      padding: 20px 14px;
      border-radius: 28px;
      background:
        radial-gradient(circle at top, rgba(255, 224, 120, 0.16), rgba(0, 0, 0, 0) 46%),
        linear-gradient(180deg, rgba(44, 28, 0, 0.92), rgba(10, 10, 10, 0.94));
      border: 2px solid rgba(255, 220, 95, 0.58);
      box-shadow:
        0 0 0 1px rgba(255, 230, 150, 0.10) inset,
        0 12px 28px rgba(0, 0, 0, 0.42);
    }

    .cardTitle {
      margin: 0 0 14px;
      font-size: clamp(30px, 8.4vw, 54px);
      font-weight: 900;
      text-align: center;
      line-height: 1.25;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.90),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .lead {
      margin: 0 0 16px;
      color: #fff1bd;
      text-align: center;
      font-size: clamp(20px, 5.5vw, 34px);
      font-weight: 900;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .statusBox {
      margin: 18px 0 0;
      padding: 18px 14px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.34);
      border: 1px solid rgba(255, 220, 140, 0.34);
      font-size: clamp(18px, 4.8vw, 28px);
      font-weight: 900;
      line-height: 1.65;
      color: #fff3c4;
      text-align: center;
      white-space: pre-wrap;
    }

    .btnArea {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .btn,
    .linkBtn {
      width: 100%;
      min-height: 70px;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: clamp(20px, 5.5vw, 34px);
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      box-shadow:
        0 7px 0 rgba(0, 0, 0, 0.32),
        0 13px 22px rgba(0, 0, 0, 0.34);
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .btn:active,
    .linkBtn:active {
      transform: translateY(3px);
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.32),
        0 8px 14px rgba(0, 0, 0, 0.32);
    }

    .btn:disabled {
      opacity: 0.55;
      pointer-events: none;
    }

    .goldBtn {
      color: #271400;
      background: linear-gradient(180deg, #fff1a4 0%, #ffd84d 48%, #c89217 100%);
    }

    .blueBtn {
      background: linear-gradient(180deg, #2e83ff 0%, #0b4fc4 100%);
    }

    .blackBtn {
      background: linear-gradient(180deg, #323232 0%, #050505 100%);
    }

    .note {
      margin: 16px 0 0;
      color: #d9c886;
      font-size: clamp(15px, 4.2vw, 24px);
      font-weight: 800;
      line-height: 1.7;
      text-align: center;
      white-space: pre-wrap;
    }

    .footer {
      margin: 28px 0 0;
      text-align: center;
      color: #c9b56b;
      font-weight: 800;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        border-radius: 26px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .btn,
      .linkBtn {
        min-height: 66px;
        border-radius: 22px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <header class="hero">
      <div class="logoBox">
        <img
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
          alt="田子山富士"
          onerror="this.style.display='none'"
        >
      </div>

      <h1 class="siteTitle">田子山富士</h1>
      <p class="siteSub">登頂受付</p>
    </header>

    <section class="card">
      <h2 class="cardTitle">ご登頂おめでとうございます</h2>

      <p class="lead">
        山頂でQRコードを読み込まれた方は、下のボタンを押してください。
        登頂記録を行い、登頂記念証を受け取れます。
      </p>

      <div class="statusBox" id="statusBox">
        登頂受付の準備ができました。
      </div>

      <div class="btnArea">
        <button
          class="btn goldBtn"
          type="button"
          id="recordBtn"
          onclick="startClimb()"
        >
          ⛩️ 登頂を記録する
        </button>

        <a
          class="linkBtn blueBtn"
          id="certificateLink"
          href="certificate.html"
        >
          登頂記念証を見る
        </a>

        <a
          class="linkBtn blackBtn"
          id="topLink"
          href="index.html"
        >
          トップへ戻る
        </a>
      </div>

      <p class="note">
        ※山頂QRからアクセスした方のみ登頂記録できます。
        同日の重複登録は、システム側の設定に従います。
      </p>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      山頂QR 登頂受付
    </footer>

  </main>

  <script>
    const INDEX_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/index.html";

    const CERTIFICATE_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

    let currentUserId = "";

    document.addEventListener(
      "DOMContentLoaded",
      function() {
        initQrPage();
      }
    );

    function initQrPage() {
      currentUserId =
        getOrCreateUserId();

      saveUserId(currentUserId);
      updateLinks(currentUserId);

      setStatus(
        "登頂受付の準備ができました。\n" +
        "ボタンを押すと登頂記録へ進みます。"
      );
    }

    function getOrCreateUserId() {
      const params =
        new URLSearchParams(
          window.location.search
        );

      const fromUrl =
        getString(
          params.get("userId") ||
          params.get("userid") ||
          params.get("uid") ||
          params.get("id") ||
          ""
        );

      if (fromUrl) {
        return fromUrl;
      }

      const saved =
        getString(
          localStorage.getItem(
            "tagoyamaUserId"
          ) ||
          localStorage.getItem(
            "tagoyamaFujiUserId"
          ) ||
          ""
        );

      if (saved) {
        return saved;
      }

      return createUserId();
    }

    function createUserId() {
      const now = Date.now();
      const rand =
        Math.random()
          .toString(36)
          .slice(2, 10);

      return (
        "tagoyama-" +
        now +
        "-" +
        rand
      );
    }

    function saveUserId(userId) {
      if (!userId) {
        return;
      }

      try {
        localStorage.setItem(
          "tagoyamaUserId",
          userId
        );

        localStorage.setItem(
          "tagoyamaFujiUserId",
          userId
        );
      } catch (error) {
        console.warn(error);
      }
    }

    function updateLinks(userId) {
      const certificateLink =
        document.getElementById(
          "certificateLink"
        );

      const topLink =
        document.getElementById(
          "topLink"
        );

      if (certificateLink) {
        certificateLink.href =
          CERTIFICATE_PAGE +
          "?userId=" +
          encodeURIComponent(userId) +
          "&from=qr" +
          "&v=20260719";
      }

      if (topLink) {
        topLink.href =
          INDEX_PAGE +
          "?userId=" +
          encodeURIComponent(userId) +
          "&from=qr" +
          "&v=20260719";
      }
    }

    function startClimb() {
      const btn =
        document.getElementById(
          "recordBtn"
        );

      if (btn) {
        btn.disabled = true;
        btn.innerText =
          "登頂記録へ進みます...";
      }

      setStatus(
        "登頂記録へ進みます。\n" +
        "そのままお待ちください。"
      );

      const url =
        INDEX_PAGE +
        "?userId=" +
        encodeURIComponent(
          currentUserId
        ) +
        "&from=qr" +
        "&v=20260719";

      window.location.href = url;
    }

    function setStatus(text) {
      const el =
        document.getElementById(
          "statusBox"
        );

      if (el) {
        el.innerText = text;
      }
    }

    function getString(value) {
      if (
        value === null ||
        value === undefined
      ) {
        return "";
      }

      return String(value).trim();
    }

    window.startClimb =
      startClimb;
  </script>
</body>
</html>
