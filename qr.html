<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>田子山富士 登頂受付</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#fff;
}

.hero img{
width:100%;
display:block;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:linear-gradient(180deg,#1c1c1c,#0f0f0f);
border:2px solid #d4af37;
border-radius:28px;
padding:28px;
text-align:center;
}

.logo{
width:180px;
max-width:80%;
margin:auto;
display:block;
margin-bottom:20px;
border-radius:20px;
}

.title{
font-size:42px;
font-weight:900;
margin-bottom:10px;
}

.sub{
font-size:22px;
color:#d4af37;
font-weight:800;
margin-bottom:30px;
}

.message{
font-size:22px;
line-height:1.8;
margin-bottom:30px;
}

.startBtn{
width:100%;
border:none;
border-radius:22px;
padding:24px;
font-size:28px;
font-weight:900;
background:#d4af37;
color:#000;
cursor:pointer;
}

.note{
margin-top:20px;
font-size:16px;
color:#bbb;
line-height:1.7;
}
</style>
</head>

<body>

<div class="hero">
<img src="top.jpg" alt="田子山富士">
</div>

<div class="wrap">
<div class="card">

<img src="logo.png" class="logo" alt="田子山富士">

<div class="title">田子山富士</div>
<div class="sub">168の縁プロジェクト</div>

<div class="message">
田子山富士へご登頂<br>
おめでとうございます。<br><br>
登頂記録を行う方は<br>
下のボタンを押してください。
</div>

<button id="startBtn" class="startBtn">
⛩️ 登頂を記録する
</button>

<div class="note">
※このボタンを押した時だけ<br>
登頂回数・参加人数・<br>
シリアル番号が発行されます。
</div>

</div>
</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbz3ybiLZLGAAnm994iRgJXQkCxSVULCJe5TxCuaOzEFQRrI4P-GVNdMbkgg_Tte1al9jg/exec";

let userId =
localStorage.getItem("tagoyamaUserId");

if(!userId){
userId =
"TGF-" +
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

localStorage.setItem("tagoyamaUserId",userId);
}

document.getElementById("startBtn").onclick =
async function(){

this.disabled = true;
this.innerText = "登頂記録中...";

try{

const response =
await fetch(
GAS_URL +
"?userId=" +
encodeURIComponent(userId)
);

const data =
await response.json();

localStorage.setItem("qrVerified","true");
localStorage.setItem("latestSerial",data.serial || "-");

if(data.imageUrl){
localStorage.setItem("latestImageUrl",data.imageUrl);
}

location.href =
"index.html?serial=" +
encodeURIComponent(data.serial || "-");

}catch(error){

alert("通信エラーが発生しました");

document.getElementById("startBtn").disabled = false;
document.getElementById("startBtn").innerText =
"⛩️ 登頂を記録する";

}

};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>登頂記念証</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
padding:20px;
color:#fff;
}

.wrap{
max-width:900px;
margin:auto;
}

.card{
background:#000;
border:2px solid #d4af37;
border-radius:28px;
padding:16px;
box-shadow:
0 10px 30px rgba(0,0,0,.5);
}

.certificateImageBox{
position:relative;
overflow:hidden;
border-radius:22px;
}

.memorialImage{
width:100%;
display:block;
}

.overlay{
position:absolute;
inset:0;
pointer-events:none;
}

.titleArea{
position:absolute;
top:36px;
left:20px;
right:20px;
text-align:center;
}

.shrine{
font-size:42px;
font-weight:900;
letter-spacing:4px;
color:#ffffff;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 0 3px #000,
0 0 6px #000,
0 0 12px #000,
0 3px 8px rgba(0,0,0,.95);
}

.project{
margin-top:10px;
font-size:18px;
font-weight:900;
letter-spacing:4px;
color:#ffffff;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 0 3px #000,
0 0 6px #000,
0 0 12px #000,
0 3px 8px rgba(0,0,0,.95);
}

.infoArea{
position:absolute;
right:24px;
bottom:28px;
text-align:right;
}

.date{
font-size:22px;
font-weight:900;
color:#ffffff;
margin-bottom:8px;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 0 3px #000,
0 0 6px #000,
0 0 12px #000,
0 3px 8px rgba(0,0,0,.95);
}

.round{
font-size:22px;
font-weight:900;
color:#ffffff;
margin-bottom:6px;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 0 3px #000,
0 0 6px #000,
0 0 12px #000,
0 3px 8px rgba(0,0,0,.95);
}

.serial{
font-size:42px;
font-weight:900;
letter-spacing:4px;
color:#ffffff;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 0 3px #000,
0 0 6px #000,
0 0 12px #000,
0 3px 8px rgba(0,0,0,.95);
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:14px;
margin-top:12px;
font-size:20px;
font-weight:900;
cursor:pointer;
}

.save{
background:#2ecc71;
color:#fff;
}

.fb{
background:#1877f2;
color:#fff;
}

.x{
background:#000;
color:#fff;
}

.line{
background:#06c755;
color:#fff;
}

.copy{
background:#607d8b;
color:#fff;
}

.footer{
margin-top:20px;
text-align:center;
color:#aaa;
font-size:14px;
}

</style>
</head>

<body>

<div class="wrap">

<div
id="certificate"
class="card">

<div class="certificateImageBox">

<img
id="memorialImage"
class="memorialImage"
src="sakura01.jpg"
alt="記念画像"
crossorigin="anonymous">

<div class="overlay">

<div class="titleArea">

<div class="shrine">
田子山富士
</div>

<div class="project">
登頂記念証
</div>

</div>

<div class="infoArea">

<div
id="date"
class="date">
令和8年6月21日
</div>

<div
id="round"
class="round">
第1回登頂記念
</div>

<div
class="round">
登頂記録番号
</div>

<div
id="serial"
class="serial">
0001
</div>

</div>

</div>

</div>

</div>

<button
class="btn save"
onclick="saveImage()">
画像を保存
</button>

<button
class="btn fb"
onclick="shareFacebook()">
Facebook
</button>

<button
class="btn x"
onclick="shareX()">
X
</button>

<button
class="btn line"
onclick="shareLine()">
LINE
</button>

<button
class="btn copy"
onclick="copyUrl()">
リンクをコピー
</button>

<div class="footer">
田子山富士 168の縁プロジェクト
</div>

</div>

<script>

if(
localStorage.getItem(
"qrVerified"
)!=="true"
){

alert(
"山頂QRコードからお入りください"
);

location.href=
"index.html";

}

const serial =
localStorage.getItem(
"latestSerial"
)
|| "1-0001";

const imageUrl =
localStorage.getItem(
"latestImageUrl"
)
|| "sakura01.jpg";

document.getElementById(
"memorialImage"
).src =
imageUrl;

const serialParts =
serial.split("-");

document.getElementById(
"serial"
).innerText =
serialParts[1];

document.getElementById(
"round"
).innerText =
"第" +
parseInt(
serialParts[0]
) +
"回登頂記念";

const now =
new Date();

document.getElementById(
"date"
).innerText =
"令和8年" +
(now.getMonth()+1) +
"月" +
now.getDate() +
"日";

localStorage.removeItem(
"qrVerified"
);

async function saveImage(){

try{

const canvas =
await html2canvas(
document.getElementById(
"certificate"
),
{
scale:2,
useCORS:true,
allowTaint:false
}
);

const link =
document.createElement(
"a"
);

link.download =
"tagoyama-fuji-certificate.png";

link.href =
canvas.toDataURL(
"image/png"
);

link.click();

}catch(error){

alert(
"画像保存エラー"
);

}

}

function shareFacebook(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(
location.href
)
);

}

function shareX(){

window.open(
"https://twitter.com/intent/tweet?url=" +
encodeURIComponent(
location.href
)
);

}

function shareLine(){

window.open(
"https://social-plugins.line.me/lineit/share?url=" +
encodeURIComponent(
location.href
)
);

}

function copyUrl(){

navigator.clipboard.writeText(
location.href
);

alert(
"リンクをコピーしました"
);

}

</script>

</body>
</html>
