<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>登頂記念証</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
padding:20px;
color:#fff;
}

.wrap{
max-width:900px;
margin:auto;
}

.card{
background:#000;
border:2px solid #d4af37;
border-radius:28px;
padding:16px;
box-shadow:
0 10px 30px rgba(0,0,0,.5);
}

.certificateImageBox{
position:relative;
overflow:hidden;
border-radius:22px;
}

.memorialImage{
width:100%;
display:block;
}

.overlay{
position:absolute;
inset:0;
pointer-events:none;
}

.titleArea{
position:absolute;
top:36px;
left:20px;
right:20px;
text-align:center;
}

.shrine{
font-size:42px;
font-weight:900;
letter-spacing:4px;
color:#ffffff;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 0 3px #000,
0 0 6px #000,
0 0 12px #000,
0 3px 8px rgba(0,0,0,.95);
}

.project{
margin-top:10px;
font-size:18px;
font-weight:900;
letter-spacing:4px;
color:#ffffff;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 0 3px #000,
0 0 6px #000,
0 0 12px #000,
0 3px 8px rgba(0,0,0,.95);
}

.infoArea{
position:absolute;
right:24px;
bottom:28px;
text-align:right;
}

.date,
.round,
.serialLabel{
font-size:22px;
font-weight:900;
color:#ffffff;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 0 3px #000,
0 0 6px #000,
0 0 12px #000,
0 3px 8px rgba(0,0,0,.95);
}

.date{
margin-bottom:8px;
}

.round{
margin-bottom:6px;
}

.serialLabel{
margin-bottom:4px;
}

.serial{
font-size:42px;
font-weight:900;
letter-spacing:4px;
color:#ffffff;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 0 3px #000,
0 0 6px #000,
0 0 12px #000,
0 3px 8px rgba(0,0,0,.95);
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:14px;
margin-top:12px;
font-size:20px;
font-weight:900;
cursor:pointer;
}

.save{
background:#2ecc71;
color:#fff;
}

.fb{
background:#1877f2;
color:#fff;
}

.x{
background:#000;
color:#fff;
}

.line{
background:#06c755;
color:#fff;
}

.copy{
background:#607d8b;
color:#fff;
}

.footer{
margin-top:20px;
text-align:center;
color:#aaa;
font-size:14px;
}

</style>
</head>

<body>

<div class="wrap">

<div
id="certificate"
class="card">

<div
class="certificateImageBox">

<img
id="memorialImage"
class="memorialImage"
src="sakura01.jpg"
alt="記念画像"
crossorigin="anonymous">

<div class="overlay">

<div class="titleArea">

<div class="shrine">
田子山富士
</div>

<div class="project">
登頂記念証
</div>

</div>

<div class="infoArea">

<div
id="date"
class="date">
令和8年6月21日
</div>

<div
id="round"
class="round">
第1回登頂記念
</div>

<div
class="serialLabel">
登頂記録番号
</div>

<div
id="serial"
class="serial">
0001
</div>

</div>

</div>

</div>

</div>

<button
class="btn save"
onclick="saveImage()">
画像を保存
</button>

<button
class="btn fb"
onclick="shareFacebook()">
Facebook
</button>

<button
class="btn x"
onclick="shareX()">
X
</button>

<button
class="btn line"
onclick="shareLine()">
LINE
</button>

<button
class="btn copy"
onclick="copyUrl()">
リンクをコピー
</button>

<div class="footer">
田子山富士 168の縁プロジェクト
</div>

</div>

<script>

const qrVerified =
sessionStorage.getItem(
"qrVerified"
);

if(
qrVerified !== "true"
){

alert(
"山頂QRコードからお入りください"
);

location.href =
"index.html";

}

const serial =
sessionStorage.getItem(
"latestSerial"
)
||
localStorage.getItem(
"latestSerial"
)
||
"1-0001";

const imageUrl =
sessionStorage.getItem(
"latestImageUrl"
)
||
localStorage.getItem(
"latestImageUrl"
)
||
"sakura01.jpg";

document.getElementById(
"memorialImage"
).src =
imageUrl;

const serialParts =
String(serial)
.split("-");

const climbCount =
Number(
serialParts[0]
) || 1;

const serialNo =
serialParts[1]
|| "0001";

document.getElementById(
"round"
).innerText =
"第" +
climbCount +
"回登頂記念";

document.getElementById(
"serial"
).innerText =
serialNo;

const now =
new Date();

document.getElementById(
"date"
).innerText =
"令和8年" +
(now.getMonth()+1) +
"月" +
now.getDate() +
"日";

sessionStorage.removeItem(
"qrVerified"
);

async function saveImage(){

try{

const canvas =
await html2canvas(
document.getElementById(
"certificate"
),
{
scale:2,
useCORS:true,
allowTaint:false
}
);

const link =
document.createElement(
"a"
);

link.download =
"tagoyama-fuji-certificate.png";

link.href =
canvas.toDataURL(
"image/png"
);

link.click();

}catch(error){

alert(
"画像保存エラー"
);

}

}

function shareFacebook(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(
location.href
)
);

}

function shareX(){

window.open(
"https://twitter.com/intent/tweet?url=" +
encodeURIComponent(
location.href
)
);

}

function shareLine(){

window.open(
"https://social-plugins.line.me/lineit/share?url=" +
encodeURIComponent(
location.href
)
);

}

function copyUrl(){

navigator.clipboard.writeText(
location.href
);

alert(
"リンクをコピーしました"
);

}

</script>

</body>
</html>
