<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="description" content="田子山富士 登頂記念証の共有ページです。">
  <meta property="og:site_name" content="田子山富士168の縁プロジェクト">
  <meta property="og:title" content="田子山富士 登頂記念証">
  <meta property="og:description" content="田子山富士に登ってきました。山頂でいただいたご縁を、みなさんにもおすそ分けします。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-facebook-certificate.html">
  <meta property="og:image" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg?v=20260703-certificate">
  <meta property="og:image:secure_url" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg?v=20260703-certificate">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="田子山富士 登頂記念証">
  <meta name="twitter:description" content="田子山富士に登ってきました。山頂でいただいたご縁を、みなさんにもおすそ分けします。">
  <meta name="twitter:image" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg?v=20260703-certificate">

  <link rel="canonical" href="https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html">
  <link rel="icon" href="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png">
  <link rel="apple-touch-icon" href="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 225, 110, 0.18), rgba(0, 0, 0, 0) 36%),
        linear-gradient(180deg, #221600 0%, #070707 48%, #000000 100%);
      color: #fff7ca;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .page {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 12px 48px;
    }

    .hero {
      text-align: center;
      margin: 0 0 16px;
    }

    .logoBox {
      width: 132px;
      height: 132px;
      margin: 0 auto 14px;
      border-radius: 30px;
      overflow: hidden;
      background: #000000;
      border: 3px solid rgba(255, 220, 95, 0.80);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.50),
        0 0 18px rgba(255, 210, 80, 0.22);
    }

    .logoBox img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .siteTitle {
      margin: 0;
      font-size: clamp(34px, 9vw, 64px);
      line-height: 1.16;
      font-weight: 900;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.92),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .siteSub {
      margin: 10px 0 0;
      font-size: clamp(19px, 5.2vw, 32px);
      line-height: 1.45;
      font-weight: 900;
      color: #fff3c4;
      text-shadow: 0 3px 3px rgba(0, 0, 0, 0.88);
    }

    .card {
      margin: 16px 0;
      padding: 20px 14px;
      border-radius: 28px;
      background:
        radial-gradient(circle at top, rgba(255, 224, 120, 0.16), rgba(0, 0, 0, 0) 46%),
        linear-gradient(180deg, rgba(44, 28, 0, 0.92), rgba(10, 10, 10, 0.94));
      border: 2px solid rgba(255, 220, 95, 0.58);
      box-shadow:
        0 0 0 1px rgba(255, 230, 150, 0.10) inset,
        0 12px 28px rgba(0, 0, 0, 0.42);
    }

    .cardTitle {
      margin: 0 0 14px;
      font-size: clamp(30px, 8.4vw, 54px);
      font-weight: 900;
      text-align: center;
      line-height: 1.25;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.90),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .lead {
      margin: 0 0 16px;
      color: #fff1bd;
      text-align: center;
      font-size: clamp(19px, 5.2vw, 32px);
      font-weight: 900;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .preview {
      position: relative;
      width: 100%;
      border-radius: 28px;
      overflow: hidden;
      background: #111111;
      border: 3px solid rgba(255, 219, 97, 0.76);
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.56),
        0 0 28px rgba(255, 203, 73, 0.14);
    }

    .preview img {
      display: block;
      width: 100%;
      height: auto;
      min-height: 360px;
      object-fit: cover;
      background: #111111;
    }

    .overlay {
      position: absolute;
      left: 5.5%;
      right: 5.5%;
      bottom: 5.5%;
      padding: 18px 10px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.72);
      border: 2px solid rgba(255, 220, 95, 0.72);
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.45),
        0 0 18px rgba(255, 210, 80, 0.16);
      text-align: center;
    }

    .climbTitle {
      margin: 0 0 10px;
      font-size: clamp(28px, 8vw, 58px);
      line-height: 1.18;
      color: #ffdf72;
      font-weight: 900;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.92),
        0 0 18px rgba(255, 210, 80, 0.24);
    }

    .serialNo,
    .dateText,
    .participantText {
      margin: 0 0 8px;
      color: #fff7ca;
      font-weight: 900;
      line-height: 1.25;
    }

    .serialNo {
      font-size: clamp(26px, 7vw, 50px);
    }

    .dateText {
      font-size: clamp(20px, 5.5vw, 36px);
    }

    .participantText {
      font-size: clamp(18px, 5vw, 32px);
      color: #d9c886;
    }

    .statusBox {
      margin: 18px 0 0;
      padding: 18px 14px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.34);
      border: 1px solid rgba(255, 220, 140, 0.34);
      font-size: clamp(18px, 4.8vw, 28px);
      font-weight: 900;
      line-height: 1.65;
      color: #fff3c4;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .btnArea {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .btn,
    .linkBtn {
      width: 100%;
      min-height: 70px;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: clamp(20px, 5.5vw, 34px);
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      box-shadow:
        0 7px 0 rgba(0, 0, 0, 0.32),
        0 13px 22px rgba(0, 0, 0, 0.34);
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .btn:active,
    .linkBtn:active {
      transform: translateY(3px);
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.32),
        0 8px 14px rgba(0, 0, 0, 0.32);
    }

    .goldBtn {
      color: #271400;
      background: linear-gradient(180deg, #fff1a4 0%, #ffd84d 48%, #c89217 100%);
    }

    .blueBtn {
      background: linear-gradient(180deg, #2e83ff 0%, #0b4fc4 100%);
    }

    .blackBtn {
      background: linear-gradient(180deg, #323232 0%, #050505 100%);
    }

    .footer {
      margin: 28px 0 0;
      text-align: center;
      color: #c9b56b;
      font-weight: 800;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        border-radius: 26px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .btn,
      .linkBtn {
        min-height: 66px;
        border-radius: 22px;
      }

      .logoBox {
        width: 122px;
        height: 122px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <header class="hero">
      <div class="logoBox">
        <img
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
          alt="田子山富士"
          onerror="this.style.display='none'"
        >
      </div>

      <h1 class="siteTitle">田子山富士</h1>
      <p class="siteSub">登頂記念証シェア整理</p>
    </header>

    <section class="card">
      <h2 class="cardTitle">正しい共有ページへ移動します</h2>

      <p class="lead">
        古い登頂記念証シェアURLを開いています。
        正しい共有ページへ移動します。
      </p>

      <div class="preview">
        <img
          id="previewImage"
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg?v=20260703-certificate"
          alt="田子山富士 登頂記念証"
          onerror="this.src='https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png';"
        >

        <div class="overlay">
          <h2 class="climbTitle" id="climbTitle">登頂記念</h2>
          <p class="serialNo" id="serialNo">No.田子山富士</p>
          <p class="dateText" id="dateText">田子山富士</p>
          <p class="participantText" id="participantText">参加人数 168の縁</p>
        </div>
      </div>

      <div class="statusBox" id="statusBox">
        移動先を確認しています。
      </div>

      <div class="btnArea">
        <a class="linkBtn goldBtn" id="mainLink" href="share-certificate.html">
          正しい登頂記念証を開く
        </a>

        <button class="btn blueBtn" type="button" onclick="copyTargetUrl()">
          移動先URLをコピー
        </button>

        <a class="linkBtn blackBtn" href="index.html">
          トップへ戻る
        </a>
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      旧登頂記念証シェア整理
    </footer>
  </main>

  <script>
    const SHARE_CERTIFICATE_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

    const FALLBACK_CERTIFICATE_OGP =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg?v=20260703-certificate";

    let targetUrl = SHARE_CERTIFICATE_PAGE;

    document.addEventListener("DOMContentLoaded", function() {
      routeOldCertificateShare();
    });

    function routeOldCertificateShare() {
      const params = new URLSearchParams(window.location.search);
      const data = readCertificateParams(params);

      renderPreview(data);

      targetUrl = buildCertificateShareUrl(data);

      const mainLink = document.getElementById("mainLink");

      if (mainLink) {
        mainLink.href = targetUrl;
      }

      setStatus("登頂記念証の正しい共有ページへ移動します。");

      setTimeout(function() {
        window.location.replace(targetUrl);
      }, 900);
    }

    function readCertificateParams(params) {
      return {
        userId: getFirst(
          params.get("u"),
          params.get("userId"),
          params.get("userid"),
          params.get("uid"),
          params.get("id")
        ),

        climbCount: normalizeNumberText(
          getFirst(
            params.get("c"),
            params.get("climbCount"),
            params.get("count"),
            params.get("times")
          )
        ),

        serialNo: cleanSerialNo(
          getFirst(
            params.get("s"),
            params.get("serialNo"),
            params.get("serial"),
            params.get("no")
          )
        ),

        lastDate: getFirst(
          params.get("d"),
          params.get("date"),
          params.get("lastDate"),
          params.get("climbDate")
        ),

        participantNo: normalizeNumberText(
          getFirst(
            params.get("p"),
            params.get("participantNo"),
            params.get("participant"),
            params.get("people"),
            params.get("total")
          )
        ),

        imageUrl: getFirst(
          params.get("img"),
          params.get("image"),
          params.get("imageUrl"),
          params.get("url")
        ),

        imageId: getFirst(
          params.get("imgid"),
          params.get("imageId"),
          params.get("driveId")
        )
      };
    }

    function renderPreview(data) {
      const climbTitle = document.getElementById("climbTitle");
      const serialNo = document.getElementById("serialNo");
      const dateText = document.getElementById("dateText");
      const participantText = document.getElementById("participantText");
      const image = document.getElementById("previewImage");

      if (climbTitle) {
        climbTitle.innerText =
          data.climbCount
            ? "第" + data.climbCount + "回 登頂記念"
            : "登頂記念";
      }

      if (serialNo) {
        serialNo.innerText =
          data.serialNo
            ? "No." + data.serialNo
            : "No.田子山富士";
      }

      if (dateText) {
        dateText.innerText =
          data.lastDate
            ? formatDateText(data.lastDate)
            : "田子山富士";
      }

      if (participantText) {
        participantText.innerText =
          data.participantNo
            ? "参加人数 " + data.participantNo + "人"
            : "参加人数 168の縁";
      }

      if (image) {
        if (data.imageId) {
          image.src =
            "https://lh3.googleusercontent.com/d/" +
            encodeURIComponent(data.imageId) +
            "=w2000";
        } else if (data.imageUrl) {
          image.src = normalizeImageUrl(data.imageUrl);
        } else {
          image.src = FALLBACK_CERTIFICATE_OGP;
        }
      }
    }

    function buildCertificateShareUrl(data) {
      const p = new URLSearchParams();

      setParam(p, "u", data.userId);
      setParam(p, "c", data.climbCount);
      setParam(p, "s", data.serialNo);
      setParam(p, "d", data.lastDate);
      setParam(p, "p", data.participantNo);

      if (data.imageId) {
        setParam(p, "imgid", data.imageId);
      } else if (data.imageUrl) {
        const driveId = getDriveId(data.imageUrl);

        if (driveId) {
          setParam(p, "imgid", driveId);
        } else {
          setParam(p, "img", data.imageUrl);
        }
      }

      p.set("v", "20260703");

      return SHARE_CERTIFICATE_PAGE + "?" + p.toString();
    }

    function setStatus(text) {
      const el = document.getElementById("statusBox");

      if (el) {
        el.innerText = text + "\n\n" + targetUrl;
      }
    }

    async function copyTargetUrl() {
      try {
        await navigator.clipboard.writeText(targetUrl);
        alert("移動先URLをコピーしました。");
      } catch (error) {
        const area = document.createElement("textarea");

        area.value = targetUrl;
        area.style.position = "fixed";
        area.style.left = "-9999px";

        document.body.appendChild(area);
        area.focus();
        area.select();

        document.execCommand("copy");
        area.remove();

        alert("移動先URLをコピーしました。");
      }
    }

    function setParam(params, key, value) {
      value = getString(value);

      if (value) {
        params.set(key, value);
      }
    }

    function normalizeImageUrl(url) {
      const value = getString(url);

      if (!value) {
        return FALLBACK_CERTIFICATE_OGP;
      }

      const driveId = getDriveId(value);

      if (driveId) {
        return "https://lh3.googleusercontent.com/d/" +
          encodeURIComponent(driveId) +
          "=w2000";
      }

      return value;
    }

    function getDriveId(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      let match = value.match(/\/file\/d\/([^/]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/[?&]id=([^&]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

      if (match && match[1]) {
        return match[1];
      }

      if (/^[a-zA-Z0-9_-]{20,}$/.test(value)) {
        return value;
      }

      return "";
    }

    function formatDateText(value) {
      const text = getString(value);

      if (!text) {
        return "";
      }

      return text
        .replace(/-/g, "/")
        .replace(/\./g, "/")
        .replace(/\s.*$/, "");
    }

    function normalizeNumberText(value) {
      const text = toHalfWidthNumber(getString(value));
      const match = text.match(/[0-9]+/);

      if (match && match[0]) {
        return match[0];
      }

      return "";
    }

    function cleanSerialNo(value) {
      return toHalfWidthNumber(getString(value))
        .replace(/^No\./i, "")
        .replace(/^No/i, "")
        .replace(/^記念番号/, "")
        .trim();
    }

    function toHalfWidthNumber(value) {
      return getString(value).replace(/[０-９]/g, function(s) {
        return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
      });
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }

    function getFirst() {
      for (let i = 0; i < arguments.length; i++) {
        const value = getString(arguments[i]);

        if (value) {
          return value;
        }
      }

      return "";
    }

    window.copyTargetUrl = copyTargetUrl;
  </script>
</body>
</html>
