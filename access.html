        0 0 18px rgba(255, 210, 80, 0.28);

      color: #fff1bd;

      background: #111111;
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.45),
        0 0 18px rgba(255, 210, 80, 0.12);
    }

    iframe {
      display: block;
      width: 100%;
      height: 360px;
      border: 0;
      background: #111111;
    }

    .btnArea {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .linkBtn {
      width: 100%;
      min-height: 70px;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: clamp(20px, 5.5vw, 34px);
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #ffffff;
      cursor: pointer;
      text-align: center;

      box-shadow:

      color: #271400;
      background: linear-gradient(180deg, #fff1a4 0%, #ffd84d 48%, #c89217 100%);

      .linkBtn {
        min-height: 66px;
        border-radius: 22px;

      iframe {
        height: 320px;
