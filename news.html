<body>
<main class="page">

<section class="card">
  <h1 class="pageTitle">お知らせ</h1>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

const SHARE_NEWS_URL =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-news.html?v=20260703-toponly";

let currentUserId = "";

document.addEventListener("DOMContentLoaded", function(){
  initPage();
});

async function initPage(){
  currentUserId = getUserIdFromUrl();

  if(currentUserId){
    localStorage.setItem("tagoyamaUserId", currentUserId);
    localStorage.setItem("tagoyamaFujiUserId", currentUserId);
  }else{
    currentUserId =
      localStorage.getItem("tagoyamaUserId") ||
      localStorage.getItem("tagoyamaFujiUserId") ||
      "";
  }

  updateLinks();
  await loadNews();
}

function getUserIdFromUrl(){
  const params = new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );
}

function updateLinks(){
  const query =
    currentUserId
      ? "?userId=" + encodeURIComponent(currentUserId)
      : "";

  setHref("topLink", "index.html" + query);
  setHref("omikujiLink", "omikuji.html" + query);
  setHref("certificateLink", "certificate.html" + query);
  setHref("goenLink", "goen.html" + query);
}

function setHref(id, href){
  const el = document.getElementById(id);

  if(el){
    el.href = href;
  }
}

async function loadNews(){
  const box = document.getElementById("newsList");
  setStatus("お知らせを読み込んでいます。");

  if(box){
    box.innerHTML = "";
  }

  try{
    const data = await tryManyJson([
      GAS_URL + "?mode=news&t=" + Date.now(),
      GAS_URL + "?news=1&t=" + Date.now(),
      GAS_URL + "?action=news&t=" + Date.now(),

      GAS_URL + "?mode=listNews&t=" + Date.now(),
      GAS_URL + "?listNews=1&t=" + Date.now(),
      GAS_URL + "?action=listNews&t=" + Date.now(),

      GAS_URL + "?mode=getNews&t=" + Date.now(),
      GAS_URL + "?getNews=1&t=" + Date.now(),
      GAS_URL + "?action=getNews&t=" + Date.now(),

      GAS_URL + "?mode=archive&t=" + Date.now(),
      GAS_URL + "?archive=1&t=" + Date.now(),
      GAS_URL + "?action=archive&t=" + Date.now()
    ]);

    const list = extractNewsList(data);

    renderNews(list);
  }catch(error){
    console.warn(error);

    const localList = loadLocalNews();

    if(localList.length){
      renderNews(localList);
      return;
    }

    renderNews([]);
  }
}

function renderNews(list){
  const box = document.getElementById("newsList");

  if(!box){
    return;
  }

  box.innerHTML = "";

  if(!Array.isArray(list) || list.length === 0){
    setStatus("現在表示できるお知らせはありません。");
    return;
  }

  setStatus("お知らせを表示しました。");

  let count = 0;

  list.forEach(function(raw){
    const item = normalizeNewsItem(raw);

    if(!item.title && !item.text && !item.date && !item.imageUrl){
      return;
    }

    count++;

    const div = document.createElement("div");
    div.className = "newsItem";

    if(item.imageUrl){
      const img = document.createElement("img");
      img.className = "newsImage";
      img.alt = item.title || "お知らせ";

      const urls = makeImageUrlList(item.imageUrl);
      img.dataset.urls = JSON.stringify(urls);
      img.dataset.index = "0";
      img.src = urls[0] || item.imageUrl;

      img.onerror = function(){
        tryNextNewsImage(this);
      };

      div.appendChild(img);
    }

    const title = document.createElement("p");
    title.className = "newsTitle";
    title.innerText = item.title || "お知らせ";

    div.appendChild(title);

    if(item.date){
      const date = document.createElement("p");
      date.className = "newsDate";
      date.innerText = item.date;
      div.appendChild(date);
    }

    const text = document.createElement("p");
    text.className = "newsText";
    text.innerText =
      item.text ||
      "田子山富士168の縁プロジェクトからのお知らせです。";

    div.appendChild(text);

    const share = document.createElement("div");
    share.className = "shareBtnArea";

    const fb = document.createElement("button");
    fb.className = "smallBtn blueBtn";
    fb.type = "button";
    fb.innerText = "Facebookに投稿";
    fb.onclick = function(){
      postFacebookNews(item);
    };

    const line = document.createElement("button");
    line.className = "smallBtn greenBtn";
    line.type = "button";
    line.innerText = "LINEで送る";
    line.onclick = function(){
      sendLineNews(item);
    };

    const x = document.createElement("button");
    x.className = "smallBtn blackBtn";
    x.type = "button";
    x.innerText = "Xで投稿";
    x.onclick = function(){
      postXNews(item);
    };

    const copy = document.createElement("button");
    copy.className = "smallBtn blueBtn";
    copy.type = "button";
    copy.innerText = "リンクをコピー";
    copy.onclick = function(){
      copyNews(item);
    };

    share.appendChild(fb);
    share.appendChild(line);
    share.appendChild(x);
    share.appendChild(copy);

    div.appendChild(share);
    box.appendChild(div);
  });

  if(count === 0){
    setStatus("現在表示できるお知らせはありません。");
  }
}

function tryNextNewsImage(img){
  try{
    const urls = JSON.parse(img.dataset.urls || "[]");
    let index = Number(img.dataset.index || "0");
    index++;

    if(index < urls.length){
      img.dataset.index = String(index);
      img.src = urls[index];
      return;
    }
  }catch(error){}

  img.style.display = "none";
}

function normalizeNewsItem(raw){
  raw = raw || {};

  if(Array.isArray(raw)){
    const joined = raw.join("");

    if(isHeaderText(joined)){
      return {
        date:"",
        title:"",
        text:"",
        imageUrl:""
      };
    }

    return normalizeArrayRow(raw);
  }

  return {
    date: formatDateText(
      getFirst(
        raw.date,
        raw.datetime,
        raw.createdAt,
        raw.created_at,
        raw.time,
        raw["日時"],
        raw["日付"],
        raw["タイムスタンプ"]
      )
    ),

    title: getFirst(
      raw.title,
      raw.name,
      raw.subject,
      raw.heading,
      raw.caption,
      raw["タイトル"],
      raw["件名"],
      raw["見出し"],
      raw["題名"],
      "お知らせ"
    ),

    text: getFirst(
      raw.text,
      raw.message,
      raw.body,
      raw.content,
      raw.description,
      raw.detail,
      raw.comment,
      raw["本文"],
      raw["内容"],
      raw["メッセージ"],
      raw["説明"],
      raw["詳細"],
      raw["コメント"]
    ),

    imageUrl: normalizeImageUrl(
      getFirst(
        raw.imageUrl,
        raw.image_url,
        raw.image,
        raw.imgUrl,
        raw.img_url,
        raw.img,
        raw.photoUrl,
        raw.photo_url,
        raw.photo,
        raw.pictureUrl,
        raw.picture_url,
        raw.picture,
        raw.thumbnail,
        raw.thumb,
        raw.driveId,
        raw.drive_id,
        raw.imageId,
        raw.image_id,
        raw.imgid,
        raw.fileId,
        raw.file_id,
        raw["画像URL"],
        raw["画像url"],
        raw["画像Url"],
        raw["画像リンク"],
        raw["画像"],
        raw["写真URL"],
        raw["写真url"],
        raw["写真"],
        raw["画像ID"],
        raw["画像Id"],
        raw["ファイルID"],
        raw["ファイルId"],
        raw["DriveID"],
        raw["Googleドライブ画像"]
      )
    )
  };
}

function normalizeArrayRow(row){
  const cells = row.map(function(value){
    return getString(value);
  });

  const date =
    findDateCell(cells) ||
    getString(cells[0]);

  const imageUrl = normalizeImageUrl(findImageCell(cells));

  let title = "";
  let text = "";

  const usable = cells.filter(function(cell){
    if(!cell){
      return false;
    }

    if(isHeaderText(cell)){
      return false;
    }

    if(isDateText(cell)){
      return false;
    }

    if(isImageText(cell)){
      return false;
    }

    if(isDriveIdText(cell)){
      return false;
    }

    if(isUrlText(cell)){
      return false;
    }

    return true;
  });

  if(usable.length){
    title = usable[0] || "お知らせ";
  }

  if(usable.length >= 2){
    text = usable.slice(1).join("\n");
  }else{
    text = usable[0] || "";
  }

  return {
    date: formatDateText(date),
    title: title || "お知らせ",
    text: text,
    imageUrl: imageUrl
  };
}

function makeNewsShareText(item){
  item = item || {};

  return "田子山富士168の縁プロジェクト お知らせ\n" +
    (item.title || "お知らせ") + "\n" +
    (item.text || "田子山富士168の縁プロジェクトからのお知らせです。") + "\n\n" +
    "#田子山富士 #敷島神社 #志木市";
}

function postFacebookNews(item){
  const url =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(SHARE_NEWS_URL);

  window.open(url, "_blank", "noopener,noreferrer");
}

function sendLineNews(item){
  const url =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(SHARE_NEWS_URL) +
    "&text=" +
    encodeURIComponent(makeNewsShareText(item));

  location.href = url;
}

function postXNews(item){
  const url =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(makeNewsShareText(item)) +
    "&url=" +
    encodeURIComponent(SHARE_NEWS_URL);

  window.open(url, "_blank", "noopener,noreferrer");
}

async function copyNews(item){
  const text =
    makeNewsShareText(item) +
    "\n" +
    SHARE_NEWS_URL;

  try{
    await navigator.clipboard.writeText(text);
    alert("お知らせの内容をコピーしました。");
  }catch(error){
    const area = document.createElement("textarea");
    area.value = text;
    area.style.position = "fixed";
    area.style.left = "-9999px";
    document.body.appendChild(area);
    area.focus();
    area.select();
    document.execCommand("copy");
    area.remove();
    alert("お知らせの内容をコピーしました。");
  }
}

function extractNewsList(data){
  if(!data){
    return [];
  }

  if(Array.isArray(data)){
    return cleanList(data);
  }

  const directKeys = [
    "news",
    "newsList",
    "archive",
    "archiveList",
    "list",
    "rows",
    "items",
    "values",
    "records",
    "data"
  ];

  for(let i = 0; i < directKeys.length; i++){
    const key = directKeys[i];

    if(Array.isArray(data[key])){
      return cleanList(data[key]);
    }
  }

  if(data.data && typeof data.data === "object"){
    for(let i = 0; i < directKeys.length; i++){
      const key = directKeys[i];

      if(Array.isArray(data.data[key])){
        return cleanList(data.data[key]);
      }
    }
  }

  const values = Object.values(data).filter(function(value){
    if(!value || typeof value !== "object"){
      return false;
    }

    return Boolean(
      value.title ||
      value.message ||
      value.text ||
      value.body ||
      value.content ||
      value.imageUrl ||
      value.image_url ||
      value.image ||
      value.imgUrl ||
      value.img_url ||
      value.img ||
      value.photo ||
      value.photoUrl ||
      value.picture ||
      value.pictureUrl ||
      value.driveId ||
      value.imageId ||
      value.fileId ||
      value["タイトル"] ||
      value["本文"] ||
      value["内容"] ||
      value["メッセージ"] ||
      value["画像URL"] ||
      value["画像"] ||
      value["写真URL"] ||
      value["写真"] ||
      value["画像ID"] ||
      value["ファイルID"]
    );
  });

  return cleanList(values);
}

function cleanList(list){
  if(!Array.isArray(list)){
    return [];
  }

  return list.filter(function(row){
    if(!row){
      return false;
    }

    if(Array.isArray(row)){
      const joined = row.join("");
      return !isHeaderText(joined);
    }

    if(typeof row === "object"){
      const joined = Object.values(row).join("");
      return !isHeaderText(joined);
    }

    return false;
  }).reverse();
}

function loadLocalNews(){
  const keys = [
    "tagoyamaNewsList",
    "tagoyamaLastNews",
    "tagoyamaArchiveList"
  ];

  for(let i = 0; i < keys.length; i++){
    try{
      const text = localStorage.getItem(keys[i]);

      if(!text){
        continue;
      }

      const data = JSON.parse(text);

      if(Array.isArray(data)){
        return data;
      }

      if(data && typeof data === "object"){
        return [data];
      }
    }catch(error){}
  }

  return [];
}

async function tryManyJson(urls){
  let lastError = null;

  for(let i = 0; i < urls.length; i++){
    try{
      const data = await getJson(urls[i]);

      if(data !== null && data !== undefined){
        return data;
      }
    }catch(error){
      lastError = error;
    }
  }

  throw lastError || new Error("通信に失敗しました。");
}

async function getJson(url){
  try{
    const res = await fetch(url, {
      method:"GET",
      cache:"no-store"
    });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    return parseJsonText(text);
  }catch(fetchError){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value = String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const objectStart = value.indexOf("{");
    const objectEnd = value.lastIndexOf("}");

    if(objectStart >= 0 && objectEnd > objectStart){
      return JSON.parse(value.substring(objectStart, objectEnd + 1));
    }

    const arrayStart = value.indexOf("[");
    const arrayEnd = value.lastIndexOf("]");

    if(arrayStart >= 0 && arrayEnd > arrayStart){
      return JSON.parse(value.substring(arrayStart, arrayEnd + 1));
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve, reject){
    const callbackName =
      "tagoyamaNewsCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script = document.createElement("script");
    const sep = url.indexOf("?") >= 0 ? "&" : "?";

    const timer = setTimeout(function(){
      cleanup();
      reject(new Error("JSONP timeout"));
    }, 12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

function setStatus(text){
  const el = document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }
}

function isHeaderText(text){
  const value = getString(text);

  return (
    value.indexOf("日時") >= 0 ||
    value.indexOf("日付") >= 0 ||
    value.indexOf("タイトル") >= 0 ||
    value.indexOf("件名") >= 0 ||
    value.indexOf("本文") >= 0 ||
    value.indexOf("内容") >= 0 ||
    value.indexOf("メッセージ") >= 0
  );
}

function isDateText(text){
  const value = getString(text);

  return (
    /^[0-9]{4}[\/\-.][0-9]{1,2}[\/\-.][0-9]{1,2}/.test(value) ||
    /^[0-9]{1,2}[\/\-.][0-9]{1,2}/.test(value) ||
    value.indexOf("GMT") >= 0 ||
    value.indexOf("JST") >= 0
  );
}

function isImageText(text){
  const value = getString(text);

  return (
    value.indexOf(".jpg") >= 0 ||
    value.indexOf(".jpeg") >= 0 ||
    value.indexOf(".png") >= 0 ||
    value.indexOf(".webp") >= 0 ||
    value.indexOf("drive.google.com") >= 0 ||
    value.indexOf("lh3.googleusercontent.com") >= 0 ||
    value.indexOf("googleusercontent.com") >= 0
  );
}

function isUrlText(text){
  const value = getString(text);

  return (
    value.indexOf("http://") === 0 ||
    value.indexOf("https://") === 0
  );
}

function isDriveIdText(text){
  const value = getString(text);

  return /^[a-zA-Z0-9_-]{20,}$/.test(value);
}

function findDateCell(cells){
  for(let i = 0; i < cells.length; i++){
    if(isDateText(cells[i])){
      return cells[i];
    }
  }

  return "";
}

function findImageCell(cells){
  for(let i = 0; i < cells.length; i++){
    if(isImageText(cells[i])){
      return cells[i];
    }
  }

  for(let i = 0; i < cells.length; i++){
    const value = getString(cells[i]);

    if(isDriveIdText(value)){
      return value;
    }
  }

  return "";
}

function makeImageUrlList(url){
  const urls = [];
  const value = getString(url);
  const driveId = getDriveId(value);

  function add(u){
    u = getString(u);

    if(u && urls.indexOf(u) === -1){
      urls.push(u);
    }
  }

  if(driveId){
    add(
      "https://lh3.googleusercontent.com/d/" +
      encodeURIComponent(driveId) +
      "=w2000"
    );

    add(
      "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(driveId) +
      "&sz=w2000"
    );

    add(
      "https://drive.google.com/uc?export=view&id=" +
      encodeURIComponent(driveId)
    );
  }

  add(value);

  return urls;
}

function normalizeImageUrl(url){
  const value = getString(url);

  if(!value){
    return "";
  }

  const driveId = getDriveId(value);

  if(driveId){
    return "https://lh3.googleusercontent.com/d/" +
      encodeURIComponent(driveId) +
      "=w2000";
  }

  return value;
}

function getDriveId(url){
  const value = getString(url);

  if(!value){
    return "";
  }

  let match = value.match(/\/file\/d\/([^/]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = value.match(/[?&]id=([^&]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = value.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

  if(match && match[1]){
    return match[1];
  }

  if(/^[a-zA-Z0-9_-]{20,}$/.test(value)){
    return value;
  }

  return "";
}

function formatDateText(value){
  const text = getString(value);

  if(!text){
    return "";
  }

  return text
    .replace(/-/g, "/")
    .replace(/\./g, "/")
    .replace(/\s.*$/, "");
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function getFirst(){
  for(let i = 0; i < arguments.length; i++){
    const value = getString(arguments[i]);

    if(value){
      return value;
    }
  }

  return "";
}
