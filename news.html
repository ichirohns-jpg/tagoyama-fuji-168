<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>お知らせ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:
"Hiragino Sans",
"Yu Gothic",
"Meiryo",
sans-serif;
color:#fff;
}

.hero img{
width:100%;
display:block;
}

.wrap{
max-width:1000px;
margin:auto;
padding:20px;
}

.titleBox{
text-align:center;
margin-bottom:30px;
}

.title{
font-size:42px;
font-weight:900;
color:#d4af37;
}

.sub{
margin-top:10px;
font-size:18px;
color:#ccc;
}

.newsCard{
background:
linear-gradient(
180deg,
#1c1c1c,
#0f0f0f
);
border:2px solid #d4af37;
border-radius:28px;
padding:20px;
margin-bottom:30px;
box-shadow:
0 12px 32px rgba(0,0,0,.45);
}

.newsDate{
font-size:16px;
color:#d4af37;
font-weight:900;
margin-bottom:10px;
}

.newsTitle{
font-size:30px;
font-weight:900;
margin-bottom:15px;
}

.newsText{
font-size:18px;
line-height:1.8;
color:#eee;
margin-top:15px;
}

.slider{
display:flex;
overflow-x:auto;
gap:12px;
scroll-snap-type:x mandatory;
padding-bottom:10px;
}

.slider img{
width:260px;
height:460px;
object-fit:cover;
border-radius:20px;
scroll-snap-align:center;
flex:none;
border:2px solid #333;
}

.youtube{
margin-top:20px;
border-radius:20px;
overflow:hidden;
}

.youtube iframe{
width:100%;
height:260px;
border:none;
}

.linkBtn{
display:block;
width:100%;
padding:18px;
margin-top:20px;
background:#d4af37;
color:#000;
font-size:22px;
font-weight:900;
text-decoration:none;
text-align:center;
border-radius:18px;
}

}

.shareRow{
display:flex;
gap:10px;
margin-top:20px;
}

.shareBtn{
flex:1;
padding:14px;
border:none;
border-radius:16px;
font-size:18px;
font-weight:900;
cursor:pointer;
color:#fff;
}

.fb{
background:#1877f2;
}

.line{
background:#06c755;
}

.x{
background:#000;
}

.copy{
background:#607d8b;
}

.homeBtn{
display:block;
width:100%;
padding:20px;
margin-top:30px;
background:#263238;
color:#fff;
text-decoration:none;
text-align:center;
font-size:22px;
font-weight:900;
border-radius:18px;
}

.loading{
text-align:center;
font-size:26px;
font-weight:900;
padding:80px 0;
color:#d4af37;
}

</style>
</head>

<body>

<div class="hero">

<img
src="top.jpg"
alt="田子山富士">

</div>

<div class="wrap">

<div class="titleBox">

<div class="title">
📢 お知らせ
</div>

<div class="sub">
田子山富士からのお知らせ
</div>

</div>

<div
id="loading"
class="loading">

読込中...

</div>

<div
id="newsList">

</div>

<a
href="index.html"
class="homeBtn">

🏠 田子山富士へ戻る

</a>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzYIVAj2qRY4g2EVIMLbQttvurR0U08uzmWThrz6HbNDGSJ--B-TjuuPzmXbokSHfrhtw/exec";

function youtubeEmbed(url){

if(!url) return "";

let id="";

if(url.includes("watch?v=")){
id=url.split("watch?v=")[1].split("&")[0];
}

else if(url.includes("youtu.be/")){
id=url.split("youtu.be/")[1].split("?")[0];
}

if(!id) return "";

return `
<div class="youtube">
<iframe
src="https://www.youtube.com/embed/${id}"
allowfullscreen>
</iframe>
</div>
`;

}

function shareFacebook(id){

const url =
location.origin +
location.pathname.replace(
"news.html",
"share-news.html"
) +
"?id=" + id;

window.open(
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(url)
);

}

function shareLine(id){

const url =
location.origin +
location.pathname.replace(
"news.html",
"share-news.html"
) +
"?id=" + id;

window.open(
"https://social-plugins.line.me/lineit/share?url=" +
encodeURIComponent(url)
);

}

function shareX(id){

const url =
location.origin +
location.pathname.replace(
"news.html",
"share-news.html"
) +
"?id=" + id;

window.open(
"https://twitter.com/intent/tweet?url=" +
encodeURIComponent(url)
);

}

function copyLink(id){

const url =
location.origin +
location.pathname.replace(
"news.html",
"share-news.html"
) +
"?id=" + id;

navigator.clipboard.writeText(
url
);

alert(
"リンクをコピーしました"
);

}

fetch(
GAS_URL +
"?mode=news"
)
.then(
r=>r.json()
)
.then(
rows=>{

document.getElementById(
"loading"
).style.display =
"none";

const newsList =
document.getElementById(
"newsList"
);

newsList.innerHTML = "";

rows
.slice(0,5)
.forEach((row,index)=>{

let images = "";

[
row.image1,
row.image2,
row.image3,
row.image4,
row.image5
]
.forEach(img=>{

if(img){

images +=
`
<img src="${img}">
`;

}

});

newsList.innerHTML +=
`
<div class="newsCard">

<div class="newsDate">
${row.date || ""}
</div>

<div class="newsTitle">
${row.title || ""}
</div>

<div class="slider">
${images}
</div>

<div class="newsText">
${row.text || ""}
</div>

${youtubeEmbed(
row.youtube || ""
)}

${
row.link
?
`
<a
href="${row.link}"
target="_blank"
class="linkBtn">

詳しくはこちら

</a>
`
:
""
}

<div class="shareRow">

<button
class="shareBtn fb"
onclick="shareFacebook(${index})">

Facebook

</button>

<button
class="shareBtn line"
onclick="shareLine(${index})">

LINE

</button>

<button
class="shareBtn x"
onclick="shareX(${index})">

X

</button>

<button
class="shareBtn copy"
onclick="copyLink(${index})">

コピー

</button>

</div>

</div>
`;

});

})
.catch(err=>{

document.getElementById(
"loading"
).innerHTML =
"お知らせがありません";

console.log(err);

});

</script>

</body>
</html>
