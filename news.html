<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>お知らせ｜田子山富士168の縁プロジェクト</title>

<meta name="description" content="田子山富士168の縁プロジェクトからのお知らせを表示します。">

<meta property="og:title" content="田子山富士168の縁プロジェクト お知らせ">
<meta property="og:description" content="田子山富士168の縁プロジェクトからのお知らせを表示します。">

<meta name="twitter:description" content="田子山富士168の縁プロジェクトからのお知らせを表示します。">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at top,#3a2b00 0%,#151000 45%,#050505 100%);
  color:#fff;
  font-family:
    "Hiragino Sans",
    "Yu Gothic",
    "Meiryo",
    sans-serif;
  padding:18px;
}

.wrap{
  max-width:900px;
  margin:0 auto;
}

.card{
  background:rgba(0,0,0,.62);
  border:2px solid #d4af37;
  border-radius:28px;
  padding:18px;
  box-shadow:
    0 12px 32px rgba(0,0,0,.5);
}

h1{
  text-align:center;
  color:#ffe78a;
  font-size:clamp(34px,9vw,64px);
  line-height:1.2;
  letter-spacing:.04em;
  text-shadow:
    0 3px 8px rgba(0,0,0,.9),
    0 0 12px rgba(212,175,55,.45);
  margin-bottom:24px;
}

.lead{
  text-align:center;
  color:#fff7d5;
  font-size:clamp(21px,5.5vw,34px);
  font-weight:800;
  line-height:1.75;
  margin-bottom:24px;
}

.status{
  border:1px solid rgba(212,175,55,.55);
  border-radius:24px;
  padding:22px 16px;
  text-align:center;
  color:#fff7d5;
  font-size:clamp(18px,5vw,30px);
  font-weight:800;
  line-height:1.6;
  margin-bottom:24px;
}

.newsList{
  display:grid;
  gap:24px;
}

.newsItem{
  border:2px solid rgba(212,175,55,.62);
  border-radius:26px;
  padding:22px;
  background:rgba(0,0,0,.46);
  overflow:hidden;
}

.newsTitle{
  color:#ffe78a;
  font-size:clamp(26px,7vw,44px);
  font-weight:900;
  line-height:1.35;
  letter-spacing:.02em;
  text-shadow:
    0 3px 8px rgba(0,0,0,.9),
    0 0 8px rgba(212,175,55,.35);
  margin-bottom:14px;
  word-break:break-word;
}

.newsDate{
  color:#fff1ad;
  font-size:clamp(18px,5vw,28px);
  font-weight:900;
  line-height:1.4;
  margin-bottom:22px;
}

.newsBody{
  color:#fff;
  font-size:clamp(20px,5.5vw,32px);
  font-weight:800;
  line-height:1.65;
  white-space:pre-wrap;
  word-break:break-word;
  margin-bottom:22px;
}

.newsImage{
  width:100%;
  display:block;
  border-radius:18px;
  margin:0 0 22px;
  background:#111;
}

.shareButtons{
  display:grid;
  gap:12px;
}

.shareBtn{
  display:block;
  width:100%;
  border:none;
  border-radius:999px;
  padding:15px 18px;
  color:#fff;
  font-size:clamp(18px,5vw,28px);
  font-weight:900;
  line-height:1.2;
  text-align:center;
  text-decoration:none;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(0,0,0,.4);
}

.facebook{
  background:linear-gradient(180deg,#2f86ff,#0758d8);
}

.line{
  background:linear-gradient(180deg,#35e987,#06b94f);
}

.x{
  background:linear-gradient(180deg,#222,#000);
}

.copy{
  background:linear-gradient(180deg,#2f86ff,#0758d8);
}

.bottom{
  margin-top:28px;
  text-align:center;
}

.topLink{
  display:inline-block;
  color:#d4af37;
  text-decoration:none;
  font-size:20px;
  font-weight:900;
  border:1px solid #d4af37;
  border-radius:999px;
  padding:13px 30px;
}

.footer{
  margin-top:28px;
  text-align:center;
  color:#d4af37;
  font-size:14px;
  line-height:1.8;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <h1>お知らせ</h1>

    <div class="lead">
      田子山富士168の縁プロジェクトからの<br>
      お知らせを表示します。
    </div>

    <div id="status" class="status">
      お知らせを読み込んでいます。
    </div>

    <div id="newsList" class="newsList"></div>

    <div class="bottom">
      <a class="topLink" href="./index.html">トップへ戻る</a>
    </div>

    <div class="footer">
      田子山富士 168の縁プロジェクト<br>
      お知らせ
    </div>

  </div>
</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

const NEWS_SHARE_URL =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-news.html";

const HASH_TAGS =
"#田子山富士 #敷島神社 #志木市";

const statusBox =
document.getElementById("status");

const newsList =
document.getElementById("newsList");

function textValue(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function dateValue(value){
  const s =
  textValue(value);

  if(!s){
    return "";
  }

  if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
    const d =
    new Date(s);

    if(!isNaN(d.getTime())){
      const y =
      d.getFullYear();

      const m =
      String(d.getMonth() + 1).padStart(2,"0");

      const day =
      String(d.getDate()).padStart(2,"0");

      return y + "/" + m + "/" + day;
    }
  }

  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
    return s.replaceAll("-","/");
  }

  return s;
}

function pickObjectValue(obj,names){
  for(let i = 0; i < names.length; i++){
    const name =
    names[i];

    if(obj[name] !== undefined && obj[name] !== null){
      return obj[name];
    }
  }

  return "";
}

function normalizeRow(row){
  let date = "";
  let title = "";
  let body = "";
  let imageUrl = "";

  if(Array.isArray(row)){
    date =
    row[0];

    title =
    row[1];

    body =
    row[2];

    imageUrl =
    row[3];
  }else if(row && typeof row === "object"){
    date =
    pickObjectValue(row,[
      "日付",
      "date",
      "Date",
      "day",
      "Day",
      "createdAt",
      "timestamp"
    ]);

    title =
    pickObjectValue(row,[
      "タイトル",
      "title",
      "Title",
      "件名",
      "見出し",
      "name",
      "Name"
    ]);

    body =
    pickObjectValue(row,[
      "本文",
      "body",
      "Body",
      "text",
      "Text",
      "content",
      "Content",
      "description",
      "Description",
      "message",
      "Message"
    ]);

    imageUrl =
    pickObjectValue(row,[
      "画像URL",
      "imageUrl",
      "ImageUrl",
      "imageURL",
      "ImageURL",
      "image",
      "Image",
      "img",
      "Img",
      "photo",
      "Photo"
    ]);
  }

  return {
    date:dateValue(date),
    title:textValue(title),
    body:textValue(body),
    imageUrl:textValue(imageUrl)
  };
}

function extractRows(data){
  if(Array.isArray(data)){
    return data;
  }

  if(data && Array.isArray(data.news)){
    return data.news;
  }

  if(data && Array.isArray(data.items)){
    return data.items;
  }

  if(data && Array.isArray(data.data)){
    return data.data;
  }

  if(data && Array.isArray(data.values)){
    return data.values;
  }

  if(data && Array.isArray(data.rows)){
    return data.rows;
  }

  return [];
}

function isHeader(item){
  const d =
  item.date;

  const t =
  item.title;

  const b =
  item.body;

  const img =
  item.imageUrl;

  if(
    d === "日付" &&
    t === "タイトル"
  ){
    return true;
  }

  if(
    t === "title" ||
    t === "Title"
  ){
    return true;
  }

  if(
    d === "date" &&
    t === "title" &&
    b === "body" &&
    img === "imageUrl"
  ){
    return true;
  }

  return false;
}

function buildNewsUrl(index){
  return NEWS_SHARE_URL + "?news=" + encodeURIComponent(String(index + 1));
}

function buildPostText(item){
  let text =
  "";

  if(item.title){
    text += item.title;
  }

  if(item.date){
    if(text){
      text += "\n";
    }
    text += item.date;
  }

  if(item.body){
    if(text){
      text += "\n\n";
    }
    text += item.body;
  }

  if(text){
    text += "\n\n";
  }

  text += HASH_TAGS;

  return text;
}

function openFacebook(url){
  const shareUrl =
  "https://www.facebook.com/sharer/sharer.php?u=" +
  encodeURIComponent(url);

  window.open(shareUrl,"_blank","noopener,noreferrer");
}

function openLine(url,text){
  const shareUrl =
  "https://social-plugins.line.me/lineit/share?url=" +
  encodeURIComponent(url) +
  "&text=" +
  encodeURIComponent(text);

  window.open(shareUrl,"_blank","noopener,noreferrer");
}

function openX(url,text){
  const shareUrl =
  "https://twitter.com/intent/tweet?text=" +
  encodeURIComponent(text) +
  "&url=" +
  encodeURIComponent(url);

  window.open(shareUrl,"_blank","noopener,noreferrer");
}

async function copyText(text,url){
  const copyValue =
  text + "\n" + url;

  try{
    await navigator.clipboard.writeText(copyValue);
    statusBox.textContent =
    "リンクをコピーしました。";
  }catch(e){
    const textarea =
    document.createElement("textarea");

    textarea.value =
    copyValue;

    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);

    statusBox.textContent =
    "リンクをコピーしました。";
  }
}

function createShareButtons(item,index){
  const shareUrl =
  buildNewsUrl(index);

  const postText =
  buildPostText(item);

  const box =
  document.createElement("div");

  box.className =
  "shareButtons";

  const facebook =
  document.createElement("button");

  facebook.type =
  "button";

  facebook.className =
  "shareBtn facebook";

  facebook.textContent =
  "Facebookに投稿";

  facebook.addEventListener("click",function(){
    openFacebook(shareUrl);
  });

  const line =
  document.createElement("button");

  line.type =
  "button";

  line.className =
  "shareBtn line";

  line.textContent =
  "LINEで送る";

  line.addEventListener("click",function(){
    openLine(shareUrl,postText);
  });

  const x =
  document.createElement("button");

  x.type =
  "button";

  x.className =
  "shareBtn x";

  x.textContent =
  "Xで投稿";

  x.addEventListener("click",function(){
    openX(shareUrl,postText);
  });

  const copy =
  document.createElement("button");

  copy.type =
  "button";

  copy.className =
  "shareBtn copy";

  copy.textContent =
  "リンクをコピー";

  copy.addEventListener("click",function(){
    copyText(postText,shareUrl);
  });

  box.appendChild(facebook);
  box.appendChild(line);
  box.appendChild(x);
  box.appendChild(copy);

  return box;
}

function renderNews(items){
  newsList.innerHTML =
  "";

  if(!items.length){
    statusBox.textContent =
    "表示できるお知らせがありません。";
    return;
  }

  items.forEach(function(item,index){

    const article =
    document.createElement("article");

    article.className =
    "newsItem";

    if(item.title){
      const title =
      document.createElement("div");

      title.className =
      "newsTitle";

      title.textContent =
      item.title;

      article.appendChild(title);
    }

    if(item.date){
      const date =
      document.createElement("div");

      date.className =
      "newsDate";

      date.textContent =
      item.date;

      article.appendChild(date);
    }

    if(item.imageUrl){
      const img =
      document.createElement("img");

      img.className =
      "newsImage";

      img.src =
      item.imageUrl;

      img.alt =
      item.title || "お知らせ画像";

      img.loading =
      "lazy";

      img.addEventListener("error",function(){
        img.style.display =
        "none";
      });

      article.appendChild(img);
    }

    if(item.body){
      const body =
      document.createElement("div");

      body.className =
      "newsBody";

      body.textContent =
      item.body;

      article.appendChild(body);
    }

    article.appendChild(
      createShareButtons(item,index)
    );

    newsList.appendChild(article);
  });

  statusBox.textContent =
  "お知らせを表示しました。";
}

async function loadNews(){
  try{
    const url =
    GAS_URL + "?mode=news";

    const res =
    await fetch(url);

    const data =
    await res.json();

    const rows =
    extractRows(data);

    const items =
    rows
    .map(normalizeRow)
    .filter(function(item){
      if(isHeader(item)){
        return false;
      }

      return (
        item.date ||
        item.title ||
        item.body ||
        item.imageUrl
      );
    });

    renderNews(items);

  }catch(e){
    statusBox.textContent =
    "お知らせを読み込めませんでした。";
  }
}

loadNews();
</script>

</body>
</html>
