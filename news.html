  </div>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbwJpywK1Hky0tVwVRhiB7E6Ln3O2yHVThDPg0atSb4Glkx1FEaywomw-Rwq_OwbbZjekw/exec";

const SHARE_NEWS_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-news.html";

let currentUserId = "";

window.addEventListener("load", initNews);

async function initNews(){
  currentUserId = getUserId();
  updateLinks();
  await loadNews();
}

function getUserId(){
  const params = new URLSearchParams(location.search);

  const value =
    getString(params.get("userId")) ||
    getString(params.get("userid")) ||
    getString(params.get("uid")) ||
    getString(localStorage.getItem("tagoyamaUserId")) ||
    getString(localStorage.getItem("tagoyamaFujiUserId"));

  if(value){
    localStorage.setItem("tagoyamaUserId", value);
    localStorage.setItem("tagoyamaFujiUserId", value);
  }

  return value;
}

function updateLinks(){
  const topLink = document.getElementById("topLink");

  const query =
    currentUserId
      ? "?userId=" + encodeURIComponent(currentUserId)
      : "";

  if(topLink){
    topLink.href = "index.html" + query;
  }
}

async function loadNews(){
  setStatus("お知らせを読み込んでいます。");

  try{
    const data = await tryManyJson([
      GAS_URL + "?mode=newsV2&t=" + Date.now(),
      GAS_URL + "?mode=news&t=" + Date.now(),
      GAS_URL + "?mode=listNews&t=" + Date.now()
    ]);

    const list = extractNewsList(data);

    renderNews(list);
  }catch(error){
    console.warn(error);
    setStatus("現在表示できるお知らせはありません。");
  }
}

function renderNews(list){
  const newsList = document.getElementById("newsList");

  if(!newsList){
    return;
  }

  newsList.innerHTML = "";

  if(!Array.isArray(list) || list.length === 0){
    setStatus("現在表示できるお知らせはありません。");
    return;
  }

  const displayItems = [];

  list.forEach(function(row,index){
    const item = normalizeNewsItem(row);

    if(
      !item.date &&
      !item.title &&
      !item.text &&
      item.imageUrls.length === 0 &&
      !item.youtubeUrl
    ){
      return;
    }

    item.newsIndex = index;
    item.sourceIndex = index;
    item.dateNumber = getDateNumber(item.date);

    displayItems.push(item);
  });

  if(displayItems.length === 0){
    setStatus("現在表示できるお知らせはありません。");
    return;
  }

  displayItems.sort(function(a,b){
    const dateA = Number(a.dateNumber || 0);
    const dateB = Number(b.dateNumber || 0);

    if(dateA !== dateB){
      return dateB - dateA;
    }

    return Number(b.sourceIndex || 0) - Number(a.sourceIndex || 0);
  });

  displayItems.forEach(function(item){
    const box = document.createElement("article");
    box.className = "newsItem";

    item.imageUrls.forEach(function(url){
      const img = document.createElement("img");
      img.className = "newsImage";
      img.alt = item.title || "お知らせ";
      img.src = url;
      img.onerror = function(){
        this.remove();
      };
      box.appendChild(img);
    });

    const title = document.createElement("h2");
    title.className = "newsTitle";
    title.innerText = item.title || "お知らせ";
    box.appendChild(title);

    if(item.date){
      const date = document.createElement("p");
      date.className = "newsDate";
      date.innerText = formatDateText(item.date);
      box.appendChild(date);
    }

    if(item.text){
      const text = document.createElement("p");
      text.className = "newsText";
      text.innerText = item.text;
      box.appendChild(text);
    }

    if(item.youtubeUrl){
      box.appendChild(
        createYouTubeBlock(item.youtubeUrl)
      );
    }

    const share = document.createElement("div");
    share.className = "shareBtnArea";

    const fb = document.createElement("button");
    fb.className = "smallBtn blueBtn";
    fb.type = "button";
    fb.innerText = "Facebookに投稿";
    fb.onclick = function(){
      postFacebookNews(item);
    };

    const line = document.createElement("button");
    line.className = "smallBtn greenBtn";
    line.type = "button";
    line.innerText = "LINEで送る";
    line.onclick = function(){
      sendLineNews(item);
    };

    const x = document.createElement("button");
    x.className = "smallBtn blackBtn";
    x.type = "button";
    x.innerText = "Xで投稿";
    x.onclick = function(){
      postXNews(item);
    };

    const copy = document.createElement("button");
    copy.className = "smallBtn blueBtn";
    copy.type = "button";
    copy.innerText = "リンクをコピー";
    copy.onclick = function(){
      copyNews(item);
    };

    share.appendChild(fb);
    share.appendChild(line);
    share.appendChild(x);
    share.appendChild(copy);

    box.appendChild(share);
    newsList.appendChild(box);
  });

  setStatus("新しいお知らせから順番に表示しています。");
}

function normalizeNewsItem(row){
  if(Array.isArray(row)){
    const imageUrls = [
      getString(row[3]),
      getString(row[4]),
      getString(row[5]),
      getString(row[6]),
      getString(row[7])
    ].filter(function(url){
      return url;
    });

    return {
      date:getString(row[0]),
      title:getString(row[1]),
      text:getString(row[2]),
      imageUrls:imageUrls,
      imageUrl:imageUrls[0] || "",
      youtubeUrl:getString(row[8])
    };
  }

  row = row || {};

  const imageUrls = [
    row.imageUrl,
    row.imageURL,
    row.imgUrl,
    row.img,
    row.image,
    row["画像URL"],
    row["画像url"],
    row["画像"],
    row["画像1"],
    row["画像2"],
    row["画像3"],
    row["画像4"],
    row["画像5"]
  ].map(function(value){
    return getString(value);
  }).filter(function(url){
    return url;
  });

  return {
    date:getString(
      row.date ||
      row["日付"] ||
      row["日時"] ||
      ""
    ),

    title:getString(
      row.title ||
      row["タイトル"] ||
      row.name ||
      row.subject ||
      ""
    ),

    text:getString(
      row.text ||
      row.body ||
      row.message ||
      row.content ||
      row["本文"] ||
      row["内容"] ||
      row["メッセージ"] ||
      row["概要"] ||
      ""
    ),

    imageUrls:imageUrls,
    imageUrl:imageUrls[0] || "",

    youtubeUrl:getString(
      row.youtubeUrl ||
      row.YouTubeURL ||
      row.youtube ||
      row.YouTube ||
      row["YouTubeURL"] ||
      row["YouTube URL"] ||
      row["youtubeURL"] ||
      row["動画URL"] ||
      row["動画"] ||
      ""
    )
  };
}

function createYouTubeBlock(url){
  const box = document.createElement("div");
  box.className = "youtubeBox";

  const embedUrl = getYouTubeEmbedUrl(url);

  if(embedUrl){
    const wrap = document.createElement("div");
    wrap.className = "youtubeFrameWrap";

    const iframe = document.createElement("iframe");
    iframe.className = "youtubeFrame";
    iframe.src = embedUrl;
    iframe.title = "YouTube動画";
    iframe.allow =
      "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
    iframe.allowFullscreen = true;

    wrap.appendChild(iframe);
    box.appendChild(wrap);
  }

  return box;
}

function getYouTubeEmbedUrl(url){
  const text = getString(url);

  if(!text){
    return "";
  }

  let id = "";

  try{
    const u = new URL(text);

    if(u.hostname.indexOf("youtu.be") >= 0){
      id = u.pathname.replace("/","").split("/")[0];
    }else if(u.hostname.indexOf("youtube.com") >= 0){
      if(u.pathname.indexOf("/watch") === 0){
        id = u.searchParams.get("v") || "";
      }else if(u.pathname.indexOf("/shorts/") === 0){
        id = u.pathname.split("/shorts/")[1].split("/")[0];
      }else if(u.pathname.indexOf("/embed/") === 0){
        id = u.pathname.split("/embed/")[1].split("/")[0];
      }else if(u.pathname.indexOf("/live/") === 0){
        id = u.pathname.split("/live/")[1].split("/")[0];
      }
    }
  }catch(error){
    id = "";
  }

  id = getString(id);

  if(!id){
    return "";
  }

  return "https://www.youtube.com/embed/" + encodeURIComponent(id);
}

function extractNewsList(data){
  if(!data){
    return [];
  }

  let list = [];

  if(Array.isArray(data)){
    list = data;
  }else if(Array.isArray(data.news)){
    list = data.news;
  }else if(Array.isArray(data.newsList)){
    list = data.newsList;
  }else if(Array.isArray(data.list)){
    list = data.list;
  }else if(Array.isArray(data.rows)){
    list = data.rows;
  }else if(Array.isArray(data.items)){
    list = data.items;
  }else if(Array.isArray(data.data)){
    list = data.data;
  }else if(data.data && Array.isArray(data.data.news)){
    list = data.data.news;
  }else if(data.data && Array.isArray(data.data.list)){
    list = data.data.list;
  }

  return removeHeaderRows(list);
}

function removeHeaderRows(list){
  return list.filter(function(row){
    if(!row){
      return false;
    }

    if(Array.isArray(row)){
      const a = getString(row[0]);
      const b = getString(row[1]);
      const c = getString(row[2]);
      const d = getString(row[3]);
      const i = getString(row[8]);

      if(
        a === "日付" ||
        a === "日時" ||
        b === "タイトル" ||
        c === "本文" ||
        c === "概要" ||
        d === "画像URL" ||
        d === "画像1" ||
        i === "YouTubeURL"
      ){
        return false;
      }
    }

    return true;
  });
}

function makeNewsShareText(item){
  let text =
    "田子山富士168の縁プロジェクト お知らせ\n" +
    (item.title || "お知らせ") + "\n" +
    (item.text || "");

  if(item.youtubeUrl){
    text += "\n\n動画はこちら\n" + item.youtubeUrl;
  }

  return text;
}

function buildNewsShareUrl(item){
  item = item || {};

  const params = new URLSearchParams();

  params.set("n", String(item.newsIndex || 0));
  params.set("v", "20260704youtube-nobutton");

  if(currentUserId){
    params.set("userId", currentUserId);
  }

  return SHARE_NEWS_PAGE + "?" + params.toString();
}

async function postFacebookNews(item){
  const shareUrl =
    buildNewsShareUrl(item);

  const text =
    makeNewsShareText(item);

  await copyText(text);

  alert(
    "投稿文をコピーしました。\nFacebook投稿画面で本文欄に貼り付けてください。"
  );

  const url =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(shareUrl);

  window.open(url, "_blank", "noopener,noreferrer");
}

function sendLineNews(item){
  const shareUrl =
    buildNewsShareUrl(item);

  const url =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(shareUrl) +
    "&text=" +
    encodeURIComponent(makeNewsShareText(item));

  location.href = url;
}

function postXNews(item){
  const shareUrl =
    buildNewsShareUrl(item);

  const url =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(makeNewsShareText(item)) +
    "&url=" +
    encodeURIComponent(shareUrl);

  window.open(url, "_blank", "noopener,noreferrer");
}

async function copyNews(item){
  const shareUrl =
    buildNewsShareUrl(item);

  await copyText(shareUrl);

  alert("お知らせの短いリンクをコピーしました。");
}

async function tryManyJson(urls){
  let lastError = null;

  for(let i = 0; i < urls.length; i++){
    try{
      const data = await getJson(urls[i]);

      if(data !== null && data !== undefined){
        return data;
      }
    }catch(error){
      lastError = error;
    }
  }

  throw lastError || new Error("通信に失敗しました。");
}

async function getJson(url){
  try{
    const res = await fetch(url,{
      method:"GET",
      cache:"no-store"
    });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    return parseJsonText(text);
  }catch(error){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value = String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const objectStart = value.indexOf("{");
    const objectEnd = value.lastIndexOf("}");

    if(objectStart >= 0 && objectEnd > objectStart){
      return JSON.parse(value.substring(objectStart, objectEnd + 1));
    }

    const arrayStart = value.indexOf("[");
    const arrayEnd = value.lastIndexOf("]");

    if(arrayStart >= 0 && arrayEnd > arrayStart){
      return JSON.parse(value.substring(arrayStart, arrayEnd + 1));
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve,reject){
    const callbackName =
      "tagoyamaNewsCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script = document.createElement("script");
    const sep = url.indexOf("?") >= 0 ? "&" : "?";

    const timer = setTimeout(function(){
      cleanup();
      reject(new Error("JSONP timeout"));
    },12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

async function copyText(text){
  try{
    await navigator.clipboard.writeText(text);
  }catch(error){
    const area = document.createElement("textarea");
    area.value = text;
    area.style.position = "fixed";
    area.style.left = "-9999px";
    document.body.appendChild(area);
    area.focus();
    area.select();
    document.execCommand("copy");
    area.remove();
  }
}

function setStatus(text){
  const el = document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }
}

function getDateNumber(value){
  const text =
    toHalfWidthNumber(getString(value));

  if(!text){
    return 0;
  }

  const match =
    text.match(/([0-9]{4})[^0-9]?([0-9]{1,2})[^0-9]?([0-9]{1,2})/);

  if(match){
    const y = match[1];
    const m = String(match[2]).padStart(2,"0");
    const d = String(match[3]).padStart(2,"0");

    return Number(y + m + d);
  }

  const shortMatch =
    text.match(/([0-9]{1,2})[^0-9]?([0-9]{1,2})/);

  if(shortMatch){
    const y = String(new Date().getFullYear());
    const m = String(shortMatch[1]).padStart(2,"0");
    const d = String(shortMatch[2]).padStart(2,"0");

    return Number(y + m + d);
  }

  return 0;
}

function formatDateText(value){
  const text = getString(value);

  if(!text){
    return "";
  }

  return toHalfWidthNumber(text)
    .replace(/-/g,"/")
    .replace(/\./g,"/")
    .replace(/\s.*$/,"");
}

function toHalfWidthNumber(value){
  return getString(value).replace(/[０-９]/g,function(s){
    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  });
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
