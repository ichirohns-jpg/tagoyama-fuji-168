<body>
  <main class="page">

          onerror="this.style.display='none'"
        >
      </div>

      <p class="siteSub">お知らせ</p>
    </header>

    <section class="card">
      <h2 class="cardTitle">お知らせ</h2>

      <p class="lead">
        田子山富士168の縁プロジェクトからの<br>
        お知らせを表示します。
      </p>

      <div class="statusBox" id="statusBox">
        お知らせを読み込んでいます。
      </div>

      <div class="newsList" id="newsList"></div>

      <div class="btnArea">
        <a class="linkBtn goldBtn" id="omikujiLink" href="omikuji.html">
          開運おみくじへ
        </a>

        <a class="linkBtn blueBtn" id="certificateLink" href="certificate.html">
          登頂記念証へ
        </a>

        <a class="linkBtn blackBtn" id="topLink" href="index.html">
          トップへ戻る
        </a>
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      お知らせ
    </footer>
  </main>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

    const HOME_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

    const SHARE_NEWS_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-news.html";

    const OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

    const CERTIFICATE_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

    const FALLBACK_OGP =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp.jpg?v=20260703-news";

    let currentUserId = "";

    document.addEventListener("DOMContentLoaded", function() {
      initNewsPage();
    });

    async function initNewsPage() {
      currentUserId = getUserId();

      if (currentUserId) {
        localStorage.setItem("tagoyamaUserId", currentUserId);
        localStorage.setItem("tagoyamaFujiUserId", currentUserId);
      }

      setLinks();
      await loadNews();
    }

    function getUserId() {
      const params = new URLSearchParams(window.location.search);

      return getString(
        params.get("userId") ||
        params.get("userid") ||
        params.get("uid") ||
        params.get("id") ||
        localStorage.getItem("tagoyamaUserId") ||
        localStorage.getItem("tagoyamaFujiUserId") ||
        ""
      );
    }

    function setLinks() {
      const topLink = document.getElementById("topLink");
      const omikujiLink = document.getElementById("omikujiLink");
      const certificateLink = document.getElementById("certificateLink");

      if (topLink) {
        topLink.href =
          currentUserId
            ? HOME_PAGE + "?userId=" + encodeURIComponent(currentUserId)
            : HOME_PAGE;
      }

      if (omikujiLink) {
        omikujiLink.href =
          currentUserId
            ? OMIKUJI_PAGE + "?userId=" + encodeURIComponent(currentUserId)
            : OMIKUJI_PAGE;
      }

      if (certificateLink) {
        certificateLink.href =
          currentUserId
            ? CERTIFICATE_PAGE + "?userId=" + encodeURIComponent(currentUserId)
            : CERTIFICATE_PAGE;
      }
    }

    async function loadNews() {
      const statusBox = document.getElementById("statusBox");
      const newsList = document.getElementById("newsList");

      if (statusBox) {
        statusBox.innerText = "お知らせを読み込んでいます。";
      }

      if (newsList) {
        newsList.innerHTML = "";
      }

      try {
        const data = await tryManyJson([
          GAS_URL + "?news=1&t=" + Date.now(),
          GAS_URL + "?mode=news&t=" + Date.now(),
          GAS_URL + "?action=news&t=" + Date.now(),
          GAS_URL + "?type=news&t=" + Date.now()
        ]);

        const list = extractList(data);

        if (!list || !list.length) {
          renderEmptyNews();
          return;
        }

        renderNewsList(list);

        if (statusBox) {
          statusBox.innerText = "お知らせを表示しました。";
        }
      } catch (error) {
        console.error(error);
        renderErrorNews();
      }
    }

    function renderNewsList(list) {
      const newsList = document.getElementById("newsList");

      if (!newsList) {
        return;
      }

      newsList.innerHTML = "";

      let count = 0;

      list.forEach(function(item, index) {
        const news = normalizeNewsItem(item, index);

        if (!news.title && !news.body && !news.imageUrl) {
          return;
        }

        count++;

        const card = document.createElement("article");
        card.className = "newsItem";

        if (news.imageUrl) {
          const img = document.createElement("img");
          img.className = "newsImage";
          img.src = news.imageUrl;
          img.alt = news.title || "田子山富士のお知らせ";
          img.loading = "lazy";
          img.onerror = function() {
            this.style.display = "none";
          };
          card.appendChild(img);
        }

        const title = document.createElement("h2");
        title.className = "newsTitle";
        title.innerText = news.title || "お知らせ";
        card.appendChild(title);

        if (news.date) {
          const date = document.createElement("p");
          date.className = "newsDate";
          date.innerText = news.date;
          card.appendChild(date);
        }

        const body = document.createElement("p");
        body.className = "newsBody";
        body.innerText =
          news.body ||
          "田子山富士168の縁プロジェクトからのお知らせです。";
        card.appendChild(body);

        const buttons = document.createElement("div");
        buttons.className = "miniBtnArea";

        const fb = document.createElement("button");
        fb.className = "miniBtn blueBtn";
        fb.type = "button";
        fb.innerText = "Facebook";
        fb.onclick = function() {
          postFacebook(news);
        };

        const line = document.createElement("button");
        line.className = "miniBtn greenBtn";
        line.type = "button";
        line.innerText = "LINE";
        line.onclick = function() {
          sendLine(news);
        };

        const x = document.createElement("button");
        x.className = "miniBtn blackBtn";
        x.type = "button";
        x.innerText = "X";
        x.onclick = function() {
          postX(news);
        };

        const copy = document.createElement("button");
        copy.className = "miniBtn goldBtn";
        copy.type = "button";
        copy.innerText = "コピー";
        copy.onclick = function() {
          copyShareLink(news);
        };

        buttons.appendChild(fb);
        buttons.appendChild(line);
        buttons.appendChild(x);
        buttons.appendChild(copy);
        card.appendChild(buttons);

        newsList.appendChild(card);
      });

      if (!count) {
        renderEmptyNews();
      }
    }

    function renderEmptyNews() {
      const statusBox = document.getElementById("statusBox");
      const newsList = document.getElementById("newsList");

      if (statusBox) {
        statusBox.innerText = "現在表示できるお知らせはありません。";
      }

      if (newsList) {
        newsList.innerHTML =
          '<article class="newsItem">' +
          '<h2 class="newsTitle">お知らせ</h2>' +
          '<p class="newsBody">現在表示できるお知らせはありません。</p>' +
          '</article>';
      }
    }

    function renderErrorNews() {
      const statusBox = document.getElementById("statusBox");
      const newsList = document.getElementById("newsList");

      if (statusBox) {
        statusBox.innerText = "お知らせを読み込めませんでした。";
      }

      if (newsList) {
        newsList.innerHTML =
          '<article class="newsItem">' +
          '<h2 class="newsTitle">読み込みエラー</h2>' +
          '<p class="newsBody">通信状況を確認して、もう一度お試しください。</p>' +
          '</article>';
      }
    }

    function normalizeNewsItem(item, index) {
      item = item || {};

      const title =
        getFirst(
          item.title,
          item.タイトル,
          item.name,
          item.件名,
          item.subject,
          item.heading,
          item.見出し,
          "お知らせ"
        );

      const date =
        formatDateText(
          getFirst(
            item.date,
            item.日付,
            item.datetime,
            item.日時,
            item.createdAt,
            item.created_at,
            item.time
          )
        );

      let body =
        getFirst(
          item.body,
          item.本文,
          item.message,
          item.メッセージ,
          item.text,
          item.内容,
          item.content,
          item.description,
          item.説明,
          item.detail,
          item.詳細
        );

      if (!body) {
        body = makeBodyFromItem(item);
      }

      const imageUrl =
        normalizeImageUrl(
          getFirst(
            item.imageUrl,
            item.imageURL,
            item.image,
            item.photo,
            item.picture,
            item.thumbnail,
            item.画像URL,
            item.画像Url,
            item.画像url,
            item.画像,
            item.写真,
            item.サムネイル
          )
        );

      return {
        index: index,
        title: title,
        date: date,
        body: body,
        imageUrl: imageUrl || ""
      };
    }

    function makeBodyFromItem(item) {
      const skip = {
        title: true,
        "タイトル": true,
        name: true,
        "件名": true,
        subject: true,
        heading: true,
        "見出し": true,
        date: true,
        "日付": true,
        datetime: true,
        "日時": true,
        createdAt: true,
        created_at: true,
        time: true,
        imageUrl: true,
        imageURL: true,
        image: true,
        photo: true,
        picture: true,
        thumbnail: true,
        "画像URL": true,
        "画像Url": true,
        "画像url": true,
        "画像": true,
        "写真": true,
        "サムネイル": true
      };

      const parts = [];

      Object.keys(item || {}).forEach(function(key) {
        if (skip[key]) {
          return;
        }

        const value = getString(item[key]);

        if (!value) {
          return;
        }

        if (value.indexOf("http://") === 0 || value.indexOf("https://") === 0) {
          return;
        }

        parts.push(value);
      });

      return parts.join("\n");
    }

    function buildShareUrl(news) {
      news = news || {};

      const params = new URLSearchParams();

      if (news.title) {
        params.set("title", news.title);
      }

      if (news.body) {
        params.set("body", news.body);
      }

      if (currentUserId) {
        params.set("u", currentUserId);
      }

      const driveId = getDriveId(news.imageUrl);

      if (driveId) {
        params.set("imgid", driveId);
      } else if (news.imageUrl) {
        params.set("img", news.imageUrl);
      }

      params.set("v", "20260703");

      return SHARE_NEWS_PAGE + "?" + params.toString();
    }

    function makeShareText(news) {
      news = news || {};

      let text = "田子山富士 お知らせ";

      if (news.title) {
        text += "\n" + news.title;
      }

      if (news.body) {
        text += "\n" + news.body;
      }

      return text;
    }

    function postFacebook(news) {
      const url = buildShareUrl(news);

      const shareUrl =
        "https://www.facebook.com/sharer/sharer.php?u=" +
        encodeURIComponent(url);

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    function sendLine(news) {
      const url = buildShareUrl(news);
      const text = makeShareText(news) + "\n" + url;

      const shareUrl =
        "https://social-plugins.line.me/lineit/share?url=" +
        encodeURIComponent(url) +
        "&text=" +
        encodeURIComponent(text);

      location.href = shareUrl;
    }

    function postX(news) {
      const url = buildShareUrl(news);

      const shareUrl =
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(makeShareText(news)) +
        "&url=" +
        encodeURIComponent(url);

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    async function copyShareLink(news) {
      const text = makeShareText(news) + "\n" + buildShareUrl(news);

      try {
        await navigator.clipboard.writeText(text);
        alert("お知らせのリンクをコピーしました。");
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = text;
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.focus();
        area.select();
        document.execCommand("copy");
        area.remove();
        alert("お知らせのリンクをコピーしました。");
      }
    }

    async function tryManyJson(urls) {
      let lastError = null;

      for (let i = 0; i < urls.length; i++) {
        try {
          const data = await getJson(urls[i]);

          if (data !== null && data !== undefined) {
            return data;
          }
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("通信に失敗しました。");
    }

    async function getJson(url) {
      try {
        const res = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const text = await res.text();
        return parseJsonText(text);
      } catch (fetchError) {
        return await getJsonp(url);
      }
    }

    function parseJsonText(text) {
      const value = String(text || "").trim();

      if (!value) {
        throw new Error("empty response");
      }

      try {
        return JSON.parse(value);
      } catch (error) {
        const start = value.indexOf("{");
        const end = value.lastIndexOf("}");

        if (start >= 0 && end > start) {
          return JSON.parse(value.substring(start, end + 1));
        }

        throw error;
      }
    }

    function getJsonp(url) {
      return new Promise(function(resolve, reject) {
        const callbackName =
          "tagoyamaNewsCallback_" +
          Date.now() +
          "_" +
          Math.floor(Math.random() * 1000000);

        const script = document.createElement("script");
        const sep = url.indexOf("?") >= 0 ? "&" : "?";

        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 12000);

        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("JSONP error"));
        };

        script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
        document.body.appendChild(script);

        function cleanup() {
          clearTimeout(timer);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      });
    }

    function extractList(data) {
      if (!data) {
        return [];
      }

      if (Array.isArray(data)) {
        return data;
      }

      if (Array.isArray(data.list)) {
        return data.list;
      }

      if (Array.isArray(data.rows)) {
        return data.rows;
      }

      if (Array.isArray(data.items)) {
        return data.items;
      }

      if (Array.isArray(data.data)) {
        return data.data;
      }

      if (data.data && Array.isArray(data.data.list)) {
        return data.data.list;
      }

      if (data.data && Array.isArray(data.data.rows)) {
        return data.data.rows;
      }

      if (data.data && Array.isArray(data.data.items)) {
        return data.data.items;
      }

      return [];
    }

    function normalizeImageUrl(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      if (
        value.indexOf("data:image") === 0 ||
        value.indexOf("blob:") === 0
      ) {
        return value;
      }

      const driveId = getDriveId(value);

      if (driveId) {
        return "https://lh3.googleusercontent.com/d/" +
          encodeURIComponent(driveId) +
          "=w2000";
      }

      return value;
    }

    function getDriveId(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      let match = value.match(/\/file\/d\/([^/]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/[?&]id=([^&]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

      if (match && match[1]) {
        return match[1];
      }

      if (/^[a-zA-Z0-9_-]{20,}$/.test(value)) {
        return value;
      }

      return "";
    }

    function formatDateText(value) {
      const text = getString(value);

      if (!text) {
        return "";
      }

      return text
        .replace(/-/g, "/")
        .replace(/\./g, "/")
        .replace(/\s.*$/, "");
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }

    function getFirst() {
      for (let i = 0; i < arguments.length; i++) {
        const value = getString(arguments[i]);

        if (value) {
          return value;
        }
      }

      return "";
    }

    window.postFacebook = postFacebook;
    window.sendLine = sendLine;
    window.postX = postX;
    window.copyShareLink = copyShareLink;
  </script>
