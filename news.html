<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>お知らせ｜田子山富士168の縁</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:#fff;
  font-family:
    "Hiragino Sans",
    "Yu Gothic",
    "Meiryo",
    sans-serif;
  padding:18px;
  line-height:1.7;
}

.wrap{
  max-width:900px;
  margin:0 auto;
}

.header{
  border:2px solid #d4af37;
  border-radius:28px;
  padding:24px 18px;
  text-align:center;
  background:
    radial-gradient(circle at top,#3b2a08 0%,#090909 42%,#000 100%);
  box-shadow:
    0 12px 32px rgba(0,0,0,.55),
    inset 0 0 24px rgba(212,175,55,.14);
  margin-bottom:18px;
}

.header .label{
  color:#d4af37;
  font-size:14px;
  letter-spacing:.16em;
  font-weight:800;
  margin-bottom:8px;
}

.header h1{
  font-size:30px;
  line-height:1.35;
  color:#fff7d6;
  text-shadow:0 2px 10px rgba(212,175,55,.25);
}

.header p{
  margin-top:10px;
  color:#e9ddad;
  font-size:15px;
}

.status{
  background:#111;
  border:1px solid rgba(212,175,55,.45);
  border-radius:20px;
  padding:16px;
  color:#e9ddad;
  margin-bottom:16px;
  text-align:center;
}

.newsList{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.newsCard{
  background:#0b0b0b;
  border:1px solid rgba(212,175,55,.55);
  border-radius:24px;
  padding:18px;
  box-shadow:0 10px 28px rgba(0,0,0,.38);
  overflow:hidden;
}

.newsDate{
  display:inline-block;
  color:#111;
  background:#d4af37;
  border-radius:999px;
  padding:4px 12px;
  font-size:13px;
  font-weight:900;
  margin-bottom:10px;
}

.newsTitle{
  color:#fff7d6;
  font-size:23px;
  line-height:1.4;
  font-weight:900;
  margin-bottom:10px;
}

.newsBody{
  color:#f4f4f4;
  font-size:16px;
  white-space:pre-wrap;
  word-break:break-word;
}

.newsImage{
  width:100%;
  display:block;
  border-radius:18px;
  margin-top:14px;
  border:1px solid rgba(212,175,55,.35);
  background:#111;
}

.empty{
  background:#111;
  border:1px solid rgba(212,175,55,.45);
  border-radius:20px;
  padding:18px;
  color:#e9ddad;
  text-align:center;
}

.footer{
  margin-top:22px;
  text-align:center;
  color:#b9aa72;
  font-size:13px;
}

@media(max-width:520px){
  body{
    padding:14px;
  }

  .header{
    padding:22px 14px;
    border-radius:24px;
  }

  .header h1{
    font-size:26px;
  }

  .newsCard{
    padding:16px;
    border-radius:22px;
  }

  .newsTitle{
    font-size:21px;
  }

  .newsBody{
    font-size:15px;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <header class="header">
    <div class="label">TAGOYAMA FUJI 168</div>
    <h1>田子山富士からのお知らせ</h1>
    <p>保存会・地域からのお知らせを掲載しています。</p>
  </header>

  <div id="status" class="status">
    お知らせを読み込んでいます。
  </div>

  <main id="newsList" class="newsList"></main>

  <div class="footer">
    田子山富士168の縁
  </div>

</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

const statusEl =
document.getElementById("status");

const newsListEl =
document.getElementById("newsList");

function safeText(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();

}

function displayDate(value){

  const text =
  safeText(value);

  if(!text){
    return "";
  }

  return text
  .replace("T00:00:00.000Z","")
  .replace("T00:00:00Z","")
  .replace(" 00:00:00","")
  .replace("00:00:00","")
  .trim();

}

function pickRows(data){

  if(Array.isArray(data)){
    return data;
  }

  if(data && Array.isArray(data.news)){
    return data.news;
  }

  if(data && Array.isArray(data.items)){
    return data.items;
  }

  if(data && Array.isArray(data.data)){
    return data.data;
  }

  if(data && Array.isArray(data.values)){
    return data.values;
  }

  if(data && Array.isArray(data.rows)){
    return data.rows;
  }

  return [];

}

function normalizeItem(row){

  if(Array.isArray(row)){

    return {
      date:displayDate(row[0]),
      title:safeText(row[1]),
      body:safeText(row[2]),
      image:safeText(row[3])
    };

  }

  if(row && typeof row === "object"){

    return {
      date:
        displayDate(
          row["日付"] ||
          row["A"] ||
          row.date ||
          row.Date ||
          row[0]
        ),

      title:
        safeText(
          row["タイトル"] ||
          row["B"] ||
          row.title ||
          row.Title ||
          row[1]
        ),

      body:
        safeText(
          row["本文"] ||
          row["C"] ||
          row.body ||
          row.Body ||
          row.text ||
          row.Text ||
          row[2]
        ),

      image:
        safeText(
          row["画像URL"] ||
          row["画像 URL"] ||
          row["D"] ||
          row.image ||
          row.imageUrl ||
          row.imageURL ||
          row.Image ||
          row[3]
        )
    };

  }

  return {
    date:"",
    title:"",
    body:"",
    image:""
  };

}

function addText(parent,tagName,className,text){

  if(!text){
    return;
  }

  const el =
  document.createElement(tagName);

  el.className =
  className;

  el.textContent =
  text;

  parent.appendChild(el);

}

function renderNews(rows){

  newsListEl.innerHTML =
  "";

  const items =
  rows
  .map(normalizeItem)
  .filter(function(item){
    return item.date || item.title || item.body || item.image;
  });

  if(items.length === 0){

    statusEl.style.display =
    "none";

    const empty =
    document.createElement("div");

    empty.className =
    "empty";

    empty.textContent =
    "現在、表示できるお知らせはありません。";

    newsListEl.appendChild(empty);

    return;

  }

  statusEl.style.display =
  "none";

  items.forEach(function(item){

    const card =
    document.createElement("article");

    card.className =
    "newsCard";

    addText(
      card,
      "div",
      "newsDate",
      item.date
    );

    addText(
      card,
      "h2",
      "newsTitle",
      item.title
    );

    addText(
      card,
      "div",
      "newsBody",
      item.body
    );

    if(item.image){

      const img =
      document.createElement("img");

      img.className =
      "newsImage";

      img.src =
      item.image;

      img.alt =
      item.title || "お知らせ画像";

      img.loading =
      "lazy";

      card.appendChild(img);

    }

    newsListEl.appendChild(card);

  });

}

async function loadNews(){

  try{

    const response =
    await fetch(
      GAS_URL + "?mode=news",
      {
        method:"GET",
        cache:"no-store"
      }
    );

    if(!response.ok){
      throw new Error("お知らせ取得エラー");
    }

    const data =
    await response.json();

    const rows =
    pickRows(data);

    renderNews(rows);

  }catch(error){

    console.error(error);

    statusEl.textContent =
    "お知らせを読み込めませんでした。時間をおいて再度ご確認ください。";

  }

}

loadNews();
</script>

</body>
</html>
