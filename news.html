<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>お知らせ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:
"Hiragino Sans",
"Yu Gothic",
"Meiryo",
sans-serif;
color:#fff;
}

.hero img{
width:100%;
display:block;
}

.wrap{
max-width:1000px;
margin:auto;
padding:20px;
}

.titleBox{
text-align:center;
margin-bottom:30px;
}

.title{
font-size:42px;
font-weight:900;
color:#d4af37;
}

.sub{
margin-top:10px;
font-size:18px;
color:#ccc;
}

.newsCard{
background:
linear-gradient(
180deg,
#1c1c1c,
#0f0f0f
);
border:2px solid #d4af37;
border-radius:28px;
padding:20px;
margin-bottom:30px;
box-shadow:
0 12px 32px rgba(0,0,0,.45);
}

.newsDate{
font-size:16px;
color:#d4af37;
font-weight:900;
margin-bottom:10px;
}

.newsTitle{
font-size:30px;
font-weight:900;
margin-bottom:15px;
}

.newsText{
font-size:18px;
line-height:1.8;
color:#eee;
margin-top:15px;
}

function copyLink(id){

const url =
location.origin +
location.pathname.replace(
"news.html",
"share-news.html"
) +
"?id=" + id;

navigator.clipboard.writeText(
url
);

alert(
"リンクをコピーしました"
);

}

fetch(
GAS_URL +
"?mode=news"
)
.then(
r=>r.json()
)
.then(
rows=>{

document.getElementById(
"loading"
).style.display =
"none";

const newsList =
document.getElementById(
"newsList"
);

newsList.innerHTML = "";

rows
.slice(0,5)
.forEach((row,index)=>{

let images = "";

[
row.image1,
row.image2,
row.image3,
row.image4,
row.image5
]
.forEach(img=>{

if(img){

images +=
`
<img src="${img}">
`;

}

});

newsList.innerHTML +=
`
<div class="newsCard">

<div class="newsDate">
${row.date || ""}
</div>

<div class="newsTitle">
${row.title || ""}
</div>

<div class="slider">
${images}
</div>

<div class="newsText">
${row.text || ""}
</div>

${youtubeEmbed(
row.youtube || ""
)}

${
row.link
?
`
<a
href="${row.link}"
target="_blank"
class="linkBtn">

詳しくはこちら

</a>
`
:
""
}

<div class="shareRow">

<button
class="shareBtn fb"
onclick="shareFacebook(${index})">

Facebook

</button>

<button
class="shareBtn line"
onclick="shareLine(${index})">

LINE

</button>

<button
class="shareBtn x"
onclick="shareX(${index})">

X

</button>

<button
class="shareBtn copy"
onclick="copyLink(${index})">

コピー

</button>

</div>

</div>
`;

});

})
.catch(err=>{

document.getElementById(
"loading"
).innerHTML =
"お知らせがありません";

console.log(err);

});

</script>

</body>
</html>
