<style>

  margin:0 0 8px;

  font-size:clamp(22px,6vw,38px);
  font-weight:900;
  line-height:1.35;
  text-shadow:
    0 3px 4px rgba(0,0,0,.90),
    0 0 14px rgba(255,210,80,.22);

  margin:0;
  color:#fff1bd;

  font-weight:900;

  white-space:pre-wrap;
}

.shareBtnArea{
  display:grid;
  gap:10px;
  margin-top:16px;
}

.smallBtn{
  width:100%;
  min-height:58px;
  border:none;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:clamp(17px,4.8vw,28px);
  font-weight:900;
  color:#fff;
  cursor:pointer;
  text-align:center;
  font-family:inherit;
  box-shadow:
    0 5px 0 rgba(0,0,0,.28),
    0 9px 18px rgba(0,0,0,.30);
}

.smallBtn:active{
  transform:translateY(2px);
  box-shadow:
    0 3px 0 rgba(0,0,0,.28),
    0 6px 12px rgba(0,0,0,.30);

  min-height:70px;

  display:flex;

  font-weight:900;
  letter-spacing:.02em;
  color:#fff;
  cursor:pointer;
  text-align:center;
  box-shadow:
    0 7px 0 rgba(0,0,0,.32),
    0 13px 22px rgba(0,0,0,.34);
  -webkit-tap-highlight-color:transparent;
  font-family:inherit;
}

.linkBtn:active{
  transform:translateY(3px);
  box-shadow:
    0 4px 0 rgba(0,0,0,.32),
    0 8px 14px rgba(0,0,0,.32);
}

.goldBtn{
  color:#271400;
  background:linear-gradient(180deg,#fff1a4 0%,#ffd84d 48%,#c89217 100%);
}

}

  background:linear-gradient(180deg,#38e988 0%,#09b957 100%);
}

  background:linear-gradient(180deg,#323232 0%,#050505 100%);
}

  margin:28px 0 0;
  text-align:center;
  color:#c9b56b;
  font-weight:800;
  line-height:1.6;
}

<body>
<main class="page">

<section class="card">
  <h1 class="pageTitle">お知らせ</h1>

  <p class="lead">
    田子山富士168の縁プロジェクトからの<br>
    お知らせを表示します。
  </p>

  <div class="statusBox" id="statusBox">
    お知らせを表示しました。
  </div>

  <div class="listBox" id="newsList"></div>

  <div class="btnArea">
    <a class="linkBtn goldBtn" id="omikujiLink" href="omikuji.html">
      開運おみくじへ
    </a>

    <a class="linkBtn blueBtn" id="certificateLink" href="certificate.html">
      登頂記念証へ
    </a>

    <a class="linkBtn greenBtn" id="goenLink" href="goen.html">
      ご縁帳へ
    </a>

    <a class="linkBtn blackBtn" id="topLink" href="index.html">
      トップへ戻る
    </a>
  </div>
</section>

<footer class="footer">
  田子山富士 168の縁プロジェクト<br>
  お知らせ
</footer>

</main>

<script>
const SHARE_NEWS_URL =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-news.html?v=20260703-toponly";

const FALLBACK_NEWS_IMAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp.jpg?v=20260703-news-static";

const NEWS_LIST = [
  {
    date: "2026/07/04",
    title: "🌸田子山富士 保存会からのお願い🌸",
    text: "田子山富士168の縁プロジェクトからのお知らせです。",
    imageUrl: "https://drive.google.com/thumbnail?id=1yCdMhB7TdBn6gOyg5f5Qo5hLwGH7hTt1&sz=w1200"
  },
  {
    date: "2026/07/04",
    title: "田子山富士168の縁とは？",
    text: "田子山富士168の縁プロジェクトからのお知らせです。",
    imageUrl: "https://drive.google.com/thumbnail?id=1XSU0K-8owEYFqpjz2zRaYTtphOoyxD4i&sz=w2000"
  }
];

let currentUserId = "";

document.addEventListener("DOMContentLoaded", function(){
  initPage();
});

function initPage(){
  currentUserId = getUserIdFromUrl();

  if(currentUserId){
    localStorage.setItem("tagoyamaUserId", currentUserId);
    localStorage.setItem("tagoyamaFujiUserId", currentUserId);
  }else{
    currentUserId =
      localStorage.getItem("tagoyamaUserId") ||
      localStorage.getItem("tagoyamaFujiUserId") ||
      "";
  }

  updateLinks();
  renderNews(NEWS_LIST);
}

function getUserIdFromUrl(){
  const params = new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );
}

function updateLinks(){
  const query =
    currentUserId
      ? "?userId=" + encodeURIComponent(currentUserId)
      : "";

  setHref("topLink", "index.html" + query);
  setHref("omikujiLink", "omikuji.html" + query);
  setHref("certificateLink", "certificate.html" + query);
  setHref("goenLink", "goen.html" + query);
}

function setHref(id, href){
  const el = document.getElementById(id);

  if(el){
    el.href = href;
  }
}

function renderNews(list){
  const box = document.getElementById("newsList");

  if(!box){
    return;
  }

  box.innerHTML = "";

  list.forEach(function(item){
    const div = document.createElement("div");
    div.className = "newsItem";

    const img = document.createElement("img");
    img.className = "newsImage";
    img.alt = item.title || "お知らせ";
    img.src = item.imageUrl || FALLBACK_NEWS_IMAGE;
    img.onerror = function(){
      this.src = FALLBACK_NEWS_IMAGE;
    };
    div.appendChild(img);

    const title = document.createElement("p");
    title.className = "newsTitle";
    title.innerText = item.title || "お知らせ";
    div.appendChild(title);

    const date = document.createElement("p");
    date.className = "newsDate";
    date.innerText = item.date || "";
    div.appendChild(date);

    const text = document.createElement("p");
    text.className = "newsText";
    text.innerText = item.text || "";
    div.appendChild(text);

    const share = document.createElement("div");
    share.className = "shareBtnArea";

    const fb = document.createElement("button");
    fb.className = "smallBtn blueBtn";
    fb.type = "button";
    fb.innerText = "Facebookに投稿";
    fb.onclick = function(){
      postFacebookNews(item);
    };

    const line = document.createElement("button");
    line.className = "smallBtn greenBtn";
    line.type = "button";
    line.innerText = "LINEで送る";
    line.onclick = function(){
      sendLineNews(item);
    };

    const x = document.createElement("button");
    x.className = "smallBtn blackBtn";
    x.type = "button";
    x.innerText = "Xで投稿";
    x.onclick = function(){
      postXNews(item);
    };

    const copy = document.createElement("button");
    copy.className = "smallBtn blueBtn";
    copy.type = "button";
    copy.innerText = "リンクをコピー";
    copy.onclick = function(){
      copyNews(item);
    };

    share.appendChild(fb);
    share.appendChild(line);
    share.appendChild(x);
    share.appendChild(copy);

    div.appendChild(share);
    box.appendChild(div);
  });
}

function makeNewsShareText(item){
  item = item || {};

  return "田子山富士168の縁プロジェクト お知らせ\n" +
    (item.title || "お知らせ") + "\n" +
    (item.text || "田子山富士168の縁プロジェクトからのお知らせです。") + "\n\n" +
    "#田子山富士 #敷島神社 #志木市";
}

function postFacebookNews(item){
  const url =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(SHARE_NEWS_URL);

  window.open(url, "_blank", "noopener,noreferrer");
}

function sendLineNews(item){
  const url =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(SHARE_NEWS_URL) +
    "&text=" +
    encodeURIComponent(makeNewsShareText(item));

  location.href = url;
}

function postXNews(item){
  const url =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(makeNewsShareText(item)) +
    "&url=" +
    encodeURIComponent(SHARE_NEWS_URL);

  window.open(url, "_blank", "noopener,noreferrer");
}

async function copyNews(item){
  const text =
    makeNewsShareText(item) +
    "\n" +
    SHARE_NEWS_URL;

  try{
    await navigator.clipboard.writeText(text);
    alert("お知らせの内容をコピーしました。");
  }catch(error){
    const area = document.createElement("textarea");
    area.value = text;
    area.style.position = "fixed";
    area.style.left = "-9999px";
    document.body.appendChild(area);
    area.focus();
    area.select();
    document.execCommand("copy");
    area.remove();
    alert("お知らせの内容をコピーしました。");
  }
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
</script>
