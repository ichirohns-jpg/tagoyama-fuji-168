<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>お知らせ</title>

<link
rel="manifest"
href="manifest.json">

<meta
name="theme-color"
content="#111111">

<link
rel="icon"
href="logo.png">

<link
rel="apple-touch-icon"
href="logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:
"Hiragino Sans",
"Yu Gothic",
"Meiryo",
sans-serif;
color:#fff;
}

.hero img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
display:block;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.titleBox{
text-align:center;
margin-bottom:20px;
}

.title{
font-size:42px;
font-weight:900;
color:#d4af37;
}

.sub{
margin-top:8px;
font-size:20px;
color:#ccc;
}

.cardLink{
display:block;
text-decoration:none;
color:inherit;
}

.newsCard{
background:
linear-gradient(
180deg,
#1c1c1c,
#0f0f0f
);
border:2px solid #d4af37;
border-radius:24px;
padding:20px;
margin-bottom:24px;
box-shadow:
0 12px 32px rgba(0,0,0,.45);
}

.newBadge{
display:inline-block;
background:#ff3b30;
color:#fff;
font-size:18px;
font-weight:900;
padding:6px 14px;
border-radius:999px;
margin-bottom:12px;
}

.newsTitle{
background:#d4af37;
color:#000;
padding:14px;
border-radius:14px;
font-size:30px;
font-weight:900;
line-height:1.4;
margin-bottom:14px;
}

.newsDate{
font-size:20px;
font-weight:900;
color:#d4af37;
margin-top:14px;
margin-bottom:14px;
}

.newsText{
font-size:22px;
line-height:1.9;
color:#fff;
margin-top:14px;
margin-bottom:14px;
white-space:pre-wrap;
}

.slider{
display:block;
width:100%;
margin-bottom:16px;
}

.slider img{
width:100%;
max-height:420px;
object-fit:contain;
background:#111;
border-radius:20px;
border:2px solid #333;
display:block;
}

.shareRow{
display:grid;
grid-template-columns:
repeat(4,1fr);
gap:8px;
margin-top:16px;
}

.shareBtn{
height:60px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:900;
cursor:pointer;
color:#fff;
}

.fb{
background:#1877f2;
}

.line{
background:#06c755;
}

.x{
background:#000;
color:#fff;
}

.copy{
background:#607d8b;
}

.fbGuide{
background:#1c1c1c;
border:1px solid #333;
border-radius:12px;
padding:10px 14px;
margin-top:12px;
font-size:15px;
line-height:1.6;
text-align:center;
color:#d0d0d0;
}

.homeBtn{
display:block;
width:100%;
padding:20px;
margin-top:20px;
background:#263238;
color:#fff;
text-decoration:none;
text-align:center;
font-size:22px;
font-weight:900;
border-radius:16px;
}

.loading{
text-align:center;
font-size:28px;
font-weight:900;
padding:60px 0;
color:#d4af37;
}

</style>

</head>

<body>

<div class="hero">

<img
src="top.jpg"
alt="田子山富士">

</div>

<div class="wrap">

<div class="titleBox">

<div class="title">

📢 お知らせ

</div>

<div class="sub">

田子山富士からのお知らせ

</div>

</div>

<div
id="loading"
class="loading">

読込中...

</div>

<div
id="newsList">

</div>

<a
href="archive.html"
class="homeBtn">

📚 過去のお知らせを見る

</a>

<a
href="index.html"
class="homeBtn">

🏠 田子山富士へ戻る

</a>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyJ0TePu884eFy8nfBYRjGrL6GCh8u0gfCE-L2MyytgVqa6JFj0uWQmhnucMLFnbdkOmA/exec";

function shareFacebook(id){

window.open(

"https://www.facebook.com/sharer/sharer.php?u="+

encodeURIComponent(

location.origin+

"/tagoyama-fuji-168/share-news.html?id="+

id

)

);

}

function shareLine(id){

window.open(

"https://social-plugins.line.me/lineit/share?url="+

encodeURIComponent(

location.origin+

"/tagoyama-fuji-168/share-news.html?id="+

id

)

);

}

function shareX(id){

window.open(

"https://twitter.com/intent/tweet?url="+

encodeURIComponent(

location.origin+

"/tagoyama-fuji-168/share-news.html?id="+

id

)

);

}

function copyLink(id){

navigator.clipboard.writeText(

location.origin+

"/tagoyama-fuji-168/share-news.html?id="+

id

);

alert(

"リンクをコピーしました"

);

}

fetch(

GAS_URL+

"?mode=news"

)

.then(

r=>r.json()

)

.then(

rows=>{

document.getElementById(

"loading"

).style.display="none";

const newsList=

document.getElementById(

"newsList"

);

newsList.innerHTML="";

rows.forEach((row,index)=>{

const image =
row.image1 || "";

newsList.innerHTML +=
`

<div class="newsCard">

${
index===0
?
'<div class="newBadge">NEW</div>'
:
''
}

<div class="newsTitle">

${row.title||""}

</div>

${
image
?
`
<div class="slider">

<img src="${image}">

</div>
`
:
""
}

<div class="newsDate">

${String(row.date||"")

.replace("T15:00:00.000Z","")

.replace(/-/g,"/")}

</div>

<div class="newsText">

${row.text||""}

</div>

<div class="shareRow">

<button
class="shareBtn fb"
onclick="shareFacebook(${index})">

Facebook

</button>

<button
class="shareBtn line"
onclick="shareLine(${index})">

LINE

</button>

<button
class="shareBtn x"
onclick="shareX(${index})">

X

</button>

<button
class="shareBtn copy"
onclick="copyLink(${index})">

コピー

</button>

</div>

<div class="fbGuide">

📘 Facebookは
「コピー」を押して
投稿欄へ貼り付けると
画像付きで共有できます

</div>

</div>

`;

});

})

.catch(err=>{

document.getElementById(
"loading"
).innerHTML=

"お知らせがありません";

console.log(err);

});

</script>

</body>
</html>
