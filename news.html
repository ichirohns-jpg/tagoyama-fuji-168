<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>田子山富士 お知らせ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

html,
body{
 width:100%;
 min-height:100%;
 background:#0b0b0b;
 color:#fff;
 font-family:
 -apple-system,
 BlinkMacSystemFont,
 "Hiragino Sans",
 "Yu Gothic",
 "Meiryo",
 sans-serif;
}

body{
 background:
 radial-gradient(circle at 50% 0%,rgba(255,224,120,.18),rgba(0,0,0,0) 36%),
 linear-gradient(180deg,#1d1204 0%,#070707 48%,#000 100%);
}

.hero{
 width:100%;
 background:#000;
}

.hero img{
 width:100%;
 aspect-ratio:16/9;
 object-fit:cover;
 display:block;
 background:#000;
}

.wrap{
 width:100%;
 max-width:900px;
 margin:0 auto;
 padding:16px 14px 44px;
}

.titleBox{
 text-align:center;
 margin:8px 0 22px;
}

.title{
 font-size:clamp(38px,10vw,64px);
 font-weight:900;
 color:#d4af37;
 letter-spacing:.05em;
 text-shadow:
 0 4px 4px rgba(0,0,0,.9),
 0 0 18px rgba(255,210,80,.22);
}

.sub{
 margin-top:8px;
 font-size:clamp(18px,5vw,30px);
 font-weight:900;
 color:#fff3c4;
 line-height:1.45;
}

.loading{
 text-align:center;
 font-size:clamp(24px,7vw,38px);
 font-weight:900;
 padding:54px 0;
 color:#d4af37;
 line-height:1.6;
}

.newsCard{
 background:
 linear-gradient(180deg,#1c1c1c,#0f0f0f);
 border:3px solid #d4af37;
 border-radius:26px;
 padding:20px;
 margin-bottom:24px;
 box-shadow:
 0 12px 32px rgba(0,0,0,.45),
 0 0 0 1px rgba(255,230,150,.08) inset;
}

.newBadge{
 display:inline-block;
 background:#ff3b30;
 color:#fff;
 font-size:18px;
 font-weight:900;
 padding:6px 14px;
 border-radius:999px;
 margin-bottom:12px;
}

.newsTitle{
 background:#d4af37;
 color:#000;
 padding:14px;
 border-radius:16px;
 font-size:clamp(25px,7vw,38px);
 font-weight:900;
 line-height:1.45;
 margin-bottom:14px;
}

.newsDate{
 font-size:clamp(18px,5vw,28px);
 font-weight:900;
 color:#d4af37;
 margin:14px 0;
 line-height:1.45;
}

.newsImageBox{
 width:100%;
 margin:14px 0 18px;
 border-radius:22px;
 overflow:hidden;
 border:2px solid rgba(212,175,55,.72);
 background:#000;
 box-shadow:
 0 0 0 1px rgba(255,240,170,.10) inset,
 0 10px 22px rgba(0,0,0,.38);
}

.newsImageBox img{
 display:block;
 width:100%;
 height:auto;
 max-height:620px;
 object-fit:contain;
 background:#000;
}

.newsText{
 font-size:clamp(20px,5.6vw,32px);
 line-height:1.9;
 color:#fff;
 margin-top:14px;
 white-space:pre-wrap;
 font-weight:700;
}

.shareRow{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:8px;
 margin-top:18px;
}

.shareBtn{
 min-height:58px;
 border:none;
 border-radius:14px;
 font-size:clamp(15px,4.2vw,20px);
 font-weight:900;
 cursor:pointer;
 color:#fff;
}

.fb{
 background:#1877f2;
}

.line{
 background:#06c755;
}

.x{
 background:#000;
}

.copy{
 background:#607d8b;
}

.fbGuide{
 background:#1c1c1c;
 border:1px solid #333;
 border-radius:12px;
 padding:10px 14px;
 margin-top:12px;
 font-size:15px;
 line-height:1.6;
 text-align:center;
 color:#d0d0d0;
}

.btnBox{
 display:grid;
 gap:14px;
 margin-top:22px;
}

.homeBtn{
 display:flex;
 width:100%;
 min-height:70px;
 align-items:center;
 justify-content:center;
 padding:16px;
 background:linear-gradient(180deg,#263238,#111);
 color:#fff;
 text-decoration:none;
 text-align:center;
 font-size:clamp(20px,5.6vw,32px);
 font-weight:900;
 border-radius:20px;
 box-shadow:
 0 7px 0 rgba(0,0,0,.32),
 0 13px 22px rgba(0,0,0,.34);
}

@media(max-width:600px){
 .wrap{
  padding:14px 12px 40px;
 }

 .newsCard{
  padding:18px;
  border-radius:24px;
 }

 .newsImageBox{
  border-radius:20px;
 }

 .shareRow{
  grid-template-columns:repeat(2,1fr);
 }

 .shareBtn{
  min-height:62px;
 }
}
</style>
</head>

<body>

<div class="hero">
 <img src="top.jpg" alt="田子山富士">
</div>

<div class="wrap">

 <div class="titleBox">
  <div class="title">
   お知らせ
  </div>

  <div class="sub">
   田子山富士からのお知らせ
  </div>
 </div>

 <div id="loading" class="loading">
  読込中...
 </div>

 <div id="newsList"></div>

 <div class="btnBox">
  <a href="archive.html" class="homeBtn">
   過去のお知らせを見る
  </a>

  <a href="index.html" class="homeBtn">
   田子山富士へ戻る
  </a>
 </div>

</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzQHiV6CPqv-szRz9EjwWdTsKGXmC8oPtLM6fQsyU-lF8AWXEsN5PG_14b6awu2Esk1/exec";

const SITE_BASE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

let currentNewsItems =
[];

window.addEventListener("load",loadNews);

async function loadNews(){
 const loading =
 document.getElementById("loading");

 try{
  const data =
  await getJson(
   GAS_URL +
   "?mode=news&t=" +
   Date.now()
  );

  const rows =
  getRows(data);

  renderNews(rows);

 }catch(error){
  loading.innerText =
  "お知らせを読み込めませんでした。";
 }
}

function getRows(data){
 if(!data){
  return [];
 }

 if(Array.isArray(data)){
  return data;
 }

 if(Array.isArray(data.news)){
  return data.news;
 }

 if(Array.isArray(data.rows)){
  return data.rows;
 }

 if(Array.isArray(data.items)){
  return data.items;
 }

 if(Array.isArray(data.list)){
  return data.list;
 }

 if(Array.isArray(data.data)){
  return data.data;
 }

 return [];
}

function renderNews(rows){
 const loading =
 document.getElementById("loading");

 const newsList =
 document.getElementById("newsList");

 loading.style.display =
 "none";

 newsList.innerHTML =
 "";

 currentNewsItems =
 [];

 if(!rows || rows.length === 0){
  newsList.innerHTML =
  '<div class="loading">お知らせがありません</div>';
  return;
 }

 let html =
 "";

 rows.forEach(function(row,index){
  const item =
  normalizeNewsRow(row,index);

  if(!item.date && !item.title && !item.body && !item.imageUrl){
   return;
  }

  currentNewsItems.push(item);

  const id =
  currentNewsItems.length - 1;

  html +=
  '<div class="newsCard">';

  if(id === 0){
   html +=
   '<div class="newBadge">NEW</div>';
  }

  html +=
  '<div class="newsTitle">' +
  escapeHtml(item.title || "お知らせ") +
  '</div>';

  if(item.imageUrl){
   html +=
   '<div class="newsImageBox">' +
   '<img src="' +
   escapeHtml(item.imageUrl) +
   '" alt="' +
   escapeHtml(item.title || "お知らせ画像") +
   '" loading="lazy" onerror="hideBrokenImage(this)">' +
   '</div>';
  }

  if(item.date){
   html +=
   '<div class="newsDate">' +
   escapeHtml(item.date) +
   '</div>';
  }

  if(item.body){
   html +=
   '<div class="newsText">' +
   escapeHtml(item.body) +
   '</div>';
  }

  html +=
  '<div class="shareRow">' +
  '<button class="shareBtn fb" onclick="shareFacebook(' +
  id +
  ')">Facebook</button>' +
  '<button class="shareBtn line" onclick="shareLine(' +
  id +
  ')">LINE</button>' +
  '<button class="shareBtn x" onclick="shareX(' +
  id +
  ')">X</button>' +
  '<button class="shareBtn copy" onclick="copyLink(' +
  id +
  ')">コピー</button>' +
  '</div>';

  html +=
  '<div class="fbGuide">' +
  'Facebookは「コピー」を押して投稿欄へ貼り付けると画像付きで共有できます' +
  '</div>';

  html +=
  '</div>';
 });

 newsList.innerHTML =
 html ||
 '<div class="loading">お知らせがありません</div>';
}

function normalizeNewsRow(row,index){
 if(Array.isArray(row)){
  return normalizeArrayNewsRow(row,index);
 }

 return normalizeObjectNewsRow(row,index);
}

function normalizeArrayNewsRow(row,index){
 return {
  id:String(index),
  date:formatDate(getCellText(row[0])),
  title:getCellText(row[1]),
  body:getCellText(row[2]),
  imageUrl:normalizeImageUrl(getCellText(row[3]))
 };
}

function normalizeObjectNewsRow(row,index){
 row =
 row || {};

 return {
  id:getString(row.id || row.ID || index),
  date:formatDate(
   getCellText(
    row.date ||
    row.日付 ||
    row.A ||
    row.a ||
    row.col0 ||
    row[0]
   )
  ),
  title:getCellText(
   row.title ||
   row.タイトル ||
   row.B ||
   row.b ||
   row.col1 ||
   row[1]
  ),
  body:getCellText(
   row.body ||
   row.text ||
   row.message ||
   row.本文 ||
   row.内容 ||
   row.C ||
   row.c ||
   row.col2 ||
   row[2]
  ),
  imageUrl:normalizeImageUrl(
   getCellText(
    row.imageUrl ||
    row.imageURL ||
    row.image ||
    row.img ||
    row.画像URL ||
    row.画像 ||
    row.D ||
    row.d ||
    row.col3 ||
    row[3]
   )
  )
 };
}

function hideBrokenImage(img){
 if(img && img.parentNode){
  img.parentNode.style.display =
  "none";
 }
}

async function getJson(url){
 try{
  return await fetchJson(url,12000);
 }catch(error){
  return await jsonp(url,15000);
 }
}

async function fetchJson(url,timeoutMs){
 const controller =
 new AbortController();

 const timer =
 setTimeout(function(){
  controller.abort();
 },timeoutMs || 12000);

 try{
  const res =
  await fetch(
   url,
   {
    method:"GET",
    cache:"no-store",
    signal:controller.signal
   }
  );

  const text =
  await res.text();

  if(!res.ok){
   throw new Error("通信エラー");
  }

  try{
   return JSON.parse(text);
  }catch(error){}

  const match =
  text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

  if(match && match[1]){
   return JSON.parse(match[1]);
  }

  throw new Error("JSONではありません");

 }finally{
  clearTimeout(timer);
 }
}

function jsonp(url,timeoutMs){
 return new Promise(function(resolve,reject){
  const callbackName =
  "__tagoyamaNewsCallback_" +
  Date.now() +
  "_" +
  Math.floor(Math.random() * 100000);

  const sep =
  url.indexOf("?") >= 0
  ? "&"
  : "?";

  const script =
  document.createElement("script");

  let done =
  false;

  const timer =
  setTimeout(function(){
   cleanup();
   reject(new Error("JSONP timeout"));
  },timeoutMs || 15000);

  function cleanup(){
   if(done){
    return;
   }

   done =
   true;

   clearTimeout(timer);

   try{
    delete window[callbackName];
   }catch(error){
    window[callbackName] =
    undefined;
   }

   if(script.parentNode){
    script.parentNode.removeChild(script);
   }
  }

  window[callbackName] =
  function(data){
   cleanup();
   resolve(data);
  };

  script.onerror =
  function(){
   cleanup();
   reject(new Error("JSONP error"));
  };

  script.src =
  url +
  sep +
  "callback=" +
  encodeURIComponent(callbackName);

  document.body.appendChild(script);
 });
}

function normalizeImageUrl(value){
 let url =
 getString(value);

 if(!url){
  return "";
 }

 url =
 url
 .replace(/\\u003d/g,"=")
 .replace(/\\u0026/g,"&")
 .replace(/\\\//g,"/")
 .replace(/&amp;/g,"&")
 .replace(/[),.;]+$/g,"")
 .trim();

 if(!url){
  return "";
 }

 if(url.indexOf("data:image") === 0){
  return url;
 }

 if(url.indexOf("https://drive.google.com/thumbnail") === 0){
  return url;
 }

 if(url.indexOf("http://drive.google.com/thumbnail") === 0){
  return url.replace("http://","https://");
 }

 let match =
 url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);

 if(match && match[1]){
  return "https://drive.google.com/thumbnail?id=" +
  encodeURIComponent(match[1]) +
  "&sz=w1600";
 }

 match =
 url.match(/[?&]id=([^&]+)/);

 if(url.indexOf("drive.google.com") >= 0 && match && match[1]){
  return "https://drive.google.com/thumbnail?id=" +
  encodeURIComponent(match[1]) +
  "&sz=w1600";
 }

 if(url.indexOf("http://") === 0 || url.indexOf("https://") === 0){
  return url;
 }

 try{
  return new URL(
   url,
   SITE_BASE
  ).href;
 }catch(error){
  return "";
 }
}

function formatDate(value){
 const text =
 getString(value);

 if(!text){
  return "";
 }

 if(/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(text)){
  const parts =
  text.split("/");

  return parts[0] +
  "/" +
  parts[1].padStart(2,"0") +
  "/" +
  parts[2].padStart(2,"0");
 }

 if(/^\d{4}-\d{1,2}-\d{1,2}/.test(text)){
  const parts =
  text.substring(0,10).split("-");

  return parts[0] +
  "/" +
  parts[1].padStart(2,"0") +
  "/" +
  parts[2].padStart(2,"0");
 }

 const date =
 new Date(text);

 if(!Number.isNaN(date.getTime())){
  const y =
  date.getFullYear();

  const m =
  String(date.getMonth() + 1).padStart(2,"0");

  const d =
  String(date.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + d;
 }

 return text;
}

function getCellText(value){
 if(value === null || value === undefined){
  return "";
 }

 if(typeof value === "object"){
  return getString(
   value.v ||
   value.f ||
   value.value ||
   value.text ||
   ""
  );
 }

 return getString(value);
}

function shareUrl(id){
 return SITE_BASE +
 "share-news.html?id=" +
 encodeURIComponent(id);
}

function shareFacebook(id){
 window.open(
  "https://www.facebook.com/sharer/sharer.php?u=" +
  encodeURIComponent(shareUrl(id)),
  "_blank",
  "noopener,noreferrer"
 );
}

function shareLine(id){
 window.open(
  "https://social-plugins.line.me/lineit/share?url=" +
  encodeURIComponent(shareUrl(id)),
  "_blank",
  "noopener,noreferrer"
 );
}

function shareX(id){
 window.open(
  "https://twitter.com/intent/tweet?url=" +
  encodeURIComponent(shareUrl(id)),
  "_blank",
  "noopener,noreferrer"
 );
}

async function copyLink(id){
 const url =
 shareUrl(id);

 try{
  await navigator.clipboard.writeText(url);
  alert("リンクをコピーしました");
 }catch(error){
  alert(url);
 }
}

function escapeHtml(value){
 return getString(value)
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;")
 .replace(/'/g,"&#39;");
}

function getString(value){
 if(value === null || value === undefined){
  return "";
 }

 return String(value).trim();
}
</script>

</body>
</html>
