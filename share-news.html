<meta

content="website">

<meta

content="田子山富士168の縁">

<meta
property="og:description"
content="霊峰に登り、縁を結ぶ。田子山富士168の縁プロジェクト">

<meta

content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp.jpg">

<meta

content="summary_large_image">

<meta

content="田子山富士168の縁">

<meta
name="twitter:description"
content="霊峰に登り、縁を結ぶ。田子山富士168の縁プロジェクト">

<meta
name="twitter:image"
content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp.jpg">

<link
rel="icon"
href="logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:
"Hiragino Sans",
"Yu Gothic",
"Meiryo",
sans-serif;
color:#fff;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:
linear-gradient(
180deg,
#1c1c1c,
#0f0f0f
);
border:2px solid #d4af37;
border-radius:24px;
padding:20px;
}

.hero{
width:100%;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.hero img{
width:100%;
display:block;
}

.title{
font-size:42px;
font-weight:900;
text-align:center;
color:#d4af37;
margin-bottom:10px;
}

.sub{
font-size:22px;
text-align:center;
color:#fff;
margin-bottom:20px;
}

.desc{
font-size:22px;
line-height:1.8;
text-align:center;
color:#ddd;
margin-bottom:20px;
}

.loading{
font-size:26px;
font-weight:900;
text-align:center;
padding:50px 0;
color:#d4af37;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="hero">

<img
src="ogp.jpg"
alt="田子山富士168の縁">

</div>

<div class="title">

田子山富士168の縁

</div>

<div class="sub">

霊峰に登り、縁を結ぶ

</div>

<div
id="loading"
class="loading">

読込中...

</div>

<div
id="content"
style="display:none;">

<div
id="desc"
class="desc">

</div>

</div>

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyJ0TePu884eFy8nfBYRjGrL6GCh8u0gfCE-L2MyytgVqa6JFj0uWmhnucMLFnbdkOmA/exec";

const params =
new URLSearchParams(
location.search
);

const id =
params.get("id") || "0";

fetch(
GAS_URL +
"?mode=news"
)
.then(
r=>r.json()
)
.then(
rows=>{

const row =
rows[Number(id)] || rows[0];

document.getElementById(
"loading"
).style.display =
"none";

document.getElementById(
"content"
).style.display =
"block";

document.getElementById(
"desc"
).innerHTML =

`
<strong style="
font-size:28px;
color:#d4af37;
display:block;
margin-bottom:15px;
">
${row.title || ""}
</strong>

${row.text || ""}

<br><br>

<a
href="index.html"
style="
display:block;
background:#263238;
color:#fff;
padding:18px;
border-radius:16px;
text-decoration:none;
font-size:22px;
font-weight:900;
text-align:center;
margin-top:15px;
">

田子山富士へ戻る

</a>
`;

})
.catch(err=>{

document.getElementById(
"loading"
).innerHTML =
"記事を読み込めません";

console.log(err);

});

</script>

</body>
</html>
