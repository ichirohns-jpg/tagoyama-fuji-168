<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,225,110,.18), rgba(0,0,0,0) 36%),
    linear-gradient(180deg,#221600 0%,#070707 48%,#000 100%);
  color:#fff7ca;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Hiragino Sans",
    "Yu Gothic",
    "Meiryo",
    sans-serif;
  -webkit-text-size-adjust:100%;
}

body{
  overflow-x:hidden;
  padding-bottom:env(safe-area-inset-bottom);
}

.page{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:16px 12px 48px;
}

.hero{
  text-align:center;
  margin:0 0 16px;
}

.logoFrame{
  width:120px;
  height:120px;
  margin:0 auto 14px;
  border-radius:28px;
  overflow:hidden;
  background:#000;
  border:3px solid rgba(255,220,95,.80);
  box-shadow:
    0 14px 28px rgba(0,0,0,.50),
    0 0 18px rgba(255,210,80,.22);
}

.logoFrame img{
  display:block;
  width:100%;
  height:100%;
  object-fit:cover;
}

.mainTitle{
  margin:0;
  font-size:clamp(38px,10.5vw,72px);
  line-height:1.16;
  font-weight:900;
  color:#ffdf72;
  text-shadow:
    0 4px 4px rgba(0,0,0,.92),
    0 0 18px rgba(255,210,80,.28);
}

.mainSubTitle{
  margin:10px 0 0;
  font-size:clamp(19px,5.2vw,32px);
  line-height:1.45;
  font-weight:900;
  color:#fff3c4;
  text-shadow:0 3px 3px rgba(0,0,0,.88);
}

.card{
  margin:16px 0;
  padding:22px 14px;
  border-radius:28px;
  background:
    radial-gradient(circle at top, rgba(255,224,120,.16), rgba(0,0,0,0) 46%),
    linear-gradient(180deg, rgba(44,28,0,.92), rgba(10,10,10,.94));
  border:2px solid rgba(255,220,95,.58);
  box-shadow:
    0 0 0 1px rgba(255,230,150,.10) inset,
    0 12px 28px rgba(0,0,0,.42);
}

.statusBox{
  margin:0 0 18px;
  padding:18px 14px;
  border-radius:20px;
  background:rgba(0,0,0,.34);
  border:1px solid rgba(255,220,140,.34);
  font-size:clamp(18px,4.8vw,28px);
  font-weight:900;
  line-height:1.65;
  color:#fff3c4;
  text-align:center;
  white-space:pre-wrap;
}

.newsImage{
  display:block;
  width:100%;
  height:auto;
  margin:0 0 16px;
  border-radius:18px;
  background:#000;
  border:1px solid rgba(255,220,95,.42);
}

.newsTitle{
  margin:0 0 16px;
  color:#ffdf72;
  font-size:clamp(28px,7.6vw,52px);
  font-weight:900;
  line-height:1.35;
  text-align:left;
  text-shadow:
    0 3px 4px rgba(0,0,0,.90),
    0 0 14px rgba(255,210,80,.22);
}

.newsText{
  margin:0;
  color:#fff7ca;
  font-size:clamp(19px,5.1vw,32px);
  font-weight:900;
  line-height:1.7;
  white-space:pre-wrap;
}

.emptyText{
  margin:0;
  color:#fff3c4;
  font-size:clamp(19px,5.1vw,32px);
  font-weight:900;
  line-height:1.7;
  text-align:center;
}

.youtubeBox{
  margin:18px 0 0;
  width:100%;
  border-radius:20px;
  overflow:hidden;
  background:#000;
  border:2px solid rgba(255,220,95,.48);
  box-shadow:
    0 8px 20px rgba(0,0,0,.36);
}

.youtubeFrameWrap{
  position:relative;
  width:100%;
  padding-top:56.25%;
  background:#000;
}

.youtubeFrame{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
}

.btnArea{
  display:grid;
  gap:12px;
  margin-top:18px;
}

.linkBtn{
  width:100%;
  min-height:70px;
  border:none;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:clamp(20px,5.5vw,34px);
  font-weight:900;
  letter-spacing:.02em;
  color:#fff;
  cursor:pointer;
  text-align:center;
  box-shadow:
    0 7px 0 rgba(0,0,0,.32),
    0 13px 22px rgba(0,0,0,.34);
  -webkit-tap-highlight-color:transparent;
  font-family:inherit;
}

.linkBtn:active{
  transform:translateY(3px);
  box-shadow:
    0 4px 0 rgba(0,0,0,.32),
    0 8px 14px rgba(0,0,0,.32);
}

.blueBtn{
  background:linear-gradient(180deg,#2e83ff 0%,#0b4fc4 100%);
}

.blackBtn{
  background:linear-gradient(180deg,#323232 0%,#050505 100%);
}

.footer{
  margin:28px 0 0;
  text-align:center;
  color:#c9b56b;
  font-weight:800;
  line-height:1.6;
}

@media (max-width:420px){
  .page{
    padding-left:12px;
    padding-right:12px;
  }

  .card{
    border-radius:26px;
    padding-left:14px;
    padding-right:14px;
  }

  .linkBtn{
    min-height:66px;
    border-radius:22px;
  }

  .logoFrame{
    width:112px;
    height:112px;
  }
}
</style>
</head>

<body>
<main class="page">

<header class="hero">
  <div class="logoFrame">
    <img
      src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
      alt="田子山富士"
      onerror="this.style.display='none'"
    >
  </div>

  <h1 class="mainTitle">お知らせ</h1>
  <p class="mainSubTitle">田子山富士 168の縁プロジェクト</p>
</header>

<section class="card">
  <div class="statusBox" id="statusBox">
    お知らせを読み込んでいます。
  </div>

  <div id="imageArea"></div>

  <h2 class="newsTitle" id="newsTitle">
    田子山富士からのお知らせ
  </h2>

  <p class="newsText" id="newsText"></p>

  <p class="emptyText" id="emptyText" style="display:none;">
    お知らせ本文を表示できませんでした。<br>
    お知らせ一覧からご確認ください。
  </p>

  <div id="youtubeArea"></div>

  <div class="btnArea">
    <a class="linkBtn blueBtn" id="newsLink" href="news.html">
      お知らせ一覧へ戻る
    </a>

    <a class="linkBtn blackBtn" id="topLink" href="index.html">
      トップへ戻る
    </a>
  </div>
</section>

<footer class="footer">
  田子山富士 168の縁プロジェクト<br>
  お知らせ
</footer>

</main>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbyYV3BJS_nNM6oIYejg7SUsWm0LiMhJ4g4IEHxUxw6NkMgTC5Byh3Exyr_-NHk2Jo4hFg/exec";

window.addEventListener("load", initShareNews);

async function initShareNews(){
  const params =
    new URLSearchParams(location.search);

  const index =
    Number(params.get("n") || 0);

  const userId =
    getString(params.get("userId")) ||
    getString(params.get("userid")) ||
    getString(params.get("uid")) ||
    getString(localStorage.getItem("tagoyamaUserId")) ||
    getString(localStorage.getItem("tagoyamaFujiUserId"));

  updateLinks(userId);
  await loadArticle(index);
}

async function loadArticle(index){
  setStatus("お知らせを読み込んでいます。");

  try{
    const data =
      await tryManyJson([
        GAS_URL + "?mode=newsV2&t=" + Date.now(),
        GAS_URL + "?mode=news&t=" + Date.now(),
        GAS_URL + "?mode=listNews&t=" + Date.now()
      ]);

    const list =
      extractNewsList(data);

    const item =
      normalizeNewsItem(list[index] || list[0] || {});

    renderArticle(item);
    setStatus("お知らせを表示しました。");
  }catch(error){
    console.warn(error);
    setStatus("お知らせを表示できませんでした。");
    showEmpty();
  }
}

function renderArticle(item){
  item = item || {};

  const imageArea =
    document.getElementById("imageArea");

  const title =
    document.getElementById("newsTitle");

  const text =
    document.getElementById("newsText");

  const empty =
    document.getElementById("emptyText");

  const youtubeArea =
    document.getElementById("youtubeArea");

  if(imageArea){
    imageArea.innerHTML = "";

    item.imageUrls.forEach(function(url){
      const img = document.createElement("img");
      img.className = "newsImage";
      img.alt = item.title || "お知らせ";
      img.src = url;
      img.onerror = function(){
        this.remove();
      };
      imageArea.appendChild(img);
    });
  }

  if(title){
    title.innerText =
      item.title ||
      "田子山富士からのお知らせ";
  }

  if(text){
    if(item.text){
      text.style.display = "block";
      text.innerText = item.text;
    }else{
      text.style.display = "none";
      text.innerText = "";
    }
  }

  if(empty){
    empty.style.display =
      item.text
        ? "none"
        : "block";
  }

  if(youtubeArea){
    youtubeArea.innerHTML = "";

    if(item.youtubeUrl){
      youtubeArea.appendChild(
        createYouTubeBlock(item.youtubeUrl)
      );
    }
  }
}

function showEmpty(){
  const empty =
    document.getElementById("emptyText");

  if(empty){
    empty.style.display = "block";
  }
}

function updateLinks(userId){
  const query =
    userId
      ? "?userId=" + encodeURIComponent(userId)
      : "";

  const topLink =
    document.getElementById("topLink");

  const newsLink =
    document.getElementById("newsLink");

  if(topLink){
    topLink.href =
      "index.html" + query;
  }

  if(newsLink){
    newsLink.href =
      "news.html" + query;
  }
}

function normalizeNewsItem(row){
  if(Array.isArray(row)){
    const imageUrls = [
      getString(row[3]),
      getString(row[4]),
      getString(row[5]),
      getString(row[6]),
      getString(row[7])
    ].filter(function(url){
      return url;
    });

    return {
      date:getString(row[0]),
      title:getString(row[1]),
      text:getString(row[2]),
      imageUrls:imageUrls,
      imageUrl:imageUrls[0] || "",
      youtubeUrl:getString(row[8])
    };
  }

  row = row || {};

  const imageUrls = [
    row.imageUrl,
    row.imageURL,
    row.imgUrl,
    row.img,
    row.image,
    row["画像URL"],
    row["画像url"],
    row["画像"],
    row["画像1"],
    row["画像2"],
    row["画像3"],
    row["画像4"],
    row["画像5"]
  ].map(function(value){
    return getString(value);
  }).filter(function(url){
    return url;
  });

  return {
    date:getString(
      row.date ||
      row["日付"] ||
      row["日時"] ||
      ""
    ),

    title:getString(
      row.title ||
      row["タイトル"] ||
      row.name ||
      row.subject ||
      ""
    ),

    text:getString(
      row.text ||
      row.body ||
      row.message ||
      row.content ||
      row["本文"] ||
      row["内容"] ||
      row["メッセージ"] ||
      row["概要"] ||
      ""
    ),

    imageUrls:imageUrls,
    imageUrl:imageUrls[0] || "",

    youtubeUrl:getString(
      row.youtubeUrl ||
      row.YouTubeURL ||
      row.youtube ||
      row.YouTube ||
      row["YouTubeURL"] ||
      row["YouTube URL"] ||
      row["youtubeURL"] ||
      row["動画URL"] ||
      row["動画"] ||
      ""
    )
  };
}

function createYouTubeBlock(url){
  const box =
    document.createElement("div");

  box.className =
    "youtubeBox";

  const embedUrl =
    getYouTubeEmbedUrl(url);

  if(embedUrl){
    const wrap =
      document.createElement("div");

    wrap.className =
      "youtubeFrameWrap";

    const iframe =
      document.createElement("iframe");

    iframe.className =
      "youtubeFrame";

    iframe.src =
      embedUrl;

    iframe.title =
      "YouTube動画";

    iframe.allow =
      "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";

    iframe.allowFullscreen =
      true;

    wrap.appendChild(iframe);
    box.appendChild(wrap);
  }

  return box;
}

function getYouTubeEmbedUrl(url){
  const text =
    getString(url);

  if(!text){
    return "";
  }

  let id =
    "";

  try{
    const u =
      new URL(text);

    if(u.hostname.indexOf("youtu.be") >= 0){
      id =
        u.pathname
          .replace("/","")
          .split("/")[0];
    }else if(u.hostname.indexOf("youtube.com") >= 0){
      if(u.pathname.indexOf("/watch") === 0){
        id =
          u.searchParams.get("v") || "";
      }else if(u.pathname.indexOf("/shorts/") === 0){
        id =
          u.pathname
            .split("/shorts/")[1]
            .split("/")[0];
      }else if(u.pathname.indexOf("/embed/") === 0){
        id =
          u.pathname
            .split("/embed/")[1]
            .split("/")[0];
      }else if(u.pathname.indexOf("/live/") === 0){
        id =
          u.pathname
            .split("/live/")[1]
            .split("/")[0];
      }
    }
  }catch(error){
    id = "";
  }

  id =
    getString(id);

  if(!id){
    return "";
  }

  return "https://www.youtube.com/embed/" +
    encodeURIComponent(id);
}

function extractNewsList(data){
  if(!data){
    return [];
  }

  let list = [];

  if(Array.isArray(data)){
    list = data;
  }else if(Array.isArray(data.news)){
    list = data.news;
  }else if(Array.isArray(data.newsList)){
    list = data.newsList;
  }else if(Array.isArray(data.list)){
    list = data.list;
  }else if(Array.isArray(data.rows)){
    list = data.rows;
  }else if(Array.isArray(data.items)){
    list = data.items;
  }else if(Array.isArray(data.data)){
    list = data.data;
  }else if(data.data && Array.isArray(data.data.news)){
    list = data.data.news;
  }else if(data.data && Array.isArray(data.data.list)){
    list = data.data.list;
  }

  return removeHeaderRows(list);
}

function removeHeaderRows(list){
  return list.filter(function(row){
    if(!row){
      return false;
    }

    if(Array.isArray(row)){
      const a = getString(row[0]);
      const b = getString(row[1]);
      const c = getString(row[2]);
      const d = getString(row[3]);
      const i = getString(row[8]);

      if(
        a === "日付" ||
        a === "日時" ||
        b === "タイトル" ||
        c === "本文" ||
        c === "概要" ||
        d === "画像URL" ||
        d === "画像1" ||
        i === "YouTubeURL"
      ){
        return false;
      }
    }

    return true;
  });
}

async function tryManyJson(urls){
  let lastError = null;

  for(let i = 0; i < urls.length; i++){
    try{
      const data =
        await getJson(urls[i]);

      if(data !== null && data !== undefined){
        return data;
      }
    }catch(error){
      lastError = error;
    }
  }

  throw lastError || new Error("通信に失敗しました。");
}

async function getJson(url){
  try{
    const res =
      await fetch(url,{
        method:"GET",
        cache:"no-store"
      });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text =
      await res.text();

    return parseJsonText(text);
  }catch(error){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value =
    String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const objectStart =
      value.indexOf("{");

    const objectEnd =
      value.lastIndexOf("}");

    if(objectStart >= 0 && objectEnd > objectStart){
      return JSON.parse(
        value.substring(objectStart,objectEnd + 1)
      );
    }

    const arrayStart =
      value.indexOf("[");

    const arrayEnd =
      value.lastIndexOf("]");

    if(arrayStart >= 0 && arrayEnd > arrayStart){
      return JSON.parse(
        value.substring(arrayStart,arrayEnd + 1)
      );
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve,reject){
    const callbackName =
      "tagoyamaShareNewsCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script =
      document.createElement("script");

    const sep =
      url.indexOf("?") >= 0
        ? "&"
        : "?";

    const timer =
      setTimeout(function(){
        cleanup();
        reject(new Error("JSONP timeout"));
      },12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src =
      url +
      sep +
      "callback=" +
      encodeURIComponent(callbackName);

    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

function setStatus(text){
  const el =
    document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
</script>
</body>
</html>
