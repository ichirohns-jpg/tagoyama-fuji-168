border:2px solid rgba(255,220,95,.78);

0 0 0 1px rgba(255,245,190,.14) inset,
0 10px 22px rgba(0,0,0,.46),
0 0 22px rgba(255,215,90,.18);
}

.imageBox img{
display:block;

background:#000;
}

padding:16px;

background:rgba(0,0,0,.34);
border:1px solid rgba(214,183,60,.45);

<body>

<div class="wrap">

<div class="card">

<div style="text-align:center;">
<div class="label">
田子山富士168の縁プロジェクト
</div>
</div>

<h1 class="title" id="newsTitle">
田子山富士 お知らせ
</h1>

<div class="imageBox" id="imageBox">
<img id="newsImage" src="" alt="田子山富士お知らせ画像">
</div>

<div class="bodyText" id="newsBody">
お知らせを読み込んでいます。
</div>

<div class="date" id="newsDate">
--
</div>

<div class="status" id="status">
少しお待ちください。
</div>

<div class="btnArea">

<a class="btn goldBtn" id="detailBtn" href="#" target="_blank" rel="noopener" style="display:none;">
詳しく見る
</a>

<a class="btn greenBtn" href="https://ichirohns-jpg.github.io/tagoyama-fuji-168/?open=news">
田子山富士DXのお知らせを開く
</a>

トップへ戻る

</div>

</div>

<div class="footer">
田子山富士 168の縁プロジェクト<br>
お知らせ
</div>

</div>

<script>

window.addEventListener(
"load",
init
);

function init(){

  const params =
  new URLSearchParams(location.search);

  const title =
  getString(params.get("title") || "田子山富士 お知らせ");

  const body =
  getString(params.get("body") || "田子山富士168の縁プロジェクトのお知らせです。");

  const date =
  getString(params.get("date") || "");

  const image =
  getString(params.get("image") || "");

  const link =
  getString(params.get("link") || "");

  document.title =
  title;

  document.getElementById("newsTitle").innerText =
  title;

  document.getElementById("newsBody").innerText =
  body;

  document.getElementById("newsDate").innerText =
  date || todayText();

  document.getElementById("status").innerText =
  "このページは、選択されたお知らせ記事です。";

  if(image){

    document.getElementById("newsImage").src =
    image;

    document.getElementById("imageBox").style.display =
    "block";

  }

  if(link){

    const detailBtn =
    document.getElementById("detailBtn");

    detailBtn.href =
    link;

    detailBtn.style.display =
    "flex";

  }

}

function todayText(){

  const d =
  new Date();

  const y =
  d.getFullYear();

  const m =
  String(d.getMonth() + 1).padStart(2,"0");

  const day =
  String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;

}

function getString(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();

}

</script>
