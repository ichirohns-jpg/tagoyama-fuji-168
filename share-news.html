  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 225, 110, 0.18), rgba(0, 0, 0, 0) 36%),
        linear-gradient(180deg, #221600 0%, #070707 48%, #000000 100%);
      color: #fff7ca;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .page {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 12px 48px;
    }

    .hero {
      text-align: center;
      margin: 0 0 16px;
    }

    .logoBox {
      width: 132px;
      height: 132px;
      margin: 0 auto 14px;
      border-radius: 30px;
      overflow: hidden;
      background: #000000;
      border: 3px solid rgba(255, 220, 95, 0.80);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.50),
        0 0 18px rgba(255, 210, 80, 0.22);
    }

    .logoBox img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .siteTitle {
      margin: 0;
      font-size: clamp(36px, 10vw, 68px);
      line-height: 1.16;
      font-weight: 900;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.92),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .siteSub {
      margin: 10px 0 0;
      font-size: clamp(20px, 5.5vw, 34px);
      line-height: 1.45;
      font-weight: 900;
      color: #fff3c4;
      text-shadow: 0 3px 3px rgba(0, 0, 0, 0.88);
    }

    .card {
      margin: 16px 0;
      padding: 20px 14px;
      border-radius: 28px;
      background:
        radial-gradient(circle at top, rgba(255, 224, 120, 0.16), rgba(0, 0, 0, 0) 46%),
        linear-gradient(180deg, rgba(44, 28, 0, 0.92), rgba(10, 10, 10, 0.94));
      border: 2px solid rgba(255, 220, 95, 0.58);
      box-shadow:
        0 0 0 1px rgba(255, 230, 150, 0.10) inset,
        0 12px 28px rgba(0, 0, 0, 0.42);
    }

    .cardTitle {
      margin: 0 0 14px;
      font-size: clamp(30px, 8.4vw, 54px);
      font-weight: 900;
      text-align: center;
      line-height: 1.25;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.90),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .lead {
      margin: 0 0 16px;
      color: #fff1bd;
      text-align: center;
      font-size: clamp(19px, 5.2vw, 32px);
      font-weight: 900;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .previewImage {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 24px;
      border: 3px solid rgba(255, 220, 95, 0.78);
      background: #111111;
      box-shadow:
        0 14px 30px rgba(0, 0, 0, 0.52),
        0 0 20px rgba(255, 210, 80, 0.14);
    }

    .notice {
      margin: 18px 0 0;
      padding: 20px 16px;
      border-radius: 24px;
      border: 2px solid rgba(214, 183, 60, 0.58);
      background: rgba(10, 10, 10, 0.78);
      color: #fff7ca;
      text-align: center;
      font-size: clamp(18px, 5vw, 29px);
      line-height: 1.65;
      font-weight: 900;
      white-space: pre-wrap;
    }

    .btnArea {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .btn,
    .linkBtn {
      width: 100%;
      min-height: 70px;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: clamp(20px, 5.5vw, 34px);
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      box-shadow:
        0 7px 0 rgba(0, 0, 0, 0.32),
        0 13px 22px rgba(0, 0, 0, 0.34);
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .btn:active,
    .linkBtn:active {
      transform: translateY(3px);
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.32),
        0 8px 14px rgba(0, 0, 0, 0.32);
    }

    .goldBtn {
      color: #271400;
      background: linear-gradient(180deg, #fff1a4 0%, #ffd84d 48%, #c89217 100%);
    }

    .greenBtn {
      background: linear-gradient(180deg, #38e988 0%, #09b957 100%);
    }

    .blueBtn {
      background: linear-gradient(180deg, #2e83ff 0%, #0b4fc4 100%);
    }

    .blackBtn {
      background: linear-gradient(180deg, #323232 0%, #050505 100%);
    }

    .footer {
      margin: 28px 0 0;
      text-align: center;
      color: #c9b56b;
      font-weight: 800;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        border-radius: 26px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .btn,
      .linkBtn {
        min-height: 66px;
        border-radius: 22px;
      }

      .logoBox {
        width: 122px;
        height: 122px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <header class="hero">
      <div class="logoBox">
        <img
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
          alt="田子山富士"
          onerror="this.style.display='none'"
        >
      </div>

      <h1 class="siteTitle">田子山富士</h1>
      <p class="siteSub">お知らせ</p>
    </header>

    <section class="card">
      <h2 class="cardTitle" id="newsTitle">お知らせ</h2>

      <p class="lead" id="newsLead">
        田子山富士168の縁プロジェクトからのお知らせです。
      </p>

      <img
        id="newsImage"
        class="previewImage"
        src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp.jpg?v=20260703-news"
        alt="田子山富士 お知らせ"
        onerror="handleImageError()"
      >

      <div class="notice" id="newsBody">
        田子山富士168の縁プロジェクトからのお知らせです。
      </div>

      <div class="btnArea">
        <button class="btn blueBtn" type="button" onclick="postFacebook()">
          Facebookに投稿
        </button>

        <button class="btn greenBtn" type="button" onclick="sendLine()">
          LINEで送る
        </button>

        <button class="btn blackBtn" type="button" onclick="postX()">
          Xで投稿
        </button>

        <button class="btn blueBtn" type="button" onclick="copyShareLink()">
          リンクをコピー
        </button>

        <a class="linkBtn goldBtn" id="newsLink" href="news.html">
          お知らせを見る
        </a>

        <a class="linkBtn blackBtn" id="topLink" href="index.html">
          トップへ戻る
        </a>
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      お知らせシェアページ
    </footer>
  </main>

  <script>
    const SHARE_NEWS_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-news.html";

    const NEWS_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/news.html";

    const HOME_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

    const FALLBACK_LOGO =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png";

    const FALLBACK_OGP =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp.jpg?v=20260703-news";

    let shareData = {
      title: "田子山富士 お知らせ",
      body: "田子山富士168の縁プロジェクトからのお知らせです。",
      imageUrl: FALLBACK_OGP,
      userId: ""
    };

    document.addEventListener("DOMContentLoaded", function() {
      initShareNews();
    });

    function initShareNews() {
      shareData = readShareParams();
      renderNews(shareData);
      setLinks(shareData);
    }

    function readShareParams() {
      const params = new URLSearchParams(window.location.search);

      const title = getFirst(
        params.get("title"),
        params.get("t"),
        params.get("name"),
        params.get("subject")
      );

      const body = getFirst(
        params.get("body"),
        params.get("text"),
        params.get("message"),
        params.get("m"),
        params.get("description")
      );

      const userId = getFirst(
        params.get("u"),
        params.get("userId"),
        params.get("uid"),
        params.get("id")
      );

      const imgid = getFirst(
        params.get("imgid"),
        params.get("imageId"),
        params.get("driveId")
      );

      const rawImageUrl = getFirst(
        params.get("img"),
        params.get("image"),
        params.get("imageUrl"),
        params.get("url")
      );

      let imageUrl = "";

      if (imgid) {
        imageUrl =
          "https://lh3.googleusercontent.com/d/" +
          encodeURIComponent(imgid) +
          "=w2000";
      } else if (rawImageUrl) {
        imageUrl = normalizeImageUrl(rawImageUrl);
      } else {
        imageUrl = FALLBACK_OGP;
      }

      return {
        title: title || "田子山富士 お知らせ",
        body: body || "田子山富士168の縁プロジェクトからのお知らせです。",
        imageUrl: imageUrl || FALLBACK_OGP,
        userId: userId
      };
    }

    function renderNews(data) {
      const titleEl = document.getElementById("newsTitle");
      const leadEl = document.getElementById("newsLead");
      const bodyEl = document.getElementById("newsBody");
      const imageEl = document.getElementById("newsImage");

      if (titleEl) {
        titleEl.innerText = data.title || "田子山富士 お知らせ";
      }

      if (leadEl) {
        leadEl.innerText = "田子山富士168の縁プロジェクトからのお知らせです。";
      }

      if (bodyEl) {
        bodyEl.innerText =
          data.body ||
          "田子山富士168の縁プロジェクトからのお知らせです。";
      }

      if (imageEl) {
        imageEl.src = data.imageUrl || FALLBACK_OGP;
      }
    }

    function setLinks(data) {
      const newsLink = document.getElementById("newsLink");
      const topLink = document.getElementById("topLink");

      if (newsLink) {
        newsLink.href =
          data.userId
            ? NEWS_PAGE + "?userId=" + encodeURIComponent(data.userId)
            : NEWS_PAGE;
      }

      if (topLink) {
        topLink.href =
          data.userId
            ? HOME_PAGE + "?userId=" + encodeURIComponent(data.userId)
            : HOME_PAGE;
      }
    }

    function buildShareUrl(data) {
      data = data || shareData;

      const params = new URLSearchParams();

      if (data.title) {
        params.set("title", data.title);
      }

      if (data.body) {
        params.set("body", data.body);
      }

      if (data.userId) {
        params.set("u", data.userId);
      }

      const driveId = getDriveId(data.imageUrl);

      if (driveId) {
        params.set("imgid", driveId);
      } else if (data.imageUrl && data.imageUrl !== FALLBACK_OGP) {
        params.set("img", data.imageUrl);
      }

      params.set("v", "20260703");

      return SHARE_NEWS_PAGE + "?" + params.toString();
    }

    function makeShareText(data) {
      data = data || shareData;

      let text = "田子山富士 お知らせ";

      if (data.title) {
        text += "\n" + data.title;
      }

      if (data.body) {
        text += "\n" + data.body;
      }

      return text;
    }

    function postFacebook() {
      const url = buildShareUrl(shareData);

      const shareUrl =
        "https://www.facebook.com/sharer/sharer.php?u=" +
        encodeURIComponent(url);

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    function sendLine() {
      const url = buildShareUrl(shareData);
      const text = makeShareText(shareData) + "\n" + url;

      const shareUrl =
        "https://social-plugins.line.me/lineit/share?url=" +
        encodeURIComponent(url) +
        "&text=" +
        encodeURIComponent(text);

      location.href = shareUrl;
    }

    function postX() {
      const url = buildShareUrl(shareData);

      const shareUrl =
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(makeShareText(shareData)) +
        "&url=" +
        encodeURIComponent(url);

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    async function copyShareLink() {
      const text = makeShareText(shareData) + "\n" + buildShareUrl(shareData);

      try {
        await navigator.clipboard.writeText(text);
        alert("お知らせのリンクをコピーしました。");
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = text;
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.focus();
        area.select();
        document.execCommand("copy");
        area.remove();
        alert("お知らせのリンクをコピーしました。");
      }
    }

    function handleImageError() {
      const image = document.getElementById("newsImage");

      if (!image) {
        return;
      }

      if (image.src !== FALLBACK_OGP) {
        image.src = FALLBACK_OGP;
      } else if (image.src !== FALLBACK_LOGO) {
        image.src = FALLBACK_LOGO;
      }
    }

    function normalizeImageUrl(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      if (
        value.indexOf("data:image") === 0 ||
        value.indexOf("blob:") === 0
      ) {
        return value;
      }

      const driveId = getDriveId(value);

      if (driveId) {
        return "https://lh3.googleusercontent.com/d/" +
          encodeURIComponent(driveId) +
          "=w2000";
      }

      return value;
    }

    function getDriveId(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      let match = value.match(/\/file\/d\/([^/]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/[?&]id=([^&]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

      if (match && match[1]) {
        return match[1];
      }

      if (/^[a-zA-Z0-9_-]{20,}$/.test(value)) {
        return value;
      }

      return "";
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }

    function getFirst() {
      for (let i = 0; i < arguments.length; i++) {
        const value = getString(arguments[i]);

        if (value) {
          return value;
        }
      }

      return "";
    }

    window.postFacebook = postFacebook;
    window.sendLine = sendLine;
    window.postX = postX;
    window.copyShareLink = copyShareLink;
  </script>
</body>
</html>
