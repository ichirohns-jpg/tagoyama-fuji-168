<body>

田子山富士 お知らせ

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzvMzzESm9atr6QWKvFwVlVMFYSAsj_oF0ZTCE7L0ojrX1VJhRWGaoLCD1Judga8vSb/exec";

window.addEventListener(
"load",
init
);

async function init(){

  const params =
  new URLSearchParams(location.search);

  const key =
  getString(params.get("key") || "");

  try{

    const data =
    await fetchJson(
      GAS_URL +
      "?mode=news&t=" +
      Date.now()
    );

    const items =
    data.items ||
    data.news ||
    data.data ||
    [];

    if(!items.length){
      throw new Error("お知らせがありません");
    }

    let found =
    items[0];

    if(key){

      for(let i=0;i<items.length;i++){

        const item =
        items[i];

        const itemTitle =
        getString(item.title || "お知らせ");

        const itemBody =
        getString(item.body || item.text || item.message || "");

        const itemDate =
        getString(item.date || "");

        const itemKey =
        makeNewsKey(
          itemTitle,
          itemDate,
          itemBody
        );

        if(itemKey === key){

          found =
          item;

          break;

        }

      }

    }

    renderNews(found);

  }catch(err){

    document.getElementById("newsTitle").innerText =
    "お知らせを表示できません";

    document.getElementById("newsBody").innerText =
    err.message || "時間をおいてお試しください。";

    document.getElementById("newsDate").innerText =
    todayText();

    document.getElementById("status").innerText =
    "田子山富士DXからもう一度お試しください。";

  }

}

function renderNews(item){

  const title =
  getString(item.title || "田子山富士 お知らせ");

  const body =
  getString(item.body || item.text || item.message || "");

  const date =
  getString(item.date || "");

  const images =
  collectNewsImages(item);

  const link =
  getNormalNewsLink(item);

  document.title =
  title;

  document.getElementById("newsTitle").innerText =
  title;

  document.getElementById("newsBody").innerText =
  body || "田子山富士168の縁プロジェクトのお知らせです。";

  document.getElementById("newsDate").innerText =
  date || todayText();

  document.getElementById("status").innerText =
  "このページは、選択されたお知らせ記事です。";

  if(images.length){

    document.getElementById("newsImage").src =
    images[0];

    document.getElementById("imageBox").style.display =
    "block";

  }

  if(link){

    const detailBtn =
    document.getElementById("detailBtn");

    detailBtn.href =
    link;

    detailBtn.style.display =
    "flex";

  }

}

function collectNewsImages(item){

  const list = [];

  const candidates = [
    item.image1,
    item.image2,
    item.image3,
    item.image4,
    item.image5,
    item.image,
    item.url,
    item.link
  ];

  candidates.forEach(function(value){

    const url =
    getString(value);

    if(!url){
      return;
    }

    if(isImageLikeUrl(url)){

      if(list.indexOf(url) === -1){
        list.push(url);
      }

    }

  });

  return list;

}

function getNormalNewsLink(item){

  const candidates = [
    item.link,
    item.url
  ];

  for(let i=0;i<candidates.length;i++){

    const url =
    getString(candidates[i]);

    if(!url){
      continue;
    }

    if(!isImageLikeUrl(url)){
      return url;
    }

  }

  return "";

}

function isImageLikeUrl(url){

  url =
  getString(url);

  if(!url){
    return false;
  }

  if(url.indexOf("drive.google.com/thumbnail") !== -1){
    return true;
  }

  if(url.indexOf("googleusercontent.com") !== -1){
    return true;
  }

  if(/\.(jpg|jpeg|png|gif|webp)(\?|$)/i.test(url)){
    return true;
  }

  return false;

}

function makeNewsKey(title,date,body){

  const base =
  getString(title) +
  "|" +
  getString(date) +
  "|" +
  getString(body).slice(0,80);

  let hash = 0;

  for(let i=0;i<base.length;i++){

    hash =
    ((hash << 5) - hash) +
    base.charCodeAt(i);

    hash |= 0;

  }

  return "n" + Math.abs(hash).toString(36);

}

async function fetchJson(url){

  const res =
  await fetch(url,{
    method:"GET",
    cache:"no-store"
  });

  const text =
  await res.text();

  try{

    return JSON.parse(text);

  }catch(e){

    const m =
    text.match(/^[^(]+\((.*)\);?$/);

    if(m && m[1]){
      return JSON.parse(m[1]);
    }

    throw e;

  }

}

function todayText(){

  const d =
  new Date();

  const y =
  d.getFullYear();

  const m =
  String(d.getMonth() + 1).padStart(2,"0");

  const day =
  String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;

}

function getString(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();

}
