<body>
  <div class="wrap">
    <header class="hero">
      <h1 class="siteTitle">田子山富士<br>開運おみくじ</h1>
      <div class="siteSub">田子山富士 168の縁プロジェクト</div>
    </header>

    <section class="card">
      <h2 class="cardTitle">おみくじ結果</h2>

      <div class="resultImageBox">
        <img
          id="resultImage"
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji-atari.jpg?v=20260702-atari-ogp"
          alt="田子山富士 開運おみくじ 大当たり"
          onerror="this.src='https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png';"
        >
      </div>

      <div class="resultBox">
        <h3 class="resultTitle" id="resultText">大当たり</h3>
        <p class="resultSubTitle" id="titleText">田子山富士のご縁</p>
        <p class="resultMessage" id="messageText">
田子山富士のご縁が大きく開きました。
今日の一歩が、よい流れにつながります。
        </p>
      </div>

      <div class="notice">
        Facebook・LINE・Xから開いた場合は、下のボタンで同じおみくじ結果を表示します。
      </div>

      <div class="btnArea">
        <a class="linkBtn goldBtn" id="openResultBtn" href="omikuji.html">
          おみくじ結果を開く
        </a>

        <a class="linkBtn greenBtn" id="drawBtn" href="omikuji.html?draw=1">
          おみくじを引く
        </a>

        <a class="linkBtn blackBtn" href="index.html">
          トップへ戻る
        </a>
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      開運おみくじ
    </footer>
  </div>

  <script>
    const OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

    const ATARI_IMAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji-atari.jpg?v=20260702-atari-ogp";

    window.addEventListener("load", initShareOmikujiAtari);

    function initShareOmikujiAtari() {
      const data = readParams();
      updateText(data);
      updateOpenLink(data);
    }

    function readParams() {
      const p = new URLSearchParams(location.search);

      return {
        userId: getString(p.get("userId")),
        result: getString(p.get("result")) || "大当たり",
        title: getString(p.get("title")) || "田子山富士のご縁",
        message:
          getString(p.get("message")) ||
          "田子山富士のご縁が大きく開きました。\n今日の一歩が、よい流れにつながります。",
        imageNo: getString(p.get("imageNo")) || "atari",
        imageName: getString(p.get("imageName")) || "大当たり",
        imageUrl: cleanText(p.get("imageUrl")) || ATARI_IMAGE
      };
    }

    function updateText(data) {
      const resultText = document.getElementById("resultText");
      const titleText = document.getElementById("titleText");
      const messageText = document.getElementById("messageText");
      const resultImage = document.getElementById("resultImage");

      if (resultText) {
        resultText.innerText = data.result;
      }

      if (titleText) {
        titleText.innerText = data.title;
      }

      if (messageText) {
        messageText.innerText = data.message;
      }

      if (resultImage && data.imageUrl) {
        resultImage.src = data.imageUrl;
      }
    }

    function updateOpenLink(data) {
      const openResultBtn = document.getElementById("openResultBtn");
      const p = new URLSearchParams();

      p.set("shared", "1");

      if (data.userId) {
        p.set("userId", data.userId);
      }

      p.set("result", data.result);
      p.set("title", data.title);
      p.set("message", data.message);
      p.set("imageNo", data.imageNo);
      p.set("imageName", data.imageName);
      p.set("imageUrl", data.imageUrl);
      p.set("v", String(Date.now()));

      if (openResultBtn) {
        openResultBtn.href = OMIKUJI_PAGE + "?" + p.toString();
      }
    }

    function cleanText(value) {
      return getString(value)
        .replace(/\\\//g, "/")
        .replace(/\\u0026/g, "&")
        .replace(/&amp;/g, "&");
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }
  </script>
