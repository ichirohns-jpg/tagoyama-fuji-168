<script>
const SHARE_PAGE_URL =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-omikuji-atari.html?v=20260701-atari-card-02";

window.addEventListener("load",function(){
  const img =
  document.getElementById("atariImage");

  const errorBox =
  document.getElementById("imageError");

  img.onerror =
  function(){
    errorBox.style.display =
    "block";
  };
});

async function copyShareUrl(){
  try{
    await copyText(SHARE_PAGE_URL);
    alert("リンクをコピーしました。");
  }catch(e){
    alert("コピーできませんでした。");
  }
}

async function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.setAttribute("readonly","readonly");
  textarea.style.position =
  "fixed";
  textarea.style.left =
  "-9999px";
  textarea.style.top =
  "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  const ok =
  document.execCommand("copy");

  document.body.removeChild(textarea);

  if(!ok){
    throw new Error("copy failed");
  }
}
</script>
