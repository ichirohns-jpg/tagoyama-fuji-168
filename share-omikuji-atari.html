  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 225, 110, 0.18), rgba(0, 0, 0, 0) 36%),
        linear-gradient(180deg, #221600 0%, #070707 48%, #000000 100%);

        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",

    body {
      overflow-x: hidden;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 12px 48px;
    }

    .hero {
      text-align: center;
      margin: 0 0 16px;
    }

    .logoBox {
      width: 100%;
      max-width: 620px;
      margin: 0 auto 14px;
      border-radius: 28px;
      overflow: hidden;
      border: 3px solid rgba(255, 220, 95, 0.80);
      background: #000000;
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.50),
        0 0 18px rgba(255, 210, 80, 0.22);
    }

    .logoBox img {
      display: block;
      width: 100%;
      height: auto;
    }

    .siteTitle {
      margin: 0;
      font-size: clamp(34px, 9vw, 62px);
      line-height: 1.18;
      font-weight: 900;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.92),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .siteSub {
      margin: 10px 0 0;
      font-size: clamp(18px, 5vw, 30px);
      line-height: 1.45;
      font-weight: 900;
      color: #fff3c4;
      text-shadow: 0 3px 3px rgba(0, 0, 0, 0.88);
    }

    .card {
      margin: 16px 0;
      padding: 20px 14px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(44, 28, 0, 0.92), rgba(10, 10, 10, 0.94));
      border: 2px solid rgba(255, 220, 95, 0.58);
      box-shadow:
        0 0 0 1px rgba(255, 230, 150, 0.10) inset,
        0 12px 28px rgba(0, 0, 0, 0.42);
    }

    .cardTitle {
      margin: 0 0 14px;
      font-size: clamp(30px, 8.4vw, 54px);
      font-weight: 900;
      text-align: center;
      line-height: 1.25;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.90),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .resultBox {
      margin: 16px 0 0;
      padding: 22px 14px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.36);
      border: 1px solid rgba(255, 220, 140, 0.34);
      text-align: center;
    }

    .resultTitle {
      margin: 0 0 12px;
      font-size: clamp(38px, 11vw, 72px);
      font-weight: 900;
      line-height: 1.16;
      color: #ffdf72;
      text-shadow:
        0 5px 5px rgba(0, 0, 0, 0.90),
        0 0 20px rgba(255, 210, 80, 0.28);
    }

    .resultSubTitle {
      margin: 0 0 12px;
      font-size: clamp(24px, 6.8vw, 42px);
      font-weight: 900;
      line-height: 1.3;
      color: #fff7ca;
    }

    .resultMessage {
      margin: 0;
      font-size: clamp(20px, 5.5vw, 32px);
      font-weight: 900;
      line-height: 1.65;
      color: #fff3c4;
      white-space: pre-wrap;
    }

    .resultImageBox {
      width: 100%;
      margin: 18px auto 0;
      border-radius: 26px;
      overflow: hidden;
      border: 3px solid rgba(255, 220, 95, 0.78);
      background: #000000;
      box-shadow:
        0 12px 26px rgba(0, 0, 0, 0.45),
        0 0 20px rgba(255, 210, 80, 0.18);
      display: none;
    }

    .resultImageBox img {
      display: block;
      width: 100%;
      height: auto;
      background: #000000;
    }

    .text {
      margin: 0;
      font-size: clamp(19px, 5vw, 30px);
      font-weight: 900;
      line-height: 1.65;
      text-align: center;
      color: #fff3c4;
    }

    .btnArea {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .btn,
    .linkBtn {
      width: 100%;
      min-height: 70px;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: clamp(20px, 5.5vw, 34px);
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      box-shadow:
        0 7px 0 rgba(0, 0, 0, 0.32),
        0 13px 22px rgba(0, 0, 0, 0.34);
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active,
    .linkBtn:active {
      transform: translateY(3px);
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.32),
        0 8px 14px rgba(0, 0, 0, 0.32);
    }

    .goldBtn {
      color: #271400;
      background: linear-gradient(180deg, #fff1a4 0%, #ffd84d 48%, #c89217 100%);
    }

    .greenBtn {
      background: linear-gradient(180deg, #38e988 0%, #09b957 100%);
    }

    .blackBtn {
      background: linear-gradient(180deg, #323232 0%, #050505 100%);
    }

    .notice {
      margin: 18px 0 0;
      padding: 18px 14px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 220, 140, 0.30);
      color: #d9c886;
      font-size: clamp(16px, 4.4vw, 24px);
      font-weight: 800;
      line-height: 1.65;
      text-align: center;
    }

    .footer {
      margin: 28px 0 0;
      text-align: center;
      color: #c9b56b;
      font-weight: 800;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .wrap {
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        border-radius: 26px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .btn,
      .linkBtn {
        min-height: 66px;
        border-radius: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="hero">
      <div class="logoBox">
        <img
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
          alt="田子山富士"
          onerror="this.style.display='none';"
        >
      </div>

      <h1 class="siteTitle">田子山富士<br>開運おみくじ</h1>
      <div class="siteSub">田子山富士 168の縁プロジェクト</div>
    </header>

    <section class="card">
      <h2 class="cardTitle">おみくじ結果</h2>

      <div class="resultImageBox" id="resultImageBox">
        <img id="resultImage" src="" alt="おみくじ画像">
      </div>

      <div class="resultBox">
        <h3 class="resultTitle" id="resultText">開運おみくじ</h3>
        <p class="resultSubTitle" id="titleText">田子山富士のご縁</p>
        <p class="resultMessage" id="messageText">おみくじ結果を読み込んでいます。</p>
      </div>

      <div class="notice">
        Facebook・LINE・Xから開いた場合は、下のボタンで同じおみくじ結果を表示します。
      </div>

      <div class="btnArea">
        <a class="linkBtn goldBtn" id="openOmikujiBtn" href="omikuji.html">
          田子山富士を見る
        </a>

        <a class="linkBtn greenBtn" id="openResultBtn" href="omikuji.html">
          おみくじ結果を開く
        </a>

        <a class="linkBtn blackBtn" href="index.html">
          トップへ戻る
        </a>
      </div>
    </section>

    <section class="card">
      <h2 class="cardTitle">田子山富士168の縁プロジェクト</h2>

      <p class="text">
        山頂QRコードから登頂受付できます。<br>
        個別のQRコードリンクは公開していません。
      </p>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      開運おみくじ
    </footer>
  </div>

  <script>
    const OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

    const INDEX_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/index.html";

    const DEFAULT_IMAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png";

    window.addEventListener("load", initShareOmikuji);

    function initShareOmikuji() {
      const data = readShareParams();

      renderSharePage(data);
      updateOpenLinks(data);
      updateBrowserMeta(data);
    }

    function readShareParams() {
      const p = new URLSearchParams(location.search);

      const result = getString(p.get("result"));
      const title = getString(p.get("title"));
      const message = getString(p.get("message"));
      const imageNo = getString(p.get("imageNo"));
      const imageName = getString(p.get("imageName"));
      const imageUrl = cleanText(p.get("imageUrl"));
      const userId = getString(p.get("userId"));

      return {
        result: result || title || "開運おみくじ",
        title: title || result || "田子山富士のご縁",
        message: message || "田子山富士168の縁プロジェクトで開運おみくじを引きました。",
        imageNo: imageNo,
        imageName: imageName,
        imageUrl: imageUrl,
        userId: userId
      };
    }

    function renderSharePage(data) {
      const resultText = document.getElementById("resultText");
      const titleText = document.getElementById("titleText");
      const messageText = document.getElementById("messageText");

      if (resultText) {
        resultText.innerText = data.result;
      }

      if (titleText) {
        titleText.innerText = data.title;
      }

      if (messageText) {
        messageText.innerText = data.message;
      }

      setShareImage(data.imageUrl);
    }

    function setShareImage(url) {
      const box = document.getElementById("resultImageBox");
      const img = document.getElementById("resultImage");

      if (!box || !img) {
        return;
      }

      const list = makeImageUrlList(url);

      if (!list.length) {
        img.src = DEFAULT_IMAGE;
        box.style.display = "block";
        return;
      }

      let index = 0;

      img.onload = function () {
        box.style.display = "block";
      };

      img.onerror = function () {
        index++;

        if (index >= list.length) {
          img.src = DEFAULT_IMAGE;
          box.style.display = "block";
          return;
        }

        img.src = list[index];
      };

      img.src = list[index];
    }

    function updateOpenLinks(data) {
      const openOmikujiBtn = document.getElementById("openOmikujiBtn");
      const openResultBtn = document.getElementById("openResultBtn");

      const url = buildOmikujiResultUrl(data);

      if (openOmikujiBtn) {
        openOmikujiBtn.href = url;
      }

      if (openResultBtn) {
        openResultBtn.href = url;
      }
    }

    function buildOmikujiResultUrl(data) {
      const p = new URLSearchParams();

      p.set("shared", "1");

      if (data.userId) {
        p.set("userId", data.userId);
      }

      if (data.result) {
        p.set("result", data.result);
      }

      if (data.title) {
        p.set("title", data.title);
      }

      if (data.message) {
        p.set("message", data.message);
      }

      if (data.imageNo) {
        p.set("imageNo", data.imageNo);
      }

      if (data.imageName) {
        p.set("imageName", data.imageName);
      }

      if (data.imageUrl) {
        p.set("imageUrl", data.imageUrl);
      }

      p.set("v", String(Date.now()));

      return OMIKUJI_PAGE + "?" + p.toString();
    }

    function updateBrowserMeta(data) {
      document.title = "田子山富士 開運おみくじ｜" + data.result;

      setMetaContent('meta[name="description"]', data.message);
      setMetaContent('meta[property="og:title"]', "田子山富士 開運おみくじ");
      setMetaContent('meta[property="og:description"]', data.message);
      setMetaContent('meta[name="twitter:title"]', "田子山富士 開運おみくじ");
      setMetaContent('meta[name="twitter:description"]', data.message);
    }

    function setMetaContent(selector, content) {
      const tag = document.querySelector(selector);

      if (tag) {
        tag.setAttribute("content", content);
      }
    }

    function makeImageUrlList(url) {
      const text = cleanText(url);
      const id = getDriveFileId(text);
      const list = [];

      if (text) {
        list.push(text);
      }

      if (id) {
        list.push("https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w1200");
        list.push("https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w1600");
        list.push("https://lh3.googleusercontent.com/d/" + id + "=w1200");
        list.push("https://lh3.googleusercontent.com/d/" + id + "=w1600");
      }

      return list.filter(function (v, i, arr) {
        return v && arr.indexOf(v) === i;
      });
    }

    function getDriveFileId(url) {
      const text = cleanText(url);

      let m = text.match(/[?&]id=([^&]+)/);

      if (m && m[1]) {
        return decodeURIComponent(m[1]);
      }

      m = text.match(/\/d\/([^/]+)/);

      if (m && m[1]) {
        return decodeURIComponent(m[1]);
      }

      return "";
    }

    function cleanText(value) {
      return getString(value)
        .replace(/\\\//g, "/")
        .replace(/\\u0026/g, "&")
        .replace(/&amp;/g, "&");
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }
  </script>
</body>
</html>
