      田子山富士168の縁プロジェクトの<br>

      新しいおみくじ共有ページへ確認しています。
    </div>

      <a
        id="mainBtn"
        class="btn"
        href="https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html">

    </div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbx5w_dEKm4Tb-GFB0o9AhUgLB1MdziOntuQ8iChEbnSbB6jcUCxp4STritRJeyF_osy/exec";

const OMIKUJI_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

window.addEventListener("load",function(){
  const params =
  new URLSearchParams(location.search);

  const shareId =
  getString(
    params.get("id") ||
    params.get("shareId") ||
    params.get("sid") ||
    ""
  );

  const userId =
  getString(
    params.get("userId") ||
    params.get("uid") ||
    ""
  );

  const status =
  document.getElementById("status");

  const mainBtn =
  document.getElementById("mainBtn");

  if(shareId){
    const url =
    GAS_URL +
    "?mode=shareOmikuji&id=" +
    encodeURIComponent(shareId);

    if(status){
      status.innerText =
      "おみくじ結果ページへ移動します。";
    }

    if(mainBtn){
      mainBtn.href =
      url;

      mainBtn.innerText =
      "おみくじ結果を開く";
    }

    setTimeout(function(){
      location.replace(url);
    },500);

    return;
  }

  if(userId){
    const url =
    OMIKUJI_PAGE +
    "?userId=" +
    encodeURIComponent(userId) +
    "&v=" +
    Date.now();

    if(status){
      status.innerText =
      "開運おみくじページへ移動します。";
    }

    if(mainBtn){
      mainBtn.href =
      url;
    }

    setTimeout(function(){
      location.replace(url);
    },700);

    return;
  }

  if(status){
    status.innerText =
    "開運おみくじを開いてください。";
  }
});

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
</script>
