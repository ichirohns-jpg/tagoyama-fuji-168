<body>
  <div class="wrap">
    <header class="hero">
      <div class="logoBox">
        <img
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
          alt="田子山富士"
          onerror="this.style.display='none';"
        >
      </div>

      <h1 class="siteTitle">田子山富士<br>登頂記念証</h1>
      <div class="siteSub">田子山富士 168の縁プロジェクト</div>
    </header>

    <section class="card">
      <h2 class="cardTitle">登頂記念証</h2>

      <div class="certificateBox" id="certificateBox">
        <img
          id="certificateImage"
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg?v=20260704-certificate-ogp-3"
          alt="田子山富士 登頂記念証"
          onerror="this.onerror=null; this.src='https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png';"
        >

        <div class="overlay">
          <h3 class="climbTitle" id="climbTitle">登頂記念</h3>
          <p class="serialNo" id="serialNo">No.確認中</p>
          <p class="dateText" id="dateText">日付確認中</p>
          <p class="participantText" id="participantText">参加人数 確認中</p>
        </div>
      </div>

      <p class="shareText" id="shareText">田子山富士に登ってきました。
山頂でいただいたご縁を、みなさんにもおすそ分けします。
次はぜひ、あなたも田子山富士へ。</p>

      <div class="btnArea">
        <a class="linkBtn blackBtn" href="https://ichirohns-jpg.github.io/tagoyama-fuji-168/">
          トップへ戻る
        </a>
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      登頂記念証
    </footer>
  </div>

  <script>
    const DEFAULT_IMAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg?v=20260704-certificate-ogp-3";

    window.addEventListener("load", initShareCertificate);

    function initShareCertificate() {
      const data = readShareParams();

      renderShareCertificate(data);
    }

    function readShareParams() {
      const p = new URLSearchParams(location.search);

      const climbCount =
        getString(p.get("c")) ||
        getString(p.get("climbCount")) ||
        "";

      const serialNo =
        getString(p.get("s")) ||
        getString(p.get("serialNo")) ||
        "";

      const date =
        getString(p.get("d")) ||
        getString(p.get("date")) ||
        getString(p.get("lastDate")) ||
        "";

      const participantNo =
        getString(p.get("p")) ||
        getString(p.get("participantNo")) ||
        "";

      const imgid =
        getString(p.get("imgid")) ||
        "";

      const imageUrl =
        imgid
          ? "https://drive.google.com/thumbnail?id=" + encodeURIComponent(imgid) + "&sz=w1600"
          : normalizeImageUrl(p.get("imageUrl"));

      return {
        climbCount: climbCount,
        serialNo: serialNo,
        date: date,
        participantNo: participantNo,
        imageUrl: imageUrl || DEFAULT_IMAGE
      };
    }

    function renderShareCertificate(data) {
      const img = document.getElementById("certificateImage");
      const climbTitle = document.getElementById("climbTitle");
      const serialNo = document.getElementById("serialNo");
      const dateText = document.getElementById("dateText");
      const participantText = document.getElementById("participantText");

      if (img) {
        img.onerror = function () {
          img.onerror = null;
          img.src = "https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png";
        };

        img.src = data.imageUrl || DEFAULT_IMAGE;
      }

      if (climbTitle) {
        climbTitle.innerText =
          data.climbCount
            ? "第" + data.climbCount + "回 登頂記念"
            : "登頂記念";
      }

      if (serialNo) {
        serialNo.innerText =
          data.serialNo
            ? "No." + data.serialNo
            : "No.確認中";
      }

      if (dateText) {
        dateText.innerText =
          data.date
            ? formatDate(data.date)
            : "日付確認中";
      }

      if (participantText) {
        participantText.innerText =
          data.participantNo
            ? "参加人数 " + data.participantNo + "人"
            : "参加人数 確認中";
      }
    }

    function normalizeImageUrl(value) {
      const text = cleanText(value);

      if (!text) {
        return "";
      }

      const driveId = getDriveFileId(text);

      if (driveId) {
        return "https://drive.google.com/thumbnail?id=" +
          encodeURIComponent(driveId) +
          "&sz=w1600";
      }

      return text;
    }

    function getDriveFileId(url) {
      const text = cleanText(url);

      let m = text.match(/[?&]id=([^&]+)/);

      if (m && m[1]) {
        return decodeURIComponent(m[1]);
      }

      m = text.match(/\/d\/([^/]+)/);

      if (m && m[1]) {
        return decodeURIComponent(m[1]);
      }

      return "";
    }

    function cleanText(value) {
      return getString(value)
        .replace(/\\\//g, "/")
        .replace(/\\u0026/g, "&")
        .replace(/&amp;/g, "&");
    }

    function formatDate(value) {
      return getString(value).replace(/-/g, "/");
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }
  </script>
