<body>
<main class="page">

<header class="hero">
  <div class="logoFrame">
    <img
      src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
      alt="田子山富士"
      onerror="this.style.display='none'"
    >
  </div>

  <h1 class="mainTitle">登頂記念証</h1>
  <p class="mainSubTitle">田子山富士 168の縁プロジェクト</p>
</header>

<section class="card">
  <div class="statusBox" id="statusBox">
    登頂記念証を読み込んでいます。
  </div>

  <div class="certificateImageBox" id="certificateImageBox">
    <img
      class="certificateImage"
      id="certificateImage"
      alt="田子山富士 登頂記念証"
    >
  </div>

  <div class="noImageBox" id="noImageBox">
    <p class="noImageTitle">登頂記念証</p>
    <p class="noImageText">
      記念証画像を読み込んでいます。<br>
      表示されない場合は、トップからもう一度ご確認ください。
    </p>
  </div>

  <div class="infoBox" id="infoBox">
    <p class="infoTitle" id="infoTitle">
      田子山富士 登頂記念証
    </p>
    <p class="infoText" id="infoText">
      田子山富士に登頂したご縁を、記念証として残します。
    </p>
  </div>

  <div class="btnArea">
    <a class="linkBtn goldBtn" id="topLink" href="index.html">
      田子山富士トップへ
    </a>

    <a class="linkBtn blueBtn" href="news.html">
      お知らせを見る
    </a>

    <a class="linkBtn blackBtn" href="goen.html">
      ご縁帳を見る
    </a>
  </div>
</section>

<footer class="footer">
  田子山富士 168の縁プロジェクト<br>
  登頂記念証
</footer>

</main>

<script>
window.addEventListener("load",initShareCertificate);

function initShareCertificate(){

  const params =
    new URLSearchParams(location.search);

  const userId =
    getString(
      params.get("userId") ||
      params.get("userid") ||
      params.get("uid") ||
      ""
    );

  const climbCount =
    normalizeNumberText(
      params.get("climbCount") ||
      params.get("count") ||
      ""
    );

  const serialNo =
    cleanSerialNo(
      params.get("serialNo") ||
      params.get("serial") ||
      ""
    );

  const lastDate =
    formatDateText(
      params.get("lastDate") ||
      params.get("date") ||
      ""
    );

  const imageUrl =
    getString(
      params.get("imageUrl") ||
      params.get("image") ||
      params.get("img") ||
      ""
    );

  updateTopLink(userId);
  renderInfo(climbCount,serialNo,lastDate);
  renderImage(imageUrl);

}

function renderImage(imageUrl){

  const imageBox =
    document.getElementById("certificateImageBox");

  const image =
    document.getElementById("certificateImage");

  const noImageBox =
    document.getElementById("noImageBox");

  const statusBox =
    document.getElementById("statusBox");

  if(!imageUrl){

    if(statusBox){
      statusBox.innerText =
        "記念証画像のURLがありません。";
    }

    if(imageBox){
      imageBox.style.display = "none";
    }

    if(noImageBox){
      noImageBox.style.display = "flex";
    }

    return;

  }

  if(statusBox){
    statusBox.innerText =
      "登頂記念証を読み込んでいます。";
  }

  image.onload = function(){

    if(imageBox){
      imageBox.style.display = "block";
    }

    if(noImageBox){
      noImageBox.style.display = "none";
    }

    if(statusBox){
      statusBox.innerText =
        "登頂記念証を表示しました。";
    }

  };

  image.onerror = function(){

    if(imageBox){
      imageBox.style.display = "none";
    }

    if(noImageBox){
      noImageBox.style.display = "flex";
    }

    if(statusBox){
      statusBox.innerText =
        "記念証画像を表示できませんでした。";
    }

  };

  image.src =
    imageUrl;

}

function renderInfo(climbCount,serialNo,lastDate){

  const infoBox =
    document.getElementById("infoBox");

  const infoTitle =
    document.getElementById("infoTitle");

  const infoText =
    document.getElementById("infoText");

  let title =
    "田子山富士 登頂記念証";

  if(climbCount){
    title =
      "第" + climbCount + "回 登頂記念";
  }

  let lines = [];

  if(serialNo){
    lines.push("No." + serialNo);
  }

  if(lastDate){
    lines.push(lastDate);
  }

  lines.push(
    "田子山富士に登頂したご縁を、記念証として残します。"
  );

  if(infoTitle){
    infoTitle.innerText = title;
  }

  if(infoText){
    infoText.innerText = lines.join("\n");
  }

  if(infoBox){
    infoBox.style.display = "block";
  }

}

function updateTopLink(userId){

  const topLink =
    document.getElementById("topLink");

  if(!topLink){
    return;
  }

  if(userId){
    topLink.href =
      "index.html?userId=" +
      encodeURIComponent(userId);
  }else{
    topLink.href =
      "index.html";
  }

}

function normalizeNumberText(value){

  const text =
    toHalfWidthNumber(getString(value));

  const match =
    text.match(/[0-9]+/);

  if(match && match[0]){
    return match[0];
  }

  return "";

}

function cleanSerialNo(value){

  return toHalfWidthNumber(getString(value))
    .replace(/^No\./i,"")
    .replace(/^No/i,"")
    .replace(/^記念番号/,"")
    .trim();

}

function formatDateText(value){

  const text =
    getString(value);

  if(!text){
    return "";
  }

  return toHalfWidthNumber(text)
    .replace(/-/g,"/")
    .replace(/\./g,"/")
    .replace(/\s.*$/,"");

}

function toHalfWidthNumber(value){

  return getString(value).replace(/[０-９]/g,function(s){

    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);

  });

}

function getString(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();

}
</script>
</body>
