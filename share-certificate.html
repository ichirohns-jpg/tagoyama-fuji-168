<style>

body{
margin:0;
background:#111;
color:#fff;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding:20px;
}

.box{
max-width:700px;
}

h1{
font-size:38px;
margin-bottom:20px;
}

font-size:22px;

}

</style>

<body>

<div class="box">

<h1>
🏔️ 田子山富士 登頂記念証
</h1>

<p id="serialText">
シリアル番号確認中...
</p>

<p>
168の縁プロジェクト
</p>

</div>

<script>

const params =
new URLSearchParams(
location.search
);

const serial =
params.get(
"serial"
)
|| "0001";

document.getElementById(
"serialText"
).innerText =
"登頂記録番号 No." +
serial;

setTimeout(
function(){

location.replace(
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html?serial="
+
encodeURIComponent(
serial
)
);

},
1500
);

</script>

</body>
