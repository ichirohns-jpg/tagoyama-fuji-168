<main class="page">

      src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg?v=20260704final"

<script>
window.addEventListener("load", function(){
  const params = new URLSearchParams(location.search);

  const userId =
    getString(params.get("userId")) ||
    getString(params.get("userid")) ||
    getString(params.get("uid")) ||
    getString(localStorage.getItem("tagoyamaUserId")) ||
    getString(localStorage.getItem("tagoyamaFujiUserId"));

  const topLink =
    document.getElementById("topLink");

  if(topLink){
    topLink.href =
      userId
        ? "index.html?userId=" + encodeURIComponent(userId)
        : "index.html";
  }
});

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
</script>
