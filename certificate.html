<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbx2rRwLRW_wOqrzC8-9cb5lXc4y5r4JORZGcJgof8_efLA4jpmo_DQEMR4sl7UUzChj/exec";

const IMAGE_GAS_URL =
"https://script.google.com/macros/s/AKfycbzvMzzESm9atr6QWKvFwVlVMFYSAsj_oF0ZTCE7L0ojrX1VJhRWGaoLCD1Judga8vSb/exec";

const CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

let latestUserId = "";
let latestCount = 1;
let latestSerial = "";
let latestDate = "";
let latestImageName = "";
let latestImageUrl = "";
let latestImageData = "";
let latestShareUrl = "";
let latestImageSrc = "";
let latestImageCors = false;
let latestSaveFile = null;
let latestSaveImageUrl = "";

window.addEventListener(
"load",
loadCertificate
);

async function loadCertificate(){

  const loading =
  document.getElementById("loading");

  const error =
  document.getElementById("error");

  const content =
  document.getElementById("content");

  error.style.display =
  "none";

  error.innerText =
  "";

  content.style.display =
  "none";

  try{

    const params =
    new URLSearchParams(location.search);

    const userId =
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    localStorage.getItem("tagoyamaUserId") ||
    "";

    if(!userId){
      throw new Error("QRからアクセスしてください");
    }

    latestUserId =
    userId;

    localStorage.setItem(
      "tagoyamaUserId",
      userId
    );

    latestShareUrl =
    CERTIFICATE_PAGE +
    "?userId=" +
    encodeURIComponent(userId) +
    "&og=30";

    const data =
    await fetchJson(
      GAS_URL +
      "?mode=certificate" +
      "&userId=" +
      encodeURIComponent(userId) +
      "&t=" +
      Date.now()
    );

    if(!data.success){

      throw new Error(
        data.message ||
        "取得できません"
      );

    }

    const fixed =
    resolveCertificateData(data);

    latestCount =
    fixed.count;

    latestSerial =
    fixed.serial;

    latestDate =
    fixed.date;

    latestImageName =
    fixed.imageName;

    latestImageUrl =
    fixed.imageUrl;

    latestImageData =
    fixed.imageData;

    setCertificateText();

    setShareLinks();

    loading.style.display =
    "none";

    content.style.display =
    "block";

    await loadCorrectImage();

  }catch(err){

    loading.style.display =
    "none";

    content.style.display =
    "none";

    error.style.display =
    "block";

    error.innerText =
    err.message ||
    "取得できません";

  }

}

function resolveCertificateData(data){

  let count =
  safeCount(data.count);

  if(!count){
    count =
    serialToCount(data.serial);
  }

  if(!count){
    count =
    1;
  }

  let serial =
  pickSerial(
    data.serial,
    count
  );

  return {
    count:count,
    serial:serial,
    date:pickDate(data),
    imageName:pickImageName(data),
    imageUrl:pickImageUrl(data),
    imageData:pickImageData(data)
  };

}

function safeCount(value){

  const n =
  Number(value);

  if(!Number.isFinite(n)){
    return 0;
  }

  const v =
  Math.floor(n);

  if(v < 1 || v > 168){
    return 0;
  }

  return v;

}

function serialToCount(value){

  const s =
  getString(value);

  if(!s){
    return 0;
  }

  const m =
  s.match(/^(\d{1,3})-\d{1,4}$/);

  if(m && m[1]){
    return safeCount(m[1]);
  }

  return 0;

}

function pickSerial(value,count){

  const s =
  getString(value);

  if(/^\d{1,3}-\d{4}$/.test(s)){
    return s;
  }

  return String(count || 1) +
  "-0001";

}

async function loadCorrectImage(){

  const imageInfo =
  await fetchImageInfo(
    latestCount
  );

  if(
    imageInfo &&
    (
      imageInfo.success ||
      imageInfo.imageDataUrl ||
      imageInfo.imageDataURL ||
      imageInfo.imageData ||
      imageInfo.dataUrl ||
      imageInfo.dataURL ||
      imageInfo.base64 ||
      imageInfo.imageUrl ||
      imageInfo.url
    )
  ){

    const imageData =
    pickImageData(imageInfo);

    const imageUrl =
    pickImageUrl(imageInfo);

    if(imageData){
      latestImageData =
      imageData;
    }

    if(imageUrl){
      latestImageUrl =
      imageUrl;
    }

    latestImageName =
    imageInfo.imageName ||
    imageInfo.name ||
    latestImageName;

  }

  await loadMemorialImage();

}

async function fetchImageInfo(imageNo){

  const urls = [
    IMAGE_GAS_URL +
    "?mode=image" +
    "&imageNo=" +
    encodeURIComponent(imageNo) +
    "&t=" +
    Date.now(),

    GAS_URL +
    "?mode=image" +
    "&imageNo=" +
    encodeURIComponent(imageNo) +
    "&t=" +
    Date.now()
  ];

  for(let i=0;i<urls.length;i++){

    try{

      const data =
      await fetchJson(
        urls[i]
      );

      if(
        data &&
        (
          data.success ||
          data.imageDataUrl ||
          data.imageDataURL ||
          data.imageData ||
          data.dataUrl ||
          data.dataURL ||
          data.base64 ||
          data.imageUrl ||
          data.url
        )
      ){

        return data;

      }

    }catch(e){}

  }

  return null;

}

function setCertificateText(){

  document.getElementById("climbText").innerText =
  "第" + latestCount + "回 登頂記念";

  document.getElementById("serialText").innerText =
  "No." + latestSerial;

  document.getElementById("dateText").innerText =
  latestDate || todayText();

}

function setShareLinks(){

  const share =
  encodeURIComponent(latestShareUrl);

  const text =
  encodeURIComponent(
    "田子山富士 登頂記念証を授かりました"
  );

  document.getElementById("lineShare").href =
  "https://social-plugins.line.me/lineit/share?url=" +
  share;

  document.getElementById("facebookShare").href =
  "https://www.facebook.com/sharer/sharer.php?u=" +
  share;

  document.getElementById("xShare").href =
  "https://twitter.com/intent/tweet?text=" +
  text +
  "&url=" +
  share;

}

function pickDate(data){

  const value =
  getString(
    data.date ||
    data.createdAt ||
    data.created ||
    data.time ||
    data.datetime ||
    ""
  );

  if(value){

    const m =
    value.match(/\d{4}\/\d{2}\/\d{2}/) ||
    value.match(/\d{4}-\d{2}-\d{2}/);

    if(m && m[0]){
      return m[0].replace(/-/g,"/");
    }

    return value;

  }

  return todayText();

}

function pickImageName(data){

  return getString(
    data.imageName ||
    data.name ||
    data.fileName ||
    data.filename ||
    ""
  );

}

function pickImageUrl(data){

  return getString(
    data.imageUrl ||
    data.imageURL ||
    data.url ||
    data.image ||
    data.certificateImageUrl ||
    data.photoUrl ||
    ""
  );

}

function pickImageData(data){

  data =
  data || {};

  let value =
  getString(
    data.imageDataUrl ||
    data.imageDataURL ||
    data.imageData ||
    data.dataUrl ||
    data.dataURL ||
    data.base64 ||
    ""
  );

  if(!value){
    return "";
  }

  if(value.indexOf("data:image") === 0){
    return value;
  }

  if(value.length > 100){

    if(value.indexOf("/9j/") === 0){
      return "data:image/jpeg;base64," + value;
    }

    if(value.indexOf("UklGR") === 0){
      return "data:image/webp;base64," + value;
    }

    return "data:image/png;base64," + value;

  }

  return "";

}

async function loadMemorialImage(){

  const img =
  document.getElementById("memorialImage");

  latestImageSrc =
  "";

  latestImageCors =
  false;

  if(latestImageData){

    img.removeAttribute("crossorigin");

    img.src =
    latestImageData;

    latestImageSrc =
    latestImageData;

    latestImageCors =
    true;

    await waitForImage(img);

    return;

  }

  if(latestImageUrl){

    img.removeAttribute("crossorigin");

    img.src =
    latestImageUrl;

    latestImageSrc =
    latestImageUrl;

    latestImageCors =
    false;

    await waitForImage(img);

    return;

  }

  img.removeAttribute("crossorigin");

  img.src =
  "top.jpg?v=30";

  latestImageSrc =
  img.src;

  await waitForImage(img);

}

  try{

    const file =
    await makeSaveFile();

    latestSaveFile =
    file;

    if(latestSaveImageUrl){
      URL.revokeObjectURL(latestSaveImageUrl);
      latestSaveImageUrl = "";
    }

    );

async function makeSaveFile(){

  if(latestSaveFile){
    return latestSaveFile;
  }

  await ensureCaptureSafeImage();

  const target =
  document.getElementById("certificate");

  await waitForImage(
    document.getElementById("memorialImage")
  );

  if(document.fonts && document.fonts.ready){

    try{
      await document.fonts.ready;
    }catch(e){}

  }

  const canvas =
  await html2canvas(
    target,
    {
      backgroundColor:null,
      scale:3,
      useCORS:true,
      allowTaint:false,
      logging:false
    }
  );

  const blob =
  await new Promise(function(resolve){

    try{

      canvas.toBlob(
        resolve,
        "image/png",
        1
      );

    }catch(e){

      resolve(null);

    }

  });

  if(!blob){
    throw new Error("画像作成に失敗しました");
  }

  latestSaveFile =
  new File(
    [blob],
    "tagoyama-certificate-" +
    latestSerial +
    ".png",
    {
      type:"image/png"
    }
  );

  return latestSaveFile;

}

async function ensureCaptureSafeImage(){

  const img =
  document.getElementById("memorialImage");

  if(latestImageData){

    if(img.src !== latestImageData){

      img.removeAttribute("crossorigin");

      img.src =
      latestImageData;

      await waitForImage(img);

    }

    return true;

  }

  const imageInfo =
  await fetchImageInfo(
    latestCount
  );

  const imageData =
  imageInfo
  ? pickImageData(imageInfo)
  : "";

  if(imageData){

    latestImageData =
    imageData;

    img.removeAttribute("crossorigin");

    img.src =
    latestImageData;

    await waitForImage(img);

    return true;

  }

  if(latestImageUrl){

    const converted =
    await urlToDataUrl(
      latestImageUrl
    );

    if(converted){

      latestImageData =
      converted;

      img.removeAttribute("crossorigin");

      img.src =
      latestImageData;

      await waitForImage(img);

      return true;

    }

  }

  throw new Error("保存用の画像データを取得できませんでした");

}

async function urlToDataUrl(url){

  try{

    const res =
    await fetch(
      url,
      {
        method:"GET",
        cache:"no-store"
      }
    );

    if(!res.ok){
      return "";
    }

    const blob =
    await res.blob();

    return await blobToDataUrl(blob);

  }catch(e){

    return "";

  }

}

function blobToDataUrl(blob){

  return new Promise(function(resolve){

    const reader =
    new FileReader();

    reader.onloadend =
    function(){

      resolve(
        reader.result || ""
      );

    };

    reader.onerror =
    function(){

      resolve("");

    };

    reader.readAsDataURL(blob);

  });

}

function waitForImage(img){

  return new Promise(function(resolve){

    if(!img || !img.src){
      resolve();
      return;
    }

    let doneCalled =
    false;

    const done =
    function(){

      if(doneCalled){
        return;
      }

      doneCalled =
      true;

      if(img.decode){

        img.decode()
        .then(function(){
          resolve();
        })
        .catch(function(){
          resolve();
        });

        return;

      }

      resolve();

    };

    if(img.complete && img.naturalWidth !== 0){
      done();
      return;
    }

    img.onload =
    function(){
      done();
    };

    img.onerror =
    function(){
      resolve();
    };

    setTimeout(function(){
      resolve();
    },8000);

  });

}

async function shareSavedImage(){

  if(!latestSaveFile){

    try{

      latestSaveFile =
      await makeSaveFile();

    }catch(e){

      alert("画像がまだ準備できていません");
      return false;

    }

  }

  if(
    navigator.share &&
    latestSaveFile
  ){

    const shareData =
    {
      files:[latestSaveFile],
      title:"田子山富士 登頂記念証",
      text:"田子山富士 登頂記念証"
    };

    try{

      if(
        navigator.canShare &&
        !navigator.canShare({files:[latestSaveFile]})
      ){

        downloadFile(latestSaveFile);
        return false;

      }

      await navigator.share(shareData);

      return true;

    }catch(e){

      if(e && e.name === "AbortError"){
        return true;
      }

      downloadFile(latestSaveFile);

      return false;

    }

  }

  downloadFile(latestSaveFile);

  return false;

}

function downloadFile(file){

  const url =
  URL.createObjectURL(file);

  const a =
  document.createElement("a");

  a.href =
  url;

  a.download =
  file.name;

  document.body.appendChild(a);

  a.click();

  document.body.removeChild(a);

  setTimeout(function(){

    URL.revokeObjectURL(url);

  },1200);

}

async function fetchJson(url){

  const res =
  await fetch(
    url,
    {
      method:"GET",
      cache:"no-store"
    }
  );

  const text =
  await res.text();

  return parseJsonText(text);

}

function parseJsonText(text){

  try{

    return JSON.parse(text);

  }catch(e){

    const m =
    text.match(/^[^(]+\((.*)\);?$/);

    if(m && m[1]){
      return JSON.parse(m[1]);
    }

    throw e;

  }

}

function todayText(){

  const d =
  new Date();

  const y =
  d.getFullYear();

  const m =
  String(d.getMonth() + 1).padStart(2,"0");

  const day =
  String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;

}

function getString(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();

}

async function copyTextOnly(text){

  if(
    navigator.clipboard &&
    navigator.clipboard.writeText
  ){

    await navigator.clipboard.writeText(text);

    return true;

  }

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.style.position =
  "fixed";

  textarea.style.left =
  "-9999px";

  document.body.appendChild(textarea);

  textarea.focus();

  textarea.select();

  document.execCommand("copy");

  document.body.removeChild(textarea);

  return true;

}
