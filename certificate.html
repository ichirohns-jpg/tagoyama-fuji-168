<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>登頂記念証</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
padding:20px;
color:#fff;
}

.wrap{
max-width:900px;
margin:auto;
}

.card{
background:#000;
border:2px solid #d4af37;
border-radius:32px;
padding:18px;
box-shadow:
0 10px 30px rgba(0,0,0,.5);
}

.certificateImageBox{
position:relative;
overflow:hidden;
border-radius:24px;
background:#111;
min-height:420px;
}

.memorialImage{
width:100%;
display:block;
background:#111;
}

.overlay{
position:absolute;
inset:0;
padding:20px;
}

.topArea{
text-align:center;
padding-top:10px;
}

.shrine{
font-size:28px;
font-weight:900;
letter-spacing:4px;
color:#fff;
font-family:"Yu Mincho",serif;
text-shadow:
0 0 4px rgba(255,255,255,.95),
0 0 10px rgba(255,255,255,.8),
0 0 18px rgba(255,220,120,.45),
0 2px 6px rgba(0,0,0,.9);
}

.project{
margin-top:8px;
font-size:20px;
font-weight:900;
color:#f3d57a;
}

.bottomArea{
position:absolute;
left:0;
right:0;
bottom:35px;
text-align:center;
}

.round{
font-size:22px;
font-weight:900;
color:#fff;
}

.serial{
font-size:42px;
font-weight:900;
color:#f3d57a;
}

.date{
font-size:16px;
font-weight:700;
color:#fff;
margin-top:10px;
}

.btn{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:900;
cursor:pointer;
}

.save{background:#2ecc71;color:#fff;}
.copy{background:#607d8b;color:#fff;}
.fb{background:#1877f2;color:#fff;}
.x{background:#000;color:#fff;}
.line{background:#06c755;color:#fff;}
.home{background:#d4af37;color:#000;}

.footer{
margin-top:20px;
text-align:center;
color:#aaa;
font-size:14px;
}

</style>

</head>

<body>

<div class="wrap">

<div
id="certificate"
class="card">

<div
class="certificateImageBox">

<img
id="memorialImage"
class="memorialImage"
src=""
alt="記念画像"
crossorigin="anonymous">

<div class="overlay">

<div class="topArea">

<div class="shrine">
田子山富士
</div>

<div class="project">
登頂記念証
</div>

</div>

<div class="bottomArea">

<div
id="round"
class="round">
-
</div>

<div
id="serial"
class="serial">
-
</div>

<div
id="date"
class="date">
-
</div>

</div>

</div>

</div>

</div>

<button
class="btn save"
onclick="saveImage()">
📜 記念証を授かる
</button>

<button
class="btn copy"
onclick="copyUrl()">
① リンクをコピー
</button>

<button
class="btn fb"
onclick="shareFacebook()">
② Facebookを開く
</button>

<button
class="btn x"
onclick="shareX()">
X
</button>

<button
class="btn line"
onclick="shareLine()">
LINE
</button>

<button
class="btn home"
onclick="location.href='index.html'">
🏠 田子山富士へ戻る
</button>

<div class="footer">
田子山富士168の縁プロジェクト
</div>

</div>

<script>

const SHARE_BASE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

const params =
new URLSearchParams(
location.search
);

const latestSerial =
params.get("serial")
||
sessionStorage.getItem(
"latestSerial"
)
||
localStorage.getItem(
"latestSerial"
)
||
"1-0001";

const latestImageUrl =
params.get("imageUrl")
||
params.get("image")
||
sessionStorage.getItem(
"latestImageUrl"
)
||
localStorage.getItem(
"latestImageUrl"
)
||
"";

let latestClimbDate =
params.get("climbDate")
||
sessionStorage.getItem(
"latestClimbDate"
)
||
localStorage.getItem(
"latestClimbDate"
)
||
"";

if(!latestClimbDate){

const d =
new Date();

latestClimbDate =
d.getFullYear()
+"/"+
String(
d.getMonth()+1
).padStart(
2,"0"
)
+"/"+
String(
d.getDate()
).padStart(
2,"0"
);

}

const img =
document.getElementById(
"memorialImage"
);

if(latestImageUrl){

img.src =
latestImageUrl;

}

const serialParts =
latestSerial.split("-");

const climbCount =
parseInt(
serialParts[0]||"1",
10
);

const serialNo =
serialParts[1]||"0001";

document.getElementById(
"round"
).innerText =
"第"+
climbCount+
"回登頂記念";

document.getElementById(
"serial"
).innerText =
"No."+
serialNo;

document.getElementById(
"date"
).innerText =
latestClimbDate;

function copyUrl(){

const shareUrl =
SHARE_BASE+
"?serial="+
encodeURIComponent(
latestSerial
);

navigator.clipboard
.writeText(
shareUrl
);

alert(
"共有リンクをコピーしました"
);

}

function shareFacebook(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u="+
encodeURIComponent(
shareUrl=
SHARE_BASE+
"?serial="+
latestSerial
),
"_blank"
);

}

function shareX(){

window.open(
"https://twitter.com/intent/tweet?url="+
encodeURIComponent(
SHARE_BASE+
"?serial="+
latestSerial
),
"_blank"
);

}

function shareLine(){

window.open(
"https://social-plugins.line.me/lineit/share?url="+
encodeURIComponent(
SHARE_BASE+
"?serial="+
latestSerial
),
"_blank"
);

}

function waitImageLoaded(image){

return new Promise(resolve=>{

if(
!image ||
!image.src ||
image.complete
){

resolve();

return;

}

image.onload =
()=>resolve();

image.onerror =
()=>resolve();

});

}

async function saveImage(){

const btn =
document.querySelector(
".btn.save"
);

btn.disabled = true;

btn.innerText =
"保存画像を作成中...";

try{

await waitImageLoaded(
document.getElementById(
"memorialImage"
)
);

const canvas =
await html2canvas(
document.getElementById(
"certificate"
),
{
scale:3,
useCORS:true,
backgroundColor:"#000000"
}
);

showImagePopup(
canvas.toDataURL(
"image/png"
)
);

}catch(err){

alert(
"画像の作成に失敗しました"
);

}finally{

btn.disabled = false;

btn.innerText =
"📜 記念証を授かる";

}

}

function showImagePopup(dataUrl){

const overlay =
document.createElement("div");

overlay.style =
"position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;z-index:99999;";

overlay.innerHTML=`

<div style="color:#fff;font-size:22px;text-align:center;line-height:1.8;margin-bottom:20px;">

登頂記念証が完成しました。<br>
画像をタップして拡大後、<br>
長押しして保存してください。

</div>

<a href="${dataUrl}" target="_blank">

<img
src="${dataUrl}"
style="max-width:100%;border-radius:20px;">

</a>

<button
style="margin-top:20px;padding:16px 30px;border:none;border-radius:16px;background:#d4af37;font-size:20px;font-weight:bold;"
onclick="this.parentElement.remove()">

閉じる

</button>

`;

document.body.appendChild(
overlay);

}

</script>

</body>
</html>
