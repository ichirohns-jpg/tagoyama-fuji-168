<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>登頂記念証</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
padding:20px;
color:#fff;
}

.wrap{
max-width:900px;
margin:auto;
}

.card{
background:#000;
border:2px solid #d4af37;
border-radius:32px;
padding:18px;
box-shadow:
0 10px 30px rgba(0,0,0,.5);
}

.certificateImageBox{
position:relative;
overflow:hidden;
border-radius:24px;
}

.memorialImage{
width:100%;
display:block;
}

.overlay{
position:absolute;
inset:0;
padding:20px;
}

.topArea{
text-align:center;
padding-top:10px;
}

.shrine{
font-size:28px;
font-weight:900;
letter-spacing:4px;
color:#ffffff;
font-family:
"Yu Mincho",
serif;

text-shadow:
0 2px 4px rgba(0,0,0,.9),
0 4px 12px rgba(0,0,0,.8),
0 0 20px rgba(0,0,0,.7);
}

.project{
margin-top:8px;
font-size:20px;
font-weight:900;
color:#f3d57a;

text-shadow:
0 2px 4px rgba(0,0,0,.9),
0 4px 12px rgba(0,0,0,.8),
0 0 20px rgba(0,0,0,.7);
}

.bottomArea{
position:absolute;
left:0;
right:0;
bottom:35px;
text-align:center;
}

.round{
font-size:22px;
font-weight:900;
line-height:1.5;
color:#ffffff;

text-shadow:
0 2px 4px rgba(0,0,0,.9),
0 4px 12px rgba(0,0,0,.8),
0 0 20px rgba(0,0,0,.7);
}

.serial{
font-size:42px;
font-weight:900;
color:#f3d57a;
letter-spacing:1px;
line-height:1.1;

text-shadow:
0 2px 4px rgba(0,0,0,.9),
0 4px 12px rgba(0,0,0,.8),
0 0 20px rgba(0,0,0,.7);
}

.date{
font-size:16px;
font-weight:700;
color:#ffffff;
margin-top:10px;

text-shadow:
0 2px 4px rgba(0,0,0,.9),
0 4px 12px rgba(0,0,0,.8),
0 0 20px rgba(0,0,0,.7);
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:16px;
margin-top:12px;
font-size:20px;
font-weight:900;
cursor:pointer;
}

.save{
background:#2ecc71;
color:#fff;
}

.fb{
background:#1877f2;
color:#fff;
}

.fbGuide{
background:#1c1c1c;
border:1px solid #333;
border-radius:12px;
padding:10px 14px;
margin-top:10px;
margin-bottom:10px;
font-size:15px;
line-height:1.6;
text-align:center;
color:#d0d0d0;
}

.x{
background:#000;
color:#fff;
}

.line{
background:#06c755;
color:#fff;
}

.copy{
background:#607d8b;
color:#fff;
}

.home{
background:#d4af37;
color:#000;
font-weight:900;
}

.footer{
margin-top:20px;
text-align:center;
color:#aaa;
font-size:14px;
}

</style>
</head>

<body>

<div class="wrap">

<div
id="certificate"
class="card">

<div
class="certificateImageBox">

<img
id="memorialImage"
class="memorialImage"
src="sakura01.jpg"
alt="記念画像"
crossorigin="anonymous">

<div class="overlay">

<div class="topArea">

<div class="shrine">
田子山富士
</div>

<div class="project">
登頂記念証
</div>

</div>

<div class="bottomArea">

<div
id="round"
class="round">
第1回登頂記念
</div>

<div
id="serial"
class="serial">
No.0001
</div>

<div
id="date"
class="date">
令和8年6月21日
</div>

</div>

</div>

</div>

</div>

<button
class="btn save"
onclick="saveImage()">
📜 記念証を授かる
</button>

<button
class="btn fb"
onclick="shareFacebook()">
Facebook
</button>

<div class="fbGuide">

📘 Facebookは
「リンクをコピー」して投稿欄へ貼り付けると
画像付きで共有できます

</div>

<button
class="btn x"
onclick="shareX()">
X
</button>

<button
class="btn line"
onclick="shareLine()">
LINE
</button>

<button
class="btn copy"
onclick="copyUrl()">
リンクをコピー
</button>

<button
class="btn home"
onclick="location.href='https://ichirohns-jpg.github.io/tagoyama-fuji-168/'">
🏠 田子山富士へ戻る
</button>

<div class="footer">
田子山富士 168の縁プロジェクト
</div>
