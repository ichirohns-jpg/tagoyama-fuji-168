<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>田子山富士 登頂記念証</title>

  <meta name="description" content="田子山富士 168の縁プロジェクト 登頂記念証">
  <meta property="og:title" content="田子山富士 登頂記念証">
  <meta property="og:description" content="田子山富士 168の縁プロジェクト 登頂記念証">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png">

  <style>
    :root {
      --bg1: #050505;
      --bg2: #17110a;
      --gold: #d8b35a;
      --gold2: #fff1aa;
      --text: #fff8dc;
      --muted: #d7c69a;
      --card: rgba(25, 18, 8, 0.92);
      --line: rgba(216, 179, 90, 0.45);
      --danger: #ffdddd;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(216, 179, 90, 0.22), transparent 38%),
        linear-gradient(180deg, var(--bg2), var(--bg1) 58%, #000);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Meiryo", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      padding-bottom: env(safe-area-inset-bottom);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.82)),
        url("logo.png") center/cover no-repeat;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.55);
      min-height: 220px;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 241, 170, 0.18), transparent 34%),
        linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.75));
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      text-align: center;
      padding: 28px 18px 24px;
    }

    .project {
      font-size: 14px;
      color: var(--gold2);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.24;
      color: #fff8d8;
      letter-spacing: 0.08em;
      text-shadow: 0 3px 12px rgba(0,0,0,0.95);
    }

    .lead {
      margin: 12px 0 0;
      font-size: 15px;
      line-height: 1.8;
      color: #f7e9b8;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    }

    .top-actions {
      display: flex;
      gap: 10px;
      margin: 14px 0;
    }

    .top-actions a {
      flex: 1;
      display: block;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      color: var(--gold2);
      font-weight: 800;
      font-size: 15px;
    }

    .panel {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 16px 36px rgba(0,0,0,0.42);
      overflow: hidden;
    }

    .panel-head {
      padding: 18px 18px 12px;
      text-align: center;
      border-bottom: 1px solid rgba(216,179,90,0.24);
      background: linear-gradient(180deg, rgba(216,179,90,0.15), rgba(0,0,0,0));
    }

    .panel-head h2 {
      margin: 0;
      font-size: 23px;
      color: var(--gold2);
      letter-spacing: 0.08em;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .certificate-wrap {
      padding: 16px;
    }

    .certificate {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255, 241, 170, 0.48);
      background:
        radial-gradient(circle at top, rgba(255, 241, 170, 0.18), transparent 34%),
        linear-gradient(180deg, #2b1d0b, #050505);
      box-shadow:
        inset 0 0 0 2px rgba(0,0,0,0.35),
        0 18px 35px rgba(0,0,0,0.55);
    }

    .certificate img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.82;
      filter: contrast(1.05) saturate(0.96);
    }

    .certificate::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 22%, rgba(255, 241, 170, 0.22), transparent 28%),
        linear-gradient(180deg, rgba(0,0,0,0.08), rgba(0,0,0,0.36) 43%, rgba(0,0,0,0.78));
      pointer-events: none;
    }

    .certificate-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 22px 18px 32px;
      text-align: center;
      text-shadow: 0 3px 10px rgba(0,0,0,0.9);
    }

    .seal {
      width: 94px;
      height: 94px;
      border-radius: 999px;
      border: 2px solid rgba(255, 241, 170, 0.9);
      background:
        radial-gradient(circle, rgba(255,241,170,0.38), rgba(216,179,90,0.14) 58%, rgba(0,0,0,0.25));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold2);
      font-weight: 900;
      font-size: 21px;
      line-height: 1.25;
      margin-bottom: auto;
      margin-top: 18px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.45);
    }

    .cert-label {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: var(--gold2);
      margin-bottom: 10px;
    }

    .cert-title {
      font-size: 30px;
      font-weight: 900;
      line-height: 1.28;
      color: #fffbe0;
      margin-bottom: 14px;
    }

    .cert-no {
      font-size: 20px;
      font-weight: 900;
      color: #fff3b0;
      margin-bottom: 8px;
    }

    .cert-date,
    .cert-people {
      font-size: 15px;
      color: #f8e9b8;
      line-height: 1.55;
    }

    .button-area {
      padding: 0 16px 18px;
    }

    .main-button,
    .sub-button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px 14px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .main-button {
      color: #201200;
      background: linear-gradient(180deg, #fff1aa, #d8b35a);
      box-shadow: 0 10px 22px rgba(216,179,90,0.28);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .sub-button {
      color: #fff7d2;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(216,179,90,0.4);
      font-size: 15px;
      padding: 13px 10px;
    }

    .link-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .link-row a {
      display: block;
      text-align: center;
      border-radius: 18px;
      padding: 14px 10px;
      background: rgba(0,0,0,0.32);
      border: 1px solid rgba(216,179,90,0.36);
      color: var(--gold2);
      font-weight: 900;
      font-size: 15px;
    }

    .note {
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      text-align: center;
    }

    .save-preview {
      display: none;
      margin: 14px 16px 18px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(216,179,90,0.45);
      background: rgba(0,0,0,0.32);
      text-align: center;
    }

    .save-preview img {
      width: 100%;
      max-width: 430px;
      border-radius: 16px;
      border: 1px solid rgba(255,241,170,0.45);
    }

    .save-preview p {
      margin: 10px 0 0;
      color: #fff3b0;
      font-size: 14px;
      line-height: 1.7;
      font-weight: 800;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: rgba(255,248,220,0.72);
      font-size: 12px;
      line-height: 1.7;
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 390px) {
      h1 {
        font-size: 26px;
      }

      .cert-title {
        font-size: 25px;
      }

      .seal {
        width: 82px;
        height: 82px;
        font-size: 18px;
      }

      .main-button {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <section class="hero">
      <div class="hero-inner">
        <div class="project">田子山富士 168の縁プロジェクト</div>
        <h1>登頂記念証</h1>
        <p class="lead">
          登頂記念証は<br>
          山頂QRから登頂受付後に表示されます。
        </p>
      </div>
    </section>

    <div class="top-actions">
      <a href="index.html">トップへ戻る</a>
    </div>

    <section class="panel">
      <div class="panel-head">
        <h2>登頂記念証</h2>
        <div id="statusText" class="status">登頂記録を読み込んでいます。</div>
      </div>

      <div class="certificate-wrap">
        <div id="certificateCard" class="certificate">
          <img id="certificateImage" src="logo.png" alt="田子山富士">
          <div class="certificate-content">
            <div class="seal">田子<br>山富士</div>
            <div class="cert-label">登頂記念</div>
            <div id="climbTitle" class="cert-title">第--回 登頂記念</div>
            <div id="serialText" class="cert-no">No.取得中</div>
            <div id="dateText" class="cert-date">日付取得中</div>
            <div id="peopleText" class="cert-people">参加人数 取得中</div>
          </div>
        </div>
      </div>

      <div class="note">
        登頂記念証を保存したり、SNSでシェアできます。
      </div>

      <div class="button-area">
        <button class="main-button" type="button" onclick="saveCertificateImage()">
          画像を保存
        </button>

        <div class="grid">
          <button class="sub-button" type="button" onclick="shareFacebook()">Facebookに投稿</button>
          <button class="sub-button" type="button" onclick="shareLine()">LINEで送る</button>
          <button class="sub-button" type="button" onclick="shareX()">Xで投稿</button>
          <button class="sub-button" type="button" onclick="copyResult()">結果をコピー</button>
        </div>

        <div class="link-row">
          <a id="omikujiLink" href="omikuji.html">おみくじへ</a>
          <a href="index.html">トップへ戻る</a>
        </div>
      </div>

      <div id="savePreview" class="save-preview">
        <img id="savePreviewImage" alt="保存用 登頂記念証">
        <p>
          保存用画像を表示しました。<br>
          iPhoneでは共有メニューまたは画像保存で保存してください。
        </p>
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      登頂記念証
    </footer>
  </div>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

    const DEFAULT_IMAGE_URL = "logo.png";

    let certificateData = {
      userId: "",
      climbCount: "",
      serialNo: "",
      lastDate: "",
      participantNo: "",
      imageUrl: DEFAULT_IMAGE_URL
    };

    document.addEventListener("DOMContentLoaded", function() {
      startCertificate();
    });

    async function startCertificate() {
      const params = new URLSearchParams(window.location.search);
      const userId =
        params.get("userId") ||
        params.get("id") ||
        params.get("uid") ||
        localStorage.getItem("tagoyamaUserId") ||
        "";

      certificateData.userId = userId;

      if (userId) {
        localStorage.setItem("tagoyamaUserId", userId);
      }

      setOmikujiLink(userId);

      if (!userId) {
        setStatus("登頂記録が見つかりません。山頂QRから登頂受付後に表示してください。", true);
        renderCertificate(certificateData);
        return;
      }

      try {
        const data = await loadClimbHistory(userId);
        certificateData = normalizeCertificateData(data, userId);
        renderCertificate(certificateData);
        setStatus("登頂記録を読み込みました。");
      } catch (error) {
        console.error(error);
        setStatus("登頂記録を読み込めませんでした。表示中の記念証は保存できます。", true);
        renderCertificate(certificateData);
      }
    }

    async function loadClimbHistory(userId) {
      const encodedUserId = encodeURIComponent(userId);

      const urls = [
        GAS_URL + "?climbHistory&userId=" + encodedUserId,
        GAS_URL + "?climbHistory=1&userId=" + encodedUserId,
        GAS_URL + "?action=climbHistory&userId=" + encodedUserId,
        GAS_URL + "?mode=climbHistory&userId=" + encodedUserId
      ];

      let lastError = null;

      for (const url of urls) {
        try {
          const data = await loadJson(url);
          if (data && typeof data === "object") {
            return data;
          }
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("登頂履歴を取得できませんでした。");
    }

    async function loadJson(url) {
      try {
        const res = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        return await res.json();
      } catch (fetchError) {
        return await loadJsonp(url);
      }
    }

    function loadJsonp(url) {
      return new Promise(function(resolve, reject) {
        const callbackName =
          "tagoyamaCallback_" +
          Date.now() +
          "_" +
          Math.floor(Math.random() * 100000);

        const script = document.createElement("script");
        const sep = url.indexOf("?") >= 0 ? "&" : "?";
        script.src = url + sep + "callback=" + callbackName;

        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 12000);

        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("JSONP error"));
        };

        function cleanup() {
          clearTimeout(timer);
          delete window[callbackName];
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        document.body.appendChild(script);
      });
    }

    function normalizeCertificateData(data, userId) {
      const d = data || {};

      const climbCount =
        d.climbCount ||
        d.count ||
        d.times ||
        d.climb_count ||
        certificateData.climbCount ||
        "";

      const serialNo =
        d.serialNo ||
        d.serial ||
        d.no ||
        d.serial_no ||
        certificateData.serialNo ||
        "";

      const lastDate =
        d.lastDate ||
        d.date ||
        d.climbDate ||
        d.last_date ||
        certificateData.lastDate ||
        "";

      const participantNo =
        d.participantNo ||
        d.participant ||
        d.total ||
        d.people ||
        d.participant_no ||
        certificateData.participantNo ||
        "";

      const imageUrl =
        d.imageUrl ||
        d.certificateImageUrl ||
        d.certificateUrl ||
        d.image ||
        certificateData.imageUrl ||
        DEFAULT_IMAGE_URL;

      return {
        userId: userId,
        climbCount: String(climbCount || ""),
        serialNo: String(serialNo || ""),
        lastDate: String(lastDate || ""),
        participantNo: String(participantNo || ""),
        imageUrl: normalizeImageUrl(String(imageUrl || DEFAULT_IMAGE_URL))
      };
    }

    function renderCertificate(data) {
      const climbCount = data.climbCount || "--";
      const serialNo = data.serialNo || "取得中";
      const lastDate = data.lastDate || getTodayText();
      const participantNo = data.participantNo || "取得中";
      const imageUrl = data.imageUrl || DEFAULT_IMAGE_URL;

      document.getElementById("climbTitle").textContent =
        "第" + climbCount + "回 登頂記念";

      document.getElementById("serialText").textContent =
        "No." + serialNo;

      document.getElementById("dateText").textContent =
        lastDate;

      document.getElementById("peopleText").textContent =
        "参加人数 " + participantNo;

      const img = document.getElementById("certificateImage");
      img.src = imageUrl;
    }

    function setStatus(text, isError) {
      const el = document.getElementById("statusText");
      el.textContent = text;
      if (isError) {
        el.classList.add("error");
      } else {
        el.classList.remove("error");
      }
    }

    function setOmikujiLink(userId) {
      const link = document.getElementById("omikujiLink");
      if (!link) return;

      if (userId) {
        link.href = "omikuji.html?userId=" + encodeURIComponent(userId);
      } else {
        link.href = "omikuji.html";
      }
    }

    function normalizeImageUrl(url) {
      if (!url) return DEFAULT_IMAGE_URL;

      let u = String(url).trim();

      if (!u) return DEFAULT_IMAGE_URL;

      const fileMatch = u.match(/drive\.google\.com\/file\/d\/([^/]+)/);
      if (fileMatch && fileMatch[1]) {
        return "https://drive.google.com/thumbnail?id=" + fileMatch[1] + "&sz=w2000";
      }

      const idMatch = u.match(/[?&]id=([^&]+)/);
      if (u.indexOf("drive.google.com") >= 0 && idMatch && idMatch[1]) {
        return "https://drive.google.com/thumbnail?id=" + idMatch[1] + "&sz=w2000";
      }

      return u;
    }

    function getTodayText() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return y + "/" + m + "/" + day;
    }

    async function saveCertificateImage() {
      const button = document.querySelector(".main-button");

      try {
        if (button) {
          button.disabled = true;
          button.textContent = "画像を作成中";
        }

        const canvas = await createCertificateCanvas();
        const blob = await canvasToBlob(canvas);

        const file = new File(
          [blob],
          "tagoyama-fuji-certificate.png",
          { type: "image/png" }
        );

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: "田子山富士 登頂記念証",
            text: buildShareText()
          });
          return;
        }

        const objectUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = objectUrl;
        a.download = "tagoyama-fuji-certificate.png";
        document.body.appendChild(a);
        a.click();
        a.remove();

        setTimeout(function() {
          URL.revokeObjectURL(objectUrl);
        }, 3000);

        showSavePreview(canvas);

      } catch (error) {
        console.error(error);

        try {
          const canvas = await createFallbackCertificateCanvas();
          showSavePreview(canvas);
          alert("保存用画像を画面に表示しました。");
        } catch (fallbackError) {
          console.error(fallbackError);
          alert("記念画像を作成できませんでした。");
        }
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = "画像を保存";
        }
      }
    }

    async function createCertificateCanvas() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const width = 1200;
      const height = 1600;

      canvas.width = width;
      canvas.height = height;

      drawBaseBackground(ctx, width, height);

      const imageUrl =
        normalizeImageUrl(certificateData.imageUrl || DEFAULT_IMAGE_URL);

      try {
        const img = await loadImageSafe(imageUrl);
        drawCoverImage(ctx, img, width, height);
        drawImageOverlay(ctx, width, height);
      } catch (error) {
        console.warn("背景画像なしで記念証を作成します", error);
        drawBaseBackground(ctx, width, height);
      }

      drawCertificateFrame(ctx, width, height);
      drawCertificateTexts(ctx, width, height);

      return canvas;
    }

    async function createFallbackCertificateCanvas() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const width = 1200;
      const height = 1600;

      canvas.width = width;
      canvas.height = height;

      drawBaseBackground(ctx, width, height);
      drawCertificateFrame(ctx, width, height);
      drawCertificateTexts(ctx, width, height);

      return canvas;
    }

    function loadImageSafe(url) {
      return new Promise(function(resolve, reject) {
        const img = new Image();
        img.crossOrigin = "anonymous";

        img.onload = function() {
          resolve(img);
        };

        img.onerror = function() {
          reject(new Error("画像読み込み失敗: " + url));
        };

        img.src = url;
      });
    }

    function drawCoverImage(ctx, img, width, height) {
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;

      if (!iw || !ih) return;

      const scale = Math.max(width / iw, height / ih);
      const sw = width / scale;
      const sh = height / scale;
      const sx = (iw - sw) / 2;
      const sy = (ih - sh) / 2;

      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, width, height);
    }

    function drawBaseBackground(ctx, width, height) {
      const grad = ctx.createLinearGradient(0, 0, 0, height);
      grad.addColorStop(0, "#38260e");
      grad.addColorStop(0.36, "#171009");
      grad.addColorStop(1, "#000000");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);

      const glow = ctx.createRadialGradient(
        width / 2,
        height * 0.2,
        20,
        width / 2,
        height * 0.2,
        width * 0.72
      );
      glow.addColorStop(0, "rgba(255,241,170,0.36)");
      glow.addColorStop(0.35, "rgba(216,179,90,0.13)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, height);
    }

    function drawImageOverlay(ctx, width, height) {
      const grad = ctx.createLinearGradient(0, 0, 0, height);
      grad.addColorStop(0, "rgba(0,0,0,0.10)");
      grad.addColorStop(0.38, "rgba(0,0,0,0.24)");
      grad.addColorStop(0.72, "rgba(0,0,0,0.68)");
      grad.addColorStop(1, "rgba(0,0,0,0.92)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);
    }

    function drawCertificateFrame(ctx, width, height) {
      ctx.save();

      ctx.strokeStyle = "rgba(255,241,170,0.95)";
      ctx.lineWidth = 10;
      roundRect(ctx, 54, 54, width - 108, height - 108, 46);
      ctx.stroke();

      ctx.strokeStyle = "rgba(216,179,90,0.62)";
      ctx.lineWidth = 4;
      roundRect(ctx, 82, 82, width - 164, height - 164, 34);
      ctx.stroke();

      ctx.fillStyle = "rgba(0,0,0,0.32)";
      roundRect(ctx, 120, height * 0.58, width - 240, height * 0.31, 34);
      ctx.fill();

      ctx.restore();
    }

    function drawCertificateTexts(ctx, width, height) {
      const climbCount = certificateData.climbCount || "--";
      const serialNo = certificateData.serialNo || "取得中";
      const lastDate = certificateData.lastDate || getTodayText();
      const participantNo = certificateData.participantNo || "取得中";

      ctx.save();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.shadowColor = "rgba(0,0,0,0.88)";
      ctx.shadowBlur = 18;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 5;

      drawSeal(ctx, width / 2, height * 0.20, 120);

      ctx.fillStyle = "#fff1aa";
      ctx.font = "900 46px sans-serif";
      ctx.fillText("田子山富士 168の縁プロジェクト", width / 2, height * 0.41);

      ctx.fillStyle = "#fffbe0";
      ctx.font = "900 78px sans-serif";
      ctx.fillText("登頂記念証", width / 2, height * 0.50);

      ctx.fillStyle = "#fff8dc";
      ctx.font = "900 72px sans-serif";
      ctx.fillText("第" + climbCount + "回 登頂記念", width / 2, height * 0.66);

      ctx.fillStyle = "#fff1aa";
      ctx.font = "900 48px sans-serif";
      ctx.fillText("No." + serialNo, width / 2, height * 0.74);

      ctx.fillStyle = "#f8e9b8";
      ctx.font = "800 38px sans-serif";
      ctx.fillText(lastDate, width / 2, height * 0.80);

      ctx.font = "800 34px sans-serif";
      ctx.fillText("参加人数 " + participantNo, width / 2, height * 0.85);

      ctx.fillStyle = "rgba(255,248,220,0.9)";
      ctx.font = "700 28px sans-serif";
      ctx.fillText("田子山富士", width / 2, height * 0.92);

      ctx.restore();
    }

    function drawSeal(ctx, cx, cy, r) {
      ctx.save();

      const grad = ctx.createRadialGradient(cx, cy, 8, cx, cy, r);
      grad.addColorStop(0, "rgba(255,241,170,0.50)");
      grad.addColorStop(0.62, "rgba(216,179,90,0.28)");
      grad.addColorStop(1, "rgba(0,0,0,0.18)");

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.lineWidth = 8;
      ctx.strokeStyle = "rgba(255,241,170,0.95)";
      ctx.stroke();

      ctx.fillStyle = "#fff1aa";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "900 46px sans-serif";
      ctx.fillText("田子", cx, cy - 28);
      ctx.fillText("山富士", cx, cy + 30);

      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);

      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function canvasToBlob(canvas) {
      return new Promise(function(resolve, reject) {
        canvas.toBlob(function(blob) {
          if (blob) {
            resolve(blob);
          } else {
            reject(new Error("blob作成失敗"));
          }
        }, "image/png");
      });
    }

    function showSavePreview(canvas) {
      const dataUrl = canvas.toDataURL("image/png");
      const box = document.getElementById("savePreview");
      const img = document.getElementById("savePreviewImage");

      img.src = dataUrl;
      box.style.display = "block";

      setTimeout(function() {
        box.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      }, 100);
    }

    function buildShareText() {
      const climbCount = certificateData.climbCount || "--";
      const serialNo = certificateData.serialNo || "取得中";
      const lastDate = certificateData.lastDate || getTodayText();

      return "田子山富士 登頂記念証\n" +
        "第" + climbCount + "回 登頂記念\n" +
        "No." + serialNo + "\n" +
        lastDate;
    }

    function buildShareUrl() {
      const base =
        location.origin +
        location.pathname.replace(/certificate\.html.*$/, "share-certificate.html");

      const params = new URLSearchParams();

      if (certificateData.userId) {
        params.set("userId", certificateData.userId);
      }

      if (certificateData.climbCount) {
        params.set("climbCount", certificateData.climbCount);
      }

      if (certificateData.serialNo) {
        params.set("serialNo", certificateData.serialNo);
      }

      if (certificateData.lastDate) {
        params.set("date", certificateData.lastDate);
      }

      const query = params.toString();

      if (query) {
        return base + "?" + query;
      }

      return location.href;
    }

    function shareFacebook() {
      const url = buildShareUrl();
      const shareUrl =
        "https://www.facebook.com/sharer/sharer.php?u=" +
        encodeURIComponent(url);

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    function shareLine() {
      const text = buildShareText() + "\n" + buildShareUrl();
      const shareUrl =
        "https://social-plugins.line.me/lineit/share?url=" +
        encodeURIComponent(buildShareUrl()) +
        "&text=" +
        encodeURIComponent(text);

      location.href = shareUrl;
    }

    function shareX() {
      const text = buildShareText();
      const shareUrl =
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(text) +
        "&url=" +
        encodeURIComponent(buildShareUrl());

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    async function copyResult() {
      const text = buildShareText() + "\n" + buildShareUrl();

      try {
        await navigator.clipboard.writeText(text);
        alert("登頂記念証の結果をコピーしました。");
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
        alert("登頂記念証の結果をコピーしました。");
      }
    }

    window.saveCertificateImage = saveCertificateImage;
    window.downloadCertificateImage = saveCertificateImage;
    window.downloadCertificate = saveCertificateImage;
    window.shareCertificateImage = saveCertificateImage;
  </script>
</body>
