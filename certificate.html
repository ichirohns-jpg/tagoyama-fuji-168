<body>

<div class="wrap">

<div class="status" id="status">
登頂記念証を読み込んでいます。
</div>

<div class="certificateWrap">

<div class="certificateCard" id="certificateCard">

<img
id="bgImage"
class="bgImage"
src=""
alt="田子山富士 登頂記念証">

<div class="frameOuter"></div>
<div class="frameInner"></div>

<div class="topTitle">
<div class="topTitleSmall">
田子山富士
</div>
<div class="topTitleMain">
登頂記念証
</div>
</div>

<div class="infoPanel">

<div class="infoOrnament"></div>

<div class="infoLine"></div>

<div class="countText" id="countText">
第--回　登頂記念
</div>

<div class="serialText" id="serialText">
No.----
</div>

<div class="dateText" id="dateText">
----
</div>

</div>

</div>

</div>

<div class="buttonArea">

<button class="btn goldBtn" id="saveBtn" onclick="saveCertificateImage(this)">
画像を保存・共有
</button>

<button class="btn greenBtn" id="shareBtn" onclick="shareCertificateLink(this)">
登頂記念証をシェア
</button>

<button class="btn blackBtn" onclick="goBack()">
← トップへ戻る
</button>

</div>

<div class="footer">
田子山富士 168の縁プロジェクト<br>
登頂記念証
</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzvMzzESm9atr6QWKvFwVlVMFYSAsj_oF0ZTCE7L0ojrX1VJhRWGaoLCD1Judga8vSb/exec";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

let currentUserId =
"";

let certificateData =
null;

let latestCertificateFile =
null;

window.addEventListener(
"load",
init
);

async function init(){

  currentUserId =
  getUserIdFromUrl();

  if(!currentUserId){

    setStatus("userId がありません。山頂QRコードから登頂受付をしてください。");
    return;

  }

  await loadCertificate();

}

function getUserIdFromUrl(){

  const params =
  new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    ""
  );

}

async function loadCertificate(){

  try{

    setStatus("登頂記念証を読み込んでいます。");

    const data =
    await fetchJson(
      GAS_URL +
      "?mode=certificate" +
      "&userId=" +
      encodeURIComponent(currentUserId) +
      "&t=" +
      Date.now()
    );

    if(!data || !data.success){

      throw new Error(
        data && data.message
        ? data.message
        : "登頂記念証を取得できませんでした"
      );

    }

    const item =
    data.result ||
    data.certificate ||
    data.data ||
    data;

    certificateData =
    item;

    const imageUrl =
    getCertificateImageUrl(item);

    const bg =
    document.getElementById("bgImage");

    if(imageUrl){

      bg.src =
      imageUrl;

    }else{

      bg.style.background =
      "linear-gradient(180deg,#222,#000)";

    }

    const count =
    getCertificateCount(item);

    const serial =
    getCertificateSerial(item);

    const date =
    getCertificateDate(item);

    document.getElementById("countText").innerText =
    "第" +
    (count || "--") +
    "回　登頂記念";

    document.getElementById("serialText").innerText =
    "No." +
    (serial || "----");

    document.getElementById("dateText").innerText =
    date || todayText();

    document.title =
    "田子山富士 登頂記念証" +
    (serial ? " No." + serial : "");

    setStatus("登頂記念証を表示しました。");

  }catch(err){

    setStatus(
      err.message ||
      "登頂記念証を表示できませんでした。"
    );

  }

}

function getCertificateImageUrl(data){

  data = data || {};

  return getString(
    data.imageUrl ||
    data.imageURL ||
    data.image ||
    data.url ||
    data.backgroundImage ||
    data.bgImage ||
    data.certificateImage ||
    data.certificateImageUrl ||
    data.photoUrl ||
    data.photoURL ||
    ""
  );

}

function getCertificateCount(data){

  data = data || {};

  return getString(
    data.count ||
    data.round ||
    data.climbCount ||
    data.climbNo ||
    data.climbNumber ||
    data.times ||
    ""
  );

}

function getCertificateSerial(data){

  data = data || {};

  const candidates = [
    data.serial,
    data.serialNo,
    data.serialNumber,
    data.certificateNo,
    data.certificateNumber,
    data.climbSerial,
    data.recordNo,
    data.recordNumber
  ];

  for(let i=0;i<candidates.length;i++){

    const value =
    cleanSerial(candidates[i]);

    if(/^\d{1,3}-\d{4}$/.test(value)){
      return value;
    }

  }

  const text =
  JSON.stringify(data);

  const match =
  text.match(/(?:No\.?\s*)?(\d{1,3}-\d{4})/);

  if(match && match[1]){
    return match[1];
  }

  return "";

}

function getCertificateDate(data){

  data = data || {};

  const value =
  getString(
    data.date ||
    data.createdAt ||
    data.created ||
    data.time ||
    data.datetime ||
    ""
  );

  if(value){

    const m =
    value.match(/\d{4}\/\d{2}\/\d{2}/) ||
    value.match(/\d{4}-\d{2}-\d{2}/);

    if(m && m[0]){

      return m[0].replace(/-/g,"/");

    }

    return value;

  }

  return todayText();

}

async function saveCertificateImage(btn){

  if(btn){

    btn.disabled =
    true;

    btn.innerText =
    "画像を準備中...";

  }

  try{

    const file =
    await makeCertificateFile();

    if(!navigator.share){

      downloadFile(file);
      return;

    }

    const data =
    {
      files:[file],
      title:"田子山富士 登頂記念証",
      text:"田子山富士168の縁プロジェクト 登頂記念証"
    };

    if(
      navigator.canShare &&
      !navigator.canShare({files:[file]})
    ){

      downloadFile(file);
      return;

    }

    await navigator.share(data);

  }catch(err){

    alert(
      "画像を保存・共有できませんでした。\n時間をおいてもう一度お試しください。"
    );

  }finally{

    if(btn){

      btn.disabled =
      false;

      btn.innerText =
      "画像を保存・共有";

    }

  }

}

async function shareCertificateLink(btn){

  const serial =
  certificateData
  ? getCertificateSerial(certificateData)
  : "";

  const url =
  location.href;

  const text =
  "田子山富士168の縁プロジェクト\n登頂記念証" +
  (serial ? "\nNo." + serial : "") +
  "\n" +
  url;

  try{

    await copyTextOnly(text);

  }catch(e){}

  location.href =
  "https://www.facebook.com/sharer/sharer.php?u=" +
  encodeURIComponent(url);

}

async function makeCertificateFile(){

  if(latestCertificateFile){
    return latestCertificateFile;
  }

  const card =
  document.getElementById("certificateCard");

  if(document.fonts && document.fonts.ready){

    try{
      await document.fonts.ready;
    }catch(e){}

  }

  await waitForImage(
    document.getElementById("bgImage")
  );

  const canvas =
  await html2canvas(
    card,
    {
      backgroundColor:null,
      scale:3,
      useCORS:true,
      allowTaint:true,
      logging:false
    }
  );

  const blob =
  await new Promise(function(resolve){

    canvas.toBlob(
      resolve,
      "image/png",
      1
    );

  });

  if(!blob){
    throw new Error("画像作成に失敗しました");
  }

  latestCertificateFile =
  new File(
    [blob],
    "tagoyama-certificate.png",
    {
      type:"image/png"
    }
  );

  return latestCertificateFile;

}

function downloadFile(file){

  const url =
  URL.createObjectURL(file);

  const a =
  document.createElement("a");

  a.href =
  url;

  a.download =
  file.name;

  document.body.appendChild(a);

  a.click();

  document.body.removeChild(a);

  setTimeout(function(){

    URL.revokeObjectURL(url);

  },1000);

}

function waitForImage(img){

  return new Promise(function(resolve){

    if(!img || !img.src){
      resolve();
      return;
    }

    if(img.complete){
      resolve();
      return;
    }

    img.onload =
    function(){
      resolve();
    };

    img.onerror =
    function(){
      resolve();
    };

  });

}

async function fetchJson(url){

  const res =
  await fetch(
    url,
    {
      method:"GET",
      cache:"no-store"
    }
  );

  const text =
  await res.text();

  try{

    return JSON.parse(text);

  }catch(e){

    const m =
    text.match(/^[^(]+\((.*)\);?$/);

    if(m && m[1]){
      return JSON.parse(m[1]);
    }

    throw e;

  }

}

function setStatus(text){

  document.getElementById("status").innerText =
  text;

}

function goBack(){

  location.href =
  HOME_PAGE +
  "?v=" +
  Date.now();

}

function cleanSerial(value){

  value =
  getString(value);

  return value
  .replace(/^No\.?\s*/i,"")
  .trim();

}

function todayText(){

  const d =
  new Date();

  const y =
  d.getFullYear();

  const m =
  String(d.getMonth() + 1).padStart(2,"0");

  const day =
  String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;

}

function getString(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();

}

async function copyTextOnly(text){

  if(navigator.clipboard && navigator.clipboard.writeText){

    await navigator.clipboard.writeText(text);

    return true;

  }

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.style.position =
  "fixed";

  textarea.style.left =
  "-9999px";

  document.body.appendChild(textarea);

  textarea.focus();

  textarea.select();

  document.execCommand("copy");

  document.body.removeChild(textarea);

  return true;

}

</script>
