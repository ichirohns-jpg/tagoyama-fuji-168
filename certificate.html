<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzU1VqYGWdOvxpKEsLPJVQHU3bAUeI_vTe83Y3jpoPWUJJvH6NdMW3t-vosqVeLAyx8/exec";

const CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

let latestUserId="";
let latestCount=1;
let latestSerial="";
let latestDate="";
let latestImageName="";
let latestImageUrl="";
let latestImageData="";
let latestShareUrl="";
let latestImageSrc="";
let latestImageCors=false;
let latestSaveFile=null;
let latestSaveImageUrl="";

window.addEventListener(
"load",
loadCertificate
);

async function loadCertificate(){

const loading=
document.getElementById("loading");

const error=
document.getElementById("error");

const content=
document.getElementById("content");

error.style.display="none";
error.innerText="";
content.style.display="none";

try{

const params=
new URLSearchParams(location.search);

const userId=
params.get("userId")||
params.get("id")||
params.get("uid")||
localStorage.getItem("tagoyamaUserId")||
"";

if(!userId){
throw new Error("QRからアクセスしてください");
}

latestUserId=userId;

localStorage.setItem(
"tagoyamaUserId",
userId
);

latestShareUrl=
CERTIFICATE_PAGE+
"?userId="+
encodeURIComponent(userId);

const res=
await fetch(
GAS_URL+
"?mode=certificate"+
"&userId="+
encodeURIComponent(userId)+
"&t="+
Date.now()
);

const data=
await res.json();

if(!data.success){
throw new Error(
data.message||
"取得できません"
);
}

const fixed=
resolveCertificateData(data);

latestCount=fixed.count;
latestSerial=fixed.serial;
latestDate=fixed.date;
latestImageName=fixed.imageName;
latestImageUrl=fixed.imageUrl;
latestImageData=fixed.imageData;

setCertificateText();
setShareLinks();

loading.style.display="none";
content.style.display="block";

await loadCorrectImage();

}catch(err){

loading.style.display="none";
content.style.display="none";
error.style.display="block";
error.innerText=
err.message||
"取得できません";

}

}

function resolveCertificateData(data){

let count=
safeCount(data.count);

if(!count){
count=serialToCount(data.serial);
}

if(!count){
count=1;
}

let serial=
pickSerial(data.serial,count);

return {
count:count,
serial:serial,
date:pickDate(data),
imageName:pickImageName(data),
imageUrl:pickImageUrl(data),
imageData:pickImageData(data)
};

}

function safeCount(value){

const n=
Number(value);

if(!Number.isFinite(n)){
return 0;
}

const v=
Math.floor(n);

if(v<1 || v>168){
return 0;
}

return v;

}

function serialToCount(value){

const s=
getString(value);

if(!s){
return 0;
}

const m=
s.match(/^(\d{1,3})-\d{1,4}$/);

if(m && m[1]){
return safeCount(m[1]);
}

return 0;

}

function pickSerial(value,count){

const s=
getString(value);

if(/^\d{1,3}-\d{4}$/.test(s)){
return s;
}

return String(count || 1)+
"-0001";

}

async function loadCorrectImage(){

const imageInfo=
await fetchImageInfo(
latestCount
);

if(
imageInfo &&
imageInfo.success &&
imageInfo.imageUrl
){

latestImageUrl=
imageInfo.imageUrl;

latestImageName=
imageInfo.imageName||
latestImageName;

}

await loadMemorialImage();

}

async function fetchImageInfo(imageNo){

try{

const res=
await fetch(
GAS_URL+
"?mode=image"+
"&imageNo="+
encodeURIComponent(imageNo)+
"&t="+
Date.now()
);

const data=
await res.json();

return data;

}catch(e){

return null;

}

}

function setCertificateText(){

document.getElementById("climbText").innerText=
"第"+latestCount+"回 登頂記念";

document.getElementById("serialText").innerText=
"No."+latestSerial;

document.getElementById("dateText").innerText=
latestDate || todayText();

}

function setShareLinks(){

const share=
encodeURIComponent(latestShareUrl);

const text=
encodeURIComponent(
"田子山富士 登頂記念証を授かりました"
);

document.getElementById("lineShare").href=
"https://social-plugins.line.me/lineit/share?url="+share;

document.getElementById("facebookShare").href=
"https://www.facebook.com/sharer/sharer.php?u="+share;

document.getElementById("xShare").href=
"https://twitter.com/intent/tweet?text="+text+"&url="+share;

}

function getString(value){

if(value===null || value===undefined){
return "";
}

return String(value).trim();

}

function parseDateValue(value){

if(value===null || value===undefined || value===""){
return null;
}

if(value instanceof Date && !isNaN(value.getTime())){
return value;
}

if(typeof value==="number"){

if(value>45000 && value<80000){

const base=
new Date(1899,11,30);

const d=
new Date(
base.getTime()+
value*24*60*60*1000
);

if(!isNaN(d.getTime())){
return d;
}

}

return null;

}

const s=
getString(value);

if(!s){
return null;
}

let m=
s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);

if(m){

const d=
new Date(
Number(m[1]),
Number(m[2])-1,
Number(m[3])
);

if(!isNaN(d.getTime())){
return d;
}

}

m=
s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);

if(m){

let y=
Number(m[3]);

if(y<100){
y+=2000;
}

const d=
new Date(
y,
Number(m[1])-1,
Number(m[2])
);

if(!isNaN(d.getTime())){
return d;
}

}

const d=
new Date(s);

if(!isNaN(d.getTime())){
return d;
}

return null;

}

function isUsableDate(value){

const d=
parseDateValue(value);

if(!d){
return false;
}

const y=
d.getFullYear();

return y>=2024 && y<=2100;

}

function formatDate(value){

const d=
parseDateValue(value);

if(!d){
return "";
}

const y=
d.getFullYear();

const m=
String(d.getMonth()+1).padStart(2,"0");

const day=
String(d.getDate()).padStart(2,"0");

return y+"/"+m+"/"+day;

}

function todayText(){

const d=
new Date();

const y=
d.getFullYear();

const m=
String(d.getMonth()+1).padStart(2,"0");

const day=
String(d.getDate()).padStart(2,"0");

return y+"/"+m+"/"+day;

}

function pickDate(data){

const candidates=[
data.date,
data.climbDate,
data.displayDate,
data.visitDate,
data.createdAt,
data.timestamp,
data.time,
data.datetime
];

for(let i=0;i<candidates.length;i++){

if(isUsableDate(candidates[i])){
return formatDate(candidates[i]);
}

}

return todayText();

}

function pickImageName(data){

return getString(
data.imageName||
data.fileName||
data.name||
data.title||
""
);

}

function pickImageUrl(data){

return getString(
data.imageUrl||
data.imageURL||
data.url||
data.driveUrl||
data.driveURL||
data.fileUrl||
data.fileURL||
""
);

}

function pickImageData(data){

return getString(
data.imageData||
data.imageBase64||
data.base64||
data.dataUrl||
data.dataURL||
""
);

}

async function loadMemorialImage(){

const img=
document.getElementById("memorialImage");

latestImageSrc="";
latestImageCors=false;

const urls=
makeImageCandidates(
latestImageData,
latestImageUrl
);

for(let i=0;i<urls.length;i++){

try{

const result=
await tryImageUrl(
urls[i],
true
);

img.crossOrigin="anonymous";
img.src=result.src;
latestImageSrc=result.src;
latestImageCors=true;
return;

}catch(e){}

}

for(let i=0;i<urls.length;i++){

try{

const result=
await tryImageUrl(
urls[i],
false
);

img.removeAttribute("crossorigin");
img.src=result.src;
latestImageSrc=result.src;
latestImageCors=false;
return;

}catch(e){}

}

const fallback=
makeFallbackImage();

img.removeAttribute("crossorigin");
img.src=fallback;
latestImageSrc=fallback;
latestImageCors=true;

}

function makeImageCandidates(imageData,imageUrl){

const list=[];

const data=
normalizeImageData(imageData);

if(data){
addUnique(list,data);
}

const url=
getString(imageUrl);

if(/^data:image\//i.test(url)){
addUnique(list,url);
return list;
}

const id=
extractDriveId(url);

if(id){

addUnique(
list,
"https://drive.google.com/thumbnail?id="+
encodeURIComponent(id)+
"&sz=w1800"
);

addUnique(
list,
"https://lh3.googleusercontent.com/d/"+
encodeURIComponent(id)+
"=w1800"
);

addUnique(
list,
"https://drive.google.com/uc?export=view&id="+
encodeURIComponent(id)
);

addUnique(
list,
"https://drive.google.com/uc?export=download&id="+
encodeURIComponent(id)
);

}

if(url){
addUnique(list,url);
}

return list;

}

function normalizeImageData(value){

const s=
getString(value);

if(!s){
return "";
}

if(/^data:image\//i.test(s)){
return s;
}

if(/^https?:\/\//i.test(s)){
return "";
}

if(s.length>100 && /^[A-Za-z0-9+/=\r\n]+$/.test(s)){
return "data:image/png;base64,"+s.replace(/\s/g,"");
}

return "";

}

function extractDriveId(url){

const s=
getString(url);

if(!s){
return "";
}

let m=
s.match(/\/d\/([^\/?#]+)/);

if(m && m[1]){
return m[1];
}

m=
s.match(/[?&]id=([^&]+)/);

if(m && m[1]){
return m[1];
}

m=
s.match(/\/file\/d\/([^\/?#]+)/);

if(m && m[1]){
return m[1];
}

return "";

}

function addUnique(list,value){

const v=
getString(value);

if(!v){
return;
}

if(list.indexOf(v)===-1){
list.push(v);
}

}

function addCacheBuster(url){

const s=
getString(url);

if(!s){
return "";
}

if(/^data:image\//i.test(s)){
return s;
}

return s+
(s.includes("?")?"&":"?")+
"t="+
Date.now();

}

function tryImageUrl(url,useCors){

return new Promise((resolve,reject)=>{

const src=
addCacheBuster(url);

if(!src){
reject(new Error("画像を読み込めませんでした"));
return;
}

const test=
new Image();

test.referrerPolicy="no-referrer";

if(useCors && !/^data:image\//i.test(src)){
test.crossOrigin="anonymous";
}

let done=false;

const timer=
setTimeout(()=>{

if(done){
return;
}

done=true;
test.onload=null;
test.onerror=null;

reject(new Error("画像を読み込めませんでした"));

},12000);

test.onload=()=>{

if(done){
return;
}

done=true;
clearTimeout(timer);

if(test.naturalWidth>0){
resolve({
src:src,
cors:useCors
});
}else{
reject(new Error("画像を読み込めませんでした"));
}

};

test.onerror=()=>{

if(done){
return;
}

done=true;
clearTimeout(timer);

reject(new Error("画像を読み込めませんでした"));

};

test.src=src;

});

}

function makeFallbackImage(){

const svg=
`
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1800" viewBox="0 0 1200 1800">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#2b1609"/>
<stop offset="45%" stop-color="#120804"/>
<stop offset="100%" stop-color="#000000"/>
</linearGradient>
<radialGradient id="light" cx="50%" cy="28%" r="60%">
<stop offset="0%" stop-color="#d6ad3c" stop-opacity=".55"/>
<stop offset="50%" stop-color="#6f4216" stop-opacity=".32"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0"/>
</radialGradient>
</defs>
<rect width="1200" height="1800" fill="url(#bg)"/>
<rect width="1200" height="1800" fill="url(#light)"/>
</svg>
`;

return "data:image/svg+xml;charset=utf-8,"+
encodeURIComponent(svg);

}

async function saveImage(){

const btn=
document.querySelector(".btn.save");

btn.disabled=true;
btn.innerText="保存画像を作成中...";

try{

await receiveCertificateLog();

const canvas=
await html2canvas(
document.getElementById("certificate"),
{
scale:2,
useCORS:true,
allowTaint:false,
backgroundColor:null,
logging:false,
imageTimeout:15000
}
);

const blob=
await canvasToBlob(canvas);

const fileName=
makeSaveFileName();

latestSaveFile=
new File(
[blob],
fileName,
{
type:"image/png"
}
);

if(latestSaveImageUrl){
URL.revokeObjectURL(latestSaveImageUrl);
latestSaveImageUrl="";
}

latestSaveImageUrl=
URL.createObjectURL(blob);

showImagePopup(latestSaveImageUrl);

await openNativeImageShare(false);

}catch(err){

alert(
"保存画像を作れませんでした。もう一度お試しください。"
);

}finally{

btn.disabled=false;
btn.innerText="📜 記念証を授かる";

}

}

async function shareSavedImage(){

const ok=
await openNativeImageShare(true);

if(!ok){

alert(
"この画面では自動保存画面を開けませんでした。表示された記念証画像を長押しして「写真に保存」を選んでください。"
);

}

}

async function openNativeImageShare(showAlert){

if(!latestSaveFile){
return false;
}

if(!navigator.share){
return false;
}

const fileShareData={
files:[
latestSaveFile
]
};

if(
navigator.canShare &&
!navigator.canShare(fileShareData)
){
return false;
}

try{

await navigator.share({
files:[
latestSaveFile
],
title:"田子山富士 登頂記念証",
text:"田子山富士 登頂記念証"
});

return true;

}catch(e){

if(e && e.name==="AbortError"){
return true;
}

return false;

}

}

async function receiveCertificateLog(){

const userId=
latestUserId||
localStorage.getItem("tagoyamaUserId")||
"";

if(!userId){
return;
}

try{

const res=
await fetch(
GAS_URL+
"?mode=receive"+
"&userId="+
encodeURIComponent(userId)+
"&serial="+
encodeURIComponent(latestSerial)+
"&t="+
Date.now()
);

await res.json();

}catch(e){}

}

function canvasToBlob(canvas){

return new Promise((resolve,reject)=>{

canvas.toBlob(function(blob){

if(blob){
resolve(blob);
}else{
reject(new Error("画像保存に失敗しました"));
}

},"image/png",1);

});

}

function makeSaveFileName(){

return "tagoyama-certificate-no-"+
latestSerial
.replace("-","-")
.replace(/[^\w\-]/g,"")+
".png";

}

function showImagePopup(src){

document.getElementById("savedImage").src=src;
document.getElementById("popup").style.display="block";

}

function closePopup(){

document.getElementById("popup").style.display="none";

}
