<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>登頂記念証</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:
"Hiragino Sans",
"Yu Gothic",
"Meiryo",
sans-serif;
color:#fff;
padding:20px;
}

.wrap{
max-width:900px;
margin:auto;
}

.card{
background:#000;
border:2px solid #d4af37;
border-radius:28px;
padding:16px;
text-align:center;
box-shadow:
0 12px 32px rgba(0,0,0,.45);
}

.certificateImageBox{
position:relative;
width:100%;
border-radius:22px;
overflow:hidden;
background:#111;
}

.memorialImage{
width:100%;
display:block;
}

.overlay{
position:absolute;
left:0;
right:0;
bottom:8%;
text-align:center;
color:#fff;
text-shadow:
0 3px 8px rgba(0,0,0,.95),
0 0 18px rgba(0,0,0,.9);
}

.enTitle{
font-size:32px;
font-weight:900;
letter-spacing:4px;
margin-bottom:10px;
}

.serial{
font-size:56px;
font-weight:900;
letter-spacing:5px;
}

.save{
background:#2ecc71;
color:#fff;
}

.fb{
background:#1877f2;
color:#fff;
}

.x{
background:#000;
color:#fff;
}

.line{
background:#06c755;
color:#fff;
}

.copy{
background:#607d8b;
color:#fff;
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:18px;
margin-top:12px;
font-size:22px;
font-weight:900;
cursor:pointer;
}

.footer{
margin-top:20px;
text-align:center;
color:#aaa;
font-size:14px;
}

</style>
</head>

<body>

<div class="wrap">

<div
id="certificate"
class="card">

<div class="certificateImageBox">

<img
id="memorialImage"
class="memorialImage"
src="sakura01.jpg"
alt="記念画像"
crossorigin="anonymous">

<div class="overlay">

<div class="enTitle">
168の縁
</div>

<div
id="serial"
class="serial">

1-0001

</div>

</div>

</div>

</div>

<button
class="btn save"
onclick="saveImage()">

画像を保存

</button>

<button
class="btn fb"
onclick="shareFacebook()">

Facebook

</button>

<button
class="btn x"
onclick="shareX()">

X

</button>

<button
class="btn line"
onclick="shareLine()">

LINE

</button>

<button
class="btn copy"
onclick="copyUrl()">

リンクをコピー

</button>

<div class="footer">

田子山富士 168の縁プロジェクト

</div>

</div>

<script>

const params =
new URLSearchParams(
location.search
);

const serial =
params.get("serial") || "1-0001";

const imageUrl =
params.get("image") ||
"sakura01.jpg";

document.getElementById(
"serial"
).innerText =
serial;

document.getElementById(
"memorialImage"
).src =
imageUrl;

async function saveImage(){

try{

const canvas =
await html2canvas(
document.getElementById(
"certificate"
),
{
scale:2,
useCORS:true,
allowTaint:false
}
);

const link =
document.createElement(
"a"
);

link.download =
"168-no-en-certificate.png";

link.href =
canvas.toDataURL(
"image/png"
);

link.click();

}catch(error){

alert(
"画像保存エラー : " +
error.message
);

}

}

function shareFacebook(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(
location.href
)
);

}

function shareX(){

window.open(
"https://twitter.com/intent/tweet?url=" +
encodeURIComponent(
location.href
)
);

}

function shareLine(){

window.open(
"https://social-plugins.line.me/lineit/share?url=" +
encodeURIComponent(
location.href
)
);

}

function copyUrl(){

navigator.clipboard.writeText(
location.href
);

alert(
"リンクをコピーしました"
);

}

</script>

</body>
</html>
