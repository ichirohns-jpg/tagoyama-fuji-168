<img
id="memorialImage"
class="memorialImage"
src="https://via.placeholder.com/1200x800.png?text=MEMORIAL"
alt="記念画像">

<div
id="count"
class="count">

第1回登頂

</div>

<div
id="serial"
class="serial">

No.0001

</div>

<div
id="date"
class="date">

2026/06/20

</div>

</div>

<button
class="btn save"
onclick="saveImage()">

画像を保存

</button>

<button
class="btn fb"
onclick="shareFacebook()">

Facebook

</button>

<button
class="btn x"
onclick="shareX()">

X

</button>

<button
class="btn line"
onclick="shareLine()">

LINE

</button>

<button
class="btn copy"
onclick="copyUrl()">

リンクをコピー

</button>

<div class="footer">

田子山富士 168の縁プロジェクト

</div>

</div>

<script>

const params =
new URLSearchParams(
location.search
);

const count =
params.get("count") || "1";

const serial =
params.get("serial") || "0001";

const imageUrl =
params.get("image") ||
"https://via.placeholder.com/1200x800.png?text=MEMORIAL";

document.getElementById(
"count"
).innerText =
"第" + count + "回登頂";

document.getElementById(
"serial"
).innerText =
"No." + serial;

document.getElementById(
"memorialImage"
).src =
imageUrl;

const now =
new Date();

document.getElementById(
"date"
).innerText =
now.getFullYear() +
"/" +
String(now.getMonth()+1)
.padStart(2,"0") +
"/" +
String(now.getDate())
.padStart(2,"0");

async function saveImage(){

const canvas =
await html2canvas(
document.getElementById(
"certificate"
),
{
scale:2
}
);

const link =
document.createElement(
"a"
);

link.download =
"tagoyama-certificate.png";

link.href =
canvas.toDataURL(
"image/png"
);

link.click();

}

function shareFacebook(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(
location.href
)
);

}

function shareX(){

window.open(
"https://twitter.com/intent/tweet?url=" +
encodeURIComponent(
location.href
)
);

}

function shareLine(){

window.open(
"https://social-plugins.line.me/lineit/share?url=" +
encodeURIComponent(
location.href
)
);

}

function copyUrl(){

navigator.clipboard.writeText(
location.href
);

alert(
"リンクをコピーしました"
);

}

</script>

</body>
</html>
