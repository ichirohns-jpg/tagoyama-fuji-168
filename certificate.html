<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#050505;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}

body{
  background:
    radial-gradient(circle at 50% 0%,rgba(255,225,110,.18),rgba(0,0,0,0) 35%),
    linear-gradient(180deg,#1b1304 0%,#070707 46%,#000 100%);
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:16px 12px 48px;
}

.hidden{
  display:none !important;
}

.header{
  text-align:center;
  margin:0 0 14px;
}

.headerLogo{
  width:100%;
  max-width:620px;
  margin:0 auto 14px;
  border-radius:28px;
  overflow:hidden;
  border:3px solid rgba(255,220,95,.80);
  background:#000;
  box-shadow:
    0 14px 28px rgba(0,0,0,.50),
    0 0 18px rgba(255,210,80,.22);
}

.headerLogo img{
  display:block;
  width:100%;
  height:auto;
}

.pageTitle{
  margin:0;
  font-size:clamp(30px,8vw,54px);
  line-height:1.25;
  font-weight:900;
  color:#ffdf72;
  text-shadow:
    0 4px 4px rgba(0,0,0,.9),
    0 0 18px rgba(255,210,80,.24);
}

.statusBox{
  margin:16px 0;
  padding:18px 14px;
  border-radius:22px;
  border:2px solid rgba(214,183,60,.76);
  background:rgba(10,10,10,.86);
  color:#fff3c4;
  font-size:clamp(17px,4.6vw,25px);
  line-height:1.55;
  text-align:center;
  font-weight:900;
  white-space:pre-wrap;
}

.statusBox.error{
  color:#ffd4cf;
  border-color:rgba(255,88,66,.82);
}

.certificateCard{
  margin:18px 0;
  border-radius:30px;
  padding:8px;
  background:linear-gradient(135deg,#fff1a4 0%,#b98212 30%,#fff0a0 53%,#81500c 76%,#ffde70 100%);
  box-shadow:
    0 18px 34px rgba(0,0,0,.55),
    0 0 24px rgba(255,210,80,.20);
}

.certImageWrap{
  position:relative;
  width:100%;
  aspect-ratio:9 / 16;
  overflow:hidden;
  border-radius:24px;
  background:#000;
}

.certImage{
  display:block;
  width:100%;
  height:100%;
  object-fit:cover;
  background:#111;
}

.imageError{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  color:#fff3c4;
  background:#111;
  text-align:center;
  font-size:22px;
  font-weight:900;
  line-height:1.5;
}

.certOverlay{
  position:absolute;
  left:5.5%;
  right:5.5%;
  bottom:5.5%;
  padding:18px 10px;
  border-radius:24px;
  background:rgba(0,0,0,.72);
  border:2px solid rgba(255,220,95,.72);
  box-shadow:
    0 10px 24px rgba(0,0,0,.45),
    0 0 18px rgba(255,210,80,.16);
  text-align:center;
}

.climbTitle{
  margin:0 0 10px;
  font-size:clamp(28px,8vw,58px);
  line-height:1.18;
  color:#ffdf72;
  font-weight:900;
  text-shadow:
    0 4px 4px rgba(0,0,0,.92),
    0 0 18px rgba(255,210,80,.24);
}

.serialNo{
  margin:0 0 10px;
  font-size:clamp(28px,8vw,56px);
  line-height:1.16;
  color:#fff7ca;
  font-weight:900;
  letter-spacing:.02em;
}

.dateText{
  margin:0 0 10px;
  font-size:clamp(22px,6vw,40px);
  line-height:1.2;
  color:#fff7ca;
  font-weight:900;
}

.participantText{
  margin:0;
  font-size:clamp(18px,5vw,32px);
  line-height:1.35;
  color:#d9c886;
  font-weight:900;
}

.notice{
  margin:18px 0;
  padding:20px 16px;
  border-radius:24px;
  border:2px solid rgba(214,183,60,.58);
  background:rgba(10,10,10,.78);
  color:#fff7ca;
  text-align:center;
  font-size:clamp(18px,5vw,29px);
  line-height:1.65;
  font-weight:900;
}

.btnArea{
  display:grid;
  gap:14px;
  margin:18px 0 0;
}

.btn,
.linkBtn{
  width:100%;
  min-height:70px;
  border:none;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:clamp(20px,5.5vw,34px);
  font-weight:900;
  letter-spacing:.02em;
  color:#fff;
  cursor:pointer;
  text-align:center;
  box-shadow:
    0 7px 0 rgba(0,0,0,.32),
    0 13px 22px rgba(0,0,0,.34);
}

.btn:disabled{
  opacity:.55;
}

.greenBtn{
  background:linear-gradient(180deg,#38e988 0%,#09b957 100%);
}

.blueBtn{
  background:linear-gradient(180deg,#2e83ff 0%,#0b4fc4 100%);
}

.blackBtn{
  background:linear-gradient(180deg,#323232 0%,#050505 100%);
}

.goldBtn{
  color:#271400;
  background:linear-gradient(180deg,#fff1a4 0%,#ffd84d 48%,#c89217 100%);
}

.footer{
  margin:26px 0 0;
  color:#c9b56b;
  text-align:center;
  font-weight:800;
  line-height:1.6;
  font-size:14px;
}

canvas{
  display:none;
}

@media (max-width:420px){
  .wrap{
    padding-left:10px;
    padding-right:10px;
  }

  .headerLogo{
    border-radius:24px;
  }

  .certificateCard{
    border-radius:26px;
    padding:7px;
  }

  .certImageWrap{
    border-radius:20px;
  }

  .certOverlay{
    border-radius:20px;
    padding:15px 8px;
  }

  .btn,
  .linkBtn{
    min-height:66px;
    border-radius:22px;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <header class="header">
    <div class="headerLogo">
      <img
        src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
        alt="田子山富士"
        onerror="this.style.display='none'"
      >
    </div>
    <h1 class="pageTitle">田子山富士 登頂記念証</h1>
  </header>

  <div class="statusBox" id="statusBox">
    登頂記録を読み込んでいます。
  </div>

  <section class="certificateCard">
    <div class="certImageWrap">
      <img
        id="certificateImage"
        class="certImage"
        src=""
        alt="登頂記念画像"
        crossorigin="anonymous"
        onerror="handleImageError()"
      >

      <div class="imageError" id="imageError">
        記念画像を読み込めませんでした。<br>
        記念画像URLを確認してください。
      </div>

      <div class="certOverlay">
        <h2 class="climbTitle" id="climbTitle">登頂記念</h2>
        <p class="serialNo" id="serialNo">No.取得中</p>
        <p class="dateText" id="dateText">日付取得中</p>
        <p class="participantText" id="participantText">参加人数 取得中</p>
      </div>
    </div>
  </section>

  <div class="notice">
    Facebookに投稿する場合は、画像を保存してから、リンクをコピーして投稿欄に貼り付けてください。
  </div>

  <div class="btnArea">
    <button class="btn greenBtn" id="saveBtn" onclick="saveCertificateImage()">
      画像を保存
    </button>

    <button class="btn greenBtn" onclick="sendLine()">
      LINEで送る
    </button>

    <button class="btn blackBtn" onclick="postX()">
      Xで投稿
    </button>

    <button class="btn blueBtn" onclick="copyShareLink()">
      Facebook用リンクをコピー
    </button>

    <a class="linkBtn goldBtn" id="omikujiBtn" href="omikuji.html">
      おみくじへ
    </a>

    <a class="linkBtn blackBtn" id="backBtn" href="index.html">
      トップへ戻る
    </a>
  </div>

  <footer class="footer">
    田子山富士 168の縁プロジェクト<br>
    登頂記念証
  </footer>

  <canvas id="saveCanvas"></canvas>
</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

const CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

const SHARE_CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

const OMIKUJI_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

let currentData = {
  userId:"",
  climbCount:"",
  serialNo:"",
  lastDate:"",
  imageNo:"",
  imageName:"",
  imageUrl:"",
  participantNo:""
};

window.addEventListener("load", init);

async function init(){
  const paramData = readParams();
  const localData = readLocalData();

  currentData = mergeData(paramData, localData);

  if(currentData.userId){
    localStorage.setItem("tagoyamaUserId", currentData.userId);
    localStorage.setItem("tagoyamaFujiUserId", currentData.userId);
  }

  renderCertificate(currentData, "loading");
  updateLinks();

  try{
    if(currentData.userId){
      const historyData = await loadClimbHistory(currentData.userId);
      currentData = mergeData(historyData, currentData);
    }

    if(!currentData.climbCount || !currentData.serialNo){
      throw new Error("登頂回数または記念番号を取得できません。QRコードから入り直してください。");
    }

    if(!currentData.imageUrl){
      throw new Error("記念画像URLがありません。スプレッドシートの記念画像URLを確認してください。");
    }

    saveLocalData(currentData);
    renderCertificate(currentData, "ok");
    updateLinks();

  }catch(e){
    renderCertificate(
      currentData,
      "error",
      e && e.message ? e.message : "登頂記録を取得できませんでした。"
    );
    updateLinks();
  }
}

function readParams(){
  const p = new URLSearchParams(location.search);

  return cleanData({
    userId:getFirst(p.get("userId"),p.get("id"),p.get("uid")),
    climbCount:getFirst(p.get("climbCount"),p.get("climbNo"),p.get("count")),
    serialNo:getFirst(p.get("serialNo"),p.get("serial"),p.get("certificateNo"),p.get("no")),
    lastDate:getFirst(p.get("lastDate"),p.get("date"),p.get("climbDate")),
    imageNo:getFirst(p.get("imageNo"),p.get("image"),p.get("imageNumber")),
    imageName:getFirst(p.get("imageName"),p.get("title")),
    imageUrl:getFirst(p.get("imageUrl"),p.get("imageURL"),p.get("img")),
    participantNo:getFirst(p.get("participantNo"),p.get("participantCount"),p.get("participants"),p.get("total"))
  });
}

function readLocalData(){
  let data = {};

  try{
    const raw = localStorage.getItem("tagoyamaClimbData") || "";
    if(raw){
      data = JSON.parse(raw);
    }
  }catch(e){
    data = {};
  }

  return cleanData({
    userId:getFirst(data.userId,localStorage.getItem("tagoyamaUserId"),localStorage.getItem("tagoyamaFujiUserId")),
    climbCount:getFirst(data.climbCount,localStorage.getItem("tagoyamaLastClimbCount")),
    serialNo:getFirst(data.serialNo,localStorage.getItem("tagoyamaLastSerialNo")),
    lastDate:getFirst(data.lastDate,localStorage.getItem("tagoyamaLastDate")),
    imageNo:getFirst(data.imageNo),
    imageName:getFirst(data.imageName),
    imageUrl:getFirst(data.imageUrl),
    participantNo:getFirst(data.participantNo,localStorage.getItem("tagoyamaLastParticipantNo"))
  });
}

async function loadClimbHistory(userId){
  const url =
    GAS_URL +
    "?mode=climbHistory" +
    "&userId=" +
    encodeURIComponent(userId) +
    "&t=" +
    Date.now();

  const data = await getJson(url);

  if(!data || data.success === false){
    throw new Error(
      data && data.message
        ? data.message
        : "登頂履歴を取得できませんでした。"
    );
  }

  return cleanData({
    userId:userId,
    climbCount:getFirst(data.climbCount,data.climbNo,data.count,data.登頂回数),
    serialNo:getFirst(data.serialNo,data.serial,data.certificateNo,data.no,data.シリアル番号),
    lastDate:getFirst(data.lastDate,data.date,data.climbDate,data.日付),
    imageNo:getFirst(data.imageNo,data.image,data.imageNumber,data.画像番号),
    imageName:getFirst(data.imageName,data.title,data.画像名),
    imageUrl:getFirst(data.imageUrl,data.imageURL,data.img,data.画像URL),
    participantNo:getFirst(data.participantNo,data.participantCount,data.participants,data.totalParticipants,data.total,data.参加人数)
  });
}

function cleanData(data){
  return {
    userId:getString(data.userId),
    climbCount:getString(data.climbCount),
    serialNo:getString(data.serialNo),
    lastDate:getString(data.lastDate),
    imageNo:getString(data.imageNo),
    imageName:getString(data.imageName),
    imageUrl:getString(data.imageUrl),
    participantNo:getString(data.participantNo)
  };
}

function mergeData(primary, secondary){
  primary = primary || {};
  secondary = secondary || {};

  return cleanData({
    userId:getFirst(primary.userId,secondary.userId),
    climbCount:getFirst(primary.climbCount,secondary.climbCount),
    serialNo:getFirst(primary.serialNo,secondary.serialNo),
    lastDate:getFirst(primary.lastDate,secondary.lastDate),
    imageNo:getFirst(primary.imageNo,secondary.imageNo),
    imageName:getFirst(primary.imageName,secondary.imageName),
    imageUrl:getFirst(primary.imageUrl,secondary.imageUrl),
    participantNo:getFirst(primary.participantNo,secondary.participantNo)
  });
}

function saveLocalData(data){
  const clean = cleanData(data);

  localStorage.setItem("tagoyamaClimbData", JSON.stringify(clean));

  if(clean.userId){
    localStorage.setItem("tagoyamaUserId", clean.userId);
    localStorage.setItem("tagoyamaFujiUserId", clean.userId);
  }

  if(clean.climbCount){
    localStorage.setItem("tagoyamaLastClimbCount", clean.climbCount);
  }

  if(clean.serialNo){
    localStorage.setItem("tagoyamaLastSerialNo", clean.serialNo);
  }

  if(clean.lastDate){
    localStorage.setItem("tagoyamaLastDate", clean.lastDate);
  }

  if(clean.participantNo){
    localStorage.setItem("tagoyamaLastParticipantNo", clean.participantNo);
  }
}

function renderCertificate(data, state, message){
  data = cleanData(data || {});

  const statusBox = document.getElementById("statusBox");
  const climbTitle = document.getElementById("climbTitle");
  const serialNo = document.getElementById("serialNo");
  const dateText = document.getElementById("dateText");
  const participantText = document.getElementById("participantText");
  const certificateImage = document.getElementById("certificateImage");
  const imageError = document.getElementById("imageError");

  const climbCount = data.climbCount;
  const serial = data.serialNo;
  const date = formatDate(data.lastDate);
  const participant = data.participantNo;
  const imageUrl = data.imageUrl;

  if(certificateImage){
    if(imageUrl){
      certificateImage.style.display = "block";
      certificateImage.src =
        imageUrl +
        (imageUrl.indexOf("?") >= 0 ? "&" : "?") +
        "v=" +
        Date.now();
    }else{
      certificateImage.removeAttribute("src");
      certificateImage.style.display = "none";
    }
  }

  if(imageError){
    imageError.style.display = imageUrl ? "none" : "flex";
  }

  if(climbTitle){
    climbTitle.innerText =
      climbCount
        ? "第" + climbCount + "回 登頂記念"
        : "登頂記念";
  }

  if(serialNo){
    serialNo.innerText =
      serial
        ? "No." + serial
        : "No.取得中";
  }

  if(dateText){
    dateText.innerText =
      date
        ? date
        : "日付取得中";
  }

  if(participantText){
    participantText.innerText =
      participant
        ? "参加人数 " + participant + "人"
        : "参加人数 取得中";
  }

  if(statusBox){
    statusBox.classList.remove("error");

    if(state === "ok"){
      statusBox.innerText =
        "登頂記録を読み込みました。\n" +
        "第" + climbCount + "回 / No." + serial +
        (participant ? "\n参加人数 " + participant + "人" : "");
    }else if(state === "error"){
      statusBox.classList.add("error");
      statusBox.innerText =
        message ||
        "登頂記録を取得できませんでした。QRコードから入り直してください。";
    }else{
      statusBox.innerText =
        "登頂記録を読み込んでいます。";
    }
  }
}

function updateLinks(){
  const userId = currentData.userId || "";

  const omikujiBtn = document.getElementById("omikujiBtn");
  const backBtn = document.getElementById("backBtn");

  if(omikujiBtn){
    omikujiBtn.href =
      userId
        ? "omikuji.html?userId=" + encodeURIComponent(userId) + "&v=" + Date.now()
        : "omikuji.html?v=" + Date.now();
  }

  if(backBtn){
    backBtn.href =
      userId
        ? "index.html?userId=" + encodeURIComponent(userId) + "&v=" + Date.now()
        : "index.html?v=" + Date.now();
  }
}

function buildShareUrl(){
  const p = new URLSearchParams();

  if(currentData.userId) p.set("userId", currentData.userId);
  if(currentData.climbCount) p.set("climbCount", currentData.climbCount);
  if(currentData.serialNo) p.set("serialNo", currentData.serialNo);
  if(currentData.lastDate) p.set("lastDate", currentData.lastDate);
  if(currentData.participantNo) p.set("participantNo", currentData.participantNo);

  p.set("v", String(Date.now()));

  return SHARE_CERTIFICATE_PAGE + "?" + p.toString();
}

function sendLine(){
  const text =
    "田子山富士の登頂記念証を受け取りました。\n" +
    buildShareUrl();

  const url =
    "https://line.me/R/msg/text/?" +
    encodeURIComponent(text);

  location.href = url;
}

function postX(){
  const title =
    currentData.climbCount && currentData.serialNo
      ? "田子山富士 第" + currentData.climbCount + "回 登頂記念 No." + currentData.serialNo
      : "田子山富士 登頂記念証";

  const url =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(title) +
    "&url=" +
    encodeURIComponent(buildShareUrl());

  window.open(url, "_blank");
}

function copyShareLink(){
  copyText(buildShareUrl());
  alert("Facebook用リンクをコピーしました。投稿欄に貼り付けてください。");
}

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text);
    return;
  }

  const ta = document.createElement("textarea");
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
}

function handleImageError(){
  const img = document.getElementById("certificateImage");
  const err = document.getElementById("imageError");

  if(img){
    img.style.display = "none";
  }

  if(err){
    err.style.display = "flex";
  }
}

function saveCertificateImage(){
  const canvas = document.getElementById("saveCanvas");
  const btn = document.getElementById("saveBtn");

  if(!canvas){
    alert("画像保存の準備ができませんでした。");
    return;
  }

  if(!currentData.climbCount || !currentData.serialNo){
    alert("登頂記録が取得できていません。QRコードから入り直してください。");
    return;
  }

  if(!currentData.imageUrl){
    alert("記念画像URLがありません。");
    return;
  }

  btn.disabled = true;
  btn.innerText = "画像を作成中...";

  const base = new Image();
  base.crossOrigin = "anonymous";

  base.onload = function(){
    try{
      drawSaveImage(canvas, base);

      const link = document.createElement("a");
      link.download =
        "tagoyama-fuji-" +
        currentData.serialNo.replace(/[^\w\-]/g,"") +
        ".png";
      link.href = canvas.toDataURL("image/png");
      link.click();

    }catch(e){
      alert("画像保存に失敗しました。スクリーンショットで保存してください。");
    }finally{
      btn.disabled = false;
      btn.innerText = "画像を保存";
    }
  };

  base.onerror = function(){
    alert("記念画像を読み込めませんでした。スクリーンショットで保存してください。");
    btn.disabled = false;
    btn.innerText = "画像を保存";
  };

  base.src =
    currentData.imageUrl +
    (currentData.imageUrl.indexOf("?") >= 0 ? "&" : "?") +
    "v=" +
    Date.now();
}

function drawSaveImage(canvas, baseImage){
  const w = 1080;
  const h = 1920;

  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,w,h);

  drawImageCover(ctx,baseImage,0,0,w,h,0);

  ctx.fillStyle = "rgba(0,0,0,.72)";
  roundRect(ctx,70,1390,940,360,40);
  ctx.fill();

  ctx.strokeStyle = "#d6b73c";
  ctx.lineWidth = 6;
  roundRect(ctx,70,1390,940,360,40);
  ctx.stroke();

  drawCenterText(ctx,"第" + currentData.climbCount + "回 登頂記念",w/2,1475,72,"#ffdf72");
  drawCenterText(ctx,"No." + currentData.serialNo,w/2,1575,72,"#fff7ca");
  drawCenterText(ctx,formatDate(currentData.lastDate) || "",w/2,1660,50,"#fff7ca");

  if(currentData.participantNo){
    drawCenterText(ctx,"参加人数 " + currentData.participantNo + "人",w/2,1728,42,"#d9c886");
  }
}

function drawImageCover(ctx,img,x,y,w,h,r){
  const iw = img.naturalWidth || img.width;
  const ih = img.naturalHeight || img.height;
  const ir = iw / ih;
  const br = w / h;

  let sx = 0;
  let sy = 0;
  let sw = iw;
  let sh = ih;

  if(ir > br){
    sw = ih * br;
    sx = (iw - sw) / 2;
  }else{
    sh = iw / br;
    sy = (ih - sh) / 2;
  }

  ctx.save();
  if(r > 0){
    roundRect(ctx,x,y,w,h,r);
    ctx.clip();
  }
  ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawCenterText(ctx,text,x,y,size,color){
  ctx.font =
    '900 ' +
    size +
    'px -apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif';
  ctx.fillStyle = color;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text,x,y);
}

async function getJson(url){
  const res = await fetch(url, {
    method:"GET",
    cache:"no-store",
    redirect:"follow"
  });

  const text = await res.text();

  if(!res.ok){
    throw new Error("通信エラーが発生しました。");
  }

  if(!text){
    throw new Error("空の応答です。");
  }

  const trimmed = text.trim();

  if(trimmed.startsWith("{") || trimmed.startsWith("[")){
    return JSON.parse(trimmed);
  }

  const jsonMatch = trimmed.match(/\{[\s\S]*\}/);

  if(jsonMatch){
    return JSON.parse(jsonMatch[0]);
  }

  throw new Error("JSONを読み込めませんでした。");
}

function getFirst(){
  for(let i = 0; i < arguments.length; i++){
    const v = arguments[i];

    if(v !== null && v !== undefined && String(v).trim() !== ""){
      return String(v).trim();
    }
  }

  return "";
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function formatDate(value){
  const s = getString(value);

  if(!s){
    return "";
  }

  const m1 = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);

  if(m1){
    return m1[1] + "/" + m1[2].padStart(2,"0") + "/" + m1[3].padStart(2,"0");
  }

  const m2 = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);

  if(m2){
    return m2[1] + "/" + m2[2].padStart(2,"0") + "/" + m2[3].padStart(2,"0");
  }

  const d = new Date(s);

  if(!Number.isNaN(d.getTime())){
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return y + "/" + m + "/" + day;
  }

  return s;
}
