<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>登頂記念証｜田子山富士168の縁</title>

<meta name="description" content="田子山富士に登頂したご縁を、記念証として残します。">

<meta property="og:title" content="田子山富士 登頂記念証">
<meta property="og:description" content="田子山富士に登頂したご縁を、記念証として残します。">
<meta property="og:image" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg">
<meta property="og:url" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="田子山富士 登頂記念証">
<meta name="twitter:description" content="田子山富士に登頂したご縁を、記念証として残します。">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:#fff;
  font-family:
    "Hiragino Sans",
    "Yu Gothic",
    "Meiryo",
    sans-serif;
  padding:18px;
}

.wrap{
  max-width:900px;
  margin:0 auto;
}

.card{
  background:#000;
  border:2px solid #d4af37;
  border-radius:28px;
  padding:14px;
  box-shadow:
    0 12px 32px rgba(0,0,0,.45);
}

.certificateImageBox{
  position:relative;
  width:100%;
  border-radius:22px;
  overflow:hidden;
  background:#111;
}

.memorialImage{
  width:100%;
  display:block;
  background:#111;
}

.overlay{
  position:absolute;
  left:0;
  right:0;
  bottom:6%;
  text-align:center;
  color:#fff;
  text-shadow:
    0 2px 6px rgba(0,0,0,.95),
    0 0 10px rgba(0,0,0,.85);
  padding:0 12px;
  pointer-events:none;
}

.climbTitle{
  font-size:clamp(24px,7vw,50px);
  font-weight:800;
  letter-spacing:.08em;
  line-height:1.25;
}

.serialText{
  margin-top:8px;
  font-size:clamp(18px,5vw,34px);
  font-weight:700;
  letter-spacing:.05em;
}

.dateText{
  margin-top:4px;
  font-size:clamp(15px,4vw,26px);
  font-weight:600;
  letter-spacing:.04em;
}

.loading{
  text-align:center;
  color:#d4af37;
  padding:36px 10px;
  line-height:1.8;
  font-weight:700;
}

.buttons{
  margin-top:18px;
  display:grid;
  gap:12px;
}

.btn{
  width:100%;
  border:none;
  border-radius:999px;
  padding:15px 18px;
  font-size:17px;
  font-weight:800;
  line-height:1.2;
  text-align:center;
  text-decoration:none;
  cursor:pointer;
  color:#111;
  background:linear-gradient(180deg,#f5d66b,#d4af37);
  box-shadow:0 6px 16px rgba(0,0,0,.35);
}

.btn.sub{
  color:#fff;
  background:#222;
  border:1px solid #d4af37;
}

.btn:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.message{
  margin-top:12px;
  text-align:center;
  color:#d4af37;
  font-size:14px;
  line-height:1.7;
  min-height:1.7em;
}

.topLink{
  margin-top:18px;
  text-align:center;
}

.topLink a{
  display:inline-block;
  color:#d4af37;
  text-decoration:none;
  font-weight:800;
  border:1px solid #d4af37;
  border-radius:999px;
  padding:13px 28px;
}

.hiddenCanvasTarget{
  background:#000;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <div id="certificateArea" class="certificateImageBox hiddenCanvasTarget">
      <div id="loading" class="loading">
        登頂記念証を読み込んでいます
      </div>

      <img
        id="memorialImage"
        class="memorialImage"
        alt="田子山富士 登頂記念証"
        crossorigin="anonymous"
        style="display:none;"
      >

      <div id="overlay" class="overlay" style="display:none;">
        <div id="climbTitle" class="climbTitle">第1回 登頂記念</div>
        <div id="serialText" class="serialText">No.TEST-0001</div>
        <div id="dateText" class="dateText">2026/07/03</div>
      </div>
    </div>

    <div class="buttons">
      <button id="saveBtn" class="btn" type="button">
        画像を保存
      </button>

      <button id="facebookBtn" class="btn sub" type="button">
        Facebookに投稿
      </button>

      <button id="lineBtn" class="btn sub" type="button">
        LINEで送る
      </button>

      <button id="xBtn" class="btn sub" type="button">
        Xで投稿
      </button>

      <button id="copyBtn" class="btn sub" type="button">
        投稿文をコピー
      </button>
    </div>

    <div id="message" class="message"></div>

    <div class="topLink">
      <a href="./index.html">トップへ戻る</a>
    </div>

  </div>

</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

const SHARE_URL =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

const POST_TEXT =
"田子山富士 登頂記念証\n" +
"田子山富士に登頂したご縁を、記念証として残します。\n\n" +
"#田子山富士 #敷島神社 #志木市";

const params =
new URLSearchParams(window.location.search);

const userId =
params.get("userId") || "";

let climbCount =
params.get("climbCount") || "1";

let serialNo =
params.get("serialNo") || "TEST-0001";

let lastDate =
params.get("lastDate") || "";

let imageUrl =
params.get("imageUrl") || "";

const loading =
document.getElementById("loading");

const memorialImage =
document.getElementById("memorialImage");

const overlay =
document.getElementById("overlay");

const climbTitle =
document.getElementById("climbTitle");

const serialText =
document.getElementById("serialText");

const dateText =
document.getElementById("dateText");

const message =
document.getElementById("message");

const saveBtn =
document.getElementById("saveBtn");

const facebookBtn =
document.getElementById("facebookBtn");

const lineBtn =
document.getElementById("lineBtn");

const xBtn =
document.getElementById("xBtn");

const copyBtn =
document.getElementById("copyBtn");

function setMessage(text){
  message.textContent = text || "";
}

function todayText(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return y + "/" + m + "/" + day;
}

function applyTexts(){
  climbCount =
  String(climbCount || "1")
  .replace(/[^\d]/g,"") || "1";

  serialNo =
  String(serialNo || "TEST-0001")
  .trim();

  lastDate =
  String(lastDate || "")
  .trim();

  if(!lastDate){
    lastDate = todayText();
  }

  climbTitle.textContent =
  "第" + climbCount + "回 登頂記念";

  serialText.textContent =
  "No." + serialNo;

  dateText.textContent =
  lastDate;
}

function showCertificate(){
  loading.style.display = "none";
  memorialImage.style.display = "block";
  overlay.style.display = "block";
}

function showNoImage(){
  loading.innerHTML =
  "登頂記念証画像を読み込めませんでした<br>" +
  "時間をおいて、もう一度お試しください";
  memorialImage.style.display = "none";
  overlay.style.display = "none";
}

function waitImageLoaded(img){
  return new Promise(function(resolve,reject){

    if(img.complete && img.naturalWidth > 0){
      resolve();
      return;
    }

    img.onload = function(){
      if(img.naturalWidth > 0){
        resolve();
      }else{
        reject(new Error("画像を読み込めませんでした"));
      }
    };

    img.onerror = function(){
      reject(new Error("画像を読み込めませんでした"));
    };
  });
}

async function fetchCertificateData(){
  if(!userId && !serialNo){
    return;
  }

  const url =
  GAS_URL +
  "?mode=receiveCertificate" +
  "&userId=" + encodeURIComponent(userId) +
  "&serial=" + encodeURIComponent(serialNo);

  const res =
  await fetch(url);

  const data =
  await res.json();

  if(data){

    if(data.imageUrl && !imageUrl){
      imageUrl = data.imageUrl;
    }

    if(data.climbCount && !params.get("climbCount")){
      climbCount = data.climbCount;
    }

    if(data.serialNo && !params.get("serialNo")){
      serialNo = data.serialNo;
    }

    if(data.serial && !params.get("serialNo")){
      serialNo = data.serial;
    }

    if(data.lastDate && !params.get("lastDate")){
      lastDate = data.lastDate;
    }

    if(data.date && !params.get("lastDate")){
      lastDate = data.date;
    }
  }
}

async function init(){
  applyTexts();

  try{
    if(!imageUrl){
      await fetchCertificateData();
      applyTexts();
    }

    if(!imageUrl){
      showNoImage();
      return;
    }

    memorialImage.src = imageUrl;

    await waitImageLoaded(memorialImage);

    showCertificate();

  }catch(e){
    showNoImage();
  }
}

function shareText(){
  return POST_TEXT + "\n" + SHARE_URL;
}

async function makeCanvasBlob(){
  await waitImageLoaded(memorialImage);

  const target =
  document.getElementById("certificateArea");

  const canvas =
  await html2canvas(target,{
    backgroundColor:"#000000",
    useCORS:true,
    allowTaint:false,
    scale:2
  });

  return new Promise(function(resolve,reject){
    canvas.toBlob(function(blob){
      if(blob){
        resolve(blob);
      }else{
        reject(new Error("画像保存データを作成できませんでした"));
      }
    },"image/png");
  });
}

async function saveImage(){
  saveBtn.disabled = true;
  saveBtn.textContent = "記念証を授与中...";

  try{
    const blob =
    await makeCanvasBlob();

    const file =
    new File(
      [blob],
      "tagoyama-fuji-certificate.png",
      { type:"image/png" }
    );

    if(
      navigator.canShare &&
      navigator.canShare({ files:[file] })
    ){
      await navigator.share({
        files:[file],
        title:"田子山富士 登頂記念証",
        text:POST_TEXT
      });

      setMessage("画像を共有・保存できます");
    }else{
      setMessage("この端末では画像保存共有に対応していません");
    }

  }catch(e){
    setMessage("記念画像を読み込めませんでした");
  }

  saveBtn.disabled = false;
  saveBtn.textContent = "画像を保存";
}

function openFacebook(){
  const url =
  "https://www.facebook.com/sharer/sharer.php?u=" +
  encodeURIComponent(SHARE_URL);

  window.open(url,"_blank","noopener,noreferrer");
}

function openLine(){
  const url =
  "https://social-plugins.line.me/lineit/share?url=" +
  encodeURIComponent(SHARE_URL) +
  "&text=" +
  encodeURIComponent(POST_TEXT);

  window.open(url,"_blank","noopener,noreferrer");
}

function openX(){
  const url =
  "https://twitter.com/intent/tweet?text=" +
  encodeURIComponent(POST_TEXT) +
  "&url=" +
  encodeURIComponent(SHARE_URL);

  window.open(url,"_blank","noopener,noreferrer");
}

async function copyPostText(){
  const text =
  shareText();

  try{
    await navigator.clipboard.writeText(text);
    setMessage("投稿文をコピーしました");
  }catch(e){
    const textarea =
    document.createElement("textarea");

    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);

    setMessage("投稿文をコピーしました");
  }
}

saveBtn.addEventListener("click",saveImage);
facebookBtn.addEventListener("click",openFacebook);
lineBtn.addEventListener("click",openLine);
xBtn.addEventListener("click",openX);
copyBtn.addEventListener("click",copyPostText);

init();
</script>

</body>
</html>
