<script>

const params =
new URLSearchParams(
location.search
);

const serial =
params.get("serial");

if(!serial){

alert(
"登頂記録が見つかりません"
);

location.href =
"qr.html";

throw new Error(
"serial not found"
);

}

const imageUrl =
params.get("image")
|| "sakura01.jpg";

document.getElementById(
"memorialImage"
).src =
imageUrl;

const serialParts =
serial.split("-");

const climbCount =
parseInt(
serialParts[0],
10
);

const serialNo =
serialParts[1];

document.getElementById(
"round"
).innerText =
"第" +
climbCount +
"回登頂記念";

document.getElementById(
"serial"
).innerText =
"No." +
serialNo;

const now =
new Date();

document.getElementById(
"date"
).innerText =
now.getFullYear() +
"/" +
String(
now.getMonth()+1
).padStart(2,"0") +
"/" +
String(
now.getDate()
).padStart(2,"0");

function copyUrl(){

navigator.clipboard.writeText(
location.href
);

alert(
"リンクをコピーしました"
);

}

function shareFacebook(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(
location.href
),
"_blank"
);

}

function shareX(){

window.open(
"https://twitter.com/intent/tweet?url=" +
encodeURIComponent(
location.href
),
"_blank"
);

}

function shareLine(){

window.open(
"https://social-plugins.line.me/lineit/share?url=" +
encodeURIComponent(
location.href
),
"_blank"
);

}

async function saveImage(){

const canvas =
await html2canvas(
document.getElementById(
"certificate"
),
{
scale:2,
useCORS:true
}
);

const link =
document.createElement(
"a"
);

link.download =
"tagoyama-fuji-certificate.png";

link.href =
canvas.toDataURL(
"image/png"
);

link.click();

}

</script>

</body>
</html>
