<body>
<main class="page">

<section class="card">
  <h1 class="pageTitle">登頂記念証</h1>

  <div class="statusBox" id="statusBox">
    登頂記録を確認しています。
  </div>

    <div class="imageBox" id="imageBox">
      <img
        id="memorialImage"
        class="memorialImage"
        alt="田子山富士 登頂記念証"
      >

      <div class="overlayBottom">
        <p class="climbTitle" id="climbTitle"></p>
        <p class="serialNo" id="serialNo"></p>
        <p class="dateText" id="dateText"></p>
      </div>
    </div>

    <div class="noImageBox" id="noImageBox">
      <p class="noImageTitle">登頂記念証</p>
      <p class="noImageText">
        記念画像を読み込めませんでした。<br>
        トップから登頂記念証を受け取ってください。
      </p>
      <p class="noImageMini">
        登頂回数・記念番号・日付は、<br>
        登頂記録から自動で表示されます。
      </p>

    <button class="btn goldBtn" id="saveBtn" type="button" onclick="saveCertificateImage()">
      画像を保存

      Facebookに投稿
    </button>

    <button class="btn greenBtn" type="button" onclick="sendLine()">
      LINEで送る
    </button>

      Xで投稿
    </button>

    <button class="btn blueBtn" type="button" onclick="copyShareText()">
      投稿文をコピー
    </button>

    <a class="linkBtn blackBtn" id="topLink" href="index.html">
      トップへ戻る
    </a>
  </div>

  <p class="notice">
    登頂回数・記念番号・日付を表示します。
  </p>
</section>

<footer class="footer">
  田子山富士 168の縁プロジェクト<br>
  登頂記念証

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbxJh9lYhtQsTYASTa8jGvDDktcm9DeuMQcDn6B66q63FTReIFjBJuQikbY_Tt2iZ18/exec";

const SHARE_CERTIFICATE_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

let certificateData = {
  userId:"",
  climbCount:"",
  serialNo:"",
  lastDate:"",
  imageUrl:""
};

window.addEventListener("load", initCertificate);

async function initCertificate(){
  const urlData = getDataFromUrl();
  const localData = getDataFromLocal();

  certificateData = mergeData(certificateData, localData);
  certificateData = mergeData(certificateData, urlData);

  certificateData = removeTestData(certificateData);

  if(certificateData.userId){
    await loadCertificateFromGas(certificateData.userId);
    certificateData = mergeData(certificateData, urlData);
    certificateData = removeTestData(certificateData);
  }

  saveDataToLocal(certificateData);
  renderCertificate(certificateData);
  updateLinks();

  setStatus("登頂記録を読み込みました。");
}

function getDataFromUrl(){
  const params = new URLSearchParams(location.search);

  const imgid =
    getString(params.get("imgid")) ||
    getString(params.get("imageId"));

  let imageUrl =
    getString(params.get("imageUrl")) ||
    getString(params.get("image")) ||
    getString(params.get("img")) ||
    getString(params.get("url"));

  if(!imageUrl && imgid){
    imageUrl =
      "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(imgid) +
      "&sz=w2000";
  }

  return {
    userId:
      getString(params.get("userId")) ||
      getString(params.get("userid")) ||
      getString(params.get("uid")) ||
      getString(params.get("id")),

    climbCount:
      normalizeNumberText(
        getString(params.get("climbCount")) ||
        getString(params.get("climbNo")) ||
        getString(params.get("count")) ||
        getString(params.get("c"))
      ),

    serialNo:
      cleanSerialNo(
        getString(params.get("serialNo")) ||
        getString(params.get("serial")) ||
        getString(params.get("s"))
      ),

    lastDate:
      formatDateText(
        getString(params.get("lastDate")) ||
        getString(params.get("date")) ||
        getString(params.get("d"))
      ),

    imageUrl:imageUrl
  };
}

function getDataFromLocal(){
  let saved = {};

  try{
    const text = localStorage.getItem("tagoyamaClimbData");

    if(text){
      const parsed = JSON.parse(text);

      if(parsed && typeof parsed === "object"){
        saved = parsed;
      }
    }
  }catch(error){
    saved = {};
  }

  return {
    userId:
      getString(saved.userId) ||
      getString(localStorage.getItem("tagoyamaUserId")) ||
      getString(localStorage.getItem("tagoyamaFujiUserId")),

    climbCount:
      normalizeNumberText(
        saved.climbCount ||
        saved.climbNo ||
        saved.count ||
        saved["個人登頂回数"] ||
        localStorage.getItem("tagoyamaLastClimbCount")
      ),

    serialNo:
      cleanSerialNo(
        saved.serialNo ||
        saved.serial ||
        saved["シリアル"] ||
        localStorage.getItem("tagoyamaLastSerialNo")
      ),

    lastDate:
      formatDateText(
        saved.lastDate ||
        saved.date ||
        saved["日時"] ||
        saved["日付"] ||
        localStorage.getItem("tagoyamaLastDate")
      ),

    imageUrl:
      getString(
        saved.imageUrl ||
        saved.certificateImageUrl ||
        saved.url ||
        saved["画像URL"] ||
        localStorage.getItem("tagoyamaLastImageUrl")
      )
  };
}

async function loadCertificateFromGas(userId){
  setStatus("登頂記録を確認しています。");

  try{
    const data = await tryManyJson([
      GAS_URL + "?mode=climbHistory&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?mode=receiveCertificate&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?mode=saveClimb&userId=" + encodeURIComponent(userId) + "&t=" + Date.now()
    ]);

    const normalized = normalizeGasData(data, userId);
    certificateData = mergeData(certificateData, normalized);
  }catch(error){
    console.warn(error);
  }
}

function normalizeGasData(data,userId){
  const source = flattenObject(data);

  return {
    userId:
      getFirst(
        source.userId,
        source.uid,
        userId
      ),

    climbCount:
      normalizeNumberText(
        getFirst(
          source.climbCount,
          source.climbNo,
          source.count,
          source.times,
          source["登頂回数"],
          source["回数"],
          source["個人登頂回数"]
        )
      ),

    serialNo:
      cleanSerialNo(
        getFirst(
          source.serialNo,
          source.serial,
          source.no,
          source.certificateNo,
          source["シリアル番号"],
          source["シリアル"],
          source["No"]
        )
      ),

    lastDate:
      formatDateText(
        getFirst(
          source.lastDate,
          source.date,
          source.climbDate,
          source["日時"],
          source["日付"],
          source["登頂日"]
        )
      ),

    imageUrl:
      getFirst(
        source.imageUrl,
        source.certificateImageUrl,
        source.certificateUrl,
        source.image,
        source.imgUrl,
        source.img,
        source.url,
        source["画像URL"],
        source["画像"]
      )
  };
}

function renderCertificate(data){
  const image = document.getElementById("memorialImage");
  const imageBox = document.getElementById("imageBox");
  const noImageBox = document.getElementById("noImageBox");
  const climbTitle = document.getElementById("climbTitle");
  const serialNo = document.getElementById("serialNo");
  const dateText = document.getElementById("dateText");
  const saveBtn = document.getElementById("saveBtn");

  const count =
    normalizeNumberText(data.climbCount);

  let serial =
    cleanSerialNo(data.serialNo);

  const date =
    formatDateText(data.lastDate);

  const imageUrl =
    getString(data.imageUrl);

  if(isTestSerial(serial)){
    serial = "";
  }

  if(climbTitle){
    climbTitle.innerText =
      count
        ? "第" + count + "回 登頂記念"
        : "登頂記念";
  }

  if(serialNo){
    serialNo.innerText =
      serial
        ? "No." + serial
        : "";
  }

  if(dateText){
    dateText.innerText =
      date || "";
  }

  if(imageUrl && image){
    image.onload = function(){
      if(imageBox){
        imageBox.style.display = "block";
      }

      if(noImageBox){
        noImageBox.style.display = "none";
      }

      if(saveBtn){
        saveBtn.disabled = false;
      }
    };

    image.onerror = function(){
      if(imageBox){
        imageBox.style.display = "none";
      }

      if(noImageBox){
        noImageBox.style.display = "flex";
      }

      if(saveBtn){
        saveBtn.disabled = true;
      }
    };

    image.src = imageUrl;
  }else{
    if(imageBox){
      imageBox.style.display = "none";
    }

    if(noImageBox){
      noImageBox.style.display = "flex";
    }

    if(image){
      image.removeAttribute("src");
    }

    if(saveBtn){
      saveBtn.disabled = true;
    }
  }

  certificateData.climbCount = count;
  certificateData.serialNo = serial;
  certificateData.lastDate = date;
  certificateData.imageUrl = imageUrl;
}

function updateLinks(){
  const topLink = document.getElementById("topLink");

  const query =
    certificateData.userId
      ? "?userId=" + encodeURIComponent(certificateData.userId)
      : "";

  if(topLink){
    topLink.href = "index.html" + query;
  }
}

async function saveCertificateImage(){
  const imageBox =
    document.getElementById("imageBox");

  if(!imageBox || imageBox.style.display === "none"){
    alert("保存できる登頂記念証がありません。トップから登頂記念証を受け取ってください。");
    return;
  }

  const btn = document.getElementById("saveBtn");
  const oldText = btn ? btn.innerText : "";

  if(btn){
    btn.disabled = true;
    btn.innerText = "画像を準備中...";
  }

  try{
    const target = document.getElementById("certificateWrap");

    const canvas = await html2canvas(target,{
      backgroundColor:"#000000",
      useCORS:true,
      allowTaint:true,
      scale:2
    });

    const blob = await new Promise(function(resolve){
      canvas.toBlob(function(result){
        resolve(result);
      },"image/png",.95);
    });

    if(!blob){
      throw new Error("画像を作成できませんでした。");
    }

    const filename =
      "tagoyama-certificate-" +
      cleanFileName(certificateData.serialNo || "certificate") +
      ".png";

    const file = new File([blob], filename, {
      type:"image/png"
    });

    if(
      navigator.canShare &&
      navigator.share &&
      navigator.canShare({
        files:[file]
      })
    ){
      await navigator.share({
        files:[file],
        title:"田子山富士 登頂記念証",
        text:makeShareText()
      });
      return;
    }

    downloadBlob(blob, filename);
  }catch(error){
    if(error && error.name === "AbortError"){
      return;
    }

    console.error(error);
    alert("画像保存がうまくいかない場合は、画面をスクリーンショットで保存してください。");
  }finally{
    if(btn){
      btn.disabled = false;
      btn.innerText = oldText || "画像を保存";
    }
  }
}

function downloadBlob(blob,filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = filename;
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(function(){
    URL.revokeObjectURL(url);
  },3000);
}

async function postFacebook(){
  const text =
    makeShareText() +
    "\n" +
    buildShareUrl();

  await copyTextForShare(text);

  alert(
    "投稿文をコピーしました。\nFacebook投稿画面で本文欄に貼り付けてください。"
  );

  const url =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(buildShareUrl());

  window.open(url, "_blank", "noopener,noreferrer");
}

function sendLine(){
  const url =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(buildShareUrl()) +
    "&text=" +
    encodeURIComponent(makeShareText());

  location.href = url;
}

function postX(){
  const url =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(makeShareText()) +
    "&url=" +
    encodeURIComponent(buildShareUrl());

  window.open(url, "_blank", "noopener,noreferrer");
}

async function copyShareText(){
  const text =
    makeShareText() +
    "\n" +
    buildShareUrl();

  await copyTextForShare(text);

  alert("登頂記念証の投稿文をコピーしました。");
}

function buildShareUrl(){
  return SHARE_CERTIFICATE_PAGE + "?v=20260704success";
}

function makeShareText(){
  return "田子山富士 登頂記念証\n" +
    "田子山富士に登頂したご縁を、記念証として残します。\n\n" +
    "#田子山富士 #敷島神社 #志木市";
}

async function copyTextForShare(text){
  try{
    await navigator.clipboard.writeText(text);
  }catch(error){
    const area = document.createElement("textarea");
    area.value = text;
    area.style.position = "fixed";
    area.style.left = "-9999px";
    document.body.appendChild(area);
    area.focus();
    area.select();
    document.execCommand("copy");
    area.remove();
  }
}

async function tryManyJson(urls){
  let lastError = null;

  for(let i = 0; i < urls.length; i++){
    try{
      const data = await getJson(urls[i]);

      if(data !== null && data !== undefined){
        return data;
      }
    }catch(error){
      lastError = error;
    }
  }

  throw lastError || new Error("通信に失敗しました。");
}

async function getJson(url){
  try{
    const res = await fetch(url,{
      method:"GET",
      cache:"no-store"
    });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    return parseJsonText(text);
  }catch(error){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value = String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const objectStart = value.indexOf("{");
    const objectEnd = value.lastIndexOf("}");

    if(objectStart >= 0 && objectEnd > objectStart){
      return JSON.parse(value.substring(objectStart, objectEnd + 1));
    }

    const arrayStart = value.indexOf("[");
    const arrayEnd = value.lastIndexOf("]");

    if(arrayStart >= 0 && arrayEnd > arrayStart){
      return JSON.parse(value.substring(arrayStart,arrayEnd + 1));
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve,reject){
    const callbackName =
      "tagoyamaCertificateCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script =
      document.createElement("script");

    const sep =
      url.indexOf("?") >= 0
        ? "&"
        : "?";

    const timer =
      setTimeout(function(){
        cleanup();
        reject(new Error("JSONP timeout"));
      },12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src =
      url +
      sep +
      "callback=" +
      encodeURIComponent(callbackName);

    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

function flattenObject(data){
  data = data || {};

  let base = {};

  if(Array.isArray(data)){
    if(data.length > 0 && typeof data[data.length - 1] === "object"){
      base = data[data.length - 1];
    }
  }else if(typeof data === "object"){
    base = data;
  }

  const nested =
    base.data &&
    typeof base.data === "object" &&
    !Array.isArray(base.data)
      ? base.data
      : {};

  const latest =
    base.latest &&
    typeof base.latest === "object"
      ? base.latest
      : {};

  const record =
    base.record &&
    typeof base.record === "object"
      ? base.record
      : {};

  return Object.assign({},base,nested,latest,record);
}

function mergeData(base,add){
  const result = Object.assign({},base);
  add = add || {};

  Object.keys(add).forEach(function(key){
    if(getString(add[key])){
      result[key] = add[key];
    }
  });

  return result;
}

function removeTestData(data){
  data = data || {};

  const serial =
    String(data.serialNo || "");

  if(isTestSerial(serial)){
    data.climbCount = "";
    data.serialNo = "";
    data.lastDate = "";
  }

  return data;
}

function isTestSerial(value){
  const text =
    String(value || "").toUpperCase();

  return text.indexOf("TEST") >= 0;
}

function saveDataToLocal(data){
  try{
    if(isTestSerial(data.serialNo)){
      localStorage.removeItem("tagoyamaClimbData");
      localStorage.removeItem("tagoyamaLastClimbCount");
      localStorage.removeItem("tagoyamaLastSerialNo");
      localStorage.removeItem("tagoyamaLastDate");
      return;
    }

    if(data.userId){
      localStorage.setItem("tagoyamaUserId", data.userId);
      localStorage.setItem("tagoyamaFujiUserId", data.userId);

      localStorage.setItem("tagoyamaLastDate", data.lastDate);
    }

}

function setStatus(text){
  const el = document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }
}

function normalizeNumberText(value){
  const text = toHalfWidthNumber(getString(value));
  const match = text.match(/[0-9]+/);

  if(match && match[0]){
    return match[0];
  }

  return "";
}

function cleanSerialNo(value){
  return toHalfWidthNumber(getString(value))
    .replace(/^No\./i,"")
    .replace(/^No/i,"")
    .replace(/^記念番号/,"")
    .trim();
}

function formatDateText(value){
  const text = getString(value);

  if(!text){
    return "";
  }

  return toHalfWidthNumber(text)
    .replace(/-/g,"/")
    .replace(/\./g,"/")
    .replace(/\s.*$/,"");
}

function todayText(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;
}

function toHalfWidthNumber(value){
  return getString(value).replace(/[０-９]/g,function(s){
    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  });
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function getFirst(){
  for(let i = 0; i < arguments.length; i++){
    const value = getString(arguments[i]);

    if(value){
      return value;
    }
  }

  return "";
}

function cleanFileName(value){
  return getString(value)
    .replace(/[\\/:*?"<>|]/g,"")
    .replace(/\s+/g,"-") ||
    "certificate";
}
