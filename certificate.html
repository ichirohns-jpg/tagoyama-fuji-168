<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>田子山富士 登頂記念証</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
padding:0;
font-family:
"Hiragino Mincho ProN",
"Yu Mincho",
serif;
background:
linear-gradient(
180deg,
#130b05 0%,
#2b1609 45%,
#070302 100%
);
color:#fff8dc;
min-height:100vh;
}

.wrap{
width:100%;
max-width:720px;
margin:0 auto;
padding:18px 14px 40px;
}

.header{
text-align:center;
padding:12px 0 16px;
}

.header .small{
font-size:13px;
letter-spacing:.12em;
color:#e8d09a;
}

.header h1{
margin:8px 0 4px;
font-size:28px;
letter-spacing:.08em;
color:#ffd36a;
text-shadow:
0 2px 0 #4b2208,
0 0 18px rgba(255,190,80,.35);
}

.header .sub{
font-size:14px;
color:#f4e1af;
}

.card{
background:
linear-gradient(
180deg,
rgba(90,48,18,.96),
rgba(35,15,6,.98)
);
border:2px solid #c99a3a;
border-radius:22px;
box-shadow:
0 0 0 4px rgba(80,35,8,.9),
0 18px 38px rgba(0,0,0,.55);
padding:14px;
}

#certificate{
position:relative;
width:100%;
background:#000;
border-radius:16px;
overflow:hidden;
border:1px solid rgba(255,215,120,.75);
}

#memorialImage{
display:block;
width:100%;
height:auto;
min-height:420px;
object-fit:cover;
background:#000;
}

.certOverlay{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
}

.certTitle{
position:absolute;
top:4.5%;
left:6%;
right:6%;
text-align:center;
font-size:clamp(20px,6vw,42px);
font-weight:bold;
letter-spacing:.12em;
color:#fff4c2;
}

.certCount{
position:absolute;
top:15%;
left:8%;
right:8%;
text-align:center;
font-size:clamp(17px,4.8vw,32px);
font-weight:bold;
color:#ffe08a;
}

.certBottom{
position:absolute;
bottom:5.5%;
left:6%;
right:6%;
display:flex;
justify-content:space-between;
gap:10px;
font-size:clamp(11px,3.2vw,18px);
font-weight:bold;
color:#fff6d5;
}

.certBottom div{
background:rgba(0,0,0,.34);
border:1px solid rgba(255,230,150,.55);
border-radius:999px;
padding:7px 10px;
}

.infoBox{
margin-top:16px;
padding:14px;
background:rgba(0,0,0,.28);
border:1px solid rgba(255,210,110,.45);
border-radius:16px;
}

.infoRow{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
padding:10px 0;
border-bottom:1px dashed rgba(255,220,150,.35);
font-size:15px;
}

.infoRow:last-child{
border-bottom:none;
}

.infoRow span:first-child{
color:#e7c36c;
}

.infoRow span:last-child{
font-weight:bold;
color:#fff8dc;
}

.btnArea{
margin-top:18px;
display:grid;
gap:12px;
}

.btn{
width:100%;
border:none;
border-radius:999px;
padding:15px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.btn.save{
background:#e0a82f;
color:#2e1602;
}

.btn.back{
background:#5a3415;
color:#fff3cf;
}

.shareArea{
margin-top:18px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.shareBtn{
display:flex;
align-items:center;
justify-content:center;
height:48px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
color:#fff;
}

.line{
background:#06c755;
}

.facebook{
background:#1877f2;
}

.x{
background:#111111;
}

.copy{
background:#8b5a1f;
border:none;
font-size:15px;
cursor:pointer;
}

.loading,
.error{
padding:40px 10px;
text-align:center;
font-size:18px;
}

.popup{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
z-index:9999;
padding:20px;
overflow:auto;
}

.popupInner{
max-width:720px;
margin:auto;
background:#1b0d04;
border-radius:16px;
padding:16px;
}

#savedImage{
width:100%;
display:block;
border-radius:12px;
}

.closeBtn{
width:100%;
margin-top:16px;
padding:14px;
border:none;
border-radius:999px;
background:#d8a13a;
color:#2a1302;
font-size:16px;
font-weight:bold;
}

@media(max-width:480px){

.shareArea{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="wrap">

<div class="header">

<div class="small">

田子山富士168の縁プロジェクト

</div>

<h1>

登頂記念証

</h1>

<div class="sub">

おめでとうございます

</div>

</div>

<div class="card" id="mainCard">

<div id="loading" class="loading">

記念証を準備しています...

</div>

<div
id="error"
class="error"
style="display:none;">
</div>

<div
id="content"
style="display:none;">

<div id="certificate">

<img
id="memorialImage"
src=""
alt="登頂記念画像"
crossorigin="anonymous"
referrerpolicy="no-referrer">

<div class="certOverlay">

<div class="certTitle">

田子山富士 登頂記念

</div>

<div
class="certCount"
id="countText">

第 -- 回 登頂

</div>

<div class="certBottom">

<div id="serialText">

No.----

</div>

<div id="dateText">

----

</div>

</div>

</div>

</div>

<div class="infoBox">

<div class="infoRow">

<span>登頂回数</span>

<span id="infoCount">-</span>

</div>

<div class="infoRow">

<span>シリアル</span>

<span id="infoSerial">-</span>

</div>

<div class="infoRow">

<span>登頂日</span>

<span id="infoDate">-</span>

</div>

<div class="infoRow">

<span>記念画像</span>

<span id="infoImage">-</span>

</div>

</div>

<div class="btnArea">

<button
class="btn save"
onclick="saveImage()">

📜 記念証を授かる

</button>

<button
class="btn back"
onclick="history.back()">

← 戻る

</button>

</div>

<div class="shareArea">

<a
id="lineShare"
class="shareBtn line"
target="_blank">

LINE

</a>

<a
id="facebookShare"
class="shareBtn facebook"
target="_blank">

Facebook

</a>

<a
id="xShare"
class="shareBtn x"
target="_blank">

X

</a>

<button
class="shareBtn copy"
onclick="copyLink()">

リンクコピー

</button>

</div>

</div>

</div>

</div>

<div
id="popup"
class="popup">

<div class="popupInner">

<img id="savedImage">

<button
class="closeBtn"
onclick="closePopup()">

閉じる

</button>

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/あなたのデプロイURL/exec";

let latestSerial="";
let latestCount=0;
let latestDate="";
let latestImageName="";
let latestImageUrl="";

window.addEventListener(
"load",
loadCertificate
);

async function loadCertificate(){

const loading=
document.getElementById("loading");

const error=
document.getElementById("error");

const content=
document.getElementById("content");

try{

const userId=

localStorage.getItem(
"tagoyamaUserId"
)||"";

if(!userId){

throw new Error(
"QRからアクセスしてください"
);

}

const res=

await fetch(

GAS_URL+

"?mode=certificate"+

"&userId="+

encodeURIComponent(userId)

);

const data=
await res.json();

if(!data.success){

throw new Error(

data.message||

"取得できません"

);

}

latestSerial=
data.serial;

latestCount=
data.count;

latestDate=
data.date;

latestImageName=
data.imageName;

latestImageUrl=
data.imageUrl;

const img=
document.getElementById(
"memorialImage"
);

img.src=
latestImageUrl;

await waitImageLoaded(img);

document.getElementById(
"countText"
).innerText=
"第 "+latestCount+" 回 登頂";

document.getElementById(
"serialText"
).innerText=
latestSerial;

document.getElementById(
"dateText"
).innerText=
latestDate;

document.getElementById(
"infoCount"
).innerText=
latestCount+"回";

document.getElementById(
"infoSerial"
).innerText=
latestSerial;

document.getElementById(
"infoDate"
).innerText=
latestDate;

document.getElementById(
"infoImage"
).innerText=
latestImageName;

const shareUrl=
encodeURIComponent(location.href);

const shareText=
encodeURIComponent(
"田子山富士に登頂しました！"
);

document.getElementById(
"lineShare"
).href=
"https://social-plugins.line.me/lineit/share?url="+
shareUrl;

document.getElementById(
"facebookShare"
).href=
"https://www.facebook.com/sharer/sharer.php?u="+
shareUrl;

document.getElementById(
"xShare"
).href=
"https://twitter.com/intent/tweet?text="+
shareText+
"&url="+
shareUrl;

loading.style.display="none";
content.style.display="block";

}catch(err){

loading.style.display="none";

error.style.display="block";

error.innerText=
String(err);

}

}

async function waitImageLoaded(img){

if(
img.complete &&
img.naturalWidth>0
){
return;
}

await new Promise(function(resolve,reject){

img.onload=resolve;
img.onerror=reject;

});

}

async function saveImage(){

const btn=
document.querySelector(
".btn.save"
);

btn.disabled=true;

btn.innerText=
"記念証を授与中...";

try{

await fetch(

GAS_URL+

"?mode=receive"+

"&userId="+
encodeURIComponent(
localStorage.getItem(
"tagoyamaUserId"
)||""
)

);

await waitImageLoaded(
document.getElementById(
"memorialImage"
)
);

const canvas=

await html2canvas(

document.getElementById(
"certificate"
),

{

scale:3,

useCORS:true,

backgroundColor:null

}

);

showImagePopup(
canvas.toDataURL("image/png")
);

}catch(err){

alert(
"画像の保存に失敗しました"
);

}finally{

btn.disabled=false;

btn.innerText=
"📜 記念証を授かる";

}

}

function showImagePopup(src){

document.getElementById(
"savedImage"
).src=src;

document.getElementById(
"popup"
).style.display=
"block";

}

function closePopup(){

document.getElementById(
"popup"
).style.display=
"none";

}

async function copyLink(){

try{

await navigator.clipboard.writeText(
location.href
);

alert(
"リンクをコピーしました"
);

}catch(e){

alert(
"コピーできませんでした"
);

}

}

</script>

</body>
</html>
