  <canvas id="saveCanvas"></canvas>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

    const SITE_BASE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

    const FALLBACK_LOGO =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png";

    const FALLBACK_OGP =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg?v=20260704-certificate";

    const SHARE_CERTIFICATE_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

    let currentData = {
      userId: "",
      climbCount: "",
      serialNo: "",
      lastDate: "",
      imageNo: "",
      imageName: "",
      imageUrl: FALLBACK_OGP,
      participantNo: ""
    };

    document.addEventListener("DOMContentLoaded", function() {
      startCertificatePage();
    });

    async function startCertificatePage() {
      const params = new URLSearchParams(window.location.search);

      const userId =
        getFirst(
          params.get("userId"),
          params.get("id"),
          params.get("uid"),
          localStorage.getItem("tagoyamaUserId"),
          localStorage.getItem("tagoyamaFujiUserId")
        );

      const paramData = cleanData({
        userId: userId,
        climbCount: getFirst(params.get("climbCount"), params.get("count"), params.get("c")),
        serialNo: getFirst(params.get("serialNo"), params.get("serial"), params.get("s")),
        lastDate: getFirst(params.get("lastDate"), params.get("date"), params.get("d")),
        imageNo: getFirst(params.get("imageNo"), params.get("image"), params.get("img")),
        imageName: getFirst(params.get("imageName"), params.get("name")),
        imageUrl: getFirst(params.get("imageUrl"), params.get("url"), params.get("imgurl"), params.get("src")),
        participantNo: getFirst(params.get("participantNo"), params.get("participant"), params.get("p"))
      });

      if (userId) {
        localStorage.setItem("tagoyamaUserId", userId);
        localStorage.setItem("tagoyamaFujiUserId", userId);
      }

      if (paramData.climbCount || paramData.serialNo || paramData.lastDate || paramData.imageUrl || paramData.participantNo) {
        currentData = mergeData(currentData, paramData);
        saveLocalData(currentData);
        renderCertificate(currentData);
        setStatus("登頂記録を表示しました。");
      }

      setOmikujiLink(userId);

      if (!userId) {
        if (!paramData.climbCount && !paramData.serialNo) {
          setStatus("山頂QRから登頂受付後に、登頂記念証が表示されます。");
          renderCertificate(currentData);
        }
        return;
      }

      try {
        setStatus("登頂記録を読み込んでいます。");
        const gasData = await loadClimbHistory(userId);
        currentData = mergeData(currentData, cleanData(gasData));
        currentData.userId = userId;

        if (!currentData.imageUrl) {
          currentData.imageUrl = FALLBACK_OGP;
        }

        saveLocalData(currentData);
        renderCertificate(currentData);

        if (hasShareReadyData(currentData)) {
          setStatus("登頂記録を読み込みました。");
          setNotice("登頂記念証を保存したり、SNSでシェアできます。");
        } else {
          setStatus("登頂記録を読み込みました。");
          setNotice("登頂記念証の情報を確認してください。");
        }
      } catch (error) {
        console.error(error);

        const localData = loadLocalData();

        if (hasShareReadyData(localData)) {
          currentData = mergeData(currentData, localData);
          renderCertificate(currentData);
          setStatus("前回の登頂記録を表示しています。");
          setNotice("通信に失敗しましたが、表示中の記念証は保存できます。");
        } else {
          renderCertificate(currentData);
          setStatus("登頂記録を読み込めませんでした。山頂QRからもう一度お試しください。");
          setNotice("通信状況を確認してから、もう一度開いてください。");
        }
      }
    }

    async function loadClimbHistory(userId) {
      const encodedUserId = encodeURIComponent(userId);

      const urls = [
        GAS_URL + "?climbHistory&userId=" + encodedUserId,
        GAS_URL + "?climbHistory=1&userId=" + encodedUserId,
        GAS_URL + "?action=climbHistory&userId=" + encodedUserId,
        GAS_URL + "?mode=climbHistory&userId=" + encodedUserId,
        GAS_URL + "?userId=" + encodedUserId
      ];

      let lastError = null;

      for (let i = 0; i < urls.length; i++) {
        try {
          const data = await loadJson(urls[i]);

          if (data && typeof data === "object") {
            return data;
          }
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("登頂履歴を取得できませんでした。");
    }

    async function loadJson(url) {
      try {
        const res = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const text = await res.text();
        return parseJsonText(text);
      } catch (fetchError) {
        return await loadJsonp(url);
      }
    }

    function parseJsonText(text) {
      const value = String(text || "").trim();

      if (!value) {
        throw new Error("empty response");
      }

      try {
        return JSON.parse(value);
      } catch (error) {
        const start = value.indexOf("{");
        const end = value.lastIndexOf("}");

        if (start >= 0 && end > start) {
          return JSON.parse(value.substring(start, end + 1));
        }

        throw error;
      }
    }

    function loadJsonp(url) {
      return new Promise(function(resolve, reject) {
        const callbackName =
          "tagoyamaCertificateCallback_" +
          Date.now() +
          "_" +
          Math.floor(Math.random() * 1000000);

        const script = document.createElement("script");
        const sep = url.indexOf("?") >= 0 ? "&" : "?";
        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 12000);

        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("JSONP error"));
        };

        script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
        document.body.appendChild(script);

        function cleanup() {
          clearTimeout(timer);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      });
    }

    function cleanData(data) {
      data = data || {};

      const nested =
        data.data && typeof data.data === "object"
          ? data.data
          : {};

      const source = Object.assign({}, data, nested);

      const imageUrl =
        normalizeImageUrl(
          getFirst(
            source.imageUrl,
            source.certificateImageUrl,
            source.certificateUrl,
            source.image,
            source.imgUrl,
            source.img,
            source.url
          )
        );

      return {
        userId: getFirst(source.userId, source.uid, source.id),
        climbCount: normalizeNumberText(
          getFirst(
            source.climbCount,
            source.count,
            source.times,
            source.climb_count,
            source.climb
          )
        ),
        serialNo: cleanSerialNo(
          getFirst(
            source.serialNo,
            source.serial,
            source.no,
            source.serial_no,
            source.number
          )
        ),
        lastDate: getFirst(
          source.lastDate,
          source.date,
          source.climbDate,
          source.last_date,
          source.createdAt
        ),
        imageNo: getFirst(source.imageNo, source.image_no),
        imageName: getFirst(source.imageName, source.image_name, source.title, source.name),
        imageUrl: imageUrl,
        participantNo: normalizeNumberText(
          getFirst(
            source.participantNo,
            source.participant,
            source.participant_no,
            source.people,
            source.total,
            source.totalCount
          )
        )
      };
    }

    function mergeData(base, next) {
      base = base || {};
      next = next || {};

      return {
        userId: getFirst(next.userId, base.userId),
        climbCount: getFirst(next.climbCount, base.climbCount),
        serialNo: getFirst(next.serialNo, base.serialNo),
        lastDate: getFirst(next.lastDate, base.lastDate),
        imageNo: getFirst(next.imageNo, base.imageNo),
        imageName: getFirst(next.imageName, base.imageName),
        imageUrl: getFirst(next.imageUrl, base.imageUrl, FALLBACK_OGP),
        participantNo: getFirst(next.participantNo, base.participantNo)
      };
    }

    function saveLocalData(data) {
      try {
        if (data.userId) {
          localStorage.setItem("tagoyamaUserId", data.userId);
          localStorage.setItem("tagoyamaFujiUserId", data.userId);
        }

        if (data.climbCount) {
          localStorage.setItem("tagoyamaLastClimbCount", data.climbCount);
        }

        if (data.serialNo) {
          localStorage.setItem("tagoyamaLastSerialNo", data.serialNo);
        }

        if (data.lastDate) {
          localStorage.setItem("tagoyamaLastDate", data.lastDate);
        }

        if (data.imageUrl) {
          localStorage.setItem("tagoyamaLastImageUrl", data.imageUrl);
        }

        if (data.participantNo) {
          localStorage.setItem("tagoyamaLastParticipantNo", data.participantNo);
        }
      } catch (error) {
        console.warn(error);
      }
    }

    function loadLocalData() {
      try {
        return cleanData({
          userId: getFirst(
            localStorage.getItem("tagoyamaUserId"),
            localStorage.getItem("tagoyamaFujiUserId")
          ),
          climbCount: localStorage.getItem("tagoyamaLastClimbCount"),
          serialNo: localStorage.getItem("tagoyamaLastSerialNo"),
          lastDate: localStorage.getItem("tagoyamaLastDate"),
          imageUrl: localStorage.getItem("tagoyamaLastImageUrl"),
          participantNo: localStorage.getItem("tagoyamaLastParticipantNo")
        });
      } catch (error) {
        return {};
      }
    }

    function renderCertificate(data) {
      data = cleanData(data || {});

      const climbCount = data.climbCount || "--";
      const serialNo = data.serialNo || "取得中";
      const lastDate = data.lastDate || getTodayForCertificate();
      const participantNo = data.participantNo || "取得中";
      const imageUrl = data.imageUrl || FALLBACK_OGP;

      document.getElementById("climbTitle").innerText =
        climbCount && climbCount !== "--"
          ? "第" + climbCount + "回 登頂記念"
          : "登頂記念";

      document.getElementById("serialNo").innerText =
        "No." + serialNo;

      document.getElementById("dateText").innerText =
        formatDateText(lastDate);

      document.getElementById("participantText").innerText =
        participantNo === "取得中"
          ? "参加人数 取得中"
          : "参加人数 " + participantNo + "人";

      const img = document.getElementById("certificateImage");
      img.src = imageUrl;

      currentData = mergeData(currentData, data);
    }

    function setStatus(text) {
      const el = document.getElementById("statusBox");
      if (el) {
        el.innerText = text;
      }
    }

    function setNotice(text) {
      const el = document.getElementById("noticeBox");
      if (el) {
        el.innerText = text;
      }
    }

    function setOmikujiLink(userId) {
      const link = document.getElementById("omikujiBtn");

      if (!link) {
        return;
      }

      if (userId) {
        link.href = "omikuji.html?userId=" + encodeURIComponent(userId);
      } else {
        link.href = "omikuji.html";
      }
    }

    function handleImageError() {
      const img = document.getElementById("certificateImage");

      if (!img) {
        return;
      }

      if (img.src !== FALLBACK_LOGO) {
        img.src = FALLBACK_LOGO;
      }
    }

    async function saveCertificateImage() {
      const btn = document.getElementById("saveBtn");
      const oldText = btn ? btn.innerText : "";

      if (btn) {
        btn.disabled = true;
        btn.innerText = "画像を準備中...";
      }

      try {
        const data = certGetCurrentData();

        if (!hasShareReadyData(data)) {
          alert("登頂記念証は山頂QRから登頂受付後に保存できます。");
          return;
        }

        const baseImage = await certLoadBestImage(data.imageUrl);
        const blob = await certCreateCertificateBlob(baseImage, data);

        if (!blob) {
          alert("登頂記念証の画像を作成できませんでした。");
          return;
        }

        const safeNo =
          data.serialNo
            ? data.serialNo.replace(/[\\/:*?"<>|]/g, "")
            : "certificate";

        const fileName =
          "tagoyama-certificate-" +
          safeNo +
          ".png";

        const file = new File([blob], fileName, {
          type: "image/png"
        });

        if (
          navigator.canShare &&
          navigator.share &&
          navigator.canShare({
            files: [file]
          })
        ) {
          await navigator.share({
            files: [file],
            title: "田子山富士 登頂記念証",
            text: makeCertificateShareText(data)
          });
          return;
        }

        downloadBlob(blob, fileName);
      } catch (error) {
        console.error(error);
        alert("登頂記念証の画像保存に失敗しました。もう一度押してください。");
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.innerText = oldText || "画像を保存";
        }
      }
    }

    function certGetCurrentData() {
      const climbTitleEl = document.getElementById("climbTitle");
      const serialNoEl = document.getElementById("serialNo");
      const dateTextEl = document.getElementById("dateText");
      const participantTextEl = document.getElementById("participantText");
      const imageEl = document.getElementById("certificateImage");

      const climbText = climbTitleEl ? getString(climbTitleEl.innerText) : "";
      const serialText = serialNoEl ? getString(serialNoEl.innerText) : "";
      const dateText = dateTextEl ? getString(dateTextEl.innerText) : "";
      const participantText = participantTextEl ? getString(participantTextEl.innerText) : "";

      const climbMatch = climbText.match(/第\s*([0-9０-９]+)\s*回/);
      const participantMatch = participantText.match(/([0-9０-９]+)/);

      const data = cleanData({
        userId: getFirst(
          currentData.userId,
          localStorage.getItem("tagoyamaUserId"),
          localStorage.getItem("tagoyamaFujiUserId")
        ),
        climbCount: getFirst(
          currentData.climbCount,
          climbMatch && climbMatch[1] ? climbMatch[1] : "",
          localStorage.getItem("tagoyamaLastClimbCount")
        ),
        serialNo: getFirst(
          currentData.serialNo,
          serialText.replace(/^No\./, "").replace(/^No/, ""),
          localStorage.getItem("tagoyamaLastSerialNo")
        ),
        lastDate: getFirst(
          currentData.lastDate,
          dateText,
          localStorage.getItem("tagoyamaLastDate")
        ),
        imageNo: getFirst(currentData.imageNo),
        imageName: getFirst(currentData.imageName),
        imageUrl: getFirst(
          currentData.imageUrl,
          imageEl ? imageEl.currentSrc : "",
          imageEl ? imageEl.src : "",
          localStorage.getItem("tagoyamaLastImageUrl"),
          FALLBACK_OGP
        ),
        participantNo: getFirst(
          currentData.participantNo,
          participantMatch && participantMatch[1] ? participantMatch[1] : "",
          localStorage.getItem("tagoyamaLastParticipantNo")
        )
      });

      currentData = mergeData(currentData, data);
      return currentData;
    }

    function hasShareReadyData(data) {
      data = data || {};
      return Boolean(
        getString(data.climbCount) ||
        getString(data.serialNo) ||
        getString(data.lastDate)
      );
    }

    async function certLoadBestImage(imageUrl) {
      const urls = certMakeImageUrlList(imageUrl);

      const imageEl = document.getElementById("certificateImage");

      if (imageEl) {
        if (imageEl.currentSrc) {
          urls.push(imageEl.currentSrc);
        }

        if (imageEl.src) {
          urls.push(imageEl.src);
        }
      }

      for (let i = 0; i < urls.length; i++) {
        const url = getString(urls[i]);

        if (!url) {
          continue;
        }

        try {
          const img = await loadImageForCanvas(url);
          return img;
        } catch (error) {
          console.warn("画像読み込み失敗", url, error);
        }
      }

      return null;
    }

    function loadImageForCanvas(url) {
      return new Promise(function(resolve, reject) {
        const img = new Image();

        img.onload = function() {
          resolve(img);
        };

        img.onerror = function() {
          reject(new Error("画像読み込み失敗: " + url));
        };

        img.crossOrigin = "anonymous";
        img.referrerPolicy = "no-referrer";
        img.src = url;
      });
    }

    function certMakeImageUrlList(url) {
      const urls = [];
      const value = getString(url);
      const driveId = certGetDriveId(value);

      function add(u) {
        u = getString(u);

        if (u && urls.indexOf(u) === -1) {
          urls.push(u);
        }
      }

      if (driveId) {
        add(
          "https://lh3.googleusercontent.com/d/" +
          encodeURIComponent(driveId) +
          "=w2000"
        );

        add(
          "https://drive.google.com/thumbnail?id=" +
          encodeURIComponent(driveId) +
          "&sz=w2000"
        );

        add(
          "https://drive.google.com/uc?export=view&id=" +
          encodeURIComponent(driveId)
        );
      }

      add(value);
      add(FALLBACK_OGP);
      add(FALLBACK_LOGO);

      return urls;
    }

    function certGetDriveId(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      let match = value.match(/\/file\/d\/([^/]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/[?&]id=([^&]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

      if (match && match[1]) {
        return match[1];
      }

      if (/^[a-zA-Z0-9_-]{20,}$/.test(value)) {
        return value;
      }

      return "";
    }

    function normalizeImageUrl(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      if (
        value.indexOf("data:image") === 0 ||
        value.indexOf("blob:") === 0
      ) {
        return value;
      }

      const driveId = certGetDriveId(value);

      if (driveId) {
        return "https://lh3.googleusercontent.com/d/" +
          encodeURIComponent(driveId) +
          "=w2000";
      }

      return value;
    }

    function certCreateCertificateBlob(baseImage, data) {
      return new Promise(function(resolve) {
        const canvas = document.getElementById("saveCanvas") || document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        const width = 1200;
        const height = 1600;

        canvas.width = width;
        canvas.height = height;

        certDrawCertificateCanvas(ctx, width, height, baseImage, data);

        try {
          canvas.toBlob(function(blob) {
            resolve(blob || null);
          }, "image/png");
        } catch (error) {
          console.error(error);
          resolve(null);
        }
      });
    }

    function certDrawCertificateCanvas(ctx, width, height, baseImage, data) {
      data = cleanData(data || {});

      const bg = ctx.createLinearGradient(0, 0, 0, height);
      bg.addColorStop(0, "#3a260c");
      bg.addColorStop(0.45, "#15100a");
      bg.addColorStop(1, "#000000");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      if (baseImage) {
        try {
          certDrawCoverImage(ctx, baseImage, width, height);

          const shade = ctx.createLinearGradient(0, 0, 0, height);
          shade.addColorStop(0, "rgba(0,0,0,0.10)");
          shade.addColorStop(0.45, "rgba(0,0,0,0.25)");
          shade.addColorStop(0.75, "rgba(0,0,0,0.72)");
          shade.addColorStop(1, "rgba(0,0,0,0.92)");
          ctx.fillStyle = shade;
          ctx.fillRect(0, 0, width, height);
        } catch (error) {
          console.error(error);
        }
      }

      const glow = ctx.createRadialGradient(
        width / 2,
        height * 0.18,
        10,
        width / 2,
        height * 0.18,
        width * 0.72
      );
      glow.addColorStop(0, "rgba(255,241,170,0.34)");
      glow.addColorStop(0.45, "rgba(216,179,90,0.12)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, height);

      ctx.save();

      ctx.strokeStyle = "rgba(255,241,170,0.92)";
      ctx.lineWidth = 10;
      certRoundRect(ctx, 54, 54, width - 108, height - 108, 48);
      ctx.stroke();

      ctx.strokeStyle = "rgba(216,179,90,0.64)";
      ctx.lineWidth = 4;
      certRoundRect(ctx, 84, 84, width - 168, height - 168, 34);
      ctx.stroke();

      ctx.fillStyle = "rgba(0,0,0,0.42)";
      certRoundRect(ctx, 120, height * 0.56, width - 240, height * 0.33, 36);
      ctx.fill();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.88)";
      ctx.shadowBlur = 18;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 5;

      certDrawSeal(ctx, width / 2, height * 0.20, 122);

      ctx.fillStyle = "#fff1aa";
      ctx.font = "900 46px sans-serif";
      ctx.fillText("田子山富士 168の縁プロジェクト", width / 2, height * 0.40);

      ctx.fillStyle = "#fffbe0";
      ctx.font = "900 82px sans-serif";
      ctx.fillText("登頂記念証", width / 2, height * 0.49);

      ctx.fillStyle = "#fff8dc";
      ctx.font = "900 74px sans-serif";
      ctx.fillText("第" + (data.climbCount || "--") + "回 登頂記念", width / 2, height * 0.66);

      ctx.fillStyle = "#fff1aa";
      ctx.font = "900 50px sans-serif";
      ctx.fillText("No." + (data.serialNo || "取得中"), width / 2, height * 0.74);

      ctx.fillStyle = "#f8e9b8";
      ctx.font = "800 38px sans-serif";
      ctx.fillText(formatDateText(data.lastDate || getTodayForCertificate()), width / 2, height * 0.80);

      ctx.font = "800 34px sans-serif";
      ctx.fillText("参加人数 " + (data.participantNo || "取得中") + "人", width / 2, height * 0.85);

      ctx.fillStyle = "rgba(255,248,220,0.90)";
      ctx.font = "700 28px sans-serif";
      ctx.fillText("田子山富士", width / 2, height * 0.92);

      ctx.restore();
    }

    function certDrawCoverImage(ctx, img, width, height) {
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;

      if (!iw || !ih) {
        return;
      }

      const scale = Math.max(width / iw, height / ih);
      const sw = width / scale;
      const sh = height / scale;
      const sx = (iw - sw) / 2;
      const sy = (ih - sh) / 2;

      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, width, height);
    }

    function certDrawSeal(ctx, cx, cy, r) {
      ctx.save();

      const grad = ctx.createRadialGradient(cx, cy, 8, cx, cy, r);
      grad.addColorStop(0, "rgba(255,241,170,0.52)");
      grad.addColorStop(0.62, "rgba(216,179,90,0.28)");
      grad.addColorStop(1, "rgba(0,0,0,0.18)");

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.lineWidth = 8;
      ctx.strokeStyle = "rgba(255,241,170,0.95)";
      ctx.stroke();

      ctx.fillStyle = "#fff1aa";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.75)";
      ctx.shadowBlur = 10;
      ctx.font = "900 46px sans-serif";
      ctx.fillText("田子", cx, cy - 28);
      ctx.fillText("山富士", cx, cy + 30);

      ctx.restore();
    }

    function certRoundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);

      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = filename;
      a.rel = "noopener";
      document.body.appendChild(a);
      a.click();
      a.remove();

      setTimeout(function() {
        URL.revokeObjectURL(url);
      }, 3000);
    }

    function postFacebook() {
      const data = certGetCurrentData();
      const url = buildCertificateShareUrl(data);

      const shareUrl =
        "https://www.facebook.com/sharer/sharer.php?u=" +
        encodeURIComponent(url);

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    function sendLine() {
      const data = certGetCurrentData();
      const url = buildCertificateShareUrl(data);
      const text = makeCertificateShareText(data) + "\n" + url;

      const shareUrl =
        "https://social-plugins.line.me/lineit/share?url=" +
        encodeURIComponent(url) +
        "&text=" +
        encodeURIComponent(text);

      location.href = shareUrl;
    }

    function postX() {
      const data = certGetCurrentData();
      const url = buildCertificateShareUrl(data);

      const shareUrl =
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(makeCertificateShareText(data)) +
        "&url=" +
        encodeURIComponent(url);

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    async function copyShareLink() {
      const data = certGetCurrentData();
      const text = makeCertificateShareText(data) + "\n" + buildCertificateShareUrl(data);

      try {
        await navigator.clipboard.writeText(text);
        alert("登頂記念証の結果をコピーしました。");
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = text;
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.focus();
        area.select();
        document.execCommand("copy");
        area.remove();
        alert("登頂記念証の結果をコピーしました。");
      }
    }

    function buildCertificateShareUrl(data) {
      data = cleanData(data || certGetCurrentData());

      const p = new URLSearchParams();
      const imgid = certGetDriveId(data.imageUrl);

      if (data.userId) {
        p.set("u", data.userId);
      }

      if (data.climbCount) {
        p.set("c", data.climbCount);
      }

      if (data.serialNo) {
        p.set("s", data.serialNo);
      }

      if (data.lastDate) {
        p.set("d", data.lastDate);
      }

      if (data.participantNo) {
        p.set("p", data.participantNo);
      }

      if (imgid) {
        p.set("imgid", imgid);
      }

      p.set("v", "20260704");

      return SHARE_CERTIFICATE_PAGE + "?" + p.toString();
    }

    function makeCertificateShareText(data) {
      data = cleanData(data || certGetCurrentData());

      return "田子山富士 登頂記念証\n" +
        "第" + (data.climbCount || "--") + "回 登頂記念\n" +
        "No." + (data.serialNo || "取得中") + "\n" +
        formatDateText(data.lastDate || getTodayForCertificate()) + "\n" +
        "参加人数 " + (data.participantNo || "取得中") + "人";
    }

    function getTodayForCertificate() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");

      return y + "/" + m + "/" + day;
    }

    function formatDateText(value) {
      const text = getString(value);

      if (!text) {
        return getTodayForCertificate();
      }

      return text
        .replace(/-/g, "/")
        .replace(/\./g, "/")
        .replace(/\s.*$/, "");
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }

    function getFirst() {
      for (let i = 0; i < arguments.length; i++) {
        const value = getString(arguments[i]);

        if (value) {
          return value;
        }
      }

      return "";
    }

    function normalizeNumberText(value) {
      const text = toHalfWidthNumber(getString(value));
      const match = text.match(/[0-9]+/);

      if (match && match[0]) {
        return match[0];
      }

      return "";
    }

    function cleanSerialNo(value) {
      return toHalfWidthNumber(getString(value))
        .replace(/^No\./i, "")
        .replace(/^No/i, "")
        .replace(/^記念番号/, "")
        .trim();
    }

    function toHalfWidthNumber(value) {
      return getString(value).replace(/[０-９]/g, function(s) {
        return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
      });
    }

    window.saveCertificateImage = saveCertificateImage;
    window.downloadCertificateImage = saveCertificateImage;
    window.downloadCertificate = saveCertificateImage;
    window.shareCertificateImage = saveCertificateImage;
    window.postFacebook = postFacebook;
    window.sendLine = sendLine;
    window.postX = postX;
    window.copyShareLink = copyShareLink;
  </script>
