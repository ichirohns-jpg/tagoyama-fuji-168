<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>登頂記念証</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
padding:20px;
color:#fff;
}

.wrap{
max-width:900px;
margin:auto;
}

.card{
background:#000;
border:2px solid #d4af37;
border-radius:32px;
padding:18px;
box-shadow:
0 10px 30px rgba(0,0,0,.5);
}

.certificateImageBox{
position:relative;
overflow:hidden;
border-radius:24px;
}

.memorialImage{
width:100%;
display:block;
}

.overlay{
position:absolute;
inset:0;
padding:20px;
}

.topArea{
text-align:center;
padding-top:10px;
}

.shrine{
font-size:28px;
font-weight:900;
letter-spacing:4px;
color:#ffffff;
font-family:
"Yu Mincho",
serif;
}

.project{
margin-top:8px;
font-size:20px;
font-weight:900;
color:#f3d57a;
}

.bottomArea{
position:absolute;
left:0;
right:0;
bottom:35px;
text-align:center;
}

.round{
font-size:22px;
font-weight:900;
}

.serial{
font-size:42px;
font-weight:900;
color:#f3d57a;
}

.date{
font-size:16px;
font-weight:700;
margin-top:10px;
}

</style>
</head>

<body>

<div class="wrap">

<div
id="certificate"
class="card">

<div class="certificateImageBox">

<img
id="memorialImage"
class="memorialImage"
src="sakura01.jpg"
alt="記念画像"
crossorigin="anonymous">

<div class="overlay">

<div class="topArea">

<div class="shrine">
田子山富士
</div>

<div class="project">
登頂記念証
</div>

</div>

<div class="bottomArea">

<div
id="round"
class="round">
-
</div>

<div
id="serial"
class="serial">
-
</div>

<div
id="date"
class="date">
-
</div>

</div>

</div>

</div>

</div>

<button
class="btn save"
onclick="saveImage()">
📜 記念証を授かる
</button>

<button
class="btn copy"
onclick="copyUrl()">
① リンクをコピー
</button>

<button
class="btn fb"
onclick="shareFacebook()">
② Facebookを開く
</button>

<button
class="btn x"
onclick="shareX()">
X
</button>

<button
class="btn line"
onclick="shareLine()">
LINE
</button>

<button
class="btn home"
onclick="location.href='index.html'">
🏠 田子山富士へ戻る
</button>

<script>

const params =
new URLSearchParams(
location.search
);

const serial =
params.get("serial")
||
sessionStorage.getItem(
"latestSerial"
)
||
localStorage.getItem(
"latestSerial"
);

if(!serial){

alert(
"登頂記録が見つかりません"
);

location.href =
"qr.html";

throw new Error(
"serial not found"
);

}

const imageUrl =
params.get("image")
||
sessionStorage.getItem(
"latestImageUrl"
)
||
localStorage.getItem(
"latestImageUrl"
)
||
"sakura01.jpg";

alert(imageUrl);

document.getElementById(
"memorialImage"
).src =
imageUrl;

const serialParts =
String(serial)
.split("-");

const climbCount =
parseInt(
serialParts[0] || "1",
10
);

const serialNo =
serialParts[1] || "0001";

document.getElementById(
"round"
).innerText =
"第" +
climbCount +
"回登頂記念";

document.getElementById(
"serial"
).innerText =
"No." +
serialNo;

</script>

</body>
</html>
