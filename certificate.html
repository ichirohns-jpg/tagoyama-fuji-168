<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>登頂記念証｜田子山富士168の縁</title>

<meta name="description" content="田子山富士に登頂したご縁を、記念証として残します。">

<meta property="og:title" content="田子山富士 登頂記念証">
<meta property="og:description" content="田子山富士に登頂したご縁を、記念証として残します。">
<meta property="og:image" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg">
<meta property="og:url" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="田子山富士 登頂記念証">
<meta name="twitter:description" content="田子山富士に登頂したご縁を、記念証として残します。">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:#050505;
  color:#fff;
  font-family:
    "Hiragino Sans",
    "Yu Gothic",
    "Meiryo",
    sans-serif;
  padding:18px;
}

.wrap{
  max-width:900px;
  margin:0 auto;
}

.card{
  background:#000;
  border:2px solid #d4af37;
  border-radius:28px;
  padding:16px;
  box-shadow:
    0 12px 32px rgba(0,0,0,.55);
}

.logo{
  width:86px;
  height:86px;
  object-fit:contain;
  display:block;
  margin:0 auto 10px;
}

.siteTitle{
  text-align:center;
  color:#ffe78a;
  font-size:clamp(24px,7vw,44px);
  font-weight:900;
  line-height:1.25;
  text-shadow:
    0 3px 8px rgba(0,0,0,.9),
    0 0 12px rgba(212,175,55,.45);
  margin-bottom:6px;
}

.subTitle{
  text-align:center;
  color:#fff7d5;
  font-size:clamp(15px,4vw,22px);
  font-weight:800;
  line-height:1.5;
  margin-bottom:18px;
}

h1{
  text-align:center;
  color:#ffe78a;
  font-size:clamp(28px,8vw,54px);
  line-height:1.2;
  letter-spacing:.04em;
  text-shadow:
    0 3px 8px rgba(0,0,0,.9),
    0 0 12px rgba(212,175,55,.45);
  margin-bottom:18px;
}

.status{
  border:1px solid rgba(212,175,55,.55);
  border-radius:24px;
  padding:20px 14px;
  text-align:center;
  color:#fff7d5;
  font-size:clamp(18px,5vw,28px);
  font-weight:800;
  line-height:1.6;
  margin-bottom:18px;
}

.certificateBox{
  position:relative;
  width:100%;
  overflow:hidden;
  border-radius:22px;
  background:#111;
  margin-bottom:18px;
}

.certificateImage{
  width:100%;
  display:block;
  background:#111;
}

.overlay{
  position:absolute;
  left:0;
  right:0;
  bottom:7%;
  text-align:center;
  color:#fff;
  padding:0 12px;
  pointer-events:none;
  text-shadow:
    0 3px 7px rgba(0,0,0,.95),
    0 0 12px rgba(0,0,0,.9);
}

.climbText{
  font-size:clamp(24px,7vw,52px);
  font-weight:900;
  line-height:1.2;
  letter-spacing:.06em;
}

.serialText{
  margin-top:8px;
  font-size:clamp(22px,6.5vw,48px);
  font-weight:900;
  line-height:1.15;
  letter-spacing:.03em;
}

.dateText{
  margin-top:8px;
  font-size:clamp(18px,5.5vw,36px);
  font-weight:900;
  line-height:1.2;
  letter-spacing:.04em;
}

.note{
  text-align:center;
  color:#fff7d5;
  font-size:15px;
  font-weight:700;
  line-height:1.7;
  margin-bottom:18px;
}

.buttons{
  display:grid;
  gap:12px;
}

.btn{
  width:100%;
  border:none;
  border-radius:999px;
  padding:16px 18px;
  font-size:clamp(19px,5.5vw,30px);
  font-weight:900;
  line-height:1.2;
  text-align:center;
  text-decoration:none;
  cursor:pointer;
  color:#111;
  background:linear-gradient(180deg,#ffe78a,#d4af37);
  box-shadow:0 8px 18px rgba(0,0,0,.45);
}

.btn.sub{
  color:#fff;
  background:#222;
  border:1px solid #d4af37;
}

.btn:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.message{
  margin-top:14px;
  text-align:center;
  color:#d4af37;
  font-size:15px;
  font-weight:800;
  line-height:1.7;
  min-height:1.7em;
}

.bottom{
  margin-top:28px;
  text-align:center;
}

.topLink{
  display:inline-block;
  color:#d4af37;
  text-decoration:none;
  font-size:20px;
  font-weight:900;
  border:1px solid #d4af37;
  border-radius:999px;
  padding:13px 30px;
}

.footer{
  margin-top:28px;
  text-align:center;
  color:#d4af37;
  font-size:14px;
  line-height:1.8;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <img class="logo" src="./logo.png" alt="田子山富士">

    <div class="siteTitle">
      田子山富士
    </div>

    <div class="subTitle">
      田子山富士 168の縁プロジェクト
    </div>

    <h1>登頂記念証</h1>

    <div id="status" class="status">
      登頂記録を読み込んでいます。
    </div>

    <div id="certificateArea" class="certificateBox">
      <img
        id="certificateImage"
        class="certificateImage"
        src="./ogp-certificate.jpg"
        alt="田子山富士 登頂記念証"
      >

      <div class="overlay">
        <div id="climbText" class="climbText">
          第1回 登頂記念
        </div>
        <div id="serialText" class="serialText">
          No.TEST-0001
        </div>
        <div id="dateText" class="dateText">
          2026/07/03
        </div>
      </div>
    </div>

    <div class="note">
      登頂記念証を保存したり、SNSでシェアできます。
    </div>

    <div class="buttons">
      <button id="saveBtn" class="btn" type="button">
        画像を保存
      </button>

      <button id="facebookBtn" class="btn sub" type="button">
        Facebookに投稿
      </button>

      <button id="lineBtn" class="btn sub" type="button">
        LINEで送る
      </button>

      <button id="xBtn" class="btn sub" type="button">
        Xで投稿
      </button>

      <button id="copyBtn" class="btn sub" type="button">
        投稿文をコピー
      </button>
    </div>

    <div id="message" class="message"></div>

    <div class="bottom">
      <a class="topLink" href="./index.html">トップへ戻る</a>
    </div>

    <div class="footer">
      田子山富士 168の縁プロジェクト<br>
      登頂記念証
    </div>

  </div>
</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

const SHARE_URL =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

const POST_TEXT =
"田子山富士 登頂記念証\n" +
"田子山富士に登頂したご縁を、記念証として残します。\n\n" +
"#田子山富士 #敷島神社 #志木市";

const params =
new URLSearchParams(window.location.search);

const statusBox =
document.getElementById("status");

const certificateImage =
document.getElementById("certificateImage");

const climbText =
document.getElementById("climbText");

const serialText =
document.getElementById("serialText");

const dateText =
document.getElementById("dateText");

const saveBtn =
document.getElementById("saveBtn");

const facebookBtn =
document.getElementById("facebookBtn");

const lineBtn =
document.getElementById("lineBtn");

const xBtn =
document.getElementById("xBtn");

const copyBtn =
document.getElementById("copyBtn");

const messageBox =
document.getElementById("message");

let userId =
params.get("userId") || "";

let climbCount =
params.get("climbCount") || "";

let serialNo =
params.get("serialNo") || "";

let lastDate =
params.get("lastDate") || "";

let imageUrl =
params.get("imageUrl") || "";

function setMessage(text){
  messageBox.textContent =
  text || "";
}

function todayText(){
  const d =
  new Date();

  const y =
  d.getFullYear();

  const m =
  String(d.getMonth() + 1).padStart(2,"0");

  const day =
  String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;
}

function safeText(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function applyCertificateText(){
  climbCount =
  safeText(climbCount) || "1";

  climbCount =
  climbCount.replace(/[^\d]/g,"") || "1";

  serialNo =
  safeText(serialNo) || "TEST-0001";

  lastDate =
  safeText(lastDate) || todayText();

  climbText.textContent =
  "第" + climbCount + "回 登頂記念";

  serialText.textContent =
  "No." + serialNo;

  dateText.textContent =
  lastDate;
}

function waitImageLoaded(img){
  return new Promise(function(resolve,reject){

    if(img.complete && img.naturalWidth > 0){
      resolve();
      return;
    }

    img.onload = function(){
      if(img.naturalWidth > 0){
        resolve();
      }else{
        reject(new Error("画像を読み込めませんでした"));
      }
    };

    img.onerror = function(){
      reject(new Error("画像を読み込めませんでした"));
    };
  });
}

async function readFromGas(){
  if(!userId){
    return;
  }

  const url =
  GAS_URL +
  "?mode=receiveCertificate" +
  "&userId=" + encodeURIComponent(userId) +
  "&serial=" + encodeURIComponent(serialNo);

  const res =
  await fetch(url);

  const data =
  await res.json();

  if(!data){
    return;
  }

  if(!params.get("climbCount") && data.climbCount){
    climbCount =
    data.climbCount;
  }

  if(!params.get("serialNo") && data.serialNo){
    serialNo =
    data.serialNo;
  }

  if(!params.get("serialNo") && data.serial){
    serialNo =
    data.serial;
  }

  if(!params.get("lastDate") && data.lastDate){
    lastDate =
    data.lastDate;
  }

  if(!params.get("lastDate") && data.date){
    lastDate =
    data.date;
  }

  if(params.get("imageUrl") && imageUrl){
    certificateImage.src =
    imageUrl;
  }
}

async function init(){
  applyCertificateText();

  try{
    await readFromGas();
    applyCertificateText();

    if(imageUrl){
      certificateImage.src =
      imageUrl;
    }

    await waitImageLoaded(certificateImage);

    statusBox.textContent =
    "登頂記録を表示しました。";

  }catch(e){
    applyCertificateText();

    statusBox.textContent =
    "登頂記録を表示しました。";
  }
}

async function makeImageFile(){
  await waitImageLoaded(certificateImage);

  const target =
  document.getElementById("certificateArea");

  const canvas =
  await html2canvas(target,{
    backgroundColor:"#000000",
    useCORS:true,
    allowTaint:false,
    scale:2
  });

  return new Promise(function(resolve,reject){
    canvas.toBlob(function(blob){
      if(!blob){
        reject(new Error("保存画像を作成できませんでした"));
        return;
      }

      const file =
      new File(
        [blob],
        "tagoyama-fuji-certificate.png",
        { type:"image/png" }
      );

      resolve(file);

    },"image/png");
  });
}

async function saveImage(){
  saveBtn.disabled =
  true;

  saveBtn.textContent =
  "画像を準備中...";

  try{
    const file =
    await makeImageFile();

    if(
      navigator.canShare &&
      navigator.canShare({ files:[file] })
    ){
      await navigator.share({
        files:[file],
        title:"田子山富士 登頂記念証",
        text:POST_TEXT
      });

      setMessage("画像を保存・共有できます。");
    }else{
      setMessage("この端末では画像保存共有に対応していません。");
    }

  }catch(e){
    setMessage("記念画像を読み込めませんでした。");
  }

  saveBtn.disabled =
  false;

  saveBtn.textContent =
  "画像を保存";
}

function openFacebook(){
  const url =
  "https://www.facebook.com/sharer/sharer.php?u=" +
  encodeURIComponent(SHARE_URL);

  window.open(url,"_blank","noopener,noreferrer");
}

function openLine(){
  const url =
  "https://social-plugins.line.me/lineit/share?url=" +
  encodeURIComponent(SHARE_URL) +
  "&text=" +
  encodeURIComponent(POST_TEXT);

  window.open(url,"_blank","noopener,noreferrer");
}

function openX(){
  const url =
  "https://twitter.com/intent/tweet?text=" +
  encodeURIComponent(POST_TEXT) +
  "&url=" +
  encodeURIComponent(SHARE_URL);

  window.open(url,"_blank","noopener,noreferrer");
}

async function copyText(){
  const text =
  POST_TEXT + "\n" + SHARE_URL;

  try{
    await navigator.clipboard.writeText(text);
    setMessage("投稿文をコピーしました。");
  }catch(e){
    const textarea =
    document.createElement("textarea");

    textarea.value =
    text;

    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);

    setMessage("投稿文をコピーしました。");
  }
}

saveBtn.addEventListener("click",saveImage);
facebookBtn.addEventListener("click",openFacebook);
lineBtn.addEventListener("click",openLine);
xBtn.addEventListener("click",openX);
copyBtn.addEventListener("click",copyText);

init();
</script>

</body>
</html>
