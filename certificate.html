<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

const SHARE_CERTIFICATE_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

const SHARE_VERSION =
  "20260703-safe-final";

const FALLBACK_IMAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/top.jpg?v=20260703-safe-final";

const FALLBACK_LOGO =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png";

let certificateData = {
  userId:"",
  climbCount:"1",
  serialNo:"1-0001",
  lastDate:todayText(),
  imageUrl:""
};

window.addEventListener("load", initCertificate);

async function initCertificate(){
  const urlData = getDataFromUrl();
  const localData = getDataFromLocal();

  certificateData = mergeData(certificateData, localData);
  certificateData = mergeData(certificateData, urlData);

  if(certificateData.userId){
    await loadCertificateFromGas(certificateData.userId);
  }

  if(!certificateData.climbCount){
    certificateData.climbCount = "1";
  }

  if(!certificateData.serialNo){
    certificateData.serialNo = "1-0001";
  }

  if(!certificateData.lastDate){
    certificateData.lastDate = todayText();
  }

  if(!certificateData.imageUrl){
    certificateData.imageUrl = FALLBACK_IMAGE;
  }

  certificateData.imageUrl = normalizeImageUrl(certificateData.imageUrl);

  saveDataToLocal(certificateData);
  renderCertificate(certificateData);
  updateLinks();
  setStatus("登頂記録を読み込みました。");
}

function getDataFromUrl(){
  const params = new URLSearchParams(location.search);

  const imgid =
    getString(params.get("imgid")) ||
    getString(params.get("imageId")) ||
    getString(params.get("id"));

  let imageUrl =
    getString(params.get("imageUrl")) ||
    getString(params.get("image")) ||
    getString(params.get("img")) ||
    getString(params.get("url"));

  if(!imageUrl && imgid){
    imageUrl =
      "https://lh3.googleusercontent.com/d/" +
      encodeURIComponent(imgid) +
      "=w2000";
  }

  return {
    userId:
      getString(params.get("userId")) ||
      getString(params.get("userid")) ||
      getString(params.get("uid")),

    climbCount:
      normalizeNumberText(
        getString(params.get("climbCount")) ||
        getString(params.get("count")) ||
        getString(params.get("c"))
      ),

    serialNo:
      cleanSerialNo(
        getString(params.get("serialNo")) ||
        getString(params.get("serial")) ||
        getString(params.get("s"))
      ),

    lastDate:
      formatDateText(
        getString(params.get("lastDate")) ||
        getString(params.get("date")) ||
        getString(params.get("d"))
      ),

    imageUrl:imageUrl
  };
}

function getDataFromLocal(){
  let data = {};

  try{
    const text = localStorage.getItem("tagoyamaClimbData");

    if(text){
      const parsed = JSON.parse(text);

      if(parsed && typeof parsed === "object"){
        data = parsed;
      }
    }
  }catch(error){
    data = {};
  }

  return {
    userId:
      getString(data.userId) ||
      localStorage.getItem("tagoyamaUserId") ||
      localStorage.getItem("tagoyamaFujiUserId") ||
      "",

    climbCount:
      normalizeNumberText(
        data.climbCount ||
        localStorage.getItem("tagoyamaLastClimbCount") ||
        ""
      ),

    serialNo:
      cleanSerialNo(
        data.serialNo ||
        localStorage.getItem("tagoyamaLastSerialNo") ||
        ""
      ),

    lastDate:
      formatDateText(
        data.lastDate ||
        localStorage.getItem("tagoyamaLastDate") ||
        ""
      ),

    imageUrl:
      getString(
        data.imageUrl ||
        localStorage.getItem("tagoyamaLastImageUrl") ||
        ""
      )
  };
}

async function loadCertificateFromGas(userId){
  setStatus("登頂記録を確認しています。");

  try{
    const data = await tryManyJson([
      GAS_URL + "?mode=climbHistory&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?action=climbHistory&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?climbHistory=1&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?mode=getClimb&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?action=getClimb&userId=" + encodeURIComponent(userId) + "&t=" + Date.now()
    ]);

    const normalized = normalizeGasData(data, userId);
    certificateData = mergeData(certificateData, normalized);
  }catch(error){
    console.warn(error);
  }
}

function normalizeGasData(data, userId){
  const source = flattenObject(data);

  return {
    userId:getFirst(source.userId, source.uid, userId),

    climbCount:
      normalizeNumberText(
        getFirst(
          source.climbCount,
          source.count,
          source.times,
          source.climb_count,
          source.climb,
          source["登頂回数"],
          source["個人登頂回数"]
        )
      ),

    serialNo:
      cleanSerialNo(
        getFirst(
          source.serialNo,
          source.serial,
          source.no,
          source.serial_no,
          source.number,
          source["シリアル"],
          source["記念番号"]
        )
      ),

    lastDate:
      formatDateText(
        getFirst(
          source.lastDate,
          source.date,
          source.climbDate,
          source.last_date,
          source.createdAt,
          source["日時"],
          source["日付"]
        )
      ),

    imageUrl:getFirst(
      source.imageUrl,
      source.certificateImageUrl,
      source.certificateUrl,
      source.image,
      source.imgUrl,
      source.img,
      source.url,
      source["画像URL"]
    )
  };
}

function renderCertificate(data){
  const image = document.getElementById("memorialImage");
  const climbTitle = document.getElementById("climbTitle");
  const serialNo = document.getElementById("serialNo");
  const dateText = document.getElementById("dateText");

  const count =
    normalizeNumberText(data.climbCount) || "1";

  const serial =
    cleanSerialNo(data.serialNo) || "1-0001";

  const date =
    formatDateText(data.lastDate) || todayText();

  if(image){
    image.src = data.imageUrl || FALLBACK_IMAGE;
  }

  if(climbTitle){
    climbTitle.innerText = "第" + count + "回 登頂記念";
  }

  if(serialNo){
    serialNo.innerText = "No." + serial;
  }

  if(dateText){
    dateText.innerText = date;
  }

  certificateData.climbCount = count;
  certificateData.serialNo = serial;
  certificateData.lastDate = date;
}

function updateLinks(){
  const topLink = document.getElementById("topLink");

  const query =
    certificateData.userId
      ? "?userId=" + encodeURIComponent(certificateData.userId)
      : "";

  if(topLink){
    topLink.href = "index.html" + query;
  }
}

function setStatus(text){
  const el = document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }
}

function saveDataToLocal(data){
  try{
    if(data.userId){
      localStorage.setItem("tagoyamaUserId", data.userId);
      localStorage.setItem("tagoyamaFujiUserId", data.userId);
    }

    if(data.climbCount){
      localStorage.setItem("tagoyamaLastClimbCount", data.climbCount);
    }

    if(data.serialNo){
      localStorage.setItem("tagoyamaLastSerialNo", data.serialNo);
    }

    if(data.lastDate){
      localStorage.setItem("tagoyamaLastDate", data.lastDate);
    }

    if(data.imageUrl){
      localStorage.setItem("tagoyamaLastImageUrl", data.imageUrl);
    }

    localStorage.setItem("tagoyamaClimbData", JSON.stringify(data));
  }catch(error){
    console.warn(error);
  }
}

async function saveCertificateImage(){
  const btn = document.getElementById("saveBtn");
  const oldText = btn ? btn.innerText : "";

  if(btn){
    btn.disabled = true;
    btn.innerText = "画像を準備中...";
  }

  try{
    const blob = await makeCertificateBlob();

    if(!blob){
      throw new Error("画像を作成できませんでした。");
    }

    const filename =
      "tagoyama-certificate-" +
      cleanFileName(certificateData.serialNo || "certificate") +
      ".png";

    const file = new File([blob], filename, {
      type:"image/png"
    });

    if(
      navigator.canShare &&
      navigator.share &&
      navigator.canShare({
        files:[file]
      })
    ){
      await navigator.share({
        files:[file],
        title:"田子山富士 登頂記念証",
        text:makeShareText()
      });
      return;
    }

    downloadBlob(blob, filename);
  }catch(error){
    if(error && error.name === "AbortError"){
      return;
    }

    console.error(error);
    alert("画像保存がうまくいかない場合は、表示画像を長押しして保存してください。");
  }finally{
    if(btn){
      btn.disabled = false;
      btn.innerText = oldText || "画像を保存";
    }
  }
}

async function makeCertificateBlob(){
  const imageUrl =
    certificateData.imageUrl ||
    FALLBACK_IMAGE;

  const image = await loadImageForCanvas(imageUrl);

  const canvas = document.getElementById("saveCanvas");
  const ctx = canvas.getContext("2d");

  const width =
    image.naturalWidth ||
    image.width ||
    1080;

  const height =
    image.naturalHeight ||
    image.height ||
    1350;

  canvas.width = width;
  canvas.height = height;

  ctx.clearRect(0,0,width,height);
  ctx.drawImage(image,0,0,width,height);

  drawCertificateText(ctx,width,height);

  return await new Promise(function(resolve){
    canvas.toBlob(function(blob){
      resolve(blob);
    }, "image/png", .95);
  });
}

function drawCertificateText(ctx,width,height){
  const count =
    normalizeNumberText(certificateData.climbCount) || "1";

  const serial =
    cleanSerialNo(certificateData.serialNo) || "1-0001";

  const date =
    formatDateText(certificateData.lastDate) || todayText();

  drawText(ctx,"田子山富士",width/2,height*.055,width*.050,"#fff7ca","serif");
  drawText(ctx,"登頂記念証",width/2,height*.110,width*.070,"#ffdf72","serif");

  drawText(ctx,"第" + count + "回 登頂記念",width/2,height*.730,width*.062,"#ffdf72","serif");
  drawText(ctx,"No." + serial,width/2,height*.795,width*.082,"#fff7ca","sans");
  drawText(ctx,date,width/2,height*.875,width*.058,"#fff7ca","sans");
}

function drawText(ctx,text,x,y,size,color,fontType){
  ctx.save();

  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.lineJoin = "round";

  const font =
    fontType === "serif"
      ? "serif"
      : "sans-serif";

  ctx.font =
    "900 " +
    size +
    "px " +
    font;

  ctx.shadowColor = "rgba(0,0,0,.85)";
  ctx.shadowBlur = Math.max(4,size*.13);
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = Math.max(2,size*.05);

  ctx.lineWidth = Math.max(2,size*.055);
  ctx.strokeStyle = "rgba(0,0,0,.62)";
  ctx.strokeText(text,x,y);

  ctx.fillStyle = color;
  ctx.fillText(text,x,y);

  ctx.restore();
}

function loadImageForCanvas(url){
  return new Promise(function(resolve,reject){
    const urls = makeImageUrlList(url);
    let index = 0;

    function next(){
      if(index >= urls.length){
        reject(new Error("画像を読み込めませんでした。"));
        return;
      }

      const target = urls[index];
      index++;

      const image = new Image();
      image.crossOrigin = "anonymous";

      image.onload = function(){
        resolve(image);
      };

      image.onerror = function(){
        next();
      };

      image.src = target;
    }

    next();
  });
}

function downloadBlob(blob,filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = filename;
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(function(){
    URL.revokeObjectURL(url);
  },3000);
}

async function copyTextForShare(text){
  try{
    await navigator.clipboard.writeText(text);
  }catch(error){
    const area = document.createElement("textarea");
    area.value = text;
    area.style.position = "fixed";
    area.style.left = "-9999px";
    document.body.appendChild(area);
    area.focus();
    area.select();
    document.execCommand("copy");
    area.remove();
  }
}

function handleImageError(){
  const image = document.getElementById("memorialImage");

  if(!image){

  }

  if(image.src !== FALLBACK_IMAGE){
    image.src = FALLBACK_IMAGE;
    return;
  }

  if(image.src !== FALLBACK_LOGO){
    image.src = FALLBACK_LOGO;
  }
}

async function tryManyJson(urls){
  let lastError = null;

  for(let i=0;i<urls.length;i++){
    try{
      const data = await getJson(urls[i]);

      if(data !== null && data !== undefined){
        return data;
      }
    }catch(error){
      lastError = error;
    }
  }

  throw lastError || new Error("通信に失敗しました。");
}

async function getJson(url){
  try{
    const res = await fetch(url,{
      method:"GET",
      cache:"no-store"
    });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    return parseJsonText(text);
  }catch(error){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value = String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const start = value.indexOf("{");
    const end = value.lastIndexOf("}");

    if(start >= 0 && end > start){
      return JSON.parse(value.substring(start,end+1));
    }

    const arrayStart = value.indexOf("[");
    const arrayEnd = value.lastIndexOf("]");

    if(arrayStart >= 0 && arrayEnd > arrayStart){
      return JSON.parse(value.substring(arrayStart,arrayEnd+1));
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve,reject){
    const callbackName =
      "tagoyamaCertificateCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random()*1000000);

    const script = document.createElement("script");
    const sep = url.indexOf("?") >= 0 ? "&" : "?";

    const timer = setTimeout(function(){
      cleanup();
      reject(new Error("JSONP timeout"));
    },12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

function makeImageUrlList(url){
  const urls = [];
  const value = getString(url);
  const driveId = getDriveId(value);

  function add(u){
    u = getString(u);

    if(u && urls.indexOf(u) === -1){
      urls.push(u);
    }
  }

  if(driveId){
    add(
      "https://lh3.googleusercontent.com/d/" +
      encodeURIComponent(driveId) +
      "=w2000"
    );

    add(
      "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(driveId) +
      "&sz=w2000"
    );

    add(
      "https://drive.google.com/uc?export=view&id=" +
      encodeURIComponent(driveId)
    );
  }

  add(value);
  add(FALLBACK_IMAGE);

  return urls;
}

function normalizeImageUrl(url){
  const value = getString(url);

  if(!value){
    return "";
  }

  const driveId = getDriveId(value);

  if(driveId){
    return "https://lh3.googleusercontent.com/d/" +
      encodeURIComponent(driveId) +
      "=w2000";
  }

  return value;
}

function getDriveId(url){
  const value = getString(url);

  if(!value){
    return "";
  }

  let match = value.match(/\/file\/d\/([^/]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = value.match(/[?&]id=([^&]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = value.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

  if(match && match[1]){
    return match[1];
  }

  if(/^[a-zA-Z0-9_-]{20,}$/.test(value)){
    return value;
  }

  return "";
}

function flattenObject(data){
  data = data || {};

  const nested =
    data.data &&
    typeof data.data === "object" &&
    !Array.isArray(data.data)
      ? data.data
      : {};

  return Object.assign({},data,nested);
}

function normalizeNumberText(value){
  const text = toHalfWidthNumber(getString(value));
  const match = text.match(/[0-9]+/);

  if(match && match[0]){
    return match[0];
  }

  return "";
}

function toHalfWidthNumber(value){
  return getString(value).replace(/[０-９]/g,function(s){
    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  });
}

function cleanSerialNo(value){
  return toHalfWidthNumber(getString(value))
    .replace(/^No\./i,"")
    .replace(/^No/i,"")
    .replace(/^記念番号/,"")
    .trim();
}

function formatDateText(value){
  const text = getString(value);

  if(!text){
    return "";
  }

  return text
    .replace(/-/g,"/")
    .replace(/\./g,"/")
    .replace(/\s.*$/,"");
}

function todayText(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function getFirst(){
  for(let i=0;i<arguments.length;i++){
    const value = getString(arguments[i]);

    if(value){
      return value;
    }
  }

  return "";
}

function cleanFileName(value){
  return getString(value)
    .replace(/[\\/:*?"<>|]/g,"")
    .replace(/\s+/g,"-") ||
    "certificate";
}
