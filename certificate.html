<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>登頂記念証</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
padding:20px;
color:#fff;
}

.wrap{
max-width:900px;
margin:auto;
}

.card{
background:#000;
border:2px solid #d4af37;
border-radius:28px;
padding:16px;
box-shadow:
0 10px 30px rgba(0,0,0,.5);
}

.certificateImageBox{
position:relative;
overflow:hidden;
border-radius:22px;
}

.memorialImage{
width:100%;
display:block;
}

.overlay{
position:absolute;
inset:0;
pointer-events:none;
}

.titleArea{
position:absolute;
top:30px;
left:0;
right:0;
text-align:center;
}

.shrine{
font-size:38px;
font-weight:700;
letter-spacing:4px;
color:#fff;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 2px 10px rgba(0,0,0,.8);
}

.project{
margin-top:8px;
font-size:15px;
letter-spacing:4px;
color:#f3e3a0;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
}

.infoArea{
position:absolute;
right:24px;
bottom:24px;
text-align:right;
}

.date{
font-size:14px;
color:#ffffff;
margin-bottom:4px;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 2px 8px rgba(0,0,0,.8);
}

.round{
font-size:13px;
color:#ffffff;
margin-bottom:2px;
opacity:.9;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
}

.serial{
font-size:13px;
font-weight:400;
color:#ffffff;
opacity:.9;
font-family:
"Yu Mincho",
"Hiragino Mincho ProN",
serif;
text-shadow:
0 2px 8px rgba(0,0,0,.8);
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:14px;
margin-top:12px;
font-size:20px;
font-weight:900;
cursor:pointer;
}

.save{
background:#2ecc71;
color:#fff;
}

.fb{
background:#1877f2;
color:#fff;
}

.x{
background:#000;
color:#fff;
}

.line{
background:#06c755;
color:#fff;
}

.copy{
background:#607d8b;
color:#fff;
}

.footer{
margin-top:20px;
text-align:center;
color:#aaa;
font-size:14px;
}

</style>
</head>

<body>

<div class="wrap">

<div
id="certificate"
class="card">

<div class="certificateImageBox">

<img
id="memorialImage"
class="memorialImage"
src="sakura01.jpg"
alt="記念画像"
crossorigin="anonymous">

<div class="overlay">

<div class="titleArea">

<div class="shrine">
田子山富士
</div>

<div class="project">
登頂記念
</div>

</div>

<div class="infoArea">

<div
id="date"
class="date">

令和八年六月二十日

</div>

<div
class="round">

第壱回登頂

</div>

<div
id="serial"
class="serial">

No.1-0001

</div>

</div>

</div>

</div>

</div>

<button
class="btn save"
onclick="saveImage()">

画像を保存

</button>

<button
class="btn fb"
onclick="shareFacebook()">

Facebook

</button>

<button
class="btn x"
onclick="shareX()">

X

</button>

<button
class="btn line"
onclick="shareLine()">

LINE

</button>

<button
class="btn copy"
onclick="copyUrl()">

リンクをコピー

</button>

<div class="footer">

田子山富士 登頂記念証

</div>

</div>

<script>

const params =
new URLSearchParams(
location.search
);

const serial =
params.get("serial")
|| "1-0001";

document.getElementById(
"serial"
).innerText =
"No." + serial;

const imageUrl =
params.get("image")
|| "sakura01.jpg";

document.getElementById(
"memorialImage"
).src =
imageUrl;

async function saveImage(){

try{

const canvas =
await html2canvas(
document.getElementById(
"certificate"
),
{
scale:2,
useCORS:true,
allowTaint:false
}
);

const link =
document.createElement(
"a"
);

link.download =
"tagoyama-fuji-goshuin.png";

link.href =
canvas.toDataURL(
"image/png"
);

link.click();

}catch(error){

alert(
"画像保存エラー"
);

}

}

function shareFacebook(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(
location.href
)
);

}

function shareX(){

window.open(
"https://twitter.com/intent/tweet?url=" +
encodeURIComponent(
location.href
)
);

}

function shareLine(){

window.open(
"https://social-plugins.line.me/lineit/share?url=" +
encodeURIComponent(
location.href
)
);

}

function copyUrl(){

navigator.clipboard.writeText(
location.href
);

alert(
"リンクをコピーしました"
);

}

const now =
new Date();

const wareki =
"令和八年" +
(now.getMonth()+1) +
"月" +
now.getDate() +
"日";

document.getElementById(
"date"
).innerText =
wareki;

</script>

</body>
</html>
