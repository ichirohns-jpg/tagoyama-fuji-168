"Hiragino Mincho ProN",

serif;

letter-spacing:.12em;

color:#F0E6C8;

0 2px 3px rgba(0,0,0,.62),

}

.topTitleMain{
margin-top:1.4%;
font-family:
"Hiragino Mincho ProN",

"YuMincho",

serif;
font-size:clamp(27px,6.6vw,68px);

letter-spacing:.12em;

0 2px 4px rgba(0,0,0,.64),

left:9%;

box-shadow:
0 0 0 1px rgba(255,244,190,.10) inset,
0 8px 18px rgba(0,0,0,.34),
0 0 18px rgba(218,181,83,.12);
backdrop-filter:blur(3px);
-webkit-backdrop-filter:blur(3px);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

top:8.5%;
left:50%;
transform:translateX(-50%) rotate(45deg);
width:14px;

box-shadow:
0 0 8px rgba(232,206,119,.35),
0 1px 2px rgba(0,0,0,.55);
}

.infoLine{
width:44%;
height:1px;
background:linear-gradient(90deg,rgba(220,185,90,0),rgba(220,185,90,.70),rgba(220,185,90,0));
margin:0 auto 3.0%;
}

.countText{
font-family:
"Hiragino Mincho ProN",
"Yu Mincho",
"YuMincho",
serif;
font-size:clamp(18px,4.0vw,40px);
font-weight:800;
letter-spacing:.12em;
line-height:1.25;
color:#F7F3EA;
text-align:center;
text-shadow:
0 2px 3px rgba(0,0,0,.62);
white-space:nowrap;
}

.serialText{
margin-top:3.0%;
font-family:
"Hiragino Mincho ProN",
"Yu Mincho",
"YuMincho",
"Times New Roman",
serif;
font-size:clamp(34px,8.9vw,74px);
font-weight:900;
letter-spacing:.045em;
line-height:1.05;
color:#E0BE58;
text-align:center;
text-shadow:
0 2px 3px rgba(0,0,0,.68),
0 0 10px rgba(226,193,95,.16);
-webkit-text-stroke:.35px rgba(64,42,12,.55);
white-space:nowrap;
}

.dateText{
margin-top:3.4%;
font-family:
"Hiragino Mincho ProN",
"Yu Mincho",
"YuMincho",
serif;
font-size:clamp(15px,3.6vw,34px);
font-weight:800;
letter-spacing:.14em;
line-height:1.2;
color:#F4F1EA;
text-align:center;

0 2px 3px rgba(0,0,0,.62);
white-space:nowrap;
}

.buttonArea{
display:grid;
gap:14px;
margin:22px auto 0;
max-width:540px;
}

.btn,
.linkBtn{

min-height:62px;
border:none;
border-radius:999px;
display:flex;

cursor:pointer;
box-shadow:
0 7px 0 rgba(0,0,0,.32),

}

opacity:.55;
cursor:not-allowed;
}

background:linear-gradient(180deg,#35df86,#19b75e);
}

background:linear-gradient(180deg,#e4c24d,#b98a20);
color:#261402;
}

.blackBtn{
background:linear-gradient(180deg,#232323,#050505);
}

display:none !important;
}

.footer{
margin-top:22px;
text-align:center;
font-size:13px;
line-height:1.7;
color:#c7b77a;
}

.wrap{
padding:14px 10px 42px;
}

.certificateCard{
border-radius:24px;
}

}

<body>

<div class="wrap">

<div class="status" id="status">
登頂記念証を読み込んでいます。
</div>

<div class="certificateWrap">

<div class="certificateCard" id="certificateCard">

<div class="fallbackBg" id="fallbackBg"></div>

<img
id="bgImage"
class="bgImage"
src=""
alt="田子山富士 登頂記念証">

<div class="frameOuter"></div>
<div class="frameInner"></div>

<div class="topTitle">
<div class="topTitleSmall">
田子山富士
</div>
<div class="topTitleMain">
登頂記念証
</div>
</div>

<div class="infoPanel">

<div class="infoOrnament"></div>

<div class="infoLine"></div>

<div class="countText" id="countText">
第--回　登頂記念
</div>

<div class="serialText" id="serialText">
No.----
</div>

<div class="dateText" id="dateText">
----
</div>

</div>

</div>

</div>

<div class="buttonArea">

<button class="btn goldBtn" id="saveBtn" onclick="saveCertificateImage(this)">
画像を保存・共有
</button>

<button class="btn greenBtn" id="shareBtn" onclick="shareCertificateLink(this)">
登頂記念証をシェア
</button>

<button class="btn blackBtn" onclick="goBack()">
← トップへ戻る
</button>

</div>

<div class="footer">
田子山富士 168の縁プロジェクト<br>
登頂記念証
</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzvMzzESm9atr6QWKvFwVlVMFYSAsj_oF0ZTCE7L0ojrX1VJhRWGaoLCD1Judga8vSb/exec";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

let currentUserId =
"";

let certificateData =
null;

let latestCertificateFile =
null;

window.addEventListener(
"load",
init
);

async function init(){

  currentUserId =
  getUserIdFromUrl();

  if(!currentUserId){

    setStatus("userId がありません。山頂QRコードから登頂受付をしてください。");
    return;

  }

  await loadCertificate();

}

function getUserIdFromUrl(){

  const params =
  new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    ""
  );

}

async function loadCertificate(){

  try{

    setStatus("登頂記念証を読み込んでいます。");

    const data =
    await fetchJson(
      GAS_URL +
      "?mode=certificate" +
      "&userId=" +
      encodeURIComponent(currentUserId) +
      "&t=" +
      Date.now()
    );

    if(!data || !data.success){

      throw new Error(
        data && data.message
        ? data.message
        : "登頂記念証を取得できませんでした"
      );

    }

    const item =
    data.result ||
    data.certificate ||
    data.data ||
    data;

    certificateData =
    item;

    const imageUrl =
    getCertificateImageUrl(item);

    const bg =
    document.getElementById("bgImage");

    const fallback =
    document.getElementById("fallbackBg");

    bg.onerror =
    function(){

      bg.style.display =
      "none";

      fallback.style.display =
      "block";

      setStatus("画像を読み込めませんでした。記念証情報は表示しています。");

    };

    if(imageUrl){

      bg.style.display =
      "block";

      fallback.style.display =
      "none";

      bg.src =
      imageUrl;

    }else{

      bg.style.display =
      "none";

      fallback.style.display =
      "block";

    }

    const count =
    getCertificateCount(item);

    const serial =
    getCertificateSerial(item);

    const date =
    getCertificateDate(item);

    document.getElementById("countText").innerText =
    "第" +
    (count || "--") +
    "回　登頂記念";

    document.getElementById("serialText").innerText =
    "No." +
    (serial || "----");

    document.getElementById("dateText").innerText =
    date || todayText();

    document.title =
    "田子山富士 登頂記念証" +
    (serial ? " No." + serial : "");

    setStatus("登頂記念証を表示しました。");

  }catch(err){

    setStatus(
      err.message ||
      "登頂記念証を表示できませんでした。"
    );

  }

}

function getCertificateImageUrl(data){

  data = data || {};

  return getString(
    data.imageUrl ||
    data.imageURL ||
    data.image ||
    data.url ||
    data.backgroundImage ||
    data.bgImage ||
    data.certificateImage ||
    data.certificateImageUrl ||
    data.photoUrl ||
    data.photoURL ||
    ""
  );

}

function getCertificateCount(data){

  data = data || {};

  return getString(
    data.count ||
    data.round ||
    data.climbCount ||
    data.climbNo ||
    data.climbNumber ||
    data.times ||
    ""
  );

}

function getCertificateSerial(data){

  data = data || {};

  return cleanSerial(
    data.serial ||
    data.serialNo ||
    data.serialNumber ||
    data.certificateNo ||
    data.certificateNumber ||
    data.number ||
    data.no ||
    data.climbSerial ||
    data.recordNo ||
    data.recordNumber ||
    ""
  );

}

function getCertificateDate(data){

  data = data || {};

  return getString(
    data.date ||
    data.createdAt ||
    data.created ||
    data.time ||
    data.datetime ||
    todayText()
  );

}

async function saveCertificateImage(btn){

  if(btn){

    btn.disabled =
    true;

    btn.innerText =
    "画像を準備中...";

  }

  try{

    const file =
    await makeCertificateFile();

    if(!navigator.share){

      downloadFile(file);
      return;

    }

    const data =
    {
      files:[file],
      title:"田子山富士 登頂記念証",
      text:"田子山富士168の縁プロジェクト 登頂記念証"
    };

    if(
      navigator.canShare &&
      !navigator.canShare({files:[file]})
    ){

      downloadFile(file);
      return;

    }

    await navigator.share(data);

  }catch(err){

    alert(
      "画像を保存・共有できませんでした。\n時間をおいてもう一度お試しください。"
    );

  }finally{

    if(btn){

      btn.disabled =
      false;

      btn.innerText =
      "画像を保存・共有";

    }

  }

}

async function shareCertificateLink(btn){

  const serial =
  certificateData
  ? getCertificateSerial(certificateData)
  : "";

  const url =
  location.href;

  const text =
  "田子山富士168の縁プロジェクト\n登頂記念証" +
  (serial ? "\nNo." + serial : "") +
  "\n" +
  url;

  try{

    await copyTextOnly(text);

  }catch(e){}

  location.href =
  "https://www.facebook.com/sharer/sharer.php?u=" +
  encodeURIComponent(url);

}

async function makeCertificateFile(){

  if(latestCertificateFile){
    return latestCertificateFile;
  }

  const card =
  document.getElementById("certificateCard");

  if(document.fonts && document.fonts.ready){

    try{
      await document.fonts.ready;
    }catch(e){}

  }

  await waitForImage(
    document.getElementById("bgImage")
  );

  const canvas =
  await html2canvas(
    card,
    {
      backgroundColor:null,
      scale:3,
      useCORS:true,
      allowTaint:true,
      logging:false
    }
  );

  const blob =
  await new Promise(function(resolve){

    canvas.toBlob(
      resolve,
      "image/png",
      1
    );

  });

  if(!blob){
    throw new Error("画像作成に失敗しました");
  }

  latestCertificateFile =
  new File(
    [blob],
    "tagoyama-certificate.png",
    {
      type:"image/png"
    }
  );

  return latestCertificateFile;

}

function downloadFile(file){

  const url =
  URL.createObjectURL(file);

  const a =
  document.createElement("a");

  a.href =
  url;

  a.download =
  file.name;

  document.body.appendChild(a);

  a.click();

  document.body.removeChild(a);

  setTimeout(function(){

    URL.revokeObjectURL(url);

  },1000);

}

function waitForImage(img){

  return new Promise(function(resolve){

    if(!img || !img.src || img.style.display === "none"){
      resolve();
      return;
    }

    if(img.complete){
      resolve();
      return;
    }

    img.onload =
    function(){
      resolve();
    };

    img.onerror =
    function(){
      resolve();
    };

  });

}

async function fetchJson(url){

  const res =
  await fetch(
    url,
    {
      method:"GET",
      cache:"no-store"
    }
  );

  const text =
  await res.text();

  try{

    return JSON.parse(text);

  }catch(e){

    const m =
    text.match(/^[^(]+\((.*)\);?$/);

    if(m && m[1]){
      return JSON.parse(m[1]);
    }

    throw e;

  }

}

function setStatus(text){

  document.getElementById("status").innerText =
  text;

}

function goBack(){

  location.href =
  HOME_PAGE +
  "?v=" +
  Date.now();

}

function cleanSerial(value){

  value =
  getString(value);

  return value
  .replace(/^No\.?\s*/i,"")
  .trim();

}

function todayText(){

  const d =
  new Date();

  const y =
  d.getFullYear();

  const m =
  String(d.getMonth() + 1).padStart(2,"0");

  const day =
  String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;

}

function getString(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();

}

async function copyTextOnly(text){

  if(navigator.clipboard && navigator.clipboard.writeText){

    await navigator.clipboard.writeText(text);

    return true;

  }

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.style.position =
  "fixed";

  textarea.style.left =
  "-9999px";

  document.body.appendChild(textarea);

  textarea.focus();

  textarea.select();

  document.execCommand("copy");

  document.body.removeChild(textarea);

  return true;

}

</script>

</body>
</html>
