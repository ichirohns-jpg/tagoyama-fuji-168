<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>田子山富士 登頂記念証</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
*{box-sizing:border-box;}
body{
margin:0;
padding:0;
font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
background:linear-gradient(180deg,#130b05 0%,#2b1609 45%,#070302 100%);
color:#fff8dc;
min-height:100vh;
}
.wrap{
width:100%;
max-width:720px;
margin:0 auto;
padding:18px 14px 40px;
}
.header{
text-align:center;
padding:12px 0 16px;
}
.header .small{
font-size:13px;
letter-spacing:.12em;
color:#e8d09a;
}
.header h1{
margin:8px 0 4px;
font-size:28px;
letter-spacing:.08em;
color:#ffd36a;
text-shadow:0 2px 0 #4b2208,0 0 18px rgba(255,190,80,.35);
}
.header .sub{
font-size:14px;
color:#f4e1af;
}
.card{
background:linear-gradient(180deg,rgba(90,48,18,.96),rgba(35,15,6,.98));
border:2px solid #c99a3a;
border-radius:22px;
box-shadow:0 0 0 4px rgba(80,35,8,.9),0 18px 38px rgba(0,0,0,.55);
padding:14px;
}
#certificate{
position:relative;
width:100%;
background:#000;
border-radius:16px;
overflow:hidden;
border:1px solid rgba(255,215,120,.75);
}
#memorialImage{
display:block;
width:100%;
height:auto;
min-height:420px;
object-fit:cover;
background:#000;
}

.certOverlay{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
}

.certTitle{
position:absolute;
top:4.5%;
left:6%;
right:6%;
text-align:center;
font-size:clamp(20px,6vw,42px);
font-weight:bold;
letter-spacing:.12em;
color:#fff4c2;
}

.certCount{
position:absolute;
top:15%;
left:8%;
right:8%;
text-align:center;
font-size:clamp(17px,4.8vw,32px);
font-weight:bold;
color:#ffe08a;
}

.certBottom{
position:absolute;
bottom:5.5%;
left:6%;
right:6%;
display:flex;
justify-content:space-between;
gap:10px;
font-size:clamp(11px,3.2vw,18px);
font-weight:bold;
color:#fff6d5;
text-shadow:
0 2px 3px #000,
0 0 8px rgba(0,0,0,.9);
}

.certBottom div{
background:rgba(0,0,0,.34);
border:1px solid rgba(255,230,150,.55);
border-radius:999px;
padding:7px 10px;
}

.infoBox{
margin-top:16px;
padding:14px;
background:rgba(0,0,0,.28);
border:1px solid rgba(255,210,110,.45);
border-radius:16px;
}

.infoRow{
display:flex;
justify-content:space-between;
gap:12px;
padding:9px 0;
border-bottom:1px dashed rgba(255,220,150,.35);
font-size:15px;
}

.infoRow:last-child{
border-bottom:none;
}

.infoRow span:first-child{
color:#e7c36c;
white-space:nowrap;
}

.infoRow span:last-child{
text-align:right;
font-weight:bold;
color:#fff8dc;
}

.btnArea{
margin-top:18px;
display:grid;
gap:12px;
}

.btn{
width:100%;
border:none;
border-radius:999px;
padding:15px 18px;
font-size:17px;
font-weight:bold;
cursor:pointer;
box-shadow:
0 6px 0 rgba(70,30,5,.9),
0 14px 24px rgba(0,0,0,.35);
}

.btn:disabled{
opacity:.65;
cursor:not-allowed;
}

.btn.save{
background:linear-gradient(180deg,#fff1a8,#e0a82f);
color:#2e1602;
}

.btn.back{
background:linear-gradient(180deg,#6c3b14,#3a1908);
color:#ffe9a6;
border:1px solid rgba(255,220,130,.55);
}

.shareArea{
margin-top:16px;
padding:14px;
background:rgba(255,245,210,.08);
border:1px solid rgba(255,220,140,.5);
border-radius:16px;
}

.shareTitle{
text-align:center;
font-size:16px;
font-weight:bold;
color:#ffd36a;
margin-bottom:12px;
}

.shareGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.shareBtn{
display:flex;
align-items:center;
justify-content:center;
height:48px;
border-radius:14px;
text-decoration:none;
font-size:15px;
font-weight:bold;
color:#fff;
border:none;
cursor:pointer;
}

.line{
background:#06c755;
}

.facebook{
background:#1877f2;
}

.x{
background:#111111;
}

.copy{
background:#8b5a1f;
}

.loading{
padding:50px 10px;
text-align:center;
font-size:18px;
color:#ffd36a;
}

.error{
padding:30px 14px;
text-align:center;
font-size:16px;
line-height:1.8;
color:#ffe0e0;
}

.popup{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.86);
z-index:9999;
padding:18px;
overflow:auto;
}

.popupInner{
max-width:720px;
margin:auto;
background:#160b04;
border:2px solid #c99a3a;
border-radius:18px;
padding:14px;
}

.popupTitle{
text-align:center;
font-size:18px;
font-weight:bold;
color:#ffd36a;
margin-bottom:12px;
}

#savedImage{
display:block;
width:100%;
height:auto;
border-radius:12px;
border:1px solid rgba(255,220,140,.6);
}

.closeBtn{
width:100%;
margin-top:14px;
padding:14px;
border:none;
border-radius:999px;
background:#d8a13a;
color:#2a1302;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

@media(max-width:480px){

.wrap{
padding:12px 10px 30px;
}

.header h1{
font-size:24px;
}

.card{
padding:10px;
border-radius:18px;
}

.infoRow{
font-size:14px;
}

.shareGrid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="wrap">

<div class="header">

<div class="small">
田子山富士168の縁プロジェクト
</div>

<h1>
登頂記念証
</h1>

<div class="sub">
おめでとうございます
</div>

</div>

<div
class="card"
id="mainCard">

<div
id="loading"
class="loading">

記念証を準備しています...

</div>

<div
id="error"
class="error"
style="display:none;">
</div>

<div
id="content"
style="display:none;">

<div
id="certificate">

<img
id="memorialImage"
src=""
alt="登頂記念画像"
referrerpolicy="no-referrer">

<div
class="certOverlay">

<div
class="certTitle">
田子山富士 登頂記念
</div>

<div
class="certCount"
id="countText">
第 -- 回 登頂
</div>

<div
class="certBottom">

<div
id="serialText">
No.----
</div>

<div
id="dateText">
----
</div>

</div>

</div>

</div>

<div class="infoBox">

<div class="infoRow">
<span>登頂回数</span>
<span id="infoCount">-</span>
</div>

<div class="infoRow">
<span>シリアル</span>
<span id="infoSerial">-</span>
</div>

<div class="infoRow">
<span>登頂日</span>
<span id="infoDate">-</span>
</div>

<div class="infoRow">
<span>記念画像</span>
<span id="infoImage">-</span>
</div>

</div>

<div class="btnArea">

<button
class="btn save"
onclick="saveImage()">
📜 記念証を授かる
</button>

<button
class="btn back"
onclick="history.back()">
← 戻る
</button>

</div>

<div class="shareArea">

<div class="shareTitle">
SNSでシェア
</div>

<div class="shareGrid">

<a
id="lineShare"
class="shareBtn line"
target="_blank">
LINE
</a>

<a
id="facebookShare"
class="shareBtn facebook"
target="_blank">
Facebook
</a>

<a
id="xShare"
class="shareBtn x"
target="_blank">
X
</a>

<button
class="shareBtn copy"
onclick="copyLink()">
リンクコピー
</button>

</div>

</div>

</div>

</div>

</div>

<div
id="popup"
class="popup">

<div
class="popupInner">

<div
class="popupTitle">
登頂記念証
</div>

<img id="savedImage">

<button
class="closeBtn"
onclick="closePopup()">
閉じる
</button>

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbwqbCjVLj-O5zkQizJfOInFdY5JqAz32q3i8T_RuSmOqvVDB98bwIESsPZCJrbBGdaeOg/exec";

let latestSerial="";
let latestCount=0;
let latestDate="";
let latestImageName="";
let latestImageUrl="";
let latestShareUrl="";
let latestImageLoaded=false;

window.addEventListener(
"load",
loadCertificate
);

async function loadCertificate(){

const loading=
document.getElementById("loading");

const error=
document.getElementById("error");

const content=
document.getElementById("content");

error.style.display="none";
error.innerText="";

try{

const params=
new URLSearchParams(location.search);

const userId=
params.get("userId")||
localStorage.getItem("tagoyamaUserId")||
"";

if(!userId){
throw new Error("QRからアクセスしてください");
}

localStorage.setItem(
"tagoyamaUserId",
userId
);

const res=
await fetch(
GAS_URL+
"?mode=certificate"+
"&userId="+
encodeURIComponent(userId)
);

const data=
await res.json();

if(!data.success){
throw new Error(
data.message||
"取得できません"
);
}

latestSerial=data.serial||"";
latestCount=Number(data.count||0);
latestDate=data.date||"";
latestImageName=data.imageName||"";
latestImageUrl=data.imageUrl||"";
latestShareUrl=location.href;

setCertificateText();
setShareLinks();

loading.style.display="none";
content.style.display="block";

await loadMemorialImage();

}catch(err){

loading.style.display="none";
content.style.display="none";
error.style.display="block";
error.innerText=
err.message||
"取得できません";

}

}

function setCertificateText(){

document.getElementById("countText").innerText=
"第 "+latestCount+" 回 登頂";

document.getElementById("serialText").innerText=
latestSerial || "No.----";

document.getElementById("dateText").innerText=
latestDate || "----";

document.getElementById("infoCount").innerText=
latestCount ? latestCount+"回" : "-";

document.getElementById("infoSerial").innerText=
latestSerial || "-";

document.getElementById("infoDate").innerText=
latestDate || "-";

document.getElementById("infoImage").innerText=
latestImageName || "-";

}

function setShareLinks(){

const share=
encodeURIComponent(latestShareUrl);

document.getElementById("lineShare").href=
"https://social-plugins.line.me/lineit/share?url="+share;

document.getElementById("facebookShare").href=
"https://www.facebook.com/sharer/sharer.php?u="+share;

document.getElementById("xShare").href=
"https://twitter.com/intent/tweet?url="+share;

}

async function loadMemorialImage(){

const img=
document.getElementById("memorialImage");

latestImageLoaded=false;

img.removeAttribute("crossorigin");
img.removeAttribute("crossOrigin");

const urls=
makeImageCandidates(latestImageUrl);

for(let i=0;i<urls.length;i++){

try{

await tryImageUrl(
img,
urls[i]
);

latestImageLoaded=true;
return;

}catch(e){}

}

img.src=
makeFallbackImage();

latestImageLoaded=false;

}

function makeImageCandidates(url){

const list=[];

let imageUrl=
String(url||"").trim();

if(!imageUrl){
return list;
}

function add(u){

if(!u){
return;
}

if(list.indexOf(u)===-1){
list.push(u);
}

}

add(imageUrl);

const m1=
imageUrl.match(/\/d\/([^\/?#]+)/);

const m2=
imageUrl.match(/[?&]id=([^&]+)/);

const id=
m1 ? m1[1] :
(m2 ? m2[1] : "");

if(id){

add(
"https://drive.google.com/thumbnail?id="+
encodeURIComponent(id)+
"&sz=w1600"
);

add(
"https://drive.google.com/uc?export=view&id="+
encodeURIComponent(id)
);

add(
"https://drive.google.com/uc?export=download&id="+
encodeURIComponent(id)
);

}

return list;

}

function addCacheBuster(url){

if(!url){
return "";
}

if(url.indexOf("data:")===0){
return url;
}

return url+
(url.includes("?")?"&":"?")+
"t="+Date.now();

}

async function tryImageUrl(img,url){

return new Promise((resolve,reject)=>{

const finalUrl=
addCacheBuster(url);

img.onload=null;
img.onerror=null;

const timer=
setTimeout(()=>{

img.onload=null;
img.onerror=null;
reject(
new Error("画像を読み込めませんでした")
);

},12000);

img.onload=()=>{

clearTimeout(timer);

if(img.naturalWidth>0){

resolve();

}else{

reject(
new Error("画像を読み込めませんでした")
);

}

};

img.onerror=()=>{

clearTimeout(timer);
reject(
new Error("画像を読み込めませんでした")
);

};

img.src=finalUrl;

});

}

function makeFallbackImage(){

const title=
"田子山富士 登頂記念";

const count=
"第 "+latestCount+" 回 登頂";

const serial=
latestSerial || "No.----";

const date=
latestDate || "----";

const svg=
`
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#2b1609"/>
<stop offset="50%" stop-color="#130b05"/>
<stop offset="100%" stop-color="#050201"/>
</linearGradient>
<radialGradient id="gold" cx="50%" cy="38%" r="55%">
<stop offset="0%" stop-color="#f6d978" stop-opacity="0.95"/>
<stop offset="45%" stop-color="#9c6424" stop-opacity="0.55"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0"/>
</radialGradient>
</defs>
<rect width="1200" height="1500" fill="url(#bg)"/>
<rect x="42" y="42" width="1116" height="1416" rx="48" fill="none" stroke="#c99a3a" stroke-width="12"/>
<rect x="76" y="76" width="1048" height="1348" rx="36" fill="none" stroke="#6f4216" stroke-width="4"/>
<circle cx="600" cy="570" r="430" fill="url(#gold)"/>
<path d="M210 1070 C360 760 455 620 600 360 C755 650 850 780 1000 1070 Z" fill="#1d0e06" stroke="#d6a94c" stroke-width="8"/>
<path d="M480 580 L600 360 L725 590 C675 560 620 560 570 592 C540 610 510 610 480 580 Z" fill="#fff4c2" opacity="0.92"/>
<text x="600" y="190" text-anchor="middle" font-size="72" font-weight="700" fill="#fff4c2" font-family="serif">${escapeSvg(title)}</text>
<text x="600" y="305" text-anchor="middle" font-size="58" font-weight="700" fill="#ffe08a" font-family="serif">${escapeSvg(count)}</text>
<text x="600" y="1240" text-anchor="middle" font-size="38" font-weight="700" fill="#fff6d5" font-family="serif">${escapeSvg(serial)}　${escapeSvg(date)}</text>
<text x="600" y="1335" text-anchor="middle" font-size="34" fill="#e8d09a" font-family="serif">記念画像を準備中です</text>
</svg>
`;

return "data:image/svg+xml;charset=utf-8,"+
encodeURIComponent(svg);

}

function escapeSvg(text){

return String(text||"")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;");

}

async function saveImage(){

const btn=
document.querySelector(".btn.save");

btn.disabled=true;

btn.innerText=
"記念証を授与中...";

try{

const userId=
localStorage.getItem("tagoyamaUserId")||"";

const receive=
await fetch(
GAS_URL+
"?mode=receive"+
"&userId="+encodeURIComponent(userId)+
"&serial="+encodeURIComponent(latestSerial)
);

const result=
await receive.json();

if(!result.success){

throw new Error(
result.message||
"受領処理に失敗しました"
);

}

const canvas=
await html2canvas(
document.getElementById("certificate"),
{
scale:2,
useCORS:true,
allowTaint:true,
backgroundColor:null
}
);

const image=
canvas.toDataURL("image/png");

const link=
document.createElement("a");

link.href=image;

link.download=
latestImageName||
("certificate-"+latestSerial+".png");

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

showImagePopup(image);

}catch(err){

alert(
err.message||
"保存できませんでした"
);

}finally{

btn.disabled=false;

btn.innerText=
"📜 記念証を授かる";

}

}

function showImagePopup(src){

document.getElementById("savedImage").src=src;

document.getElementById("popup").style.display="block";

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

async function copyLink(){

try{

await navigator.clipboard.writeText(
latestShareUrl
);

alert("リンクをコピーしました");

}catch(e){

alert("コピーできませんでした");

}

}

</script>

</body>

</html>
