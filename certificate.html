    </footer>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzXwy6ixLrQI5ltUZ4X6dUBT64GY12gZQdECCatAooDZaNTtGcMDBFmHKlEBfLzWaI/exec";

    const SHARE_CERTIFICATE_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

    const FALLBACK_OGP =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg?v=20260704-certificate-ogp";

    const FALLBACK_LOGO =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png";

    let currentData = {
      userId: "",
      climbCount: "",
      serialNo: "",
      lastDate: "",
      imageNo: "",
      imageName: "",
      imageUrl: "",
      participantNo: ""
    };

    let imageLoadToken = 0;

    window.addEventListener("load", init);

    async function init() {
      const paramData = readParams();
      const localData = readLocalData();

      currentData = mergeData(paramData, localData);

      if (currentData.userId) {
        localStorage.setItem("tagoyamaUserId", currentData.userId);
        localStorage.setItem("tagoyamaFujiUserId", currentData.userId);
      }

      renderCertificate(currentData, "loading");
      updateLinks();

      try {
        if (currentData.userId) {
          const historyData = await loadClimbHistory(currentData.userId);
          currentData = mergeData(historyData, currentData);
        }

        saveLocalData(currentData);

        if (hasRealCertificateData(currentData)) {
          renderCertificate(currentData, "ok");
        } else {
          renderCertificate(currentData, "noqr");
        }

        updateLinks();

      } catch (e) {
        console.error(e);

        if (hasRealCertificateData(currentData)) {
          renderCertificate(currentData, "ok");
        } else {
          renderCertificate(currentData, "noqr");
        }

        updateLinks();
      }
    }

    function readParams() {
      const p = new URLSearchParams(location.search);

      return cleanData({
        userId: getFirst(p.get("userId"), p.get("id"), p.get("uid"), p.get("u")),
        climbCount: getFirst(p.get("climbCount"), p.get("climbNo"), p.get("count"), p.get("c")),
        serialNo: getFirst(p.get("serialNo"), p.get("serial"), p.get("certificateNo"), p.get("no"), p.get("s")),
        lastDate: getFirst(p.get("lastDate"), p.get("date"), p.get("climbDate"), p.get("d")),
        imageNo: getFirst(p.get("imageNo"), p.get("image"), p.get("imageNumber")),
        imageName: getFirst(p.get("imageName"), p.get("title")),
        imageUrl: getFirst(p.get("imageUrl"), p.get("imageURL"), p.get("img")),
        participantNo: getFirst(p.get("participantNo"), p.get("participantCount"), p.get("participants"), p.get("total"), p.get("p"))
      });
    }

    function readLocalData() {
      let data = {};

      try {
        const raw = localStorage.getItem("tagoyamaClimbData") || "";

        if (raw) {
          data = JSON.parse(raw);
        }
      } catch (e) {
        data = {};
      }

      return cleanData({
        userId: getFirst(data.userId, localStorage.getItem("tagoyamaUserId"), localStorage.getItem("tagoyamaFujiUserId")),
        climbCount: getFirst(data.climbCount, localStorage.getItem("tagoyamaLastClimbCount")),
        serialNo: getFirst(data.serialNo, localStorage.getItem("tagoyamaLastSerialNo")),
        lastDate: getFirst(data.lastDate, localStorage.getItem("tagoyamaLastDate")),
        imageNo: getFirst(data.imageNo),
        imageName: getFirst(data.imageName),
        imageUrl: getFirst(data.imageUrl),
        participantNo: getFirst(data.participantNo, localStorage.getItem("tagoyamaLastParticipantNo"))
      });
    }

    async function loadClimbHistory(userId) {
      const url =
        GAS_URL +
        "?mode=climbHistory" +
        "&userId=" +
        encodeURIComponent(userId) +
        "&t=" +
        Date.now();

      const data = await getJson(url);

      if (!data || data.success === false) {
        throw new Error(
          data && data.message
            ? data.message
            : "登頂履歴を取得できませんでした。"
        );
      }

      return cleanData({
        userId: userId,
        climbCount: getFirst(data.climbCount, data.climbNo, data.count, data.登頂回数),
        serialNo: getFirst(data.serialNo, data.serial, data.certificateNo, data.no, data.シリアル番号),
        lastDate: getFirst(data.lastDate, data.date, data.climbDate, data.日付),
        imageNo: getFirst(data.imageNo, data.image, data.imageNumber, data.画像番号),
        imageName: getFirst(data.imageName, data.title, data.画像名),
        imageUrl: getFirst(data.imageUrl, data.imageURL, data.img, data.画像URL),
        participantNo: getFirst(data.participantNo, data.participantCount, data.participants, data.totalParticipants, data.total, data.参加人数)
      });
    }

    async function getJson(url) {
      const res = await fetch(url, {
        method: "GET",
        cache: "no-store",
        redirect: "follow"
      });

      const text = await res.text();

      if (!res.ok) {
        throw new Error("通信エラー");
      }

      if (!text) {
        throw new Error("空の応答です。");
      }

      const trimmed = text.trim();

      if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
        return JSON.parse(trimmed);
      }

      const jsonpMatch = trimmed.match(/^[^(]*\(([\s\S]*)\)\s*;?$/);

      if (jsonpMatch && jsonpMatch[1]) {
        return JSON.parse(jsonpMatch[1]);
      }

      const jsonMatch = trimmed.match(/\{[\s\S]*\}/);

      if (jsonMatch) {
        return JSON.parse(jsonMatch[0]);
      }

      throw new Error("JSONを読み込めませんでした。");
    }

    function cleanData(data) {
      data = data || {};

      return {
        userId: getString(data.userId),
        climbCount: getString(data.climbCount),
        serialNo: getString(data.serialNo),
        lastDate: getString(data.lastDate),
        imageNo: getString(data.imageNo),
        imageName: getString(data.imageName),
        imageUrl: certCleanUrl(data.imageUrl),
        participantNo: getString(data.participantNo)
      };
    }

    function mergeData(primary, secondary) {
      primary = primary || {};
      secondary = secondary || {};

      return cleanData({
        userId: getFirst(primary.userId, secondary.userId),
        climbCount: getFirst(primary.climbCount, secondary.climbCount),
        serialNo: getFirst(primary.serialNo, secondary.serialNo),
        lastDate: getFirst(primary.lastDate, secondary.lastDate),
        imageNo: getFirst(primary.imageNo, secondary.imageNo),
        imageName: getFirst(primary.imageName, secondary.imageName),
        imageUrl: getFirst(primary.imageUrl, secondary.imageUrl),
        participantNo: getFirst(primary.participantNo, secondary.participantNo)
      });
    }

    function hasRealCertificateData(data) {
      data = cleanData(data || {});

      return !!(
        data.climbCount ||
        data.serialNo ||
        data.lastDate ||
        data.imageUrl
      );
    }

    function hasShareReadyData(data) {
      data = cleanData(data || {});

      return !!(
        data.climbCount ||
        data.serialNo ||
        data.lastDate
      );
    }

    function saveLocalData(data) {
      data = cleanData(data || {});

      try {
        localStorage.setItem("tagoyamaClimbData", JSON.stringify(data));

        if (data.userId) {
          localStorage.setItem("tagoyamaUserId", data.userId);
          localStorage.setItem("tagoyamaFujiUserId", data.userId);
        }

        if (data.climbCount) {
          localStorage.setItem("tagoyamaLastClimbCount", data.climbCount);
        }

        if (data.serialNo) {
          localStorage.setItem("tagoyamaLastSerialNo", data.serialNo);
        }

        if (data.lastDate) {
          localStorage.setItem("tagoyamaLastDate", data.lastDate);
        }

        if (data.participantNo) {
          localStorage.setItem("tagoyamaLastParticipantNo", data.participantNo);
        }
      } catch (e) {
        console.error(e);
      }
    }

    function renderCertificate(data, mode, message) {
      data = cleanData(data || {});

      const statusBox = document.getElementById("statusBox");
      const certificateArea = document.getElementById("certificateArea");
      const certOverlay = document.getElementById("certOverlay");
      const noticeBox = document.getElementById("noticeBox");
      const climbTitle = document.getElementById("climbTitle");
      const serialNo = document.getElementById("serialNo");
      const dateText = document.getElementById("dateText");
      const participantText = document.getElementById("participantText");

      const hasRealData = hasRealCertificateData(data);
      const hasShareData = hasShareReadyData(data);

      if (statusBox) {
        if (mode === "loading") {
          statusBox.innerText = "登頂記録を読み込んでいます。";
        } else if (mode === "noqr") {
          statusBox.innerText =
            "登頂記念証は\n山頂QRから登頂受付後に表示されます。";
        } else if (mode === "error") {
          statusBox.innerText =
            message ||
            "登頂記録を確認してください。";
        } else {
          statusBox.innerText =
            "登頂記念証を表示しています。";
        }
      }

      if (certificateArea) {
        certificateArea.style.display = hasRealData ? "block" : "none";
      }

      if (certOverlay) {
        certOverlay.style.display = hasRealData ? "block" : "none";
      }

      if (noticeBox) {
        noticeBox.innerText =
          hasRealData
            ? "登頂記念証を保存したり、SNSでシェアできます。"
            : "山頂QRから登頂受付をすると、登頂記念証が表示されます。";
      }

      if (climbTitle) {
        climbTitle.innerText =
          data.climbCount
            ? "第" + data.climbCount + "回 登頂記念"
            : "登頂記念";
      }

      if (serialNo) {
        serialNo.innerText =
          data.serialNo
            ? "No." + data.serialNo
            : "No.取得中";
      }

      if (dateText) {
        dateText.innerText =
          data.lastDate
            ? formatDateText(data.lastDate)
            : "日付取得中";
      }

      if (participantText) {
        participantText.innerText =
          data.participantNo
            ? "参加人数 " + data.participantNo + "人"
            : "参加人数 取得中";
      }

      setActionButtonsEnabled(hasShareData);

      if (hasRealData) {
        setCertificateImageForDisplay(data.imageUrl);
      }
    }

    function setActionButtonsEnabled(enabled) {
      const ids = ["saveBtn", "facebookBtn", "lineBtn", "xBtn", "copyBtn"];

      ids.forEach(function (id) {
        const btn = document.getElementById(id);

        if (btn) {
          btn.disabled = !enabled;
        }
      });
    }

    async function setCertificateImageForDisplay(imageUrl) {
      const token = ++imageLoadToken;
      const img = document.getElementById("certificateImage");

      if (!img) {
        return;
      }

      const urls = certMakeImageUrlList(imageUrl);

      urls.push(FALLBACK_OGP);
      urls.push(FALLBACK_LOGO);

      const uniqueUrls = urls.filter(function (v, i, arr) {
        return v && arr.indexOf(v) === i;
      });

      for (let i = 0; i < uniqueUrls.length; i++) {
        const url = uniqueUrls[i];
        const ok = await canDisplayImage(url);

        if (token !== imageLoadToken) {
          return;
        }

        if (ok) {
          img.onerror = function () {
            handleImageError();
          };

          img.style.display = "block";
          img.src = url;

          return;
        }
      }

      handleImageError();
    }

    function handleImageError() {
      const img = document.getElementById("certificateImage");

      if (img) {
        img.onerror = function () {
          img.onerror = null;
          img.src = FALLBACK_LOGO;
        };

        img.style.display = "block";
        img.src = FALLBACK_OGP;
      }
    }

    function canDisplayImage(url) {
      return new Promise(function (resolve) {
        if (!url) {
          resolve(false);
          return;
        }

        const image = new Image();

        image.onload = function () {
          resolve(true);
        };

        image.onerror = function () {
          resolve(false);
        };

        image.src = url;
      });
    }

    function formatDateText(v) {
      let text = getString(v).replace(/-/g, "/");

      text = text.replace("T", " ");
      text = text.replace(/\s00:00:00$/, "");
      text = text.replace(/\s00:00$/, "");

      return text;
    }

    function updateLinks() {
      const omikujiBtn = document.getElementById("omikujiBtn");
      const backBtn = document.getElementById("backBtn");

      if (omikujiBtn) {
        omikujiBtn.href =
          currentData.userId
            ? "omikuji.html?userId=" + encodeURIComponent(currentData.userId) + "&v=" + Date.now()
            : "omikuji.html?v=" + Date.now();
      }

      if (backBtn) {
        backBtn.href =
          "index.html?v=" + Date.now();
      }
    }

    async function saveCertificateImage() {
      const btn = document.getElementById("saveBtn");
      const oldText = btn ? btn.innerText : "";

      if (btn) {
        btn.disabled = true;
        btn.innerText = "画像を準備中...";
      }

      try {
        const data = certGetCurrentData();

        if (!hasShareReadyData(data)) {
          alert("登頂記念証は山頂QRから登頂受付後に保存できます。");
          return;
        }

        const urls = certMakeImageUrlList(data.imageUrl);

        const imgEl = document.getElementById("certificateImage");

        if (imgEl && (imgEl.currentSrc || imgEl.src)) {
          urls.push(imgEl.currentSrc || imgEl.src);
        }

        urls.push(FALLBACK_OGP);
        urls.push(FALLBACK_LOGO);

        const baseImage = await certLoadImageForCanvas(urls);
        const blob = await certCreateCertificateBlob(baseImage, data);

        if (!blob) {
          alert("登頂記念証の画像を作成できませんでした。");
          return;
        }

        const safeNo =
          data.serialNo
            ? data.serialNo.replace(/[\\/:*?"<>|]/g, "")
            : "certificate";

        const fileName =
          "tagoyama-certificate-" +
          safeNo +
          ".png";

        const file = new File([blob], fileName, {
          type: "image/png"
        });

        if (
          navigator.canShare &&
          navigator.share &&
          navigator.canShare({
            files: [file]
          })
        ) {
          await navigator.share({
            files: [file],
            title: "田子山富士 登頂記念証",
            text: "田子山富士 登頂記念証"
          });

          return;
        }

        downloadBlob(blob, fileName);

      } catch (e) {
        console.error(e);
        alert("登頂記念証の画像保存に失敗しました。もう一度押してください。");

      } finally {
        if (btn) {
          btn.disabled = false;
          btn.innerText = oldText || "画像をダウンロード";
        }
      }
    }

    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();

      setTimeout(function () {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 1000);
    }

    function buildCertificateShareUrl() {
      const data = certGetCurrentData();
      const p = new URLSearchParams();

      const imgid = certGetDriveId(data.imageUrl);

      if (data.userId) {
        p.set("u", data.userId);
      }

      if (data.climbCount) {
        p.set("c", data.climbCount);
      }

      if (data.serialNo) {
        p.set("s", data.serialNo);
      }

      if (data.lastDate) {
        p.set("d", data.lastDate);
      }

      if (data.participantNo) {
        p.set("p", data.participantNo);
      }

      if (imgid) {
        p.set("imgid", imgid);
      }

      p.set("v", String(Date.now()));

      return SHARE_CERTIFICATE_PAGE + "?" + p.toString();
    }

    function makeCertificateShareText() {
      const data = certGetCurrentData();

      let text = "田子山富士 登頂記念証";

      if (data.climbCount) {
        text += "\n第" + data.climbCount + "回 登頂記念";
      }

      if (data.serialNo) {
        text += "\nNo." + data.serialNo;
      }

      if (data.lastDate) {
        text += "\n" + formatDateText(data.lastDate);
      }

      text += "\n\n田子山富士に登ってきました。";
      text += "\n山頂でいただいたご縁を、みなさんにもおすそ分けします。";
      text += "\n次はぜひ、あなたも田子山富士へ。";
      text += "\n" + buildCertificateShareUrl();

      return text;
    }

    async function postFacebook() {
      const data = certGetCurrentData();

      if (!hasShareReadyData(data)) {
        alert("登頂記念証は山頂QRから登頂受付後にシェアできます。");
        return;
      }

      const shareUrl = buildCertificateShareUrl();

      await copyText(makeCertificateShareText());

      const url =
        "https://www.facebook.com/sharer/sharer.php?u=" +
        encodeURIComponent(shareUrl);

      window.open(url, "_blank");

      alert("投稿文をコピーしました。Facebookの投稿欄に貼り付けてください。");
    }

    function sendLine() {
      const data = certGetCurrentData();

      if (!hasShareReadyData(data)) {
        alert("登頂記念証は山頂QRから登頂受付後にシェアできます。");
        return;
      }

      const url =
        "https://line.me/R/msg/text/?" +
        encodeURIComponent(makeCertificateShareText());

      location.href = url;
    }

    function postX() {
      const data = certGetCurrentData();

      if (!hasShareReadyData(data)) {
        alert("登頂記念証は山頂QRから登頂受付後にシェアできます。");
        return;
      }

      let text = "田子山富士 登頂記念証";

      if (data.climbCount) {
        text += "\n第" + data.climbCount + "回 登頂記念";
      }

      if (data.serialNo) {
        text += "\nNo." + data.serialNo;
      }

      text += "\n田子山富士に登ってきました。";
      text += "\n山頂でいただいたご縁を、みなさんにもおすそ分けします。";
      text += "\n次はぜひ、あなたも田子山富士へ。";

      const url =
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(text) +
        "&url=" +
        encodeURIComponent(buildCertificateShareUrl());

      window.open(url, "_blank");
    }

    async function copyShareLink() {
      const data = certGetCurrentData();

      if (!hasShareReadyData(data)) {
        alert("登頂記念証は山頂QRから登頂受付後にコピーできます。");
        return;
      }

      await copyText(makeCertificateShareText());
      alert("登頂記念証の投稿文をコピーしました。");
    }

    function certGetCurrentData() {
      const data =
        typeof currentData !== "undefined" && currentData
          ? currentData
          : {};

      const certificateImage = document.getElementById("certificateImage");

      const climbTitleText = certGetTextById("climbTitle");
      const serialText = certGetTextById("serialNo");
      const dateText = certGetTextById("dateText");
      const participantText = certGetTextById("participantText");

      return cleanData({
        userId:
          getString(data.userId) ||
          getString(localStorage.getItem("tagoyamaUserId")) ||
          getString(localStorage.getItem("tagoyamaFujiUserId")),

        climbCount:
          getString(data.climbCount) ||
          certExtractFirstNumber(climbTitleText),

        serialNo:
          getString(data.serialNo) ||
          serialText.replace(/^No\./, "").replace("取得中", "").trim(),

        lastDate:
          getString(data.lastDate) ||
          dateText.replace("日付取得中", "").trim(),

        participantNo:
          getString(data.participantNo) ||
          certExtractFirstNumber(participantText),

        imageUrl:
          certCleanUrl(data.imageUrl) ||
          certCleanUrl(certificateImage ? (certificateImage.currentSrc || certificateImage.src) : "")
      });
    }

    function certGetTextById(id) {
      const el = document.getElementById(id);

      if (!el) {
        return "";
      }

      return getString(el.innerText || el.textContent || "");
    }

    function certExtractFirstNumber(text) {
      const m = getString(text).match(/\d+/);

      if (m && m[0]) {
        return m[0];
      }

      return "";
    }

    function certCleanUrl(url) {
      return getString(url)
        .replace(/\\\//g, "/")
        .replace(/\\u0026/g, "&")
        .replace(/&amp;/g, "&");
    }

    function certGetDriveId(url) {
      const text = certCleanUrl(url);

      let m = text.match(/[?&]id=([^&]+)/);

      if (m && m[1]) {
        return decodeURIComponent(m[1]);
      }

      m = text.match(/\/d\/([^/]+)/);

      if (m && m[1]) {
        return decodeURIComponent(m[1]);
      }

      return "";
    }

    function certMakeImageUrlList(url) {
      const text = certCleanUrl(url);
      const id = certGetDriveId(text);
      const list = [];

      if (id) {
        list.push("https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w1600");
        list.push("https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w1200");
        list.push("https://lh3.googleusercontent.com/d/" + id + "=w1600");
        list.push("https://lh3.googleusercontent.com/d/" + id + "=w1200");
      }

      if (text) {
        list.push(text);
      }

      return list.filter(function (v, i, arr) {
        return v && arr.indexOf(v) === i;
      });
    }

    function certLoadImageForCanvas(urls) {
      return new Promise(function (resolve, reject) {
        const uniqueUrls = (urls || []).filter(function (v, i, arr) {
          return v && arr.indexOf(v) === i;
        });

        let index = 0;

        function tryNext() {
          if (index >= uniqueUrls.length) {
            reject(new Error("画像読み込み失敗"));
            return;
          }

          const image = new Image();
          image.crossOrigin = "anonymous";

          image.onload = function () {
            resolve(image);
          };

          image.onerror = function () {
            index++;
            tryNext();
          };

          image.src = uniqueUrls[index];
        }

        tryNext();
      });
    }

    function certCreateCertificateBlob(baseImage, data) {
      return new Promise(function (resolve, reject) {
        try {
          data = cleanData(data || {});

          const w = 1200;
          const h = 1600;

          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;

          const ctx = canvas.getContext("2d");

          ctx.clearRect(0, 0, w, h);

          ctx.fillStyle = "#111111";
          ctx.fillRect(0, 0, w, h);

          certDrawCoverImage(ctx, baseImage, 0, 0, w, h);

          ctx.fillStyle = "rgba(0,0,0,0.72)";
          certRoundRect(ctx, 66, 1162, 1068, 330, 42);
          ctx.fill();

          ctx.strokeStyle = "rgba(255,220,95,0.82)";
          ctx.lineWidth = 5;
          certRoundRect(ctx, 66, 1162, 1068, 330, 42);
          ctx.stroke();

          ctx.textAlign = "center";
          ctx.textBaseline = "middle";

          ctx.shadowColor = "rgba(0,0,0,0.95)";
          ctx.shadowBlur = 10;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 4;

          ctx.fillStyle = "#ffdf72";
          ctx.font = "900 78px sans-serif";
          ctx.fillText(
            data.climbCount
              ? "第" + data.climbCount + "回 登頂記念"
              : "登頂記念",
            600,
            1238
          );

          ctx.fillStyle = "#fff7ca";
          ctx.font = "900 76px sans-serif";
          ctx.fillText(
            data.serialNo
              ? "No." + data.serialNo
              : "No.",
            600,
            1325
          );

          ctx.fillStyle = "#fff7ca";
          ctx.font = "900 52px sans-serif";
          ctx.fillText(
            data.lastDate
              ? formatDateText(data.lastDate)
              : "",
            600,
            1400
          );

          ctx.fillStyle = "#d9c886";
          ctx.font = "900 44px sans-serif";
          ctx.fillText(
            data.participantNo
              ? "参加人数 " + data.participantNo + "人"
              : "",
            600,
            1462
          );

          ctx.shadowColor = "transparent";
          ctx.shadowBlur = 0;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 0;

          canvas.toBlob(function (blob) {
            if (!blob) {
              reject(new Error("Blob作成失敗"));
              return;
            }

            resolve(blob);
          }, "image/png");

        } catch (e) {
          reject(e);
        }
      });
    }

    function certDrawCoverImage(ctx, img, x, y, w, h) {
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;

      if (!iw || !ih) {
        return;
      }

      const scale = Math.max(w / iw, h / ih);
      const nw = iw * scale;
      const nh = ih * scale;
      const nx = x + (w - nw) / 2;
      const ny = y + (h - nh) / 2;

      ctx.drawImage(img, nx, ny, nw, nh);
    }

    function certRoundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    async function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        try {
          await navigator.clipboard.writeText(text);
          return;
        } catch (e) {
          console.error(e);
        }
      }

      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.top = "0";

      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    function getFirst() {
      for (let i = 0; i < arguments.length; i++) {
        const v = getString(arguments[i]);

        if (v) {
          return v;
        }
      }

      return "";
    }

    function getString(v) {
      if (v === null || v === undefined) {
        return "";
      }

      return String(v).trim();
    }
  </script>
