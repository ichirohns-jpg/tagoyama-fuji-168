<style>

.card{

  margin:0 0 16px;
  padding:16px 12px;
  border-radius:20px;

  line-height:1.6;

  position:relative;
  width:100%;
  overflow:hidden;

  border:3px solid rgba(255,220,95,.86);

.certificateStage img{

  position:absolute;

.stageShadeBottom{
  position:absolute;
  left:0;

  height:31%;
  background:linear-gradient(0deg,rgba(0,0,0,.76),rgba(0,0,0,.38),rgba(0,0,0,0));

.certTopText{
  position:absolute;
  left:5%;
  right:5%;
  top:4.4%;
  text-align:center;
  color:#ffdf72;
  font-weight:900;

  text-shadow:

}

.certTopSmall{
  font-size:clamp(17px,4.8vw,31px);

}

.certTopLarge{
  margin-top:2px;
  font-size:clamp(30px,8.6vw,58px);

}

.certBottomText{
  position:absolute;
  left:6%;
  right:6%;
  bottom:5.6%;
  text-align:center;
  color:#fff3c4;
  font-weight:900;
  text-shadow:
    0 3px 4px rgba(0,0,0,.92),
    0 0 10px rgba(255,220,95,.20);
}

.certCount{
  font-size:clamp(26px,7.6vw,48px);
  line-height:1.18;
  color:#ffdf72;
  letter-spacing:.03em;
}

.certSerial{
  margin-top:4px;
  font-size:clamp(22px,6.4vw,38px);
  line-height:1.2;
}

.certDate{
  margin-top:4px;
  font-size:clamp(18px,5.2vw,30px);
  line-height:1.2;

}

.imageError{
  padding:30px 14px;
  color:#fff3c4;

  font-weight:900;

  color:#fff;

}

}

.facebookBtn{

.lineBtn{

}

.xBtn{

}

<body>

<div class="wrap">

  <header class="header">
    <div class="logoBox">
      <img src="logo.png" alt="田子山富士">
    </div>
  </header>

  <section class="card">

    <div class="statusBox" id="statusBox">
      記念証を準備しています。
    </div>

    <div id="certificateArea" hidden>
      <div class="certificateStage">

        <img id="certificateImage" src="ogp-certificate.jpg" alt="登頂記念画像">

        <div class="stageShadeTop"></div>
        <div class="stageShadeBottom"></div>

        <div class="certTopText">
          <div class="certTopSmall">
            田子山富士
          </div>
          <div class="certTopLarge">
            登頂記念証
          </div>
        </div>

        <div class="certBottomText">
          <div class="certCount" id="climbText"></div>
          <div class="certSerial" id="serialText"></div>
          <div class="certDate" id="dateText"></div>
        </div>

        <div class="imageError" id="imageError" hidden>
          画像を読み込めませんでした。
        </div>

      </div>
    </div>

    <div class="btnGrid" id="receiveArea">
      <button class="btn goldBtn" id="receiveBtn" onclick="receiveCertificate()">
        記念証を授かる
      </button>

      <a class="linkBtn blackBtn" href="./">
        ← トップへ戻る
      </a>
    </div>

    <div class="btnGrid" id="shareArea" hidden>
      <button class="btn grayBtn" onclick="copyCertificateLink()">
        リンクをコピー
      </button>

      <button class="btn facebookBtn" onclick="shareCertificate('facebook')">
        Facebookで投稿
      </button>

      <button class="btn lineBtn" onclick="shareCertificate('line')">
        LINEで送る
      </button>

      <button class="btn xBtn" onclick="shareCertificate('x')">
        Xで投稿
      </button>

      <button class="btn greenBtn" onclick="openSaveModal()">
        写真に保存する
      </button>

      <a class="linkBtn blackBtn" href="./">
        ← トップへ戻る
      </a>
    </div>

  </section>

  <footer class="footer">
    田子山富士 168の縁プロジェクト<br>
    登頂記念証
  </footer>

</div>

<div class="modal" id="saveModal">
  <div class="modalBox">
    <div class="note">
      下の画像を長押しして保存してください。
    </div>

    <img id="saveImage" src="ogp-certificate.jpg" alt="保存用画像">

    <div class="btnGrid">
      <button class="btn blackBtn" onclick="closeSaveModal()">
        閉じる
      </button>
    </div>
  </div>
</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzrbLiXwZj6pv35CdDjEdn1Rd13EGCsR4hB_k514_sgQBSSpEoPkNjN9yJ0tmHLnS3w/exec";

const SITE_BASE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

let currentUserId =
"";

let currentRecord =
null;

window.addEventListener("load",initPage);

function initPage(){
  const params =
  new URLSearchParams(window.location.search);

  currentUserId =
  cleanText(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    localStorage.getItem("userId") ||
    ""
  );

  if(currentUserId){
    localStorage.setItem("tagoyamaUserId",currentUserId);
    localStorage.setItem("tagoyamaFujiUserId",currentUserId);
  }

  const climbCount =
  cleanText(params.get("climbCount") || params.get("count") || "");

  const serialNo =
  normalizeSerialNo(
    params.get("serialNo") ||
    params.get("serial") ||
    params.get("certificateNo") ||
    ""
  );

  if(!currentUserId){
    showError(
      "ユーザーIDが不明です。\n山頂QRコードから登頂受付をしてください。"
    );
    return;
  }

  if(climbCount && serialNo){
    loadExistingCertificate(climbCount,serialNo);
    return;
  }

  setStatus(
    "登頂記念証を受け取れます。"
  );
}

async function receiveCertificate(){
  if(!currentUserId){
    alert("ユーザーIDが不明です。山頂QRコードから登頂受付をしてください。");
    return;
  }

  setStatus(
    "登頂記録を作成しています..."
  );

  setReceiveButton(false);

  try{
    const saveUrl =
    GAS_URL +
    "?mode=saveClimb" +
    "&userId=" +
    encodeURIComponent(currentUserId) +
    "&t=" +
    Date.now();

    const saveData =
    await getJson(saveUrl);

    if(!saveData || saveData.success === false){
      setReceiveButton(true);

      setStatus(
        saveData && saveData.message
        ? saveData.message
        : "登頂記録を作成できませんでした。"
      );

      return;
    }

    await loadLatestFromHistory();

  }catch(error){
    setReceiveButton(true);

    setStatus(
      "登頂記録の作成に失敗しました。"
    );
  }
}

async function loadExistingCertificate(climbCount,serialNo){
  setStatus(
    "登頂記録を確認しています..."
  );

  try{
    const records =
    await getHistoryRecords();

    const record =
    records.find(function(item){
      return (
        cleanText(item.climbCount) === cleanText(climbCount) &&
        normalizeSerialNo(item.serialNo) === normalizeSerialNo(serialNo)
      );
    });

    if(!record){
      showError(
        "指定された登頂記録が見つかりません。\n山頂QRコードから登頂受付をしてください。"
      );
      return;
    }

    renderCertificate(record);

  }catch(error){
    showError(
      "登頂記録を読み込めませんでした。"
    );
  }
}

async function loadLatestFromHistory(){
  const records =
  await getHistoryRecords();

  if(records.length === 0){
    setReceiveButton(true);

    setStatus(
      "登頂記録が見つかりません。"
    );

    return;
  }

  const latest =
  records
  .slice()
  .sort(function(a,b){
    return numberValue(b.climbCount) - numberValue(a.climbCount);
  })[0];

  renderCertificate(latest);
}

async function getHistoryRecords(){
  const url =
  GAS_URL +
  "?mode=climbHistory" +
  "&userId=" +
  encodeURIComponent(currentUserId) +
  "&t=" +
  Date.now();

  const data =
  await getJson(url);

  if(!data || data.success === false){
    throw new Error("history error");
  }

  if(!Array.isArray(data.history)){
    return [];
  }

  return data.history
  .map(normalizeRecord)
  .filter(isUsableRecord);
}

function normalizeRecord(item){
  return {
    userId:cleanText(item.userId || currentUserId),
    climbCount:cleanText(item.climbCount),
    serialNo:normalizeSerialNo(item.serialNo),
    lastDate:formatDate(item.lastDate || item.climbDate || item.date),
    imageNo:cleanText(item.imageNo),
    imageName:cleanText(item.imageName),
    imageUrl:normalizeImageUrl(item.imageUrl),
    updatedAt:formatDate(item.updatedAt),
    participantNo:cleanText(item.participantNo)
  };
}

function isUsableRecord(item){
  return (
    item &&
    item.userId &&
    item.climbCount &&
    item.serialNo &&
    item.imageUrl
  );
}

function renderCertificate(item){
  currentRecord =
  item;

  const imageUrl =
  normalizeImageUrl(item.imageUrl);

  const image =
  document.getElementById("certificateImage");

  const imageError =
  document.getElementById("imageError");

  image.onload =
  function(){
    image.hidden =
    false;

    imageError.hidden =
    true;
  };

  image.onerror =
  function(){
    image.hidden =
    true;

    imageError.hidden =
    false;
  };

  image.src =
  imageUrl;

  document.getElementById("saveImage").src =
  imageUrl;

  document.getElementById("climbText").innerText =
  "第" +
  item.climbCount +
  "回 登頂記念";

  document.getElementById("serialText").innerText =
  "No." +
  item.serialNo;

  document.getElementById("dateText").innerText =
  item.lastDate || "";

  document.getElementById("certificateArea").hidden =
  false;

  document.getElementById("receiveArea").hidden =
  true;

  document.getElementById("shareArea").hidden =
  false;

  document.getElementById("statusBox").hidden =
  true;
}

function buildCertificateUrl(){
  if(!currentRecord){
    return SITE_BASE + "certificate.html";
  }

  const params =
  new URLSearchParams();

  params.set(
    "userId",
    currentRecord.userId || currentUserId
  );

  params.set(
    "climbCount",
    currentRecord.climbCount
  );

  params.set(
    "serialNo",
    currentRecord.serialNo
  );

  return SITE_BASE +
  "certificate.html?" +
  params.toString();
}

function buildPostText(){
  if(!currentRecord){
    return "田子山富士168の縁プロジェクトの登頂記念証です。";
  }

  const lines =
  [];

  lines.push(
    "田子山富士168の縁プロジェクトの登頂記念証です。"
  );

  lines.push(
    "第" +
    currentRecord.climbCount +
    "回 登頂記念"
  );

  lines.push(
    "No." +
    currentRecord.serialNo
  );

  if(currentRecord.lastDate){
    lines.push(
      currentRecord.lastDate
    );
  }

  lines.push(
    "#田子山富士"
  );

  lines.push(
    "#168の縁プロジェクト"
  );

  return lines.join("\n");
}

async function copyCertificateLink(){
  const text =
  buildPostText() +
  "\n" +
  buildCertificateUrl();

  try{
    await copyText(text);
    alert("リンクと投稿文をコピーしました。");
  }catch(error){
    alert("コピーできませんでした。");
  }
}

async function shareCertificate(type){
  const url =
  buildCertificateUrl();

  const text =
  buildPostText();

  if(type === "facebook"){
    try{
      await copyText(text + "\n" + url);
    }catch(e){}

    location.href =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "line"){
    location.href =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "x"){
    location.href =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(text) +
    "&url=" +
    encodeURIComponent(url);

    return;
  }
}

function openSaveModal(){
  document.getElementById("saveModal").classList.add("open");
}

function closeSaveModal(){
  document.getElementById("saveModal").classList.remove("open");
}

async function getJson(url){
  try{
    return await fetchJson(url,12000);
  }catch(error){
    return await jsonp(url,15000);
  }
}

async function fetchJson(url,timeoutMs){
  const controller =
  new AbortController();

  const timer =
  setTimeout(function(){
    controller.abort();
  },timeoutMs || 12000);

  try{
    const res =
    await fetch(
      url,
      {
        method:"GET",
        cache:"no-store",
        signal:controller.signal
      }
    );

    const text =
    await res.text();

    if(!res.ok){
      throw new Error("通信エラー");
    }

    try{
      return JSON.parse(text);
    }catch(e){}

    const match =
    text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

    if(match && match[1]){
      return JSON.parse(match[1]);
    }

    throw new Error("JSONではありません");

  }finally{
    clearTimeout(timer);
  }
}

function jsonp(url,timeoutMs){
  return new Promise(function(resolve,reject){
    const callbackName =
    "__tagoyamaCertificateCallback_" +
    Date.now() +
    "_" +
    Math.floor(Math.random() * 100000);

    const sep =
    url.indexOf("?") >= 0
    ? "&"
    : "?";

    const script =
    document.createElement("script");

    let done =
    false;

    const timer =
    setTimeout(function(){
      cleanup();
      reject(new Error("JSONP timeout"));
    },timeoutMs || 15000);

    function cleanup(){
      if(done){
        return;
      }

      done =
      true;

      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(e){
        window[callbackName] =
        undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }

    window[callbackName] =
    function(data){
      cleanup();
      resolve(data);
    };

    script.onerror =
    function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src =
    url +
    sep +
    "callback=" +
    encodeURIComponent(callbackName);

    document.body.appendChild(script);
  });
}

function normalizeImageUrl(value){
  let url =
  cleanText(value);

  if(!url){
    return "ogp-certificate.jpg";
  }

  url =
  url
  .replace(/\\u003d/g,"=")
  .replace(/\\u0026/g,"&")
  .replace(/\\\//g,"/")
  .replace(/&amp;/g,"&")
  .replace(/[),.;]+$/g,"")
  .trim();

  if(url.indexOf("data:image") === 0){
    return url;
  }

  if(url.indexOf("drive.google.com/thumbnail") >= 0){
    return url;
  }

  let match =
  url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);

  if(match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1600";
  }

  match =
  url.match(/[?&]id=([^&]+)/);

  if(url.indexOf("drive.google.com") >= 0 && match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1600";
  }

  return url;
}

function normalizeSerialNo(value){
  value =
  cleanText(value);

  if(!value){
    return "";
  }

  return value
  .replace(/^'/,"")
  .replace(/[ー−―]/g,"-");
}

function formatDate(value){
  value =
  cleanText(value);

  if(!value){
    return "";
  }

  if(value.indexOf("GMT") >= 0 || value.indexOf("標準時") >= 0){
    const d =
    new Date(value);

    if(!isNaN(d.getTime())){
      return d.getFullYear() +
      "/" +
      String(d.getMonth() + 1).padStart(2,"0") +
      "/" +
      String(d.getDate()).padStart(2,"0");
    }
  }

  return value
  .replace("T15:00:00.000Z","")
  .replace("T00:00:00.000Z","")
  .replace(/-/g,"/");
}

function numberValue(value){
  const n =
  Number(cleanText(value).replace(/[^\d.-]/g,""));

  if(isNaN(n)){
    return 0;
  }

  return n;
}

function setStatus(text){
  document.getElementById("statusBox").hidden =
  false;

  document.getElementById("statusBox").innerText =
  text;
}

function showError(text){
  document.getElementById("certificateArea").hidden =
  true;

  document.getElementById("shareArea").hidden =
  true;

  document.getElementById("receiveArea").hidden =
  false;

  setStatus(text);
}

function setReceiveButton(enabled){
  const btn =
  document.getElementById("receiveBtn");

  btn.disabled =
  !enabled;

  btn.style.opacity =
  enabled ? "1" : ".55";
}

async function copyText(text){
  text =
  cleanText(text);

  if(navigator.clipboard && navigator.clipboard.writeText){
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.setAttribute("readonly","readonly");
  textarea.style.position =
  "fixed";
  textarea.style.left =
  "-9999px";
  textarea.style.top =
  "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  const ok =
  document.execCommand("copy");

  document.body.removeChild(textarea);

  if(!ok){
    throw new Error("copy failed");
  }
}

function cleanText(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
</script>
