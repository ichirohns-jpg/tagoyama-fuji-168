<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzQHiV6CPqv-szRz9EjwWdTsKGXmC8oPtLM6fQsyU-lF8AWXEsN5PG_14b6awu2Esk1/exec";

const SITE_BASE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_IMAGE =
SITE_BASE +
"ogp-certificate.jpg";

const SHARE_CERTIFICATE_URL =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

let currentUserId =
"";

let currentRecord =
null;

window.addEventListener("load",initPage);

function initPage(){
 const params =
 new URLSearchParams(window.location.search);

 currentUserId =
 cleanText(
  params.get("userId") ||
  params.get("id") ||
  params.get("uid") ||
  localStorage.getItem("tagoyamaUserId") ||
  localStorage.getItem("tagoyamaFujiUserId") ||
  localStorage.getItem("userId") ||
  ""
 );

 if(currentUserId){
  localStorage.setItem("tagoyamaUserId",currentUserId);
  localStorage.setItem("tagoyamaFujiUserId",currentUserId);
  localStorage.setItem("userId",currentUserId);
 }

 const climbCount =
 cleanText(
  params.get("climbCount") ||
  params.get("count") ||
  ""
 );

 const serialNo =
 normalizeSerialNo(
  params.get("serialNo") ||
  params.get("serial") ||
  params.get("certificateNo") ||
  ""
 );

 const lastDate =
 formatDate(
  params.get("lastDate") ||
  params.get("date") ||
  ""
 );

 if(!currentUserId){
  showError(
   "ユーザーIDが不明です。\n山頂QRコードから登頂受付をしてください。"
  );
  return;
 }

 if(climbCount && serialNo){
  renderCertificate({
   userId:currentUserId,
   climbCount:climbCount,
   serialNo:serialNo,
   lastDate:lastDate
  });
  return;
 }

 setStatus(
  "登頂記念証を受け取れます。"
 );
}

async function receiveCertificate(){
 if(!currentUserId){
  alert("ユーザーIDが不明です。山頂QRコードから登頂受付をしてください。");
  return;
 }

 setStatus(
  "登頂記録を確認しています..."
 );

 setReceiveButton(false);

 try{
  const records =
  await getHistoryRecords();

  if(records.length === 0){
   setReceiveButton(true);
   setStatus("登頂記録が見つかりません。");
   return;
  }

  const latest =
  records
  .slice()
  .sort(function(a,b){
   return numberValue(b.climbCount) - numberValue(a.climbCount);
  })[0];

  renderCertificate(latest);

 }catch(error){
  setReceiveButton(true);

  setStatus(
   "登頂記録を読み込めませんでした。"
  );
 }
}

async function getHistoryRecords(){
 const url =
 GAS_URL +
 "?mode=climbHistory" +
 "&userId=" +
 encodeURIComponent(currentUserId) +
 "&t=" +
 Date.now();

 const data =
 await getJson(url);

 if(!data || data.success === false){
  throw new Error("history error");
 }

 let rows =
 [];

 if(Array.isArray(data.history)){
  rows =
  data.history;
 }else if(Array.isArray(data.rows)){
  rows =
  data.rows;
 }else if(Array.isArray(data.data)){
  rows =
  data.data;
 }else if(data.climbCount || data.serialNo){
  rows =
  [data];
 }

 return rows
 .map(normalizeRecord)
 .filter(function(item){
  return item.climbCount && item.serialNo;
 });
}

function normalizeRecord(item){
 item =
 item || {};

 return {
  userId:cleanText(item.userId || currentUserId),
  climbCount:cleanText(item.climbCount || item.count),
  serialNo:normalizeSerialNo(item.serialNo || item.serial || item.certificateNo),
  lastDate:formatDate(item.lastDate || item.climbDate || item.date || item.日付)
 };
}

function renderCertificate(item){
 currentRecord =
 item;

 const image =
 document.getElementById("certificateImage");

 image.src =
 CERTIFICATE_IMAGE +
 "?v=20260701-certificate-main-01";

 document.getElementById("climbText").innerText =
 "第" +
 item.climbCount +
 "回 登頂記念";

 document.getElementById("serialText").innerText =
 "No." +
 item.serialNo;

 document.getElementById("dateText").innerText =
 item.lastDate || "";

 document.getElementById("certificateArea").hidden =
 false;

 document.getElementById("receiveArea").hidden =
 true;

 document.getElementById("shareArea").hidden =
 false;

 document.getElementById("statusBox").hidden =
 true;
}

async function shareCertificateImageOnly(){
 if(!currentRecord){
  alert("記念証を先に表示してください。");
  return;
 }

 try{
  const blob =
  await makeCertificateBlob();

  const file =
  new File(
   [blob],
   getCertificateFileName(),
   {
    type:"image/png"
   }
  );

  if(
   navigator.canShare &&
   navigator.canShare({files:[file]}) &&
   navigator.share
  ){
   await navigator.share({
    files:[file]
   });

   return;
  }

  alert(
   "この端末では画像ファイル共有に対応していません。\nSafariで開いてからもう一度お試しください。"
  );

 }catch(error){
  alert(
   "画像ファイル共有を作れませんでした。\nSafariで開いてからもう一度お試しください。"
  );
 }
}

function shareToLine(){
 const text =
 buildShareText();

 const url =
 "https://social-plugins.line.me/lineit/share?url=" +
 encodeURIComponent(SHARE_CERTIFICATE_URL) +
 "&text=" +
 encodeURIComponent(text);

 openShareWindow(url);
}

function shareToX(){
 const text =
 buildShareText();

 const url =
 "https://twitter.com/intent/tweet?text=" +
 encodeURIComponent(text) +
 "&url=" +
 encodeURIComponent(SHARE_CERTIFICATE_URL);

 openShareWindow(url);
}

async function shareToFacebook(){
 const text =
 buildShareText();

 try{
  await copyText(text);
  alert("投稿文とリンクをコピーしました。Facebookに貼り付けてください。");
 }catch(error){
  alert("コピーできませんでした。");
 }

 openShareWindow("https://www.facebook.com/");
}

async function copyShareText(){
 const text =
 buildShareText();

 try{
  await copyText(text);
  alert("投稿文とリンクをコピーしました。");
 }catch(error){
  alert("コピーできませんでした。");
 }
}

function buildShareText(){
 return [
  "田子山富士168の縁プロジェクトで登頂記念証をいただきました。",
  "",
  "田子山富士に登った記念に、登頂記念証をいただきました。",
  "",
  "#田子山富士",
  "#168の縁プロジェクト",
  "",
  SHARE_CERTIFICATE_URL
 ].join("\n");
}

async function makeCertificateBlob(){
 const record =
 currentRecord;

 const image =
 await loadCanvasImage(
  CERTIFICATE_IMAGE
 );

 const imageWidth =
 image.naturalWidth ||
 image.width ||
 1920;

 const imageHeight =
 image.naturalHeight ||
 image.height ||
 1000;

 const panelHeight =
 Math.round(imageHeight * 0.34);

 const canvas =
 document.createElement("canvas");

 canvas.width =
 imageWidth;

 canvas.height =
 imageHeight + panelHeight;

 const ctx =
 canvas.getContext("2d");

 ctx.fillStyle =
 "#050505";

 ctx.fillRect(
  0,
  0,
  canvas.width,
  canvas.height
 );

 ctx.drawImage(
  image,
  0,
  0,
  imageWidth,
  imageHeight
 );

 drawRecordPanel(
  ctx,
  imageWidth,
  imageHeight,
  panelHeight,
  record
 );

 return await canvasToBlob(canvas);
}

function drawRecordPanel(ctx,w,y,h,record){
 const grad =
 ctx.createLinearGradient(0,y,0,y+h);

 grad.addColorStop(0,"#251d0b");
 grad.addColorStop(1,"#050505");

 ctx.fillStyle =
 grad;

 ctx.fillRect(
  0,
  y,
  w,
  h
 );

 ctx.strokeStyle =
 "rgba(255,220,95,0.82)";

 ctx.lineWidth =
 Math.max(6,Math.round(w * 0.006));

 ctx.strokeRect(
  Math.round(w * 0.035),
  y + Math.round(h * 0.12),
  Math.round(w * 0.93),
  Math.round(h * 0.76)
 );

 ctx.textAlign =
 "center";

 ctx.textBaseline =
 "middle";

 ctx.shadowColor =
 "rgba(0,0,0,0.96)";

 ctx.shadowBlur =
 Math.round(w * 0.012);

 ctx.shadowOffsetX =
 0;

 ctx.shadowOffsetY =
 Math.round(w * 0.008);

 drawCenteredText(
  ctx,
  "第" + record.climbCount + "回 登頂記念",
  w / 2,
  y + h * 0.35,
  Math.round(w * 0.064),
  "#ffdf72",
  "900"
 );

 drawCenteredText(
  ctx,
  "No." + record.serialNo,
  w / 2,
  y + h * 0.58,
  Math.round(w * 0.052),
  "#fff3c4",
  "900"
 );

 if(record.lastDate){
  drawCenteredText(
   ctx,
   record.lastDate,
   w / 2,
   y + h * 0.76,
   Math.round(w * 0.040),
   "#fff3c4",
   "900"
  );
 }

 ctx.shadowColor =
 "transparent";

 ctx.shadowBlur =
 0;

 ctx.shadowOffsetX =
 0;

 ctx.shadowOffsetY =
 0;
}

function drawCenteredText(ctx,text,x,y,size,color,weight){
 ctx.font =
 weight +
 " " +
 size +
 "px -apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Yu Mincho','Hiragino Mincho ProN','Meiryo',sans-serif";

 ctx.fillStyle =
 color;

 ctx.fillText(
  text,
  x,
  y
 );
}

function loadCanvasImage(url){
 return new Promise(function(resolve,reject){
  const img =
  new Image();

  img.crossOrigin =
  "anonymous";

  img.onload =
  function(){
   resolve(img);
  };

  img.onerror =
  function(){
   reject(new Error("image load error"));
  };

  img.src =
  url +
  "?share=20260701-certificate-main-01";
 });
}

function canvasToBlob(canvas){
 return new Promise(function(resolve,reject){
  try{
   canvas.toBlob(
    function(blob){
     if(blob){
      resolve(blob);
     }else{
      reject(new Error("blob error"));
     }
    },
    "image/png",
    0.95
   );
  }catch(error){
   reject(error);
  }
 });
}

function getCertificateFileName(){
 const serial =
 currentRecord && currentRecord.serialNo
 ? currentRecord.serialNo.replace(/[^0-9A-Za-z_-]/g,"-")
 : "certificate";

 return "tagoyama-fuji-certificate-" + serial + ".png";
}

function goBackToTop(){
 if(currentUserId){
  location.href =
  "index.html?userId=" +
  encodeURIComponent(currentUserId);
  return;
 }

 location.href =
 "./";
}

function setStatus(text){
 const box =
 document.getElementById("statusBox");

 box.hidden =
 false;

 box.innerText =
 text;
}

function showError(text){
 setStatus(text);

 document.getElementById("certificateArea").hidden =
 true;

 document.getElementById("receiveArea").hidden =
 false;

 document.getElementById("shareArea").hidden =
 true;

 setReceiveButton(true);
}

function setReceiveButton(enabled){
 const btn =
 document.getElementById("receiveBtn");

 if(!btn){
  return;
 }

 btn.disabled =
 !enabled;

 btn.style.opacity =
 enabled ? "1" : ".55";
}

async function getJson(url){
 try{
  return await fetchJson(url,12000);
 }catch(error){
  return await jsonp(url,15000);
 }
}

async function fetchJson(url,timeoutMs){
 const controller =
 new AbortController();

 const timer =
 setTimeout(function(){
  controller.abort();
 },timeoutMs || 12000);

 try{
  const res =
  await fetch(
   url,
   {
    method:"GET",
    cache:"no-store",
    signal:controller.signal
   }
  );

  const text =
  await res.text();

  if(!res.ok){
   throw new Error("通信エラー");
  }

  try{
   return JSON.parse(text);
  }catch(e){}

  const match =
  text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

  if(match && match[1]){
   return JSON.parse(match[1]);
  }

  throw new Error("JSONではありません");

 }finally{
  clearTimeout(timer);
 }
}

function jsonp(url,timeoutMs){
 return new Promise(function(resolve,reject){
  const callbackName =
  "__tagoyamaCertificateCallback_" +
  Date.now() +
  "_" +
  Math.floor(Math.random() * 100000);

  const sep =
  url.indexOf("?") >= 0
  ? "&"
  : "?";

  const script =
  document.createElement("script");

  let done =
  false;

  const timer =
  setTimeout(function(){
   cleanup();
   reject(new Error("JSONP timeout"));
  },timeoutMs || 15000);

  function cleanup(){
   if(done){
    return;
   }

   done =
   true;

   clearTimeout(timer);

   try{
    delete window[callbackName];
   }catch(e){
    window[callbackName] =
    undefined;
   }

   if(script.parentNode){
    script.parentNode.removeChild(script);
   }
  }

  window[callbackName] =
  function(data){
   cleanup();
   resolve(data);
  };

  script.onerror =
  function(){
   cleanup();
   reject(new Error("JSONP error"));
  };

  script.src =
  url +
  sep +
  "callback=" +
  encodeURIComponent(callbackName);

  document.body.appendChild(script);
 });
}

function openShareWindow(url){
 window.open(
  url,
  "_blank",
  "noopener,noreferrer"
 );
}

function formatDate(value){
 const text =
 cleanText(value);

 if(!text){
  const now =
  new Date();

  const y =
  now.getFullYear();

  const m =
  String(now.getMonth() + 1).padStart(2,"0");

  const d =
  String(now.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + d;
 }

 if(/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(text)){
  const parts =
  text.split("/");

  return parts[0] +
  "/" +
  parts[1].padStart(2,"0") +
  "/" +
  parts[2].padStart(2,"0");
 }

 if(/^\d{4}-\d{1,2}-\d{1,2}/.test(text)){
  const parts =
  text.substring(0,10).split("-");

  return parts[0] +
  "/" +
  parts[1].padStart(2,"0") +
  "/" +
  parts[2].padStart(2,"0");
 }

 const date =
 new Date(text);

 if(!Number.isNaN(date.getTime())){
  const y =
  date.getFullYear();

  const m =
  String(date.getMonth() + 1).padStart(2,"0");

  const d =
  String(date.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + d;
 }

 return text;
}

function normalizeSerialNo(value){
 let text =
 cleanText(value);

 text =
 text.replace(/^No\.?/i,"");

 text =
 text.replace(/^Ｎｏ\.?/i,"");

 text =
 text.trim();

 return text;
}

function numberValue(value){
 const n =
 Number(
  cleanText(value).replace(/[^\d.-]/g,"")
 );

 return Number.isFinite(n)
 ? n
 : 0;
}

async function copyText(text){
 text =
 cleanText(text);

 if(navigator.clipboard && navigator.clipboard.writeText){
  await navigator.clipboard.writeText(text);
  return;
 }

 const textarea =
 document.createElement("textarea");

 textarea.value =
 text;

 textarea.setAttribute("readonly","readonly");

 textarea.style.position =
 "fixed";

 textarea.style.left =
 "-9999px";

 textarea.style.top =
 "0";

 document.body.appendChild(textarea);

 textarea.focus();
 textarea.select();

 const ok =
 document.execCommand("copy");

 document.body.removeChild(textarea);

 if(!ok){
  throw new Error("copy failed");
 }
}

function cleanText(value){
 if(value === null || value === undefined){
  return "";
 }

 return String(value).trim();
}
