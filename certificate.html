<body>

<div class="wrap">

  <header class="header">
    <div class="logoBox">
      <img src="logo.png" alt="田子山富士">
    </div>

    <h1 class="title">
      登頂記念証
    </h1>

    <div class="lead">
      田子山富士168の縁プロジェクト
    </div>
  </header>

  <section class="card">
    <div class="statusBox" id="statusBox">
      登頂記念証を読み込んでいます...
    </div>

    <div id="certificateArea" hidden>
      <div class="certificatePanel">

        <div class="imageWrap">
          <img id="certificateImage" alt="登頂記念画像">
          <div class="imageError" id="imageError" hidden>
            画像を読み込めませんでした。<br>
            登頂記録の画像URLを確認してください。
          </div>
        </div>

        <div class="certName" id="imageNameText"></div>

        <div class="certMain" id="climbText"></div>

        <div class="certPerson" id="personText"></div>

        <div class="certInfo" id="infoText"></div>

      </div>

      <div class="btnGrid">
        <a class="linkBtn goldBtn" id="imageOpenBtn" href="#" target="_blank" rel="noopener">
          画像を開く・保存
        </a>

        <button class="btn grayBtn" onclick="copyPostText()">
          投稿文コピー
        </button>

        <button class="btn facebookBtn" onclick="shareCertificate('facebook')">
          Facebookで共有
        </button>

        <button class="btn lineBtn" onclick="shareCertificate('line')">
          LINEで送る
        </button>

        <button class="btn xBtn" onclick="shareCertificate('x')">
          Xで投稿
        </button>

        <a class="linkBtn greenBtn" id="bookBtn" href="certificate-book.html">
          登頂記念帳へ戻る
        </a>

        <a class="linkBtn blackBtn" href="./">
          トップへ戻る
        </a>
      </div>

      <div class="note">
        この画面は、登頂記念帳と同じ登頂記録データだけを表示します。<br>
        回数・番号・画像は勝手に作りません。
      </div>
    </div>
  </section>

  <footer class="footer">
    田子山富士 168の縁プロジェクト<br>
    登頂記念証
  </footer>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzrbLiXwZj6pv35CdDjEdn1Rd13EGCsR4hB_k514_sgQBSSpEoPkNjN9yJ0tmHLnS3w/exec";

const SITE_BASE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
SITE_BASE + "certificate.html";

const CERTIFICATE_BOOK_PAGE =
SITE_BASE + "certificate-book.html";

let currentUserId =
"";

let requestedClimbCount =
"";

let requestedSerialNo =
"";

let currentRecord =
null;

window.addEventListener("load",loadCertificate);

async function loadCertificate(){
  const params =
  new URLSearchParams(window.location.search);

  currentUserId =
  cleanText(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    localStorage.getItem("userId") ||
    ""
  );

  requestedClimbCount =
  cleanText(
    params.get("climbCount") ||
    params.get("count") ||
    ""
  );

  requestedSerialNo =
  normalizeSerialNo(
    params.get("serialNo") ||
    params.get("serial") ||
    params.get("certificateNo") ||
    ""
  );

  if(currentUserId){
    localStorage.setItem("tagoyamaUserId",currentUserId);
    localStorage.setItem("tagoyamaFujiUserId",currentUserId);
  }

  if(!currentUserId){
    showError(
      "ユーザーIDが不明です。\n山頂QRコードから登頂受付をしてください。"
    );
    return;
  }

  setStatus(
    "登頂記録を確認しています..."
  );

  try{
    const url =
    GAS_URL +
    "?mode=climbHistory" +
    "&userId=" +
    encodeURIComponent(currentUserId) +
    "&t=" +
    Date.now();

    const data =
    await getJson(url);

    if(!data || data.success === false){
      showError(
        data && data.message
        ? data.message
        : "登頂記録を読み込めませんでした。"
      );
      return;
    }

    if(!Array.isArray(data.history) || data.history.length === 0){
      showError(
        "まだ登頂記録がありません。"
      );
      return;
    }

    const records =
    data.history
    .map(normalizeRecord)
    .filter(isUsableRecord);

    if(records.length === 0){
      showError(
        "表示できる登頂記録がありません。"
      );
      return;
    }

    currentRecord =
    selectRecord(records);

    if(!currentRecord){
      showError(
        "指定された登頂記録が見つかりません。\n登頂記念帳からもう一度開いてください。"
      );
      return;
    }

    renderCertificate(currentRecord);

  }catch(error){
    showError(
      "登頂記録の読み込みに失敗しました。"
    );
  }
}

function normalizeRecord(item){
  return {
    userId:cleanText(item.userId),
    climbCount:cleanText(item.climbCount),
    serialNo:normalizeSerialNo(item.serialNo),
    lastDate:formatDate(item.lastDate),
    imageNo:normalizeSerialNo(item.imageNo),
    imageName:cleanText(item.imageName),
    imageUrl:normalizeImageUrl(item.imageUrl),
    updatedAt:formatDate(item.updatedAt),
    participantNo:cleanText(item.participantNo)
  };
}

function isUsableRecord(item){
  return (
    item &&
    item.userId &&
    item.climbCount &&
    item.serialNo &&
    item.imageName &&
    item.imageUrl
  );
}

function selectRecord(records){
  let found =
  null;

  if(requestedClimbCount && requestedSerialNo){
    found =
    records.find(function(item){
      return (
        cleanText(item.climbCount) === requestedClimbCount &&
        normalizeSerialNo(item.serialNo) === requestedSerialNo
      );
    });

    if(found){
      return found;
    }
  }

  if(requestedSerialNo){
    found =
    records.find(function(item){
      return normalizeSerialNo(item.serialNo) === requestedSerialNo;
    });

    if(found){
      return found;
    }
  }

  if(requestedClimbCount){
    found =
    records.find(function(item){
      return cleanText(item.climbCount) === requestedClimbCount;
    });

    if(found){
      return found;
    }
  }

  if(records.length === 1){
    return records[0];
  }

  if(!requestedClimbCount && !requestedSerialNo){
    return records
    .slice()
    .sort(function(a,b){
      return numberValue(b.climbCount) - numberValue(a.climbCount);
    })[0];
  }

  return null;
}

function renderCertificate(item){
  const split =
  splitSerialNo(item.serialNo);

  const displayClimb =
  item.climbCount || split.climb || "";

  const displayPerson =
  split.person || numericText(item.participantNo) || "";

  const certificateImage =
  document.getElementById("certificateImage");

  const imageError =
  document.getElementById("imageError");

  certificateImage.onload =
  function(){
    certificateImage.hidden =
    false;

    imageError.hidden =
    true;
  };

  certificateImage.onerror =
  function(){
    certificateImage.hidden =
    true;

    imageError.hidden =
    false;
  };

  certificateImage.src =
  item.imageUrl;

  document.getElementById("imageOpenBtn").href =
  item.imageUrl;

  document.getElementById("bookBtn").href =
  CERTIFICATE_BOOK_PAGE +
  "?userId=" +
  encodeURIComponent(item.userId || currentUserId) +
  "&v=" +
  Date.now();

  document.getElementById("imageNameText").innerText =
  item.imageName;

  document.getElementById("climbText").innerText =
  displayClimb
  ? "第" + displayClimb + "回 登頂記念"
  : "登頂記念";

  document.getElementById("personText").innerText =
  displayPerson
  ? displayPerson + "人目"
  : "登頂記録";

  const infoLines =
  [];

  infoLines.push(
    "記録番号：" + item.serialNo
  );

  if(item.lastDate){
    infoLines.push(
      "登頂日：" + item.lastDate
    );
  }

  if(item.imageNo){
    infoLines.push(
      "画像番号：" + item.imageNo
    );
  }

  document.getElementById("infoText").innerText =
  infoLines.join("\n");

  document.getElementById("certificateArea").hidden =
  false;

  setStatus(
    "登頂記録を確認しました。"
  );
}

function splitSerialNo(serialNo){
  serialNo =
  normalizeSerialNo(serialNo);

  const match =
  serialNo.match(/^(\d+)[\-ー−―](\d+)$/);

  if(!match){
    return {
      climb:"",
      person:""
    };
  }

  return {
    climb:match[1],
    person:match[2]
  };
}

function buildCertificateUrl(){
  if(!currentRecord){
    return CERTIFICATE_PAGE;
  }

  const params =
  new URLSearchParams();

  params.set(
    "userId",
    currentRecord.userId || currentUserId
  );

  params.set(
    "climbCount",
    currentRecord.climbCount
  );

  params.set(
    "serialNo",
    currentRecord.serialNo
  );

  return CERTIFICATE_PAGE +
  "?" +
  params.toString();
}

function buildPostText(){
  if(!currentRecord){
    return "";
  }

  const split =
  splitSerialNo(currentRecord.serialNo);

  const displayClimb =
  currentRecord.climbCount || split.climb || "";

  const displayPerson =
  split.person || numericText(currentRecord.participantNo) || "";

  const lines =
  [];

  lines.push(
    "田子山富士168の縁プロジェクトの登頂記念です。"
  );

  if(currentRecord.imageName){
    lines.push(
      currentRecord.imageName
    );
  }

  if(displayClimb){
    lines.push(
      "第" + displayClimb + "回登頂記念"
    );
  }

  if(displayPerson){
    lines.push(
      displayPerson + "人目"
    );
  }

  lines.push(
    "記録番号：" + currentRecord.serialNo
  );

  if(currentRecord.lastDate){
    lines.push(
      "登頂日：" + currentRecord.lastDate
    );
  }

  lines.push(
    "#田子山富士"
  );

  lines.push(
    "#168の縁プロジェクト"
  );

  return lines.join("\n");
}

async function copyPostText(){
  if(!currentRecord){
    alert("登頂記録が見つかりません。");
    return;
  }

  const text =
  buildPostText() +
  "\n" +
  buildCertificateUrl();

  try{
    await copyText(text);
    alert("投稿文とリンクをコピーしました。");
  }catch(error){
    alert("コピーできませんでした。");
  }
}

async function shareCertificate(type){
  if(!currentRecord){
    alert("登頂記録が見つかりません。");
    return;
  }

  const url =
  buildCertificateUrl();

  const text =
  buildPostText();

  if(type === "facebook"){
    try{
      await copyText(text + "\n" + url);
    }catch(e){}

    location.href =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "line"){
    location.href =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "x"){
    location.href =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(text) +
    "&url=" +
    encodeURIComponent(url);

    return;
  }
}

async function getJson(url){
  try{
    return await fetchJson(url,12000);
  }catch(error){
    return await jsonp(url,15000);
  }
}

async function fetchJson(url,timeoutMs){
  const controller =
  new AbortController();

  const timer =
  setTimeout(function(){
    controller.abort();
  },timeoutMs || 12000);

  try{
    const res =
    await fetch(
      url,
      {
        method:"GET",
        cache:"no-store",
        signal:controller.signal
      }
    );

    const text =
    await res.text();

    if(!res.ok){
      throw new Error("通信エラーが発生しました");
    }

    try{
      return JSON.parse(text);
    }catch(e){}

    const match =
    text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

    if(match && match[1]){
      return JSON.parse(match[1]);
    }

    throw new Error("データを読み込めませんでした");

  }finally{
    clearTimeout(timer);
  }
}

function jsonp(url,timeoutMs){
  return new Promise(function(resolve,reject){
    const callbackName =
    "__tagoyamaCertificateCallback_" +
    Date.now() +
    "_" +
    Math.floor(Math.random() * 100000);

    const sep =
    url.indexOf("?") >= 0
    ? "&"
    : "?";

    const script =
    document.createElement("script");

    let done =
    false;

    const timer =
    setTimeout(function(){
      cleanup();

      reject(
        new Error("読み込みが時間切れになりました")
      );
    },timeoutMs || 15000);

    function cleanup(){
      if(done){
        return;
      }

      done =
      true;

      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(e){
        window[callbackName] =
        undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }

    window[callbackName] =
    function(data){
      cleanup();
      resolve(data);
    };

    script.onerror =
    function(){
      cleanup();

      reject(
        new Error("JSONP読み込みに失敗しました")
      );
    };

    script.src =
    url +
    sep +
    "callback=" +
    encodeURIComponent(callbackName);

    document.body.appendChild(script);
  });
}

function normalizeImageUrl(value){
  let url =
  cleanText(value);

  if(!url){
    return "";
  }

  url =
  url
  .replace(/\\u003d/g,"=")
  .replace(/\\u0026/g,"&")
  .replace(/\\\//g,"/")
  .replace(/&amp;/g,"&")
  .replace(/[),.;]+$/g,"")
  .trim();

  if(url.indexOf("data:image") === 0){
    return url;
  }

  if(url.indexOf("drive.google.com/thumbnail") >= 0){
    return url;
  }

  let match =
  url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);

  if(match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1600";
  }

  match =
  url.match(/[?&]id=([^&]+)/);

  if(url.indexOf("drive.google.com") >= 0 && match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1600";
  }

  return url;
}

function normalizeSerialNo(value){
  value =
  cleanText(value);

  if(!value){
    return "";
  }

  if(value.indexOf("GMT") >= 0 || value.indexOf("標準時") >= 0){
    const d =
    new Date(value);

    if(!isNaN(d.getTime())){
      return String(d.getMonth() + 1) +
      "-" +
      String(d.getFullYear());
    }
  }

  return value
  .replace(/^'/,"")
  .replace(/[ー−―]/g,"-");
}

function formatDate(value){
  value =
  cleanText(value);

  if(!value){
    return "";
  }

  if(value.indexOf("GMT") >= 0 || value.indexOf("標準時") >= 0){
    const d =
    new Date(value);

    if(!isNaN(d.getTime())){
      return d.getFullYear() +
      "/" +
      String(d.getMonth() + 1).padStart(2,"0") +
      "/" +
      String(d.getDate()).padStart(2,"0");
    }
  }

  return value
  .replace("T15:00:00.000Z","")
  .replace("T00:00:00.000Z","")
  .replace(/-/g,"/");
}

function numericText(value){
  value =
  cleanText(value);

  if(/^\d+$/.test(value)){
    return value;
  }

  return "";
}

function numberValue(value){
  const n =
  Number(cleanText(value).replace(/[^\d.-]/g,""));

  if(isNaN(n)){
    return 0;
  }

  return n;
}

function setStatus(text){
  document.getElementById("statusBox").innerText =
  text;
}

function showError(text){
  document.getElementById("statusBox").innerText =
  text;

  document.getElementById("certificateArea").hidden =
  true;
}

async function copyText(text){
  text =
  cleanText(text);

  if(navigator.clipboard && navigator.clipboard.writeText){
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.setAttribute("readonly","readonly");
  textarea.style.position =
  "fixed";
  textarea.style.left =
  "-9999px";
  textarea.style.top =
  "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  const ok =
  document.execCommand("copy");

  document.body.removeChild(textarea);

  if(!ok){
    throw new Error("コピーできませんでした");
  }
}

function cleanText(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
