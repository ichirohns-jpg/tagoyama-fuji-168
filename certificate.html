<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbxVNG0afPqotqc0-YZOhL1QDhozzbYbAwA5uUEOAtz7L2ZjzaG70aY81dt8-O0Alx_5/exec";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

const SHARE_CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

const DEFAULT_CERTIFICATE_IMAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-certificate.jpg";

let currentData = null;
let currentImageCandidates = [];
let currentImageIndex = 0;

window.addEventListener("load", init);

async function init(){
  const paramsData = getDataFromUrl();

  updateSimpleLinks(paramsData.userId);

  if(!paramsData.userId){
    showDirectNotice();
    return;
  }

  try{
    showLoading("登頂記録を読み込んでいます。");

    let data = paramsData;

    if(!data.climbCount || !data.serialNo){
      const historyData = await loadClimbHistory(data.userId);
      data = mergeData(data, historyData);
    }

    if(!data.climbCount || !data.serialNo){
      throw new Error("登頂記録を確認できませんでした。");
    }

    currentData = normalizeCertificateData(data);

    saveCertificateData(currentData);
    renderCertificate(currentData);
  }catch(e){
    showError(
      e && e.message
        ? e.message
        : "登頂記念証を読み込めませんでした。"
    );
  }
}

function getDataFromUrl(){
  const params = new URLSearchParams(location.search);

  return {
    userId:getString(
      params.get("userId") ||
      params.get("userid") ||
      params.get("uid") ||
      params.get("id") ||
      ""
    ),
    climbCount:getString(
      params.get("climbCount") ||
      params.get("climbNo") ||
      params.get("count") ||
      params.get("登頂回数") ||
      ""
    ),
    serialNo:getString(
      params.get("serialNo") ||
      params.get("serial") ||
      params.get("certificateNo") ||
      params.get("no") ||
      params.get("シリアル番号") ||
      ""
    ),
    lastDate:getString(
      params.get("lastDate") ||
      params.get("date") ||
      params.get("climbDate") ||
      params.get("日付") ||
      ""
    ),
    imageNo:getString(
      params.get("imageNo") ||
      params.get("imageNumber") ||
      params.get("画像番号") ||
      ""
    ),
    imageName:getString(
      params.get("imageName") ||
      params.get("imageTitle") ||
      params.get("title") ||
      params.get("画像名") ||
      ""
    ),
    imageUrl:getString(
      params.get("imageUrl") ||
      params.get("imageURL") ||
      params.get("img") ||
      params.get("画像URL") ||
      params.get("画像") ||
      ""
    ),
    participantNo:getString(
      params.get("participantNo") ||
      params.get("participantCount") ||
      params.get("participants") ||
      params.get("totalParticipants") ||
      params.get("参加人数") ||
      ""
    )
  };
}

async function loadClimbHistory(userId){
  const url =
    GAS_URL +
    "?mode=climbHistory" +
    "&userId=" +
    encodeURIComponent(userId) +
    "&t=" +
    Date.now();

  const data = await getJson(url);

  if(!data || data.success === false){
    throw new Error(
      data && data.message
        ? data.message
        : "登頂履歴を確認できませんでした。"
    );
  }

  return {
    userId:userId,
    climbCount:getFirst(
      data.climbCount,
      data.climbNo,
      data.count,
      data.登頂回数
    ),
    serialNo:getFirst(
      data.serialNo,
      data.serial,
      data.certificateNo,
      data.no,
      data.シリアル番号
    ),
    lastDate:getFirst(
      data.lastDate,
      data.date,
      data.climbDate,
      data.日付
    ),
    imageNo:getFirst(
      data.imageNo,
      data.imageNumber,
      data.image,
      data.画像番号
    ),
    imageName:getFirst(
      data.imageName,
      data.imageTitle,
      data.title,
      data.画像名
    ),
    imageUrl:getFirst(
      data.imageUrl,
      data.imageURL,
      data.img,
      data.画像URL,
      data.画像url,
      data.画像
    ),
    participantNo:getFirst(
      data.participantNo,
      data.participantCount,
      data.participants,
      data.totalParticipants,
      data.total,
      data.countParticipants,
      data.参加人数
    )
  };
}

function mergeData(base, extra){
  const result = {};

  Object.keys(base || {}).forEach(function(key){
    result[key] = getString(base[key]);
  });

  Object.keys(extra || {}).forEach(function(key){
    if(!result[key]){
      result[key] = getString(extra[key]);
    }
  });

  return result;
}

function normalizeCertificateData(data){
  return {
    userId:getString(data.userId),
    climbCount:getString(data.climbCount),
    serialNo:getString(data.serialNo),
    lastDate:formatDate(getString(data.lastDate)),
    imageNo:getString(data.imageNo),
    imageName:getString(data.imageName),
    imageUrl:cleanText(data.imageUrl),
    participantNo:getString(data.participantNo)
  };
}

function saveCertificateData(data){
  try{
    localStorage.setItem("tagoyamaUserId", data.userId);
    localStorage.setItem("tagoyamaFujiUserId", data.userId);
    localStorage.setItem("tagoyamaClimbData", JSON.stringify(data));
    localStorage.setItem("tagoyamaLastClimbCount", data.climbCount);
    localStorage.setItem("tagoyamaLastSerialNo", data.serialNo);
    localStorage.setItem("tagoyamaLastDate", data.lastDate);
    localStorage.setItem("tagoyamaLastParticipantNo", data.participantNo);
  }catch(e){}
}

function renderCertificate(data){
  const loadingSection = document.getElementById("loadingSection");
  const certificateSection = document.getElementById("certificateSection");

  if(loadingSection){
    loadingSection.classList.add("hidden");
  }

  if(certificateSection){
    certificateSection.classList.remove("hidden");
  }

  const climbCountText = document.getElementById("climbCountText");
  const serialNoText = document.getElementById("serialNoText");
  const dateText = document.getElementById("dateText");

function setCertificateImage(url){
  const img = document.getElementById("certificateImage");

  if(!img){
    return;
  }

  currentImageCandidates = makeImageDisplayUrlList(url);
  currentImageIndex = 0;

  if(!currentImageCandidates.length){
    currentImageCandidates = [DEFAULT_CERTIFICATE_IMAGE];
  }

  img.src = currentImageCandidates[currentImageIndex];
}

function handleCertificateImageError(){
  const img = document.getElementById("certificateImage");

  if(!img){
    return;
  }

  currentImageIndex++;

  if(currentImageIndex < currentImageCandidates.length){
    img.src = currentImageCandidates[currentImageIndex];
    return;
  }

  if(img.src !== DEFAULT_CERTIFICATE_IMAGE){
    img.src = DEFAULT_CERTIFICATE_IMAGE;
    return;
  }

  img.style.display = "none";
}

function makeImageDisplayUrlList(url){
  const text = cleanText(url);
  const list = [];
  const id = getDriveFileId(text);

  if(text){
    list.push(text);
  }

  if(id){
    list.push(
      "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(id) +
      "&sz=w1600"
    );

    list.push(
      "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(id) +
      "&sz=w1200"
    );

    list.push(
      "https://lh3.googleusercontent.com/d/" +
      id +
      "=w1600"
    );

    list.push(
      "https://lh3.googleusercontent.com/d/" +
      id +
      "=w1200"
    );
  }

  list.push(DEFAULT_CERTIFICATE_IMAGE);

  return list.filter(function(v,i,arr){
    return v && arr.indexOf(v) === i;
  });
}

function getDriveFileId(url){
  const text = cleanText(url);

  if(!text){
    return "";
  }

  let match = text.match(/\/file\/d\/([^/]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = text.match(/[?&]id=([^&]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = text.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

  if(match && match[1]){
    return match[1];
  }

  return "";
}

async function copyShareText(){

    buildShareText() +
    "\n" +
    buildShareUrl();

    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
    }else{
      copyByTextarea(text);
    }

    alert("登頂記念証の結果をコピーしました。");
  }catch(e){
    copyByTextarea(text);
    alert("登頂記念証の結果をコピーしました。");

function copyByTextarea(text){
  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.setAttribute("readonly","readonly");
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  textarea.style.top = "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
}

async function shareCanvasImageForIphone(canvas,fileName){
  const blob = await new Promise(function(resolve){
    canvas.toBlob(function(b){
      resolve(b);
    },"image/png");
  });

  if(!blob){
    throw new Error("画像を作成できませんでした。");
  }

  const file = new File(
    [blob],
    fileName,
    {
      type:"image/png"
    }
  );

  if(
    navigator.share &&
    navigator.canShare &&
    navigator.canShare({
      files:[file]
    })
  ){
    await navigator.share({
      files:[file],
      title:"田子山富士 登頂記念証",
      text:"田子山富士 登頂記念証"
    });

    return;
  }

  throw new Error("iPhone共有シートが使えません。");
}

function drawRoundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x + r,y);
  ctx.lineTo(x + w - r,y);
  ctx.quadraticCurveTo(x + w,y,x + w,y + r);
  ctx.lineTo(x + w,y + h - r);
  ctx.quadraticCurveTo(x + w,y + h,x + w - r,y + h);
  ctx.lineTo(x + r,y + h);
  ctx.quadraticCurveTo(x,y + h,x,y + h - r);
  ctx.lineTo(x,y + r);
  ctx.quadraticCurveTo(x,y,x + r,y);
  ctx.closePath();

  if(fill){
    ctx.fillStyle = fill;
    ctx.fill();
  }

  if(stroke){
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 4;
    ctx.stroke();
  }
}

function drawCoverImage(ctx,img,x,y,w,h){
  const iw = img.naturalWidth || img.width;
  const ih = img.naturalHeight || img.height;

  if(!iw || !ih){
    return;
  }

  const scale = Math.max(w / iw,h / ih);
  const sw = w / scale;
  const sh = h / scale;
  const sx = (iw - sw) / 2;
  const sy = (ih - sh) / 2;

  ctx.save();
  roundedClip(ctx,x,y,w,h,30);
  ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
  ctx.restore();
}

function roundedClip(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x + r,y);
  ctx.lineTo(x + w - r,y);
  ctx.quadraticCurveTo(x + w,y,x + w,y + r);
  ctx.lineTo(x + w,y + h - r);
  ctx.quadraticCurveTo(x + w,y + h,x + w - r,y + h);
  ctx.lineTo(x + r,y + h);
  ctx.quadraticCurveTo(x,y + h,x,y + h - r);
  ctx.lineTo(x,y + r);
  ctx.quadraticCurveTo(x,y,x + r,y);
  ctx.closePath();
  ctx.clip();
}

function wrapTextCenter(ctx,text,x,y,maxWidth,lineHeight){
  const safeText = getString(text);
  const paragraphs = safeText.split(/\n+/);
  const lines = [];

  paragraphs.forEach(function(paragraph){
    const chars = paragraph.split("");
    let line = "";

    chars.forEach(function(ch){
      const test = line + ch;
      const width = ctx.measureText(test).width;

      if(width > maxWidth && line){
        lines.push(line);
        line = ch;
      }else{
        line = test;
      }
    });

    if(line){
      lines.push(line);
    }
  });

  const startY = y - ((lines.length - 1) * lineHeight) / 2;

  lines.forEach(function(line,i){
    ctx.fillText(line,x,startY + i * lineHeight);
  });
}

function loadImageForCanvas(url){
  return new Promise(function(resolve,reject){
    const list = makeImageDisplayUrlList(url);
    let index = 0;

    function tryNext(){
      if(index >= list.length){
        reject(new Error("画像を読み込めませんでした。"));
        return;
      }

      const img = new Image();
      img.crossOrigin = "anonymous";

      img.onload = function(){
        resolve(img);
      };

      img.onerror = function(){
        index++;
        tryNext();
      };

      img.src = list[index];
    }

    tryNext();
  });
}

async function getJson(url){
  const response = await fetch(url,{
    method:"GET",
    cache:"no-store"
  });

  if(!response.ok){
    throw new Error("通信に失敗しました。");
  }

  const text = await response.text();

  try{
    return JSON.parse(text);
  }catch(e){
    const match = text.match(/^[^(]*\(([\s\S]*)\)\s*;?\s*$/);

    if(match && match[1]){
      return JSON.parse(match[1]);
    }

    throw new Error("データを読み込めませんでした。");
  }
}

function getFirst(){
  for(let i = 0; i < arguments.length; i++){
    const v = arguments[i];

    if(v === null || v === undefined){
      continue;
    }

    const text = cleanText(v);

    if(text !== ""){
      return text;
    }
  }

  return "";
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function cleanText(value){
  return getString(value)
    .replace(/\\\//g,"/")
    .replace(/\\u0026/g,"&")
    .replace(/&amp;/g,"&");
}

function formatDate(value){
  const text = getString(value);

  if(!text){
    return "";
  }

  if(text.match(/^\d{4}\/\d{1,2}\/\d{1,2}$/)){
    return text;
  }

  if(text.match(/^\d{4}-\d{1,2}-\d{1,2}$/)){
    const parts = text.split("-");

    return parts[0] + "/" + Number(parts[1]) + "/" + Number(parts[2]);
  }

  const d = new Date(text);

  if(!isNaN(d.getTime())){
    return d.getFullYear() + "/" + (d.getMonth() + 1) + "/" + d.getDate();
  }

  return text;
}

function getTodayText(){
  const d = new Date();

  return d.getFullYear() + "/" + (d.getMonth() + 1) + "/" + d.getDate();
}
