<main class="page">

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

const SHARE_CERTIFICATE_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-certificate.html";

const SHARE_VERSION =
  "20260703-safe-final";

const FALLBACK_IMAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/top.jpg?v=20260703-safe-final";

const FALLBACK_LOGO =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png";

let certificateData = {
  userId:"",
  climbCount:"",
  serialNo:"",
  lastDate:"",
  imageUrl:""
};

window.addEventListener("load", initCertificate);

async function initCertificate(){
  const fromUrl = getDataFromUrl();

  certificateData = mergeData(certificateData, fromUrl);

  if(certificateData.userId){
    await loadCertificateFromGas(certificateData.userId);
  }

  if(!certificateData.imageUrl){
    certificateData.imageUrl = FALLBACK_IMAGE;
  }

  certificateData.imageUrl = normalizeImageUrl(certificateData.imageUrl);

  saveDataToLocal(certificateData);
  renderCertificate(certificateData);
  updateLinks();
  setStatus("登頂記録を読み込みました。");
}

function getDataFromUrl(){
  const params = new URLSearchParams(location.search);

  const imgid =
    getString(params.get("imgid")) ||
    getString(params.get("imageId")) ||
    getString(params.get("id"));

  let imageUrl =
    getString(params.get("imageUrl")) ||
    getString(params.get("image")) ||
    getString(params.get("img")) ||
    getString(params.get("url"));

  if(!imageUrl && imgid){
    imageUrl =
      "https://lh3.googleusercontent.com/d/" +
      encodeURIComponent(imgid) +
      "=w2000";
  }

  return {
    userId:
      getString(params.get("userId")) ||
      getString(params.get("userid")) ||
      getString(params.get("uid")),

    climbCount:
      getString(params.get("climbCount")) ||
      getString(params.get("count")) ||
      getString(params.get("c")),

    serialNo:
      getString(params.get("serialNo")) ||
      getString(params.get("serial")) ||
      getString(params.get("s")),

    lastDate:
      getString(params.get("lastDate")) ||
      getString(params.get("date")) ||
      getString(params.get("d")),

    imageUrl:imageUrl
  };
}

async function loadCertificateFromGas(userId){
  setStatus("登頂記録を確認しています。");

  try{
    const data = await tryManyJson([
      GAS_URL + "?mode=climbHistory&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?action=climbHistory&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?climbHistory=1&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?mode=getClimb&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?action=getClimb&userId=" + encodeURIComponent(userId) + "&t=" + Date.now()
    ]);

    const normalized = normalizeGasData(data, userId);
    certificateData = mergeData(certificateData, normalized);
  }catch(error){
    console.warn(error);
  }
}

function normalizeGasData(data, userId){
  const source = flattenObject(data);

  return {
    userId:getFirst(source.userId, source.uid, userId),

    climbCount:getFirst(
      source.climbCount,
      source.count,
      source.times,
      source.climb_count,
      source.climb,
      source["登頂回数"],
      source["個人登頂回数"]
    ),

    serialNo:getFirst(
      source.serialNo,
      source.serial,
      source.no,
      source.serial_no,
      source.number,
      source["シリアル"],
      source["記念番号"]
    ),

    lastDate:getFirst(
      source.lastDate,
      source.date,
      source.climbDate,
      source.last_date,
      source.createdAt,
      source["日時"],
      source["日付"]
    ),

    imageUrl:getFirst(
      source.imageUrl,
      source.certificateImageUrl,
      source.certificateUrl,
      source.image,
      source.imgUrl,
      source.img,
      source.url,
      source["画像URL"]
    )
  };
}

function mergeData(base, add){
  const result = Object.assign({}, base);
  add = add || {};

  Object.keys(add).forEach(function(key){
    if(getString(add[key])){
      result[key] = add[key];
    }
  });

  return result;
}

function renderCertificate(data){
  const image = document.getElementById("memorialImage");

  if(image){
    image.src = data.imageUrl || FALLBACK_IMAGE;
  }
}

function updateLinks(){
  const topLink = document.getElementById("topLink");
  const omikujiLink = document.getElementById("omikujiLink");

  const query =
    certificateData.userId
      ? "?userId=" + encodeURIComponent(certificateData.userId)
      : "";

  if(topLink){
    topLink.href = "index.html" + query;
  }

  if(omikujiLink){
    omikujiLink.href = "omikuji.html" + query;
  }
}

function setStatus(text){
  const el = document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }
}

function saveDataToLocal(data){
  try{
    if(data.userId){
      localStorage.setItem("tagoyamaUserId", data.userId);
      localStorage.setItem("tagoyamaFujiUserId", data.userId);
    }

    if(data.climbCount){
      localStorage.setItem("tagoyamaLastClimbCount", data.climbCount);
    }

    if(data.serialNo){
      localStorage.setItem("tagoyamaLastSerialNo", data.serialNo);
    }

    if(data.lastDate){
      localStorage.setItem("tagoyamaLastDate", data.lastDate);
    }

    if(data.imageUrl){
      localStorage.setItem("tagoyamaLastImageUrl", data.imageUrl);
    }

    localStorage.setItem("tagoyamaClimbData", JSON.stringify(data));
  }catch(error){
    console.warn(error);
  }
}

async function saveCertificateImage(){
  const btn = document.getElementById("saveBtn");
  const oldText = btn ? btn.innerText : "";

  if(btn){
    btn.disabled = true;
    btn.innerText = "画像を準備中...";
  }

  try{
    const blob = await getImageBlob(certificateData.imageUrl || FALLBACK_IMAGE);

    if(!blob){
      openImageOnly(certificateData.imageUrl || FALLBACK_IMAGE);
      return;
    }

    const filename =
      "tagoyama-certificate-" +
      cleanFileName(certificateData.serialNo || "certificate") +
      ".png";

    const file = new File([blob], filename, {
      type:blob.type || "image/png"
    });

    if(
      navigator.canShare &&
      navigator.share &&
      navigator.canShare({
        files:[file]
      })
    ){
      await navigator.share({
        files:[file],
        title:"田子山富士 登頂記念証",
        text:makeShareText()
      });
      return;
    }

    downloadBlob(blob, filename);
  }catch(error){
    if(error && error.name === "AbortError"){
      return;
    }

    console.error(error);
    openImageOnly(certificateData.imageUrl || FALLBACK_IMAGE);
  }finally{
    if(btn){
      btn.disabled = false;
      btn.innerText = oldText || "画像を保存";
    }
  }
}

async function getImageBlob(url){
  const urls = makeImageUrlList(url);

  for(let i = 0; i < urls.length; i++){
    const target = getString(urls[i]);

    if(!target){
      continue;
    }

    try{
      const res = await fetch(target, {
        method:"GET",
        cache:"no-store"
      });

      if(res.ok){
        return await res.blob();
      }
    }catch(error){
      console.warn(error);
    }
  }

  return null;
}

function openImageOnly(url){
  alert("画像だけを開きます。開いた画像を長押しして保存してください。");
  window.open(url, "_blank", "noopener,noreferrer");
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = filename;
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(function(){
    URL.revokeObjectURL(url);
  }, 3000);
}

async function postFacebook(){
  const text =
    makeShareText() +
    "\n" +
    buildShareUrl();

  await copyTextForShare(text);

  alert(
    "投稿文をコピーしました。\nFacebook投稿画面で本文欄に貼り付けてください。"
  );

  const url =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(buildShareUrl());

  window.open(url, "_blank", "noopener,noreferrer");
}

function sendLine(){
  const url =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(buildShareUrl()) +
    "&text=" +
    encodeURIComponent(makeShareText());

  location.href = url;
}

function postX(){
  const url =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(makeShareText()) +
    "&url=" +
    encodeURIComponent(buildShareUrl());

  window.open(url, "_blank", "noopener,noreferrer");
}

async function copyShareText(){
  const text =
    makeShareText() +
    "\n" +
    buildShareUrl();

  await copyTextForShare(text);

  alert("登頂記念証の投稿文をコピーしました。");
}

function buildShareUrl(){
  return SHARE_CERTIFICATE_PAGE + "?v=" + encodeURIComponent(SHARE_VERSION);
}

function makeShareText(){
  return "田子山富士 登頂記念証\n" +
    "田子山富士に登頂したご縁を、記念証として残します。\n\n" +
    "#田子山富士 #敷島神社 #志木市";
}

async function copyTextForShare(text){
  try{
    await navigator.clipboard.writeText(text);
  }catch(error){
    const area = document.createElement("textarea");
    area.value = text;
    area.style.position = "fixed";
    area.style.left = "-9999px";
    document.body.appendChild(area);
    area.focus();
    area.select();
    document.execCommand("copy");
    area.remove();
  }
}

function handleImageError(){
  const image = document.getElementById("memorialImage");

  if(!image){
    return;
  }

  if(image.src !== FALLBACK_IMAGE){
    image.src = FALLBACK_IMAGE;
    return;
  }

  if(image.src !== FALLBACK_LOGO){
    image.src = FALLBACK_LOGO;
  }
}

async function tryManyJson(urls){
  let lastError = null;

  for(let i = 0; i < urls.length; i++){
    try{
      const data = await getJson(urls[i]);

      if(data !== null && data !== undefined){
        return data;
      }
    }catch(error){
      lastError = error;
    }
  }

  throw lastError || new Error("通信に失敗しました。");
}

async function getJson(url){
  try{
    const res = await fetch(url, {
      method:"GET",
      cache:"no-store"
    });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    return parseJsonText(text);
  }catch(fetchError){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value = String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const start = value.indexOf("{");
    const end = value.lastIndexOf("}");

    if(start >= 0 && end > start){
      return JSON.parse(value.substring(start, end + 1));
    }

    const arrayStart = value.indexOf("[");
    const arrayEnd = value.lastIndexOf("]");

    if(arrayStart >= 0 && arrayEnd > arrayStart){
      return JSON.parse(value.substring(arrayStart, arrayEnd + 1));
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve, reject){
    const callbackName =
      "tagoyamaCertificateCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script = document.createElement("script");
    const sep = url.indexOf("?") >= 0 ? "&" : "?";

    const timer = setTimeout(function(){
      cleanup();
      reject(new Error("JSONP timeout"));
    }, 12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

function makeImageUrlList(url){
  const urls = [];
  const value = getString(url);
  const driveId = getDriveId(value);

  function add(u){
    u = getString(u);

    if(u && urls.indexOf(u) === -1){
      urls.push(u);
    }
  }

  if(driveId){
    add(
      "https://lh3.googleusercontent.com/d/" +
      encodeURIComponent(driveId) +
      "=w2000"
    );

    add(
      "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(driveId) +
      "&sz=w2000"
    );

    add(
      "https://drive.google.com/uc?export=view&id=" +
      encodeURIComponent(driveId)
    );
  }

  add(value);
  add(FALLBACK_IMAGE);

  return urls;
}

function normalizeImageUrl(url){
  const value = getString(url);

  if(!value){
    return "";
  }

  const driveId = getDriveId(value);

  if(driveId){
    return "https://lh3.googleusercontent.com/d/" +
      encodeURIComponent(driveId) +
      "=w2000";
  }

  return value;
}

function getDriveId(url){
  const value = getString(url);

  if(!value){
    return "";
  }

  let match = value.match(/\/file\/d\/([^/]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = value.match(/[?&]id=([^&]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = value.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

  if(match && match[1]){
    return match[1];
  }

  if(/^[a-zA-Z0-9_-]{20,}$/.test(value)){
    return value;
  }

  return "";
}

function flattenObject(data){
  data = data || {};

  const nested =
    data.data &&
    typeof data.data === "object" &&
    !Array.isArray(data.data)
      ? data.data
      : {};

  return Object.assign({}, data, nested);
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function getFirst(){
  for(let i = 0; i < arguments.length; i++){
    const value = getString(arguments[i]);

    if(value){
      return value;
    }
  }

  return "";
}

function cleanFileName(value){
  return getString(value)
    .replace(/[\\/:*?"<>|]/g, "")
    .replace(/\s+/g, "-") ||
    "certificate";
}

window.postFacebook = postFacebook;
window.sendLine = sendLine;
window.postX = postX;
window.copyShareText = copyShareText;
window.handleImageError = handleImageError;
