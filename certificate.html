<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#050505;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}

body{
  background:
    radial-gradient(circle at 50% 0%,rgba(255,226,122,.26),rgba(0,0,0,0) 38%),
    linear-gradient(180deg,#1c1103 0%,#060606 48%,#000 100%);
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:18px 12px 44px;
}

.header{
  text-align:center;
  margin-bottom:16px;
}

.pageTitle{
  margin:0;
  font-size:clamp(34px,9.4vw,64px);
  font-weight:900;
  color:#ffdf72;
  line-height:1.18;
  text-shadow:
    0 4px 4px rgba(0,0,0,.9),
    0 0 18px rgba(255,210,80,.26);
}

.pageSub{
  margin-top:8px;
  font-size:clamp(18px,5vw,30px);
  font-weight:900;
  color:#fff2bd;
  line-height:1.35;
}

.status{
  margin:14px 0;
  padding:14px 12px;
  border-radius:18px;
  border:1px solid rgba(255,220,120,.42);
  background:rgba(0,0,0,.38);
  color:#fff3c4;
  font-size:clamp(17px,4.6vw,24px);
  line-height:1.55;
  font-weight:900;
  text-align:center;
  white-space:pre-wrap;
}

.status.error{
  border-color:rgba(255,90,70,.70);
  color:#ffd3ca;
}

.certificateOuter{
  margin:18px auto 16px;
  padding:12px;
  border-radius:30px;
  background:
    linear-gradient(135deg,#fff1a4 0%,#b98212 30%,#fff0a0 53%,#81500c 76%,#ffde70 100%);
  box-shadow:
    0 18px 34px rgba(0,0,0,.52),
    0 0 24px rgba(255,210,80,.20);
}

.certificate{
  position:relative;
  width:100%;
  min-height:980px;
  border-radius:22px;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 12%,rgba(255,255,255,.32),rgba(255,255,255,0) 24%),
    linear-gradient(180deg,#f8d889 0%,#f7e6b7 30%,#efe0b2 54%,#c99a45 100%);
  color:#241300;
  border:4px solid rgba(80,42,0,.55);
}

.certificate::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 50% 16%,rgba(255,255,255,.75),rgba(255,255,255,0) 14%),
    linear-gradient(180deg,rgba(70,135,180,.28) 0%,rgba(255,255,255,.12) 22%,rgba(90,48,0,.06) 100%);
  pointer-events:none;
}

.mountLayer{
  position:absolute;
  left:0;
  right:0;
  bottom:160px;
  height:360px;
  background:
    radial-gradient(ellipse at 50% 70%,rgba(55,42,24,.72) 0%,rgba(77,55,26,.64) 32%,rgba(0,0,0,0) 68%),
    linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(74,49,18,.34) 55%,rgba(90,51,11,.55) 100%);
  clip-path:polygon(0 100%,0 72%,18% 63%,32% 47%,48% 18%,61% 42%,75% 60%,100% 72%,100% 100%);
}

.sunMark{
  position:absolute;
  top:54px;
  left:50%;
  transform:translateX(-50%);
  width:148px;
  height:148px;
  border-radius:50%;
  background:
    radial-gradient(circle,#fff7be 0%,#ffdc4b 42%,#d89614 100%);
  border:6px solid rgba(95,45,0,.46);
  box-shadow:
    0 0 26px rgba(255,228,92,.85),
    0 8px 18px rgba(0,0,0,.20);
}

.certInner{
  position:relative;
  z-index:2;
  min-height:980px;
  padding:212px 18px 28px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.certKicker{
  margin:0 0 12px;
  font-size:clamp(22px,5.9vw,40px);
  font-weight:900;
  color:#5b2b00;
  letter-spacing:.12em;
  text-align:center;
  text-shadow:0 1px 0 rgba(255,255,255,.68);
}

.certMainTitle{
  margin:0;
  font-size:clamp(50px,14vw,96px);
  font-weight:900;
  line-height:1.08;
  color:#7a0000;
  text-align:center;
  letter-spacing:.06em;
  text-shadow:
    0 3px 0 rgba(255,239,170,.82),
    0 6px 10px rgba(0,0,0,.22);
}

.certRound{
  margin:28px 0 8px;
  width:92%;
  max-width:560px;
  border-radius:26px;
  padding:22px 12px;
  background:rgba(255,248,211,.78);
  border:4px solid rgba(113,60,0,.52);
  box-shadow:
    0 8px 18px rgba(0,0,0,.16),
    0 0 0 2px rgba(255,255,255,.40) inset;
}

.climbText{
  margin:0;
  font-size:clamp(42px,12vw,82px);
  font-weight:900;
  line-height:1.15;
  color:#421e00;
  text-align:center;
}

.serialBox{
  margin:18px 0 8px;
  width:92%;
  max-width:560px;
  border-radius:24px;
  padding:18px 10px;
  background:rgba(35,17,0,.86);
  border:3px solid rgba(255,224,120,.86);
  box-shadow:
    0 8px 18px rgba(0,0,0,.22),
    0 0 0 1px rgba(255,255,255,.18) inset;
}

.serialLabel{
  margin:0 0 6px;
  font-size:clamp(17px,4.6vw,28px);
  font-weight:900;
  color:#ffdf72;
  text-align:center;
}

.serialNo{
  margin:0;
  font-size:clamp(34px,9.5vw,64px);
  font-weight:900;
  line-height:1.12;
  color:#fff8cf;
  text-align:center;
  letter-spacing:.03em;
}

.certMessage{
  margin:24px 0 0;
  width:92%;
  max-width:560px;
  color:#3b1a00;
  font-size:clamp(20px,5.4vw,33px);
  font-weight:900;
  line-height:1.55;
  text-align:center;
  text-shadow:0 1px 0 rgba(255,255,255,.65);
}

.infoGrid{
  width:92%;
  max-width:560px;
  display:grid;
  gap:10px;
  margin-top:26px;
}

.infoRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  border-radius:18px;
  background:rgba(255,248,220,.64);
  border:2px solid rgba(100,54,0,.22);
}

.infoLabel{
  font-size:clamp(16px,4.4vw,25px);
  font-weight:900;
  color:#6d3600;
  white-space:nowrap;
}

.infoValue{
  font-size:clamp(18px,5vw,30px);
  font-weight:900;
  color:#241300;
  text-align:right;
}

.stamp{
  margin-top:28px;
  width:128px;
  height:128px;
  border-radius:50%;
  border:7px solid rgba(142,0,0,.86);
  color:#8e0000;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:26px;
  line-height:1.18;
  font-weight:900;
  transform:rotate(-8deg);
  background:rgba(255,245,218,.38);
}

.footerText{
  position:absolute;
  left:0;
  right:0;
  bottom:24px;
  text-align:center;
  color:#321700;
  font-size:clamp(16px,4.4vw,26px);
  line-height:1.45;
  font-weight:900;
  text-shadow:0 1px 0 rgba(255,255,255,.62);
  padding:0 14px;
}

.btnArea{
  display:grid;
  gap:12px;
  margin-top:18px;
}

.btn,
.linkBtn{
  width:100%;
  min-height:68px;
  border:none;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:clamp(20px,5.5vw,34px);
  font-weight:900;
  letter-spacing:.02em;
  color:#fff;
  cursor:pointer;
  text-align:center;
  box-shadow:
    0 7px 0 rgba(0,0,0,.32),
    0 13px 22px rgba(0,0,0,.34);
}

.btn:disabled{
  opacity:.55;
}

.goldBtn{
  color:#271400;
  background:linear-gradient(180deg,#fff1a4 0%,#ffd84d 48%,#c89217 100%);
}

.greenBtn{
  background:linear-gradient(180deg,#38e988 0%,#09b957 100%);
}

.blueBtn{
  background:linear-gradient(180deg,#2e83ff 0%,#0b4fc4 100%);
}

.blackBtn{
  background:linear-gradient(180deg,#323232 0%,#050505 100%);
}

.redBtn{
  background:linear-gradient(180deg,#ff654d 0%,#c61f14 100%);
}

.debugBox{
  margin-top:14px;
  padding:12px;
  border-radius:14px;
  background:rgba(0,0,0,.45);
  border:1px solid rgba(255,220,140,.22);
  color:#cfcfcf;
  font-size:13px;
  line-height:1.55;
  word-break:break-all;
  display:none;
}

.hidden{
  display:none !important;
}

canvas{
  display:none;
}

@media (max-width:420px){
  .wrap{
    padding-left:10px;
    padding-right:10px;
  }

  .certificateOuter{
    padding:9px;
    border-radius:24px;
  }

  .certificate{
    min-height:880px;
    border-radius:18px;
  }

  .certInner{
    min-height:880px;
    padding-top:188px;
  }

  .sunMark{
    top:46px;
    width:124px;
    height:124px;
  }

  .mountLayer{
    bottom:142px;
    height:320px;
  }

  .stamp{
    width:112px;
    height:112px;
    font-size:23px;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <header class="header">
    <h1 class="pageTitle">登頂記念証</h1>
    <div class="pageSub">田子山富士 168の縁プロジェクト</div>
  </header>

  <div class="status" id="statusBox">
    登頂記録を読み込んでいます...
  </div>

  <div class="certificateOuter">
    <section class="certificate" id="certificate">
      <div class="sunMark"></div>
      <div class="mountLayer"></div>

      <div class="certInner">
        <p class="certKicker">田子山富士</p>

        <h2 class="certMainTitle" id="mainTitle">
          登頂記念証
        </h2>

        <div class="certRound">
          <p class="climbText" id="climbText">
            読み込み中
          </p>
        </div>

        <div class="serialBox">
          <p class="serialLabel">記念番号</p>
          <p class="serialNo" id="serialText">
            No.取得中
          </p>
        </div>

        <p class="certMessage">
          あなたの田子山富士への登頂を<br>
          ここに記念として証します。
        </p>

        <div class="infoGrid">
          <div class="infoRow">
            <div class="infoLabel">登頂日</div>
            <div class="infoValue" id="dateText">取得中</div>
          </div>

          <div class="infoRow">
            <div class="infoLabel">参加人数</div>
            <div class="infoValue" id="participantText">取得中</div>
          </div>

          <div class="infoRow">
            <div class="infoLabel">画像名</div>
            <div class="infoValue" id="imageNameText">取得中</div>
          </div>
        </div>

        <div class="stamp">
          登頂<br>記念
        </div>

        <div class="footerText">
          田子山富士保存会・地域のご縁をつなぐ記念証
        </div>
      </div>
    </section>
  </div>

  <div class="btnArea">
    <button class="btn greenBtn" id="saveBtn" onclick="saveCertificateImage()">
      画像として保存
    </button>

    <button class="btn blueBtn" onclick="shareCertificate()">
      共有する
    </button>

    <a class="linkBtn goldBtn" id="omikujiBtn" href="omikuji.html">
      開運おみくじへ
    </a>

    <a class="linkBtn blackBtn" id="backBtn" href="index.html">
      トップへ戻る
    </a>
  </div>

  <div class="debugBox" id="debugBox"></div>

  <canvas id="saveCanvas"></canvas>
</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzQHiV6CPqv-szRz9EjwWdTsKGXmC8oPtLM6fQsyU-lF8AWXEsN5PG_14b6awu2Esk1/exec";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

const OMIKUJI_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

let currentData = {
  userId:"",
  climbCount:"",
  serialNo:"",
  lastDate:"",
  imageNo:"",
  imageName:"",
  participantNo:""
};

window.addEventListener("load", init);

async function init(){
  const paramData = readParams();
  const localData = readLocalData();

  currentData = mergeData(paramData, localData);

  if(currentData.userId){
    localStorage.setItem("tagoyamaUserId", currentData.userId);
    localStorage.setItem("tagoyamaFujiUserId", currentData.userId);
  }

  renderCertificate(currentData, "loading");

  try{
    if(currentData.userId){
      const historyData = await loadClimbHistory(currentData.userId);
      currentData = mergeData(historyData, currentData);
    }

    if(!currentData.climbCount || !currentData.serialNo){
      throw new Error("登頂回数または記念番号を取得できません。QRコードから入り直してください。");
    }

    saveLocalData(currentData);
    renderCertificate(currentData, "ok");
    updateLinks();

  }catch(e){
    renderCertificate(currentData, "error", e && e.message ? e.message : "登頂記録を取得できませんでした。");
    updateLinks();
  }
}

function readParams(){
  const p = new URLSearchParams(location.search);

  return cleanData({
    userId:getFirst(
      p.get("userId"),
      p.get("id"),
      p.get("uid")
    ),
    climbCount:getFirst(
      p.get("climbCount"),
      p.get("climbNo"),
      p.get("count")
    ),
    serialNo:getFirst(
      p.get("serialNo"),
      p.get("serial"),
      p.get("certificateNo"),
      p.get("no")
    ),
    lastDate:getFirst(
      p.get("lastDate"),
      p.get("date"),
      p.get("climbDate")
    ),
    imageNo:getFirst(
      p.get("imageNo"),
      p.get("image"),
      p.get("imageNumber")
    ),
    imageName:getFirst(
      p.get("imageName"),
      p.get("title")
    ),
    participantNo:getFirst(
      p.get("participantNo"),
      p.get("participantCount"),
      p.get("participants"),
      p.get("total")
    )
  });
}

function readLocalData(){
  let data = {};

  try{
    const raw = localStorage.getItem("tagoyamaClimbData") || "";
    if(raw){
      data = JSON.parse(raw);
    }
  }catch(e){
    data = {};
  }

  return cleanData({
    userId:getFirst(
      data.userId,
      localStorage.getItem("tagoyamaUserId"),
      localStorage.getItem("tagoyamaFujiUserId")
    ),
    climbCount:getFirst(
      data.climbCount,
      localStorage.getItem("tagoyamaLastClimbCount")
    ),
    serialNo:getFirst(
      data.serialNo,
      localStorage.getItem("tagoyamaLastSerialNo")
    ),
    lastDate:getFirst(
      data.lastDate,
      localStorage.getItem("tagoyamaLastDate")
    ),
    imageNo:getFirst(
      data.imageNo
    ),
    imageName:getFirst(
      data.imageName
    ),
    participantNo:getFirst(
      data.participantNo,
      localStorage.getItem("tagoyamaLastParticipantNo")
    )
  });
}

async function loadClimbHistory(userId){
  const url =
    GAS_URL +
    "?mode=climbHistory" +
    "&userId=" +
    encodeURIComponent(userId) +
    "&t=" +
    Date.now();

  const data = await getJson(url);

  if(!data || data.success === false){
    throw new Error(
      data && data.message
        ? data.message
        : "登頂履歴を取得できませんでした。"
    );
  }

  return cleanData({
    userId:userId,
    climbCount:getFirst(
      data.climbCount,
      data.climbNo,
      data.count,
      data.登頂回数
    ),
    serialNo:getFirst(
      data.serialNo,
      data.serial,
      data.certificateNo,
      data.no,
      data.シリアル番号
    ),
    lastDate:getFirst(
      data.lastDate,
      data.date,
      data.climbDate,
      data.日付
    ),
    imageNo:getFirst(
      data.imageNo,
      data.image,
      data.imageNumber,
      data.画像番号
    ),
    imageName:getFirst(
      data.imageName,
      data.title,
      data.画像名
    ),
    participantNo:getFirst(
      data.participantNo,
      data.participantCount,
      data.participants,
      data.totalParticipants,
      data.total,
      data.参加人数
    )
  });
}

function cleanData(data){
  return {
    userId:getString(data.userId),
    climbCount:getString(data.climbCount),
    serialNo:getString(data.serialNo),
    lastDate:getString(data.lastDate),
    imageNo:getString(data.imageNo),
    imageName:getString(data.imageName),
    participantNo:getString(data.participantNo)
  };
}

function mergeData(primary, secondary){
  primary = primary || {};
  secondary = secondary || {};

  return cleanData({
    userId:getFirst(primary.userId, secondary.userId),
    climbCount:getFirst(primary.climbCount, secondary.climbCount),
    serialNo:getFirst(primary.serialNo, secondary.serialNo),
    lastDate:getFirst(primary.lastDate, secondary.lastDate),
    imageNo:getFirst(primary.imageNo, secondary.imageNo),
    imageName:getFirst(primary.imageName, secondary.imageName),
    participantNo:getFirst(primary.participantNo, secondary.participantNo)
  });
}

function saveLocalData(data){
  const clean = cleanData(data);

  localStorage.setItem("tagoyamaClimbData", JSON.stringify(clean));

  if(clean.userId){
    localStorage.setItem("tagoyamaUserId", clean.userId);
    localStorage.setItem("tagoyamaFujiUserId", clean.userId);
  }

  if(clean.climbCount){
    localStorage.setItem("tagoyamaLastClimbCount", clean.climbCount);
  }

  if(clean.serialNo){
    localStorage.setItem("tagoyamaLastSerialNo", clean.serialNo);
  }

  if(clean.lastDate){
    localStorage.setItem("tagoyamaLastDate", clean.lastDate);
  }

  if(clean.participantNo){
    localStorage.setItem("tagoyamaLastParticipantNo", clean.participantNo);
  }
}

function renderCertificate(data, state, message){
  data = cleanData(data || {});

  const statusBox = document.getElementById("statusBox");
  const climbText = document.getElementById("climbText");
  const serialText = document.getElementById("serialText");
  const dateText = document.getElementById("dateText");
  const participantText = document.getElementById("participantText");
  const imageNameText = document.getElementById("imageNameText");

  const climbCount = data.climbCount;
  const serialNo = data.serialNo;
  const lastDate = formatDate(data.lastDate);
  const participantNo = data.participantNo;
  const imageName = data.imageName || makeImageName(data.imageNo, climbCount);

  if(climbText){
    climbText.innerText =
      climbCount
        ? "第" + climbCount + "回 登頂記念"
        : "登頂回数 取得中";
  }

  if(serialText){
    serialText.innerText =
      serialNo
        ? "No." + serialNo
        : "No.取得中";
  }

  if(dateText){
    dateText.innerText =
      lastDate || "取得中";
  }

  if(participantText){
    participantText.innerText =
      participantNo
        ? participantNo + "人"
        : "取得中";
  }

  if(imageNameText){
    imageNameText.innerText =
      imageName || "登頂記念";
  }

  if(statusBox){
    statusBox.classList.remove("error");

    if(state === "ok"){
      statusBox.innerText =
        "登頂記録を読み込みました。\n" +
        "第" + climbCount + "回 / No." + serialNo +
        (participantNo ? "\n参加人数 " + participantNo + "人" : "");
    }else if(state === "error"){
      statusBox.classList.add("error");
      statusBox.innerText =
        message ||
        "登頂記録を取得できませんでした。QRコードから入り直してください。";
    }else{
      statusBox.innerText =
        "登頂記録を読み込んでいます...";
    }
  }
}

function updateLinks(){
  const omikujiBtn = document.getElementById("omikujiBtn");
  const backBtn = document.getElementById("backBtn");

  const userId = currentData.userId || "";

  if(omikujiBtn){
    omikujiBtn.href =
      userId
        ? OMIKUJI_PAGE + "?userId=" + encodeURIComponent(userId) + "&v=" + Date.now()
        : "omikuji.html?v=" + Date.now();
  }

  if(backBtn){
    backBtn.href =
      userId
        ? "index.html?userId=" + encodeURIComponent(userId) + "&v=" + Date.now()
        : "index.html?v=" + Date.now();
  }
}

function makeImageName(imageNo, climbCount){
  const n = getString(imageNo);

  if(n === "1"){
    return "第一回登頂";
  }

  if(n === "2"){
    return "第二回登頂";
  }

  if(n === "3"){
    return "第三回登頂";
  }

  if(n === "4"){
    return "第四回登頂";
  }

  if(n === "5"){
    return "第五回登頂";
  }

  if(climbCount){
    return "第" + climbCount + "回登頂";
  }

  return "登頂記念";
}

function shareCertificate(){
  const url = buildCurrentUrl();
  const title =
    currentData.climbCount && currentData.serialNo
      ? "田子山富士 第" + currentData.climbCount + "回 登頂記念 No." + currentData.serialNo
      : "田子山富士 登頂記念証";

  const text =
    "田子山富士の登頂記念証を受け取りました。";

  if(navigator.share){
    navigator.share({
      title:title,
      text:text,
      url:url
    }).catch(function(){});
    return;
  }

  copyText(url);
  alert("共有用リンクをコピーしました。");
}

function buildCurrentUrl(){
  const p = new URLSearchParams();

  if(currentData.userId){
    p.set("userId", currentData.userId);
  }

  if(currentData.climbCount){
    p.set("climbCount", currentData.climbCount);
  }

  if(currentData.serialNo){
    p.set("serialNo", currentData.serialNo);
  }

  if(currentData.lastDate){
    p.set("lastDate", currentData.lastDate);
  }

  if(currentData.imageNo){
    p.set("imageNo", currentData.imageNo);
  }

  if(currentData.imageName){
    p.set("imageName", currentData.imageName);
  }

  if(currentData.participantNo){
    p.set("participantNo", currentData.participantNo);
  }

  p.set("v", String(Date.now()));

  return CERTIFICATE_PAGE + "?" + p.toString();
}

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text);
    return;
  }

  const ta = document.createElement("textarea");
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
}

function saveCertificateImage(){
  const btn = document.getElementById("saveBtn");
  const canvas = document.getElementById("saveCanvas");

  if(!canvas){
    alert("画像保存の準備ができませんでした。");
    return;
  }

  if(!currentData.climbCount || !currentData.serialNo){
    alert("登頂記録が取得できていません。QRコードから入り直してください。");
    return;
  }

  btn.disabled = true;
  btn.innerText = "画像を作成中...";

  try{
    drawCertificateCanvas(canvas, currentData);

    const link = document.createElement("a");
    link.download =
      "tagoyama-fuji-" +
      currentData.serialNo.replace(/[^\w\-]/g,"") +
      ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();

  }catch(e){
    alert("画像を保存できませんでした。スクリーンショットで保存してください。");
  }finally{
    btn.disabled = false;
    btn.innerText = "画像として保存";
  }
}

function drawInfo(ctx,label,value,y){
  ctx.fillStyle = "rgba(255,248,220,.70)";
  roundRect(ctx,130,y-48,820,64,18);

  ctx.font = '900 34px "Hiragino Sans","Yu Gothic","Meiryo",sans-serif';
  ctx.fillStyle = "#6d3600";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillText(label,170,y-16);

  ctx.font = '900 38px "Hiragino Sans","Yu Gothic","Meiryo",sans-serif';
  ctx.fillStyle = "#241300";
  ctx.textAlign = "right";
  ctx.fillText(value || "取得中",910,y-16);
}

function drawCenterText(ctx,text,x,y,size,color){
  ctx.font = '900 ' + size + 'px "Hiragino Sans","Yu Gothic","Meiryo",sans-serif';
  ctx.fillStyle = color;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text,x,y);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

async function getJson(url){
  const res = await fetch(url, {
    method:"GET",
    cache:"no-store",
    redirect:"follow"
  });

  const text = await res.text();

  if(!res.ok){
    throw new Error("通信エラーが発生しました。");
  }

  if(!text){
    throw new Error("空の応答です。");
  }

  const trimmed = text.trim();

  if(trimmed.startsWith("{") || trimmed.startsWith("[")){
    return JSON.parse(trimmed);
  }

  const jsonMatch = trimmed.match(/\{[\s\S]*\}/);

  if(jsonMatch){
    return JSON.parse(jsonMatch[0]);
  }

  throw new Error("JSONを読み込めませんでした。");
}

function getFirst(){
  for(let i = 0; i < arguments.length; i++){
    const v = arguments[i];

    if(v !== null && v !== undefined && String(v).trim() !== ""){
      return String(v).trim();
    }
  }

  return "";
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function formatDate(value){
  const s = getString(value);

  if(!s){
    return "";
  }

  if(/^\d{4}\/\d{1,2}\/\d{1,2}/.test(s)){
    return s;
  }

  if(/^\d{4}-\d{1,2}-\d{1,2}/.test(s)){
    return s.replace(/-/g,"/").slice(0,10);
  }

  const d = new Date(s);

  if(!Number.isNaN(d.getTime())){
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return y + "/" + m + "/" + day;
  }

  return s;
}
