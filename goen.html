<style>

html,
body{

<body>
<main class="page">

<section class="card">
  <h1 class="pageTitle">みんなのご縁帳</h1>

  <p class="lead">
    敷島神社・田子山富士へ寄せられた<br>
    皆さまの記帳です。
  </p>

  <div class="statusBox" id="statusBox">
    ご縁帳を読み込んでいます。
  </div>

  <div class="listBox" id="goenList"></div>

  <div class="btnArea">
    <a class="linkBtn goldBtn" id="kichoLink" href="kicho.html">
      参拝記帳へ
    </a>

    <a class="linkBtn greenBtn" id="omikujiLink" href="omikuji.html">
      開運おみくじへ
    </a>

    <a class="linkBtn blackBtn" id="topLink" href="index.html">
      トップへ戻る
    </a>
  </div>
</section>

<footer class="footer">
  田子山富士 168の縁プロジェクト<br>
  みんなのご縁帳
</footer>

</main>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

let currentUserId = "";

document.addEventListener("DOMContentLoaded", function(){
  initPage();
});

async function initPage(){
  currentUserId = getUserIdFromUrl();

  if(currentUserId){
    localStorage.setItem("tagoyamaUserId", currentUserId);
    localStorage.setItem("tagoyamaFujiUserId", currentUserId);
  }else{
    currentUserId =
      localStorage.getItem("tagoyamaUserId") ||
      localStorage.getItem("tagoyamaFujiUserId") ||
      "";
  }

  updateLinks();
  await loadGoen();
}

function getUserIdFromUrl(){
  const params = new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );
}

function updateLinks(){
  const query =
    currentUserId
      ? "?userId=" + encodeURIComponent(currentUserId)
      : "";

  setHref("topLink", "index.html" + query);
  setHref("kichoLink", "kicho.html" + query);
  setHref("omikujiLink", "omikuji.html" + query);
}

function setHref(id, href){
  const el = document.getElementById(id);

  if(el){
    el.href = href;
  }
}

async function loadGoen(){
  const box = document.getElementById("goenList");
  setStatus("ご縁帳を読み込んでいます。");

  if(box){
    box.innerHTML = "";
  }

  try{
    const data = await tryManyJson([
      GAS_URL + "?mode=goen&t=" + Date.now(),
      GAS_URL + "?goen=1&t=" + Date.now(),
      GAS_URL + "?action=goen&t=" + Date.now(),

      GAS_URL + "?mode=listGoen&t=" + Date.now(),
      GAS_URL + "?listGoen=1&t=" + Date.now(),
      GAS_URL + "?action=listGoen&t=" + Date.now(),

      GAS_URL + "?mode=kichoList&t=" + Date.now(),
      GAS_URL + "?kichoList=1&t=" + Date.now(),
      GAS_URL + "?action=kichoList&t=" + Date.now(),

      GAS_URL + "?mode=listKicho&t=" + Date.now(),
      GAS_URL + "?listKicho=1&t=" + Date.now(),
      GAS_URL + "?action=listKicho&t=" + Date.now()
    ]);

    const list = extractGoenList(data);

    renderGoen(list);
  }catch(error){
    console.warn(error);

    const localList = loadLocalGoen();

    if(localList.length){
      renderGoen(localList);
      return;
    }

    renderGoen([]);
  }
}

function renderGoen(list){
  const box = document.getElementById("goenList");

  if(!box){
    return;
  }

  box.innerHTML = "";

  if(!Array.isArray(list) || list.length === 0){
    setStatus("まだ記帳はありません。");
    return;
  }

  setStatus("ご縁帳を表示しました。");

  let count = 0;

  list.forEach(function(raw){
    const item = normalizeGoenItem(raw);

    if(!item.message && !item.name && !item.area && !item.date){
      return;
    }

    count++;

    const div = document.createElement("div");
    div.className = "goenItem";

    const name = document.createElement("p");
    name.className = "goenName";
    name.innerText = item.name || "匿名";

    const meta = document.createElement("p");
    meta.className = "goenMeta";

    const metaParts = [];

    if(item.date){
      metaParts.push(item.date);
    }

    if(item.area){
      metaParts.push(item.area);
    }

    meta.innerText = metaParts.join("　");

    const message = document.createElement("p");
    message.className = "goenMessage";
    message.innerText =
      item.message ||
      "田子山富士へご縁をいただきました。";

    div.appendChild(name);

    if(meta.innerText){
      div.appendChild(meta);
    }

    div.appendChild(message);
    box.appendChild(div);
  });

  if(count === 0){
    setStatus("まだ記帳はありません。");
  }
}

function normalizeGoenItem(raw){
  raw = raw || {};

  if(Array.isArray(raw)){
    const joined = raw.join("");

    if(isHeaderText(joined)){
      return {
        date:"",
        area:"",
        name:"",
        message:""
      };
    }

    return normalizeArrayRow(raw);
  }

  return {
    date: formatDateText(
      getFirst(
        raw.date,
        raw.datetime,
        raw.createdAt,
        raw.created_at,
        raw.time,
        raw["日時"],
        raw["日付"],
        raw["タイムスタンプ"]
      )
    ),

    area: getFirst(
      raw.area,
      raw.from,
      raw.place,
      raw.address,
      raw.region,
      raw["地域"],
      raw["住所"],
      raw["どこから"],
      raw["お住まい"],
      raw["場所"]
    ),

    name: getFirst(
      raw.name,
      raw.visitorName,
      raw.nickname,
      raw.userName,
      raw["名前"],
      raw["お名前"],
      raw["ニックネーム"],
      "匿名"
    ),

    message: getFirst(
      raw.message,
      raw.text,
      raw.body,
      raw.comment,
      raw.content,
      raw.note,
      raw["メッセージ"],
      raw["本文"],
      raw["内容"],
      raw["ひとこと"],
      raw["コメント"],
      raw["記帳"]
    )
  };
}

function normalizeArrayRow(row){
  const cells = row.map(function(value){
    return getString(value);
  });

  const date =
    findDateCell(cells) ||
    getString(cells[0]);

  let message = "";
  let messageIndex = -1;

  cells.forEach(function(cell, index){
    if(!cell){
      return;
    }

    if(isHeaderText(cell)){
      return;
    }

    if(isDateText(cell)){
      return;
    }

    if(isUserIdText(cell)){
      return;
    }

    if(cell.length > message.length){
      message = cell;
      messageIndex = index;
    }
  });

  let name = "";
  let area = "";

  cells.forEach(function(cell, index){
    if(!cell){
      return;
    }

    if(index === messageIndex){
      return;
    }

    if(isHeaderText(cell) || isDateText(cell) || isUserIdText(cell)){
      return;
    }

    if(!area && isAreaLike(cell)){
      area = cell;
      return;
    }

    if(!name){
      name = cell;
    }
  });

  if(!name){
    name = "匿名";
  }

  return {
    date: formatDateText(date),
    area: area,
    name: name,
    message: message
  };
}

function extractGoenList(data){
  if(!data){
    return [];
  }

  if(Array.isArray(data)){
    return cleanList(data);
  }

  const directKeys = [
    "goen",
    "goenList",
    "kicho",
    "kichoList",
    "list",
    "rows",
    "items",
    "values",
    "records",
    "data"
  ];

  for(let i = 0; i < directKeys.length; i++){
    const key = directKeys[i];

    if(Array.isArray(data[key])){
      return cleanList(data[key]);
    }
  }

  if(data.data && typeof data.data === "object"){
    for(let i = 0; i < directKeys.length; i++){
      const key = directKeys[i];

      if(Array.isArray(data.data[key])){
        return cleanList(data.data[key]);
      }
    }
  }

  const values = Object.values(data).filter(function(value){
    if(!value || typeof value !== "object"){
      return false;
    }

    return Boolean(
      value.message ||
      value.text ||
      value.body ||
      value.comment ||
      value.content ||
      value["メッセージ"] ||
      value["本文"] ||
      value["内容"] ||
      value["コメント"]
    );
  });

  return cleanList(values);
}

function cleanList(list){
  if(!Array.isArray(list)){
    return [];
  }

  return list.filter(function(row){
    if(!row){
      return false;
    }

    if(Array.isArray(row)){
      const joined = row.join("");
      return !isHeaderText(joined);
    }

    if(typeof row === "object"){
      const joined = Object.values(row).join("");
      return !isHeaderText(joined);
    }

    return false;
  }).reverse();
}

function loadLocalGoen(){
  const keys = [
    "tagoyamaGoenList",
    "tagoyamaKichoList",
    "tagoyamaLastGoen",
    "tagoyamaLastKicho"
  ];

  for(let i = 0; i < keys.length; i++){
    try{
      const text = localStorage.getItem(keys[i]);

      if(!text){
        continue;
      }

      const data = JSON.parse(text);

      if(Array.isArray(data)){
        return data;
      }

      if(data && typeof data === "object"){
        return [data];
      }
    }catch(error){}
  }

  return [];
}

async function tryManyJson(urls){
  let lastError = null;

  for(let i = 0; i < urls.length; i++){
    try{
      const data = await getJson(urls[i]);

      if(data !== null && data !== undefined){
        return data;
      }
    }catch(error){
      lastError = error;
    }
  }

  throw lastError || new Error("通信に失敗しました。");
}

async function getJson(url){
  try{
    const res = await fetch(url, {
      method:"GET",
      cache:"no-store"
    });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    return parseJsonText(text);
  }catch(fetchError){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value = String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const objectStart = value.indexOf("{");
    const objectEnd = value.lastIndexOf("}");

    if(objectStart >= 0 && objectEnd > objectStart){
      return JSON.parse(value.substring(objectStart, objectEnd + 1));
    }

    const arrayStart = value.indexOf("[");
    const arrayEnd = value.lastIndexOf("]");

    if(arrayStart >= 0 && arrayEnd > arrayStart){
      return JSON.parse(value.substring(arrayStart, arrayEnd + 1));
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve, reject){
    const callbackName =
      "tagoyamaGoenCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script = document.createElement("script");
    const sep = url.indexOf("?") >= 0 ? "&" : "?";

    const timer = setTimeout(function(){
      cleanup();
      reject(new Error("JSONP timeout"));
    }, 12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

function setStatus(text){
  const el = document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }
}

function isHeaderText(text){
  const value = getString(text);

  return (
    value.indexOf("日時") >= 0 ||
    value.indexOf("日付") >= 0 ||
    value.indexOf("名前") >= 0 ||
    value.indexOf("メッセージ") >= 0 ||
    value.indexOf("本文") >= 0 ||
    value.indexOf("内容") >= 0
  );
}

function isDateText(text){
  const value = getString(text);

  return (
    /^[0-9]{4}[\/\-.][0-9]{1,2}[\/\-.][0-9]{1,2}/.test(value) ||
    /^[0-9]{1,2}[\/\-.][0-9]{1,2}/.test(value) ||
    value.indexOf("GMT") >= 0 ||
    value.indexOf("JST") >= 0
  );
}

function findDateCell(cells){
  for(let i = 0; i < cells.length; i++){
    if(isDateText(cells[i])){
      return cells[i];
    }
  }

  return "";
}

function isUserIdText(text){
  const value = getString(text);

  return (
    value.indexOf("tagoyama") >= 0 ||
    value.indexOf("user") >= 0 ||
    value.indexOf("uid") >= 0 ||
    value.length > 28
  );
}

function isAreaLike(text){
  const value = getString(text);

  return (
    value.indexOf("市") >= 0 ||
    value.indexOf("区") >= 0 ||
    value.indexOf("町") >= 0 ||
    value.indexOf("村") >= 0 ||
    value.indexOf("県") >= 0 ||
    value.indexOf("東京") >= 0 ||
    value.indexOf("埼玉") >= 0
  );
}

function formatDateText(value){
  const text = getString(value);

  if(!text){
    return "";
  }

  return text
    .replace(/-/g, "/")
    .replace(/\./g, "/")
    .replace(/\s.*$/, "");
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function getFirst(){
  for(let i = 0; i < arguments.length; i++){
    const value = getString(arguments[i]);

    if(value){
      return value;
    }
  }

  return "";
}
</script>
