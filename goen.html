  <style>
    * {
      box-sizing: border-box;

    html,
    body {
      margin: 0;

      width: 100%;

      background:

    .goenTitle {
      margin: 0 0 8px;
      color: #ffdf72;
      font-size: clamp(24px, 6.8vw, 42px);

    .goenDate {

    .goenBody {

    .btnArea {

    .linkBtn {
      width: 100%;

    .goldBtn {

<body>
  <main class="page">

    <header class="hero">
      <div class="logoBox">
        <img
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
          alt="田子山富士"
          onerror="this.style.display='none'"
        >
      </div>

      <h1 class="siteTitle">ご縁帳</h1>
      <p class="siteSub">田子山富士 168の縁プロジェクト</p>
    </header>

    <section class="card">
      <h2 class="cardTitle">みんなのご縁帳</h2>

      <p class="lead">
        敷島神社・田子山富士へ寄せられた<br>
        皆さまの記帳です。
      </p>

      <div class="statusBox" id="statusBox">
        ご縁帳を読み込んでいます。
      </div>

      <div class="goenList" id="goenList"></div>

      <div class="btnArea">
        <a class="linkBtn goldBtn" id="topLink" href="index.html">
          トップへ戻る
        </a>

        <a class="linkBtn blueBtn" id="certificateLink" href="certificate.html">
          登頂記念証へ
        </a>

        <a class="linkBtn greenBtn" id="omikujiLink" href="omikuji.html">
          開運おみくじへ
        </a>
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      ご縁帳
    </footer>
  </main>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

    const HOME_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

    const CERTIFICATE_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

    const OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

    let currentUserId = "";

    document.addEventListener("DOMContentLoaded", function() {
      initGoenPage();
    });

    async function initGoenPage() {
      currentUserId = getUserId();

      if (currentUserId) {
        localStorage.setItem("tagoyamaUserId", currentUserId);
        localStorage.setItem("tagoyamaFujiUserId", currentUserId);
      }

      setLinks();
      await loadGoen();
    }

    function getUserId() {
      const params = new URLSearchParams(window.location.search);

      return getString(
        params.get("userId") ||
        params.get("userid") ||
        params.get("uid") ||
        params.get("id") ||
        localStorage.getItem("tagoyamaUserId") ||
        localStorage.getItem("tagoyamaFujiUserId") ||
        ""
      );
    }

    function setLinks() {
      const topLink = document.getElementById("topLink");
      const certificateLink = document.getElementById("certificateLink");
      const omikujiLink = document.getElementById("omikujiLink");

      if (topLink) {
        topLink.href =
          currentUserId
            ? HOME_PAGE + "?userId=" + encodeURIComponent(currentUserId)
            : HOME_PAGE;
      }

      if (certificateLink) {
        certificateLink.href =
          currentUserId
            ? CERTIFICATE_PAGE + "?userId=" + encodeURIComponent(currentUserId)
            : CERTIFICATE_PAGE;
      }

      if (omikujiLink) {
        omikujiLink.href =
          currentUserId
            ? OMIKUJI_PAGE + "?userId=" + encodeURIComponent(currentUserId)
            : OMIKUJI_PAGE;
      }
    }

    async function loadGoen() {
      const statusBox = document.getElementById("statusBox");
      const goenList = document.getElementById("goenList");

      if (statusBox) {
        statusBox.innerText = "ご縁帳を読み込んでいます。";
      }

      if (goenList) {
        goenList.innerHTML = "";
      }

      try {
        const data = await tryManyJson([
          GAS_URL + "?goen=1&t=" + Date.now(),
          GAS_URL + "?mode=goen&t=" + Date.now(),
          GAS_URL + "?action=goen&t=" + Date.now(),
          GAS_URL + "?type=goen&t=" + Date.now()
        ]);

        const list = extractList(data);

        if (!list || !list.length) {
          renderEmptyGoen();
          return;
        }

        renderGoenList(list);

        if (statusBox) {
          statusBox.innerText = "ご縁帳を表示しました。";
        }
      } catch (error) {
        console.error(error);
        renderErrorGoen();
      }
    }

    function renderGoenList(list) {
      const goenList = document.getElementById("goenList");

      if (!goenList) {
        return;
      }

      goenList.innerHTML = "";

      let count = 0;

      list.forEach(function(item) {
        const goen = normalizeGoenItem(item);

        if (!goen.title && !goen.message && !goen.name) {
          return;
        }

        count++;

        const card = document.createElement("article");
        card.className = "goenItem";

        const title = document.createElement("h2");
        title.className = "goenTitle";
        title.innerText = goen.title || "ご縁";
        card.appendChild(title);

        const date = document.createElement("p");
        date.className = "goenDate";
        date.innerText =
          (goen.date ? goen.date : "") +
          (goen.area ? "　" + goen.area : "") +
          (goen.name ? "　" + goen.name : "");
        card.appendChild(date);

        const body = document.createElement("p");
        body.className = "goenBody";
        body.innerText =
          goen.message ||
          "田子山富士へご縁をいただきました。";
        card.appendChild(body);

        goenList.appendChild(card);
      });

      if (!count) {
        renderEmptyGoen();
      }
    }

    function renderEmptyGoen() {
      const statusBox = document.getElementById("statusBox");
      const goenList = document.getElementById("goenList");

      if (statusBox) {
        statusBox.innerText = "現在表示できるご縁帳はありません。";
      }

      if (goenList) {
        goenList.innerHTML =
          '<article class="goenItem">' +
          '<h2 class="goenTitle">ご縁帳</h2>' +
          '<p class="goenBody">現在表示できるご縁帳はありません。</p>' +
          '</article>';
      }
    }

    function renderErrorGoen() {
      const statusBox = document.getElementById("statusBox");
      const goenList = document.getElementById("goenList");

      if (statusBox) {
        statusBox.innerText = "ご縁帳を読み込めませんでした。";
      }

      if (goenList) {
        goenList.innerHTML =
          '<article class="goenItem">' +
          '<h2 class="goenTitle">読み込みエラー</h2>' +
          '<p class="goenBody">通信状況を確認して、もう一度お試しください。</p>' +
          '</article>';
      }
    }

    function normalizeGoenItem(item) {
      item = item || {};

      const area =
        getFirst(
          item.area,
          item.from,
          item.place,
          item.地域,
          item.住所,
          item.どこから
        );

      const name =
        getFirst(
          item.name,
          item.visitorName,
          item.nickname,
          item.名前,
          item.お名前,
          "匿名"
        );

      const message =
        getFirst(
          item.message,
          item.text,
          item.body,
          item.comment,
          item.メッセージ,
          item.本文,
          item.内容
        );

      const date =
        formatDateText(
          getFirst(
            item.date,
            item.createdAt,
            item.time,
            item.日時,
            item.日付
          )
        );

      const title =
        getFirst(
          item.title,
          item.タイトル,
          area,
          "ご縁"
        );

      return {
        title: title,
        area: area,
        name: name,
        message: message,
        date: date
      };
    }

    async function tryManyJson(urls) {
      let lastError = null;

      for (let i = 0; i < urls.length; i++) {
        try {
          const data = await getJson(urls[i]);

          if (data !== null && data !== undefined) {
            return data;
          }
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("通信に失敗しました。");
    }

    async function getJson(url) {
      try {
        const res = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const text = await res.text();
        return parseJsonText(text);
      } catch (fetchError) {
        return await getJsonp(url);
      }
    }

    function parseJsonText(text) {
      const value = String(text || "").trim();

      if (!value) {
        throw new Error("empty response");
      }

      try {
        return JSON.parse(value);
      } catch (error) {
        const start = value.indexOf("{");
        const end = value.lastIndexOf("}");

        if (start >= 0 && end > start) {
          return JSON.parse(value.substring(start, end + 1));
        }

        throw error;
      }
    }

    function getJsonp(url) {
      return new Promise(function(resolve, reject) {
        const callbackName =
          "tagoyamaGoenCallback_" +
          Date.now() +
          "_" +
          Math.floor(Math.random() * 1000000);

        const script = document.createElement("script");
        const sep = url.indexOf("?") >= 0 ? "&" : "?";

        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 12000);

        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("JSONP error"));
        };

        script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
        document.body.appendChild(script);

        function cleanup() {
          clearTimeout(timer);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      });
    }

    function extractList(data) {
      if (!data) {
        return [];
      }

      if (Array.isArray(data)) {
        return data;
      }

      if (Array.isArray(data.list)) {
        return data.list;
      }

      if (Array.isArray(data.rows)) {
        return data.rows;
      }

      if (Array.isArray(data.items)) {
        return data.items;
      }

      if (Array.isArray(data.data)) {
        return data.data;
      }

      if (data.data && Array.isArray(data.data.list)) {
        return data.data.list;
      }

      if (data.data && Array.isArray(data.data.rows)) {
        return data.data.rows;
      }

      if (data.data && Array.isArray(data.data.items)) {
        return data.data.items;
      }

      return [];
    }

    function formatDateText(value) {
      const text = getString(value);

      if (!text) {
        return "";
      }

      return text
        .replace(/-/g, "/")
        .replace(/\./g, "/")
        .replace(/\s.*$/, "");
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }

    function getFirst() {
      for (let i = 0; i < arguments.length; i++) {
        const value = getString(arguments[i]);

        if (value) {
          return value;
        }
      }

      return "";
    }
  </script>
</body>
