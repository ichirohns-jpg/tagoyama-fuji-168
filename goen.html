<body>
<main class="page">

<header class="hero">
  <div class="logoFrame">
    <img
      src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
      alt="田子山富士"
      onerror="this.style.display='none'"
    >
  </div>

  <h1 class="mainTitle">ご縁帳</h1>
  <p class="mainSubTitle">田子山富士 168の縁プロジェクト</p>
</header>

<section class="card">
  <h2 class="cardTitle">みなさんのご縁</h2>

  <p class="cardText">
    田子山富士に参拝された方の<br>
    ご縁の記録です。
  </p>

  <div class="statusBox" id="statusBox">
    ご縁帳を読み込んでいます。
  </div>

  <div class="goenList" id="goenList"></div>

  <div class="btnArea">
    <a class="linkBtn goldBtn" id="kichoLink" href="kicho.html">
      参拝記帳へ
    </a>

    <a class="linkBtn blackBtn" id="topLink" href="index.html">
      トップへ戻る
    </a>
  </div>
</section>

<footer class="footer">
  田子山富士 168の縁プロジェクト<br>
  ご縁帳
</footer>

</main>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbxJh9lYhtQsTYASTa8jGvDDktcm9DeuMQcDn6B66q63FTReIFjBJuQikbY_Tt2iZ18/exec";

let currentUserId = "";

window.addEventListener("load", initGoen);

async function initGoen(){
  currentUserId = getUserId();
  updateLinks();
  await loadGoen();
}

function getUserId(){
  const params = new URLSearchParams(location.search);

  const value =
    getString(params.get("userId")) ||
    getString(params.get("userid")) ||
    getString(params.get("uid")) ||
    getString(localStorage.getItem("tagoyamaUserId")) ||
    getString(localStorage.getItem("tagoyamaFujiUserId"));

  if(value){
    localStorage.setItem("tagoyamaUserId", value);
    localStorage.setItem("tagoyamaFujiUserId", value);
  }

  return value;
}

function updateLinks(){
  const query =
    currentUserId
      ? "?userId=" + encodeURIComponent(currentUserId)
      : "";

  const topLink =
    document.getElementById("topLink");

  const kichoLink =
    document.getElementById("kichoLink");

  if(topLink){
    topLink.href =
      "index.html" + query;
  }

  if(kichoLink){
    kichoLink.href =
      "kicho.html" + query;
  }
}

async function loadGoen(){
  setStatus("ご縁帳を読み込んでいます。");

  try{
    const data =
      await tryManyJson([
        GAS_URL + "?mode=goen&t=" + Date.now(),
        GAS_URL + "?mode=listGoen&t=" + Date.now(),
        GAS_URL + "?goen=1&t=" + Date.now(),
        GAS_URL + "?listGoen=1&t=" + Date.now()
      ]);

    const list =
      extractGoenList(data);

    renderGoen(list);
  }catch(error){
    console.warn(error);
    setStatus("現在表示できるご縁帳はありません。");
  }
}

function renderGoen(list){
  const box =
    document.getElementById("goenList");

  if(!box){
    return;
  }

  box.innerHTML = "";

  if(!Array.isArray(list) || list.length === 0){
    setStatus("現在表示できるご縁帳はありません。");
    return;
  }

  let count = 0;

  list.forEach(function(row){
    const item =
      normalizeGoenItem(row);

    if(!item.area && !item.name && !item.message){
      return;
    }

    count++;

    const article =
      document.createElement("article");

    article.className =
      "goenItem";

    const meta =
      document.createElement("p");

    meta.className =
      "goenMeta";

    meta.innerText =
      makeMetaText(item);

    article.appendChild(meta);

    const name =
      document.createElement("h2");

    name.className =
      "goenName";

    name.innerText =
      item.name || "匿名";

    article.appendChild(name);

    const message =
      document.createElement("p");

    message.className =
      "goenMessage";

    message.innerText =
      item.message || "";

    article.appendChild(message);

    box.appendChild(article);
  });

  if(count === 0){
    setStatus("現在表示できるご縁帳はありません。");
  }else{
    setStatus("ご縁帳を表示しました。");
  }
}

function normalizeGoenItem(row){
  if(Array.isArray(row)){
    return {
      date:formatDateText(row[0]),
      area:getString(row[1]),
      name:getString(row[2]) || "匿名",
      message:getString(row[3])
    };
  }

  row = row || {};

  return {
    date:formatDateText(
      row.date ||
      row.datetime ||
      row.timestamp ||
      row.createdAt ||
      row["日付"] ||
      row["日時"] ||
      ""
    ),

    area:getString(
      row.area ||
      row.place ||
      row.from ||
      row["地域"] ||
      row["場所"] ||
      row["どこから来ましたか"] ||
      ""
    ),

    name:getString(
      row.name ||
      row.nickname ||
      row["名前"] ||
      row["お名前"] ||
      row["ニックネーム"] ||
      "匿名"
    ),

    message:getString(
      row.message ||
      row.body ||
      row.text ||
      row.content ||
      row["メッセージ"] ||
      row["本文"] ||
      row["内容"] ||
      ""
    )
  };
}

function makeMetaText(item){
  const parts = [];

  if(item.date){
    parts.push(item.date);
  }

  if(item.area){
    parts.push(item.area);
  }

  return parts.length
    ? parts.join("　")
    : "田子山富士";
}

function extractGoenList(data){
  if(!data){
    return [];
  }

  let list = [];

  if(Array.isArray(data)){
    list = data;
  }else if(Array.isArray(data.goen)){
    list = data.goen;
  }else if(Array.isArray(data.rows)){
    list = data.rows;
  }else if(Array.isArray(data.list)){
    list = data.list;
  }else if(Array.isArray(data.items)){
    list = data.items;
  }else if(Array.isArray(data.data)){
    list = data.data;
  }else if(data.data && Array.isArray(data.data.goen)){
    list = data.data.goen;
  }else if(data.data && Array.isArray(data.data.list)){
    list = data.data.list;
  }

  return removeHeaderRows(list);
}

function removeHeaderRows(list){
  return list.filter(function(row){
    if(!row){
      return false;
    }

    if(Array.isArray(row)){
      const joined =
        row.join("");

      if(
        joined.indexOf("日付") >= 0 ||
        joined.indexOf("日時") >= 0 ||
        joined.indexOf("地域") >= 0 ||
        joined.indexOf("メッセージ") >= 0 ||
        joined.indexOf("本文") >= 0
      ){
        return false;
      }
    }

    return true;
  });
}

async function tryManyJson(urls){
  let lastError = null;

  for(let i = 0; i < urls.length; i++){
    try{
      const data =
        await getJson(urls[i]);

      if(data !== null && data !== undefined){
        return data;
      }
    }catch(error){
      lastError = error;
    }
  }

  throw lastError || new Error("通信に失敗しました。");
}

async function getJson(url){
  try{
    const res =
      await fetch(url,{
        method:"GET",
        cache:"no-store"
      });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text =
      await res.text();

    return parseJsonText(text);
  }catch(error){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value =
    String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const objectStart =
      value.indexOf("{");

    const objectEnd =
      value.lastIndexOf("}");

    if(objectStart >= 0 && objectEnd > objectStart){
      return JSON.parse(
        value.substring(objectStart,objectEnd + 1)
      );
    }

    const arrayStart =
      value.indexOf("[");

    const arrayEnd =
      value.lastIndexOf("]");

    if(arrayStart >= 0 && arrayEnd > arrayStart){
      return JSON.parse(
        value.substring(arrayStart,arrayEnd + 1)
      );
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve,reject){
    const callbackName =
      "tagoyamaGoenCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script =
      document.createElement("script");

    const sep =
      url.indexOf("?") >= 0
        ? "&"
        : "?";

    const timer =
      setTimeout(function(){
        cleanup();
        reject(new Error("JSONP timeout"));
      },12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src =
      url +
      sep +
      "callback=" +
      encodeURIComponent(callbackName);

    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

function setStatus(text){
  const el =
    document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }
}

function formatDateText(value){
  const text =
    getString(value);

  if(!text){
    return "";
  }

  return text
    .replace(/-/g,"/")
    .replace(/\./g,"/")
    .replace(/\s.*$/,"");
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
</script>
