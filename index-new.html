<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbyYV3BJS_nNM6oIYejg7SUsWm0LiMhJ4g4IEHxUxw6NkMgTC5Byh3Exyr_-NHk2Jo4hFg/exec";

document.addEventListener(
  "DOMContentLoaded",
  loadStats
);

async function loadStats(){

  const count =
    document.getElementById(
      "count"
    );

  try{

    const response =
      await fetch(
        GAS_URL +
        "?mode=stats&ts=" +
        Date.now(),
        {
          method:"GET",
          cache:"no-store"
        }
      );

    if(!response.ok){

      throw new Error(
        "通信に失敗しました"
      );
    }

    const data =
      await response.json();

    const participants =
      getParticipants(
        data
      );

    count.innerText =
      String(
        participants
      ) +
      "人";

  }catch(error){

    console.error(error);

    count.innerText =
      "－";
  }
}

function getParticipants(data){

  if(
    data === null ||
    data === undefined
  ){

    return 0;
  }

  if(
    typeof data === "number"
  ){

    return data;
  }

  if(
    typeof data === "string"
  ){

    const number =
      Number(
        data
      );

    return Number.isFinite(
      number
    )
      ? number
      : 0;
  }

  const value =
    data.participants ??
    data.participantCount ??
    data.count ??
    data.total ??
    data.number ??
    data.value ??
    0;

  const number =
    Number(
      value
    );

  return Number.isFinite(
    number
  )
    ? number
    : 0;
}
</script>
