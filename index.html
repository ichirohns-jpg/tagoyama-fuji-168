<body>
<main class="page">

<header class="hero">
  <div class="logoFrame">
    <img
      src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
      alt="田子山富士"
      onerror="this.style.display='none'"
    >
  </div>

  <h1 class="mainTitle">田子山富士<br>168の縁</h1>
  <p class="mainSubTitle">登頂のご縁を、記念に残します。</p>
</header>

<section class="card">
  <h2 class="cardTitle">登頂受付</h2>

  <p class="cardText">
    田子山富士に登頂された方へ。<br>
    登頂記念証をお受け取りください。
  </p>

  <div class="statusBox" id="statusBox">
    登頂情報を確認しています。
  </div>

  <div class="countBox">
    <p class="countLabel">現在の参加人数</p>
    <p class="countNumber" id="participantCount">--</p>
  </div>

  <div class="btnArea">
    <button class="btn goldBtn" id="certificateBtn" type="button" onclick="openCertificate()">
      登頂記念証を受け取る
    </button>
  </div>

  <p class="note">
    QRコードから入った方は、自動で登頂記録を確認します。
  </p>
</section>

<section class="card">
  <h2 class="cardTitle">メニュー</h2>

  <div class="btnArea">
    <a class="linkBtn redBtn" id="omikujiLink" href="omikuji.html">
      開運おみくじ
    </a>

    <a class="linkBtn blueBtn" id="newsLink" href="news.html">
      お知らせ
    </a>

    <a class="linkBtn greenBtn" id="kichoLink" href="kicho.html">
      参拝記帳
    </a>

    <a class="linkBtn brownBtn" id="goenLink" href="goen.html">
      ご縁帳
    </a>
  </div>
</section>

<footer class="footer">
  田子山富士 168の縁プロジェクト<br>
  敷島神社・田子山富士
</footer>

</main>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbxJh9lYhtQsTYASTa8jGvDDktcm9DeuMQcDn6B66q63FTReIFjBJuQikbY_Tt2iZ18/exec";

let currentUserId = "";
let climbData = null;

window.addEventListener("load", initPage);

async function initPage(){
  currentUserId = getUserIdFromUrl();

  if(currentUserId){
    localStorage.setItem("tagoyamaUserId", currentUserId);
    localStorage.setItem("tagoyamaFujiUserId", currentUserId);
  }else{
    currentUserId =
      getString(localStorage.getItem("tagoyamaUserId")) ||
      getString(localStorage.getItem("tagoyamaFujiUserId"));
  }

  updateLinks();
  await loadStats();

  if(currentUserId){
    await saveClimbByUserId(currentUserId);
  }else{
    setStatus("メニューから各ページへお進みください。");
  }
}

function getUserIdFromUrl(){
  const params = new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );
}

function updateLinks(){
  const query =
    currentUserId
      ? "?userId=" + encodeURIComponent(currentUserId)
      : "";

  setHref("omikujiLink","omikuji.html" + query);
  setHref("newsLink","news.html" + query);
  setHref("kichoLink","kicho.html" + query);
  setHref("goenLink","goen.html" + query);
}

function setHref(id,url){
  const el = document.getElementById(id);

  if(el){
    el.href = url;
  }
}

async function loadStats(){
  try{
    const data = await getJson(
      GAS_URL + "?mode=stats&t=" + Date.now()
    );

    const count =
      getFirst(
        data.participantNo,
        data.participantCount,
        data.participants,
        data.totalParticipants,
        data.total,
        data.count
      );

    setParticipantCount(count || "--");
  }catch(error){
    console.warn(error);
    setParticipantCount("--");
  }
}

async function saveClimbByUserId(userId){
  setStatus("登頂記録を確認しています。");

  try{
    const data = await getJson(
      GAS_URL +
      "?mode=saveClimb" +
      "&userId=" +
      encodeURIComponent(userId) +
      "&t=" +
      Date.now()
    );

    if(!data || data.success === false){
      throw new Error(
        data && data.message
          ? data.message
          : "登頂記録を確認できませんでした。"
      );
    }

    climbData = normalizeClimbData(data,userId);
    saveClimbDataToLocal(climbData);
    updateLinks();

    const count =
      getFirst(
        climbData.participantNo,
        climbData.participantCount,
        climbData.participants,
        climbData.totalParticipants
      );

    if(count){
      setParticipantCount(count);
    }

    if(climbData.alreadyClimbedToday){
      setStatus("本日の登頂記録を確認しました。記念証をお受け取りください。");
    }else{
      setStatus("登頂記録を受け付けました。記念証をお受け取りください。");
    }

  }catch(error){
    console.warn(error);
    setStatus("登頂記録を確認できませんでした。時間をおいて再度お試しください。");
  }
}

function normalizeClimbData(data,userId){
  data = data || {};

  return {
    userId:
      getString(data.userId) ||
      getString(userId),

    climbCount:
      getFirst(
        data.climbCount,
        data.climbNo,
        data.count,
        data["登頂回数"]
      ),

    serialNo:
      getFirst(
        data.serialNo,
        data.serial,
        data.no,
        data["シリアル番号"]
      ),

    lastDate:
      getFirst(
        data.lastDate,
        data.date,
        data.climbDate,
        data["日付"]
      ),

    imageNo:
      getFirst(
        data.imageNo,
        data.imageNumber,
        data["画像番号"]
      ),

    imageName:
      getFirst(
        data.imageName,
        data.title,
        data["画像名"]
      ),

    imageUrl:
      getFirst(
        data.imageUrl,
        data.image,
        data.img,
        data.url,
        data["画像URL"]
      ),

    participantNo:
      getFirst(
        data.participantNo,
        data.participantCount,
        data.participants,
        data.totalParticipants,
        data.total,
        data.count
      ),

    participantCount:
      getFirst(
        data.participantCount,
        data.participantNo,
        data.participants,
        data.totalParticipants
      ),

    participants:
      getFirst(
        data.participants,
        data.participantNo,
        data.participantCount
      ),

    totalParticipants:
      getFirst(
        data.totalParticipants,
        data.participantNo,
        data.participantCount
      ),

    alreadyClimbedToday:
      !!data.alreadyClimbedToday
  };
}

function saveClimbDataToLocal(data){
  try{
    localStorage.setItem("tagoyamaClimbData", JSON.stringify(data));

    if(data.userId){
      localStorage.setItem("tagoyamaUserId", data.userId);
      localStorage.setItem("tagoyamaFujiUserId", data.userId);
    }

    if(data.climbCount){
      localStorage.setItem("tagoyamaLastClimbCount", data.climbCount);
    }

    if(data.serialNo){
      localStorage.setItem("tagoyamaLastSerialNo", data.serialNo);
    }

    if(data.lastDate){
      localStorage.setItem("tagoyamaLastDate", data.lastDate);
    }

    if(data.imageUrl){
      localStorage.setItem("tagoyamaLastImageUrl", data.imageUrl);
    }
  }catch(error){
    console.warn(error);
  }
}

function openCertificate(){
  const data =
    climbData ||
    getSavedClimbData();

  const params = new URLSearchParams();

  if(currentUserId){
    params.set("userId", currentUserId);
  }

  if(data){
    if(data.userId){
      params.set("userId", data.userId);
    }

    if(data.climbCount){
      params.set("climbCount", data.climbCount);
    }

    if(data.serialNo){
      params.set("serialNo", data.serialNo);
    }

    if(data.lastDate){
      params.set("lastDate", data.lastDate);
    }

    if(data.imageNo){
      params.set("imageNo", data.imageNo);
    }

    if(data.imageName){
      params.set("imageName", data.imageName);
    }

    if(data.imageUrl){
      params.set("imageUrl", data.imageUrl);
    }
  }

  params.set("v","20260704newgas");

  location.href =
    "certificate.html?" +
    params.toString();
}

function getSavedClimbData(){
  try{
    const text = localStorage.getItem("tagoyamaClimbData");

    if(!text){
      return null;
    }

    const data = JSON.parse(text);

    if(!data || typeof data !== "object"){
      return null;
    }

    return data;
  }catch(error){
    return null;
  }
}

async function getJson(url){
  try{
    const res = await fetch(url,{
      method:"GET",
      cache:"no-store"
    });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    return parseJsonText(text);
  }catch(error){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value = String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const objectStart = value.indexOf("{");
    const objectEnd = value.lastIndexOf("}");

    if(objectStart >= 0 && objectEnd > objectStart){
      return JSON.parse(value.substring(objectStart, objectEnd + 1));
    }

    const arrayStart = value.indexOf("[");
    const arrayEnd = value.lastIndexOf("]");

    if(arrayStart >= 0 && arrayEnd > arrayStart){
      return JSON.parse(value.substring(arrayStart, arrayEnd + 1));
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve,reject){
    const callbackName =
      "tagoyamaTopCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script = document.createElement("script");
    const sep = url.indexOf("?") >= 0 ? "&" : "?";

    const timer = setTimeout(function(){
      cleanup();
      reject(new Error("JSONP timeout"));
    },12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

function setStatus(text){
  const el = document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }
}

function setParticipantCount(value){
  const el = document.getElementById("participantCount");

  if(el){
    el.innerText = getString(value) || "--";
  }
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function getFirst(){
  for(let i = 0; i < arguments.length; i++){
    const value = getString(arguments[i]);

    if(value){
      return value;
    }
  }

  return "";
}

window.openCertificate = openCertificate;
</script>
</body>
</html>
