<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbxJh9lYhtQsTYASTa8jGvDDktcm9DeuMQcDn6B66q63FTReIFjBJuQikbY_Tt2iZ18/exec";

const ACCESS_URL =
  "access.html";

let currentUserId = "";

let certificateData = {
  userId:"",
  climbCount:"",
  serialNo:"",
  lastDate:"",
  imageUrl:""
};

window.addEventListener("load", initIndex);

async function initIndex(){

  const urlUserId =
    getUserIdFromUrl();

  const localUserId =
    getString(
      localStorage.getItem("tagoyamaUserId") ||
      localStorage.getItem("tagoyamaFujiUserId")
    );

  if(urlUserId){

    currentUserId =
      urlUserId;

    localStorage.setItem(
      "tagoyamaUserId",
      currentUserId
    );

    localStorage.setItem(
      "tagoyamaFujiUserId",
      currentUserId
    );

    issueOmikujiPass(currentUserId);

  }else{

    currentUserId =
      localUserId;

  }

  updateLinks();

  if(urlUserId){

    await saveClimbByUserId(currentUserId);

  }else{

    setStatus(
      "QRコードから入ると、登頂記念証と開運おみくじを受け取れます。"
    );

  }

  await loadStats();

}

function getUserIdFromUrl(){

  const params =
    new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );

}

function issueOmikujiPass(userId){

  if(!userId){
    return;
  }

  const now =
    Date.now();

  const pass = {
    userId:userId,
    issuedAt:now,
    expiresAt:now + 1000 * 60 * 60 * 12
  };

  localStorage.setItem(
    "tagoyamaOmikujiPass",
    JSON.stringify(pass)
  );

}

function getOmikujiPass(){

  try{

    const text =
      localStorage.getItem("tagoyamaOmikujiPass");

    if(!text){
      return null;
    }

    const pass =
      JSON.parse(text);

    if(!pass || typeof pass !== "object"){
      return null;
    }

    return pass;

  }catch(error){

    return null;

  }

}

function hasValidOmikujiPass(userId){

  const pass =
    getOmikujiPass();

  if(!pass){
    return false;
  }

  if(pass.userId !== userId){
    return false;
  }

  if(!pass.expiresAt){
    return false;
  }

  if(Date.now() > Number(pass.expiresAt)){
    return false;
  }

  return true;

}

async function saveClimbByUserId(userId){

  if(!userId){

    setCertificateButton(false);
    return;

  }

  setStatus("登頂記録を登録しています。");

  try{

    const data =
      await getJson(
        GAS_URL +
        "?userId=" +
        encodeURIComponent(userId) +
        "&t=" +
        Date.now()
      );

    const normalized =
      normalizeClimbData(data,userId);

    certificateData =
      mergeData(certificateData,normalized);

    certificateData.userId =
      userId;

    saveCertificateData(certificateData);

    setCertificateButton(true);

    setStatus("登頂記録を受け付けました。");

    if(certificateData.totalParticipants){
      setParticipantCount(certificateData.totalParticipants);
    }

  }catch(error){

    console.error(error);

    setCertificateButton(false);

    setStatus(
      "登頂記録の確認に時間がかかっています。\n通信の良い場所で、もう一度開いてください。"
    );

  }

}

async function loadStats(){

  try{

    const data =
      await tryManyJson([
        GAS_URL + "?mode=stats&t=" + Date.now(),
        GAS_URL + "?mode=climbStats&t=" + Date.now(),
        GAS_URL + "?stats=1&t=" + Date.now()
      ]);

    const source =
      flattenObject(data);

    const count =
      normalizeNumberText(
        getFirst(
          source.totalParticipants,
          source.participants,
          source.totalUsers,
          source.userCount,
          source.count,
          source.total,
          source["参加人数"],
          source["人数"]
        )
      );

    if(count){
      setParticipantCount(count);
    }

  }catch(error){

    console.warn(error);

  }

}

function normalizeClimbData(data,userId){

  const source =
    flattenObject(data);

  return {
    userId:
      getFirst(
        source.userId,
        source.uid,
        userId
      ),

    climbCount:
      normalizeNumberText(
        getFirst(
          source.climbCount,
          source.climbNo,
          source.count,
          source.times,
          source["登頂回数"],
          source["回数"],
          source["個人登頂回数"]
        )
      ),

    serialNo:
      cleanSerialNo(
        getFirst(
          source.serialNo,
          source.serial,
          source.no,
          source.certificateNo,
          source["シリアル番号"],
          source["シリアル"],
          source["No"]
        )
      ),

    lastDate:
      formatDateText(
        getFirst(
          source.lastDate,
          source.date,
          source.climbDate,
          source["日時"],
          source["日付"],
          source["登頂日"]
        )
      ),

    imageUrl:
      getFirst(
        source.imageUrl,
        source.certificateImageUrl,
        source.certificateUrl,
        source.image,
        source.imgUrl,
        source.img,
        source.url,
        source["画像URL"],
        source["画像"]
      ),

    totalParticipants:
      normalizeNumberText(
        getFirst(
          source.totalParticipants,
          source.participants,
          source.totalUsers,
          source.userCount,
          source.total,
          source["参加人数"],
          source["人数"]
        )
      )
  };

}

function openCertificate(){

  if(!currentUserId){

    alert("QRコードから入ると、登頂記念証を受け取れます。");
    return;

  }

  const params =
    new URLSearchParams();

  params.set("userId",currentUserId);

  if(certificateData.climbCount){
    params.set("climbCount",certificateData.climbCount);
  }

  if(certificateData.serialNo){
    params.set("serialNo",certificateData.serialNo);
  }

  if(certificateData.lastDate){
    params.set("lastDate",certificateData.lastDate);
  }

  if(certificateData.imageUrl){
    params.set("imageUrl",certificateData.imageUrl);
  }

  params.set("v","20260704accesslink");

  location.href =
    "certificate.html?" +
    params.toString();

}

function openOmikuji(){

  if(!currentUserId){

    alert("おみくじは、QRコードから入った方だけ引けます。");
    location.href = "omikuji.html?v=20260704accesslink";
    return;

  }

  if(!hasValidOmikujiPass(currentUserId)){

    alert("おみくじは、QRコードから入った方だけ引けます。");
    location.href = "omikuji.html?v=20260704accesslink";
    return;

  }

  location.href =
    "omikuji.html?userId=" +
    encodeURIComponent(currentUserId) +
    "&v=20260704accesslink";

}

function updateLinks(){

  const query =
    currentUserId
      ? "?userId=" + encodeURIComponent(currentUserId)
      : "";

  setHref("kichoLink","kicho.html" + query);
  setHref("goenLink","goen.html" + query);
  setHref("newsLink","news.html" + query);
  setHref("accessLink",ACCESS_URL);

}

function setHref(id,href){

  const el =
    document.getElementById(id);

  if(el){
    el.href = href;
  }

}

function setCertificateButton(enabled){

  const btn =
    document.getElementById("certificateBtn");

  if(btn){
    btn.disabled = !enabled;
  }

}

function setParticipantCount(count){

  const el =
    document.getElementById("participantCount");

  if(el){
    el.innerText =
      normalizeNumberText(count) || "0";
  }

}

function setStatus(text){

  const el =
    document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }

}

function saveCertificateData(data){

  try{

    localStorage.setItem(
      "tagoyamaClimbData",
      JSON.stringify(data)
    );

    if(data.climbCount){
      localStorage.setItem("tagoyamaLastClimbCount",data.climbCount);
    }

    if(data.serialNo){
      localStorage.setItem("tagoyamaLastSerialNo",data.serialNo);
    }

    if(data.lastDate){
      localStorage.setItem("tagoyamaLastDate",data.lastDate);
    }

    if(data.imageUrl){
      localStorage.setItem("tagoyamaLastImageUrl",data.imageUrl);
    }

  }catch(error){

    console.warn(error);

  }

}

async function tryManyJson(urls){

  let lastError = null;

  for(let i = 0; i < urls.length; i++){

    try{

      const data =
        await getJson(urls[i]);

      if(data !== null && data !== undefined){
        return data;
      }

    }catch(error){

      lastError = error;

    }

  }

  throw lastError || new Error("通信に失敗しました。");

}

async function getJson(url){

  try{

    const res =
      await fetch(url,{
        method:"GET",
        cache:"no-store"
      });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text =
      await res.text();

    return parseJsonText(text);

  }catch(error){

    return await getJsonp(url);

  }

}

function parseJsonText(text){

  const value =
    String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{

    return JSON.parse(value);

  }catch(error){

    const objectStart =
      value.indexOf("{");

    const objectEnd =
      value.lastIndexOf("}");

    if(objectStart >= 0 && objectEnd > objectStart){

      return JSON.parse(
        value.substring(objectStart,objectEnd + 1)
      );

    }

    const arrayStart =
      value.indexOf("[");

    const arrayEnd =
      value.lastIndexOf("]");

    if(arrayStart >= 0 && arrayEnd > arrayStart){

      return JSON.parse(
        value.substring(arrayStart,arrayEnd + 1)
      );

    }

    throw error;

  }

}

function getJsonp(url){

  return new Promise(function(resolve,reject){

    const callbackName =
      "tagoyamaIndexCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script =
      document.createElement("script");

    const sep =
      url.indexOf("?") >= 0
        ? "&"
        : "?";

    const timer =
      setTimeout(function(){

        cleanup();
        reject(new Error("JSONP timeout"));

      },12000);

    window[callbackName] = function(data){

      cleanup();
      resolve(data);

    };

    script.onerror = function(){

      cleanup();
      reject(new Error("JSONP error"));

    };

    script.src =
      url +
      sep +
      "callback=" +
      encodeURIComponent(callbackName);

    document.body.appendChild(script);

    function cleanup(){

      clearTimeout(timer);

      try{

        delete window[callbackName];

      }catch(error){

        window[callbackName] = undefined;

      }

      if(script.parentNode){

        script.parentNode.removeChild(script);

      }

    }

  });

}

function flattenObject(data){

  data = data || {};

  let base = {};

  if(Array.isArray(data)){

    if(data.length > 0 && typeof data[data.length - 1] === "object"){

      base = data[data.length - 1];

    }

  }else if(typeof data === "object"){

    base = data;

  }

  const nested =
    base.data &&
    typeof base.data === "object" &&
    !Array.isArray(base.data)
      ? base.data
      : {};

  const latest =
    base.latest &&
    typeof base.latest === "object"
      ? base.latest
      : {};

  const record =
    base.record &&
    typeof base.record === "object"
      ? base.record
      : {};

  return Object.assign({},base,nested,latest,record);

}

function mergeData(base,add){

  const result =
    Object.assign({},base);

  add = add || {};

  Object.keys(add).forEach(function(key){

    if(getString(add[key])){
      result[key] = add[key];
    }

  });

  return result;

}

function normalizeNumberText(value){

  const text =
    toHalfWidthNumber(getString(value));

  const match =
    text.match(/[0-9]+/);

  if(match && match[0]){
    return match[0];
  }

  return "";

}

function cleanSerialNo(value){

  return toHalfWidthNumber(getString(value))
    .replace(/^No\./i,"")
    .replace(/^No/i,"")
    .replace(/^記念番号/,"")
    .trim();

}

function formatDateText(value){

  const text =
    getString(value);

  if(!text){
    return "";
  }

  return toHalfWidthNumber(text)
    .replace(/-/g,"/")
    .replace(/\./g,"/")
    .replace(/\s.*$/,"");

}

function toHalfWidthNumber(value){

  return getString(value).replace(/[０-９]/g,function(s){

    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);

  });

}

function getString(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();

}

function getFirst(){

  for(let i = 0; i < arguments.length; i++){

    const value =
      getString(arguments[i]);

    if(value){
      return value;
    }

  }

  return "";

}

window.openCertificate = openCertificate;
window.openOmikuji = openOmikuji;
</script>
