<!DOCTYPE html>
<html lang="ja">
<head>

<link rel="manifest" href="manifest.json">

<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b0b0b;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#fff;
}

.hero{
  width:100%;
  background:#000;
}

.hero img{
  width:100%;
  display:block;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:linear-gradient(180deg,#1c1c1c,#0f0f0f);
  border:2px solid #d4af37;
  border-radius:28px;
  padding:28px;
  text-align:center;
  box-shadow:0 12px 32px rgba(0,0,0,.45);
}

.logo{
  width:170px;
  max-width:75%;
  display:block;
  margin:0 auto 20px;
  border-radius:22px;
}

.project{
  font-size:18px;
  font-weight:800;
  color:#d4af37;
  margin-bottom:10px;
}

.title{
  font-size:44px;
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:8px;
}

.sub{
  font-size:22px;
  font-weight:800;
  color:#d4af37;
  margin-bottom:24px;
}

.loading{
  font-size:26px;
  font-weight:900;
  padding:60px 0;
  color:#d4af37;
}

.serialBox{
  background:linear-gradient(
    135deg,
    #000,
    #232323
  );
  border:2px solid #d4af37;
  border-radius:24px;
  padding:24px;
  margin-bottom:20px;
}

.serialLabel{
  font-size:20px;
  color:#d4af37;
  margin-bottom:10px;
  font-weight:800;
}

.serial{
  font-size:58px;
  font-weight:900;
  letter-spacing:4px;
}

.count{
  font-size:28px;
  font-weight:900;
  margin-top:20px;
  margin-bottom:10px;
}

.date{
  font-size:18px;
  color:#ddd;
  margin-bottom:20px;
}

.gachaCard{
  background:linear-gradient(
    135deg,
    #3f2c00,
    #6d4c00
  );
  border:2px solid #d4af37;
  border-radius:24px;
  padding:24px;
  margin-top:25px;
  margin-bottom:25px;
}

.gachaTitle{
  font-size:28px;
  font-weight:900;
  color:#ffd700;
  margin-bottom:10px;
}

.gachaResult{
  font-size:34px;
  font-weight:900;
  color:#fff;
}

.btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:20px;
  margin-top:14px;
  font-size:24px;
  font-weight:900;
  cursor:pointer;
}

.save{
  background:#d4af37;
  color:#000;
}

.fb{
  background:#1877f2;
  color:#fff;
}

.x{
  background:#000;
  color:#fff;
}

.line{
  background:#06c755;
  color:#fff;
}

.copy{
  background:#607d8b;
  color:#fff;
}

.footer{
  margin-top:30px;
  text-align:center;
  color:#aaa;
  font-size:16px;
}

</style>
</head>

<body>

<div class="hero">
  <img
    src="top.jpg"
    alt="田子山富士">
</div>

<div class="wrap">

<div class="card">

<img
  src="logo.png"
  class="logo"
  alt="田子山富士">

<div class="project">
主催：田子山富士保存会
</div>

<div class="title">
田子山富士
</div>

<div class="sub">
168の縁プロジェクト
</div>

<div id="loading" class="loading">
読み込み中...
</div>

<div id="main" style="display:none;">

<div class="serialBox">

<div class="serialLabel">
登頂記念
</div>

<div id="serial" class="serial">
1-0001
</div>

</div>

<div id="count" class="count">
あなたは1回目の登頂です
</div>

<div id="date" class="date">
2026/07/01
</div>

<div class="gachaCard">

<div class="gachaTitle">
🎁 縁ガチャ
</div>

<div id="gacha" class="gachaResult">
神使出現
</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyJ6mTFzKyO9vrOe5qbb6259pxThL3bapLXUuoV8Qk3oksXCECHZRHOPKaKYgSLlwNJNg/exec";

let userId =
localStorage.getItem(
"tagoyamaUserId"
);

if(!userId){

userId =
"TGF-" +
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

localStorage.setItem(
"tagoyamaUserId",
userId
);

}

fetch(
GAS_URL,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
userId:userId
})
}
)
.then(r=>r.json())
.then(data=>{

document.getElementById(
"loading"
).style.display="none";

document.getElementById(
"main"
).style.display="block";

document.getElementById(
"serial"
).innerText =
data.serial;

document.getElementById(
"count"
).innerText =
"あなたは " +
data.count +
" 回目の登頂です";

document.getElementById(
"gacha"
).innerText =
data.gacha;

const now =
new Date();

const dateText =
now.getFullYear() +
"/" +
String(
now.getMonth()+1
).padStart(2,"0") +
"/" +
String(
now.getDate()
).padStart(2,"0");

document.getElementById(
"date"
).innerText =
dateText;

})
.catch(err=>{

document.getElementById(
"loading"
).innerHTML =
"通信エラー";

console.log(err);

});

function saveImage(){

alert(
"次回：登頂記念画像保存機能"
);

}

function shareFacebook(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(
location.href
)
);

}

function shareX(){

window.open(
"https://twitter.com/intent/tweet?url=" +
encodeURIComponent(
location.href
)
);

}

function shareLine(){

window.open(
"https://social-plugins.line.me/lineit/share?url=" +
encodeURIComponent(
location.href
)
);

}

function copyUrl(){

navigator.clipboard.writeText(
location.href
);

alert(
"リンクをコピーしました"
);

}

</script>
