<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>田子山富士 168の縁</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f3f4f6;
font-family:
"Hiragino Sans",
"Yu Gothic",
"Meiryo",
sans-serif;
padding:20px;
color:#222;
}

.wrap{
max-width:800px;
margin:auto;
}

.card{
background:#fff;
border-radius:28px;
padding:28px;
box-shadow:
0 8px 24px rgba(0,0,0,.08);
text-align:center;
}

.logo{
width:180px;
max-width:80%;
margin:auto;
display:block;
margin-bottom:18px;
}

.project{
font-size:18px;
font-weight:700;
color:#666;
margin-bottom:8px;
}

.title{
font-size:42px;
font-weight:900;
margin-bottom:8px;
}

.sub{
font-size:20px;
color:#666;
margin-bottom:24px;
}

.serialBox{
background:
linear-gradient(
135deg,
#111,
#333
);
color:#fff;
padding:24px;
border-radius:24px;
margin-bottom:18px;
}

.serialLabel{
font-size:18px;
margin-bottom:10px;
}

.serial{
font-size:54px;
font-weight:900;
letter-spacing:3px;
}

.count{
font-size:28px;
font-weight:900;
margin-top:20px;
margin-bottom:10px;
}

.date{
font-size:18px;
color:#666;
margin-bottom:20px;
}

.gachaCard{
background:#fff8e1;
border:3px solid #ffd54f;
border-radius:20px;
padding:24px;
margin-top:24px;
margin-bottom:24px;
}

.gachaTitle{
font-size:26px;
font-weight:900;
margin-bottom:10px;
}

.gachaResult{
font-size:32px;
font-weight:900;
color:#d35400;
}

.btn{
width:100%;
padding:20px;
border:none;
border-radius:18px;
font-size:24px;
font-weight:900;
margin-top:14px;
cursor:pointer;
}

.save{
background:#2ecc71;
color:#fff;
}

.fb{
background:#1877f2;
color:#fff;
}

.x{
background:#111;
color:#fff;
}

.line{
background:#06c755;
color:#fff;
}

.copy{
background:#607d8b;
color:#fff;
}

.loading{
font-size:26px;
padding:60px 0;
}

.footer{
margin-top:30px;
text-align:center;
font-size:16px;
color:#888;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<img
src="logo.png"
class="logo"
alt="田子山富士">

<div class="project">
主催：田子山富士保存会
</div>

<div class="title">
田子山富士
</div>

<div class="sub">
168の縁
</div>

<div id="loading" class="loading">
読み込み中...
</div>

<div id="main" style="display:none;">

<div class="serialBox">

<div class="serialLabel">
登頂記念
</div>

<div id="serial" class="serial">
1-0001
</div>

</div>

<div id="count" class="count">
あなたは1回目の登頂です
</div>

<div id="date" class="date">
2026/07/01
</div>

<div class="gachaCard">

<div class="gachaTitle">
🎁 縁ガチャ
</div>

<div id="gacha" class="gachaResult">
神使出現
</div>

</div>

<button
class="btn save"
onclick="saveImage()">

画像を保存

</button>

<button
class="btn fb"
onclick="shareFacebook()">

Facebook

</button>

<button
class="btn x"
onclick="shareX()">

X

</button>

<button
class="btn line"
onclick="shareLine()">

LINE

</button>

<button
class="btn copy"
onclick="copyUrl()">

リンクをコピー

</button>

</div>

</div>

<div class="footer">

田子山富士168の縁プロジェクト<br>
後援：いろは商店会

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyJ6mTFzKyO9vrOe5qbb6259pxThL3bapLXUuoV8Qk3oksXCECHZRHOPKaKYgSLlwNJNg/exec";

let userId =
localStorage.getItem(
"tagoyamaUserId"
);

if(!userId){

userId =
"TGF-" +
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

localStorage.setItem(
"tagoyamaUserId",
userId
);

}

fetch(
GAS_URL,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
userId:userId
})
}
)
.then(r=>r.json())
.then(data=>{

document.getElementById(
"loading"
).style.display = "none";

document.getElementById(
"main"
).style.display = "block";

document.getElementById(
"serial"
).innerText =
data.serial;

document.getElementById(
"count"
).innerText =
"あなたは " +
data.count +
" 回目の登頂です";

document.getElementById(
"gacha"
).innerText =
data.gacha;

const today =
new Date();

const dateText =
today.getFullYear() +
"/" +
String(
today.getMonth()+1
).padStart(2,"0") +
"/" +
String(
today.getDate()
).padStart(2,"0");

document.getElementById(
"date"
).innerText =
dateText;

})
.catch(err=>{

document.getElementById(
"loading"
).innerHTML =
"通信エラー";

console.error(err);

});

function saveImage(){

alert(
"次の作業で登頂記念画像保存機能を追加します"
);

}

function shareFacebook(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(
location.href
)
);

}

function shareX(){

window.open(
"https://twitter.com/intent/tweet?url=" +
encodeURIComponent(
location.href
)
);

}

function shareLine(){

window.open(
"https://social-plugins.line.me/lineit/share?url=" +
encodeURIComponent(
location.href
)
);

}

function copyUrl(){

navigator.clipboard.writeText(
location.href
);

alert(
"リンクをコピーしました"
);

}

</script>

</body>
</html>
