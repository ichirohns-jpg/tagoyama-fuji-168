<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbxVNG0afPqotqc0-YZOhL1QDhozzbYbAwA5uUEOAtz7L2ZjzaG70aY81dt8-O0Alx_5/exec";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

const OMIKUJI_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

let currentUserId = "";
let newsLoaded = false;
let goenLoaded = false;
let newsShareItems = [];

window.addEventListener("load", init);

async function init(){
  const urlUserId = getUserIdFromUrl();

  if(urlUserId){
    currentUserId = urlUserId;
    saveUserId(urlUserId);
  }else{
    currentUserId = getSavedUserId();
  }

  updateUserLinks();

  if(urlUserId){
    await handleClimb(urlUserId);
  }else{
    hideCertificateButton();
    await loadStats();
    showSavedCertificateButtonIfAvailable();
  }
}

function getUserIdFromUrl(){
  const params = new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );
}

function saveUserId(userId){
  const value = getString(userId);

  if(!value){
    return;
  }

  localStorage.setItem("tagoyamaUserId", value);
  localStorage.setItem("tagoyamaFujiUserId", value);
}

function getSavedUserId(){
  return getString(
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    ""
  );
}

function updateUserLinks(){
  const omikujiLink = document.getElementById("omikujiLink");

  if(omikujiLink){
    if(currentUserId){
      omikujiLink.href =
        "omikuji.html?userId=" +
        encodeURIComponent(currentUserId) +
        "&v=" +
        Date.now();
    }else{
      omikujiLink.href =
        "omikuji.html?v=" +
        Date.now();
    }
  }

  const savedClimbData = getSavedClimbData();

  if(savedClimbData && savedClimbData.userId){
    const certificateBtn = document.getElementById("certificateBtn");

    if(certificateBtn){
      certificateBtn.href = buildCertificateUrl(savedClimbData);
    }
  }
}

function getSavedClimbData(){
  try{
    const text = localStorage.getItem("tagoyamaClimbData");

    if(!text){
      return null;
    }

    const data = JSON.parse(text);

    if(!data || !data.userId || !data.climbCount || !data.serialNo){
      return null;
    }

    return data;
  }catch(e){
    return null;
  }
}

function showSavedCertificateButtonIfAvailable(){
  const data = getSavedClimbData();

  if(!data || !data.userId || !data.climbCount || !data.serialNo){
    return;
  }

  const certificateBtn = document.getElementById("certificateBtn");

  if(certificateBtn){
    certificateBtn.href = buildCertificateUrl(data);
    certificateBtn.classList.remove("hidden");
    certificateBtn.classList.remove("disabled");
  }
}

async function handleClimb(urlUserId){
  const climbMessage = document.getElementById("climbMessage");
  const climbStatus = document.getElementById("climbStatus");
  const certificateBtn = document.getElementById("certificateBtn");

  if(climbStatus){
    climbStatus.classList.remove("hidden");
    climbStatus.innerText = "登頂情報を確認しています...";
  }

  try{
    const saveUrl =
      GAS_URL +
      "?mode=saveClimb" +
      "&userId=" +
      encodeURIComponent(urlUserId) +
      "&t=" +
      Date.now();

    const data = await getJson(saveUrl);

    if(!data || data.success === false){
      throw new Error(
        data && data.message
          ? data.message
          : "登頂記録に失敗しました"
      );
    }

    const climbCount = getFirst(
      data.climbCount,
      data.climbNo,
      data.count,
      data.登頂回数
    );

    const serialNo = getFirst(
      data.serialNo,
      data.serial,
      data.certificateNo,
      data.no,
      data.シリアル番号
    );

    const lastDate = getFirst(
      data.lastDate,
      data.date,
      data.climbDate,
      data.日付
    );

    const imageNo = getFirst(
      data.imageNo,
      data.imageNumber,
      data.image,
      data.画像番号
    );

    const imageName = getFirst(
      data.imageName,
      data.imageTitle,
      data.title,
      data.画像名
    );

    const imageUrl = getFirst(
      data.imageUrl,
      data.imageURL,
      data.img,
      data.画像URL,
      data.画像url,
      data.画像
    );

    const participantNo = getFirst(
      data.participantNo,
      data.participantCount,
      data.participants,
      data.totalParticipants,
      data.total,
      data.countParticipants,
      data.参加人数
    );

    if(!climbCount || !serialNo){
      throw new Error("GASから登頂回数またはシリアル番号が返っていません");
    }

    if(participantNo){
      setParticipantNumber(participantNo);
    }else{
      await loadStats();
    }

    const climbData = {
      userId:String(urlUserId),
      climbCount:String(climbCount),
      serialNo:String(serialNo),
      lastDate:String(lastDate || ""),
      imageNo:String(imageNo || ""),
      imageName:String(imageName || ""),
      imageUrl:String(imageUrl || ""),
      participantNo:String(participantNo || ""),
      savedAt:String(Date.now())
    };

    localStorage.setItem("tagoyamaClimbData", JSON.stringify(climbData));
    localStorage.setItem("tagoyamaLastClimbCount", climbData.climbCount);
    localStorage.setItem("tagoyamaLastSerialNo", climbData.serialNo);
    localStorage.setItem("tagoyamaLastDate", climbData.lastDate);
    localStorage.setItem("tagoyamaLastParticipantNo", climbData.participantNo);

    currentUserId = urlUserId;
    saveUserId(urlUserId);
    updateUserLinks();

    if(climbMessage){
      climbMessage.innerHTML =
        "おめでとうございます。<br>" +
        "<strong>登頂受付が完了しました。</strong>";
    }

    let statusText =
      "第" + escapeHtml(climbData.climbCount) + "回 登頂記念<br>" +
      "No." + escapeHtml(climbData.serialNo);

    if(climbData.lastDate){
      statusText += "<br>" + escapeHtml(formatDate(climbData.lastDate));
    }

    if(data.alreadyClimbedToday === true){
      statusText += "<br>本日の登頂受付は完了しています";
    }

    if(climbStatus){
      climbStatus.innerHTML = statusText;
    }

    if(certificateBtn){
      certificateBtn.href = buildCertificateUrl(climbData);
      certificateBtn.classList.remove("hidden");
      certificateBtn.classList.remove("disabled");
    }
  }catch(err){
    if(climbMessage){
      climbMessage.innerHTML =
        "登頂受付で<br><strong>エラーが発生しました</strong>";
    }

    if(climbStatus){
      climbStatus.innerText =
        err && err.message
          ? err.message
          : "もう一度QRコードからお試しください";
    }

    hideCertificateButton();
    await loadStats();
  }
}

function buildCertificateUrl(data){
  const params = new URLSearchParams();

  params.set("userId", getString(data.userId));
  params.set("climbCount", getString(data.climbCount));
  params.set("serialNo", getString(data.serialNo));

  if(data.lastDate){
    params.set("lastDate", getString(data.lastDate));
  }

  if(data.imageNo){
    params.set("imageNo", getString(data.imageNo));
  }

  if(data.imageName){
    params.set("imageName", getString(data.imageName));
  }

  if(data.imageUrl){
    params.set("imageUrl", getString(data.imageUrl));
  }

  if(data.participantNo){
    params.set("participantNo", getString(data.participantNo));
  }

  params.set("v", String(Date.now()));

  return CERTIFICATE_PAGE + "?" + params.toString();
}

function hideCertificateButton(){
  const certificateBtn = document.getElementById("certificateBtn");

  if(certificateBtn){
    certificateBtn.classList.add("hidden");
    certificateBtn.classList.add("disabled");
    certificateBtn.href = "certificate.html";
  }
}

async function loadStats(){
  const el = document.getElementById("participants");

  if(!el){
    return;
  }

  el.innerText = "--";

  try{
    const data = await getJson(
      GAS_URL +
      "?mode=stats&t=" +
      Date.now()
    );

    if(data && data.success !== false){
      const count = getFirst(
        data.participantNo,
        data.participantCount,
        data.participants,
        data.totalParticipants,
        data.total,
        data.count,
        data.参加人数
      );

      if(count){
        setParticipantNumber(count);
      }
    }
  }catch(e){
    const last =
      localStorage.getItem("tagoyamaLastParticipantNo") ||
      "";

    if(last){
      el.innerText = last;
    }else{
      el.innerText = "--";
    }
  }
}

function setParticipantNumber(value){
  const el = document.getElementById("participants");

  if(!el){
    return;
  }

  if(value === "" || value === null || value === undefined){
    return;
  }

  const n = Number(String(value).replace(/[^\d]/g,""));

  if(Number.isFinite(n) && n >= 0){
    el.innerText = String(n);
    localStorage.setItem("tagoyamaLastParticipantNo", String(n));
  }else{
    el.innerText = String(value);
    localStorage.setItem("tagoyamaLastParticipantNo", String(value));
  }
}

function openSection(id){

  if(!section){

    newsLoaded = false;

    loadGoen();
  }

  setTimeout(function(){
    section.scrollIntoView({
      behavior:"smooth",
      block:"start"
    });

}

function closeAllSections(){

function closeSection(id){

async function loadNews(){
  const list = document.getElementById("newsList");

  if(!list){
    return;
  }

  if(newsLoaded){
    return;
  }

  newsShareItems = [];

  list.innerHTML =
    '<div class="item"><p class="itemBody">お知らせを読み込み中です。</p></div>';

  try{
    const data = await getJson(
      GAS_URL +
      "?mode=news&t=" +
      Date.now()
    );

    const rows = getArrayRows(data);

    if(!rows || rows.length === 0){
      list.innerHTML =
        '<div class="item"><p class="itemBody">現在、お知らせはありません。</p></div>';

      newsLoaded = true;
      return;
    }

    let html = "";

    rows.forEach(function(item){
      const title = getFirst(
        item.title,
        item.タイトル,
        item.name,
        item.件名,
        item.subject,
        item.heading
      );

      const date = formatDate(getFirst(
        item.date,
        item.datetime,
        item.createdAt,
        item.updatedAt,
        item.timestamp,
        item.日時,
        item.日付
      ));

      let body = getFirst(
        item.body,
        item.message,
        item.text,
        item.content,
        item.description,
        item.detail,
        item.本文,
        item.内容,
        item.説明,
        item.メッセージ,
        item.お知らせ本文
      );

      if(!body){
        body = makeBodyFromItem(item);
      }

      const imageUrl = makeDisplayImageUrl(getNewsImageUrl(item));

      if(!title && !body && !imageUrl){
        return;
      }

      const shareIndex = newsShareItems.length;

      newsShareItems.push({
        title:title || "田子山富士 お知らせ",
        date:date || "",
        body:body || "",
        imageUrl:imageUrl || ""
      });

      html +=
        '<div class="item">' +
        (
          imageUrl
            ? '<img class="itemImage" src="' + escapeAttribute(imageUrl) + '" alt="' + escapeAttribute(title || "お知らせ画像") + '" loading="lazy" onerror="this.style.display=&quot;none&quot;;">'
            : ''
        ) +
        '<h3 class="itemTitle">' + escapeHtml(title || "お知らせ") + '</h3>' +
        '<div class="itemDate">' + escapeHtml(date) + '</div>' +
        '<p class="itemBody">' + escapeHtml(body) + '</p>' +
        '<div class="newsShareGrid">' +
          '<button class="newsShareBtn newsFacebook" type="button" onclick="shareNewsFacebook(' + shareIndex + ')">Facebookに投稿</button>' +
          '<button class="newsShareBtn newsLine" type="button" onclick="shareNewsLine(' + shareIndex + ')">LINEで送る</button>' +
          '<button class="newsShareBtn newsX" type="button" onclick="shareNewsX(' + shareIndex + ')">Xで投稿</button>' +
          '<button class="newsShareBtn newsCopy" type="button" onclick="copyNews(' + shareIndex + ')">お知らせをコピー</button>' +
        '</div>' +
        '</div>';
    });

    list.innerHTML =
      html ||
      '<div class="item"><p class="itemBody">現在、お知らせはありません。</p></div>';

    newsLoaded = true;
  }catch(e){
    list.innerHTML =
      '<div class="item"><p class="itemBody">お知らせを読み込めませんでした。</p></div>';
  }
}

function buildNewsShareText(index){
  const item = newsShareItems[index];

  if(!item){
    return (
      "田子山富士 お知らせ\n\n" +
      "田子山富士 168の縁プロジェクト"
    );
  }

  const lines = [];

  lines.push("田子山富士 お知らせ");

  if(item.title){
    lines.push(item.title);
  }

  if(item.date){
    lines.push(item.date);
  }

  if(item.body){
    lines.push("");
    lines.push(item.body);
  }

  lines.push("");
  lines.push("田子山富士 168の縁プロジェクト");

  return lines.join("\n");
}

function buildNewsShareUrl(index){
  return HOME_PAGE + "?v=" + Date.now();
}

function shareNewsFacebook(index){
  const text = buildNewsShareText(index);
  const url = buildNewsShareUrl(index);

  window.open(
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(url) +
    "&quote=" +
    encodeURIComponent(text),
    "_blank"
  );
}

function shareNewsLine(index){
  const text =
    buildNewsShareText(index) +
    "\n" +
    buildNewsShareUrl(index);

  window.open(
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(buildNewsShareUrl(index)) +
    "&text=" +
    encodeURIComponent(text),
    "_blank"
  );
}

function shareNewsX(index){
  window.open(
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(buildNewsShareText(index)) +
    "&url=" +
    encodeURIComponent(buildNewsShareUrl(index)),
    "_blank"
  );
}

async function copyNews(index){
  const text =
    buildNewsShareText(index) +
    "\n" +
    buildNewsShareUrl(index);

  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
    }else{
      copyByTextarea(text);
    }

    alert("お知らせをコピーしました。");
  }catch(e){
    copyByTextarea(text);
    alert("お知らせをコピーしました。");
  }
}

function copyByTextarea(text){
  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.setAttribute("readonly","readonly");
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  textarea.style.top = "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
}

function getNewsImageUrl(item){
  const direct = getFirst(
    item.imageUrl,
    item.imageURL,
    item.imgUrl,
    item.img,
    item.image,
    item.thumbnail,
    item.thumbnailUrl,
    item.photo,
    item.picture,
    item.画像URL,
    item.画像url,
    item.画像リンク,
    item.画像,
    item.写真,
    item.URL,
    item.url,
    item.link
  );

  if(isImageLikeUrl(direct)){
    return direct;
  }

  const keys = Object.keys(item || {});

  for(let i = 0; i < keys.length; i++){
    const value = cleanText(item[keys[i]]);

    if(isImageLikeUrl(value)){
      return value;
    }
  }

  const json = cleanText(JSON.stringify(item || {}));
  const matches = json.match(/https?:\/\/[^"'\\\s<>]+/g);

  if(matches && matches.length){
    for(let i = 0; i < matches.length; i++){
      if(isImageLikeUrl(matches[i])){
        return matches[i];
      }
    }
  }

  return "";
}

function isImageLikeUrl(value){
  const text = cleanText(value);

  if(!text){
    return false;
  }

  if(text.indexOf("drive.google.com") >= 0){
    return true;
  }

  if(text.indexOf("googleusercontent.com") >= 0){
    return true;
  }

  if(text.indexOf("thumbnail?id=") >= 0){
    return true;
  }

  if(text.match(/\.(jpg|jpeg|png|gif|webp)(\?|#|$)/i)){
    return true;
  }

  return false;
}

function makeDisplayImageUrl(url){
  const text = cleanText(url);

  if(!text){
    return "";
  }

  const driveId = getDriveFileId(text);

  if(driveId){
    return "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(driveId) +
      "&sz=w1600";
  }

  return text;
}

function getDriveFileId(url){
  const text = cleanText(url);

  if(!text){
    return "";
  }

  let match = text.match(/\/file\/d\/([^/]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = text.match(/[?&]id=([^&]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = text.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

  if(match && match[1]){
    return match[1];
  }

  return "";
}

function makeBodyFromItem(item){
  const skipKeys = [
    "title",
    "タイトル",
    "name",
    "件名",
    "subject",
    "heading",
    "date",
    "datetime",
    "createdAt",
    "updatedAt",
    "timestamp",
    "日時",
    "日付",
    "link",
    "url",
    "URL",
    "リンク",
    "imageUrl",
    "imageURL",
    "imgUrl",
    "img",
    "image",
    "thumbnail",
    "thumbnailUrl",
    "photo",
    "picture",
    "画像URL",
    "画像url",
    "画像リンク",
    "画像",
    "写真"
  ];

  const parts = [];

  Object.keys(item || {}).forEach(function(key){
    if(skipKeys.indexOf(key) >= 0){
      return;
    }

    const value = getString(item[key]);

    if(!value){
      return;
    }

    if(value.indexOf("https://") === 0 || value.indexOf("http://") === 0){
      return;
    }

    parts.push(value);
  });

  return parts.join("\n");
}

async function saveKicho(){
  const areaEl = document.getElementById("kichoArea");
  const nameEl = document.getElementById("kichoName");
  const messageEl = document.getElementById("kichoMessage");
  const btn = document.getElementById("kichoBtn");

  const area = getString(areaEl ? areaEl.value : "");
  const name = getString(nameEl ? nameEl.value : "");
  const message = getString(messageEl ? messageEl.value : "");

  if(!area){
    alert("どこから来たかを選んでください。");
    return;
  }

  if(!message){
    alert("メッセージを書いてください。");
    return;
  }

  if(btn){
    btn.disabled = true;
    btn.innerText = "記帳しています...";
  }

  try{
    const url =
      GAS_URL +
      "?mode=saveKicho" +
      "&area=" +
      encodeURIComponent(area) +
      "&name=" +
      encodeURIComponent(name || "匿名") +
      "&message=" +
      encodeURIComponent(message) +
      "&t=" +
      Date.now();

    const data = await getJson(url);

    if(!data || data.success === false){
      throw new Error(
        data && data.message
          ? data.message
          : "記帳できませんでした"
      );
    }

    if(nameEl){
      nameEl.value = "";
    }

    if(messageEl){
      messageEl.value = "";
    }

    goenLoaded = false;

    alert("ご縁帳に記帳しました。");

    closeSection("kichoSection");
    openSection("goenSection");
  }catch(e){
    alert(
      e && e.message
        ? e.message
        : "記帳できませんでした。"
    );
  }finally{
    if(btn){
      btn.disabled = false;
      btn.innerText = "記帳する";
    }
  }
}

async function getJson(url){
  const response = await fetch(url,{
    method:"GET",
    cache:"no-store"
  });

  if(!response.ok){
    throw new Error("通信に失敗しました");
  }

  const text = await response.text();

  try{
    return JSON.parse(text);
  }catch(e){
    const match = text.match(/^[^(]*\(([\s\S]*)\)\s*;?\s*$/);

    if(match && match[1]){
      return JSON.parse(match[1]);
    }

    throw new Error("データを読み込めませんでした");
  }
}

function getArrayRows(data){
  if(!data){
    return [];
  }

  if(Array.isArray(data)){
    return data;
  }

  if(Array.isArray(data.rows)){
    return data.rows;
  }

  if(Array.isArray(data.data)){
    return data.data;
  }

  if(Array.isArray(data.items)){
    return data.items;
  }

  if(Array.isArray(data.news)){
    return data.news;
  }

  if(Array.isArray(data.list)){
    return data.list;
  }

  if(data.row){
    return [data.row];
  }

  if(typeof data === "object"){
    const keys = Object.keys(data);

    for(let i = 0; i < keys.length; i++){
      if(Array.isArray(data[keys[i]])){
        return data[keys[i]];
      }
    }
  }

  return [];
}

function getFirst(){
  for(let i = 0; i < arguments.length; i++){
    const v = arguments[i];

    if(v === null || v === undefined){
      continue;
    }

    const text = cleanText(v);

    if(text !== ""){
      return text;
    }
  }

  return "";
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function cleanText(value){
  return getString(value)
    .replace(/\\\//g,"/")
    .replace(/\\u0026/g,"&")
    .replace(/&amp;/g,"&");
}

function formatDate(value){
  const text = getString(value);

  if(!text){
    return "";
  }

  if(text.match(/^\d{4}\/\d{1,2}\/\d{1,2}$/)){
    return text;
  }

  if(text.match(/^\d{4}-\d{1,2}-\d{1,2}$/)){
    const parts = text.split("-");

    return parts[0] + "/" + Number(parts[1]) + "/" + Number(parts[2]);
  }

  const d = new Date(text);

  if(!isNaN(d.getTime())){
    return d.getFullYear() + "/" + (d.getMonth() + 1) + "/" + d.getDate();
  }

  return text;
}

function escapeHtml(value){
  return getString(value)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function escapeAttribute(value){
  return escapeHtml(value);
}
