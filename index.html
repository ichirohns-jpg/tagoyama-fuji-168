<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

const CERTIFICATE_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

let currentUserId = "";
let climbData = null;

document.addEventListener("DOMContentLoaded", function() {
  initIndexPage();
});

async function initIndexPage() {
  currentUserId = getUserIdFromUrl();

  if (currentUserId) {
    localStorage.setItem("tagoyamaUserId", currentUserId);
    localStorage.setItem("tagoyamaFujiUserId", currentUserId);
  } else {
    currentUserId =
      localStorage.getItem("tagoyamaUserId") ||
      localStorage.getItem("tagoyamaFujiUserId") ||
      "";
  }

  updateMenuLinks();
  await loadParticipantCount();

  if (currentUserId) {
    await saveClimbAndPrepareCertificate(currentUserId);
  } else {
    setClimbStatus("山頂QRからアクセスすると、登頂記念証を受け取れます。");
    disableCertificateButton();
  }
}

function getUserIdFromUrl() {
  const params = new URLSearchParams(window.location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );
}

function updateMenuLinks() {
  const omikujiLink = document.getElementById("omikujiLink");
  const newsLink = document.getElementById("newsLink");
  const kichoLink = document.getElementById("kichoLink");
  const goenLink = document.getElementById("goenLink");

  const query =
    currentUserId
      ? "?userId=" + encodeURIComponent(currentUserId)
      : "";

  if (omikujiLink) {
    omikujiLink.href = "omikuji.html" + query;
  }

  if (newsLink) {
    newsLink.href = "news.html" + query;
  }

  if (kichoLink) {
    kichoLink.href = "kicho.html" + query;
  }

  if (goenLink) {
    goenLink.href = "goen.html" + query;
  }
}

async function loadParticipantCount() {
  const countEl = document.getElementById("participantCount");

  try {
    const data = await tryManyJson([
      GAS_URL + "?stats=1&t=" + Date.now(),
      GAS_URL + "?mode=stats&t=" + Date.now(),
      GAS_URL + "?action=stats&t=" + Date.now(),
      GAS_URL + "?participant=1&t=" + Date.now()
    ]);

    const source = flattenObject(data);

    const count =
      normalizeNumberText(
        getFirst(
          source.participantNo,
          source.participantCount,
          source.participant,
          source.total,
          source.totalCount,
          source.count,
          source.people,
          source["参加人数"],
          source["参加者数"]
        )
      );

    if (countEl) {
      countEl.innerText = count || "--";
    }
  } catch (error) {
    console.warn(error);

    if (countEl) {
      countEl.innerText = "--";
    }
  }
}

async function saveClimbAndPrepareCertificate(userId) {
  setClimbStatus("登頂情報を確認しています...");

  try {
    const data = await tryManyJson([
      GAS_URL + "?userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?saveClimb=1&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?mode=saveClimb&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?action=saveClimb&userId=" + encodeURIComponent(userId) + "&t=" + Date.now()
    ]);

    climbData = normalizeClimbData(data, userId);

    if (!climbData.userId) {
      climbData.userId = userId;
    }

    saveClimbLocal(climbData);
    enableCertificateButton(climbData);
    updateMenuLinks();

    const participant =
      getFirst(climbData.participantNo, climbData.participantCount);

    if (participant) {
      const countEl = document.getElementById("participantCount");
      if (countEl) {
        countEl.innerText = participant;
      }
    }

    setClimbStatus(
      "登頂受付が完了しました。\n登頂記念証を受け取れます。"
    );
  } catch (error) {
    console.error(error);

    const local = loadClimbLocal();

    if (local && local.userId) {
      climbData = local;
      enableCertificateButton(climbData);
      setClimbStatus(
        "前回の登頂情報を表示しています。\n登頂記念証を受け取れます。"
      );
    } else {
      disableCertificateButton();
      setClimbStatus(
        "登頂情報を確認できませんでした。\n通信状況を確認して、山頂QRからもう一度お試しください。"
      );
    }
  }
}

function normalizeClimbData(data, userId) {
  const source = flattenObject(data);

  return {
    userId: getFirst(source.userId, source.uid, userId),

    climbCount:
      normalizeNumberText(
        getFirst(
          source.climbCount,
          source.count,
          source.times,
          source.climb_count,
          source.climb,
          source["登頂回数"],
          source["個人登頂回数"]
        )
      ),

    serialNo:
      cleanSerialNo(
        getFirst(
          source.serialNo,
          source.serial,
          source.no,
          source.serial_no,
          source.number,
          source["シリアル"],
          source["記念番号"]
        )
      ),

    lastDate:
      getFirst(
        source.lastDate,
        source.date,
        source.climbDate,
        source.last_date,
        source.createdAt,
        source["日時"],
        source["日付"]
      ),

    imageNo:
      getFirst(source.imageNo, source.image_no, source["画像番号"]),

    imageName:
      getFirst(source.imageName, source.image_name, source.title, source.name, source["画像名"]),

    imageUrl:
      getFirst(
        source.imageUrl,
        source.certificateImageUrl,
        source.certificateUrl,
        source.image,
        source.imgUrl,
        source.img,
        source.url,
        source["画像URL"]
      ),

    participantNo:
      normalizeNumberText(
        getFirst(
          source.participantNo,
          source.participant,
          source.participant_no,
          source.participantCount,
          source.people,
          source.total,
          source.totalCount,
          source["参加人数"],
          source["参加者数"]
        )
      )
  };
}

function enableCertificateButton(data) {
  const btn = document.getElementById("certificateBtn");

  if (!btn) {
    return;
  }

  btn.href = buildCertificateUrl(data);
  btn.classList.remove("disabled");
}

function disableCertificateButton() {
  const btn = document.getElementById("certificateBtn");

  if (!btn) {
    return;
  }

  btn.href = "certificate.html";
  btn.classList.add("disabled");
}

function buildCertificateUrl(data) {
  data = data || {};
  const params = new URLSearchParams();

  if (data.userId) {
    params.set("userId", data.userId);
  }

  if (data.climbCount) {
    params.set("climbCount", data.climbCount);
  }

  if (data.serialNo) {
    params.set("serialNo", data.serialNo);
  }

  if (data.lastDate) {
    params.set("lastDate", data.lastDate);
  }

  if (data.imageNo) {
    params.set("imageNo", data.imageNo);
  }

  if (data.imageName) {
    params.set("imageName", data.imageName);
  }

  if (data.imageUrl) {
    params.set("imageUrl", data.imageUrl);
  }

  if (data.participantNo) {
    params.set("participantNo", data.participantNo);
  }

  params.set("v", "20260703");

  return CERTIFICATE_PAGE + "?" + params.toString();
}

function saveClimbLocal(data) {
  try {
    localStorage.setItem("tagoyamaClimbData", JSON.stringify(data));

    if (data.userId) {
      localStorage.setItem("tagoyamaUserId", data.userId);
      localStorage.setItem("tagoyamaFujiUserId", data.userId);
    }

    if (data.climbCount) {
      localStorage.setItem("tagoyamaLastClimbCount", data.climbCount);
    }

    if (data.serialNo) {
      localStorage.setItem("tagoyamaLastSerialNo", data.serialNo);
    }

    if (data.lastDate) {
      localStorage.setItem("tagoyamaLastDate", data.lastDate);
    }

    if (data.imageUrl) {
      localStorage.setItem("tagoyamaLastImageUrl", data.imageUrl);
    }

    if (data.participantNo) {
      localStorage.setItem("tagoyamaLastParticipantNo", data.participantNo);
    }
  } catch (error) {
    console.warn(error);
  }
}

function loadClimbLocal() {
  try {
    const text = localStorage.getItem("tagoyamaClimbData");

    if (text) {
      const data = JSON.parse(text);

      if (data && data.userId) {
        return data;
      }
    }

    const userId =
      localStorage.getItem("tagoyamaUserId") ||
      localStorage.getItem("tagoyamaFujiUserId") ||
      "";

    if (!userId) {
      return null;
    }

    return {
      userId: userId,
      climbCount: localStorage.getItem("tagoyamaLastClimbCount") || "",
      serialNo: localStorage.getItem("tagoyamaLastSerialNo") || "",
      lastDate: localStorage.getItem("tagoyamaLastDate") || "",
      imageUrl: localStorage.getItem("tagoyamaLastImageUrl") || "",
      participantNo: localStorage.getItem("tagoyamaLastParticipantNo") || ""
    };
  } catch (error) {
    return null;
  }
}

function setClimbStatus(text) {
  const el = document.getElementById("climbStatus");

  if (el) {
    el.innerText = text;
  }
}

async function tryManyJson(urls) {
  let lastError = null;

  for (let i = 0; i < urls.length; i++) {
    try {
      const data = await getJson(urls[i]);

      if (data !== null && data !== undefined) {
        return data;
      }
    } catch (error) {
      lastError = error;
    }
  }

  throw lastError || new Error("通信に失敗しました。");
}

async function getJson(url) {
  try {
    const res = await fetch(url, {
      method: "GET",
      cache: "no-store"
    });

    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    return parseJsonText(text);
  } catch (fetchError) {
    return await getJsonp(url);
  }
}

function parseJsonText(text) {
  const value = String(text || "").trim();

  if (!value) {
    throw new Error("empty response");
  }

  try {
    return JSON.parse(value);
  } catch (error) {
    const start = value.indexOf("{");
    const end = value.lastIndexOf("}");

    if (start >= 0 && end > start) {
      return JSON.parse(value.substring(start, end + 1));
    }

    throw error;
  }
}

function getJsonp(url) {
  return new Promise(function(resolve, reject) {
    const callbackName =
      "tagoyamaIndexCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script = document.createElement("script");
    const sep = url.indexOf("?") >= 0 ? "&" : "?";

    const timer = setTimeout(function() {
      cleanup();
      reject(new Error("JSONP timeout"));
    }, 12000);

    window[callbackName] = function(data) {
      cleanup();
      resolve(data);
    };

    script.onerror = function() {
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
    document.body.appendChild(script);

    function cleanup() {
      clearTimeout(timer);

      try {
        delete window[callbackName];
      } catch (error) {
        window[callbackName] = undefined;
      }

      if (script.parentNode) {
        script.parentNode.removeChild(script);
      }
    }
  });
}

function flattenObject(data) {
  data = data || {};

  const nested =
    data.data &&
    typeof data.data === "object" &&
    !Array.isArray(data.data)
      ? data.data
      : {};

  return Object.assign({}, data, nested);
}

function normalizeNumberText(value) {
  const text = toHalfWidthNumber(getString(value));
  const match = text.match(/[0-9]+/);

  if (match && match[0]) {
    return match[0];
  }

  return "";
}

function cleanSerialNo(value) {
  return toHalfWidthNumber(getString(value))
    .replace(/^No\./i, "")
    .replace(/^No/i, "")
    .replace(/^記念番号/, "")
    .trim();
}

function toHalfWidthNumber(value) {
  return getString(value).replace(/[０-９]/g, function(s) {
    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  });
}

function getString(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value).trim();
}

function getFirst() {
  for (let i = 0; i < arguments.length; i++) {
    const value = getString(arguments[i]);

    if (value) {
      return value;
    }
  }

  return "";
}
