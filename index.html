<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>田子山富士 168の縁プロジェクト</title>

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="田子山富士 168の縁プロジェクト">
<meta name="twitter:description" content="田子山富士の登頂記念・ご縁帳・おみくじを楽しめるページです。">

<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#050505;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}

body{
  background:
    radial-gradient(circle at 50% 0%,rgba(255,224,120,.25),rgba(0,0,0,0) 38%),
    linear-gradient(180deg,#1d1204 0%,#070707 48%,#000 100%);
}

.hidden{
  display:none !important;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:22px 14px 52px;
}

.hero{
  text-align:center;
  margin-bottom:22px;
}

.logoBox{
  width:100%;
  max-width:560px;
  margin:0 auto 18px;
  border-radius:28px;
  overflow:hidden;
  border:3px solid rgba(255,220,95,.78);
  background:#000;
  box-shadow:
    0 14px 30px rgba(0,0,0,.48),
    0 0 22px rgba(255,210,80,.20);
}

.logoBox img{
  display:block;
  width:100%;
  height:auto;
}

.siteTitle{
  margin:0;
  font-size:clamp(42px,12vw,76px);
  font-weight:900;
  line-height:1.12;
  color:#ffdf72;
  letter-spacing:.06em;
  text-shadow:
    0 4px 4px rgba(0,0,0,.9),
    0 0 18px rgba(255,210,80,.28);
}

.siteSub{
  margin-top:10px;
  font-size:clamp(24px,6.5vw,42px);
  font-weight:900;
  color:#fff3c4;
  line-height:1.35;
}

.card{
  margin:22px 0;
  padding:26px 16px;
  border-radius:30px;
  border:3px solid #d6b73c;
  background:
    radial-gradient(circle at 50% 0%,rgba(255,224,120,.18),rgba(0,0,0,0) 45%),
    rgba(20,20,20,.94);
  box-shadow:
    0 0 0 1px rgba(255,230,150,.10) inset,
    0 12px 28px rgba(0,0,0,.42);
}

.cardTitle{
  margin:0 0 14px;
  font-size:clamp(30px,8.4vw,54px);
  font-weight:900;
  text-align:center;
  line-height:1.25;
  color:#ffdf72;
  text-shadow:
    0 4px 4px rgba(0,0,0,.9),
    0 0 18px rgba(255,210,80,.28);
}

.cardText{
  margin:0 0 18px;
  font-size:clamp(20px,5.5vw,34px);
  font-weight:900;
  line-height:1.55;
  color:#fff3c4;
  text-align:center;
}

.bigNumber{
  margin:8px 0 10px;
  font-size:clamp(54px,16vw,98px);
  font-weight:900;
  text-align:center;
  color:#ffdf72;
  text-shadow:
    0 5px 5px rgba(0,0,0,.9),
    0 0 20px rgba(255,210,80,.28);
}

.smallNote{
  margin:12px 0 0;
  font-size:clamp(15px,4.2vw,24px);
  line-height:1.7;
  color:#d9c886;
  text-align:center;
  font-weight:800;
}

.statusBox{
  margin:18px 0;
  padding:18px 14px;
  border-radius:20px;
  background:rgba(0,0,0,.34);
  border:1px solid rgba(255,220,140,.34);
  font-size:clamp(18px,4.8vw,28px);
  font-weight:900;
  line-height:1.65;
  color:#fff3c4;
  text-align:center;
  white-space:pre-wrap;
}

.menuGrid{
  display:grid;
  gap:14px;
  margin-top:18px;
}

.btnArea{
  display:grid;
  gap:12px;
  margin-top:18px;
}

.btn,
.linkBtn{
  width:100%;
  min-height:70px;
  border:none;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:clamp(20px,5.5vw,34px);
  font-weight:900;
  letter-spacing:.02em;
  color:#fff;
  cursor:pointer;
  text-align:center;
  box-shadow:
    0 7px 0 rgba(0,0,0,.32),
    0 13px 22px rgba(0,0,0,.34);
}

.btn:disabled{
  opacity:.55;
}

.goldBtn{
  background:linear-gradient(180deg,#ffe27a,#c79218);
  color:#251400;
}

.greenBtn{
  background:linear-gradient(180deg,#35df86,#19b75e);
}

.blueBtn{
  background:linear-gradient(180deg,#1688ff,#075ec9);
}

.grayBtn{
  background:linear-gradient(180deg,#7f9aa8,#5f7d8d);
}

.blackBtn{
  background:linear-gradient(180deg,#232323,#050505);
}

.closeSectionBtn{
  margin-top:20px;
}

.inputLabel{
  display:block;
  margin:18px 0 8px;
  font-size:clamp(17px,4.6vw,28px);
  font-weight:900;
  color:#ffdf72;
}

.input,
.textarea{
  width:100%;
  border:none;
  border-radius:18px;
  padding:18px 16px;
  background:#fff;
  color:#111;
  font-size:clamp(18px,4.8vw,28px);
  font-weight:800;
  outline:none;
}

.textarea{
  min-height:150px;
  resize:vertical;
  line-height:1.6;
}

.list{
  display:grid;
  gap:18px;
  margin-top:18px;
}

.item{
  padding:22px 18px;
  border-radius:24px;
  border:1px solid rgba(255,220,95,.40);
  background:rgba(0,0,0,.30);
}

.itemTitle{
  margin:0 0 10px;
  font-size:clamp(22px,6vw,36px);
  font-weight:900;
  color:#ffdf72;
  line-height:1.45;
}

.itemDate{
  margin:0 0 14px;
  font-size:clamp(15px,4.2vw,24px);
  color:#c7b77a;
  line-height:1.5;
  font-weight:700;
}

.itemBody{
  margin:0;
  font-size:clamp(18px,5vw,30px);
  line-height:1.75;
  color:#fff;
  font-weight:700;
  white-space:pre-wrap;
}

.itemImage{
  display:block;
  width:100%;
  height:auto;
  margin:14px 0 0;
  border-radius:18px;
  border:1px solid rgba(255,220,95,.50);
  background:#000;
}

.footer{
  margin-top:32px;
  padding:18px 0 0;
  text-align:center;
  font-size:14px;
  line-height:1.7;
  color:#c7b77a;
}

@media(max-width:480px){
  .wrap{
    padding:20px 12px 46px;
  }

  .card{
    padding:24px 14px;
    border-radius:28px;
  }

  .btn,
  .linkBtn{
    min-height:68px;
    border-radius:22px;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <header class="hero">
    <div class="logoBox">
      <img src="logo.png" alt="田子山富士">
    </div>

    <h1 class="siteTitle">
      田子山富士
    </h1>

    <div class="siteSub">
      168の縁プロジェクト
    </div>
  </header>

  <section class="card">
    <h2 class="cardTitle">
      参加人数
    </h2>

    <div class="bigNumber" id="participants">
      --
    </div>

    <div class="smallNote">
      登頂受付された人数を表示しています
    </div>
  </section>

  <section class="card" id="climbCard">
    <h2 class="cardTitle">
      ⛩️ 登頂受付
    </h2>

    <p class="cardText" id="climbMessage">
      登頂受付は<br>
      <strong>山頂に設置されたQRコード</strong><br>
      からご利用ください。
    </p>

    <div class="statusBox hidden" id="climbStatus">
      登頂情報を確認しています...
    </div>

    <div class="btnArea">
      <a
        id="certificateBtn"
        class="linkBtn greenBtn hidden"
        href="certificate.html">
        登頂記念証を受け取る
      </a>
    </div>
  </section>

  <section class="card">
    <h2 class="cardTitle">
      メニュー
    </h2>

    <p class="cardText">
      使いたい項目を<br>
      選んでください。
    </p>

    <div class="menuGrid">
      <a
        id="omikujiLink"
        class="linkBtn goldBtn"
        href="omikuji.html">
        開運おみくじ
      </a>

      <button class="btn blueBtn" onclick="openSection('newsSection')">
        お知らせ
      </button>

      <button class="btn greenBtn" onclick="openSection('kichoSection')">
        参拝記帳
      </button>

      <button class="btn grayBtn" onclick="openSection('goenSection')">
        ご縁帳
      </button>

      <a class="linkBtn blackBtn" href="access.html">
        田子山富士への行き方
      </a>
    </div>
  </section>

  <section class="card hidden" id="newsSection">
    <h2 class="cardTitle">
      お知らせ
    </h2>

    <div class="list" id="newsList">
      <div class="item">
        <p class="itemBody">
          お知らせを読み込み中です。
        </p>
      </div>
    </div>

    <button class="btn blackBtn closeSectionBtn" onclick="closeSection('newsSection')">
      閉じる
    </button>
  </section>

  <section class="card hidden" id="kichoSection">
    <h2 class="cardTitle">
      参拝記帳
    </h2>

    <p class="cardText">
      田子山富士への想いを<br>
      ご縁帳に残せます。
    </p>

    <label class="inputLabel" for="kichoArea">
      どこから来ましたか
    </label>

    <select id="kichoArea" class="input">
      <option value="">選択してください</option>
      <option value="志木市">志木市</option>
      <option value="朝霞市">朝霞市</option>
      <option value="新座市">新座市</option>
      <option value="和光市">和光市</option>
      <option value="富士見市">富士見市</option>
      <option value="ふじみ野市">ふじみ野市</option>
      <option value="さいたま市">さいたま市</option>
      <option value="東京都">東京都</option>
      <option value="埼玉県内">埼玉県内</option>
      <option value="その他">その他</option>
    </select>

    <label class="inputLabel" for="kichoName">
      お名前
    </label>

    <input
      id="kichoName"
      class="input"
      type="text"
      placeholder="匿名でも大丈夫です">

    <label class="inputLabel" for="kichoMessage">
      メッセージ
    </label>

    <textarea
      id="kichoMessage"
      class="textarea"
      placeholder="参拝の記録やひとことを書いてください"></textarea>

    <div class="btnArea">
      <button class="btn greenBtn" id="kichoBtn" onclick="saveKicho()">
        記帳する
      </button>
    </div>

    <button class="btn blackBtn closeSectionBtn" onclick="closeSection('kichoSection')">
      閉じる
    </button>
  </section>

  <section class="card hidden" id="goenSection">
    <h2 class="cardTitle">
      ご縁帳
    </h2>

    <p class="cardText">
      田子山富士に集まった<br>
      ご縁の記録です。
    </p>

    <div class="list" id="goenList">
      <div class="item">
        <p class="itemBody">
          ご縁帳を読み込み中です。
        </p>
      </div>
    </div>

    <button class="btn blackBtn closeSectionBtn" onclick="closeSection('goenSection')">
      閉じる
    </button>
  </section>

  <footer class="footer">
    田子山富士 168の縁プロジェクト<br>
    登頂記念・ご縁帳・おみくじ
  </footer>

</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzQHiV6CPqv-szRz9EjwWdTsKGXmC8oPtLM6fQsyU-lF8AWXEsN5PG_14b6awu2Esk1/exec";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

const OMIKUJI_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

let currentUserId =
"";

let newsLoaded =
false;

let goenLoaded =
false;

window.addEventListener("load",init);

async function init(){
  const urlUserId =
  getUserIdFromUrl();

  if(urlUserId){
    currentUserId =
    urlUserId;

    localStorage.setItem("tagoyamaUserId",urlUserId);
    localStorage.setItem("tagoyamaFujiUserId",urlUserId);
  }else{
    currentUserId =
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    "";
  }

  updateUserLinks();

  await loadStats();
  await handleClimb();

  const params =
  new URLSearchParams(location.search);

  if(params.get("open") === "news"){
    setTimeout(function(){
      openSection("newsSection");
    },300);
  }

  if(params.get("open") === "goen"){
    setTimeout(function(){
      openSection("goenSection");
    },300);
  }

  if(params.get("open") === "kicho"){
    setTimeout(function(){
      openSection("kichoSection");
    },300);
  }
}

function getUserIdFromUrl(){
  const params =
  new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    ""
  );
}

function updateUserLinks(){
  const omikujiLink =
  document.getElementById("omikujiLink");

  if(omikujiLink){
    if(currentUserId){
      omikujiLink.href =
      OMIKUJI_PAGE +
      "?userId=" +
      encodeURIComponent(currentUserId) +
      "&v=" +
      Date.now();
    }else{
      omikujiLink.href =
      "omikuji.html?v=" +
      Date.now();
    }
  }
}

async function handleClimb(){
  const urlUserId =
  getUserIdFromUrl();

  const climbMessage =
  document.getElementById("climbMessage");

  const climbStatus =
  document.getElementById("climbStatus");

  const certificateBtn =
  document.getElementById("certificateBtn");

  if(!urlUserId){
    if(certificateBtn){
      certificateBtn.classList.add("hidden");
    }

    return;
  }

  if(climbMessage){
    climbMessage.innerHTML =
    "登頂受付を<br><strong>確認しています</strong>";
  }

  if(climbStatus){
    climbStatus.classList.remove("hidden");
    climbStatus.innerText =
    "登頂記録を保存しています...";
  }

  try{
    const data =
    await getJson(
      GAS_URL +
      "?mode=saveClimb" +
      "&userId=" +
      encodeURIComponent(urlUserId) +
      "&t=" +
      Date.now()
    );

    if(!data || data.success === false){
      throw new Error(
        data && data.message
        ? data.message
        : "登頂記録に失敗しました"
      );
    }

    const count =
    data.climbCount ||
    data.count ||
    "";

    const serial =
    data.serialNo ||
    data.serial ||
    data.certificateNo ||
    "";

    if(climbMessage){
      climbMessage.innerHTML =
      "おめでとうございます。<br>" +
      "<strong>登頂受付が完了しました。</strong>";
    }

    let statusText =
    "第" +
    escapeHtml(count) +
    "回 登頂記念<br>" +
    "No." +
    escapeHtml(serial);

    if(data.alreadyClimbedToday === true){
      statusText +=
      "<br>本日の登頂受付は完了しています";
    }

    if(climbStatus){
      climbStatus.innerHTML =
      statusText;
    }

    if(certificateBtn){
      certificateBtn.href =
      CERTIFICATE_PAGE +
      "?userId=" +
      encodeURIComponent(urlUserId) +
      "&climbCount=" +
      encodeURIComponent(count) +
      "&serialNo=" +
      encodeURIComponent(serial) +
      "&v=" +
      Date.now();

      certificateBtn.classList.remove("hidden");
    }

    currentUserId =
    urlUserId;

    localStorage.setItem("tagoyamaUserId",urlUserId);
    localStorage.setItem("tagoyamaFujiUserId",urlUserId);

    updateUserLinks();
    await loadStats();

  }catch(err){
    if(climbMessage){
      climbMessage.innerHTML =
      "登頂受付で<br><strong>エラーが発生しました</strong>";
    }

    if(climbStatus){
      climbStatus.innerText =
      err && err.message
      ? err.message
      : "もう一度QRコードからお試しください";
    }

    if(certificateBtn){
      certificateBtn.classList.add("hidden");
    }
  }
}

async function loadStats(){
  const el =
  document.getElementById("participants");

  if(!el){
    return;
  }

  try{
    const data =
    await getJson(
      GAS_URL +
      "?mode=stats&t=" +
      Date.now()
    );

    if(data && data.success){
      const n =
      Number(
        data.participants ||
        data.count ||
        data.total ||
        0
      );

      if(Number.isFinite(n) && n >= 0){
        el.innerText =
        String(n);

        return;
      }
    }

    el.innerText =
    "--";

  }catch(e){
    el.innerText =
    "--";
  }
}

function openSection(id){
  closeAllSections();

  const section =
  document.getElementById(id);

  if(!section){
    return;
  }

  section.classList.remove("hidden");

  if(id === "newsSection"){
    loadNews();
  }

  if(id === "goenSection"){
    loadGoen();
  }

  setTimeout(function(){
    section.scrollIntoView({
      behavior:"smooth",
      block:"start"
    });
  },80);
}

function closeAllSections(){
  [
    "newsSection",
    "kichoSection",
    "goenSection"
  ].forEach(function(id){
    const el =
    document.getElementById(id);

    if(el){
      el.classList.add("hidden");
    }
  });
}

function closeSection(id){
  const el =
  document.getElementById(id);

  if(el){
    el.classList.add("hidden");
  }
}

async function loadNews(){
  const list =
  document.getElementById("newsList");

  if(!list){
    return;
  }

  if(newsLoaded){
    return;
  }

  list.innerHTML =
  '<div class="item"><p class="itemBody">お知らせを読み込み中です。</p></div>';

  try{
    const data =
    await getJson(
      GAS_URL +
      "?mode=news&t=" +
      Date.now()
    );

    const rows =
    getArrayRows(data);

    if(!rows || rows.length === 0){
      list.innerHTML =
      '<div class="item"><p class="itemBody">現在、お知らせはありません。</p></div>';

      newsLoaded =
      true;

      return;
    }

    let html =
    "";

    rows.forEach(function(item){
      const title =
      getFirst(
        item.title,
        item.タイトル,
        item.name,
        item.件名
      );

      const body =
      getFirst(
        item.body,
        item.message,
        item.text,
        item.本文,
        item.内容
      );

      const date =
      formatDate(
        getFirst(
          item.date,
          item.datetime,
          item.createdAt,
          item.日時,
          item.日付
        )
      );

      const imageUrl =
      normalizeImageUrl(
        getFirst(
          item.imageUrl,
          item.image,
          item.画像URL,
          item.画像
        )
      );

      if(!title && !body){
        return;
      }

      html +=
      '<div class="item">' +
      '<h3 class="itemTitle">' +
      escapeHtml(title || "お知らせ") +
      '</h3>' +
      '<div class="itemDate">' +
      escapeHtml(date) +
      '</div>' +
      '<p class="itemBody">' +
      escapeHtml(body) +
      '</p>' +
      (
        imageUrl
        ? '<img class="itemImage" src="' + escapeHtml(imageUrl) + '" alt="">'
        : ''
      ) +
      '</div>';
    });

    list.innerHTML =
    html ||
    '<div class="item"><p class="itemBody">現在、お知らせはありません。</p></div>';

    newsLoaded =
    true;

  }catch(e){
    list.innerHTML =
    '<div class="item"><p class="itemBody">お知らせを読み込めませんでした。</p></div>';
  }
}

async function saveKicho(){
  const area =
  getString(document.getElementById("kichoArea").value);

  const name =
  getString(document.getElementById("kichoName").value);

  const message =
  getString(document.getElementById("kichoMessage").value);

  const btn =
  document.getElementById("kichoBtn");

  if(!area){
    alert("どこから来たかを選んでください。");
    return;
  }

  if(!message){
    alert("メッセージを書いてください。");
    return;
  }

  btn.disabled =
  true;

  btn.style.opacity =
  ".55";

  btn.innerText =
  "記帳しています...";

  try{
    const url =
    GAS_URL +
    "?mode=saveKicho" +
    "&area=" +
    encodeURIComponent(area) +
    "&name=" +
    encodeURIComponent(name) +
    "&message=" +
    encodeURIComponent(message) +
    "&imageUrl=" +
    encodeURIComponent("") +
    "&t=" +
    Date.now();

    const data =
    await getJson(url);

    if(!data || data.success === false){
      throw new Error(
        data && data.message
        ? data.message
        : "記帳できませんでした"
      );
    }

    alert("記帳しました。");

    document.getElementById("kichoName").value =
    "";

    document.getElementById("kichoMessage").value =
    "";

    goenLoaded =
    false;

  }catch(e){
    alert(
      e && e.message
      ? e.message
      : "記帳できませんでした。"
    );
  }finally{
    btn.disabled =
    false;

    btn.style.opacity =
    "1";

    btn.innerText =
    "記帳する";
  }
}

async function loadGoen(){
  const list =
  document.getElementById("goenList");

  if(!list){
    return;
  }

  if(goenLoaded){
    return;
  }

  list.innerHTML =
  '<div class="item"><p class="itemBody">ご縁帳を読み込み中です。</p></div>';

  try{
    const data =
    await getJson(
      GAS_URL +
      "?mode=goen&t=" +
      Date.now()
    );

    const rows =
    getArrayRows(data);

    if(!rows || rows.length === 0){
      list.innerHTML =
      '<div class="item"><p class="itemBody">まだご縁の記録はありません。</p></div>';

      goenLoaded =
      true;

      return;
    }

    let html =
    "";

    rows.forEach(function(item){
      const area =
      getFirst(
        item.area,
        item.place,
        item.地域,
        item.場所,
        item.from
      );

      const name =
      getFirst(
        item.name,
        item.nickname,
        item.名前,
        item.お名前
      );

      const message =
      getFirst(
        item.message,
        item.body,
        item.text,
        item.メッセージ,
        item.本文
      );

      const date =
      formatDate(
        getFirst(
          item.date,
          item.datetime,
          item.createdAt,
          item.timestamp,
          item.日時,
          item.日付
        )
      );

      const imageUrl =
      normalizeImageUrl(
        getFirst(
          item.imageUrl,
          item.image,
          item.画像URL,
          item.画像
        )
      );

      if(!message){
        return;
      }

      html +=
      '<div class="item">' +
      '<h3 class="itemTitle">' +
      escapeHtml(area || "ご縁の記録") +
      (
        name
        ? '　' + escapeHtml(name)
        : ''
      ) +
      '</h3>' +
      '<div class="itemDate">' +
      escapeHtml(date) +
      '</div>' +
      '<p class="itemBody">' +
      escapeHtml(message) +
      '</p>' +
      (
        imageUrl
        ? '<img class="itemImage" src="' + escapeHtml(imageUrl) + '" alt="">'
        : ''
      ) +
      '</div>';
    });

    list.innerHTML =
    html ||
    '<div class="item"><p class="itemBody">まだご縁の記録はありません。</p></div>';

    goenLoaded =
    true;

  }catch(e){
    list.innerHTML =
    '<div class="item"><p class="itemBody">ご縁帳を読み込めませんでした。</p></div>';
  }
}

async function getJson(url){
  try{
    return await fetchJson(url,12000);
  }catch(error){
    return await jsonp(url,15000);
  }
}

async function fetchJson(url,timeoutMs){
  const controller =
  new AbortController();

  const timer =
  setTimeout(function(){
    controller.abort();
  },timeoutMs || 12000);

  try{
    const res =
    await fetch(
      url,
      {
        method:"GET",
        cache:"no-store",
        signal:controller.signal
      }
    );

    const text =
    await res.text();

    if(!res.ok){
      throw new Error("通信エラー");
    }

    try{
      return JSON.parse(text);
    }catch(e){}

    const match =
    text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

    if(match && match[1]){
      return JSON.parse(match[1]);
    }

    throw new Error("JSONではありません");

  }finally{
    clearTimeout(timer);
  }
}

function jsonp(url,timeoutMs){
  return new Promise(function(resolve,reject){
    const callbackName =
    "__tagoyamaIndexCallback_" +
    Date.now() +
    "_" +
    Math.floor(Math.random() * 100000);

    const sep =
    url.indexOf("?") >= 0
    ? "&"
    : "?";

    const script =
    document.createElement("script");

    let done =
    false;

    const timer =
    setTimeout(function(){
      cleanup();
      reject(new Error("JSONP timeout"));
    },timeoutMs || 15000);

    function cleanup(){
      if(done){
        return;
      }

      done =
      true;

      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(e){
        window[callbackName] =
        undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }

    window[callbackName] =
    function(data){
      cleanup();
      resolve(data);
    };

    script.onerror =
    function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src =
    url +
    sep +
    "callback=" +
    encodeURIComponent(callbackName);

    document.body.appendChild(script);
  });
}

function getArrayRows(data){
  if(!data){
    return [];
  }

  if(Array.isArray(data.items)){
    return data.items;
  }

  if(Array.isArray(data.rows)){
    return data.rows;
  }

  if(Array.isArray(data.goen)){
    return data.goen;
  }

  if(Array.isArray(data.news)){
    return data.news;
  }

  if(Array.isArray(data.history)){
    return data.history;
  }

  if(Array.isArray(data.data)){
    return data.data;
  }

  return [];
}

function getFirst(){
  for(let i=0;i<arguments.length;i++){
    const value =
    getString(arguments[i]);

    if(value){
      return value;
    }
  }

  return "";
}

function normalizeImageUrl(value){
  let url =
  getString(value);

  if(!url){
    return "";
  }

  url =
  url
  .replace(/\\u003d/g,"=")
  .replace(/\\u0026/g,"&")
  .replace(/\\\//g,"/")
  .replace(/&amp;/g,"&")
  .replace(/[),.;]+$/g,"")
  .trim();

  if(url.indexOf("drive.google.com/thumbnail") >= 0){
    return url;
  }

  let match =
  url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);

  if(match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1200";
  }

  match =
  url.match(/[?&]id=([^&]+)/);

  if(url.indexOf("drive.google.com") >= 0 && match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1200";
  }

  return url;
}

function formatDate(value){
  value =
  getString(value);

  if(!value){
    return "";
  }

  if(value.indexOf("GMT") >= 0 || value.indexOf("標準時") >= 0){
    const d =
    new Date(value);

    if(!isNaN(d.getTime())){
      return d.getFullYear() +
      "/" +
      String(d.getMonth() + 1).padStart(2,"0") +
      "/" +
      String(d.getDate()).padStart(2,"0") +
      " " +
      String(d.getHours()).padStart(2,"0") +
      ":" +
      String(d.getMinutes()).padStart(2,"0");
    }
  }

  return value
  .replace("T15:00:00.000Z","")
  .replace("T00:00:00.000Z","")
  .replace(/-/g,"/");
}

function escapeHtml(value){
  return getString(value)
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;")
  .replace(/'/g,"&#039;");
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
