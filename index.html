<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>田子山富士168の縁</title>

<style>

body{
margin:0;
padding:20px;
background:#f5f5f5;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
}

.wrap{
max-width:700px;
margin:auto;
}

.card{
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:
0 4px 20px rgba(0,0,0,.1);
}

.title{
font-size:32px;
font-weight:900;
text-align:center;
margin-bottom:20px;
}

.count{
font-size:24px;
font-weight:900;
text-align:center;
margin-bottom:20px;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:900;
margin-top:10px;
cursor:pointer;
}

.climb{
background:#2ecc71;
color:#fff;
}

.news{
background:#3498db;
color:#fff;
}

.omikuji{
background:#9b59b6;
color:#fff;
}

.goen{
background:#f39c12;
color:#fff;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="title">
田子山富士168の縁
</div>

<div
id="count"
class="count">
読込中...
</div>

<button
class="btn climb"
onclick="climb()">
登頂受付
</button>

<button
class="btn news"
onclick="location.href='news.html'">
お知らせ
</button>

<button
class="btn omikuji"
onclick="location.href='omikuji.html'">
おみくじ
</button>

<button
class="btn goen"
onclick="location.href='kicho.html'">
ご縁帳
</button>

</div>

</div>

<script>

const GAS_URL =
"あなたのGAS";

const userId =
localStorage.getItem(
"userId"
);

async function loadStats(){

const res =
await fetch(
GAS_URL +
"?mode=stats"
);

const data =
await res.json();

document.getElementById(
"count"
).innerText =
"参加人数 " +
(data.total || 0) +
"名";

}

async function climb(){

try{

const res =
await fetch(
GAS_URL +
"?userId=" +
encodeURIComponent(
userId
)
);

const data =
await res.json();

if(
!data.success
){

alert(
"登頂記録失敗"
);

return;

}

sessionStorage.setItem(
"latestSerial",
data.serial
);

sessionStorage.setItem(
"latestImageUrl",
data.imageUrl
);

sessionStorage.setItem(
"latestClimbDate",
data.climbDate
);

localStorage.setItem(
"latestSerial",
data.serial
);

localStorage.setItem(
"latestImageUrl",
data.imageUrl
);

localStorage.setItem(
"latestClimbDate",
data.climbDate
);

location.href =
"certificate.html" +
"?serial=" +
encodeURIComponent(
data.serial
) +
"&imageUrl=" +
encodeURIComponent(
data.imageUrl
) +
"&climbDate=" +
encodeURIComponent(
data.climbDate
);

}catch(err){

alert(
"通信エラー"
);

console.log(
err
);

}

}

loadStats();

</script>

</body>
</html>
