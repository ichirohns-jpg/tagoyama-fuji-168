<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

const HOME_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

const OMIKUJI_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

let currentUserId = "";
let climbData = null;

document.addEventListener("DOMContentLoaded", function() {
  initIndexPage();
});

async function initIndexPage() {
  currentUserId = getUserIdFromUrl();

  if (currentUserId) {
    localStorage.setItem("tagoyamaUserId", currentUserId);
    localStorage.setItem("tagoyamaFujiUserId", currentUserId);
  } else {
    currentUserId =
      localStorage.getItem("tagoyamaUserId") ||
      localStorage.getItem("tagoyamaFujiUserId") ||
      "";
  }

  updateMenuLinks();
  await loadParticipantCount();

  if (currentUserId) {
    await saveClimbAndPrepareCertificate(currentUserId);
  } else {
    setClimbStatus("山頂QRからアクセスすると、登頂記念証を受け取れます。");
    disableCertificateButton();
  }
}

function getUserIdFromUrl() {
  const params = new URLSearchParams(window.location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );
}

function updateMenuLinks() {
  const omikujiLink = document.getElementById("omikujiLink");

  if (omikujiLink) {
    omikujiLink.href =
      currentUserId
        ? "omikuji.html?userId=" + encodeURIComponent(currentUserId)
        : "omikuji.html";
  }
}

async function loadParticipantCount() {
  const countEl = document.getElementById("participantCount");

  try {
    const data = await tryManyJson([
      GAS_URL + "?stats=1&t=" + Date.now(),
      GAS_URL + "?mode=stats&t=" + Date.now(),
      GAS_URL + "?action=stats&t=" + Date.now(),
      GAS_URL + "?participant=1&t=" + Date.now()
    ]);

    const source = flattenObject(data);

    const count =
      normalizeNumberText(
        getFirst(
          source.participantNo,
          source.participantCount,
          source.participant,
          source.total,
          source.totalCount,
          source.count,
          source.people,
          source["参加人数"],
          source["参加者数"]
        )
      );

    if (countEl) {
      countEl.innerText = count || "--";
    }
  } catch (error) {
    console.warn(error);

    if (countEl) {
      countEl.innerText = "--";
    }
  }
}

async function saveClimbAndPrepareCertificate(userId) {
  setClimbStatus("登頂情報を確認しています...");

  try {
    const data = await tryManyJson([
      GAS_URL + "?userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?saveClimb=1&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?mode=saveClimb&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
      GAS_URL + "?action=saveClimb&userId=" + encodeURIComponent(userId) + "&t=" + Date.now()
    ]);

    climbData = normalizeClimbData(data, userId);

    if (!climbData.userId) {
      climbData.userId = userId;
    }

    saveClimbLocal(climbData);
    enableCertificateButton(climbData);
    updateMenuLinks();

    const participant =
      getFirst(climbData.participantNo, climbData.participantCount);

    if (participant) {
      const countEl = document.getElementById("participantCount");
      if (countEl) {
        countEl.innerText = participant;
      }
    }

    setClimbStatus(
      "登頂受付が完了しました。\n登頂記念証を受け取れます。"
    );
  } catch (error) {
    console.error(error);

    const local = loadClimbLocal();

    if (local && local.userId) {
      climbData = local;
      enableCertificateButton(climbData);
      setClimbStatus(
        "前回の登頂情報を表示しています。\n登頂記念証を受け取れます。"
      );
    } else {
      disableCertificateButton();
      setClimbStatus(
        "登頂情報を確認できませんでした。\n通信状況を確認して、山頂QRからもう一度お試しください。"
      );
    }
  }
}

function normalizeClimbData(data, userId) {
  const source = flattenObject(data);

  return {
    userId: getFirst(source.userId, source.uid, userId),
    climbCount: normalizeNumberText(
      getFirst(
        source.climbCount,
        source.count,
        source.times,
        source.climb_count,
        source.climb
      )
    ),
    serialNo: cleanSerialNo(
      getFirst(
        source.serialNo,
        source.serial,
        source.no,
        source.serial_no,
        source.number
      )
    ),
    lastDate: getFirst(
      source.lastDate,
      source.date,
      source.climbDate,
      source.last_date,
      source.createdAt
    ),
    imageNo: getFirst(source.imageNo, source.image_no),
    imageName: getFirst(source.imageName, source.image_name, source.title, source.name),
    imageUrl: getFirst(
      source.imageUrl,
      source.certificateImageUrl,
      source.certificateUrl,
      source.image,
      source.imgUrl,
      source.img,
      source.url
    ),
    participantNo: normalizeNumberText(
      getFirst(
        source.participantNo,
        source.participant,
        source.participant_no,
        source.participantCount,
        source.people,
        source.total,
        source.totalCount
      )
    )
  };
}

function enableCertificateButton(data) {
  const btn = document.getElementById("certificateBtn");

  if (!btn) {
    return;
  }

  btn.href = buildCertificateUrl(data);
  btn.classList.remove("disabled");
}

function disableCertificateButton() {
  const btn = document.getElementById("certificateBtn");

  if (!btn) {
    return;
  }

  btn.href = "certificate.html";
  btn.classList.add("disabled");
}

function buildCertificateUrl(data) {
  data = data || {};
  const params = new URLSearchParams();

  if (data.userId) {
    params.set("userId", data.userId);
  }

  if (data.climbCount) {
    params.set("climbCount", data.climbCount);

  }

  }

    const params = new URLSearchParams();
    params.set("area", area);
    params.set("from", area);
    params.set("name", name || "匿名");
    params.set("message", message);
    params.set("userId", currentUserId || "");

    if (btn) {

function removeHeaderRow(list) {
  if (!Array.isArray(list)) {
    return [];
  }

  return list.filter(function(row, index) {
    if (!row) {
      return false;
    }

    if (index === 0 && Array.isArray(row)) {
      const joined = row.join("");

      if (
        joined.indexOf("日時") >= 0 ||
        joined.indexOf("日付") >= 0 ||
        joined.indexOf("名前") >= 0 ||
        joined.indexOf("メッセージ") >= 0 ||
        joined.indexOf("タイトル") >= 0
      ) {
        return false;
      }
    }

    return true;
  });
}

function objectValuesAsList(data, keys) {
  const values = Object.values(data || {});

  return values.filter(function(value) {
    if (!value || typeof value !== "object") {
      return false;
    }

    return keys.some(function(key) {
      return value[key];
    });
  });
}

function flattenObject(data) {
  data = data || {};

  const nested =
    data.data && typeof data.data === "object" && !Array.isArray(data.data)
      ? data.data
      : {};

  return Object.assign({}, data, nested);
}

  }

  if (data.data && Array.isArray(data.data.list)) {
    return data.data.list;
  }

  if (data.data && Array.isArray(data.data.rows)) {
    return data.data.rows;
  }

  if (data.data && Array.isArray(data.data.items)) {
    return data.data.items;
  }

  return [];
}

async function tryManyJson(urls) {
  let lastError = null;

  for (let i = 0; i < urls.length; i++) {
    try {
      const data = await getJson(urls[i]);

      if (data !== null && data !== undefined) {
        return data;
      }
    } catch (error) {
      lastError = error;
    }
  }

  throw lastError || new Error("通信に失敗しました。");
}

async function getJson(url) {
  try {
    const res = await fetch(url, {
      method: "GET",
      cache: "no-store"
    });

    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    return parseJsonText(text);
  } catch (fetchError) {
    return await getJsonp(url);
  }
}

function parseJsonText(text) {
  const value = String(text || "").trim();

  if (!value) {
    throw new Error("empty response");
  }

  try {
    return JSON.parse(value);
  } catch (error) {
    const start = value.indexOf("{");
    const end = value.lastIndexOf("}");

    if (start >= 0 && end > start) {
      return JSON.parse(value.substring(start, end + 1));
    }

    throw error;
  }
}

function getJsonp(url) {
  return new Promise(function(resolve, reject) {
    const callbackName =
      "tagoyamaIndexCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script = document.createElement("script");
    const sep = url.indexOf("?") >= 0 ? "&" : "?";

    const timer = setTimeout(function() {
      cleanup();
      reject(new Error("JSONP timeout"));
    }, 12000);

    window[callbackName] = function(data) {
      cleanup();
      resolve(data);
    };

    script.onerror = function() {
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
    document.body.appendChild(script);

    function cleanup() {
      clearTimeout(timer);

      try {
        delete window[callbackName];
      } catch (error) {
        window[callbackName] = undefined;
      }

      if (script.parentNode) {
        script.parentNode.removeChild(script);
      }
    }
  });
}

function normalizeNumberText(value) {
  const text = toHalfWidthNumber(getString(value));
  const match = text.match(/[0-9]+/);

  if (match && match[0]) {
    return match[0];
  }

  return "";
}

function cleanSerialNo(value) {
  return toHalfWidthNumber(getString(value))
    .replace(/^No\./i, "")
    .replace(/^No/i, "")
    .replace(/^記念番号/, "")
    .trim();
}

function formatDateText(value) {
  const text = getString(value);

  if (!text) {
    return "";
  }

  return text
    .replace(/-/g, "/")
    .replace(/\./g, "/")
    .replace(/\s.*$/, "");
}

function toHalfWidthNumber(value) {
  return getString(value).replace(/[０-９]/g, function(s) {
    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  });
}

function getString(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value).trim();
}

function getFirst() {
  for (let i = 0; i < arguments.length; i++) {
    const value = getString(arguments[i]);

    if (value) {
      return value;
    }
  }

  return "";
}
