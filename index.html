<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>田子山富士 168の縁</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:
"Hiragino Sans",
"Yu Gothic",
"Meiryo",
sans-serif;
color:#fff;
}

.hero{
width:100%;
background:#000;
}

.hero img{
width:100%;
display:block;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:
linear-gradient(
180deg,
#1c1c1c,
#0f0f0f
);
border:2px solid #d4af37;
border-radius:28px;
padding:28px;
text-align:center;
box-shadow:
0 12px 32px rgba(0,0,0,.45);
}

.logo{
width:170px;
max-width:75%;
display:block;
margin:0 auto 20px;
border-radius:22px;
}

.project{
font-size:18px;
font-weight:800;
color:#d4af37;
margin-bottom:10px;
}

.title{
font-size:44px;
font-weight:900;
letter-spacing:2px;
margin-bottom:8px;
}

.sub{
font-size:22px;
font-weight:800;
color:#d4af37;
margin-bottom:24px;
}

.loading{
font-size:26px;
font-weight:900;
padding:60px 0;
color:#d4af37;
}

.serialBox{
background:
linear-gradient(
135deg,
#000,
#232323
);
border:2px solid #d4af37;
border-radius:24px;
padding:24px;
margin-bottom:20px;
}

.serialLabel{
font-size:20px;
color:#d4af37;
margin-bottom:10px;
font-weight:800;
}

.serial{
font-size:58px;
font-weight:900;
letter-spacing:4px;
}

.count{
font-size:28px;
font-weight:900;
margin-top:20px;
margin-bottom:10px;
}

.statsBox{
margin-top:20px;
padding:20px;
border-radius:24px;
background:#161616;
border:2px solid #d4af37;
}

.statsTitle{
font-size:20px;
font-weight:900;
color:#d4af37;
}

.participants{
font-size:48px;
font-weight:900;
margin-top:8px;
margin-bottom:8px;
}

.statsSub{
font-size:16px;
color:#ccc;
}

.date{
font-size:18px;
color:#ddd;
margin-bottom:20px;
}

.gachaCard{
background:
linear-gradient(
135deg,
#3f2c00,
#6d4c00
);
border:2px solid #d4af37;
border-radius:24px;
padding:24px;
margin-top:25px;
margin-bottom:25px;
}

.gachaTitle{
font-size:28px;
font-weight:900;
color:#ffd700;
margin-bottom:10px;
}

.gachaResult{
font-size:34px;
font-weight:900;
color:#fff;
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:20px;
margin-top:14px;
font-size:24px;
font-weight:900;
cursor:pointer;
}

.save{
background:#2ecc71;
color:#fff;
}

.fb{
background:#1877f2;
color:#fff;
}

.x{
background:#000;
color:#fff;
}

.line{
background:#06c755;
color:#fff;
}

.copy{
background:#607d8b;
color:#fff;
}

.infoBox{
margin-top:30px;
padding:20px;
background:#181818;
border:1px solid #333;
border-radius:20px;
line-height:1.8;
font-size:18px;
text-align:left;
}

.footer{
margin-top:30px;
text-align:center;
color:#aaa;
font-size:16px;
}

</style>
</head>

<body>

<div class="hero">

<img
src="top.jpg"
alt="田子山富士">

</div>

<div class="wrap">

<div class="card">

<img
src="logo.png"
class="logo"
alt="田子山富士">

<div class="project">
主催：田子山富士保存会
</div>

<div class="title">
田子山富士
</div>

<div class="sub">
168の縁プロジェクト
</div>

<div
id="loading"
class="loading">

読み込み中...

</div>

<div
id="main"
style="display:none;">

<div class="serialBox">

<div class="serialLabel">
登頂記念
</div>

<div
id="serial"
class="serial">

1-0001

</div>

</div>

<div
id="count"
class="count">

あなたは1回目の登頂です

</div>

<div class="statsBox">

<div class="statsTitle">

現在の参加者

</div>

<div
id="participants"
class="participants">

0人

</div>

<div class="statsSub">

168の縁が広がっています

</div>

</div>

<div
id="date"
class="date">

2026/07/01

</div>

<div class="gachaCard">

<div class="gachaTitle">
🎁 縁ガチャ
</div>

<div
id="gacha"
class="gachaResult">

神使出現

</div>

</div>

<button
class="btn save"
onclick="saveImage()">

画像を保存

</button>

<button
class="btn fb"
onclick="shareFacebook()">

Facebook

</button>

<button
class="btn x"
onclick="shareX()">

X

</button>

<button
class="btn line"
onclick="shareLine()">

LINE

</button>

<button
class="btn copy"
onclick="copyUrl()">

リンクをコピー

</button>

<a
href="kicho.html"
class="btn save"
style="
display:block;
text-decoration:none;
text-align:center;
">

⛩️ 参拝記帳を書く

</a>

<a
href="goen.html"
class="btn copy"
style="
display:block;
text-decoration:none;
text-align:center;
">

📖 みんなのご縁帳

</a>

<a
href="news.html"
class="btn fb"
style="
display:block;
text-decoration:none;
text-align:center;
">

📢 お知らせ

</a>

<div class="infoBox">

敷島神社へご参拝いただき
ありがとうございます。

登頂記念の保存や共有のほか、
参拝記帳、ご縁帳、お知らせも
ぜひご覧ください。

</div>

</div>

</div>

<div class="footer">

田子山富士168の縁プロジェクト<br>
後援：いろは商店会

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbwjjPUfeiAtByPdHdgjKHV7iYFHxdpzPP-4xsfZ6Aj_ZEvsWGlPPj9xejY7wu72vTxTaQ/exec";

let userId =
localStorage.getItem(
"tagoyamaUserId"
);

if(!userId){

userId =
"TGF-" +
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

localStorage.setItem(
"tagoyamaUserId",
userId
);

}

fetch(
GAS_URL,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
userId:userId
})
}
)
.then(r=>r.json())
.then(data=>{

document.getElementById(
"loading"
).style.display =
"none";

document.getElementById(
"main"
).style.display =
"block";

document.getElementById(
"serial"
).innerText =
data.serial;

document.getElementById(
"count"
).innerText =
"あなたは " +
data.count +
" 回目の登頂です";

document.getElementById(
"gacha"
).innerText =
data.gacha;

fetch(
GAS_URL +
"?mode=stats"
)
.then(r=>r.json())
.then(stats=>{

if(stats.participants){

document.getElementById(
"participants"
).innerText =
stats.participants + "人";

}

});

const now =
new Date();

const dateText =
now.getFullYear() +
"/" +
String(now.getMonth()+1)
.padStart(2,"0") +
"/" +
String(now.getDate())
.padStart(2,"0");

document.getElementById(
"date"
).innerText =
dateText;

})
.catch(err=>{

document.getElementById(
"loading"
).innerHTML =
"通信エラー";

console.log(err);

});

async function saveImage(){

const target =
document.querySelector(
".card"
);

const canvas =
await html2canvas(
target,
{
scale:2
}
);

const link =
document.createElement(
"a"
);

link.download =
"168-no-en.png";

link.href =
canvas.toDataURL(
"image/png"
);

link.click();

}

function shareFacebook(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(
location.href
)
);

}

function shareX(){

window.open(
"https://twitter.com/intent/tweet?url=" +
encodeURIComponent(
location.href
)
);

}

function shareLine(){

window.open(
"https://social-plugins.line.me/lineit/share?url=" +
encodeURIComponent(
location.href
)
);

}

function copyUrl(){

navigator.clipboard.writeText(
location.href
);

alert(
"リンクをコピーしました"
);

}

</script>

</body>
</html>
