  <style>
    * {

    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:

    body {
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);

    .hero {

    .logoBox {

    }

    .logoBox img {
      display: block;
      width: 100%;
      height: auto;
    }

    .siteTitle {
      margin: 0;
      font-size: clamp(36px, 10vw, 68px);
      line-height: 1.16;
      font-weight: 900;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.92),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .siteSub {
      margin: 10px 0 0;
      font-size: clamp(20px, 5.5vw, 34px);
      line-height: 1.45;
      font-weight: 900;
      color: #fff3c4;
      text-shadow: 0 3px 3px rgba(0, 0, 0, 0.88);
    }

    .card {
      margin: 16px 0;
      padding: 20px 14px;
      border-radius: 28px;
      background:
        radial-gradient(circle at top, rgba(255, 224, 120, 0.16), rgba(0, 0, 0, 0) 46%),
        linear-gradient(180deg, rgba(44, 28, 0, 0.92), rgba(10, 10, 10, 0.94));
      border: 2px solid rgba(255, 220, 95, 0.58);
      box-shadow:
        0 0 0 1px rgba(255, 230, 150, 0.10) inset,
        0 12px 28px rgba(0, 0, 0, 0.42);
    }

    .cardTitle {
      margin: 0 0 14px;
      font-size: clamp(30px, 8.4vw, 54px);
      font-weight: 900;
      text-align: center;
      line-height: 1.25;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.90),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .lead {
      margin: 0 0 16px;
      color: #fff1bd;
      text-align: center;
      font-size: clamp(19px, 5.2vw, 32px);
      font-weight: 900;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .countBox {
      margin: 16px 0 0;
      padding: 18px 14px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.36);
      border: 2px solid rgba(255, 220, 95, 0.46);
      text-align: center;
    }

    .countLabel {
      margin: 0;
      font-size: clamp(20px, 5.6vw, 34px);
      font-weight: 900;
      color: #fff3c4;
      line-height: 1.4;
    }

    .countNumber {
      margin: 6px 0 0;
      font-size: clamp(54px, 16vw, 96px);
      font-weight: 900;
      color: #ffdf72;

    .statusBox {
      margin: 18px 0 0;

    .btnArea {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .btn,
    .linkBtn {
      width: 100%;
      min-height: 70px;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;

      min-height: 74px;
      font-size: clamp(18px, 4.8vw, 30px);

    .btn:active,

      transform: translateY(3px);

        0 8px 14px rgba(0, 0, 0, 0.32);

    .btn:disabled,
    .linkBtn.disabled {
      opacity: 0.50;

    .goldBtn {

    .itemBody {

    .formArea {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 2px solid rgba(255, 220, 95, 0.58);

      font-size: clamp(18px, 5vw, 28px);
      font-weight: 800;

    }

    .textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.55;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.82);
      padding: 18px 12px;
      overflow-y: auto;
    }

    .modal.show {
      display: block;
    }

    .modalInner {
      width: 100%;
      max-width: 760px;
      margin: 0 auto 40px;
      padding: 18px 14px 22px;
      border-radius: 28px;
      background:

        linear-gradient(180deg, rgba(44, 28, 0, 0.98), rgba(8, 8, 8, 0.98));

      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.55);
    }

    .closeBtn {
      margin-top: 16px;

      min-height: 64px;
      border: none;
      border-radius: 22px;
      background: linear-gradient(180deg, #323232 0%, #050505 100%);
      color: #ffffff;
      font-size: clamp(20px, 5.5vw, 32px);
      font-weight: 900;
    }

    .footer {
      margin: 28px 0 0;
      text-align: center;
      color: #c9b56b;
      font-weight: 800;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        border-radius: 26px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .btn,
      .linkBtn {
        min-height: 66px;
        border-radius: 22px;
      }

      .grid2 {
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <header class="hero">
      <div class="logoBox">
        <img
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"

          onerror="this.style.display='none'"

      </div>

      <h1 class="siteTitle">田子山富士</h1>

    <section class="card">

    <section class="card">

  <div class="modal" id="newsModal">
    <div class="modalInner">
      <h2 class="cardTitle">お知らせ</h2>
      <div id="newsList">
        <div class="item">
          <p class="itemBody">お知らせを読み込み中です。</p>

      </div>
      <button class="closeBtn" type="button" onclick="closeModal('newsModal')">閉じる</button>

  <div class="modal" id="kichoModal">

      <h2 class="cardTitle">参拝記帳</h2>

        田子山富士への想いを<br>

      <div class="formArea">
        <select class="select" id="kichoArea">
          <option value="">どこから来ましたか</option>
          <option value="志木市">志木市</option>
          <option value="朝霞市">朝霞市</option>

          <option value="和光市">和光市</option>
          <option value="富士見市">富士見市</option>
          <option value="ふじみ野市">ふじみ野市</option>
          <option value="さいたま市">さいたま市</option>
          <option value="東京都">東京都</option>
          <option value="埼玉県内">埼玉県内</option>

        <input class="input" id="kichoName" type="text" placeholder="お名前">

  <div class="modal" id="goenModal">
    <div class="modalInner">
      <h2 class="cardTitle">ご縁帳</h2>
      <p class="lead">
        田子山富士に集まった<br>
        ご縁の記録です。
      </p>

      <div id="goenList">
        <div class="item">
          <p class="itemBody">ご縁帳を読み込み中です。</p>
        </div>
      </div>

      <button class="closeBtn" type="button" onclick="closeModal('goenModal')">閉じる</button>
    </div>
  </div>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

    const SITE_BASE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

    const CERTIFICATE_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

    const OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

    let currentUserId = "";
    let currentClimbData = null;
    let newsLoaded = false;
    let goenLoaded = false;

    document.addEventListener("DOMContentLoaded", function() {
      initPage();
    });

    async function initPage() {
      currentUserId = readUserId();

      if (currentUserId) {
        localStorage.setItem("tagoyamaUserId", currentUserId);
        localStorage.setItem("tagoyamaFujiUserId", currentUserId);
      }

      updateMenuLinks();
      loadParticipantCount();

      if (currentUserId) {
        await checkClimb(currentUserId);
      } else {
        setClimbStatus("山頂QRから開くと、登頂記念証を受け取れます。");
        disableCertificateButton();
      }
    }

    function readUserId() {
      const params = new URLSearchParams(window.location.search);

      return getString(
        params.get("userId") ||
        params.get("userid") ||
        params.get("uid") ||
        params.get("id") ||
        localStorage.getItem("tagoyamaUserId") ||
        localStorage.getItem("tagoyamaFujiUserId") ||
        ""
      );
    }

    function updateMenuLinks() {
      const omikujiBtn = document.getElementById("omikujiBtn");

      if (omikujiBtn) {
        omikujiBtn.href =
          currentUserId
            ? OMIKUJI_PAGE + "?userId=" + encodeURIComponent(currentUserId)
            : OMIKUJI_PAGE;
      }
    }

    async function loadParticipantCount() {
      const el = document.getElementById("participantCount");

      try {
        const urls = [
          GAS_URL + "?mode=stats&t=" + Date.now(),
          GAS_URL + "?stats=1&t=" + Date.now(),
          GAS_URL + "?action=stats&t=" + Date.now()
        ];

        let data = null;

        for (let i = 0; i < urls.length; i++) {
          try {
            data = await getJson(urls[i]);
            if (data) break;
          } catch (error) {
            console.warn(error);
          }
        }

        const count = getParticipantCount(data);

        if (el) {
          el.innerText = count || "--";
        }
      } catch (error) {
        console.warn(error);

        if (el) {
          el.innerText = "--";
        }
      }
    }

    function getParticipantCount(data) {
      data = data || {};

      const nested =
        data.data && typeof data.data === "object"
          ? data.data
          : {};

      const source = Object.assign({}, data, nested);

      return normalizeNumberText(
        getFirst(
          source.participantNo,
          source.participant,
          source.participantCount,
          source.total,
          source.totalCount,
          source.count,
          source.people,
          source.参加人数,
          source.参加者数
        )
      );
    }

    async function checkClimb(userId) {
      setClimbStatus("登頂情報を確認しています...");

      try {
        const data = await saveOrLoadClimb(userId);
        const clean = normalizeClimbData(data, userId);

        currentClimbData = clean;
        saveClimbLocal(clean);

        if (hasClimbData(clean)) {
          setClimbStatus(
            "登頂受付が完了しました。\n登頂記念証を受け取れます。"
          );
          enableCertificateButton(clean);
        } else {
          setClimbStatus(
            "登頂情報を確認しました。\n登頂記念証を受け取れます。"
          );
          enableCertificateButton(clean);
        }
      } catch (error) {
        console.error(error);

        const localData = loadClimbLocal();

        if (hasClimbData(localData)) {
          currentClimbData = localData;
          setClimbStatus(
            "前回の登頂記録を表示できます。\n登頂記念証を受け取れます。"
          );
          enableCertificateButton(localData);
        } else {
          setClimbStatus(
            "登頂情報を確認できませんでした。\n山頂QRからもう一度お試しください。"
          );
          disableCertificateButton();
        }
      }
    }

    async function saveOrLoadClimb(userId) {
      const encodedUserId = encodeURIComponent(userId);

      const urls = [
        GAS_URL + "?userId=" + encodedUserId + "&t=" + Date.now(),
        GAS_URL + "?mode=saveClimb&userId=" + encodedUserId + "&t=" + Date.now(),
        GAS_URL + "?action=saveClimb&userId=" + encodedUserId + "&t=" + Date.now(),
        GAS_URL + "?climbHistory&userId=" + encodedUserId + "&t=" + Date.now(),
        GAS_URL + "?mode=climbHistory&userId=" + encodedUserId + "&t=" + Date.now()
      ];

      let lastError = null;

      for (let i = 0; i < urls.length; i++) {
        try {
          const data = await getJson(urls[i]);

          if (data && typeof data === "object") {
            return data;
          }
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("登頂情報を取得できませんでした。");
    }

    function normalizeClimbData(data, userId) {
      data = data || {};

      const nested =
        data.data && typeof data.data === "object"
          ? data.data
          : {};

      const source = Object.assign({}, data, nested);

      return {
        userId: getFirst(source.userId, source.uid, source.id, userId),
        climbCount: normalizeNumberText(
          getFirst(
            source.climbCount,
            source.count,
            source.times,
            source.climb_count,
            source.climb
          )
        ),
        serialNo: cleanSerialNo(
          getFirst(
            source.serialNo,
            source.serial,
            source.no,
            source.serial_no,
            source.number
          )
        ),
        lastDate: getFirst(
          source.lastDate,
          source.date,
          source.climbDate,
          source.last_date,
          source.createdAt
        ),
        imageNo: getFirst(source.imageNo, source.image_no),
        imageName: getFirst(source.imageName, source.image_name, source.title, source.name),
        imageUrl: normalizeImageUrl(
          getFirst(
            source.imageUrl,
            source.certificateImageUrl,
            source.certificateUrl,
            source.image,
            source.imgUrl,
            source.img,
            source.url
          )
        ),
        participantNo: normalizeNumberText(
          getFirst(
            source.participantNo,
            source.participant,
            source.participant_no,
            source.people,
            source.total,
            source.totalCount
          )
        )
      };
    }

    function hasClimbData(data) {
      data = data || {};

      return Boolean(
        getString(data.userId) ||
        getString(data.climbCount) ||
        getString(data.serialNo) ||
        getString(data.lastDate)
      );
    }

    function enableCertificateButton(data) {
      const btn = document.getElementById("certificateBtn");

      if (!btn) {
        return;
      }

      btn.classList.remove("disabled");
      btn.href = buildCertificateUrl(data);
    }

    function disableCertificateButton() {
      const btn = document.getElementById("certificateBtn");

      if (!btn) {
        return;
      }

      btn.classList.add("disabled");
      btn.href = "certificate.html";
    }

    function setClimbStatus(text) {
      const el = document.getElementById("climbStatus");

      if (el) {
        el.innerText = text;
      }
    }

    function buildCertificateUrl(data) {
      data = data || {};
      const params = new URLSearchParams();

      if (data.userId) {
        params.set("userId", data.userId);
      }

      if (data.climbCount) {
        params.set("climbCount", data.climbCount);
      }

      if (data.serialNo) {
        params.set("serialNo", data.serialNo);
      }

      if (data.lastDate) {
        params.set("lastDate", data.lastDate);
      }

      if (data.imageNo) {
        params.set("imageNo", data.imageNo);
      }

      if (data.imageName) {
        params.set("imageName", data.imageName);
      }

      if (data.imageUrl) {
        params.set("imageUrl", data.imageUrl);
      }

      if (data.participantNo) {
        params.set("participantNo", data.participantNo);
      }

      params.set("v", "20260704");

      return CERTIFICATE_PAGE + "?" + params.toString();
    }

    function saveClimbLocal(data) {
      try {
        localStorage.setItem("tagoyamaClimbData", JSON.stringify(data));

        if (data.userId) {
          localStorage.setItem("tagoyamaUserId", data.userId);
          localStorage.setItem("tagoyamaFujiUserId", data.userId);
        }

        if (data.climbCount) {
          localStorage.setItem("tagoyamaLastClimbCount", data.climbCount);
        }

        if (data.serialNo) {
          localStorage.setItem("tagoyamaLastSerialNo", data.serialNo);
        }

        if (data.lastDate) {
          localStorage.setItem("tagoyamaLastDate", data.lastDate);
        }

        if (data.imageUrl) {
          localStorage.setItem("tagoyamaLastImageUrl", data.imageUrl);
        }

        if (data.participantNo) {
          localStorage.setItem("tagoyamaLastParticipantNo", data.participantNo);
        }
      } catch (error) {
        console.warn(error);
      }
    }

    function loadClimbLocal() {
      try {
        const raw = localStorage.getItem("tagoyamaClimbData");

        if (raw) {
          const data = JSON.parse(raw);
          if (data) {
            return data;
          }
        }

        return {
          userId: getFirst(
            localStorage.getItem("tagoyamaUserId"),
            localStorage.getItem("tagoyamaFujiUserId")
          ),
          climbCount: localStorage.getItem("tagoyamaLastClimbCount"),
          serialNo: localStorage.getItem("tagoyamaLastSerialNo"),
          lastDate: localStorage.getItem("tagoyamaLastDate"),
          imageUrl: localStorage.getItem("tagoyamaLastImageUrl"),
          participantNo: localStorage.getItem("tagoyamaLastParticipantNo")
        };
      } catch (error) {
        return {};
      }
    }

    function openNews() {
      openModal("newsModal");
      loadNews();
    }

    function openKicho() {
      openModal("kichoModal");
    }

    function openGoen() {
      openModal("goenModal");
      loadGoen();
    }

    function openModal(id) {
      const modal = document.getElementById(id);

      if (modal) {
        modal.classList.add("show");
      }
    }

    function closeModal(id) {
      const modal = document.getElementById(id);

      if (modal) {
        modal.classList.remove("show");
      }
    }

    async function loadNews() {
      const list = document.getElementById("newsList");

      if (!list) {
        return;
      }

      if (newsLoaded) {
        return;
      }

      list.innerHTML =
        '<div class="item"><p class="itemBody">お知らせを読み込み中です。</p></div>';

      try {
        const data = await getJson(GAS_URL + "?mode=news&t=" + Date.now());
        const rows = getArrayRows(data);

        if (!rows || rows.length === 0) {
          list.innerHTML =
            '<div class="item"><p class="itemBody">現在、お知らせはありません。</p></div>';
          newsLoaded = true;
          return;
        }

        let html = "";

        rows.forEach(function(item) {
          const title = getFirst(
            item.title,
            item.タイトル,
            item.name,
            item.件名,
            item.subject
          );

          const date = formatDate(
            getFirst(
              item.date,
              item.datetime,
              item.createdAt,
              item.updatedAt,
              item.日時,
              item.日付
            )
          );

          let body = getFirst(
            item.body,
            item.message,
            item.text,
            item.content,
            item.description,
            item.本文,
            item.内容,
            item.説明,
            item.メッセージ,
            item.お知らせ本文
          );

          if (!body) {
            body = makeBodyFromItem(item);
          }

          const imageUrl = getNewsImageUrl(item);

          if (!title && !body && !imageUrl) {
            return;
          }

          let imageHtml = "";

          if (imageUrl) {
            imageHtml =
              '<img src="' + escapeHtml(imageUrl) + '" ' +
              'alt="' + escapeHtml(title || "田子山富士のお知らせ画像") + '" ' +
              'loading="lazy" ' +
              'style="display:block;width:100%;max-height:420px;object-fit:cover;border-radius:16px;margin:0 0 12px;background:#111;" ' +
              'onerror="this.style.display=\\\'none\\\';">';
          }

          html +=
            '<div class="item">' +
            imageHtml +
            '<h3 class="itemTitle">' + escapeHtml(title || "お知らせ") + '</h3>' +
            (date ? '<div class="itemDate">' + escapeHtml(date) + '</div>' : '') +
            (body ? '<p class="itemBody">' + escapeHtml(body) + '</p>' : '') +
            '</div>';
        });

        list.innerHTML =
          html ||
          '<div class="item"><p class="itemBody">現在、お知らせはありません。</p></div>';

        newsLoaded = true;
      } catch (error) {
        console.error(error);

        list.innerHTML =
          '<div class="item"><p class="itemBody">お知らせを読み込めませんでした。</p></div>';
      }
    }

    async function submitKicho() {
      const btn = document.getElementById("kichoSubmitBtn");
      const oldText = btn ? btn.innerText : "";

      const area = getString(document.getElementById("kichoArea").value);
      const name = getString(document.getElementById("kichoName").value);
      const message = getString(document.getElementById("kichoMessage").value);

      if (!area) {
        alert("どこから来たかを選んでください。");
        return;
      }

      if (!message) {
        alert("メッセージを入力してください。");
        return;
      }

      if (btn) {
        btn.disabled = true;
        btn.innerText = "記帳中...";
      }

      try {
        const params = new URLSearchParams();
        params.set("mode", "kicho");
        params.set("area", area);
        params.set("name", name || "匿名");
        params.set("message", message);
        params.set("t", String(Date.now()));

        await getJson(GAS_URL + "?" + params.toString());

        alert("ご縁帳に記帳しました。");

        document.getElementById("kichoName").value = "";
        document.getElementById("kichoMessage").value = "";

        goenLoaded = false;
      } catch (error) {
        console.error(error);
        alert("記帳できませんでした。もう一度お試しください。");
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.innerText = oldText || "記帳する";
        }
      }
    }

    async function loadGoen() {
      const list = document.getElementById("goenList");

      if (!list) {
        return;
      }

      if (goenLoaded) {
        return;
      }

      list.innerHTML =
        '<div class="item"><p class="itemBody">ご縁帳を読み込み中です。</p></div>';

      try {
        const data = await getJson(GAS_URL + "?mode=goen&t=" + Date.now());
        const rows = getArrayRows(data);

        if (!rows || rows.length === 0) {
          list.innerHTML =
            '<div class="item"><p class="itemBody">まだ記帳はありません。</p></div>';
          goenLoaded = true;
          return;
        }

        let html = "";

        rows.forEach(function(item) {
          const area = getFirst(item.area, item.地域, item.住所, item.place);
          const name = getFirst(item.name, item.名前, item.nickname, item.お名前);
          const message = getFirst(item.message, item.メッセージ, item.text, item.本文);
          const date = formatDate(getFirst(item.date, item.日時, item.日付, item.createdAt));

          if (!area && !name && !message) {
            return;
          }

          html +=
            '<div class="item">' +
            '<h3 class="itemTitle">' + escapeHtml(name || "匿名") + '</h3>' +
            (date ? '<div class="itemDate">' + escapeHtml(date) + '</div>' : '') +
            (area ? '<div class="itemDate">' + escapeHtml(area) + '</div>' : '') +
            (message ? '<p class="itemBody">' + escapeHtml(message) + '</p>' : '') +
            '</div>';
        });

        list.innerHTML =
          html ||
          '<div class="item"><p class="itemBody">まだ記帳はありません。</p></div>';

        goenLoaded = true;
      } catch (error) {
        console.error(error);

        list.innerHTML =
          '<div class="item"><p class="itemBody">ご縁帳を読み込めませんでした。</p></div>';
      }
    }

    async function getJson(url) {
      try {
        const res = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const text = await res.text();
        return parseJsonText(text);
      } catch (fetchError) {
        return await getJsonp(url);
      }
    }

    function parseJsonText(text) {
      const value = String(text || "").trim();

      if (!value) {
        throw new Error("empty response");
      }

      try {
        return JSON.parse(value);
      } catch (error) {
        const start = value.indexOf("{");
        const end = value.lastIndexOf("}");

        if (start >= 0 && end > start) {
          return JSON.parse(value.substring(start, end + 1));
        }

        throw error;
      }
    }

    function getJsonp(url) {
      return new Promise(function(resolve, reject) {
        const callbackName =
          "tagoyamaIndexCallback_" +
          Date.now() +
          "_" +
          Math.floor(Math.random() * 1000000);

        const script = document.createElement("script");
        const sep = url.indexOf("?") >= 0 ? "&" : "?";

        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 12000);

        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("JSONP error"));
        };

        script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
        document.body.appendChild(script);

        function cleanup() {
          clearTimeout(timer);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      });
    }

    function getArrayRows(data) {
      if (!data) {
        return [];
      }

      if (Array.isArray(data)) {
        return data;
      }

      if (Array.isArray(data.rows)) {
        return data.rows;
      }

      if (Array.isArray(data.items)) {
        return data.items;
      }

      if (Array.isArray(data.data)) {
        return data.data;
      }

      if (data.data && Array.isArray(data.data.rows)) {
        return data.data.rows;
      }

      if (data.data && Array.isArray(data.data.items)) {
        return data.data.items;
      }

      return [];
    }

    function getNewsImageUrl(item) {
      const raw = getFirst(
        item.imageUrl,
        item.imageURL,
        item.image,
        item.photo,
        item.picture,
        item.thumbnail,
        item.画像URL,
        item.画像Url,
        item.画像url,
        item.画像,
        item.写真,
        item.サムネイル,
        item.お知らせ画像
      );

      return normalizeNewsImageUrl(raw);
    }

    function normalizeNewsImageUrl(url) {
      url = getString(url);

      if (!url) {
        return "";
      }

      url = url.replace(/&amp;/g, "&").trim();

      let match = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);

      if (match && match[1]) {
        return "https://drive.google.com/thumbnail?id=" + encodeURIComponent(match[1]) + "&sz=w1200";
      }

      match = url.match(/[?&]id=([a-zA-Z0-9_-]{20,})/);

      if (url.indexOf("drive.google.com") >= 0 && match && match[1]) {
        return "https://drive.google.com/thumbnail?id=" + encodeURIComponent(match[1]) + "&sz=w1200";
      }

      return url;
    }

    function normalizeImageUrl(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      if (
        value.indexOf("data:image") === 0 ||
        value.indexOf("blob:") === 0
      ) {
        return value;
      }

      const driveId = getDriveId(value);

      if (driveId) {
        return "https://lh3.googleusercontent.com/d/" +
          encodeURIComponent(driveId) +
          "=w2000";
      }

      return value;
    }

    function getDriveId(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      let match = value.match(/\/file\/d\/([^/]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/[?&]id=([^&]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

      if (match && match[1]) {
        return match[1];
      }

      if (/^[a-zA-Z0-9_-]{20,}$/.test(value)) {
        return value;
      }

      return "";
    }

    function makeBodyFromItem(item) {
      const skipKeys = [
        "title", "タイトル", "name", "件名", "subject",
        "date", "datetime", "createdAt", "updatedAt", "日時", "日付",
        "link", "url", "URL", "リンク",
        "imageUrl", "imageURL", "image", "photo", "picture", "thumbnail",
        "画像URL", "画像Url", "画像url", "画像", "写真", "サムネイル", "お知らせ画像"
      ];

      const parts = [];

      Object.keys(item || {}).forEach(function(key) {
        if (skipKeys.indexOf(key) >= 0) {
          return;
        }

        const lowerKey = String(key).toLowerCase();

        if (lowerKey.indexOf("image") >= 0) {
          return;
        }

        if (lowerKey.indexOf("photo") >= 0) {
          return;
        }

        if (lowerKey.indexOf("thumbnail") >= 0) {
          return;
        }

        if (String(key).indexOf("画像") >= 0) {
          return;
        }

        if (String(key).indexOf("写真") >= 0) {
          return;
        }

        const value = getString(item[key]);

        if (!value) {
          return;
        }

        if (value.indexOf("https://") === 0 || value.indexOf("http://") === 0) {
          return;
        }

        parts.push(value);
      });

      return parts.join("\n");
    }

    function formatDate(value) {
      const text = getString(value);

      if (!text) {
        return "";
      }

      return text
        .replace(/-/g, "/")
        .replace(/\./g, "/")
        .replace(/\s.*$/, "");
    }

    function escapeHtml(value) {
      return getString(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function cleanSerialNo(value) {
      return toHalfWidthNumber(getString(value))
        .replace(/^No\./i, "")
        .replace(/^No/i, "")
        .replace(/^記念番号/, "")
        .trim();
    }

    function normalizeNumberText(value) {
      const text = toHalfWidthNumber(getString(value));
      const match = text.match(/[0-9]+/);

      if (match && match[0]) {
        return match[0];
      }

      return "";
    }

    function toHalfWidthNumber(value) {
      return getString(value).replace(/[０-９]/g, function(s) {
        return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
      });
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }

    function getFirst() {
      for (let i = 0; i < arguments.length; i++) {
        const value = getString(arguments[i]);

        if (value) {
          return value;
        }
      }

      return "";
    }

    window.openNews = openNews;
    window.openKicho = openKicho;
    window.openGoen = openGoen;
    window.closeModal = closeModal;
    window.submitKicho = submitKicho;
  </script>
