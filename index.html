<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100vh;
  background:#050505;
  color:#fff;
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
}

body{
  background:
    radial-gradient(circle at 50% 0%,rgba(130,92,24,.28),rgba(0,0,0,0) 34%),
    linear-gradient(180deg,#050505 0%,#090909 45%,#000 100%);
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:24px 18px 56px;
}

.hero{
  text-align:center;
  padding:8px 0 28px;
}

.logoBox{
  width:100%;
  max-width:620px;
  margin:0 auto 18px;
  border-radius:30px;
  overflow:hidden;
  background:#050505;
  box-shadow:0 14px 32px rgba(0,0,0,.35);
}

.logoBox img{
  display:block;
  width:100%;
  height:auto;
}

.siteTitle{
  margin:0;
  font-size:clamp(42px,10.5vw,76px);
  font-weight:900;
  letter-spacing:.04em;
  line-height:1.05;
  color:#fff;
  text-shadow:
    0 4px 5px rgba(0,0,0,.9),
    0 0 18px rgba(255,255,255,.18);
}

.siteSub{
  margin:24px 0 0;
  font-size:clamp(24px,6.5vw,46px);
  font-weight:900;
  letter-spacing:.04em;
  line-height:1.2;
  color:#d9b638;
  text-shadow:
    0 3px 4px rgba(0,0,0,.95),
    0 0 16px rgba(225,180,52,.18);
}

.card{
  margin:28px 0;
  padding:34px 24px;
  border:3px solid #d6b73c;
  border-radius:30px;
  background:rgba(24,24,24,.92);
  box-shadow:
    0 0 0 1px rgba(255,230,150,.1) inset,
    0 12px 28px rgba(0,0,0,.42);
}

.cardTitle{
  margin:0 0 24px;
  font-size:clamp(29px,7.5vw,50px);
  font-weight:900;
  line-height:1.2;
  color:#d9b638;
}

.cardText{
  margin:0;
  font-size:clamp(21px,5.5vw,36px);
  font-weight:700;
  line-height:1.8;
  color:#fff;
  text-align:center;
}

.cardText strong{
  color:#ffe179;
  font-weight:900;
}

.statNumber{
  margin:16px 0 4px;
  text-align:center;
  font-size:clamp(70px,21vw,150px);
  font-weight:900;
  line-height:1;
  letter-spacing:.02em;
  color:#ffdf72;
  text-shadow:
    0 5px 4px rgba(0,0,0,.85),
    0 0 18px rgba(255,220,95,.22);
}

.statusBox{
  margin-top:22px;
  padding:20px 18px;
  border-radius:22px;
  background:rgba(0,0,0,.32);
  font-size:clamp(18px,4.8vw,30px);
  font-weight:800;
  line-height:1.7;
  text-align:center;
  color:#fff7d0;
}

.btnArea{
  display:grid;
  gap:20px;
  margin-top:26px;
}

.btn,
.linkBtn{
  width:100%;
  min-height:74px;
  border:none;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:clamp(22px,6vw,40px);
  font-weight:900;
  letter-spacing:.02em;
  color:#fff;
  cursor:pointer;
  text-align:center;
  box-shadow:
    0 8px 0 rgba(0,0,0,.32),
    0 16px 26px rgba(0,0,0,.35);
}

.btn:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.goldBtn{
  background:linear-gradient(180deg,#e4c24d,#b98a20);
  color:#261402;
}

.greenBtn{
  background:linear-gradient(180deg,#35df86,#19b75e);
}

.blueBtn{
  background:linear-gradient(180deg,#248cff,#075cc8);
}

.grayBtn{
  background:linear-gradient(180deg,#6e7f88,#4f626c);
}

.blackBtn{
  background:linear-gradient(180deg,#232323,#050505);
}

.redBtn{
  background:linear-gradient(180deg,#d84a4a,#8b1d1d);
}

.menuGrid{
  display:grid;
  gap:18px;
  margin-top:18px;
}

.inputLabel{
  display:block;
  margin:18px 0 8px;
  font-size:clamp(18px,4.8vw,28px);
  font-weight:900;
  color:#ffdf72;
}

.input,
.textarea{
  width:100%;
  border:2px solid #d6b73c;
  border-radius:18px;
  background:#050505;
  color:#fff;
  font-size:20px;
  font-weight:700;
  line-height:1.6;
  padding:16px;
  outline:none;
}

.textarea{
  min-height:130px;
  resize:vertical;
}

.smallNote{
  margin:14px 0 0;
  font-size:15px;
  line-height:1.7;
  color:#d8c98d;
  text-align:center;
}

.list{
  display:grid;
  gap:18px;
  margin-top:18px;
}

.item{
  padding:20px;
  border-radius:22px;
  background:rgba(0,0,0,.34);
  border:1px solid rgba(214,183,60,.45);
}

.itemTitle{
  margin:0 0 10px;
  font-size:22px;
  font-weight:900;
  line-height:1.35;
  color:#ffdf72;
}

.itemDate{
  margin:0 0 8px;
  font-size:14px;
  color:#c9bb85;
}

.itemBody{
  margin:12px 0 0;
  font-size:18px;
  line-height:1.7;
  color:#fff;
  white-space:pre-wrap;
}

.itemLink{
  display:inline-block;
  margin-top:12px;
  font-size:17px;
  font-weight:900;
  color:#9fd0ff;
  word-break:break-all;
}

.newsImage{
  display:block;
  width:100%;
  height:auto;
  border-radius:18px;
  margin:16px 0 0;
  border:1px solid rgba(255,220,140,.45);
  background:#000;
}

.closeSectionBtn{
  margin-top:26px;
}

.footer{
  margin-top:38px;
  padding:24px 0 0;
  text-align:center;
  font-size:14px;
  line-height:1.7;
  color:#c7b77a;
}

.hidden{
  display:none !important;
}

@media(max-width:480px){
  .wrap{
    padding:22px 14px 48px;
  }

  .card{
    padding:30px 20px;
    border-radius:28px;
  }

  .logoBox{
    border-radius:26px;
  }

  .btn,
  .linkBtn{
    min-height:72px;
    border-radius:24px;
  }
}
</style>

<body>

<div class="wrap">

  <header class="hero">
    <div class="logoBox">
      <img src="logo.png" alt="田子山富士">
    </div>

    <h1 class="siteTitle">
      田子山富士
    </h1>

    <div class="siteSub">
      168の縁プロジェクト
    </div>
  </header>

  <section class="card">
    <h2 class="cardTitle">
      参加人数
    </h2>

    <div class="statNumber" id="participants">
      --
    </div>

    <div class="smallNote">
      登頂受付された人数を表示しています
    </div>
  </section>

  <section class="card" id="climbCard">
    <h2 class="cardTitle">
      ⛩️ 登頂受付
    </h2>

    <p class="cardText" id="climbMessage">
      登頂受付は<br>
      <strong>山頂に設置されたQRコード</strong><br>
      からご利用ください。
    </p>

    <div class="statusBox hidden" id="climbStatus">
      登頂情報を確認しています...
    </div>

    <div class="btnArea">
      <a
        id="certificateBtn"
        class="linkBtn greenBtn hidden"
        href="#">
        登頂記念証を受け取る
      </a>
    </div>
  </section>

  <section class="card">
    <h2 class="cardTitle">
      メニュー
    </h2>

    <p class="cardText">
      使いたい項目を<br>
      選んでください。
    </p>

    <div class="menuGrid">
      <a
        id="omikujiLink"
        class="linkBtn goldBtn"
        href="omikuji.html">
        開運おみくじ
      </a>

      <a
        id="certificateBookLink"
        class="linkBtn goldBtn"
        href="certificate-book.html">
        登頂記念帳
      </a>

      <button class="btn blueBtn" onclick="openSection('newsSection')">
        お知らせ
      </button>

      <button class="btn greenBtn" onclick="openSection('kichoSection')">
        参拝記帳
      </button>

      <button class="btn grayBtn" onclick="openSection('goenSection')">
        ご縁帳
      </button>

      <a class="linkBtn blackBtn" href="access.html">
        田子山富士への行き方
      </a>
    </div>
  </section>

  <section class="card hidden" id="newsSection">
    <h2 class="cardTitle">
      お知らせ
    </h2>

    <div class="list" id="newsList">
      <div class="item">
        <p class="itemBody">
          お知らせを読み込み中です。
        </p>
      </div>
    </div>

    <button class="btn blackBtn closeSectionBtn" onclick="closeSection('newsSection')">
      閉じる
    </button>
  </section>

  <section class="card hidden" id="kichoSection">
    <h2 class="cardTitle">
      参拝記帳
    </h2>

    <p class="cardText">
      田子山富士への想いを<br>
      ご縁帳に残せます。
    </p>

    <label class="inputLabel" for="kichoArea">
      どこから来ましたか
    </label>

    <select id="kichoArea" class="input">
      <option value="">選択してください</option>
      <option value="志木市">志木市</option>
      <option value="朝霞市">朝霞市</option>
      <option value="新座市">新座市</option>
      <option value="和光市">和光市</option>
      <option value="富士見市">富士見市</option>
      <option value="ふじみ野市">ふじみ野市</option>
      <option value="さいたま市">さいたま市</option>
      <option value="東京都">東京都</option>
      <option value="埼玉県内">埼玉県内</option>
      <option value="その他">その他</option>
    </select>

    <label class="inputLabel" for="kichoName">
      お名前
    </label>

    <input
      id="kichoName"
      class="input"
      type="text"
      placeholder="匿名でも大丈夫です">

    <label class="inputLabel" for="kichoMessage">
      メッセージ
    </label>

    <textarea
      id="kichoMessage"
      class="textarea"
      placeholder="参拝の記録やひとことを書いてください"></textarea>

    <div class="btnArea">
      <button class="btn greenBtn" id="kichoBtn" onclick="saveKicho()">
        記帳する
      </button>
    </div>

    <button class="btn blackBtn closeSectionBtn" onclick="closeSection('kichoSection')">
      閉じる
    </button>
  </section>

  <section class="card hidden" id="goenSection">
    <h2 class="cardTitle">
      ご縁帳
    </h2>

    <div class="list" id="goenList">
      <div class="item">
        <p class="itemBody">
          ご縁帳を読み込み中です。
        </p>
      </div>
    </div>

    <button class="btn blackBtn closeSectionBtn" onclick="closeSection('goenSection')">
      閉じる
    </button>
  </section>

  <footer class="footer">
    田子山富士 168の縁プロジェクト<br>
    登頂記念・ご縁帳・おみくじ
  </footer>

</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbyaFXdYWZ8tj0LSCBTSxXRFC_7XElgJ47bFcd-DSjGnpn2yWLq6l_O5eIwEkAl9yjiP/exec";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

const OMIKUJI_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

const CERTIFICATE_BOOK_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate-book.html";

let currentUserId = "";
let newsLoaded = false;
let goenLoaded = false;

window.addEventListener("load", init);

async function init(){
  const urlUserId = getUserIdFromUrl();

  if(urlUserId){
    currentUserId = urlUserId;

    localStorage.setItem("tagoyamaUserId", urlUserId);
    localStorage.setItem("tagoyamaFujiUserId", urlUserId);
  }else{
    currentUserId =
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    "";
  }

  updateUserLinks();

  await loadStats();
  await handleClimb();

  const params = new URLSearchParams(location.search);

  if(params.get("open") === "news"){
    setTimeout(function(){
      openSection("newsSection");
    }, 300);
  }

  if(params.get("open") === "goen"){
    setTimeout(function(){
      openSection("goenSection");
    }, 300);
  }

  if(params.get("open") === "kicho"){
    setTimeout(function(){
      openSection("kichoSection");
    }, 300);
  }
}

function getUserIdFromUrl(){
  const params = new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    ""
  );
}

function updateUserLinks(){
  const omikujiLink =
  document.getElementById("omikujiLink");

  if(omikujiLink){
    if(currentUserId){
      omikujiLink.href =
      OMIKUJI_PAGE +
      "?userId=" +
      encodeURIComponent(currentUserId) +
      "&v=" +
      Date.now();
    }else{
      omikujiLink.href =
      "omikuji.html?v=" +
      Date.now();
    }
  }

  const certificateBookLink =
  document.getElementById("certificateBookLink");

  if(certificateBookLink){
    if(currentUserId){
      certificateBookLink.href =
      CERTIFICATE_BOOK_PAGE +
      "?userId=" +
      encodeURIComponent(currentUserId) +
      "&v=" +
      Date.now();
    }else{
      certificateBookLink.href =
      "certificate-book.html?v=" +
      Date.now();
    }
  }
}

async function handleClimb(){
  const urlUserId = getUserIdFromUrl();

  const climbMessage =
  document.getElementById("climbMessage");

  const climbStatus =
  document.getElementById("climbStatus");

  const certificateBtn =
  document.getElementById("certificateBtn");

  if(!urlUserId){
    if(certificateBtn){
      certificateBtn.classList.add("hidden");
    }

    return;
  }

  if(climbMessage){
    climbMessage.innerHTML =
    "登頂受付を<br><strong>確認しています</strong>";
  }

  if(climbStatus){
    climbStatus.classList.remove("hidden");
    climbStatus.innerText =
    "登頂記録を保存しています...";
  }

  try{
    const sessionKey =
    "tagoyamaClimbSaved:" +
    urlUserId;

    let data = null;

    const cached =
    sessionStorage.getItem(sessionKey);

    if(cached){
      try{
        data = JSON.parse(cached);
      }catch(e){
        data = null;
      }
    }

    if(!data){
      data =
      await fetchJson(
        GAS_URL +
        "?mode=saveClimb" +
        "&userId=" +
        encodeURIComponent(urlUserId) +
        "&t=" +
        Date.now()
      );

      if(data && data.success){
        sessionStorage.setItem(
          sessionKey,
          JSON.stringify(data)
        );
      }
    }

    if(!data || data.success === false){
      throw new Error(
        data && data.message
        ? data.message
        : "登頂記録に失敗しました"
      );
    }

    const count =
    data.count ||
    data.climbCount ||
    "";

    const serial =
    data.serial ||
    data.serialNo ||
    data.certificateNo ||
    "";

    if(climbMessage){
      climbMessage.innerHTML =
      "おめでとうございます。<br>" +
      "<strong>登頂受付が完了しました。</strong>";
    }

    let statusText =
    "第" +
    count +
    "回 登頂記念<br>" +
    "No." +
    serial;

    if(data.alreadyClimbedToday === true){
      statusText +=
      "<br>本日の登頂受付は完了しています";
    }

    if(climbStatus){
      climbStatus.innerHTML =
      statusText;
    }

    if(certificateBtn){
      certificateBtn.href =
      CERTIFICATE_PAGE +
      "?userId=" +
      encodeURIComponent(urlUserId) +
      "&v=" +
      Date.now();

      certificateBtn.classList.remove("hidden");
    }

    currentUserId =
    urlUserId;

    localStorage.setItem("tagoyamaUserId", urlUserId);
    localStorage.setItem("tagoyamaFujiUserId", urlUserId);

    updateUserLinks();

    await loadStats();

  }catch(err){
    if(climbMessage){
      climbMessage.innerHTML =
      "登頂受付で<br><strong>エラーが発生しました</strong>";
    }

    if(climbStatus){
      climbStatus.innerText =
      err && err.message
      ? err.message
      : "もう一度QRコードからお試しください";
    }

    if(certificateBtn){
      certificateBtn.classList.add("hidden");
    }
  }
}

async function loadStats(){
  const el =
  document.getElementById("participants");

  if(!el){
    return;
  }

  try{
    const data =
    await fetchJson(
      GAS_URL +
      "?mode=stats&t=" +
      Date.now()
    );

    if(data && data.success){
      const n =
      Number(
        data.participants ||
        data.count ||
        data.total ||
        0
      );

      if(Number.isFinite(n) && n >= 0){
        el.innerText =
        String(n);

        return;
      }
    }

    el.innerText =
    "--";

  }catch(e){
    el.innerText =
    "--";
  }
}

function openSection(id){
  closeAllSections();

  const section =
  document.getElementById(id);

  if(!section){
    return;
  }

  section.classList.remove("hidden");

  if(id === "newsSection"){
    loadNews();
  }

  if(id === "goenSection" && !goenLoaded){
    loadGoen();
  }

  setTimeout(function(){
    section.scrollIntoView({
      behavior:"smooth",
      block:"start"
    });
  }, 80);
}

function closeAllSections(){
  [
    "newsSection",
    "kichoSection",
    "goenSection"
  ].forEach(function(id){
    const el =
    document.getElementById(id);

    if(el){
      el.classList.add("hidden");
    }
  });
}

function closeSection(id){
  const el =
  document.getElementById(id);

  if(el){
    el.classList.add("hidden");
  }
}

async function loadNews(){
  const list =
  document.getElementById("newsList");

  if(!list){
    return;
  }

  list.innerHTML =
  '<div class="item"><p class="itemBody">お知らせを読み込み中です。</p></div>';

  try{
    const data =
    await fetchJson(
      GAS_URL +
      "?mode=news&t=" +
      Date.now()
    );

    const rows =
    getNewsRows(data);

    if(!rows || rows.length === 0){
      list.innerHTML =
      '<div class="item"><p class="itemBody">現在、お知らせはありません。</p></div>';

      newsLoaded =
      true;

      return;
    }

    list.innerHTML =
    rows.map(function(row){
      return renderNewsItem(row);
    }).join("");

    newsLoaded =
    true;

  }catch(err){
    list.innerHTML =
    '<div class="item"><p class="itemBody">お知らせを読み込めませんでした。時間をおいてもう一度お試しください。</p></div>';

    newsLoaded =
    false;
  }
}

function getNewsRows(data){
  if(Array.isArray(data)){
    return data;
  }

  if(!data){
    return [];
  }

  return (
    data.news ||
    data.items ||
    data.rows ||
    data.data ||
    data.list ||
    []
  );
}

function renderNewsItem(row){
  const news =
  normalizeNewsRow(row);

  let html =
  '<div class="item">';

  if(news.title){
    html +=
    '<h3 class="itemTitle">' +
    escapeHtml(news.title) +
    '</h3>';
  }

  if(news.date){
    html +=
    '<div class="itemDate">' +
    escapeHtml(formatDateText(news.date)) +
    '</div>';
  }

  if(news.image){
    html +=
    '<img class="newsImage" src="' +
    escapeHtml(news.image) +
    '" alt="" onerror="this.style.display=\'none\'">';
  }

  if(news.body){
    html +=
    '<p class="itemBody">' +
    escapeHtml(news.body) +
    '</p>';
  }

  if(news.url){
    html +=
    '<a class="itemLink" href="' +
    escapeHtml(news.url) +
    '" target="_blank" rel="noopener">詳しく見る</a>';
  }

  html +=
  '</div>';

  return html;
}

function normalizeNewsRow(row){
  row =
  row || {};

  if(Array.isArray(row)){
    return {
      date:getString(row[0]),
      title:getString(row[1]),
      body:getString(row[2]),
      image:normalizeNewsImageUrl(row[3]),
      url:getString(row[4])
    };
  }

  return {
    date:getString(
      row.date ||
      row.日付 ||
      row.datetime ||
      row.createdAt ||
      row.日時 ||
      ""
    ),

    title:getString(
      row.title ||
      row.タイトル ||
      row.name ||
      row.subject ||
      row.件名 ||
      ""
    ),

    body:getString(
      row.body ||
      row.本文 ||
      row.text ||
      row.message ||
      row.内容 ||
      row.description ||
      row.summary ||
      row.説明 ||
      ""
    ),

    image:normalizeNewsImageUrl(
      row.image ||
      row.imageUrl ||
      row.imageURL ||
      row.image1 ||
      row.画像 ||
      row.画像URL ||
      ""
    ),

    url:getString(
      row.url ||
      row.link ||
      row.URL ||
      row.リンク ||
      ""
    )
  };
}

function normalizeNewsImageUrl(value){
  const url =
  getString(value);

  if(!url){
    return "";
  }

  if(url.indexOf("data:image") === 0){
    return url;
  }

  const fileMatch =
  url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);

  if(fileMatch && fileMatch[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(fileMatch[1]) +
    "&sz=w1200";
  }

  const idMatch =
  url.match(/[?&]id=([^&]+)/);

  if(url.indexOf("drive.google.com") >= 0 && idMatch && idMatch[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(idMatch[1]) +
    "&sz=w1200";
  }

  return url;
}

async function loadGoen(){
  const list =
  document.getElementById("goenList");

  if(!list){
    return;
  }

  list.innerHTML =
  '<div class="item"><p class="itemBody">ご縁帳を読み込み中です。</p></div>';

  try{
    const data =
    await fetchJson(
      GAS_URL +
      "?mode=goen&t=" +
      Date.now()
    );

    const rows =
    getArrayFromResponse(data, "goen");

    if(!rows || rows.length === 0){
      list.innerHTML =
      '<div class="item"><p class="itemBody">まだ記帳はありません。</p></div>';

      goenLoaded =
      true;

      return;
    }

    list.innerHTML =
    rows.map(function(row){
      return renderGoenItem(row);
    }).join("");

    goenLoaded =
    true;

  }catch(err){
    list.innerHTML =
    '<div class="item"><p class="itemBody">ご縁帳を読み込めませんでした。</p></div>';

    goenLoaded =
    false;
  }
}

function renderGoenItem(row){
  row =
  row || {};

  let date = "";
  let area = "";
  let name = "";
  let message = "";

  if(Array.isArray(row)){
    date =
    getString(row[0]);

    area =
    getString(row[1]);

    name =
    getString(row[2]);

    message =
    getString(row[3]);
  }else{
    date =
    getString(
      row.date ||
      row.日時 ||
      row.createdAt ||
      row.time ||
      ""
    );

    area =
    getString(
      row.area ||
      row.地域 ||
      row.from ||
      row.どこから ||
      ""
    );

    name =
    getString(
      row.name ||
      row.名前 ||
      row.お名前 ||
      ""
    );

    message =
    getString(
      row.message ||
      row.text ||
      row.body ||
      row.本文 ||
      row.メッセージ ||
      row.comment ||
      ""
    );
  }

  let html =
  '<div class="item">';

  if(name || area){
    html +=
    '<h3 class="itemTitle">' +
    escapeHtml(
      (name || "匿名") +
      (area ? "（" + area + "）" : "")
    ) +
    '</h3>';
  }

  if(date){
    html +=
    '<div class="itemDate">' +
    escapeHtml(formatDateText(date)) +
    '</div>';
  }

  html +=
  '<p class="itemBody">' +
  escapeHtml(message || "記帳ありがとうございました。") +
  '</p>';

  html +=
  '</div>';

  return html;
}

async function saveKicho(){
  const btn =
  document.getElementById("kichoBtn");

  const area =
  getString(
    document.getElementById("kichoArea").value
  );

  const name =
  getString(
    document.getElementById("kichoName").value
  );

  const message =
  getString(
    document.getElementById("kichoMessage").value
  );

  if(!message){
    alert("メッセージを入力してください。");
    return;
  }

  if(btn){
    btn.disabled =
    true;

    btn.innerText =
    "記帳中...";
  }

  try{
    const data =
    await fetchJson(
      GAS_URL +
      "?mode=saveKicho" +
      "&area=" +
      encodeURIComponent(area) +
      "&name=" +
      encodeURIComponent(name) +
      "&message=" +
      encodeURIComponent(message) +
      "&t=" +
      Date.now()
    );

    if(!data || data.success === false){
      throw new Error(
        data && data.message
        ? data.message
        : "記帳できませんでした"
      );
    }

    alert("ご縁帳に記帳しました。");

    document.getElementById("kichoMessage").value =
    "";

    goenLoaded =
    false;

  }catch(err){
    alert(
      err && err.message
      ? err.message
      : "記帳できませんでした"
    );

  }finally{
    if(btn){
      btn.disabled =
      false;

      btn.innerText =
      "記帳する";
    }
  }
}

async function fetchJson(url){
  const res =
  await fetch(
    url,
    {
      method:"GET",
      cache:"no-store"
    }
  );

  const text =
  await res.text();

  if(!res.ok){
    throw new Error("通信エラーが発生しました");
  }

  try{
    return JSON.parse(text);
  }catch(e){}

  const match =
  text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

  if(match && match[1]){
    try{
      return JSON.parse(match[1]);
    }catch(e){}
  }

  throw new Error("データを読み込めませんでした");
}

function getArrayFromResponse(data, key){
  if(Array.isArray(data)){
    return data;
  }

  if(!data){
    return [];
  }

  if(key && Array.isArray(data[key])){
    return data[key];
  }

  return (
    data.items ||
    data.rows ||
    data.data ||
    data.goen ||
    data.list ||
    data.records ||
    []
  );
}

function formatDateText(value){
  value =
  getString(value);

  if(!value){
    return "";
  }

  return value
  .replace("T15:00:00.000Z", "")
  .replace("T00:00:00.000Z", "")
  .replace(/-/g, "/");
}

function escapeHtml(value){
  return getString(value)
  .replace(/&/g, "&amp;")
  .replace(/</g, "&lt;")
  .replace(/>/g, "&gt;")
  .replace(/"/g, "&quot;")
  .replace(/'/g, "&#039;");
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
