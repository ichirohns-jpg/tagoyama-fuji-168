<body>
  <main class="page">

    <header class="hero">
      <div class="logoBox">

    <section class="card">

      <div class="menuGrid">

  <section class="modal" id="newsModal">
    <div class="modalInner">

  <section class="modal" id="kichoModal">
    <div class="modalInner">
      <h2 class="modalTitle">参拝記帳</h2>

      <p class="modalText">
        田子山富士への想いを<br>
        ご縁帳に残せます。
      </p>

      <div class="formArea">
        <label for="fromArea">どこから来ましたか</label>
        <select id="fromArea">
          <option value="">選択してください</option>
          <option value="志木市">志木市</option>
          <option value="朝霞市">朝霞市</option>
          <option value="新座市">新座市</option>
          <option value="和光市">和光市</option>
          <option value="富士見市">富士見市</option>
          <option value="ふじみ野市">ふじみ野市</option>
          <option value="さいたま市">さいたま市</option>
          <option value="東京都">東京都</option>
          <option value="埼玉県内">埼玉県内</option>
          <option value="その他">その他</option>
        </select>

        <label for="visitorName">お名前</label>
        <input id="visitorName" type="text" placeholder="未入力でも大丈夫です">

  <section class="modal" id="goenModal">
    <div class="modalInner">
      <h2 class="modalTitle">ご縁帳</h2>

      <p class="modalText">
        田子山富士に集まった<br>
        ご縁の記録です。
      </p>

      <div id="goenList" class="listBox">
        <div class="modalText">ご縁帳を読み込み中です。</div>
      </div>

      <div class="btnArea">
        <button class="btn blackBtn" type="button" onclick="closeModal('goenModal')">
          閉じる
        </button>
      </div>
    </div>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

    const SITE_BASE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

    const CERTIFICATE_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

    const OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

    let currentUserId = "";
    let climbData = null;

    document.addEventListener("DOMContentLoaded", function() {
      initIndexPage();
    });

    async function initIndexPage() {
      currentUserId = getUserIdFromUrl();

      if (currentUserId) {
        localStorage.setItem("tagoyamaUserId", currentUserId);
        localStorage.setItem("tagoyamaFujiUserId", currentUserId);
      } else {
        currentUserId =
          localStorage.getItem("tagoyamaUserId") ||
          localStorage.getItem("tagoyamaFujiUserId") ||
          "";
      }

      updateMenuLinks();

      await loadParticipantCount();

      if (currentUserId) {
        await saveClimbAndPrepareCertificate(currentUserId);
      } else {
        setClimbStatus("山頂QRからアクセスすると、登頂記念証を受け取れます。");
        disableCertificateButton();
      }
    }

    function getUserIdFromUrl() {
      const params = new URLSearchParams(window.location.search);

      return getString(
        params.get("userId") ||
        params.get("userid") ||
        params.get("uid") ||
        params.get("id") ||
        ""
      );
    }

    function updateMenuLinks() {
      const omikujiLink = document.getElementById("omikujiLink");

      if (omikujiLink) {
        omikujiLink.href =
          currentUserId
            ? "omikuji.html?userId=" + encodeURIComponent(currentUserId)
            : "omikuji.html";
      }
    }

    async function loadParticipantCount() {
      const countEl = document.getElementById("participantCount");

      try {
        const data = await tryManyJson([
          GAS_URL + "?stats=1&t=" + Date.now(),
          GAS_URL + "?mode=stats&t=" + Date.now(),
          GAS_URL + "?action=stats&t=" + Date.now(),
          GAS_URL + "?participant=1&t=" + Date.now()
        ]);

        const nested =
          data && data.data && typeof data.data === "object"
            ? data.data
            : {};

        const source = Object.assign({}, data || {}, nested);

        const count =
          normalizeNumberText(
            getFirst(
              source.participantNo,
              source.participantCount,
              source.participant,
              source.total,
              source.totalCount,
              source.count,
              source.people,
              source.参加人数,
              source.参加者数
            )
          );

        if (countEl) {
          countEl.innerText = count || "--";
        }
      } catch (error) {
        console.warn(error);

        if (countEl) {
          countEl.innerText = "--";
        }
      }
    }

    async function saveClimbAndPrepareCertificate(userId) {
      setClimbStatus("登頂情報を確認しています...");

      try {
        const data = await tryManyJson([
          GAS_URL + "?userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
          GAS_URL + "?saveClimb=1&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
          GAS_URL + "?mode=saveClimb&userId=" + encodeURIComponent(userId) + "&t=" + Date.now(),
          GAS_URL + "?action=saveClimb&userId=" + encodeURIComponent(userId) + "&t=" + Date.now()
        ]);

        climbData = normalizeClimbData(data, userId);

        if (!climbData.userId) {
          climbData.userId = userId;
        }

        saveClimbLocal(climbData);
        enableCertificateButton(climbData);
        updateMenuLinks();

        const participant =
          getFirst(climbData.participantNo, climbData.participantCount);

        if (participant) {
          const countEl = document.getElementById("participantCount");
          if (countEl) {
            countEl.innerText = participant;
          }
        }

        setClimbStatus(
          "登頂受付が完了しました。\n登頂記念証を受け取れます。"
        );
      } catch (error) {
        console.error(error);

        const local = loadClimbLocal();

        if (local && local.userId) {
          climbData = local;
          enableCertificateButton(climbData);
          setClimbStatus(
            "前回の登頂情報を表示しています。\n登頂記念証を受け取れます。"
          );
        } else {
          disableCertificateButton();
          setClimbStatus(
            "登頂情報を確認できませんでした。\n通信状況を確認して、山頂QRからもう一度お試しください。"
          );
        }
      }
    }

    function normalizeClimbData(data, userId) {
      data = data || {};

      const nested =
        data.data && typeof data.data === "object"
          ? data.data
          : {};

      const source = Object.assign({}, data, nested);

      return {
        userId: getFirst(source.userId, source.uid, userId),
        climbCount: normalizeNumberText(
          getFirst(
            source.climbCount,
            source.count,
            source.times,
            source.climb_count,
            source.climb
          )
        ),
        serialNo: cleanSerialNo(
          getFirst(
            source.serialNo,
            source.serial,
            source.no,
            source.serial_no,
            source.number
          )
        ),
        lastDate: getFirst(
          source.lastDate,
          source.date,
          source.climbDate,
          source.last_date,
          source.createdAt
        ),
        imageNo: getFirst(source.imageNo, source.image_no),
        imageName: getFirst(source.imageName, source.image_name, source.title, source.name),
        imageUrl: getFirst(
          source.imageUrl,
          source.certificateImageUrl,
          source.certificateUrl,
          source.image,
          source.imgUrl,
          source.img,
          source.url
        ),
        participantNo: normalizeNumberText(
          getFirst(
            source.participantNo,
            source.participant,
            source.participant_no,
            source.participantCount,
            source.people,
            source.total,
            source.totalCount
          )
        )
      };
    }

    function enableCertificateButton(data) {
      const btn = document.getElementById("certificateBtn");

      if (!btn) {
        return;
      }

      btn.href = buildCertificateUrl(data);
      btn.classList.remove("disabled");
    }

    function disableCertificateButton() {
      const btn = document.getElementById("certificateBtn");

      if (!btn) {
        return;
      }

      btn.href = "certificate.html";
      btn.classList.add("disabled");
    }

    function buildCertificateUrl(data) {
      data = data || {};
      const params = new URLSearchParams();

      if (data.userId) {
        params.set("userId", data.userId);
      }

      if (data.climbCount) {
        params.set("climbCount", data.climbCount);
      }

      if (data.serialNo) {
        params.set("serialNo", data.serialNo);
      }

      if (data.lastDate) {
        params.set("lastDate", data.lastDate);
      }

      if (data.imageNo) {
        params.set("imageNo", data.imageNo);
      }

      if (data.imageName) {
        params.set("imageName", data.imageName);
      }

      if (data.imageUrl) {
        params.set("imageUrl", data.imageUrl);
      }

      if (data.participantNo) {
        params.set("participantNo", data.participantNo);
      }

      params.set("v", "20260703");

      return CERTIFICATE_PAGE + "?" + params.toString();
    }

    function saveClimbLocal(data) {
      try {
        localStorage.setItem("tagoyamaClimbData", JSON.stringify(data));

        if (data.userId) {
          localStorage.setItem("tagoyamaUserId", data.userId);
          localStorage.setItem("tagoyamaFujiUserId", data.userId);
        }

        if (data.climbCount) {
          localStorage.setItem("tagoyamaLastClimbCount", data.climbCount);
        }

        if (data.serialNo) {
          localStorage.setItem("tagoyamaLastSerialNo", data.serialNo);
        }

        if (data.lastDate) {
          localStorage.setItem("tagoyamaLastDate", data.lastDate);
        }

        if (data.imageUrl) {
          localStorage.setItem("tagoyamaLastImageUrl", data.imageUrl);
        }

        if (data.participantNo) {
          localStorage.setItem("tagoyamaLastParticipantNo", data.participantNo);
        }
      } catch (error) {
        console.warn(error);
      }
    }

    function loadClimbLocal() {
      try {
        const text = localStorage.getItem("tagoyamaClimbData");

        if (text) {
          const data = JSON.parse(text);
          if (data && data.userId) {
            return data;
          }
        }

        const userId =
          localStorage.getItem("tagoyamaUserId") ||
          localStorage.getItem("tagoyamaFujiUserId") ||
          "";

        if (!userId) {
          return null;
        }

        return {
          userId: userId,
          climbCount: localStorage.getItem("tagoyamaLastClimbCount") || "",
          serialNo: localStorage.getItem("tagoyamaLastSerialNo") || "",
          lastDate: localStorage.getItem("tagoyamaLastDate") || "",
          imageUrl: localStorage.getItem("tagoyamaLastImageUrl") || "",
          participantNo: localStorage.getItem("tagoyamaLastParticipantNo") || ""
        };
      } catch (error) {
        return null;
      }
    }

    function setClimbStatus(text) {
      const el = document.getElementById("climbStatus");

      if (el) {
        el.innerText = text;
      }
    }

    function openNews() {
      openModal("newsModal");
      loadNews();
    }

    function openKicho() {
      openModal("kichoModal");
    }

    function openGoen() {
      openModal("goenModal");
      loadGoen();
    }

    function openModal(id) {
      const modal = document.getElementById(id);

      if (modal) {
        modal.classList.add("show");
      }
    }

    function closeModal(id) {
      const modal = document.getElementById(id);

      if (modal) {
        modal.classList.remove("show");
      }
    }

    async function loadNews() {
      const box = document.getElementById("newsList");

      if (box) {
        box.innerHTML = '<div class="modalText">お知らせを読み込み中です。</div>';
      }

      try {
        const data = await tryManyJson([
          GAS_URL + "?news=1&t=" + Date.now(),
          GAS_URL + "?mode=news&t=" + Date.now(),
          GAS_URL + "?action=news&t=" + Date.now()
        ]);

        const list = extractList(data);

        renderNews(list);
      } catch (error) {
        console.error(error);

        if (box) {
          box.innerHTML =
            '<div class="modalText">お知らせを読み込めませんでした。</div>';
        }
      }
    }

    function renderNews(list) {
      const box = document.getElementById("newsList");

      if (!box) {
        return;
      }

      if (!list || !list.length) {
        box.innerHTML =
          '<div class="modalText">現在表示できるお知らせはありません。</div>';
        return;
      }

      box.innerHTML = "";

      list.forEach(function(item) {
        const title =
          getFirst(
            item.title,
            item.タイトル,
            item.name,
            item.件名,
            item.subject,
            item.heading,
            "お知らせ"
          );

        const text =
          getFirst(
            item.text,
            item.message,
            item.body,
            item.本文,
            item.内容,
            item.description,
            item.content,
            ""
          );

        const div = document.createElement("div");
        div.className = "listItem";

        const h = document.createElement("p");
        h.className = "listItemTitle";
        h.innerText = title;

        const p = document.createElement("p");
        p.className = "listItemText";
        p.innerText = text || "田子山富士からのお知らせです。";

        div.appendChild(h);
        div.appendChild(p);
        box.appendChild(div);
      });
    }

    async function saveKicho() {
      const btn = document.getElementById("saveKichoBtn");
      const oldText = btn ? btn.innerText : "";

      const area = getString(document.getElementById("fromArea").value);
      const name = getString(document.getElementById("visitorName").value);
      const message = getString(document.getElementById("visitorMessage").value);

      if (!area) {
        alert("どこから来たか選んでください。");
        return;
      }

      if (!message) {
        alert("メッセージを書いてください。");
        return;
      }

      if (btn) {
        btn.disabled = true;
        btn.innerText = "記帳中...";
      }

      try {
        const params = new URLSearchParams();
        params.set("area", area);
        params.set("from", area);
        params.set("name", name || "匿名");
        params.set("message", message);
        params.set("userId", currentUserId || "");
        params.set("t", String(Date.now()));

        await tryManyJson([
          GAS_URL + "?saveKicho=1&" + params.toString(),
          GAS_URL + "?mode=saveKicho&" + params.toString(),
          GAS_URL + "?action=saveKicho&" + params.toString()
        ]);

        alert("ご縁帳に記帳しました。");

        document.getElementById("visitorName").value = "";
        document.getElementById("visitorMessage").value = "";

        closeModal("kichoModal");
      } catch (error) {
        console.error(error);
        alert("記帳できませんでした。通信状況を確認してもう一度お試しください。");
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.innerText = oldText || "記帳する";
        }
      }
    }

    async function loadGoen() {
      const box = document.getElementById("goenList");

      if (box) {
        box.innerHTML = '<div class="modalText">ご縁帳を読み込み中です。</div>';
      }

      try {
        const data = await tryManyJson([
          GAS_URL + "?goen=1&t=" + Date.now(),
          GAS_URL + "?mode=goen&t=" + Date.now(),
          GAS_URL + "?action=goen&t=" + Date.now()
        ]);

        const list = extractList(data);

        renderGoen(list);
      } catch (error) {
        console.error(error);

        if (box) {
          box.innerHTML =
            '<div class="modalText">ご縁帳を読み込めませんでした。</div>';
        }
      }
    }

    function renderGoen(list) {
      const box = document.getElementById("goenList");

      if (!box) {
        return;
      }

      if (!list || !list.length) {
        box.innerHTML =
          '<div class="modalText">まだ表示できるご縁帳はありません。</div>';
        return;
      }

      box.innerHTML = "";

      list.forEach(function(item) {
        const title =
          getFirst(
            item.area,
            item.from,
            item.place,
            item.地域,
            item.name,
            "ご縁"
          );

        const message =
          getFirst(
            item.message,
            item.text,
            item.body,
            item.comment,
            item.メッセージ,
            ""
          );

        const name =
          getFirst(
            item.name,
            item.visitorName,
            item.nickname,
            item.名前,
            "匿名"
          );

        const date =
          getFirst(
            item.date,
            item.createdAt,
            item.time,
            item.日時,
            ""
          );

        const div = document.createElement("div");
        div.className = "listItem";

        const h = document.createElement("p");
        h.className = "listItemTitle";
        h.innerText = title;

        const p = document.createElement("p");
        p.className = "listItemText";
        p.innerText =
          message +
          "\n\n" +
          name +
          (date ? " / " + formatDateText(date) : "");

        div.appendChild(h);
        div.appendChild(p);
        box.appendChild(div);
      });
    }

    function extractList(data) {
      if (!data) {
        return [];
      }

      if (Array.isArray(data)) {
        return data;
      }

      if (Array.isArray(data.list)) {
        return data.list;
      }

      if (Array.isArray(data.rows)) {
        return data.rows;
      }

      if (Array.isArray(data.items)) {
        return data.items;
      }

      if (Array.isArray(data.data)) {
        return data.data;
      }

      if (data.data && Array.isArray(data.data.list)) {
        return data.data.list;
      }

      if (data.data && Array.isArray(data.data.rows)) {
        return data.data.rows;
      }

      if (data.data && Array.isArray(data.data.items)) {
        return data.data.items;
      }

      return [];
    }

    async function tryManyJson(urls) {
      let lastError = null;

      for (let i = 0; i < urls.length; i++) {
        try {
          const data = await getJson(urls[i]);

          if (data !== null && data !== undefined) {
            return data;
          }
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("通信に失敗しました。");
    }

    async function getJson(url) {
      try {
        const res = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const text = await res.text();
        return parseJsonText(text);
      } catch (fetchError) {
        return await getJsonp(url);
      }
    }

    function parseJsonText(text) {
      const value = String(text || "").trim();

      if (!value) {
        throw new Error("empty response");
      }

      try {
        return JSON.parse(value);
      } catch (error) {
        const start = value.indexOf("{");
        const end = value.lastIndexOf("}");

        if (start >= 0 && end > start) {
          return JSON.parse(value.substring(start, end + 1));
        }

        throw error;
      }
    }

    function getJsonp(url) {
      return new Promise(function(resolve, reject) {
        const callbackName =
          "tagoyamaIndexCallback_" +
          Date.now() +
          "_" +
          Math.floor(Math.random() * 1000000);

        const script = document.createElement("script");
        const sep = url.indexOf("?") >= 0 ? "&" : "?";

        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 12000);

        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("JSONP error"));
        };

        script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
        document.body.appendChild(script);

        function cleanup() {
          clearTimeout(timer);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      });
    }

    function normalizeNumberText(value) {
      const text = toHalfWidthNumber(getString(value));
      const match = text.match(/[0-9]+/);

      if (match && match[0]) {
        return match[0];
      }

      return "";
    }

    function cleanSerialNo(value) {
      return toHalfWidthNumber(getString(value))
        .replace(/^No\./i, "")
        .replace(/^No/i, "")
        .replace(/^記念番号/, "")
        .trim();
    }

    function formatDateText(value) {
      const text = getString(value);

      if (!text) {
        return "";
      }

      return text
        .replace(/-/g, "/")
        .replace(/\./g, "/")
        .replace(/\s.*$/, "");
    }

    function toHalfWidthNumber(value) {
      return getString(value).replace(/[０-９]/g, function(s) {
        return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
      });
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }

    function getFirst() {
      for (let i = 0; i < arguments.length; i++) {
        const value = getString(arguments[i]);

        if (value) {
          return value;
        }
      }

      return "";
    }

    window.openNews = openNews;
    window.openKicho = openKicho;
    window.openGoen = openGoen;
    window.closeModal = closeModal;
    window.saveKicho = saveKicho;
  </script>
