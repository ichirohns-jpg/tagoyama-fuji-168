<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>田子山富士168の縁</title>

<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" href="logo.png">

<meta property="og:image" content="https://raw.githubusercontent.com/ichirohns-jpg/tagoyama-fuji-168/main/logo.png">
<meta name="twitter:image" content="https://raw.githubusercontent.com/ichirohns-jpg/tagoyama-fuji-168/main/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#fff;
}

.hero img{
width:100%;
display:block;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.title{
font-size:42px;
font-weight:900;
text-align:center;
}

.sub{
font-size:22px;
font-weight:900;
color:#d4af37;
text-align:center;
margin:10px 0 30px;
}

.card{
background:#1a1a1a;
border:2px solid #d4af37;
border-radius:24px;
padding:20px;
margin-bottom:18px;
}

.cardTitle{
font-size:24px;
font-weight:900;
color:#d4af37;
margin-bottom:12px;
}

.bigBtn{
display:block;
width:100%;
padding:22px;
border-radius:18px;
background:#d4af37;
color:#000;
font-size:26px;
font-weight:900;
text-decoration:none;
text-align:center;
margin-top:12px;
}

.count{
font-size:42px;
font-weight:900;
text-align:center;
color:#f3d57a;
}

</style>
</head>

<body>

<div class="hero">
<img src="top.jpg">
</div>

<div class="wrap">

<div style="text-align:center;margin-bottom:20px;">

<img
src="logo.png"
style="
max-width:320px;
width:90%;
height:auto;
">

</div>

<div class="title">
田子山富士
</div>

<div class="sub">
168の縁プロジェクト
</div>

<div class="card">

<div class="cardTitle">
参加人数
</div>

<div
id="count"
class="count">
-
</div>

</div>

<div class="card">

<div class="cardTitle">
⛩️ 登頂受付
</div>

<a
href="qr.html"
class="bigBtn">

登頂を記録する

</a>

</div>

<div class="card">

<div class="cardTitle">
📢 お知らせ
</div>

<a
href="news.html"
class="bigBtn">

お知らせを見る

</a>

</div>

<div class="card">

<div class="cardTitle">
🎋 おみくじ
</div>

<a
href="omikuji.html"
class="bigBtn">

開運おみくじ

</a>

</div>

<div class="card">

<div class="cardTitle">
🌸 ご縁帳
</div>

<a
href="kicho.html"
class="bigBtn">

参拝記帳

</a>

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbwg3si951hM8vwudOZYqOGROQwtC8i2fttC0WvQ8gsk_Y_d2Ko4eJ19YfrutpP4YrDPsQ/exec";

async function loadStats(){

try{

const res =
await fetch(

GAS_URL +
"?mode=stats&time=" +
Date.now(),

{
cache:"no-store"
}

);

if(!res.ok){

throw new Error(
"GAS Error"
);

}

const data =
await res.json();

document.getElementById(
"count"
).innerText =

Number(
data.participants || 0
).toLocaleString();

}catch(err){

console.error(err);

document.getElementById(
"count"
).innerText =
"0";

}

}

document.addEventListener(
"DOMContentLoaded",
function(){

loadStats();

setInterval(
loadStats,
30000
);

});

</script>

</body>
</html>
