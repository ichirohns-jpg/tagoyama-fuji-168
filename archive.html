<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>過去のお知らせ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:
"Hiragino Sans",
"Yu Gothic",
"Meiryo",
sans-serif;
color:#fff;
}

.hero img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
display:block;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.titleBox{
text-align:center;
margin-bottom:20px;
}

.title{
font-size:42px;
font-weight:900;
color:#d4af37;
}

.sub{
margin-top:8px;
font-size:20px;
color:#ccc;
}

.newsCard{
background:
linear-gradient(
180deg,
#1c1c1c,
#0f0f0f
);
border:2px solid #d4af37;
border-radius:24px;
padding:20px;
margin-bottom:20px;
box-shadow:
0 12px 32px rgba(0,0,0,.45);
}

.newsTitle{
font-size:34px;
font-weight:900;
line-height:1.5;
color:#fff;
}

.newsDate{
font-size:20px;
font-weight:900;
color:#d4af37;
margin-top:12px;
}

.loading{
text-align:center;
font-size:28px;
font-weight:900;
padding:60px 0;
color:#d4af37;
}

.homeBtn{
display:block;
width:100%;
padding:20px;
margin-top:20px;
background:#263238;
color:#fff;
text-decoration:none;
text-align:center;
font-size:22px;
font-weight:900;
border-radius:16px;
}

</style>
</head>

<body>

<div class="hero">
<img
src="top.jpg"
alt="田子山富士">
</div>

<div class="wrap">

<div class="titleBox">

<div class="title">
📚 過去のお知らせ
</div>

<div class="sub">
これまでのお知らせ一覧
</div>

</div>

<div
id="loading"
class="loading">

読込中...

</div>

<div
id="archiveList">

</div>

<a
href="news.html"
class="homeBtn">

📢 最新のお知らせへ

</a>

<a
href="index.html"
class="homeBtn">

🏠 田子山富士へ戻る

</a>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyJ0TePu884eFy8nfBYRjGrL6GCh8u0gfCE-L2MyytgVqa6JFj0uWQmhnucMLFnbdkOmA/exec";

fetch(
GAS_URL +
"?mode=news"
)
.then(
r=>r.json()
)
.then(
rows=>{

document.getElementById(
"loading"
).style.display =
"none";

const archiveList =
document.getElementById(
"archiveList"
);

archiveList.innerHTML = "";

rows.forEach(
(row,index)=>{

archiveList.innerHTML +=
`
<div class="newsCard">

<a
href="article.html?id=${index}"
style="
text-decoration:none;
color:#fff;
display:block;
">

<div class="newsTitle">
${row.title || ""}
</div>

</a>

<div class="newsDate">

${String(row.date || "")
.replace(
"T15:00:00.000Z",
""
)
.replace(
/-/g,
"/"
)}

</div>

</div>
`;

}
);

})
.catch(
err=>{

document.getElementById(
"loading"
).innerHTML =
"お知らせがありません";

console.log(err);

}
);

</script>

</body>
</html>
