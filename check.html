<head>

  <link rel="apple-touch-icon" href="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 225, 110, 0.18), rgba(0, 0, 0, 0) 36%),
        linear-gradient(180deg, #221600 0%, #070707 48%, #000000 100%);
      color: #fff7ca;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .page {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 12px 48px;
    }

    .hero {
      text-align: center;
      margin: 0 0 16px;
    }

    .logoBox {
      width: 132px;
      height: 132px;
      margin: 0 auto 14px;
      border-radius: 30px;
      overflow: hidden;
      background: #000000;
      border: 3px solid rgba(255, 220, 95, 0.80);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.50),
        0 0 18px rgba(255, 210, 80, 0.22);
    }

    .logoBox img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .siteTitle {
      margin: 0;
      font-size: clamp(34px, 9vw, 64px);
      line-height: 1.16;
      font-weight: 900;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.92),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .siteSub {
      margin: 10px 0 0;
      font-size: clamp(19px, 5.2vw, 32px);
      line-height: 1.45;
      font-weight: 900;
      color: #fff3c4;
      text-shadow: 0 3px 3px rgba(0, 0, 0, 0.88);
    }

    .card {
      margin: 16px 0;
      padding: 20px 14px;
      border-radius: 28px;
      background:
        radial-gradient(circle at top, rgba(255, 224, 120, 0.16), rgba(0, 0, 0, 0) 46%),
        linear-gradient(180deg, rgba(44, 28, 0, 0.92), rgba(10, 10, 10, 0.94));
      border: 2px solid rgba(255, 220, 95, 0.58);
      box-shadow:
        0 0 0 1px rgba(255, 230, 150, 0.10) inset,
        0 12px 28px rgba(0, 0, 0, 0.42);
    }

    .cardTitle {
      margin: 0 0 14px;
      font-size: clamp(28px, 7.8vw, 50px);
      font-weight: 900;
      text-align: center;
      line-height: 1.25;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.90),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .lead {
      margin: 0;
      color: #fff1bd;
      text-align: center;
      font-size: clamp(18px, 5vw, 30px);
      font-weight: 900;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .checkList {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    .checkItem {
      padding: 16px 14px;
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.38);
      border: 2px solid rgba(255, 220, 95, 0.42);
    }

    .itemTitle {
      margin: 0 0 8px;
      color: #ffdf72;
      font-size: clamp(22px, 6.2vw, 38px);
      font-weight: 900;
      line-height: 1.35;
    }

    .itemUrl {
      margin: 0 0 12px;
      color: #fff1bd;
      font-size: clamp(13px, 3.8vw, 20px);
      line-height: 1.45;
      font-weight: 800;
      word-break: break-all;
      white-space: pre-wrap;
    }

    .preview {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
      border: 2px solid rgba(255, 220, 95, 0.46);
      background: #111111;
      margin: 0 0 12px;
    }

    .btnArea {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .btn,
    .linkBtn {
      width: 100%;
      min-height: 62px;
      border: none;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: clamp(17px, 4.8vw, 28px);
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      box-shadow:
        0 6px 0 rgba(0, 0, 0, 0.32),
        0 10px 18px rgba(0, 0, 0, 0.34);
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .btn:active,
    .linkBtn:active {
      transform: translateY(3px);
      box-shadow:
        0 3px 0 rgba(0, 0, 0, 0.32),
        0 6px 12px rgba(0, 0, 0, 0.32);
    }

    .goldBtn {
      color: #271400;
      background: linear-gradient(180deg, #fff1a4 0%, #ffd84d 48%, #c89217 100%);
    }

    .greenBtn {
      background: linear-gradient(180deg, #38e988 0%, #09b957 100%);
    }

    .blueBtn {
      background: linear-gradient(180deg, #2e83ff 0%, #0b4fc4 100%);
    }

    .blackBtn {
      background: linear-gradient(180deg, #323232 0%, #050505 100%);
    }

    .footer {
      margin: 28px 0 0;
      text-align: center;
      color: #c9b56b;
      font-weight: 800;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        border-radius: 26px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .logoBox {
        width: 122px;
        height: 122px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <header class="hero">
      <div class="logoBox">
        <img
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
          alt="田子山富士"
          onerror="this.style.display='none'"
        >
      </div>

      <h1 class="siteTitle">OGP・シェア確認</h1>
      <p class="siteSub">田子山富士 168の縁プロジェクト</p>
    </header>

    <section class="card">
      <h2 class="cardTitle">確認すること</h2>
      <p class="lead">
        Facebook・LINE・Xで出すページと画像を確認します。
        画像が出ない場合は、GitHub上の画像ファイル名とコード内のURLを合わせてください。
      </p>
    </section>

    <section class="card">
      <h2 class="cardTitle">ページ確認</h2>
      <div class="checkList" id="pageList"></div>
    </section>

    <section class="card">
      <h2 class="cardTitle">OGP画像確認</h2>
      <div class="checkList" id="imageList"></div>
    </section>

    <section class="card">
      <h2 class="cardTitle">最後の確認</h2>
      <div class="btnArea">
        <a class="linkBtn goldBtn" href="index.html">トップへ戻る</a>
        <button class="btn blueBtn" type="button" onclick="copyAllLinks()">確認リンクをコピー</button>
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      OGP・SNSシェア確認
    </footer>
  </main>

  <script>
    const BASE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

    const pages = [
      {
        title: "トップ",
        url: BASE,
        image: BASE + "ogp-main.jpg?v=20260704-main"
      },
      {
        title: "登頂記念証",
        url: BASE + "certificate.html",
        image: BASE + "ogp-certificate.jpg?v=20260704-certificate"
      },
      {
        title: "おみくじ",
        url: BASE + "omikuji.html",
        image: BASE + "ogp-omikuji.jpg?v=20260704-omikuji"
      },
      {
        title: "登頂記念証シェア",
        url: BASE + "share-certificate.html?c=3&s=3-0001&d=2026/07/04&p=11&v=20260704",
        image: BASE + "ogp-certificate.jpg?v=20260704-certificate"
      },
      {
        title: "おみくじシェア",
        url: BASE + "share-omikuji.html?r=大吉&t=田子山富士のご縁&m=よいご縁が広がります&v=20260704",
        image: BASE + "ogp-omikuji.jpg?v=20260704-omikuji"
      },
      {
        title: "お知らせ",
        url: BASE + "news.html",
        image: BASE + "ogp.jpg?v=20260704-news"
      },
      {
        title: "お知らせシェア",
        url: BASE + "share-news.html?title=田子山富士のお知らせ&body=田子山富士168の縁プロジェクトからのお知らせです&v=20260704",
        image: BASE + "ogp.jpg?v=20260704-news"
      }
    ];

    const images = [
      {
        title: "トップ用 OGP",
        url: BASE + "ogp-main.jpg?v=20260704-main"
      },
      {
        title: "登頂記念証用 OGP",
        url: BASE + "ogp-certificate.jpg?v=20260704-certificate"
      },
      {
        title: "おみくじ用 OGP",
        url: BASE + "ogp-omikuji.jpg?v=20260704-omikuji"
      },
      {
        title: "お知らせ用 OGP",
        url: BASE + "ogp.jpg?v=20260704-news"
      },
      {
        title: "ロゴ",
        url: BASE + "logo.png?v=20260704-logo"
      }
    ];

    document.addEventListener("DOMContentLoaded", function() {
      renderPages();
      renderImages();
    });

    function renderPages() {
      const list = document.getElementById("pageList");
      list.innerHTML = "";

      pages.forEach(function(item) {
        const box = document.createElement("div");
        box.className = "checkItem";

        const title = document.createElement("h3");
        title.className = "itemTitle";
        title.innerText = item.title;

        const url = document.createElement("p");
        url.className = "itemUrl";
        url.innerText = item.url;

        const buttons = document.createElement("div");
        buttons.className = "btnArea";

        const open = document.createElement("a");
        open.className = "linkBtn goldBtn";
        open.href = item.url;
        open.target = "_blank";
        open.rel = "noopener";
        open.innerText = "ページを開く";

        const facebook = document.createElement("button");
        facebook.className = "btn blueBtn";
        facebook.type = "button";
        facebook.innerText = "Facebook確認";
        facebook.onclick = function() {
          window.open(
            "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(item.url),
            "_blank",
            "noopener,noreferrer"
          );
        };

        const line = document.createElement("button");
        line.className = "btn greenBtn";
        line.type = "button";
        line.innerText = "LINE確認";
        line.onclick = function() {
          location.href =
            "https://social-plugins.line.me/lineit/share?url=" +
            encodeURIComponent(item.url);
        };

        const x = document.createElement("button");
        x.className = "btn blackBtn";
        x.type = "button";
        x.innerText = "X確認";
        x.onclick = function() {
          window.open(
            "https://twitter.com/intent/tweet?url=" + encodeURIComponent(item.url),
            "_blank",
            "noopener,noreferrer"
          );
        };

        const copy = document.createElement("button");
        copy.className = "btn blueBtn";
        copy.type = "button";
        copy.innerText = "URLコピー";
        copy.onclick = function() {
          copyText(item.url);
        };

        buttons.appendChild(open);
        buttons.appendChild(facebook);
        buttons.appendChild(line);
        buttons.appendChild(x);
        buttons.appendChild(copy);

        box.appendChild(title);
        box.appendChild(url);
        box.appendChild(buttons);

        list.appendChild(box);
      });
    }

    function renderImages() {
      const list = document.getElementById("imageList");
      list.innerHTML = "";

      images.forEach(function(item) {
        const box = document.createElement("div");
        box.className = "checkItem";

        const title = document.createElement("h3");
        title.className = "itemTitle";
        title.innerText = item.title;

        const url = document.createElement("p");
        url.className = "itemUrl";
        url.innerText = item.url;

        const img = document.createElement("img");
        img.className = "preview";
        img.src = item.url;
        img.alt = item.title;
        img.onerror = function() {
          this.style.display = "none";
          const err = document.createElement("p");
          err.className = "itemUrl";
          err.innerText = "画像が見つかりません。GitHubのファイル名を確認してください。";
          box.appendChild(err);
        };

        const buttons = document.createElement("div");
        buttons.className = "btnArea";

        const open = document.createElement("a");
        open.className = "linkBtn goldBtn";
        open.href = item.url;
        open.target = "_blank";
        open.rel = "noopener";
        open.innerText = "画像を開く";

        const copy = document.createElement("button");
        copy.className = "btn blueBtn";
        copy.type = "button";
        copy.innerText = "画像URLコピー";
        copy.onclick = function() {
          copyText(item.url);
        };

        buttons.appendChild(open);
        buttons.appendChild(copy);

        box.appendChild(title);
        box.appendChild(url);
        box.appendChild(img);
        box.appendChild(buttons);

        list.appendChild(box);
      });
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert("コピーしました。");
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = text;
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.focus();
        area.select();
        document.execCommand("copy");
        area.remove();
        alert("コピーしました。");
      }
    }

    function copyAllLinks() {
      const text =
        pages.map(function(item) {
          return item.title + "\n" + item.url;
        }).join("\n\n") +
        "\n\n--- OGP画像 ---\n\n" +
        images.map(function(item) {
          return item.title + "\n" + item.url;
        }).join("\n\n");

      copyText(text);
    }
  </script>
</body>
</html>
