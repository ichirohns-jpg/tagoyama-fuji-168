  <style>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

    const HOME_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

    const CERTIFICATE_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

    const SHARE_OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-omikuji.html";

    const FALLBACK_LOGO =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png";

    const FALLBACK_OGP =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji-atari.jpg?v=20260703-omikuji";

    let currentUserId = "";
    let currentResult = null;
    let drawFinished = false;

    window.addEventListener("load", init);

    function init() {
      currentUserId = getUserIdFromUrl();

      if (currentUserId) {
        localStorage.setItem("tagoyamaUserId", currentUserId);
        localStorage.setItem("tagoyamaFujiUserId", currentUserId);
      } else {
        currentUserId =
          localStorage.getItem("tagoyamaUserId") ||
          localStorage.getItem("tagoyamaFujiUserId") ||
          "";
      }

      updateLinks();

      const params = new URLSearchParams(location.search);
      const auto = getString(params.get("auto"));

      if (auto === "1" || auto === "true") {
        setTimeout(function() {
          drawOmikuji();
        }, 400);
      }
    }

    function getUserIdFromUrl() {
      const params = new URLSearchParams(location.search);

      return getString(
        params.get("userId") ||
        params.get("userid") ||
        params.get("uid") ||
        params.get("id") ||
        ""
      );
    }

    function updateLinks() {
      const topLink = document.getElementById("topLink");
      const topLink2 = document.getElementById("topLink2");
      const certificateLink = document.getElementById("certificateLink");

      if (topLink) {
        topLink.href =
          currentUserId
            ? "index.html?userId=" + encodeURIComponent(currentUserId)
            : "index.html";
      }

      if (topLink2) {
        topLink2.href =
          currentUserId
            ? "index.html?userId=" + encodeURIComponent(currentUserId)
            : "index.html";
      }

      if (certificateLink) {
        const savedData = getSavedClimbData();

        if (savedData && savedData.userId && savedData.climbCount && savedData.serialNo) {
          certificateLink.href = buildCertificateUrl(savedData);
        } else {
          certificateLink.href =
            currentUserId
              ? "certificate.html?userId=" + encodeURIComponent(currentUserId)
              : "certificate.html";
        }
      }
    }

    function getSavedClimbData() {
      try {
        const text = localStorage.getItem("tagoyamaClimbData");

        if (!text) {
          return null;
        }

        const data = JSON.parse(text);

        if (!data || !data.userId) {
          return null;
        }

        return data;
      } catch (error) {
        return null;
      }
    }

    function buildCertificateUrl(data) {
      const params = new URLSearchParams();

      params.set("userId", getString(data.userId));

      if (data.climbCount) {
        params.set("climbCount", getString(data.climbCount));
      }

      if (data.serialNo) {
        params.set("serialNo", getString(data.serialNo));
      }

      if (data.lastDate) {
        params.set("lastDate", getString(data.lastDate));
      }

      if (data.imageNo) {
        params.set("imageNo", getString(data.imageNo));
      }

      if (data.imageName) {
        params.set("imageName", getString(data.imageName));
      }

      if (data.imageUrl) {
        params.set("imageUrl", getString(data.imageUrl));
      }

      if (data.participantNo) {
        params.set("participantNo", getString(data.participantNo));
      }

      params.set("v", "20260703");

      return CERTIFICATE_PAGE + "?" + params.toString();
    }

    async function drawOmikuji() {
      if (drawFinished) {
        scrollToResult();
        return;
      }

      const btn = document.getElementById("drawBtn");
      const statusBox = document.getElementById("statusBox");

      if (btn) {
        btn.disabled = true;
        btn.innerText = "引いています...";
      }

      if (statusBox) {
        statusBox.innerText = "おみくじを引いています。";
      }

      try {
        const data = await loadOmikujiFromGas();

        if (!data || data.success === false) {
          throw new Error(
            data && data.message
              ? data.message
              : "おみくじを取得できませんでした。"
          );
        }

        currentResult = normalizeOmikujiData(data);

        if (!currentResult.result && !currentResult.title && !currentResult.message && !currentResult.imageUrl) {
          throw new Error("おみくじの内容を取得できませんでした。");
        }

        saveCurrentResult(currentResult);
        renderResult(currentResult);

        drawFinished = true;

        if (statusBox) {
          statusBox.innerText = "おみくじを引きました。";
        }

        if (btn) {
          btn.disabled = true;
          btn.innerText = "おみくじを引きました";
          btn.style.display = "none";
        }

        scrollToResult();
      } catch (error) {
        console.error(error);

        if (statusBox) {
          statusBox.innerText =
            error && error.message
              ? error.message
              : "おみくじを取得できませんでした。";
        }

        if (btn) {
          btn.disabled = false;
          btn.innerText = "おみくじを引く";
        }
      }
    }

    async function loadOmikujiFromGas() {
      const urls = [];
      const t = Date.now();

      function add(url) {
        urls.push(url);
      }

      const userQuery =
        currentUserId
          ? "&userId=" + encodeURIComponent(currentUserId)
          : "";

      add(GAS_URL + "?mode=omikuji" + userQuery + "&t=" + t);
      add(GAS_URL + "?action=omikuji" + userQuery + "&t=" + t);
      add(GAS_URL + "?omikuji=1" + userQuery + "&t=" + t);

      let lastError = null;

      for (let i = 0; i < urls.length; i++) {
        try {
          const data = await getJson(urls[i]);

          if (data && typeof data === "object") {
            return data;
          }
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("おみくじを取得できませんでした。");
    }

    async function getJson(url) {
      try {
        const res = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const text = await res.text();
        return parseJsonText(text);
      } catch (fetchError) {
        return await getJsonp(url);
      }
    }

    function parseJsonText(text) {
      const value = String(text || "").trim();

      if (!value) {
        throw new Error("empty response");
      }

      try {
        return JSON.parse(value);
      } catch (error) {
        const start = value.indexOf("{");
        const end = value.lastIndexOf("}");

        if (start >= 0 && end > start) {
          return JSON.parse(value.substring(start, end + 1));
        }

        throw error;
      }
    }

    function getJsonp(url) {
      return new Promise(function(resolve, reject) {
        const callbackName =
          "tagoyamaOmikujiCallback_" +
          Date.now() +
          "_" +
          Math.floor(Math.random() * 1000000);

        const script = document.createElement("script");
        const sep = url.indexOf("?") >= 0 ? "&" : "?";

        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 12000);

        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("JSONP error"));
        };

        script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
        document.body.appendChild(script);

        function cleanup() {
          clearTimeout(timer);

          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      });
    }

    function normalizeOmikujiData(data) {
      data = data || {};

      const nested =
        data.data && typeof data.data === "object"
          ? data.data
          : {};

      const source = Object.assign({}, data, nested);

      const result =
        getFirst(
          source.result,
          source.fortune,
          source.unsei,
          source.title,
          source.name,
          source.omikuji,
          source.rank
        );

      const title =
        getFirst(
          source.title,
          source.imageName,
          source.image_name,
          source.name,
          source.subtitle,
          source.heading
        );

      const message =
        getFirst(
          source.message,
          source.text,
          source.body,
          source.comment,
          source.advice,
          source.description,
          source.detail
        );

      const imageUrl =
        normalizeImageUrl(
          getFirst(
            source.imageUrl,
            source.imgUrl,
            source.image,
            source.url,
            source.photo,
            source.picture,
            source.thumbnail
          )
        );

      const imageNo =
        getFirst(
          source.imageNo,
          source.image_no,
          source.no,
          source.id
        );

      const imageName =
        getFirst(
          source.imageName,
          source.image_name,
          source.name,
          source.title
        );

      return {
        userId: currentUserId,
        result: result || "おみくじ",
        title: title || "今日の運勢",
        message: message || "田子山富士のご縁を、みなさんにもおすそ分けします。",
        imageUrl: imageUrl || FALLBACK_OGP,
        imageNo: imageNo,
        imageName: imageName
      };
    }

    function saveCurrentResult(result) {
      try {
        localStorage.setItem("tagoyamaOmikujiResult", JSON.stringify(result));
      } catch (error) {
        console.warn(error);
      }
    }

    function renderResult(result) {
      result = result || {};

      const section = document.getElementById("resultSection");
      const image = document.getElementById("resultImage");
      const fortuneText = document.getElementById("fortuneText");
      const titleText = document.getElementById("titleText");
      const messageText = document.getElementById("messageText");

      if (section) {
        section.classList.add("show");
      }

      if (image) {
        image.src = result.imageUrl || FALLBACK_OGP;
      }

      if (fortuneText) {
        fortuneText.innerText = result.result || "おみくじ";
      }

      if (titleText) {
        titleText.innerText = result.title || "今日の運勢";
      }

      if (messageText) {
        messageText.innerText =
          result.message ||
          "田子山富士のご縁を、みなさんにもおすそ分けします。";
      }

      updateLinks();
    }

    function scrollToResult() {
      const section = document.getElementById("resultSection");

      if (section) {
        section.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      }
    }

    function handleResultImageError() {
      const image = document.getElementById("resultImage");

      if (!image) {
        return;
      }

      if (image.src !== FALLBACK_LOGO) {
        image.src = FALLBACK_LOGO;
      }
    }

    async function saveOmikujiImage() {
      const btn = document.getElementById("saveBtn");
      const oldText = btn ? btn.innerText : "";

      if (!currentResult) {
        alert("先におみくじを引いてください。");
        return;
      }

      if (btn) {
        btn.disabled = true;
        btn.innerText = "画像を準備中...";
      }

      try {
        const baseImage = await loadBestResultImage(currentResult.imageUrl);
        const blob = await createOmikujiBlob(baseImage, currentResult);

        if (!blob) {
          alert("おみくじ画像を作成できませんでした。");
          return;
        }

        const safeName =
          currentResult.result
            ? currentResult.result.replace(/[\\/:*?"<>|]/g, "")
            : "omikuji";

        const fileName =
          "tagoyama-omikuji-" +
          safeName +
          ".png";

        const file = new File([blob], fileName, {
          type: "image/png"
        });

        if (
          navigator.canShare &&
          navigator.share &&
          navigator.canShare({
            files: [file]
          })
        ) {
          await navigator.share({
            files: [file],
            title: "田子山富士 開運おみくじ",
            text: makeShareText()
          });
          return;
        }

        downloadBlob(blob, fileName);
      } catch (error) {
        if (error && error.name === "AbortError") {
          return;
        }

        console.error(error);
        alert("おみくじ画像の保存に失敗しました。もう一度押してください。");
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.innerText = oldText || "画像を保存";
        }
      }
    }

    async function loadBestResultImage(imageUrl) {
      const urls = makeImageUrlList(imageUrl);
      const imgEl = document.getElementById("resultImage");

      if (imgEl) {
        if (imgEl.currentSrc) {
          urls.push(imgEl.currentSrc);
        }

        if (imgEl.src) {
          urls.push(imgEl.src);
        }
      }

      for (let i = 0; i < urls.length; i++) {
        const url = getString(urls[i]);

        if (!url) {
          continue;
        }

        try {
          const img = await loadImageForCanvas(url);
          return img;
        } catch (error) {
          console.warn("画像読み込み失敗", url, error);
        }
      }

      return null;
    }

    function loadImageForCanvas(url) {
      return new Promise(function(resolve, reject) {
        const img = new Image();

        img.onload = function() {
          resolve(img);
        };

        img.onerror = function() {
          reject(new Error("画像読み込み失敗: " + url));
        };

        img.crossOrigin = "anonymous";
        img.referrerPolicy = "no-referrer";
        img.src = url;
      });
    }

    function createOmikujiBlob(baseImage, result) {
      return new Promise(function(resolve) {
        const canvas = document.getElementById("saveCanvas") || document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        const width = 1200;
        const height = 1600;

        canvas.width = width;
        canvas.height = height;

        drawOmikujiCanvas(ctx, width, height, baseImage, result);

        try {
          canvas.toBlob(function(blob) {
            resolve(blob || null);
          }, "image/png");
        } catch (error) {
          console.error(error);
          resolve(null);
        }
      });
    }

    function drawOmikujiCanvas(ctx, width, height, baseImage, result) {
      result = result || {};

      const bg = ctx.createLinearGradient(0, 0, 0, height);
      bg.addColorStop(0, "#3a260c");
      bg.addColorStop(0.45, "#15100a");
      bg.addColorStop(1, "#000000");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      if (baseImage) {
        try {
          drawCoverImage(ctx, baseImage, width, height);

          const shade = ctx.createLinearGradient(0, 0, 0, height);
          shade.addColorStop(0, "rgba(0,0,0,0.12)");
          shade.addColorStop(0.45, "rgba(0,0,0,0.28)");
          shade.addColorStop(0.75, "rgba(0,0,0,0.72)");
          shade.addColorStop(1, "rgba(0,0,0,0.92)");
          ctx.fillStyle = shade;
          ctx.fillRect(0, 0, width, height);
        } catch (error) {
          console.error(error);
        }
      }

      const glow = ctx.createRadialGradient(
        width / 2,
        height * 0.18,
        10,
        width / 2,
        height * 0.18,
        width * 0.72
      );
      glow.addColorStop(0, "rgba(255,241,170,0.34)");
      glow.addColorStop(0.45, "rgba(216,179,90,0.12)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, height);

      ctx.save();

      ctx.strokeStyle = "rgba(255,241,170,0.92)";
      ctx.lineWidth = 10;
      roundRect(ctx, 54, 54, width - 108, height - 108, 48);
      ctx.stroke();

      ctx.strokeStyle = "rgba(216,179,90,0.64)";
      ctx.lineWidth = 4;
      roundRect(ctx, 84, 84, width - 168, height - 168, 34);
      ctx.stroke();

      ctx.fillStyle = "rgba(0,0,0,0.46)";
      roundRect(ctx, 120, height * 0.53, width - 240, height * 0.37, 36);
      ctx.fill();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.88)";
      ctx.shadowBlur = 18;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 5;

      drawSeal(ctx, width / 2, height * 0.18, 122);

      ctx.fillStyle = "#fff1aa";
      ctx.font = "900 46px sans-serif";
      ctx.fillText("田子山富士 168の縁プロジェクト", width / 2, height * 0.38);

      ctx.fillStyle = "#fffbe0";
      ctx.font = "900 82px sans-serif";
      ctx.fillText("開運おみくじ", width / 2, height * 0.47);

      ctx.fillStyle = "#ffdf72";
      ctx.font = "900 92px sans-serif";
      ctx.fillText(result.result || "おみくじ", width / 2, height * 0.63);

      ctx.fillStyle = "#fff7ca";
      ctx.font = "900 54px sans-serif";
      wrapText(ctx, result.title || "今日の運勢", width / 2, height * 0.71, width - 260, 64, 2);

      ctx.fillStyle = "#fff1bd";
      ctx.font = "800 40px sans-serif";
      wrapText(
        ctx,
        result.message || "田子山富士のご縁を、みなさんにもおすそ分けします。",
        width / 2,
        height * 0.80,
        width - 280,
        54,
        4
      );

      ctx.fillStyle = "rgba(255,248,220,0.90)";
      ctx.font = "700 28px sans-serif";
      ctx.fillText("田子山富士", width / 2, height * 0.94);

      ctx.restore();
    }

    function drawCoverImage(ctx, img, width, height) {
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;

      if (!iw || !ih) {
        return;
      }

      const scale = Math.max(width / iw, height / ih);
      const sw = width / scale;
      const sh = height / scale;
      const sx = (iw - sw) / 2;
      const sy = (ih - sh) / 2;

      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, width, height);
    }

    function drawSeal(ctx, cx, cy, r) {
      ctx.save();

      const grad = ctx.createRadialGradient(cx, cy, 8, cx, cy, r);
      grad.addColorStop(0, "rgba(255,241,170,0.52)");
      grad.addColorStop(0.62, "rgba(216,179,90,0.28)");
      grad.addColorStop(1, "rgba(0,0,0,0.18)");

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.lineWidth = 8;
      ctx.strokeStyle = "rgba(255,241,170,0.95)";
      ctx.stroke();

      ctx.fillStyle = "#fff1aa";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.75)";
      ctx.shadowBlur = 10;
      ctx.font = "900 46px sans-serif";
      ctx.fillText("田子", cx, cy - 28);
      ctx.fillText("山富士", cx, cy + 30);

      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);

      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      text = getString(text);

      if (!text) {
        return;
      }

      const chars = Array.from(text);
      const lines = [];
      let line = "";

      for (let i = 0; i < chars.length; i++) {
        const test = line + chars[i];

        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = chars[i];

          if (lines.length >= maxLines) {
            break;
          }
        } else {
          line = test;
        }
      }

      if (line && lines.length < maxLines) {
        lines.push(line);
      }

      if (lines.length > maxLines) {
        lines.length = maxLines;
      }

      const startY = y - ((lines.length - 1) * lineHeight) / 2;

      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], x, startY + i * lineHeight);
      }
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = filename;
      a.rel = "noopener";
      document.body.appendChild(a);
      a.click();
      a.remove();

      setTimeout(function() {
        URL.revokeObjectURL(url);
      }, 3000);
    }

    function postFacebook() {
      if (!currentResult) {
        alert("先におみくじを引いてください。");
        return;
      }

      const url = buildShareUrl();

      const shareUrl =
        "https://www.facebook.com/sharer/sharer.php?u=" +
        encodeURIComponent(url);

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    function sendLine() {
      if (!currentResult) {
        alert("先におみくじを引いてください。");
        return;
      }

      const url = buildShareUrl();
      const text = makeShareText() + "\n" + url;

      const shareUrl =
        "https://social-plugins.line.me/lineit/share?url=" +
        encodeURIComponent(url) +
        "&text=" +
        encodeURIComponent(text);

      location.href = shareUrl;
    }

    function postX() {
      if (!currentResult) {
        alert("先におみくじを引いてください。");
        return;
      }

      const url = buildShareUrl();

      const shareUrl =
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(makeShareText()) +
        "&url=" +
        encodeURIComponent(url);

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    async function copyResult() {
      if (!currentResult) {
        alert("先におみくじを引いてください。");
        return;
      }

      const text = makeShareText() + "\n" + buildShareUrl();

      try {
        await navigator.clipboard.writeText(text);
        alert("おみくじの結果をコピーしました。");
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = text;
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.focus();
        area.select();
        document.execCommand("copy");
        area.remove();
        alert("おみくじの結果をコピーしました。");
      }
    }

    function buildShareUrl() {
      const result = currentResult || {};
      const params = new URLSearchParams();

      if (currentUserId) {
        params.set("u", currentUserId);
      }

      if (result.result) {
        params.set("r", result.result);
      }

      if (result.title) {
        params.set("t", result.title);
      }

      if (result.message) {
        params.set("m", result.message);
      }

      const imgid = getDriveId(result.imageUrl);

      if (imgid) {
        params.set("imgid", imgid);
      }

      if (result.imageUrl && !imgid) {
        params.set("img", result.imageUrl);
      }

      params.set("v", "20260703");

      return SHARE_OMIKUJI_PAGE + "?" + params.toString();
    }

    function makeShareText() {
      const result = currentResult || {};

      return "田子山富士 開運おみくじ\n" +
        (result.result || "おみくじ") + "\n" +
        (result.title || "今日の運勢") + "\n" +
        (result.message || "田子山富士のご縁を、みなさんにもおすそ分けします。");
    }

    function makeImageUrlList(url) {
      const urls = [];
      const value = getString(url);
      const driveId = getDriveId(value);

      function add(u) {
        u = getString(u);

        if (u && urls.indexOf(u) === -1) {
          urls.push(u);
        }
      }

      if (driveId) {
        add(
          "https://lh3.googleusercontent.com/d/" +
          encodeURIComponent(driveId) +
          "=w2000"
        );

        add(
          "https://drive.google.com/thumbnail?id=" +
          encodeURIComponent(driveId) +
          "&sz=w2000"
        );

        add(
          "https://drive.google.com/uc?export=view&id=" +
          encodeURIComponent(driveId)
        );
      }

      add(value);
      add(FALLBACK_OGP);
      add(FALLBACK_LOGO);

      return urls;
    }

    function getDriveId(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      let match = value.match(/\/file\/d\/([^/]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/[?&]id=([^&]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

      if (match && match[1]) {
        return match[1];
      }

      if (/^[a-zA-Z0-9_-]{20,}$/.test(value)) {
        return value;
      }

      return "";
    }

    function normalizeImageUrl(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      if (
        value.indexOf("data:image") === 0 ||
        value.indexOf("blob:") === 0
      ) {
        return value;
      }

      const driveId = getDriveId(value);

      if (driveId) {
        return "https://lh3.googleusercontent.com/d/" +
          encodeURIComponent(driveId) +
          "=w2000";
      }

      return value;
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }

    function getFirst() {
      for (let i = 0; i < arguments.length; i++) {
        const value = getString(arguments[i]);

        if (value) {
          return value;
        }
      }

      return "";
    }

    window.drawOmikuji = drawOmikuji;
    window.saveOmikujiImage = saveOmikujiImage;
    window.postFacebook = postFacebook;
    window.sendLine = sendLine;
    window.postX = postX;
    window.copyResult = copyResult;
  </script>
