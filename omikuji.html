<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>田子山富士 開運おみくじ</title>

<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  background:
    radial-gradient(circle at 50% 0%,rgba(255,224,120,.32),rgba(0,0,0,0) 38%),
    linear-gradient(180deg,#3b0904 0%,#130604 38%,#020202 100%);
  color:#fff;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:26px 16px 54px;
}

.hero{
  text-align:center;
  margin-bottom:22px;
}

.logoBox{
  width:100%;
  max-width:520px;
  margin:0 auto 18px;
  border-radius:30px;
  overflow:hidden;
  border:3px solid rgba(255,220,95,.82);
  background:#000;
  box-shadow:
    0 0 0 1px rgba(255,245,190,.18) inset,
    0 14px 30px rgba(0,0,0,.48),
    0 0 24px rgba(255,205,80,.22);
}

.logoBox img{
  display:block;
  width:100%;
  height:auto;
}

.title{
  margin:0;
  font-size:clamp(38px,10vw,70px);
  font-weight:900;
  line-height:1.1;
  color:#ffdf72;
  letter-spacing:.04em;
  text-shadow:
    0 4px 3px rgba(0,0,0,.95),
    0 0 18px rgba(255,210,70,.34);
}

.subtitle{
  margin-top:12px;
  font-size:clamp(18px,4.6vw,30px);
  font-weight:900;
  line-height:1.4;
  color:#fff3c4;
}

.card{
  padding:30px 18px;
  border-radius:30px;
  border:3px solid rgba(255,220,95,.78);
  background:
    radial-gradient(circle at 50% 0%,rgba(255,230,130,.24),rgba(0,0,0,0) 42%),
    rgba(20,14,8,.94);
  box-shadow:
    0 0 0 1px rgba(255,230,150,.10) inset,
    0 12px 30px rgba(0,0,0,.45);
}

.cardTitle{
  margin:0 0 18px;
  font-size:clamp(28px,7.4vw,50px);
  font-weight:900;
  line-height:1.2;
  color:#ffdf72;
  text-align:center;
  text-shadow:0 3px 4px rgba(0,0,0,.9);
}

.cardText{
  margin:0;
  font-size:clamp(20px,5.4vw,34px);
  font-weight:800;
  line-height:1.75;
  text-align:center;
  color:#fff;
}

.statusBox{
  margin-top:18px;
  padding:18px 16px;
  border-radius:20px;
  background:rgba(0,0,0,.34);
  border:1px solid rgba(255,220,140,.32);
  font-size:clamp(17px,4.6vw,28px);
  font-weight:900;
  line-height:1.7;
  text-align:center;
  color:#fff3c4;
  white-space:pre-wrap;
}

.btnArea{
  display:grid;
  gap:18px;
  margin-top:24px;
}

.btn,
.linkBtn{
  width:100%;
  min-height:74px;
  border:none;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:clamp(22px,6vw,40px);
  font-weight:900;
  letter-spacing:.02em;
  color:#fff;
  cursor:pointer;
  text-align:center;
  box-shadow:
    0 8px 0 rgba(0,0,0,.30),
    0 16px 28px rgba(0,0,0,.36);
}

.btn:active,
.linkBtn:active{
  transform:translateY(4px);
  box-shadow:
    0 4px 0 rgba(0,0,0,.30),
    0 8px 16px rgba(0,0,0,.30);
}

.btn:disabled{
  opacity:.68;
  cursor:not-allowed;
}

.goldBtn{
  background:linear-gradient(180deg,#ffe27a,#c79218);
  color:#251400;
}

.greenBtn{
  background:linear-gradient(180deg,#35df86,#19b75e);
}

.lineBtn{
  background:linear-gradient(180deg,#06d45f,#06b84f);
}

.facebookBtn{
  background:linear-gradient(180deg,#1688ff,#075ec9);
}

.xBtn{
  background:linear-gradient(180deg,#222,#030303);
}

.grayBtn{
  background:linear-gradient(180deg,#7f9aa8,#5f7d8d);
}

.blackBtn{
  background:linear-gradient(180deg,#232323,#050505);
}

.resultCard{
  display:none;
  margin-top:26px;
  padding:30px 18px;
  border-radius:30px;
  text-align:center;
  border:3px solid rgba(255,220,95,.76);
  background:
    radial-gradient(circle at 50% 0%,rgba(255,230,130,.26),rgba(0,0,0,0) 42%),
    linear-gradient(180deg,rgba(39,24,6,.98),rgba(0,0,0,.96));
  box-shadow:
    0 0 0 1px rgba(255,244,190,.12) inset,
    0 14px 30px rgba(0,0,0,.48);
}

.resultCard.hit{
  border-color:#ffdf72;
  background:
    radial-gradient(circle at 50% 0%,rgba(255,235,130,.40),rgba(0,0,0,0) 46%),
    linear-gradient(180deg,rgba(58,33,5,.98),rgba(6,3,1,.97));
}

.resultCard.miss{
  border-color:rgba(180,190,195,.68);
  background:
    radial-gradient(circle at 50% 0%,rgba(220,230,235,.18),rgba(0,0,0,0) 45%),
    linear-gradient(180deg,rgba(28,30,32,.98),rgba(0,0,0,.97));
}

.resultBadge{
  display:inline-block;
  margin:0 0 14px;
  padding:8px 18px;
  border-radius:999px;
  background:#8b1209;
  color:#fff0c6;
  font-size:clamp(15px,4vw,22px);
  font-weight:900;
}

.resultTitle{
  margin:0 0 14px;
  font-size:clamp(36px,10vw,66px);
  font-weight:900;
  line-height:1.18;
  color:#ffdf72;
  text-shadow:
    0 3px 4px rgba(0,0,0,.9),
    0 0 18px rgba(255,210,70,.32);
}

.resultText{
  margin:0;
  font-size:clamp(20px,5.6vw,34px);
  font-weight:900;
  line-height:1.65;
  color:#fff;
  white-space:pre-wrap;
}

.resultDate{
  margin-top:14px;
  font-size:clamp(16px,4.2vw,24px);
  font-weight:900;
  color:#fff3c4;
}

.already{
  display:none;
  margin-top:16px;
  padding:14px 12px;
  border-radius:18px;
  background:rgba(255,224,120,.18);
  border:2px solid rgba(255,220,95,.8);
  font-size:clamp(18px,5vw,30px);
  font-weight:900;
  line-height:1.6;
  color:#ffdf72;
  white-space:pre-wrap;
}

.resultImageBox{
  display:none;
  width:100%;
  margin:24px auto 0;
  border-radius:24px;
  overflow:hidden;
  border:2px solid rgba(255,220,95,.78);
  background:#000;
  box-shadow:
    0 0 0 1px rgba(255,245,190,.14) inset,
    0 10px 22px rgba(0,0,0,.46),
    0 0 22px rgba(255,215,90,.18);
}

.resultImage{
  display:block;
  width:100%;
  height:auto;
  object-fit:contain;
  background:#000;
}

.shareActions{
  display:none;
  gap:14px;
  margin-top:24px;
}

.shareNote{
  margin:0;
  font-size:15px;
  font-weight:800;
  line-height:1.7;
  text-align:center;
  color:#fff3c4;
}

.popup{
  display:none;
  position:fixed;
  left:0;
  top:0;
  width:100%;
  height:100%;
  padding:16px;
  background:rgba(0,0,0,.90);
  z-index:9999;
  overflow:auto;
}

.popupInner{
  max-width:720px;
  margin:auto;
  padding:16px;
  border-radius:24px;
  background:#080402;
  border:2px solid #c99a3a;
}

.popupTitle{
  margin:0 0 12px;
  text-align:center;
  font-size:24px;
  font-weight:900;
  color:#ffd36a;
}

.popupGuide{
  margin:0 0 14px;
  text-align:center;
  font-size:17px;
  font-weight:800;
  line-height:1.7;
  color:#fff3c4;
}

#savedImage{
  display:block;
  width:100%;
  height:auto;
  border-radius:16px;
  border:1px solid rgba(255,220,140,.6);
  background:#000;
}

.popupBtn{
  width:100%;
  min-height:60px;
  margin-top:14px;
  border:none;
  border-radius:999px;
  font-size:20px;
  font-weight:900;
  color:#fff;
  cursor:pointer;
}

.footer{
  margin-top:36px;
  padding:24px 0 0;
  text-align:center;
  font-size:14px;
  line-height:1.7;
  color:#c7b77a;
}

@media(max-width:480px){
  .wrap{
    padding:22px 14px 48px;
  }

  .card{
    padding:28px 18px;
    border-radius:28px;
  }

  .logoBox{
    border-radius:26px;
  }

  .btn,
  .linkBtn{
    min-height:72px;
    border-radius:24px;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <header class="hero">
    <div class="logoBox">
      <img src="logo.png" alt="田子山富士">
    </div>

    <h1 class="title">
      開運おみくじ
    </h1>

    <div class="subtitle">
      田子山富士168の縁プロジェクト
    </div>
  </header>

  <section class="card">

    <h2 class="cardTitle">
      おみくじ
    </h2>

    <p class="cardText" id="leadText">
      山頂QRコードで登頂受付をした方だけが<br>
      おみくじを引けます。
    </p>

    <div class="statusBox" id="statusBox">
      準備中です...
    </div>

    <div class="btnArea">
      <button
        id="drawBtn"
        class="btn goldBtn"
        onclick="drawOmikuji()">
        おみくじを引く
      </button>
    </div>

    <div id="resultCard" class="resultCard">

      <div class="resultBadge">
        田子山富士おみくじ
      </div>

      <h2 id="resultTitle" class="resultTitle">
        --
      </h2>

      <div id="resultText" class="resultText">
        --
      </div>

      <div id="resultDate" class="resultDate">
        --
      </div>

      <div id="already" class="already">
        本日のおみくじは終了しました。<br>
        次回の登頂時にまたお楽しみください。
      </div>

      <div id="resultImageBox" class="resultImageBox">
        <img
          id="resultImage"
          class="resultImage"
          src=""
          alt="田子山富士おみくじ画像">
      </div>

      <div id="shareActions" class="btnArea shareActions">

        <button
          class="btn greenBtn"
          onclick="saveOmikujiImage(this)">
          画像を保存
        </button>

        <button
          class="btn grayBtn"
          onclick="copyOmikujiPost()">
          投稿文をコピー
        </button>

        <button
          class="btn facebookBtn"
          onclick="shareOmikuji('facebook')">
          Facebookで投稿
        </button>

        <button
          class="btn lineBtn"
          onclick="shareOmikuji('line')">
          LINEで送る
        </button>

        <button
          class="btn xBtn"
          onclick="shareOmikuji('x')">
          Xで投稿
        </button>

        <a
          class="linkBtn blackBtn"
          href="./">
          ← トップへ戻る
        </a>

        <p class="shareNote">
          Facebookは投稿文をコピーしてから投稿画面を開きます。LINEは画像共有を優先します。
        </p>

      </div>

    </div>

  </section>

  <footer class="footer">
    田子山富士 168の縁プロジェクト<br>
    開運おみくじ
  </footer>

</div>

<div id="popup" class="popup">
  <div class="popupInner">
    <p class="popupTitle">
      田子山富士おみくじ
    </p>

    <p class="popupGuide">
      共有画面で「画像を保存」または「写真に保存」を選んでください。
    </p>

    <img id="savedImage" alt="田子山富士おみくじ画像">

    <button
      class="popupBtn greenBtn"
      onclick="shareSavedImage()">
      写真に保存する
    </button>

    <button
      class="popupBtn blackBtn"
      onclick="closePopup()">
      閉じる
    </button>
  </div>
</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbx5w_dEKm4Tb-GFB0o9AhUgLB1MdziOntuQ8iChEbnSbB6jcUCxp4STritRJeyF_osy/exec";

const OMIKUJI_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const DONE_MESSAGE =
"本日のおみくじは終了しました。\n次回の登頂時にまたお楽しみください。";

let currentUserId = "";
let latestImageSource = "";
let latestFile = null;
let latestShareText = "";
let latestShareUrl = "";
let isDrawing = false;

window.addEventListener(
  "load",
  init
);

function init(){

  currentUserId =
  getStableUserId();

  latestShareUrl =
  OMIKUJI_PAGE +
  "?userId=" +
  encodeURIComponent(currentUserId || "") +
  "&v=" +
  Date.now();

  const status =
  document.getElementById("statusBox");

  if(status){

    if(currentUserId){

      status.innerText =
      "登頂情報を確認しました。おみくじを引けます。";

    }else{

      status.innerText =
      "山頂QRコードで登頂受付をしてから、おみくじを引けます。";

    }

  }

  const drawBtn =
  document.getElementById("drawBtn");

  if(drawBtn){
    drawBtn.onclick = drawOmikuji;
  }

}

function getStableUserId(){

  const params =
  new URLSearchParams(location.search);

  const urlUserId =
  getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    ""
  );

  if(urlUserId){

    localStorage.setItem(
      "tagoyamaUserId",
      urlUserId
    );

    localStorage.setItem(
      "tagoyamaFujiUserId",
      urlUserId
    );

    return urlUserId;

  }

  return getString(
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    ""
  );

}

function getTodayKey(){

  const d =
  new Date();

  const y =
  d.getFullYear();

  const m =
  String(d.getMonth() + 1).padStart(2,"0");

  const day =
  String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;

}

function getDoneKey(userId){

  return "tagoyamaOmikujiDone:" +
  getString(userId) +
  ":" +
  getTodayKey();

}

async function drawOmikuji(){

  if(isDrawing){
    return;
  }

  const btn =
  document.getElementById("drawBtn");

  const status =
  document.getElementById("statusBox");

  const userId =
  getStableUserId();

  currentUserId =
  userId;

  clearResult();

  if(!userId){

    renderResult({
      success:true,
      notClimbed:true,
      hit:false,
      isHit:false,
      type:"none",
      title:"まだ登頂していません",
      text:"山頂QRコードを読み取って登頂受付をすると、おみくじを引けます。",
      message:"山頂QRコードを読み取って登頂受付をすると、おみくじを引けます。",
      imageUrl:"",
      imageDataUrl:""
    });

    if(status){
      status.innerText =
      "山頂QRコードで登頂受付をしてください。";
    }

    return;

  }

  const doneKey =
  getDoneKey(userId);

  const savedToday =
  localStorage.getItem(doneKey);

  if(savedToday){

    try{

      const savedData =
      JSON.parse(savedToday);

      savedData.alreadyDrawn =
      true;

      savedData.alreadyDrawnToday =
      true;

      savedData.notice =
      DONE_MESSAGE;

      renderResult(savedData);

      if(status){
        status.innerText =
        DONE_MESSAGE;
      }

      if(btn){

        btn.disabled =
        false;

        btn.innerText =
        "本日分を確認する";

      }

      return;

    }catch(e){

      localStorage.removeItem(doneKey);

    }

  }

  isDrawing =
  true;

  if(btn){

    btn.disabled =
    true;

    btn.innerText =
    "おみくじ確認中...";

  }

  if(status){

    status.innerText =
    "おみくじを確認しています...";

  }

  try{

    const data =
    await fetchJson(
      GAS_URL +
      "?mode=omikuji" +
      "&userId=" +
      encodeURIComponent(userId) +
      "&t=" +
      Date.now()
    );

    if(!data || data.success === false){

      throw new Error(
        data && data.message
        ? data.message
        : "おみくじを引けませんでした"
      );

    }

    renderResult(data);

    if(!data.notClimbed){

      try{

        localStorage.setItem(
          doneKey,
          JSON.stringify(data)
        );

      }catch(e){}

    }

    if(status){

      if(data.alreadyDrawn || data.alreadyDrawnToday || data.notice){

        status.innerText =
        DONE_MESSAGE;

      }else{

        status.innerText =
        "おみくじ結果を表示しました。";

      }

    }

    if(btn){

      btn.disabled =
      false;

      btn.innerText =
      "本日分を確認する";

    }

  }catch(err){

    if(status){

      status.innerText =
      err && err.message
      ? err.message
      : "おみくじを引けませんでした";

    }

    if(btn){

      btn.disabled =
      false;

      btn.innerText =
      "もう一度確認する";

    }

  }finally{

    isDrawing =
    false;

  }

}

function clearResult(){

  latestImageSource =
  "";

  latestFile =
  null;

  latestShareText =
  "";

  const card =
  document.getElementById("resultCard");

  if(card){

    card.style.display =
    "none";

    card.classList.remove("hit");
    card.classList.remove("miss");

  }

  const imageBox =
  document.getElementById("resultImageBox");

  if(imageBox){
    imageBox.style.display = "none";
  }

  const image =
  document.getElementById("resultImage");

  if(image){

    image.removeAttribute("src");

  }

  const already =
  document.getElementById("already");

  if(already){
    already.style.display = "none";
  }

  const shareActions =
  document.getElementById("shareActions");

  if(shareActions){
    shareActions.style.display = "none";
  }

}

function renderResult(data){

  data =
  data || {};

  const card =
  document.getElementById("resultCard");

  const imageBox =
  document.getElementById("resultImageBox");

  const image =
  document.getElementById("resultImage");

  const title =
  document.getElementById("resultTitle");

  const text =
  document.getElementById("resultText");

  const date =
  document.getElementById("resultDate");

  const shareActions =
  document.getElementById("shareActions");

  const already =
  document.getElementById("already");

  const hit =
  data.hit === true ||
  data.isHit === true ||
  data.type === "hit";

  const notClimbed =
  data.notClimbed === true ||
  data.type === "none";

  const alreadyDrawn =
  data.alreadyDrawn === true ||
  data.alreadyDrawnToday === true ||
  !!data.notice;

  if(card){

    card.style.display =
    "block";

    card.classList.remove("hit");
    card.classList.remove("miss");

    if(hit){
      card.classList.add("hit");
    }else{
      card.classList.add("miss");
    }

  }

  if(title){

    title.innerText =
    getString(
      data.title ||
      data.result ||
      (
        notClimbed
        ? "まだ登頂していません"
        : hit
        ? "大当たり"
        : "小吉"
      )
    );

  }

  if(text){

    text.innerText =
    getString(
      data.text ||
      data.message ||
      data.body ||
      (
        notClimbed
        ? "山頂QRコードを読み取って登頂受付をすると、おみくじを引けます。"
        : hit
        ? "おめでとうございます。田子山富士でご縁をいただきました。"
        : "田子山富士でまた良いご縁がありますように。"
      )
    );

  }

  if(date){
    date.innerText = getTodayKey();
  }

  if(already){

    if(alreadyDrawn){

      already.innerText =
      DONE_MESSAGE;

      already.style.display =
      "block";

    }else{

      already.style.display =
      "none";

    }

  }

  latestImageSource =
  normalizeImageSource(
    data.imageDataUrl ||
    data.imageData ||
    data.imageUrl ||
    data.url ||
    ""
  );

  if(image && latestImageSource){

    image.src =
    latestImageSource;

    if(imageBox){
      imageBox.style.display = "block";
    }

  }else{

    if(image){
      image.removeAttribute("src");
    }

    if(imageBox){
      imageBox.style.display = "none";
    }

  }

  latestShareText =
  getString(
    data.shareText ||
    (
      hit
      ? "田子山富士168の縁プロジェクトでおみくじに当たりました！\n田子山富士でご縁をいただきました。\n\n#田子山富士\n#168の縁プロジェクト"
      : "田子山富士168の縁プロジェクトでおみくじを引きました。\n#田子山富士\n#168の縁プロジェクト"
    )
  );

  latestShareUrl =
  OMIKUJI_PAGE +
  "?userId=" +
  encodeURIComponent(currentUserId || "") +
  "&v=" +
  Date.now();

  if(!notClimbed){

    if(shareActions){
      shareActions.style.display = "grid";
    }

    if(latestImageSource){
      prepareFileSilent();
    }

  }else{

    if(shareActions){
      shareActions.style.display = "none";
    }

  }

}

function normalizeImageSource(value){

  value =
  getString(value);

  if(!value){
    return "";
  }

  if(value.indexOf("data:image") === 0){
    return value;
  }

  if(value.length > 100){

    if(value.indexOf("/9j/") === 0){
      return "data:image/jpeg;base64," + value;
    }

    if(value.indexOf("UklGR") === 0){
      return "data:image/webp;base64," + value;
    }

    if(value.indexOf("iVBOR") === 0){
      return "data:image/png;base64," + value;
    }

  }

  return value;

}

async function prepareFileSilent(){

  try{

    latestFile =
    await imageSourceToFile(
      latestImageSource
    );

  }catch(e){

    latestFile =
    null;

  }

}

async function imageSourceToFile(src){

  src =
  getString(src);

  if(!src){
    throw new Error("画像がありません");
  }

  const response =
  await fetch(src);

  const blob =
  await response.blob();

  const type =
  blob.type ||
  "image/png";

  return new File(
    [blob],
    "tagoyama-omikuji.png",
    {
      type:type
    }
  );

}

async function saveOmikujiImage(button){

  if(!latestImageSource){

    alert("保存できる画像がありません。");

    return;

  }

  if(button){
    button.disabled = true;
  }

  try{

    if(!latestFile){
      await prepareFileSilent();
    }

    if(
      latestFile &&
      navigator.canShare &&
      navigator.canShare({
        files:[latestFile]
      }) &&
      navigator.share
    ){

      await navigator.share({
        files:[latestFile],
        title:"田子山富士おみくじ",
        text:latestShareText
      });

      if(button){
        button.disabled = false;
      }

      return;

    }

  }catch(e){}

  try{

    const savedImage =
    document.getElementById("savedImage");

    const popup =
    document.getElementById("popup");

    if(savedImage && popup){

      savedImage.src =
      latestImageSource;

      popup.style.display =
      "block";

    }else{

      openImageForSave();

    }

  }catch(e){

    openImageForSave();

  }

  if(button){
    button.disabled = false;
  }

}

async function shareSavedImage(){

  try{

    if(!latestFile){
      await prepareFileSilent();
    }

    if(
      latestFile &&
      navigator.canShare &&
      navigator.canShare({
        files:[latestFile]
      }) &&
      navigator.share
    ){

      await navigator.share({
        files:[latestFile],
        title:"田子山富士おみくじ",
        text:latestShareText
      });

      return;

    }

  }catch(e){}

  openImageForSave();

}

function openImageForSave(){

  if(!latestImageSource){
    return;
  }

  const a =
  document.createElement("a");

  a.href =
  latestImageSource;

  a.download =
  "tagoyama-omikuji.png";

  document.body.appendChild(a);

  a.click();

  a.remove();

}

function closePopup(){

  const popup =
  document.getElementById("popup");

  if(popup){
    popup.style.display = "none";
  }

}

function copyOmikujiPost(){

  const text =
  buildShareText();

  if(navigator.clipboard && navigator.clipboard.writeText){

    navigator.clipboard
    .writeText(text)
    .then(function(){

      alert("投稿文をコピーしました。");

    })
    .catch(function(){

      fallbackCopy(text);

    });

  }else{

    fallbackCopy(text);

  }

}

function fallbackCopy(text){

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.style.position =
  "fixed";

  textarea.style.left =
  "-9999px";

  textarea.style.top =
  "0";

  document.body.appendChild(textarea);

  textarea.focus();

  textarea.select();

  try{

    document.execCommand("copy");

    alert("投稿文をコピーしました。");

  }catch(e){

    alert(
      "コピーできませんでした。\n\n" +
      text
    );

  }

  textarea.remove();

}

function shareOmikuji(type){

  const text =
  buildShareText();

  const url =
  latestShareUrl ||
  OMIKUJI_PAGE;

  if(type === "facebook"){

    copyOmikujiPost();

    window.open(
      "https://www.facebook.com/sharer/sharer.php?u=" +
      encodeURIComponent(url),
      "_blank"
    );

    return;

  }

  if(type === "line"){

    window.open(
      "https://line.me/R/msg/text/?" +
      encodeURIComponent(text),
      "_blank"
    );

    return;

  }

  if(type === "x"){

    window.open(
      "https://twitter.com/intent/tweet?text=" +
      encodeURIComponent(text) +
      "&url=" +
      encodeURIComponent(url),
      "_blank"
    );

    return;

  }

}

function buildShareText(){

  let text =
  latestShareText ||
  "田子山富士168の縁プロジェクトでおみくじを引きました。\n#田子山富士\n#168の縁プロジェクト";

  const url =
  latestShareUrl ||
  OMIKUJI_PAGE;

  if(text.indexOf(url) === -1){
    text += "\n\n" + url;
  }

  return text;

}

async function fetchJson(url){

  const response =
  await fetch(
    url,
    {
      method:"GET",
      cache:"no-store"
    }
  );

  if(!response.ok){
    throw new Error("通信エラーです");
  }

  return await response.json();

}

}

function copyPostText(){
  copyOmikujiPost();
}

function shareFacebook(){

}

function getString(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();

}
