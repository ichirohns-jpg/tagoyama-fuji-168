<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;

  width:100%;
  min-height:100%;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  background:
    radial-gradient(circle at 50% 0%,rgba(255,224,120,.32),rgba(0,0,0,0) 38%),
    linear-gradient(180deg,#3b0904 0%,#130604 38%,#020202 100%);
  color:#fff;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:26px 16px 54px;
}

.hero{
  text-align:center;
  margin-bottom:22px;
}

.logoBox{
  width:100%;
  max-width:520px;
  margin:0 auto 18px;
  border-radius:30px;
  overflow:hidden;
  border:3px solid rgba(255,220,95,.82);
  background:#000;
  box-shadow:
    0 0 0 1px rgba(255,245,190,.18) inset,
    0 14px 30px rgba(0,0,0,.48),
    0 0 24px rgba(255,205,80,.22);
}

.logoBox img{
  display:block;
  width:100%;
  height:auto;
}

.title{
  margin:0;
  font-size:clamp(38px,10vw,70px);
  font-weight:900;
  line-height:1.1;
  color:#ffdf72;
  letter-spacing:.04em;
  text-shadow:
    0 4px 3px rgba(0,0,0,.95),

}

.subtitle{
  margin-top:12px;

  font-weight:900;

  color:#fff3c4;
}

.card{
  padding:30px 18px;
  border-radius:30px;
  border:3px solid rgba(255,220,95,.78);
  background:
    radial-gradient(circle at 50% 0%,rgba(255,230,130,.24),rgba(0,0,0,0) 42%),
    rgba(20,14,8,.94);
  box-shadow:
    0 0 0 1px rgba(255,230,150,.10) inset,
    0 12px 30px rgba(0,0,0,.45);
}

.cardTitle{
  margin:0 0 18px;
  font-size:clamp(28px,7.4vw,50px);

.cardText{

}

.resultCard.miss{
  border-color:rgba(180,190,195,.68);
  background:

}

  display:inline-block;
  margin:0 0 14px;
  padding:8px 18px;

  color:#fff0c6;
  font-size:clamp(15px,4vw,22px);
  font-weight:900;
}

.resultTitle{
  margin:0 0 14px;
  font-size:clamp(36px,10vw,66px);
  font-weight:900;
  line-height:1.18;
  color:#ffdf72;
  text-shadow:
    0 3px 4px rgba(0,0,0,.9),

}

.resultText{
  margin:0;
  font-size:clamp(20px,5.6vw,34px);
  font-weight:900;
  line-height:1.65;
  color:#fff;
  white-space:pre-wrap;
}

.resultDate{
  margin-top:14px;
  font-size:clamp(16px,4.2vw,24px);
  font-weight:900;

}

.already{

  margin-top:16px;

  color:#ffdf72;
  white-space:pre-wrap;
}

.resultImageBox{
  display:none;
  width:100%;
  margin:24px auto 0;
  border-radius:24px;
  overflow:hidden;
  border:2px solid rgba(255,220,95,.78);
  background:#000;
  box-shadow:
    0 0 0 1px rgba(255,245,190,.14) inset,

}

.resultImage{
  display:block;
  width:100%;
  height:auto;
  object-fit:contain;

}

.shareActions{

}

.shareGuide{

  font-weight:800;

  text-align:center;

}

.popup{
  display:none;
  position:fixed;
  left:0;
  top:0;
  width:100%;
  height:100%;
  padding:16px;

}

.popupInner{
  max-width:720px;
  margin:auto;
  padding:16px;
  border-radius:24px;

  border:2px solid #c99a3a;
}

.popupTitle{
  margin:0 0 12px;
  text-align:center;
  font-size:24px;
  font-weight:900;
  color:#ffd36a;
}

.popupGuide{
  margin:0 0 14px;
  text-align:center;
  font-size:17px;
  font-weight:800;
  line-height:1.7;
  color:#fff3c4;
}

#savedImage{
  display:block;
  width:100%;
  height:auto;
  border-radius:16px;
  border:1px solid rgba(255,220,140,.6);

}

.popupBtn{
  width:100%;
  min-height:60px;
  margin-top:14px;
  border:none;
  border-radius:999px;

}

.footer{

}

@media(max-width:480px){
  .wrap{
    padding:22px 14px 48px;
  }

    border-radius:26px;

</style>

  </header>

  <section class="card">

        id="drawBtn"

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbx5w_dEKm4Tb-GFB0o9AhUgLB1MdziOntuQ8iChEbnSbB6jcUCxp4STritRJeyF_osy/exec";

const SITE_BASE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const OMIKUJI_PAGE =
SITE_BASE + "omikuji.html";

const SHARE_OMIKUJI_ATARI_PAGE =
SITE_BASE + "share-omikuji-atari.html?v=20260630-atari-ogp-v1";

const HOME_PAGE =
SITE_BASE;

const DONE_MESSAGE =
"本日のおみくじは終了しました。\n次回の登頂時にまたお楽しみください。";

let currentUserId = "";
let latestImageSource = "";
let latestImageCandidates = [];
let latestFile = null;
let latestShareText = "";
let latestShareUrl = "";
let latestResultData = null;
let latestIsHit = false;
let latestCanShareAtari = false;
let isDrawing = false;

window.addEventListener("load",init);

function init(){
  currentUserId =
  getStableUserId();

  latestIsHit =
  false;

  latestCanShareAtari =
  false;

  latestShareUrl =
  buildShareUrl(false);

  latestShareText =
  buildShareText(false);

  const status =
  document.getElementById("statusBox");

  if(status){
    if(currentUserId){
      status.innerText =
      "登頂情報を確認しました。おみくじを引けます。";
    }else{
      status.innerText =
      "山頂QRコードで登頂受付をしてから、おみくじを引けます。";
    }
  }

  const drawBtn =
  document.getElementById("drawBtn");

  if(drawBtn){
    drawBtn.onclick =
    drawOmikuji;
  }
}

function getStableUserId(){
  const params =
  new URLSearchParams(location.search);

  const urlUserId =
  getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    ""
  );

  if(urlUserId){
    localStorage.setItem("tagoyamaUserId",urlUserId);
    localStorage.setItem("tagoyamaFujiUserId",urlUserId);

    return urlUserId;
  }

  return getString(
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    ""
  );
}

function getTodayKey(){
  const d =
  new Date();

  const y =
  d.getFullYear();

  const m =
  String(d.getMonth() + 1).padStart(2,"0");

  const day =
  String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;
}

function todayText(){
  return getTodayKey();
}

function getDoneKey(userId){
  return "tagoyamaOmikujiDone:" +
  getString(userId) +
  ":" +
  getTodayKey();
}

async function drawOmikuji(){
  if(isDrawing){
    return;
  }

  const btn =
  document.getElementById("drawBtn");

  const status =
  document.getElementById("statusBox");

  const userId =
  getStableUserId();

  currentUserId =
  userId;

  clearResult();

  if(!userId){
    renderResult({
      success:true,
      notClimbed:true,
      type:"none",
      title:"まだ登頂していません",
      text:"山頂QRコードを読み取って登頂受付をすると、おみくじを引けます。",
      imageUrl:""
    });

    if(status){
      status.innerText =
      "山頂QRコードで登頂受付をしてください。";
    }

    return;
  }

  const doneKey =
  getDoneKey(userId);

  const savedToday =
  localStorage.getItem(doneKey);

  if(savedToday){
    try{
      const savedData =
      JSON.parse(savedToday);

      savedData.alreadyDrawn =
      true;

      savedData.alreadyDrawnToday =
      true;

      savedData.notice =
      DONE_MESSAGE;

      renderResult(savedData);

      if(status){
        status.innerText =
        DONE_MESSAGE;
      }

      if(btn){
        btn.disabled =
        false;

        btn.innerText =
        "本日分を確認する";
      }

      return;
    }catch(e){
      localStorage.removeItem(doneKey);
    }
  }

  isDrawing =
  true;

  if(btn){
    btn.disabled =
    true;

    btn.innerText =
    "おみくじ確認中...";
  }

  if(status){
    status.innerText =
    "おみくじを確認しています...";
  }

  try{
    const data =
    await fetchJson(
      GAS_URL +
      "?mode=omikuji" +
      "&userId=" +
      encodeURIComponent(userId) +
      "&t=" +
      Date.now()
    );

    if(!data || data.success === false){
      throw new Error(
        data && data.message
        ? data.message
        : "おみくじを引けませんでした"
      );
    }

    renderResult(data);

    if(!data.notClimbed){
      try{
        localStorage.setItem(
          doneKey,
          JSON.stringify(data)
        );
      }catch(e){}
    }

    if(status){
      if(data.alreadyDrawn || data.alreadyDrawnToday || data.notice){
        status.innerText =
        DONE_MESSAGE;
      }else{
        status.innerText =
        "おみくじ結果を表示しました。";
      }
    }

    if(btn){
      btn.disabled =
      false;

      btn.innerText =
      "本日分を確認する";
    }

  }catch(err){
    if(status){
      status.innerText =
      err && err.message
      ? err.message
      : "おみくじを引けませんでした";
    }

    if(btn){
      btn.disabled =
      false;

      btn.innerText =
      "もう一度確認する";
    }

  }finally{
    isDrawing =
    false;
  }
}

function clearResult(){
  latestImageSource =
  "";

  latestImageCandidates =
  [];

  latestFile =
  null;

  latestResultData =
  null;

  latestIsHit =
  false;

  latestCanShareAtari =
  false;

  latestShareUrl =
  buildShareUrl(false);

  latestShareText =
  buildShareText(false);

  const card =
  document.getElementById("resultCard");

  if(card){
    card.style.display =
    "none";

    card.classList.remove("hit");
    card.classList.remove("miss");
  }

  const imageBox =
  document.getElementById("resultImageBox");

  if(imageBox){
    imageBox.style.display =
    "none";
  }

  const image =
  document.getElementById("resultImage");

  if(image){
    image.removeAttribute("src");
    image.removeAttribute("data-srcs");
    image.removeAttribute("data-index");
    image.onerror =
    null;
  }

  const already =
  document.getElementById("already");

  if(already){
    already.style.display =
    "none";
  }

  const shareActions =
  document.getElementById("shareActions");

  if(shareActions){
    shareActions.style.display =
    "none";
  }
}

function renderResult(data){
  data =
  data || {};

  const result =
  data.result ||
  data.omikuji ||
  data.data ||
  data;

  latestResultData =
  data;

  const card =
  document.getElementById("resultCard");

  const imageBox =
  document.getElementById("resultImageBox");

  const image =
  document.getElementById("resultImage");

  const title =
  document.getElementById("resultTitle");

  const text =
  document.getElementById("resultText");

  const date =
  document.getElementById("resultDate");

  const shareActions =
  document.getElementById("shareActions");

  const already =
  document.getElementById("already");

  const hit =
  isHitResult(data,result);

  const notClimbed =
  data.notClimbed === true ||
  data.type === "none" ||
  result.notClimbed === true ||
  result.type === "none";

  const alreadyDrawn =
  data.alreadyDrawn === true ||
  data.alreadyDrawnToday === true ||
  result.alreadyDrawn === true ||
  result.alreadyDrawnToday === true ||
  !!data.notice ||
  !!result.notice;

  const titleText =
  getString(
    result.title ||
    data.title ||
    result.name ||
    data.name ||
    (
      hit
      ? "大当たり"
      : notClimbed
      ? "まだ登頂していません"
      : "田子山富士おみくじ"
    )
  );

  const messageText =
  getString(
    result.text ||
    result.message ||
    data.text ||
    data.message ||
    result.body ||
    data.body ||
    (
      hit
      ? "おめでとうございます！\n当たりです。\n田子山富士でご縁をいただきました。"
      : notClimbed
      ? "山頂QRコードを読み取って登頂受付をすると、おみくじを引けます。"
      : "田子山富士のおみくじ結果です。"
    )
  );

  const dateText =
  getString(
    result.date ||
    result.drawDate ||
    result.createdAt ||
    data.date ||
    data.drawDate ||
    data.createdAt ||
    todayText()
  );

  latestImageSource =
  getString(
    result.imageDataUrl ||
    data.imageDataUrl ||
    result.imageDataURL ||
    data.imageDataURL ||
    result.imageUrl ||
    data.imageUrl ||
    result.imageURL ||
    data.imageURL ||
    result.image ||
    data.image ||
    result.url ||
    data.url ||
    ""
  );

  latestImageCandidates =
  makeImageCandidateUrls(latestImageSource);

  latestFile =
  null;

  latestIsHit =
  hit;

  latestCanShareAtari =
  !notClimbed &&
  (
    hit ||
    latestImageCandidates.length > 0 ||
    titleText.indexOf("大当たり") >= 0 ||
    titleText.indexOf("当たり") >= 0 ||
    messageText.indexOf("大当たり") >= 0 ||
    messageText.indexOf("当たり") >= 0
  );

  latestShareUrl =
  buildShareUrl(latestCanShareAtari);

  latestShareText =
  buildShareText(latestCanShareAtari);

  if(card){
    card.style.display =
    "block";

    card.classList.remove("hit");
    card.classList.remove("miss");

    if(!notClimbed){
      card.classList.add(
        latestCanShareAtari
        ? "hit"
        : "miss"
      );
    }
  }

  if(title){
    title.innerText =
    titleText;
  }

  if(text){
    text.innerText =
    messageText;
  }

  if(date){
    date.innerText =
    dateText;
  }

  if(already){
    if(alreadyDrawn){
      already.style.display =
      "block";

      already.innerHTML =
      "本日のおみくじは終了しました。<br>次回の登頂時にまたお楽しみください。";
    }else{
      already.style.display =
      "none";
    }
  }

  if(image && imageBox && latestImageCandidates.length > 0){
    image.setAttribute(
      "data-srcs",
      JSON.stringify(latestImageCandidates)
    );

    image.setAttribute(
      "data-index",
      "0"
    );

    image.onerror =
    function(){
      fallbackResultImage(this);
    };

    image.src =
    latestImageCandidates[0];

    imageBox.style.display =
    "block";

  }else if(imageBox){
    imageBox.style.display =
    "none";
  }

  if(shareActions){
    shareActions.style.display =
    notClimbed
    ? "none"
    : "grid";
  }
}

function fallbackResultImage(img){
  if(!img){
    return;
  }

  let srcs =
  [];

  try{
    srcs =
    JSON.parse(
      img.getAttribute("data-srcs") ||
      "[]"
    );
  }catch(e){
    srcs =
    [];
  }

  let index =
  Number(
    img.getAttribute("data-index") ||
    "0"
  );

  index =
  index + 1;

  if(index < srcs.length){
    img.setAttribute(
      "data-index",
      String(index)
    );

    img.src =
    srcs[index];

    return;
  }

  img.onerror =
  null;
}

function isHitResult(data,result){
  data =
  data || {};

  result =
  result || {};

  if(
    data.hit === true ||
    data.isHit === true ||
    data.atari === true ||
    result.hit === true ||
    result.isHit === true ||
    result.atari === true
  ){
    return true;
  }

  const joined =
  [
    data.type,
    data.result,
    data.rank,
    data.title,
    data.name,
    data.text,
    data.message,
    result.type,
    result.result,
    result.rank,
    result.title,
    result.name,
    result.text,
    result.message
  ]
  .map(function(v){
    return getString(v);
  })
  .join(" ");

  const lower =
  joined.toLowerCase();

  return (
    joined.indexOf("大当たり") >= 0 ||
    joined.indexOf("当たり") >= 0 ||
    joined.indexOf("あたり") >= 0 ||
    joined.indexOf("アタリ") >= 0 ||
    lower.indexOf("hit") >= 0 ||
    lower.indexOf("atari") >= 0
  );
}

function buildShareUrl(useAtariPage){
  if(useAtariPage){
    return SHARE_OMIKUJI_ATARI_PAGE;
  }

  const params =
  new URLSearchParams();

  params.set(
    "v",
    Date.now()
  );

  if(currentUserId){
    params.set(
      "userId",
      currentUserId
    );
  }

  return OMIKUJI_PAGE +
  "?" +
  params.toString();
}

function buildShareText(useAtariPage){
  if(useAtariPage){
    return [
      "田子山富士168の縁プロジェクトでおみくじを引きました。",
      "大当たりでした。",
      "#田子山富士",
      "#168の縁プロジェクト"
    ].join("\n");
  }

  return [
    "田子山富士168の縁プロジェクトでおみくじを引きました。",
    "#田子山富士",
    "#168の縁プロジェクト"
  ].join("\n");
}

async function copyOmikujiPost(){
  const text =
  (latestShareText || buildShareText(latestCanShareAtari)) +
  "\n" +
  (latestShareUrl || buildShareUrl(latestCanShareAtari));

  try{
    await copyText(text);
    alert("投稿文とリンクをコピーしました。Facebook画面で貼り付けてください。");
  }catch(e){
    alert("コピーできませんでした。画面の文章を手動でコピーしてください。");
  }
}

async function shareOmikuji(type){
  const useAtariPage =
  latestCanShareAtari ||
  latestIsHit;

  const url =
  latestShareUrl ||
  buildShareUrl(useAtariPage);

  const text =
  latestShareText ||
  buildShareText(useAtariPage);

  if(type === "facebook"){
    try{
      await copyText(text + "\n" + url);
    }catch(e){}

    location.href =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "line"){
    location.href =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "x"){
    location.href =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(text) +
    "&url=" +
    encodeURIComponent(url);

    return;
  }
}

async function saveOmikujiImage(){
  try{
    const file =
    await prepareFile();

    if(
      navigator.share &&
      (!navigator.canShare || navigator.canShare({files:[file]}))
    ){
      await navigator.share({
        files:[file],
        title:"田子山富士おみくじ",

      });

      return;
    }

    showImagePopup();

  }catch(e){
    showImagePopup();

    const file =
    await prepareFile();

    if(
      navigator.share &&
      (!navigator.canShare || navigator.canShare({files:[file]}))
    ){

function showImagePopup(){
  const popup =
  document.getElementById("popup");

async function prepareFile(){
  if(latestFile){
    return latestFile;
  }

  if(!latestImageSource && latestImageCandidates.length === 0){
    throw new Error("画像がありません");
  }

  if(latestImageSource.indexOf("data:image") === 0){
    latestFile =
    dataUrlToFile(
      latestImageSource,
      "tagoyama-omikuji.png"
    );

    return latestFile;
  }

  const candidates =
  latestImageCandidates.length > 0
  ? latestImageCandidates
  : makeImageCandidateUrls(latestImageSource);

  for(let i = 0; i < candidates.length; i++){
    try{
      const file =
      await fetchImageAsFile(
        candidates[i],
        "tagoyama-omikuji.png"
      );

      if(file){
        latestFile =
        file;

        return latestFile;
      }
    }catch(e){}
  }

  throw new Error("画像を共有用ファイルにできませんでした");
}

async function fetchImageAsFile(url,fileName){
  const res =
  await fetch(
    url,
    {
      method:"GET",
      cache:"no-store"
    }
  );

  if(!res.ok){
    throw new Error("画像取得に失敗しました");
  }

  const blob =
  await res.blob();

  if(!blob || !blob.size){
    throw new Error("画像データが空です");
  }

  const type =
  blob.type && blob.type.indexOf("image/") === 0
  ? blob.type
  : "image/png";

  return new File(
    [blob],
    fileName,
    {
      type:type
    }
  );
}

function dataUrlToFile(dataUrl,fileName){
  const parts =
  dataUrl.split(",");

  const header =
  parts[0] || "";

  const base64 =
  parts[1] || "";

  const mimeMatch =
  header.match(/data:(.*?);base64/);

  const mime =
  mimeMatch && mimeMatch[1]
  ? mimeMatch[1]
  : "image/png";

  const binary =
  atob(base64);

  const length =
  binary.length;

  const bytes =
  new Uint8Array(length);

  for(let i = 0; i < length; i++){
    bytes[i] =
    binary.charCodeAt(i);
  }

  return new File(
    [bytes],
    fileName,
    {
      type:mime
    }
  );
}

async function fetchJson(url){
  const res =
  await fetch(
    url,
    {
      method:"GET",
      cache:"no-store"
    }
  );

  const text =
  await res.text();

  if(!res.ok){
    throw new Error("通信エラーが発生しました");
  }

  try{
    return JSON.parse(text);
  }catch(e){}

  const match =
  text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

  if(match && match[1]){
    try{
      return JSON.parse(match[1]);
    }catch(e){}
  }

  throw new Error("データを読み込めませんでした");
}

function makeImageCandidateUrls(url){
  url =
  cleanUrl(url);

  const list =
  [];

  if(!url){
    return list;
  }

  if(url.indexOf("data:image") === 0){
    addUnique(list,url);
    return list;
  }

  const driveId =
  getDriveId(url);

  if(driveId){
    addUnique(
      list,
      "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(driveId) +
      "&sz=w1600"
    );

    addUnique(
      list,
      "https://drive.google.com/uc?export=view&id=" +
      encodeURIComponent(driveId)
    );

    addUnique(
      list,
      url
    );

    return list;
  }

  if(url.indexOf("http://") !== 0 && url.indexOf("https://") !== 0){
    try{
      url =
      new URL(
        url,
        location.href
      ).href;
    }catch(e){}
  }

  addUnique(list,url);

  return list;
}

function getDriveId(url){
  url =
  cleanUrl(url);

  let match =
  url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);

  if(match && match[1]){
    return match[1];
  }

  match =
  url.match(/[?&]id=([^&]+)/);

  if(match && match[1]){
    return match[1];
  }

  match =
  url.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

  if(match && match[1]){
    return match[1];
  }

  return "";
}

function cleanUrl(value){
  value =
  getString(value);

  value =
  value
  .replace(/\\u003d/g,"=")
  .replace(/\\u0026/g,"&")
  .replace(/\\\//g,"/")
  .replace(/&amp;/g,"&")
  .replace(/[),.;]+$/g,"")
  .trim();

  return value;
}

function addUnique(list,value){
  value =
  getString(value);

  if(!value){
    return;
  }

  if(list.indexOf(value) < 0){
    list.push(value);
  }
}

async function copyText(text){
  text =
  getString(text);

  if(navigator.clipboard && navigator.clipboard.writeText){
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.setAttribute("readonly","readonly");
  textarea.style.position =
  "fixed";
  textarea.style.left =
  "-9999px";
  textarea.style.top =
  "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  const ok =
  document.execCommand("copy");

  document.body.removeChild(textarea);

  if(!ok){
    throw new Error("コピーできませんでした");
  }
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
