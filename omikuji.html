<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

const HOME_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

const SHARE_OMIKUJI_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-omikuji.html";

const FALLBACK_LOGO =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png";

const FALLBACK_OGP =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji-atari.jpg?v=20260703-omikuji";

let currentUserId = "";
let currentResult = null;
let drawFinished = false;

window.addEventListener("load", init);

function init(){
  currentUserId = getUserIdFromUrl();

  if(currentUserId){
    localStorage.setItem("tagoyamaUserId", currentUserId);
    localStorage.setItem("tagoyamaFujiUserId", currentUserId);
  }else{
    currentUserId =
      localStorage.getItem("tagoyamaUserId") ||
      localStorage.getItem("tagoyamaFujiUserId") ||
      "";
  }

  updateLinks();

  const params = new URLSearchParams(location.search);
  const auto = getString(params.get("auto"));

  if(auto === "1" || auto === "true"){
    setTimeout(function(){
      drawOmikuji();
    }, 400);
  }
}

function getUserIdFromUrl(){
  const params = new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );
}

function updateLinks(){
  const topLink = document.getElementById("topLink");
  const topLink2 = document.getElementById("topLink2");
  const certificateLink = document.getElementById("certificateLink");

  if(topLink){
    topLink.href =
      currentUserId
        ? "index.html?userId=" + encodeURIComponent(currentUserId)
        : "index.html";
  }

  if(topLink2){
    topLink2.href =
      currentUserId
        ? "index.html?userId=" + encodeURIComponent(currentUserId)
        : "index.html";
  }

  if(certificateLink){
    const savedData = getSavedClimbData();

    if(savedData && savedData.userId && savedData.climbCount && savedData.serialNo){
      certificateLink.href = buildCertificateUrl(savedData);
    }else{
      certificateLink.href =
        currentUserId
          ? "certificate.html?userId=" + encodeURIComponent(currentUserId)
          : "certificate.html";
    }
  }
}

function getSavedClimbData(){
  try{
    const text = localStorage.getItem("tagoyamaClimbData");

    if(!text){
      return null;
    }

    const data = JSON.parse(text);

    if(!data || !data.userId){
      return null;
    }

    return data;
  }catch(error){
    return null;
  }
}

function buildCertificateUrl(data){
  const params = new URLSearchParams();

  params.set("userId", getString(data.userId));

  if(data.climbCount){
    params.set("climbCount", getString(data.climbCount));
  }

  if(data.serialNo){
    params.set("serialNo", getString(data.serialNo));
  }

  if(data.lastDate){
    params.set("lastDate", getString(data.lastDate));
  }

  if(data.imageNo){
    params.set("imageNo", getString(data.imageNo));
  }

  if(data.imageName){
    params.set("imageName", getString(data.imageName));
  }

  if(data.imageUrl){
    params.set("imageUrl", getString(data.imageUrl));
  }

  params.set("v", "20260703");

  return CERTIFICATE_PAGE + "?" + params.toString();
}

async function drawOmikuji(){
  if(drawFinished){
    scrollToResult();
    return;
  }

  const btn = document.getElementById("drawBtn");
  const statusBox = document.getElementById("statusBox");

  if(btn){
    btn.disabled = true;
    btn.innerText = "引いています...";
  }

  if(statusBox){
    statusBox.innerText = "おみくじを引いています。";
  }

  try{
    const data = await loadOmikujiFromGas();

    if(!data || data.success === false){
      throw new Error(
        data && data.message
          ? data.message
          : "おみくじを取得できませんでした。"
      );
    }

    currentResult = normalizeOmikujiData(data);

    if(!currentResult.imageUrl){
      throw new Error("おみくじ画像を取得できませんでした。");
    }

    saveCurrentResult(currentResult);
    renderResult(currentResult);

    drawFinished = true;

    if(statusBox){
      statusBox.innerText = "おみくじを引きました。";
    }

    if(btn){
      btn.disabled = true;
      btn.innerText = "おみくじを引きました";
      btn.style.display = "none";
    }

    scrollToResult();
  }catch(error){
    console.error(error);

    if(statusBox){
      statusBox.innerText =
        error && error.message
          ? error.message
          : "おみくじを取得できませんでした。";
    }

    if(btn){
      btn.disabled = false;
      btn.innerText = "おみくじを引く";
    }
  }
}

async function loadOmikujiFromGas(){
  const urls = [];
  const t = Date.now();

  const userQuery =
    currentUserId
      ? "&userId=" + encodeURIComponent(currentUserId)
      : "";

  urls.push(GAS_URL + "?mode=omikuji" + userQuery + "&t=" + t);
  urls.push(GAS_URL + "?action=omikuji" + userQuery + "&t=" + t);
  urls.push(GAS_URL + "?omikuji=1" + userQuery + "&t=" + t);

  let lastError = null;

  for(let i = 0; i < urls.length; i++){
    try{
      const data = await getJson(urls[i]);

      if(data && typeof data === "object"){
        return data;
      }
    }catch(error){
      lastError = error;
    }
  }

  throw lastError || new Error("おみくじを取得できませんでした。");
}

async function getJson(url){
  try{
    const res = await fetch(url, {
      method:"GET",
      cache:"no-store"
    });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    return parseJsonText(text);
  }catch(fetchError){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value = String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const start = value.indexOf("{");
    const end = value.lastIndexOf("}");

    if(start >= 0 && end > start){
      return JSON.parse(value.substring(start, end + 1));
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve, reject){
    const callbackName =
      "tagoyamaOmikujiCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script = document.createElement("script");
    const sep = url.indexOf("?") >= 0 ? "&" : "?";

    const timer = setTimeout(function(){
      cleanup();
      reject(new Error("JSONP timeout"));
    }, 12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

function normalizeOmikujiData(data){
  data = data || {};

  const nested =
    data.data && typeof data.data === "object"
      ? data.data
      : {};

  const source = Object.assign({}, data, nested);

  const result =
    getFirst(
      source.result,
      source.fortune,
      source.unsei,
      source.omikuji,
      source.rank
    );

  const title =
    getFirst(
      source.title,
      source.imageName,
      source.image_name,
      source.name,
      source.subtitle,
      source.heading
    );

  const message =
    getFirst(
      source.message,
      source.text,
      source.body,
      source.comment,
      source.advice,
      source.description,
      source.detail
    );

  const imageUrl =
    normalizeImageUrl(
      getFirst(
        source.imageUrl,
        source.imgUrl,
        source.image,
        source.url,
        source.photo,
        source.picture,
        source.thumbnail
      )
    );

  const imageNo =
    getFirst(
      source.imageNo,
      source.image_no,
      source.no,
      source.id
    );

  const imageName =
    getFirst(
      source.imageName,
      source.image_name,
      source.name,
      source.title
    );

  return {
    userId:currentUserId,
    result:result || "おみくじ",
    title:title || imageName || "今日の運勢",
    message:message || "今日のご縁を大切にお過ごしください。",
    imageUrl:imageUrl || FALLBACK_OGP,
    imageNo:imageNo,
    imageName:imageName
  };
}

function saveCurrentResult(result){
  try{
    localStorage.setItem("tagoyamaOmikujiResult", JSON.stringify(result));
  }catch(error){
    console.warn(error);
  }
}

function renderResult(result){
  result = result || {};

  const section = document.getElementById("resultSection");
  const image = document.getElementById("resultImage");

  if(section){
    section.classList.add("show");
  }

  if(image){
    image.src = result.imageUrl || FALLBACK_OGP;
  }

  updateLinks();
}

function scrollToResult(){
  const section = document.getElementById("resultSection");

  if(section){
    section.scrollIntoView({
      behavior:"smooth",
      block:"start"
    });
  }
}

function handleResultImageError(){
  const image = document.getElementById("resultImage");

  if(!image){
    return;
  }

  if(image.src !== FALLBACK_OGP){
    image.src = FALLBACK_OGP;
  }else if(image.src !== FALLBACK_LOGO){
    image.src = FALLBACK_LOGO;
  }
}

async function saveOmikujiImage(){
  const btn = document.getElementById("saveBtn");
  const oldText = btn ? btn.innerText : "";

  if(!currentResult || !currentResult.imageUrl){
    alert("先におみくじを引いてください。");
    return;
  }

  if(btn){
    btn.disabled = true;
    btn.innerText = "画像を準備中...";
  }

  try{
    const blob = await getImageBlob(currentResult.imageUrl);

    if(!blob){
      openImageOnly(currentResult.imageUrl);
      return;
    }

    const safeName =
      currentResult.result
        ? currentResult.result.replace(/[\\/:*?"<>|]/g, "")
        : "omikuji";

    const fileName =
      "tagoyama-omikuji-" +
      safeName +
      ".png";

    const file = new File([blob], fileName, {
      type:blob.type || "image/png"
    });

    if(
      navigator.canShare &&
      navigator.share &&
      navigator.canShare({
        files:[file]
      })
    ){
      await navigator.share({
        files:[file],
        title:"田子山富士 開運おみくじ",
        text:makeShareText()
      });
      return;
    }

    downloadBlob(blob, fileName);
  }catch(error){
    if(error && error.name === "AbortError"){
      return;
    }

    console.error(error);
    openImageOnly(currentResult.imageUrl);
  }finally{
    if(btn){
      btn.disabled = false;
      btn.innerText = oldText || "画像を保存";
    }
  }
}

async function getImageBlob(url){
  const urls = makeImageUrlList(url);

  for(let i = 0; i < urls.length; i++){
    const target = getString(urls[i]);

    if(!target){
      continue;
    }

    try{
      const res = await fetch(target, {
        method:"GET",
        cache:"no-store"
      });

      if(res.ok){
        return await res.blob();
      }
    }catch(error){
      console.warn(error);
    }
  }

  return null;
}

function openImageOnly(url){
  alert("画像だけを開きます。開いた画像を長押しして保存してください。");
  window.open(url, "_blank", "noopener,noreferrer");
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = filename;
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(function(){
    URL.revokeObjectURL(url);
  }, 3000);
}

function postFacebook(){
  if(!currentResult){
    alert("先におみくじを引いてください。");
    return;
  }

  const url = buildShareUrl();

  const shareUrl =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(url);

  window.open(shareUrl, "_blank", "noopener,noreferrer");
}

function sendLine(){
  if(!currentResult){
    alert("先におみくじを引いてください。");
    return;
  }

  const url = buildShareUrl();

  const shareUrl =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(url) +
    "&text=" +
    encodeURIComponent(makeShareText());

  location.href = shareUrl;
}

function postX(){
  if(!currentResult){
    alert("先におみくじを引いてください。");
    return;
  }

  const url = buildShareUrl();

  const shareUrl =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(makeShareText()) +
    "&url=" +
    encodeURIComponent(url);

  window.open(shareUrl, "_blank", "noopener,noreferrer");
}

async function copyResult(){
  if(!currentResult){
    alert("先におみくじを引いてください。");
    return;
  }

  const text =
    makeShareText() +
    "\n" +
    buildShareUrl();

  try{
    await navigator.clipboard.writeText(text);
    alert("おみくじの結果をコピーしました。");
  }catch(error){
    const area = document.createElement("textarea");
    area.value = text;
    area.style.position = "fixed";
    area.style.left = "-9999px";
    document.body.appendChild(area);
    area.focus();
    area.select();
    document.execCommand("copy");
    area.remove();
    alert("おみくじの結果をコピーしました。");
  }
}

function buildShareUrl(){
  const result = currentResult || {};
  const params = new URLSearchParams();

  const imgid = getDriveId(result.imageUrl);

  if(imgid){
    params.set("imgid", imgid);
  }

  params.set("v", "20260703-hitimage");

  return SHARE_OMIKUJI_PAGE + "?" + params.toString();
}

function makeShareText(){
  const result = currentResult || {};

  return "田子山富士 開運おみくじ\n" +
    (result.title || result.result || "今日の運勢") + "\n" +
    (result.message || "今日のご縁を大切にお過ごしください。") + "\n\n" +
    "#田子山富士 #敷島神社 #志木市";
}

function makeImageUrlList(url){
  const urls = [];
  const value = getString(url);
  const driveId = getDriveId(value);

  function add(u){
    u = getString(u);

    if(u && urls.indexOf(u) === -1){
      urls.push(u);
    }
  }

  if(driveId){
    add(
      "https://lh3.googleusercontent.com/d/" +
      encodeURIComponent(driveId) +
      "=w2000"
    );

    add(
      "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(driveId) +
      "&sz=w2000"
    );

    add(
      "https://drive.google.com/uc?export=view&id=" +
      encodeURIComponent(driveId)
    );
  }

  add(value);
  add(FALLBACK_OGP);

  return urls;
}

function getDriveId(url){
  const value = getString(url);

  if(!value){
    return "";
  }

  let match = value.match(/\/file\/d\/([^/]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = value.match(/[?&]id=([^&]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = value.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

  if(match && match[1]){
    return match[1];
  }

  if(/^[a-zA-Z0-9_-]{20,}$/.test(value)){
    return value;
  }

  return "";
}

function normalizeImageUrl(url){
  const value = getString(url);

  if(!value){
    return "";
  }

  const driveId = getDriveId(value);

  if(driveId){
    return "https://lh3.googleusercontent.com/d/" +
      encodeURIComponent(driveId) +
      "=w2000";
  }

  return value;
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function getFirst(){
  for(let i = 0; i < arguments.length; i++){
    const value = getString(arguments[i]);

    if(value){
      return value;
    }
  }

  return "";
}
