<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>開運おみくじ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#fff;
}

.hero img{
width:100%;
display:block;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:linear-gradient(180deg,#1c1c1c,#0f0f0f);
border:2px solid #d4af37;
border-radius:28px;
padding:28px;
text-align:center;
box-shadow:0 12px 32px rgba(0,0,0,.45);
}

.logo{
width:170px;
max-width:75%;
display:block;
margin:auto;
margin-bottom:20px;
border-radius:22px;
}

.title{
font-size:38px;
font-weight:900;
color:#d4af37;
margin-bottom:10px;
}

.sub{
font-size:18px;
line-height:1.8;
color:#ddd;
margin-bottom:24px;
}

.drawBtn{
width:100%;
border:none;
border-radius:20px;
padding:22px;
font-size:28px;
font-weight:900;
cursor:pointer;
background:#d4af37;
color:#000;
}

.resultBox{
display:none;
margin-top:30px;
}

.resultTitle{
font-size:40px;
font-weight:900;
margin-bottom:20px;
}

.hit{
color:#ffd700;
}

.miss{
color:#ccc;
}

.omikujiImage{
width:100%;
display:none;
border-radius:24px;
margin-bottom:20px;
border:2px solid #d4af37;
}

.message{
font-size:24px;
font-weight:900;
line-height:1.8;
margin-bottom:20px;
color:#ffd700;
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:18px;
margin-top:12px;
font-size:22px;
font-weight:900;
cursor:pointer;
}

.save{background:#2ecc71;color:#fff;}
.line{background:#06c755;color:#fff;}
.fb{background:#1877f2;color:#fff;}
.x{background:#000;color:#fff;}
.copy{background:#607d8b;color:#fff;}
.home{background:#37474f;color:#fff;}

.notice{
margin-top:30px;
padding:20px;
border-radius:20px;
background:#181818;
border:1px solid #333;
font-size:18px;
line-height:1.8;
}

</style>
</head>

<body>

<div class="hero">
<img src="top.jpg" alt="田子山富士">
</div>

<div class="wrap">
<div class="card">

<img src="logo.png"
class="logo"
alt="田子山富士">

<div class="title">
🎋 開運おみくじ
</div>

<div class="sub">
木花咲耶姫から届く<br>
ご縁の開運カード
</div>

<button id="drawBtn"
class="drawBtn">

おみくじを引く

</button>

<div id="resultBox"
class="resultBox">

<div id="resultTitle"
class="resultTitle">

結果

</div>

<img
id="omikujiImage"
class="omikujiImage"
crossorigin="anonymous">

<div id="message"
class="message"></div>

<button id="saveBtn"
class="btn save"
style="display:none;">

📱 画像を保存

</button>

<button id="lineBtn"
class="btn line"
style="display:none;">

LINEで共有

</button>

<button id="fbBtn"
class="btn fb"
style="display:none;">

Facebookで共有

</button>

<button id="xBtn"
class="btn x"
style="display:none;">

Xで共有

</button>

<button id="copyBtn"
class="btn copy"
style="display:none;">

リンクコピー

</button>

</div>

<a
href="index.html"
class="btn home"
style="
display:block;
text-decoration:none;
text-align:center;
">

🏠 トップへ戻る

</a>

<div class="notice">

おみくじは1日1回です。<br>
当たりが出ると開運カードが届きます。<br>
ご縁を大切にお持ちください。

</div>

</div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbwMTXiYx-ExMHVI1-B7Roh_SyWvAqWWNRs4WsOkuveJJajY8qXfC1YHget2yk_6MsHGYQ/exec";

let currentCard = null;

function hideShareButtons(){

document.getElementById("saveBtn").style.display="none";
document.getElementById("lineBtn").style.display="none";
document.getElementById("fbBtn").style.display="none";
document.getElementById("xBtn").style.display="none";
document.getElementById("copyBtn").style.display="none";

}

function showShareButtons(){

document.getElementById("saveBtn").style.display="block";
document.getElementById("lineBtn").style.display="block";
document.getElementById("fbBtn").style.display="block";
document.getElementById("xBtn").style.display="block";
document.getElementById("copyBtn").style.display="block";

}

document.getElementById(
"drawBtn"
).onclick =
async function(){

const today =
new Date()
.toLocaleDateString(
"ja-JP"
);

const last =
localStorage.getItem(
"omikujiDate"
);

if(
last === today
){

alert(
"おみくじは1日1回です"
);

return;

}

localStorage.setItem(
"omikujiDate",
today
);

document.getElementById(
"resultBox"
).style.display =
"block";

document.getElementById(
"resultTitle"
).innerHTML =
"抽選中...";

document.getElementById(
"message"
).innerHTML =
"";

hideShareButtons();

const res =
await fetch(
GAS_URL +
"?mode=omikuji&userId=" +
encodeURIComponent(
localStorage.getItem(
"tagoyamaUserId"
) || ""
)
);

const data =
await res.json();

if(
!data.hit
){

document.getElementById(
"resultTitle"
).innerHTML =
"🌸 また次回 🌸";

document.getElementById(
"resultTitle"
).className =
"resultTitle miss";

document.getElementById(
"omikujiImage"
).style.display =
"none";

document.getElementById(
"message"
).innerHTML =
data.text || "";

return;

}

currentCard = data;

document.getElementById(
"resultTitle"
).innerHTML =
"🎉 当たり 🎉";

document.getElementById(
"resultTitle"
).className =
"resultTitle hit";

document.getElementById(
"omikujiImage"
).src =
data.imageUrl || "";

document.getElementById(
"omikujiImage"
).style.display =
"block";

document.getElementById(
"message"
).innerHTML =
data.text || "";

showShareButtons();

};

document.getElementById(
"lineBtn"
).onclick =
function(){

window.open(
"https://social-plugins.line.me/lineit/share?url=" +
encodeURIComponent(
location.href
),
"_blank"
);

};

document.getElementById(
"fbBtn"
).onclick =
function(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(
location.href
),
"_blank"
);

};

document.getElementById(
"xBtn"
).onclick =
function(){

const shareText =
currentCard
? (
currentCard.shareText ||
currentCard.text ||
"開運おみくじ"
)
: "開運おみくじ";

window.open(
"https://twitter.com/intent/tweet?text=" +
encodeURIComponent(
shareText +
"\n" +
location.href
),
"_blank"
);

};

document.getElementById(
"copyBtn"
).onclick =
function(){

navigator.clipboard.writeText(
location.href
);

alert(
"リンクをコピーしました"
);

};

document.getElementById(
"saveBtn"
).onclick =
async function(){

const image =
document.getElementById(
"omikujiImage"
);

if(!image.src){

alert(
"保存する画像がありません"
);

return;

}

try{

const canvas =
document.createElement(
"canvas"
);

const ctx =
canvas.getContext(
"2d"
);

canvas.width =
image.naturalWidth;

canvas.height =
image.naturalHeight;

ctx.drawImage(
image,
0,
0
);

const link =
document.createElement(
"a"
);

link.href =
canvas.toDataURL(
"image/png"
);

link.download =
"tagoyama-omikuji.png";

link.click();

}catch(err){

window.open(
image.src,
"_blank"
);

}

};

</script>

<script>

if(
"serviceWorker" in navigator
){

window.addEventListener(
"load",
function(){

navigator
.serviceWorker
.register(
"sw.js"
)
.catch(
function(err){

console.log(err);

}
);

}
);

}

</script>

</body>
</html>
