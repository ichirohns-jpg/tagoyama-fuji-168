田子山富士のご縁を、みなさんにもおすそ分けします。

</main>

<script>
const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const OMIKUJI_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

const DEFAULT_OMIKUJI_IMAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-omikuji.jpg";

window.addEventListener("load", init);

function init(){
  const params = new URLSearchParams(location.search);

  const result = cleanText(
    params.get("result") ||
    params.get("omikuji") ||
    params.get("luck") ||
    ""
  );

  const title = cleanText(
    params.get("title") ||
    params.get("name") ||
    params.get("imageName") ||
    ""
  );

  const imageUrl = makeDisplayImageUrl(
    params.get("imageUrl") ||
    params.get("imageURL") ||
    params.get("img") ||
    ""
  );

  const userId = cleanText(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );

  const resultText = document.getElementById("resultText");
  const titleText = document.getElementById("titleText");
  const messageText = document.getElementById("messageText");
  const image = document.getElementById("resultImage");
  const omikujiLink = document.getElementById("omikujiLink");
  const topLink = document.getElementById("topLink");

  const displayResult =
    result && result !== "おみくじ"
      ? result
      : "開運おみくじ";

  const displayTitle =
    title && title !== "おみくじ" && title !== result
      ? title
      : displayResult;

  if(resultText){
    resultText.innerText = displayResult;
  }

  if(titleText){
    titleText.innerText = displayTitle;
  }

  if(messageText){
    messageText.innerText =
      "田子山富士のご縁を、みなさんにもおすそ分けします。";
  }

  if(image){
    if(imageUrl){
      image.src = imageUrl;
    }else{
      image.src = DEFAULT_OMIKUJI_IMAGE;
    }
  }

  if(omikujiLink){
    if(userId){
      omikujiLink.href =
        "omikuji.html?userId=" +
        encodeURIComponent(userId) +
        "&v=" +
        Date.now();
    }else{
      omikujiLink.href =
        "omikuji.html?v=" +
        Date.now();
    }
  }

  if(topLink){
    if(userId){
      topLink.href =
        "index.html?userId=" +
        encodeURIComponent(userId) +
        "&v=" +
        Date.now();
    }else{
      topLink.href =
        "index.html?v=" +
        Date.now();
    }
  }
}

function makeDisplayImageUrl(url){
  const text = cleanText(url);
  const id = getDriveFileId(text);

  if(id){
    return "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(id) +
      "&sz=w1600";
  }

  if(text){
    return text;
  }

  return "";
}

function getDriveFileId(url){
  const text = cleanText(url);

  if(!text){
    return "";
  }

  let match = text.match(/\/file\/d\/([^/]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = text.match(/[?&]id=([^&]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = text.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

  if(match && match[1]){
    return match[1];
  }

  return "";
}

function cleanText(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value)
    .replace(/\\\//g,"/")
    .replace(/\\u0026/g,"&")
    .replace(/&amp;/g,"&")
    .trim();
}
</script>
