<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>田子山富士 おみくじ</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      background:
        radial-gradient(circle at top,#fff8dd 0%,#f0d18a 42%,#b87522 100%);
      color:#2b1700;
      min-height:100vh;
    }

    .page{
      width:100%;
      max-width:560px;
      margin:0 auto;
      padding:18px 14px 36px;
    }

    .panel{
      background:rgba(255,255,255,0.94);
      border:4px solid #7b140d;
      border-radius:26px;
      padding:18px 15px 20px;
      box-shadow:0 10px 26px rgba(0,0,0,0.25);
      text-align:center;
    }

    .label{
      display:inline-block;
      background:#7b140d;
      color:#fff2c2;
      border-radius:999px;
      padding:7px 15px;
      font-size:13px;
      font-weight:900;
      letter-spacing:0.08em;
      margin-bottom:10px;
    }

    h1{
      margin:6px 0 10px;
      color:#7b140d;
      font-size:34px;
      line-height:1.18;
      font-weight:900;
    }

    .lead{
      margin:0;
      color:#4b2c05;
      font-size:16px;
      line-height:1.7;
      font-weight:800;
    }

    .user-box{
      margin:14px 0 0;
      padding:10px 12px;
      background:#fff2cf;
      border:2px solid #c8912b;
      border-radius:16px;
      color:#4b2c05;
      font-size:13px;
      line-height:1.5;
      font-weight:800;
      word-break:break-all;
    }

    .main-button{
      width:100%;
      margin-top:18px;
      padding:20px 14px;
      border:none;
      border-radius:22px;
      background:linear-gradient(180deg,#dc261c,#8e150d);
      color:#fff;
      font-size:25px;
      font-weight:900;
      box-shadow:0 8px 0 #5a0b07,0 15px 26px rgba(0,0,0,0.28);
      cursor:pointer;
    }

    .main-button:active{
      transform:translateY(4px);
      box-shadow:0 4px 0 #5a0b07,0 8px 16px rgba(0,0,0,0.22);
    }

    .main-button:disabled{
      opacity:0.65;
      cursor:wait;
    }

    .status{
      display:none;
      margin-top:15px;
      padding:13px 12px;
      border-radius:17px;
      background:#fff;
      border:2px solid #c8912b;
      color:#3c2404;
      font-size:16px;
      line-height:1.7;
      font-weight:800;
      white-space:pre-wrap;
      text-align:left;
    }

    .notice{
      display:none;
      margin-top:15px;
      padding:15px 13px;
      border-radius:18px;
      background:#fff0bd;
      border:3px solid #9d5c00;
      color:#7b140d;
      font-size:18px;
      line-height:1.7;
      font-weight:900;
      white-space:pre-wrap;
      text-align:center;
    }

    .result-card{
      display:none;
      margin-top:18px;
      background:rgba(255,255,255,0.96);
      border:4px solid #7b140d;
      border-radius:26px;
      padding:16px;
      box-shadow:0 10px 26px rgba(0,0,0,0.25);
      text-align:center;
    }

    .result-title{
      margin:4px 0 12px;
      color:#7b140d;
      font-size:31px;
      line-height:1.25;
      font-weight:900;
    }

    .result-text{
      margin:0 0 14px;
      color:#2f1d05;
      font-size:17px;
      line-height:1.75;
      font-weight:800;
      white-space:pre-wrap;
      text-align:left;
    }

    .result-image{
      display:none;
      width:100%;
      max-width:430px;
      margin:12px auto 0;
      border-radius:18px;
      border:3px solid #d3a23d;
      background:#fff;
      box-shadow:0 7px 18px rgba(0,0,0,0.24);
    }

    .actions{
      display:none;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:16px;
    }

    .action-button{
      width:100%;
      display:block;
      border:none;
      border-radius:17px;
      padding:15px 12px;
      color:#fff;
      font-size:18px;
      font-weight:900;
      text-align:center;
      text-decoration:none;
      cursor:pointer;
      background:#7b140d;
      box-shadow:0 5px 0 #4b0905;
    }

    .action-button:active{
      transform:translateY(3px);
      box-shadow:0 2px 0 #4b0905;
    }

    .save{
      background:#0b6a3f;
      box-shadow:0 5px 0 #064326;
    }

    .copy{
      background:#865500;
      box-shadow:0 5px 0 #563700;
    }

    .facebook{
      background:#1877f2;
      box-shadow:0 5px 0 #0b4ea5;
    }

    .line{
      background:#06c755;
      box-shadow:0 5px 0 #058b3d;
    }

    .x{
      background:#111;
      box-shadow:0 5px 0 #000;
    }

    .back{
      background:#555;
      box-shadow:0 5px 0 #333;
    }

    .note{
      margin:16px 4px 0;
      color:#5c3908;
      font-size:13px;
      line-height:1.6;
      font-weight:800;
      text-align:left;
    }
  </style>
</head>

<body>

  <div class="page">

    <div class="panel">
      <div class="label">田子山富士168の縁プロジェクト</div>

      <h1>田子山富士<br>おみくじ</h1>

      <p class="lead">
        山頂QRコードで登頂受付をした方だけが引ける、<br>
        本日1回限りのおみくじです。
      </p>

      <div class="user-box" id="userBox">
        userId確認中
      </div>

      <button class="main-button" id="drawButton" onclick="drawOmikuji()">
        おみくじを引く
      </button>

      <div class="status" id="statusBox"></div>
      <div class="notice" id="noticeBox"></div>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-title" id="resultTitle"></div>
      <div class="result-text" id="resultText"></div>
      <img class="result-image" id="resultImage" alt="おみくじ結果画像">

      <div class="actions" id="actions">
        <button class="action-button save" onclick="saveImage()">
          📸 画像を保存
        </button>

        <button class="action-button copy" onclick="copyPostText()">
          📋 投稿文コピー
        </button>

        <button class="action-button facebook" onclick="shareFacebook()">
          Facebookで投稿
        </button>

        <button class="action-button line" onclick="shareLine()">
          LINEで送る
        </button>

        <button class="action-button x" onclick="shareX()">
          Xで投稿
        </button>

        <button class="action-button back" onclick="goHome()">
          ← トップへ戻る
        </button>
      </div>
    </div>

    <div class="note">
      ※同じ日にもう一度押しても、新しく引き直しません。<br>
      ※2回目以降は「本日のおみくじは終了しました。明日またお引きください。」と表示されます。
    </div>

  </div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbx5w_dEKm4Tb-GFB0o9AhUgLB1MdziOntuQ8iChEbnSbB6jcUCxp4STritRJeyF_osy/exec";

const HOME_URL =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

let currentUserId = "";
let currentImageSrc = "";
let currentShareText = "";
let currentTitle = "";
let currentMessage = "";

window.addEventListener("load",function(){

  currentUserId =
  getUserId();

  const userBox =
  document.getElementById("userBox");

  if(currentUserId){

    localStorage.setItem(
      "tagoyamaUserId",
      currentUserId
    );

    localStorage.setItem(
      "tagoyamaFujiUserId",
      currentUserId
    );

    userBox.innerText =
    "userId：" + currentUserId;

  }else{

    userBox.innerText =
    "userIdがありません。トップまたはQRコードから開いてください。";

    showStatus(
      "山頂QRコードで登頂受付をしてから、おみくじを引いてください。"
    );

  }

});

function getUserId(){

  const params =
  new URLSearchParams(window.location.search);

  return String(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    ""
  ).trim();

}

async function drawOmikuji(){

  const button =
  document.getElementById("drawButton");

  if(!currentUserId){

    showStatus(
      "userIdがありません。\n山頂QRコードで登頂受付をしてから、おみくじを引いてください。"
    );

    return;

  }

  button.disabled =
  true;

  button.innerText =
  "確認中です…";

  showStatus(
    "おみくじを確認しています。"
  );

  hideNotice();

  try{

    const url =
    GAS_URL +
    "?mode=omikuji" +
    "&userId=" +
    encodeURIComponent(currentUserId) +
    "&t=" +
    Date.now();

    const response =
    await fetch(
      url,
      {
        method:"GET",
        cache:"no-store"
      }
    );

    const data =
    await response.json();

    if(!data || data.success === false){

      showStatus(
        data && data.message
        ? data.message
        : "おみくじを取得できませんでした。"
      );

      button.disabled =
      false;

      button.innerText =
      "もう一度確認する";

      return;

    }

    renderResult(data);

    if(data.alreadyDrawnToday || data.alreadyDrawn || data.notice){

      showNotice(
        data.notice ||
        "本日のおみくじは終了しました。明日またお引きください。"
      );

      showStatus(
        "本日分のおみくじ結果を表示しています。"
      );

    }else{

      hideNotice();

      showStatus(
        "おみくじ結果が出ました。\n同じ日にもう一度押しても、新しく引き直しません。"
      );

    }

    button.disabled =
    false;

    button.innerText =
    "本日分を確認する";

  }catch(e){

    showStatus(
      "通信エラーです。\n少し待ってからもう一度押してください。"
    );

    button.disabled =
    false;

    button.innerText =
    "もう一度確認する";

  }

}

function renderResult(data){

  const resultCard =
  document.getElementById("resultCard");

  const resultTitle =
  document.getElementById("resultTitle");

  const resultText =
  document.getElementById("resultText");

  const resultImage =
  document.getElementById("resultImage");

  const actions =
  document.getElementById("actions");

  const title =
  String(
    data.title ||
    data.result ||
    data.type ||
    "おみくじ結果"
  ).trim();

  const message =
  String(
    data.message ||
    data.text ||
    data.body ||
    ""
  ).trim();

  const imageSrc =
  String(
    data.imageDataUrl ||
    data.imageData ||
    data.imageUrl ||
    data.url ||
    ""
  ).trim();

  currentTitle =
  title;

  currentMessage =
  message;

  currentImageSrc =
  imageSrc;

  currentShareText =
  makeShareText(data);

  resultTitle.innerText =
  title;

  resultText.innerText =
  message || "田子山富士で良いご縁がありますように。";

  resultCard.style.display =
  "block";

  if(imageSrc){

    resultImage.src =
    imageSrc;

    resultImage.style.display =
    "block";

  }else{

    resultImage.removeAttribute("src");

    resultImage.style.display =
    "none";

  }

  if(data.notClimbed){

    actions.style.display =
    "none";

  }else{

    actions.style.display =
    "grid";

  }

}

function makeShareText(data){

  const pageUrl =
  HOME_URL +
  "omikuji.html?userId=" +
  encodeURIComponent(currentUserId);

  const fromGas =
  String(
    data.shareText ||
    ""
  ).trim();

  if(fromGas){

    return fromGas +
    "\n\n" +
    pageUrl;

  }

  let text =
  "田子山富士168の縁プロジェクトでおみくじを引きました。";

  if(currentTitle){
    text += "\n結果：" + currentTitle;
  }

  if(currentMessage){
    text += "\n" + currentMessage;
  }

  text +=
  "\n\n#田子山富士\n#168の縁プロジェクト\n" +
  pageUrl;

  return text;

}

function showStatus(text){

  const box =
  document.getElementById("statusBox");

  box.innerText =
  text;

  box.style.display =
  "block";

}

function hideStatus(){

  const box =
  document.getElementById("statusBox");

  box.innerText =
  "";

  box.style.display =
  "none";

}

function showNotice(text){

  const box =
  document.getElementById("noticeBox");

  box.innerText =
  text;

  box.style.display =
  "block";

}

function hideNotice(){

  const box =
  document.getElementById("noticeBox");

  box.innerText =
  "";

  box.style.display =
  "none";

}

function saveImage(){

  if(!currentImageSrc){

    showStatus(
      "保存できる画像がありません。"
    );

    return;

  }

  try{

    const a =
    document.createElement("a");

    a.href =
    currentImageSrc;

    a.download =
    "tagoyama-omikuji.png";

    document.body.appendChild(a);

    a.click();

    a.remove();

    showStatus(
      "画像保存を実行しました。\n保存できない場合は、画像を長押しして保存してください。"
    );

  }catch(e){

    window.open(
      currentImageSrc,
      "_blank"
    );

    showStatus(
      "画像を開きました。\n画像を長押しして保存してください。"
    );

  }

}

function copyPostText(){

  const text =
  currentShareText ||
  "田子山富士168の縁プロジェクトでおみくじを引きました。";

  if(navigator.clipboard && navigator.clipboard.writeText){

    navigator.clipboard
    .writeText(text)
    .then(function(){

      showStatus(
        "投稿文をコピーしました。"
      );

    })
    .catch(function(){

      fallbackCopy(text);

    });

  }else{

    fallbackCopy(text);

  }

}

function fallbackCopy(text){

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.style.position =
  "fixed";

  textarea.style.left =
  "-9999px";

  document.body.appendChild(textarea);

  textarea.focus();

  textarea.select();

  try{

    document.execCommand("copy");

    showStatus(
      "投稿文をコピーしました。"
    );

  }catch(e){

    showStatus(
      "コピーできませんでした。\n下の文章を長押ししてコピーしてください。\n\n" +
      text
    );

  }

  textarea.remove();

}

function shareFacebook(){

  copyPostText();

  const url =
  HOME_URL +
  "omikuji.html?userId=" +
  encodeURIComponent(currentUserId);

  const shareUrl =
  "https://www.facebook.com/sharer/sharer.php?u=" +
  encodeURIComponent(url);

  window.open(
    shareUrl,
    "_blank"
  );

}

function shareLine(){

  const text =
  currentShareText ||
  "田子山富士168の縁プロジェクトでおみくじを引きました。";

  const shareUrl =
  "https://line.me/R/msg/text/?" +
  encodeURIComponent(text);

  window.open(
    shareUrl,
    "_blank"
  );

}

function shareX(){

  const url =
  HOME_URL +
  "omikuji.html?userId=" +
  encodeURIComponent(currentUserId);

  const text =
  currentShareText ||
  "田子山富士168の縁プロジェクトでおみくじを引きました。";

  const shareUrl =
  "https://twitter.com/intent/tweet?text=" +
  encodeURIComponent(text) +
  "&url=" +
  encodeURIComponent(url);

  window.open(
    shareUrl,
    "_blank"
  );

}

function goHome(){

  if(currentUserId){

    location.href =
    HOME_URL +
    "?userId=" +
    encodeURIComponent(currentUserId) +
    "&v=" +
    Date.now();

  }else{

    location.href =
    HOME_URL +
    "?v=" +
    Date.now();

  }

}
</script>

</body>
</html>
