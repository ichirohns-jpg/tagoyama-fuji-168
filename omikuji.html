<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbxJh9lYhtQsTYASTa8jGvDDktcm9DeuMQcDn6B66q63FTReIFjBJuQikbY_Tt2iZ18/exec";

const SITE_ROOT =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const SHARE_OMIKUJI_PAGE =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-omikuji.html";

const FALLBACK_LOGO =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png";

const FALLBACK_OGP =
  "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji-atari.jpg?v=20260703-omikuji";

let currentUserId = "";
let currentResult = null;
let drawFinished = false;

window.addEventListener("load", init);

function init(){

  const urlUserId =
    getUserIdFromUrl();

  if(!urlUserId){

    showQrOnlyBlock();
    return;

  }

  currentUserId =
    urlUserId;

  localStorage.setItem(
    "tagoyamaUserId",
    currentUserId
  );

  localStorage.setItem(
    "tagoyamaFujiUserId",
    currentUserId
  );

  updateLinks();

  const params =
    new URLSearchParams(location.search);

  const auto =
    getString(params.get("auto"));

  if(auto === "1" || auto === "true"){

    setTimeout(function(){

      drawOmikuji();

    },400);

  }

}

function showQrOnlyBlock(){

  document.body.innerHTML =
    '<main class="qrOnlyPage">' +
      '<section class="qrOnlyBox">' +
        '<h1 class="qrOnlyTitle">QRコードから<br>お入りください</h1>' +
        '<p class="qrOnlyText">おみくじは、田子山富士のQRコードから入った方だけ引けます。</p>' +
        '<a class="linkBtn goldBtn" href="index.html">トップへ戻る</a>' +
      '</section>' +
    '</main>';

}

function getUserIdFromUrl(){

  const params =
    new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );

}

function updateLinks(){

  const topLink =
    document.getElementById("topLink");

  const topLink2 =
    document.getElementById("topLink2");

  const query =
    currentUserId
      ? "?userId=" + encodeURIComponent(currentUserId)
      : "";

  if(topLink){

    topLink.href =
      "index.html" + query;

  }

  if(topLink2){

    topLink2.href =
      "index.html" + query;

  }

}

async function drawOmikuji(){

  if(!currentUserId){

    showQrOnlyBlock();
    return;

  }

  if(drawFinished){

    scrollToResult();
    return;

  }

  const btn =
    document.getElementById("drawBtn");

  const statusBox =
    document.getElementById("statusBox");

  if(btn){

    btn.disabled = true;
    btn.innerText = "引いています...";

  }

  if(statusBox){

    statusBox.innerText =
      "おみくじを引いています。";

  }

  try{

    const data =
      await loadOmikujiFromGas();

    if(!data || data.success === false){

      throw new Error(
        data && data.message
          ? data.message
          : "おみくじを取得できませんでした。"
      );

    }

    currentResult =
      normalizeOmikujiData(data);

    if(!currentResult.imageUrl){

      currentResult.imageUrl =
        FALLBACK_OGP;

    }

    saveCurrentResult(currentResult);
    renderResult(currentResult);

    drawFinished = true;

    if(statusBox){

      statusBox.innerText =
        "おみくじを引きました。";

    }

    if(btn){

      btn.disabled = true;
      btn.innerText = "おみくじを引きました";
      btn.style.display = "none";

    }

    scrollToResult();

  }catch(error){

    console.error(error);

    if(statusBox){

      statusBox.innerText =
        error && error.message
          ? error.message
          : "おみくじを取得できませんでした。";

    }

    if(btn){

      btn.disabled = false;
      btn.innerText = "おみくじを引く";

    }

  }

}

async function loadOmikujiFromGas(){

  const urls = [];
  const t = Date.now();

  const userQuery =
    currentUserId
      ? "&userId=" + encodeURIComponent(currentUserId)
      : "";

  urls.push(
    GAS_URL + "?mode=omikuji" + userQuery + "&t=" + t
  );

  urls.push(
    GAS_URL + "?action=omikuji" + userQuery + "&t=" + t
  );

  urls.push(
    GAS_URL + "?omikuji=1" + userQuery + "&t=" + t
  );

  let lastError = null;

  for(let i = 0; i < urls.length; i++){

    try{

      const data =
        await getJson(urls[i]);

      if(data && typeof data === "object"){

        return data;

      }

    }catch(error){

      lastError = error;

    }

  }

  throw lastError || new Error("おみくじを取得できませんでした。");

}

async function getJson(url){

  try{

    const res =
      await fetch(url,{
        method:"GET",
        cache:"no-store"
      });

    if(!res.ok){

      throw new Error("HTTP " + res.status);

    }

    const text =
      await res.text();

    return parseJsonText(text);

  }catch(error){

    return await getJsonp(url);

  }

}

function parseJsonText(text){

  const value =
    String(text || "").trim();

  if(!value){

    throw new Error("empty response");

  }

  try{

    return JSON.parse(value);

  }catch(error){

    const objectStart =
      value.indexOf("{");

    const objectEnd =
      value.lastIndexOf("}");

    if(objectStart >= 0 && objectEnd > objectStart){

      return JSON.parse(
        value.substring(objectStart, objectEnd + 1)
      );

    }

    const arrayStart =
      value.indexOf("[");

    const arrayEnd =
      value.lastIndexOf("]");

    if(arrayStart >= 0 && arrayEnd > arrayStart){

      return JSON.parse(
        value.substring(arrayStart, arrayEnd + 1)
      );

    }

    throw error;

  }

}

function getJsonp(url){

  return new Promise(function(resolve,reject){

    const callbackName =
      "tagoyamaOmikujiCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script =
      document.createElement("script");

    const sep =
      url.indexOf("?") >= 0
        ? "&"
        : "?";

    const timer =
      setTimeout(function(){

        cleanup();
        reject(new Error("JSONP timeout"));

      },12000);

    window[callbackName] = function(data){

      cleanup();
      resolve(data);

    };

    script.onerror = function(){

      cleanup();
      reject(new Error("JSONP error"));

    };

    script.src =
      url +
      sep +
      "callback=" +
      encodeURIComponent(callbackName);

    document.body.appendChild(script);

    function cleanup(){

      clearTimeout(timer);

      try{

        delete window[callbackName];

      }catch(error){

        window[callbackName] = undefined;

      }

      if(script.parentNode){

        script.parentNode.removeChild(script);

      }

    }

  });

}

function normalizeOmikujiData(data){

  const source =
    flattenObject(data);

  const resultName =
    getFirst(
      source.result,
      source.name,
      source.title,
      source.luck,
      source.omikuji,
      source["結果"],
      source["おみくじ"],
      source["運勢"],
      "開運"
    );

  const message =
    getFirst(
      source.message,
      source.text,
      source.body,
      source.comment,
      source.content,
      source["本文"],
      source["メッセージ"],
      source["言葉"],
      "田子山富士のご縁がありますように。"
    );

  const imageUrl =
    getFirst(
      source.imageUrl,
      source.imageURL,
      source.imgUrl,
      source.img,
      source.image,
      source.url,
      source["画像URL"],
      source["画像url"],
      source["画像"],
      FALLBACK_OGP
    );

  return {
    userId:currentUserId,
    result:resultName,
    message:message,
    imageUrl:imageUrl,
    date:todayText()
  };

}

function flattenObject(data){

  data = data || {};

  let base = {};

  if(Array.isArray(data)){

    if(data.length > 0 && typeof data[data.length - 1] === "object"){

      base = data[data.length - 1];

    }

  }else if(typeof data === "object"){

    base = data;

  }

  const nested =
    base.data &&
    typeof base.data === "object" &&
    !Array.isArray(base.data)
      ? base.data
      : {};

  const latest =
    base.latest &&
    typeof base.latest === "object"
      ? base.latest
      : {};

  const record =
    base.record &&
    typeof base.record === "object"
      ? base.record
      : {};

  return Object.assign({},base,nested,latest,record);

}

function renderResult(result){

  result = result || {};

  const resultSection =
    document.getElementById("resultSection");

  const resultImage =
    document.getElementById("resultImage");

  const resultName =
    document.getElementById("resultName");

  const resultMessage =
    document.getElementById("resultMessage");

  if(resultImage){

    resultImage.src =
      result.imageUrl || FALLBACK_OGP;

  }

  if(resultName){

    resultName.innerText =
      result.result || "開運";

  }

  if(resultMessage){

    resultMessage.innerText =
      result.message || "田子山富士のご縁がありますように。";

  }

  if(resultSection){

    resultSection.style.display = "block";

  }

}

function saveCurrentResult(result){

  try{

    localStorage.setItem(
      "tagoyamaOmikujiResult",
      JSON.stringify(result)
    );

  }catch(error){

    console.warn(error);

  }

}

function getCurrentResult(){

  if(currentResult){

    return currentResult;

  }

  try{

    const text =
      localStorage.getItem("tagoyamaOmikujiResult");

    if(text){

      const data =
        JSON.parse(text);

      if(data && typeof data === "object"){

        currentResult = data;
        return currentResult;

      }

    }

  }catch(error){

    console.warn(error);

  }

  return {
    userId:currentUserId,
    result:"開運",
    message:"田子山富士のご縁がありますように。",
    imageUrl:FALLBACK_OGP,
    date:todayText()
  };

}

async function saveResultImage(){

  const target =
    document.getElementById("captureArea");

  if(!target){

    alert("保存できる画像がありません。");
    return;

  }

  try{

    const canvas =
      await html2canvas(target,{
        backgroundColor:"#000000",
        useCORS:true,
        allowTaint:true,
        scale:2
      });

    const blob =
      await new Promise(function(resolve){

        canvas.toBlob(function(result){

          resolve(result);

        },"image/png",.95);

      });

    if(!blob){

      throw new Error("画像を作成できませんでした。");

    }

    const filename =
      "tagoyama-omikuji.png";

    const file =
      new File([blob], filename, {
        type:"image/png"
      });

    if(
      navigator.canShare &&
      navigator.share &&
      navigator.canShare({
        files:[file]
      })
    ){

      await navigator.share({
        files:[file],
        title:"田子山富士 開運おみくじ",
        text:makeShareText()
      });

      return;

    }

    downloadBlob(blob,filename);

  }catch(error){

    if(error && error.name === "AbortError"){

      return;

    }

    console.error(error);
    alert("画像保存がうまくいかない場合は、画面をスクリーンショットで保存してください。");

  }

}

function downloadBlob(blob,filename){

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;
  a.download = filename;
  a.rel = "noopener";

  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(function(){

    URL.revokeObjectURL(url);

  },3000);

}

async function postFacebook(){

  const text =
    makeShareText() +
    "\n" +
    buildShareUrl();

  await copyText(text);

  alert(
    "投稿文とリンクをコピーしました。\nFacebookが開いたら、投稿欄に貼り付けてください。"
  );

  location.href =
    "https://www.facebook.com/";

}

function sendLine(){

  const url =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(buildShareUrl()) +
    "&text=" +
    encodeURIComponent(makeShareText());

  location.href = url;

}

function postX(){

  const url =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(makeShareText()) +
    "&url=" +
    encodeURIComponent(buildShareUrl());

  location.href = url;

}

async function copyResultText(){

  const text =
    makeShareText() +
    "\n" +
    buildShareUrl();

  await copyText(text);

  alert("おみくじの結果をコピーしました。");

}

function buildShareUrl(){

  const result =
    getCurrentResult();

  const params =
    new URLSearchParams();

  params.set("v","20260704qrlock");

  if(currentUserId){

    params.set("userId",currentUserId);

  }

  if(result.result){

    params.set("result",result.result);

  }

  if(result.message){

    params.set("message",result.message);

  }

  if(result.imageUrl){

    params.set("imageUrl",result.imageUrl);

  }

  return SHARE_OMIKUJI_PAGE + "?" + params.toString();

}

function makeShareText(){

  const result =
    getCurrentResult();

  return "田子山富士 開運おみくじ\n" +
    "今日のご縁：" +
    (result.result || "開運") +
    "\n" +
    (result.message || "田子山富士のご縁がありますように。") +
    "\n\n" +
    "#田子山富士 #敷島神社 #志木市";

}

async function copyText(text){

  try{

    await navigator.clipboard.writeText(text);

  }catch(error){

    const area =
      document.createElement("textarea");

    area.value = text;
    area.style.position = "fixed";
    area.style.left = "-9999px";

    document.body.appendChild(area);
    area.focus();
    area.select();

    document.execCommand("copy");

    area.remove();

  }

}

function scrollToResult(){

  const resultSection =
    document.getElementById("resultSection");

  if(resultSection){

    resultSection.scrollIntoView({
      behavior:"smooth",
      block:"start"
    });

  }

}

function todayText(){

  const d =
    new Date();

  const y =
    d.getFullYear();

  const m =
    String(d.getMonth() + 1).padStart(2,"0");

  const day =
    String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;

}

function getString(value){

  if(value === null || value === undefined){

    return "";

  }

  return String(value).trim();

}

function getFirst(){

  for(let i = 0; i < arguments.length; i++){

    const value =
      getString(arguments[i]);

    if(value){

      return value;

    }

  }

  return "";

}

window.drawOmikuji = drawOmikuji;
window.saveResultImage = saveResultImage;
window.postFacebook = postFacebook;
window.sendLine = sendLine;
window.postX = postX;
window.copyResultText = copyResultText;
</script>
