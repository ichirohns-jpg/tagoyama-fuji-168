<style>

}

body{

 color:#fff;

body{

 linear-gradient(180deg,#1d1204 0%,#070707 48%,#000 100%);

.logoBox{

 0 14px 30px rgba(0,0,0,.48),
 0 0 22px rgba(255,210,80,.20);
}

.logoBox img{
 display:block;
 width:100%;
 height:auto;
}

.pageTitle{
 margin:0;
 font-size:clamp(42px,12vw,76px);
 font-weight:900;

 color:#ffdf72;

 text-shadow:
 0 4px 4px rgba(0,0,0,.9),
 0 0 18px rgba(255,210,80,.28);
}

.pageSub{
 margin-top:10px;
 font-size:clamp(22px,6vw,38px);
 font-weight:900;
 color:#fff3c4;

}

.back-btn-wrap{

}

.back-btn{

 min-height:66px;
 border-radius:22px;
 border:2px solid rgba(255,220,95,.78);

 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 font-size:clamp(20px,5.5vw,34px);
 font-weight:900;
 letter-spacing:.02em;
 cursor:pointer;
 box-shadow:
 0 7px 0 rgba(0,0,0,.32),

.card{

 padding:26px 16px;

 background:

 rgba(20,20,20,.94);
 box-shadow:
 0 0 0 1px rgba(255,230,150,.10) inset,
 0 12px 28px rgba(0,0,0,.42);
}

.cardTitle{
 margin:0 0 14px;
 font-size:clamp(30px,8.4vw,54px);
 font-weight:900;
 text-align:center;
 line-height:1.25;
 color:#ffdf72;
 text-shadow:
 0 4px 4px rgba(0,0,0,.9),
 0 0 18px rgba(255,210,80,.28);
}

.cardText{
 margin:0 0 18px;
 font-size:clamp(20px,5.5vw,34px);
 font-weight:900;

 text-align:center;
}

.statusBox{
 margin:18px 0;
 padding:18px 14px;
 border-radius:20px;
 background:rgba(0,0,0,.34);
 border:1px solid rgba(255,220,140,.34);
 font-size:clamp(18px,4.8vw,28px);
 font-weight:900;
 line-height:1.65;

}

 margin-top:20px;
 padding:20px 14px;

 border:2px solid rgba(255,220,95,.76);

}

.resultImage{
 display:block;
 width:100%;
 height:auto;
 margin:0 auto;

 border:2px solid rgba(255,220,95,.78);

 gap:12px;

.linkBtn{

 border:none;
 border-radius:24px;

 letter-spacing:.02em;
 color:#fff;
 cursor:pointer;
 text-align:center;
 box-shadow:

 0 13px 22px rgba(0,0,0,.34);
}

.btn:disabled{
 opacity:.55;
}

.goldBtn{
 background:linear-gradient(180deg,#ffe27a,#c79218);
 color:#251400;
}

.greenBtn{
 background:linear-gradient(180deg,#35df86,#19b75e);
}

.lineBtn{
 background:linear-gradient(180deg,#25d366,#06a941);
}

.xBtn{
 background:linear-gradient(180deg,#333,#000);
}

.facebookBtn{

<body>

<div class="wrap">

 <header class="header">
  <div class="logoBox">
   <img src="logo.png" alt="田子山富士">
  </div>

  <h1 class="pageTitle">
   開運おみくじ
  </h1>

  <div class="pageSub">
   田子山富士168の縁プロジェクト
  </div>
 </header>

 <div class="back-btn-wrap">
  <button type="button" class="back-btn" onclick="goBackToTop()">
   ← 前のページに戻る
  </button>
 </div>

 <section class="card" id="drawSection">
  <h2 class="cardTitle">
   おみくじ
  </h2>

  <p class="cardText">
   山頂QRコードで登頂受付をした方だけが<br>
   おみくじを引けます。
  </p>

  <div class="statusBox" id="statusBox">
   準備中です...
  </div>

  <div class="btnGrid">
   <button class="btn goldBtn" id="drawBtn" onclick="drawOmikuji()">
    おみくじを引く
   </button>
  </div>
 </section>

 <section class="card hidden" id="resultSection">
  <div class="resultBox">
   <img
    class="resultImage"
    id="resultImage"
    src="omikuji-atari.jpg"
    alt="田子山富士おみくじ">

   <div class="resultMessage" id="resultMessage">
    --
   </div>
  </div>

  <div class="fbGuide">
   Facebookに投稿する場合は、画像を保存してから、リンクをコピーして投稿欄に貼り付けてください。
  </div>

  <div class="btnGrid">
   <button class="btn greenBtn" onclick="shareCurrentImageFile()">
    画像を保存
   </button>

   <button class="btn lineBtn" onclick="shareToLine()">
    LINEで送る
   </button>

   <button class="btn xBtn" onclick="shareToX()">
    Xで投稿
   </button>

   <button class="btn facebookBtn" onclick="shareToFacebook()">
    Facebook
   </button>

   <button class="btn grayBtn" onclick="copyShareText()">
    リンクをコピー
   </button>

   <button class="btn blackBtn" onclick="goBackToTop()">
    ← トップへ戻る
   </button>
  </div>
 </section>

 <footer class="footer">
  田子山富士 168の縁プロジェクト<br>
  開運おみくじ
 </footer>

</div>

<script>
const OMIKUJI_GAS_URL =
"https://script.google.com/macros/s/AKfycbwP9au-EgJw1qNdhCGBD3W3s60ZuPmkITBhoycKJK4C3QkeNzV5YRSFDv7dC1r5qPQQhw/exec";

const DEFAULT_OMIKUJI_IMAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji-atari.jpg?v=20260701-atari-card-02";

const SHARE_OMIKUJI_URL =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-omikuji.html";

let currentUserId =
"";

let latestResult =
null;

let currentImageUrl =
DEFAULT_OMIKUJI_IMAGE;

window.addEventListener("load",initOmikuji);

function initOmikuji(){
 const params =
 new URLSearchParams(location.search);

 currentUserId =
 getString(
  params.get("userId") ||
  params.get("id") ||
  params.get("uid") ||
  localStorage.getItem("tagoyamaUserId") ||
  localStorage.getItem("tagoyamaFujiUserId") ||
  localStorage.getItem("userId") ||
  ""
 );

 if(currentUserId){
  localStorage.setItem("tagoyamaUserId",currentUserId);
  localStorage.setItem("tagoyamaFujiUserId",currentUserId);
  localStorage.setItem("userId",currentUserId);

  setStatus(
   "おみくじを引けます。"
  );

  setDrawButton(true);
  return;
 }

 setStatus(
  "ユーザーIDが不明です。\n山頂QRコードで登頂受付をしてください。"
 );

 setDrawButton(false);
}

function goBackToTop(){
 const params =
 new URLSearchParams(location.search);

 const userId =
 getString(
  currentUserId ||
  params.get("userId") ||
  params.get("id") ||
  params.get("uid") ||
  localStorage.getItem("tagoyamaUserId") ||
  localStorage.getItem("tagoyamaFujiUserId") ||
  localStorage.getItem("userId") ||
  ""
 );

 if(userId){
  location.href =
  "index.html?userId=" +
  encodeURIComponent(userId);
  return;
 }

 if(window.history && window.history.length > 1){
  history.back();
  return;
 }

 location.href =
 "index.html";
}

async function drawOmikuji(){
 if(!currentUserId){
  alert("山頂QRコードで登頂受付をしてください。");
  return;
 }

 setStatus(
  "おみくじを引いています..."
 );

 setDrawButton(false);

 try{
  const url =
  OMIKUJI_GAS_URL +
  "?mode=omikuji" +
  "&userId=" +
  encodeURIComponent(currentUserId) +
  "&t=" +
  Date.now();

  const data =
  await getJson(url);

  if(!data || data.success === false){
   setStatus(
    data && data.message
    ? data.message
    : "おみくじを引けませんでした。"
   );

   setDrawButton(true);
   return;
  }

  const result =
  normalizeOmikujiResult(data);

  latestResult =
  result;

  renderOmikuji(result);

  if(data.alreadyDrawnToday === true){
   setStatus(
    "本日のおみくじは引き終わっています。\n前回の結果を表示しています。"
   );
  }else{
   setStatus(
    "おみくじを引きました。"
   );
  }

 }catch(error){
  setStatus(
   "おみくじを読み込めませんでした。"
  );

  setDrawButton(true);
 }
}

function normalizeOmikujiResult(data){
 const source =
 data.result ||
 data.omikuji ||
 data.item ||
 data;

 const title =
 getString(
  source.title ||
  source.name ||
  source.imageName ||
  source.resultTitle ||
  source.unsei ||
  source.fortune ||
  data.title ||
  data.name ||
  data.imageName ||
  data.unsei ||
  ""
 );

 const message =
 getString(
  source.message ||
  source.body ||
  source.text ||
  source.displayText ||
  source.comment ||
  source.description ||
  source.本文 ||
  data.message ||
  data.body ||
  data.text ||
  data.displayText ||
  "田子山富士でまた良いご縁がありますように。"
 );

 const imageUrl =
 normalizeImageUrl(
  source.imageUrl ||
  source.image ||
  source.img ||
  source.画像URL ||
  data.imageUrl ||
  data.image ||
  data.img ||
  DEFAULT_OMIKUJI_IMAGE
 );

 return {
  title:title,
  message:message,
  imageUrl:imageUrl
 };
}

function renderOmikuji(result){
 const imageUrl =
 normalizeImageUrl(
  result.imageUrl ||
  DEFAULT_OMIKUJI_IMAGE
 );

 currentImageUrl =
 imageUrl;

 document.getElementById("resultImage").src =
 imageUrl;

 document.getElementById("resultMessage").innerText =
 result.message || "田子山富士でまた良いご縁がありますように。";

 document.getElementById("resultSection").classList.remove("hidden");

 setTimeout(function(){
  document.getElementById("resultSection").scrollIntoView({
   behavior:"smooth",
   block:"start"
  });
 },100);
}

async function shareCurrentImageFile(){
 const imageUrl =
 getShareImageUrl();

 try{
  const blob =
  await getImageBlob(imageUrl);

  const file =
  new File(
   [blob],
   getOmikujiFileName(blob),
   {
    type:blob.type || "image/jpeg"
   }
  );

  if(
   navigator.canShare &&
   navigator.canShare({files:[file]}) &&
   navigator.share
  ){
   await navigator.share({
    files:[file]
   });

   return;
  }

  alert(
   "この端末では画像ファイル共有に対応していません。\nSafariで開いてからもう一度お試しください。"
  );

 }catch(error){
  alert(
   "画像共有を開けませんでした。\nSafariで開いてからもう一度お試しください。"
  );
 }
}

function shareToLine(){
 const text =
 buildShareText();

 const url =
 "https://social-plugins.line.me/lineit/share?url=" +
 encodeURIComponent(SHARE_OMIKUJI_URL) +
 "&text=" +
 encodeURIComponent(text);

 openShareWindow(url);
}

function shareToX(){
 const text =
 buildShareText();

 const url =
 "https://twitter.com/intent/tweet?text=" +
 encodeURIComponent(text) +
 "&url=" +
 encodeURIComponent(SHARE_OMIKUJI_URL);

 openShareWindow(url);
}

async function shareToFacebook(){
 const text =
 buildShareText();

 try{
  await copyText(text);
  alert("投稿文とリンクをコピーしました。Facebookに貼り付けてください。");
 }catch(error){
  alert("コピーできませんでした。");
 }

 openShareWindow("https://www.facebook.com/");
}

async function copyShareText(){
 const text =
 buildShareText();

 try{
  await copyText(text);
  alert("投稿文とリンクをコピーしました。");
 }catch(error){
  alert("コピーできませんでした。");
 }
}

function buildShareText(){
 return [
  "田子山富士168の縁プロジェクトで開運おみくじを引きました。",
  "",
  "田子山富士で、楽しいご縁をいただきました。",
  "",
  "#田子山富士",
  "#168の縁プロジェクト",
  "",
  SHARE_OMIKUJI_URL
 ].join("\n");
}

function openShareWindow(url){
 window.open(
  url,
  "_blank",
  "noopener,noreferrer"
 );
}

function getShareImageUrl(){
 return normalizeImageUrl(
  currentImageUrl ||
  DEFAULT_OMIKUJI_IMAGE
 );
}

function getOmikujiFileName(blob){
 const type =
 blob && blob.type
 ? blob.type.toLowerCase()
 : "";

 if(type.indexOf("png") >= 0){
  return "tagoyama-fuji-omikuji.png";
 }

 if(type.indexOf("webp") >= 0){
  return "tagoyama-fuji-omikuji.webp";
 }

 return "tagoyama-fuji-omikuji.jpg";
}

async function getImageBlob(imageUrl){
 imageUrl =
 normalizeImageUrl(imageUrl);

 const response =
 await fetch(
  imageUrl,
  {
   method:"GET",
   cache:"no-store",
   mode:"cors"
  }
 );

 if(!response.ok){
  throw new Error("画像を取得できませんでした");
 }

 const blob =
 await response.blob();

 if(!blob || !blob.size){
  throw new Error("画像データが空です");
 }

 if(!blob.type || blob.type.indexOf("image/") !== 0){
  return new Blob(
   [blob],
   {
    type:"image/jpeg"
   }
  );
 }

 return blob;
}

async function getJson(url){
 try{
  return await fetchJson(url,12000);
 }catch(error){
  return await jsonp(url,15000);
 }
}

async function fetchJson(url,timeoutMs){
 const controller =
 new AbortController();

 const timer =
 setTimeout(function(){
  controller.abort();
 },timeoutMs || 12000);

 try{
  const res =
  await fetch(
   url,
   {
    method:"GET",
    cache:"no-store",
    signal:controller.signal
   }
  );

  const text =
  await res.text();

  if(!res.ok){
   throw new Error("通信エラー");
  }

  try{
   return JSON.parse(text);
  }catch(e){}

  const match =
  text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

  if(match && match[1]){
   return JSON.parse(match[1]);
  }

  throw new Error("JSONではありません");

 }finally{
  clearTimeout(timer);
 }
}

function jsonp(url,timeoutMs){
 return new Promise(function(resolve,reject){
  const callbackName =
  "__tagoyamaOmikujiCallback_" +
  Date.now() +
  "_" +
  Math.floor(Math.random() * 100000);

  const sep =
  url.indexOf("?") >= 0
  ? "&"
  : "?";

  const script =
  document.createElement("script");

  let done =
  false;

  const timer =
  setTimeout(function(){
   cleanup();
   reject(new Error("JSONP timeout"));
  },timeoutMs || 15000);

  function cleanup(){
   if(done){
    return;
   }

   done =
   true;

   clearTimeout(timer);

   try{
    delete window[callbackName];
   }catch(e){
    window[callbackName] =
    undefined;
   }

   if(script.parentNode){
    script.parentNode.removeChild(script);
   }
  }

  window[callbackName] =
  function(data){
   cleanup();
   resolve(data);
  };

  script.onerror =
  function(){
   cleanup();
   reject(new Error("JSONP error"));
  };

  script.src =
  url +
  sep +
  "callback=" +
  encodeURIComponent(callbackName);

  document.body.appendChild(script);
 });
}

function normalizeImageUrl(value){
 let url =
 getString(value);

 if(!url){
  return DEFAULT_OMIKUJI_IMAGE;
 }

 url =
 url
 .replace(/\\u003d/g,"=")
 .replace(/\\u0026/g,"&")
 .replace(/\\\//g,"/")
 .replace(/&amp;/g,"&")
 .replace(/[),.;]+$/g,"")
 .trim();

 if(url.indexOf("data:image") === 0){
  return url;
 }

 if(url.indexOf("http://") === 0 || url.indexOf("https://") === 0){
  return url;
 }

 if(url.indexOf("drive.google.com/thumbnail") >= 0){
  return url;
 }

 let match =
 url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);

 if(match && match[1]){
  return "https://drive.google.com/thumbnail?id=" +
  encodeURIComponent(match[1]) +
  "&sz=w1600";
 }

 match =
 url.match(/[?&]id=([^&]+)/);

 if(url.indexOf("drive.google.com") >= 0 && match && match[1]){
  return "https://drive.google.com/thumbnail?id=" +
  encodeURIComponent(match[1]) +
  "&sz=w1600";
 }

 try{
  return new URL(
   url,
   "https://ichirohns-jpg.github.io/tagoyama-fuji-168/"
  ).href;
 }catch(e){
  return DEFAULT_OMIKUJI_IMAGE;
 }
}

function setStatus(text){
 document.getElementById("statusBox").innerText =
 text;
}

function setDrawButton(enabled){
 const btn =
 document.getElementById("drawBtn");

 btn.disabled =
 !enabled;

 btn.style.opacity =
 enabled ? "1" : ".55";
}

async function copyText(text){
 text =
 getString(text);

 if(navigator.clipboard && navigator.clipboard.writeText){
  await navigator.clipboard.writeText(text);
  return;
 }

 const textarea =
 document.createElement("textarea");

 textarea.value =
 text;

 textarea.setAttribute("readonly","readonly");

 textarea.style.position =
 "fixed";

 textarea.style.left =
 "-9999px";

 textarea.style.top =
 "0";

 document.body.appendChild(textarea);

 textarea.focus();
 textarea.select();

 const ok =
 document.execCommand("copy");

 document.body.removeChild(textarea);

 if(!ok){
  throw new Error("copy failed");
 }
}

function getString(value){
 if(value === null || value === undefined){
  return "";
 }

 return String(value).trim();
}
</script>

</body>
</html>
