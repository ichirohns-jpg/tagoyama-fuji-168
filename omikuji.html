<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyaFXdYWZ8tj0LSCBTSxXRFC_7XElgJ47bFcd-DSjGnpn2yWLq6l_O5eIwEkAl9yjiP/exec";

const OMIKUJI_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

let currentUserId = "";
let latestImageSource = "";
let latestFile = null;
let latestFileUrl = "";
let latestShareText = "";
let latestShareUrl = "";

window.addEventListener(
"load",
init
);

function init(){

  currentUserId =
  getUserIdFromUrl() ||
  localStorage.getItem("tagoyamaUserId") ||
  "";

  if(currentUserId){

    localStorage.setItem(
      "tagoyamaUserId",
      currentUserId
    );

    document.getElementById("statusBox").innerText =
    "登頂情報を確認しました。おみくじを引けます。";

  }else{

    document.getElementById("statusBox").innerText =
    "山頂QRコードで登頂受付をしてから、おみくじを引けます。";

  }

  latestShareUrl =
  OMIKUJI_PAGE +
  "?userId=" +
  encodeURIComponent(currentUserId) +
  "&v=" +
  Date.now();

}

function getUserIdFromUrl(){

  const params =
  new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    ""
  );

}

async function drawOmikuji(){

  const btn =
  document.getElementById("drawBtn");

  const status =
  document.getElementById("statusBox");

  const userId =
  currentUserId ||
  localStorage.getItem("tagoyamaUserId") ||
  "";

  clearResult();

  if(!userId){

    renderResult({
      success:true,
      notClimbed:true,
      hit:false,
      title:"まだ登頂していません",
      text:"山頂QRコードを読み取って登頂受付をすると、おみくじを引けます。",
      imageUrl:"",
      imageDataUrl:""
    });

    status.innerText =
    "山頂QRコードで登頂受付をしてください。";

    return;

  }

  currentUserId =
  userId;

  localStorage.setItem(
    "tagoyamaUserId",
    userId
  );

  btn.disabled =
  true;

  btn.innerText =
  "おみくじ中...";

  status.innerText =
  "おみくじを引いています...";

  try{

    const data =
    await fetchJson(
      GAS_URL +
      "?mode=omikuji" +
      "&userId=" +
      encodeURIComponent(userId) +
      "&t=" +
      Date.now()
    );

    if(!data || data.success === false){

      throw new Error(
        data && data.message
        ? data.message
        : "おみくじを引けませんでした"
      );

    }

    renderResult(data);

    if(data.alreadyDrawn || data.alreadyDrawnToday){

      status.innerText =
      "本日のおみくじ結果を表示しました。";

    }else{

      status.innerText =
      "おみくじ結果を表示しました。";

    }

    btn.disabled =
    true;

    btn.innerText =
    "本日のおみくじは完了です";

  }catch(err){

    status.innerText =
    err.message ||
    "おみくじを引けませんでした";

    btn.disabled =
    false;

    btn.innerText =
    "もう一度おみくじを引く";

  }

}

function clearResult(){

  latestImageSource = "";
  latestFile = null;

  if(latestFileUrl){
    URL.revokeObjectURL(latestFileUrl);
    latestFileUrl = "";
  }

  latestShareText = "";

  const card =
  document.getElementById("resultCard");

  card.style.display =
  "none";

  card.classList.remove("hit");
  card.classList.remove("miss");

  document.getElementById("resultImageBox").style.display =
  "none";

  document.getElementById("resultImage").removeAttribute("src");

  document.getElementById("shareActions").style.display =
  "none";

  document.getElementById("already").style.display =
  "none";

}

function renderResult(data){

  const card =
  document.getElementById("resultCard");

  const imageBox =
  document.getElementById("resultImageBox");

  const image =
  document.getElementById("resultImage");

  const title =
  document.getElementById("resultTitle");

  const text =
  document.getElementById("resultText");

  const date =
  document.getElementById("resultDate");

  const shareActions =
  document.getElementById("shareActions");

  const already =
  document.getElementById("already");

  const hit =
  data.hit === true ||
  data.isHit === true ||
  data.type === "hit";

  const notClimbed =
  data.notClimbed === true ||
  data.type === "none";

  card.style.display =
  "block";

  card.classList.remove("hit");
  card.classList.remove("miss");

  if(hit){
    card.classList.add("hit");
  }else{
    card.classList.add("miss");
  }

  title.innerText =
  getString(
    data.title ||
    (
      notClimbed
      ? "まだ登頂していません"
      : hit
      ? "大当たり"
      : "小吉"
    )
  );

  text.innerText =
  getString(
    data.text ||
    data.message ||
    (
      notClimbed
      ? "山頂QRコードを読み取って登頂受付をすると、おみくじを引けます。"
      : hit
      ? "おめでとうございます。田子山富士でご縁をいただきました。"
      : "田子山富士でまた良いご縁がありますように。"
    )
  );

  date.innerText =
  todayText();

  if(data.alreadyDrawn === true || data.alreadyDrawnToday === true){

    already.style.display =
    "block";

  }else{

    already.style.display =
    "none";

  }

  latestImageSource =
  normalizeImageSource(
    data.imageDataUrl ||
    data.imageData ||
    data.imageUrl ||
    data.url ||
    ""
  );

  if(latestImageSource){

    image.src =
    latestImageSource;

    imageBox.style.display =
    "block";

  }else{

    image.removeAttribute("src");

    imageBox.style.display =
    "none";

  }

  latestShareText =
  getString(
    data.shareText ||
    (
      hit
      ? "田子山富士168の縁プロジェクトでおみくじに当たりました！\n田子山富士でご縁をいただきました。\n\n#田子山富士\n#168の縁プロジェクト"
      : "田子山富士168の縁プロジェクトでおみくじを引きました。\n#田子山富士\n#168の縁プロジェクト"
    )
  );

  latestShareUrl =
  OMIKUJI_PAGE +
  "?userId=" +
  encodeURIComponent(currentUserId || "") +
  "&v=" +
  Date.now();

  if(hit){

    shareActions.style.display =
    "grid";

    prepareFileSilent();

  }else{

    shareActions.style.display =
    "none";

  }

}

function normalizeImageSource(value){

  value =
  getString(value);

  if(!value){
    return "";
  }

  if(value.indexOf("data:image") === 0){
    return value;
  }

  if(value.length > 100){

    if(value.indexOf("/9j/") === 0){
      return "data:image/jpeg;base64," + value;
    }

    if(value.indexOf("UklGR") === 0){
      return "data:image/webp;base64," + value;
    }

    if(value.indexOf("iVBOR") === 0){
      return "data:image/png;base64," + value;
    }

  }

  return value;

}

async function prepareFileSilent(){

  try{
    await prepareImageFile();
  }catch(e){}

}

async function prepareImageFile(){

  if(latestFile){
    return latestFile;
  }

  if(!latestImageSource){
    throw new Error("画像がありません");
  }

  if(latestImageSource.indexOf("data:image") === 0){

    latestFile =
    dataUrlToFile(
      latestImageSource,
      "tagoyama-omikuji.png"
    );

    latestFileUrl =
    URL.createObjectURL(latestFile);

    return latestFile;

  }

  const res =
  await fetch(
    latestImageSource,
    {
      cache:"no-store"
    }
  );

  if(!res.ok){
    throw new Error("画像を取得できませんでした");
  }

  const blob =
  await res.blob();

  latestFile =
  new File(
    [blob],
    "tagoyama-omikuji.png",
    {
      type:blob.type || "image/png"
    }
  );

  latestFileUrl =
  URL.createObjectURL(latestFile);

  return latestFile;

}

function dataUrlToFile(dataUrl,fileName){

  const parts =
  dataUrl.split(",");

  const header =
  parts[0] || "";

  const base64 =
  parts[1] || "";

  const mimeMatch =
  header.match(/data:(.*?);base64/);

  const mime =
  mimeMatch && mimeMatch[1]
  ? mimeMatch[1]
  : "image/png";

  const binary =
  atob(base64);

  const length =
  binary.length;

  const bytes =
  new Uint8Array(length);

  for(let i=0;i<length;i++){

    bytes[i] =
    binary.charCodeAt(i);

  }

  return new File(
    [bytes],
    fileName,
    {
      type:mime
    }
  );

}

async function saveOmikujiImage(btn){

  if(btn){

    btn.disabled =
    true;

    btn.innerText =
    "画像を準備中...";

  }

  try{

    const file =
    await prepareImageFile();

    document.getElementById("savedImage").src =
    latestFileUrl ||
    latestImageSource ||
    "";

    document.getElementById("popup").style.display =
    "block";

    await shareImageFile(
      file,

    );

  }catch(e){

      "画像共有の準備ができませんでした。投稿文コピーかスクリーンショットを使ってください。"
    );

  }finally{

}

  const text =
  latestShareText ||

    return;

  }

  if(type === "line"){

      }

    }catch(e){}

    location.href =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(url);

  }

}

async function shareImageFile(file,title,text,url){

  if(!navigator.share){
    return false;
  }

  const data = {
    title:title || "田子山富士おみくじ",
    text:text || "田子山富士おみくじ"
  };

  if(file){

    data.files =
    [file];

  }else if(url){

    data.url =
    url;

  }

  try{

    if(
      file &&
      navigator.canShare &&
      !navigator.canShare({files:[file]})
    ){

      return false;

    }

    await navigator.share(data);

    return true;

  }catch(e){

    if(e && e.name === "AbortError"){
      return true;
    }

    return false;

  }

}

async function fetchJson(url){

  const res =
  await fetch(
    url,
    {
      method:"GET",
      cache:"no-store"
    }
  );

  const text =
  await res.text();

  try{

    return JSON.parse(text);

  }catch(e){

    const m =
    text.match(/^[^(]+\((.*)\);?$/);

    if(m && m[1]){
      return JSON.parse(m[1]);
    }

    throw e;

  }

}

async function copyTextOnly(text){

  if(
    navigator.clipboard &&
    navigator.clipboard.writeText
  ){

    await navigator.clipboard.writeText(text);

    return true;

  }

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.style.position =
  "fixed";

  textarea.style.left =
  "-9999px";

  document.body.appendChild(textarea);

  textarea.focus();

  textarea.select();

  document.execCommand("copy");

  document.body.removeChild(textarea);

  return true;

}

function todayText(){

  const d =
  new Date();

  const y =
  d.getFullYear();

  const m =
  String(d.getMonth() + 1).padStart(2,"0");

  const day =
  String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;

}

function getString(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();

}
