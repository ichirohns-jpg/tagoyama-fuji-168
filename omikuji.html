<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>田子山富士 開運おみくじ</title>

<meta name="description" content="田子山富士168の縁プロジェクト 開運おみくじ">
<meta property="og:type" content="website">
<meta property="og:title" content="田子山富士 開運おみくじ">
<meta property="og:description" content="田子山富士168の縁プロジェクトでおみくじを引きました。">

<meta property="og:image" content="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="田子山富士 開運おみくじ">

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  min-height:100%;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Hiragino Sans",
    "Yu Gothic",
    "Noto Sans JP",
    sans-serif;
  color:#fff;
  background:
    radial-gradient(circle at top,#3c2a0a 0,#130d07 38%,#050505 100%);
}

body{
  padding-bottom:40px;
}

.page{
  width:100%;
  max-width:720px;
  margin:0 auto;
  padding:18px 16px 36px;
}

.hero{
  text-align:center;
  padding:12px 0 24px;
}

.logoBox{
  width:100%;
  max-width:560px;
  margin:0 auto 22px;
  border:4px solid #d7b44a;
  border-radius:28px;
  overflow:hidden;
  background:#111;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.08) inset,
    0 14px 34px rgba(0,0,0,.45);
}

.logoBox img{
  display:block;
  width:100%;
  height:auto;
}

h1{
  margin:10px 0 6px;
  font-size:44px;
  line-height:1.15;
  font-weight:900;
  letter-spacing:.04em;
  color:#ffd96a;
  text-shadow:
    0 3px 0 rgba(0,0,0,.35),
    0 0 18px rgba(255,210,80,.35);
}

.lead{
  margin:0;
  font-size:20px;
  line-height:1.65;
  font-weight:800;
  color:#fff4cc;
}

.card{
  margin:18px 0;
  padding:24px 18px;
  border:3px solid #d7b44a;
  border-radius:26px;
  background:
    linear-gradient(145deg,rgba(255,225,120,.16),rgba(0,0,0,.42)),
    rgba(0,0,0,.55);
  box-shadow:
    0 14px 32px rgba(0,0,0,.45),
    0 0 30px rgba(215,180,74,.12) inset;
}

.card h2{
  margin:0 0 18px;
  text-align:center;
  font-size:32px;
  line-height:1.3;
  color:#ffd96a;
  font-weight:900;
  text-shadow:0 2px 0 rgba(0,0,0,.4);
}

.card p{
  margin:10px 0;
  font-size:22px;
  line-height:1.75;
  font-weight:800;
  text-align:center;
}

.status{
  margin:18px auto;
  padding:14px 16px;
  border-radius:16px;
  background:rgba(255,255,255,.1);
  color:#fff7d5;
  font-size:18px;
  line-height:1.5;
  font-weight:800;
  text-align:center;
}

.mainBtn{
  display:block;
  width:100%;
  margin:22px 0 4px;
  padding:18px 16px;
  border:none;
  border-radius:999px;
  background:linear-gradient(180deg,#ffe07a,#c8961a);
  color:#1b1204;
  font-size:24px;
  line-height:1.2;
  font-weight:900;
  letter-spacing:.04em;
  box-shadow:
    0 8px 0 #6f4c04,
    0 14px 24px rgba(0,0,0,.45);
  cursor:pointer;
}

.mainBtn:active{
  transform:translateY(4px);
  box-shadow:
    0 4px 0 #6f4c04,
    0 8px 18px rgba(0,0,0,.45);
}

.mainBtn:disabled{
  opacity:.65;
  cursor:not-allowed;
}

.resultCard{
  display:none;
  margin-top:22px;
}

.resultCard.hit{
  border-color:#ffd96a;
  background:
    radial-gradient(circle at top,rgba(255,220,90,.24),rgba(0,0,0,.55) 55%),
    rgba(0,0,0,.72);
}

.resultCard.miss{
  border-color:#c9b678;
}

.resultImageBox{
  display:none;
  width:100%;
  margin:0 auto 18px;
  border-radius:20px;
  overflow:hidden;
  border:3px solid rgba(255,217,106,.85);
  background:#111;
}

.resultImageBox img{
  display:block;
  width:100%;
  height:auto;
}

.resultTitle{
  margin:4px 0 10px;
  text-align:center;
  font-size:34px;
  line-height:1.25;
  color:#ffd96a;
  font-weight:900;
}

.resultText{
  white-space:pre-line;
  margin:10px 0;
  text-align:center;
  font-size:22px;
  line-height:1.7;
  font-weight:850;
}

.resultDate{
  margin:14px 0 4px;
  text-align:center;
  font-size:17px;
  color:#fff1ba;
  font-weight:800;
}

.already{
  display:none;
  margin:16px 0;
  padding:14px 12px;
  border-radius:16px;
  background:rgba(255,255,255,.1);
  color:#fff1ba;
  text-align:center;
  font-size:18px;
  line-height:1.5;
  font-weight:900;
}

.shareActions{
  display:none;
  grid-template-columns:1fr;
  gap:12px;
  margin-top:20px;
}

.shareBtn{
  width:100%;
  padding:15px 14px;
  border:none;
  border-radius:18px;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
  background:#fff;
  color:#201304;
  box-shadow:0 6px 16px rgba(0,0,0,.28);
}

.shareBtn.gold{
  background:linear-gradient(180deg,#ffe07a,#c8961a);
}

.shareBtn.blue{
  background:#1877f2;
  color:#fff;
}

.shareBtn.green{
  background:#06c755;
  color:#fff;
}

.shareBtn.black{
  background:#111;
  color:#fff;
}

.backLink{
  display:block;
  margin:22px auto 8px;
  color:#fff4cc;
  text-align:center;
  font-size:18px;
  font-weight:900;
  text-decoration:none;
}

.notice{
  margin:16px 0 0;
  text-align:center;
  color:#e7d49c;
  font-size:15px;
  line-height:1.6;
  font-weight:700;
}

.footer{
  padding:20px 0 0;
  text-align:center;
  color:#bfae7b;
  font-size:14px;
  line-height:1.6;
}

.popup{
  display:none;
  position:fixed;
  z-index:9999;
  inset:0;
  padding:20px;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.82);
}

.popupInner{
  width:100%;
  max-width:620px;
  max-height:92vh;
  overflow:auto;
  padding:18px;
  border-radius:24px;
  background:#111;
  border:3px solid #d7b44a;
  text-align:center;
}

.popupInner h3{
  margin:6px 0 12px;
  color:#ffd96a;
  font-size:24px;
}

.popupInner p{
  margin:10px 0 14px;
  color:#fff;
  font-size:17px;
  line-height:1.5;
  font-weight:800;
}

.popupInner img{
  display:block;
  width:100%;
  height:auto;
  border-radius:16px;
  margin:0 auto 14px;
}

.popupActions{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

@media (min-width:560px){
  .shareActions{
    grid-template-columns:1fr 1fr;
  }
}

@media (max-width:420px){
  .page{
    padding:14px 12px 30px;
  }

  h1{
    font-size:36px;
  }

  .lead{
    font-size:18px;
  }

  .card{
    padding:22px 14px;
  }

  .card h2{
    font-size:30px;
  }

  .card p{
    font-size:20px;
  }

  .mainBtn{
    font-size:22px;
  }

  .resultTitle{
    font-size:31px;
  }

  .resultText{
    font-size:20px;
  }
}
</style>
</head>

<body>

<main class="page">

  <header class="hero">
    <div class="logoBox">
      <img src="logo.png" alt="田子山富士">
    </div>

    <h1>開運おみくじ</h1>
    <p class="lead">田子山富士168の縁プロジェクト</p>
  </header>

  <section class="card">
    <h2>おみくじ</h2>

    <p>
      山頂QRコードで登頂受付をした方だけが<br>
      おみくじを引けます。
    </p>

    <div id="statusBox" class="status">準備中です...</div>

    <button id="drawBtn" class="mainBtn" type="button">
      おみくじを引く
    </button>
  </section>

  <section id="resultCard" class="card resultCard">
    <div id="resultImageBox" class="resultImageBox">
      <img id="resultImage" alt="田子山富士おみくじ">
    </div>

    <div id="resultTitle" class="resultTitle">--</div>
    <div id="resultText" class="resultText">--</div>
    <div id="resultDate" class="resultDate">--</div>

    <div id="already" class="already">
      本日のおみくじは終了しました。<br>
      次回の登頂時にまたお楽しみください。
    </div>

    <div id="shareActions" class="shareActions">
      <button class="shareBtn gold" type="button" onclick="saveOmikujiImage(this)">
        画像を保存
      </button>

      <button class="shareBtn" type="button" onclick="copyOmikujiPost()">
        投稿文をコピー
      </button>

      <button class="shareBtn blue" type="button" onclick="shareOmikuji('facebook')">
        Facebookで投稿
      </button>

      <button class="shareBtn green" type="button" onclick="shareOmikuji('line')">
        LINEで送る
      </button>

      <button class="shareBtn black" type="button" onclick="shareOmikuji('x')">
        Xで投稿
      </button>
    </div>
  </section>

  <a class="backLink" href="./">← トップへ戻る</a>

  <p class="notice">
    Facebookは投稿文をコピーしてから投稿画面を開きます。<br>
    大当たりのときは、Facebookの画像タッチ先を<br>
    「大当たり専用ページ」にします。
  </p>

  <footer class="footer">
    田子山富士 168の縁プロジェクト<br>
    開運おみくじ
  </footer>

</main>

<div id="popup" class="popup">
  <div class="popupInner">
    <h3>田子山富士おみくじ</h3>

    <img id="savedImage" alt="田子山富士おみくじ">

    <p>
      共有画面で「画像を保存」または<br>
      「写真に保存」を選んでください。
    </p>

    <div class="popupActions">
      <button class="shareBtn gold" type="button" onclick="shareSavedImage()">
        写真に保存する
      </button>

      <button class="shareBtn" type="button" onclick="closePopup()">
        閉じる
      </button>
    </div>
  </div>
</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbx5w_dEKm4Tb-GFB0o9AhUgLB1MdziOntuQ8iChEbnSbB6jcUCxp4STritRJeyF_osy/exec";

const SITE_BASE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const OMIKUJI_PAGE =
SITE_BASE + "omikuji.html";

const SHARE_OMIKUJI_PAGE =
SITE_BASE + "share-omikuji.html";

const SHARE_OMIKUJI_ATARI_PAGE =
SITE_BASE + "share-omikuji-atari.html";

const HOME_PAGE =
SITE_BASE;

const SHARE_VERSION =
"20260630-2";

const DONE_MESSAGE =
"本日のおみくじは終了しました。\n次回の登頂時にまたお楽しみください。";

let currentUserId = "";
let latestImageSource = "";
let latestFile = null;
let latestShareText = "";
let latestShareUrl = "";
let latestResultData = null;
let latestIsHit = false;
let isDrawing = false;

window.addEventListener("load", init);

function init(){
  currentUserId = getStableUserId();

  latestIsHit = false;
  latestShareUrl = buildShareUrl(false);
  latestShareText = buildShareText(null, false);

  const status = document.getElementById("statusBox");

  if(status){
    if(currentUserId){
      status.innerText =
      "登頂情報を確認しました。おみくじを引けます。";
    }else{
      status.innerText =
      "山頂QRコードで登頂受付をしてから、おみくじを引けます。";
    }
  }

  const drawBtn = document.getElementById("drawBtn");

  if(drawBtn){
    drawBtn.onclick = drawOmikuji;
  }
}

function getStableUserId(){
  const params = new URLSearchParams(location.search);

  const urlUserId =
  getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    ""
  );

  if(urlUserId){
    localStorage.setItem("tagoyamaUserId", urlUserId);
    localStorage.setItem("tagoyamaFujiUserId", urlUserId);
    return urlUserId;
  }

  return getString(
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    ""
  );
}

function getTodayKey(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return y + "/" + m + "/" + day;
}

function todayText(){
  return getTodayKey();
}

function getDoneKey(userId){
  return "tagoyamaOmikujiDone:" +
  getString(userId) +
  ":" +
  getTodayKey();
}

async function drawOmikuji(){
  if(isDrawing){
    return;
  }

  const btn = document.getElementById("drawBtn");
  const status = document.getElementById("statusBox");

  const userId = getStableUserId();
  currentUserId = userId;

  clearResult();

  if(!userId){
    renderResult({
      success:true,
      notClimbed:true,
      hit:false,
      isHit:false,
      type:"none",
      title:"まだ登頂していません",
      text:"山頂QRコードを読み取って登頂受付をすると、おみくじを引けます。",
      message:"山頂QRコードを読み取って登頂受付をすると、おみくじを引けます。",
      imageUrl:"",
      imageDataUrl:""
    });

    if(status){
      status.innerText =
      "山頂QRコードで登頂受付をしてください。";
    }

    return;
  }

  const doneKey = getDoneKey(userId);
  const savedToday = localStorage.getItem(doneKey);

  if(savedToday){
    try{
      const savedData = JSON.parse(savedToday);

      savedData.alreadyDrawn = true;
      savedData.alreadyDrawnToday = true;
      savedData.notice = DONE_MESSAGE;

      renderResult(savedData);

      if(status){
        status.innerText = DONE_MESSAGE;
      }

      if(btn){
        btn.disabled = false;
        btn.innerText = "本日分を確認する";
      }

      return;
    }catch(e){
      localStorage.removeItem(doneKey);
    }
  }

  isDrawing = true;

  if(btn){
    btn.disabled = true;
    btn.innerText = "おみくじ確認中...";
  }

  if(status){
    status.innerText =
    "おみくじを確認しています...";
  }

  try{
    const data =
    await fetchJson(
      GAS_URL +
      "?mode=omikuji" +
      "&userId=" +
      encodeURIComponent(userId) +
      "&t=" +
      Date.now()
    );

    if(!data || data.success === false){
      throw new Error(
        data && data.message
        ? data.message
        : "おみくじを引けませんでした"
      );
    }

    renderResult(data);

    if(!data.notClimbed){
      try{
        localStorage.setItem(doneKey, JSON.stringify(data));
      }catch(e){}
    }

    if(status){
      if(data.alreadyDrawn || data.alreadyDrawnToday || data.notice){
        status.innerText = DONE_MESSAGE;
      }else{
        status.innerText =
        "おみくじ結果を表示しました。";
      }
    }

    if(btn){
      btn.disabled = false;
      btn.innerText = "本日分を確認する";
    }

  }catch(err){
    if(status){
      status.innerText =
      err && err.message
      ? err.message
      : "おみくじを引けませんでした";
    }

    if(btn){
      btn.disabled = false;
      btn.innerText = "もう一度確認する";
    }

  }finally{
    isDrawing = false;
  }
}

function clearResult(){
  latestImageSource = "";
  latestFile = null;
  latestResultData = null;
  latestIsHit = false;
  latestShareUrl = buildShareUrl(false);
  latestShareText = buildShareText(null, false);

  const card = document.getElementById("resultCard");
  if(card){
    card.style.display = "none";
    card.classList.remove("hit");
    card.classList.remove("miss");
  }

  const imageBox = document.getElementById("resultImageBox");
  if(imageBox){
    imageBox.style.display = "none";
  }

  const image = document.getElementById("resultImage");
  if(image){
    image.removeAttribute("src");
  }

  const already = document.getElementById("already");
  if(already){
    already.style.display = "none";
  }

  const shareActions = document.getElementById("shareActions");
  if(shareActions){
    shareActions.style.display = "none";
  }
}

function renderResult(data){
  data = data || {};

  const result =
  data.result ||
  data.omikuji ||
  data.data ||
  data;

  latestResultData = data;

  const card = document.getElementById("resultCard");
  const imageBox = document.getElementById("resultImageBox");
  const image = document.getElementById("resultImage");
  const title = document.getElementById("resultTitle");
  const text = document.getElementById("resultText");
  const date = document.getElementById("resultDate");
  const shareActions = document.getElementById("shareActions");
  const already = document.getElementById("already");

  const hit = isHitResult(data, result);

  const notClimbed =
  data.notClimbed === true ||
  data.type === "none" ||
  result.notClimbed === true ||
  result.type === "none";

  const alreadyDrawn =
  data.alreadyDrawn === true ||
  data.alreadyDrawnToday === true ||
  result.alreadyDrawn === true ||
  result.alreadyDrawnToday === true ||
  !!data.notice ||
  !!result.notice;

  latestIsHit = hit;

  latestShareUrl = buildShareUrl(hit);
  latestShareText = buildShareText(data, hit);

  const titleText =
  getString(
    result.title ||
    data.title ||
    result.name ||
    data.name ||
    (
      hit
      ? "大当たり"
      : notClimbed
      ? "まだ登頂していません"
      : "田子山富士おみくじ"
    )
  );

  const messageText =
  getString(
    result.text ||
    result.message ||
    data.text ||
    data.message ||
    result.body ||
    data.body ||
    (
      hit
      ? "おめでとうございます！\n当たりです。\n田子山富士でご縁をいただきました。"
      : notClimbed
      ? "山頂QRコードを読み取って登頂受付をすると、おみくじを引けます。"
      : "田子山富士のおみくじ結果です。"
    )
  );

  const dateText =
  getString(
    result.date ||
    result.drawDate ||
    result.createdAt ||
    data.date ||
    data.drawDate ||
    data.createdAt ||
    todayText()
  );

  latestImageSource =
  normalizeImageUrl(
    getString(
      result.imageDataUrl ||
      data.imageDataUrl ||
      result.imageDataURL ||
      data.imageDataURL ||
      result.imageUrl ||
      data.imageUrl ||
      result.imageURL ||
      data.imageURL ||
      result.url ||
      data.url ||
      ""
    )
  );

  latestFile = null;

  if(card){
    card.style.display = "block";
    card.classList.remove("hit");
    card.classList.remove("miss");

    if(!notClimbed){
      card.classList.add(hit ? "hit" : "miss");
    }
  }

  if(title){
    title.innerText = titleText;
  }

  if(text){
    text.innerText = messageText;
  }

  if(date){
    date.innerText = dateText;
  }

  if(already){
    if(alreadyDrawn){
      already.style.display = "block";
      already.innerHTML =
      "本日のおみくじは終了しました。<br>次回の登頂時にまたお楽しみください。";
    }else{
      already.style.display = "none";
    }
  }

  if(image && imageBox && latestImageSource){
    image.src = latestImageSource;
    imageBox.style.display = "block";
  }else if(imageBox){
    imageBox.style.display = "none";
  }

  if(shareActions){
    shareActions.style.display =
    notClimbed
    ? "none"
    : "grid";
  }
}

function isHitResult(data, result){
  data = data || {};
  result = result || {};

  if(
    data.hit === true ||
    data.isHit === true ||
    data.atari === true ||
    result.hit === true ||
    result.isHit === true ||
    result.atari === true
  ){
    return true;
  }

  const joined =
  [
    data.type,
    data.result,
    data.rank,
    data.title,
    data.name,
    data.text,
    data.message,
    result.type,
    result.result,
    result.rank,
    result.title,
    result.name,
    result.text,
    result.message
  ]
  .map(function(v){
    return getString(v);
  })
  .join(" ");

  if(
    joined.indexOf("大当たり") >= 0 ||
    joined.indexOf("当たり") >= 0 ||
    joined.indexOf("あたり") >= 0 ||
    joined.indexOf("アタリ") >= 0 ||
    joined.toLowerCase().indexOf("hit") >= 0 ||
    joined.toLowerCase().indexOf("atari") >= 0
  ){
    return true;
  }

  return false;
}

function buildShareUrl(hit){
  const params = new URLSearchParams();
  params.set("v", SHARE_VERSION);

  if(hit){
    return SHARE_OMIKUJI_ATARI_PAGE + "?" + params.toString();
  }

  if(currentUserId){

  }

  return SHARE_OMIKUJI_PAGE + "?" + params.toString();
}

async function prepareFile(){
  if(latestFile){
    return latestFile;
  }

  if(!latestImageSource){
    throw new Error("画像がありません");
  }

  if(latestImageSource.indexOf("data:image") === 0){
    latestFile =
    dataUrlToFile(
      latestImageSource,
      "tagoyama-omikuji.png"
    );

    return latestFile;
  }

  const res =
  await fetch(latestImageSource, {
    cache:"no-store"
  });

  if(!res.ok){
    throw new Error("画像取得に失敗しました");
  }

  const blob = await res.blob();

  latestFile =
  new File(
    [blob],
    "tagoyama-omikuji.png",
    {
      type:blob.type || "image/png"
    }
  );

  return latestFile;
}

function dataUrlToFile(dataUrl, fileName){
  const parts = dataUrl.split(",");
  const header = parts[0] || "";
  const base64 = parts[1] || "";

  const mimeMatch = header.match(/data:(.*?);base64/);

  const mime =
  mimeMatch && mimeMatch[1]
  ? mimeMatch[1]
  : "image/png";

  const binary = atob(base64);
  const length = binary.length;
  const bytes = new Uint8Array(length);

  for(let i = 0; i < length; i++){
    bytes[i] = binary.charCodeAt(i);
  }

  return new File(
    [bytes],
    fileName,
    {
      type:mime
    }
  );
}

async function fetchJson(url){
  const res =
  await fetch(url, {
    method:"GET",
    cache:"no-store"
  });

  const text = await res.text();

  if(!res.ok){
    throw new Error("通信エラーが発生しました");
  }

  try{
    return JSON.parse(text);
  }catch(e){}

  const match =
  text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

  if(match && match[1]){
    try{
      return JSON.parse(match[1]);
    }catch(e){}
  }

  throw new Error("データを読み込めませんでした");
}

function normalizeImageUrl(url){
  url = getString(url);

  if(!url){
    return "";
  }

  if(url.indexOf("data:image") === 0){
    return url;
  }

  const driveFileMatch =
  url.match(/drive\.google\.com\/file\/d\/([^/]+)/);

  if(driveFileMatch && driveFileMatch[1]){
    return "https://drive.google.com/uc?export=view&id=" +
    encodeURIComponent(driveFileMatch[1]);
  }

  const driveOpenMatch =
  url.match(/[?&]id=([^&]+)/);

  if(url.indexOf("drive.google.com") >= 0 && driveOpenMatch && driveOpenMatch[1]){
    return "https://drive.google.com/uc?export=view&id=" +
    encodeURIComponent(driveOpenMatch[1]);
  }

  return url;
}

async function copyText(text){
  text = getString(text);

  if(navigator.clipboard && navigator.clipboard.writeText){
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.setAttribute("readonly", "readonly");
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  textarea.style.top = "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  const ok = document.execCommand("copy");

  document.body.removeChild(textarea);

  if(!ok){
    throw new Error("コピーできませんでした");
  }
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
