<body>
<main class="page">

<header class="hero">

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbxVNG0afPqotqc0-YZOhL1QDhozzbYbAwA5uUEOAtz7L2ZjzaG70aY81dt8-O0Alx_5/exec";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

const SHARE_OMIKUJI_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-omikuji.html";

let currentUserId = "";
let currentResult = null;
let drawFinished = false;

window.addEventListener("load", init);

function init(){
  currentUserId = getUserIdFromUrl();

  if(currentUserId){
    localStorage.setItem("tagoyamaUserId", currentUserId);
    localStorage.setItem("tagoyamaFujiUserId", currentUserId);
  }else{
    currentUserId =
      localStorage.getItem("tagoyamaUserId") ||
      localStorage.getItem("tagoyamaFujiUserId") ||
      "";
  }

  updateLinks();

  const params = new URLSearchParams(location.search);
  const auto = getString(params.get("auto"));

  if(auto === "1" || auto === "true"){
    setTimeout(function(){
      drawOmikuji();
    },400);
  }
}

function getUserIdFromUrl(){
  const params = new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );
}

function updateLinks(){
  const topLink = document.getElementById("topLink");
  const topLink2 = document.getElementById("topLink2");
  const certificateLink = document.getElementById("certificateLink");

  if(topLink){
    topLink.href =
      currentUserId
        ? "index.html?userId=" + encodeURIComponent(currentUserId) + "&v=" + Date.now()
        : "index.html?v=" + Date.now();
  }

  if(topLink2){
    topLink2.href =
      currentUserId
        ? "index.html?userId=" + encodeURIComponent(currentUserId) + "&v=" + Date.now()
        : "index.html?v=" + Date.now();
  }

  if(certificateLink){
    const savedData = getSavedClimbData();

    if(savedData && savedData.userId && savedData.climbCount && savedData.serialNo){
      certificateLink.href = buildCertificateUrl(savedData);
    }else{
      certificateLink.href =
        currentUserId
          ? "certificate.html?userId=" + encodeURIComponent(currentUserId) + "&v=" + Date.now()
          : "certificate.html?v=" + Date.now();
    }
  }
}

function getSavedClimbData(){
  try{
    const text = localStorage.getItem("tagoyamaClimbData");

    if(!text){
      return null;
    }

    const data = JSON.parse(text);

    if(!data || !data.userId){
      return null;
    }

    return data;
  }catch(e){
    return null;
  }
}

function buildCertificateUrl(data){
  const params = new URLSearchParams();

  params.set("userId", getString(data.userId));

  if(data.climbCount){
    params.set("climbCount", getString(data.climbCount));
  }

  if(data.serialNo){
    params.set("serialNo", getString(data.serialNo));
  }

  if(data.lastDate){
    params.set("lastDate", getString(data.lastDate));
  }

  if(data.imageNo){
    params.set("imageNo", getString(data.imageNo));
  }

  if(data.imageName){
    params.set("imageName", getString(data.imageName));
  }

  if(data.imageUrl){
    params.set("imageUrl", getString(data.imageUrl));
  }

  if(data.participantNo){
    params.set("participantNo", getString(data.participantNo));
  }

  params.set("v", String(Date.now()));

  return CERTIFICATE_PAGE + "?" + params.toString();
}

async function drawOmikuji(){
  if(drawFinished){
    const section = document.getElementById("resultSection");

    if(section){
      section.scrollIntoView({
        behavior:"smooth",
        block:"start"
      });
    }

    return;
  }

  const btn = document.getElementById("drawBtn");
  const statusBox = document.getElementById("statusBox");

  if(btn){
    btn.disabled = true;
    btn.innerText = "引いています...";
  }

  if(statusBox){
    statusBox.innerText = "おみくじを引いています。";
  }

  try{
    let url =
      GAS_URL +
      "?mode=omikuji" +
      "&t=" +
      Date.now();

    if(currentUserId){
      url +=
        "&userId=" +
        encodeURIComponent(currentUserId);
    }

    const data = await getJson(url);

    if(!data || data.success === false){
      throw new Error(
        data && data.message
          ? data.message
          : "おみくじを取得できませんでした。"
      );
    }

    currentResult = normalizeOmikujiData(data);

    if(!currentResult.result && !currentResult.title && !currentResult.message && !currentResult.imageUrl){
      throw new Error("おみくじの内容を取得できませんでした。");
    }

    renderResult(currentResult);
    drawFinished = true;

    if(statusBox){
      statusBox.innerText = "おみくじを引きました。";
    }

    if(btn){
      btn.disabled = true;
      btn.innerText = "おみくじを引きました";
      btn.style.display = "none";
    }
  }catch(e){
    if(statusBox){
      statusBox.innerText =
        e && e.message
          ? e.message
          : "おみくじを取得できませんでした。";
    }

    if(btn){
      btn.disabled = false;
      btn.innerText = "おみくじを引く";
    }
  }
}

function normalizeOmikujiData(data){
  const objects = collectObjectsDeep(data);

  const imageUrl =
    pickValue(objects, [
      "imageUrl",
      "imageURL",
      "img",
      "imgUrl",
      "url",
      "thumbnail",
      "thumbnailUrl",
      "image",
      "画像URL",
      "画像url",
      "画像",
      "URL"
    ]) || findImageUrlDeep(data);

  return {
    result: pickValue(objects, [
      "result",
      "luck",
      "fortune",
      "omikuji",
      "omikujiResult",
      "kuji",
      "運勢",
      "結果",
      "おみくじ"
    ]) || "おみくじ",
    title: pickValue(objects, [
      "title",
      "name",
      "subtitle",
      "imageName",
      "cardName",
      "タイトル",
      "名前",
      "見出し",
      "画像名"
    ]) || "",
    message: pickValue(objects, [
      "message",
      "body",
      "text",
      "comment",
      "description",
      "本文",
      "メッセージ",
      "説明",
      "言葉"
    ]) || "田子山富士のご縁を、みなさんにもおすそ分けします。",
    imageNo: pickValue(objects, [
      "imageNo",
      "imageNumber",
      "no",
      "number",
      "画像番号",
      "番号"
    ]),
    imageName: pickValue(objects, [
      "imageName",
      "imageTitle",
      "画像名",
      "画像タイトル"
    ]),
    imageUrl: imageUrl,
    displayImageUrl: ""
  };
}

function collectObjectsDeep(value){
  const result = [];
  const seen = [];

  function walk(v){
    if(!v || typeof v !== "object"){
      return;
    }

    if(seen.indexOf(v) >= 0){
      return;
    }

    seen.push(v);

    if(!Array.isArray(v)){
      result.push(v);
    }

    const keys = Object.keys(v);

    for(let i = 0; i < keys.length; i++){
      walk(v[keys[i]]);
    }
  }

  walk(value);

  return result;
}

function pickValue(objects, keys){
  for(let i = 0; i < objects.length; i++){
    for(let j = 0; j < keys.length; j++){
      const key = keys[j];

      if(objects[i][key] !== null && objects[i][key] !== undefined){
        const value = cleanText(objects[i][key]);

        if(value){
          return value;
        }
      }
    }
  }

  return "";
}

function findImageUrlDeep(value){
  const seen = [];

  function walk(v){
    if(v === null || v === undefined){
      return "";
    }

    if(typeof v === "string"){
      const text = cleanText(v);

      if(
        text.indexOf("drive.google.com") >= 0 ||
        text.indexOf("googleusercontent.com") >= 0 ||
        text.indexOf("thumbnail?id=") >= 0 ||
        text.match(/\.(jpg|jpeg|png|webp|gif)(\?|#|$)/i)
      ){
        const match = text.match(/https?:\/\/[^\s"'<>]+/);

        if(match && match[0]){
          return match[0];
        }

        return text;
      }

      return "";
    }

    if(typeof v !== "object"){
      return "";
    }

    if(seen.indexOf(v) >= 0){
      return "";
    }

    seen.push(v);

    if(Array.isArray(v)){
      for(let i = 0; i < v.length; i++){
        const found = walk(v[i]);

        if(found){
          return found;
        }
      }

      return "";
    }

    const keys = Object.keys(v);

    for(let i = 0; i < keys.length; i++){
      const found = walk(v[keys[i]]);

      if(found){
        return found;
      }
    }

    return "";
  }

  return walk(value);
}

function renderResult(result){
  const section = document.getElementById("resultSection");
  const resultText = document.getElementById("resultText");
  const titleText = document.getElementById("titleText");
  const messageText = document.getElementById("messageText");

  const cleanResult = cleanText(result.result);
  const cleanTitle = cleanText(result.title);

  let displayTitle = "";

  if(cleanTitle && cleanTitle !== "おみくじ" && cleanTitle !== cleanResult){
    displayTitle = cleanTitle;
  }else if(cleanResult && cleanResult !== "おみくじ"){
    displayTitle = cleanResult;
  }else{
    displayTitle = "開運おみくじ";
  }

  if(section){
    section.classList.remove("hidden");
  }

  if(resultText){
    resultText.innerText = displayTitle;
  }

  if(titleText){
    titleText.innerText = "田子山富士のご縁";
  }

  if(messageText){
    messageText.innerText =
      result.message ||
      "田子山富士のご縁を、みなさんにもおすそ分けします。";
  }

  setResultImage(result.imageUrl);
  updateLinks();

  setTimeout(function(){
    if(section){
      section.scrollIntoView({
        behavior:"smooth",
        block:"start"
      });
    }
  },120);
}

function setResultImage(url){
  const imageBox = document.getElementById("resultImageBox");
  const image = document.getElementById("resultImage");

  if(!imageBox || !image){
    return;
  }

  const candidates = makeImageDisplayUrlList(url);

  if(!candidates.length){
    image.removeAttribute("src");
    imageBox.classList.add("hidden");
    return;
  }

  let index = 0;

  image.onload = function(){
    if(currentResult){
      currentResult.displayImageUrl = image.src;
    }

    imageBox.classList.remove("hidden");
  };

  image.onerror = function(){
    index++;

    if(index >= candidates.length){
      image.removeAttribute("src");
      imageBox.classList.add("hidden");
      return;
    }

    image.src = candidates[index];
  };

  imageBox.classList.add("hidden");
  image.src = candidates[index];
}

function makeImageDisplayUrlList(url){
  const text = cleanText(url);
  const id = getDriveFileId(text);
  const list = [];

  if(text){
    list.push(text);
  }

  if(id){
    list.push(
      "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(id) +
      "&sz=w1600"
    );

    list.push(
      "https://drive.google.com/thumbnail?id=" +
      encodeURIComponent(id) +
      "&sz=w1200"
    );

    list.push(
      "https://lh3.googleusercontent.com/d/" +
      id +
      "=w1600"
    );

    list.push(
      "https://lh3.googleusercontent.com/d/" +
      id +
      "=w1200"
    );
  }

  return list.filter(function(v,i,arr){
    return v && arr.indexOf(v) === i;
  });
}

function getDriveFileId(url){
  const text = cleanText(url);

  if(!text){
    return "";
  }

  let match = text.match(/\/file\/d\/([^/]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = text.match(/[?&]id=([^&]+)/);

  if(match && match[1]){
    return match[1];
  }

  match = text.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

  if(match && match[1]){
    return match[1];
  }

  return "";
}

function buildShareText(){
  const result =
    currentResult && currentResult.result
      ? cleanText(currentResult.result)
      : "";

  const title =
    currentResult && currentResult.title
      ? cleanText(currentResult.title)
      : "";

  let displayTitle = "";

  if(title && title !== "おみくじ" && title !== "今日の運勢" && title !== result){
    displayTitle = title;
  }else if(result && result !== "おみくじ"){
    displayTitle = result;
  }else{
    displayTitle = "開運おみくじ";
  }

  return (
    "田子山富士 開運おみくじ\n" +
    displayTitle + "\n\n" +
    "田子山富士のご縁を、みなさんにもおすそ分けします。"
  );
}

function buildShareUrl(){
  const params = new URLSearchParams();

  params.set("v", String(Date.now()));

  if(currentResult){
    const result = cleanText(currentResult.result);
    const title = cleanText(currentResult.title);
    const imageUrl = cleanText(currentResult.imageUrl);

    if(result && result !== "おみくじ"){
      params.set("result", result);
    }

    if(title && title !== result && title !== "おみくじ" && title !== "今日の運勢"){
      params.set("title", title);
    }

    if(imageUrl){
      params.set("imageUrl", imageUrl);
    }
  }

  return SHARE_OMIKUJI_PAGE + "?" + params.toString();
}

function shareFacebook(){
  const url = buildShareUrl();

  window.open(
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(url),
    "_blank"
  );
}

function shareLine(){
  const text =
    buildShareText() +
    "\n" +
    buildShareUrl();

  window.open(
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(buildShareUrl()) +
    "&text=" +
    encodeURIComponent(text),
    "_blank"
  );
}

function shareX(){
  window.open(
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(buildShareText()) +
    "&url=" +
    encodeURIComponent(buildShareUrl()),
    "_blank"
  );
}

async function copyResult(){
  const text =
    buildShareText() +
    "\n" +
    buildShareUrl();

  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
    }else{
      copyByTextarea(text);
    }

    alert("おみくじ結果をコピーしました。");
  }catch(e){
    copyByTextarea(text);
    alert("おみくじ結果をコピーしました。");
  }
}

function copyByTextarea(text){
  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.setAttribute("readonly","readonly");
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  textarea.style.top = "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
}

async function downloadImage(){
  if(!currentResult){
    alert("先におみくじを引いてください。");
    return;
  }

  try{
    const canvas = document.getElementById("saveCanvas");
    const ctx = canvas.getContext("2d");

    const width = 1080;
    const height = 1350;

    canvas.width = width;
    canvas.height = height;

    const bg = ctx.createLinearGradient(0,0,0,height);
    bg.addColorStop(0,"#fff8db");
    bg.addColorStop(0.48,"#f3d489");
    bg.addColorStop(1,"#b47a19");
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,width,height);

    drawRoundRect(ctx,60,60,width - 120,height - 120,48,"#fff8df","rgba(90,55,7,0.34)");
    drawRoundRect(ctx,92,92,width - 184,height - 184,34,"rgba(255,255,255,0)","rgba(140,89,13,0.34)");

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.fillStyle = "#7b170f";
    ctx.font = "900 60px sans-serif";
    ctx.fillText("田子山富士 開運おみくじ",width / 2,150);

    ctx.fillStyle = "#7b4b10";
    ctx.font = "800 32px sans-serif";
    ctx.fillText("田子山富士 168の縁プロジェクト",width / 2,216);

    let imageDrawn = false;

    const imageUrl =
      currentResult.displayImageUrl ||
      currentResult.imageUrl ||
      "";

    if(imageUrl){
      try{
        const img = await loadImageForCanvas(imageUrl);
        drawCoverImage(ctx,img,140,285,width - 280,500);
        imageDrawn = true;
      }catch(e){
        imageDrawn = false;
      }
    }

    if(!imageDrawn){
      drawRoundRect(ctx,140,285,width - 280,500,30,"#f3d489","rgba(90,55,7,0.24)");
      ctx.fillStyle = "#8a5b11";
      ctx.font = "900 52px sans-serif";
      ctx.fillText("田子山富士",width / 2,535);
    }

    const displayTitle =
      currentResult.title && currentResult.title !== "おみくじ"
        ? currentResult.title
        : currentResult.result || "開運おみくじ";

    ctx.fillStyle = "#8b1712";
    ctx.font = "900 84px sans-serif";
    wrapTextCenter(ctx,displayTitle,width / 2,900,820,92);

    ctx.fillStyle = "#5b3608";
    ctx.font = "800 34px sans-serif";
    wrapTextCenter(
      ctx,
      "田子山富士のご縁を、みなさんにもおすそ分けします。",
      width / 2,
      1110,
      820,
      46
    );

    ctx.fillStyle = "#7b4b10";
    ctx.font = "800 28px sans-serif";
    ctx.fillText(
      "田子山富士 168の縁プロジェクト",
      width / 2,
      1270
    );

    await shareCanvasImageForIphone(canvas,"tagoyama-omikuji.png");
  }catch(e){
    alert("iPhoneの共有画面を開けませんでした。Safariで開いてもう一度お試しください。");
  }
}

async function shareCanvasImageForIphone(canvas,fileName){
  const blob = await new Promise(function(resolve){
    canvas.toBlob(function(b){
      resolve(b);
    },"image/png");
  });

  if(!blob){
    throw new Error("画像を作成できませんでした。");
  }

  const file = new File(
    [blob],
    fileName,
    {
      type:"image/png"
    }
  );

  if(
    navigator.share &&
    navigator.canShare &&
    navigator.canShare({
      files:[file]
    })
  ){
    await navigator.share({
      files:[file],
      title:"田子山富士 開運おみくじ",
      text:"田子山富士 開運おみくじ"
    });

    return;
  }

  throw new Error("iPhone共有シートが使えません。");
}

function drawRoundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x + r,y);
  ctx.lineTo(x + w - r,y);
  ctx.quadraticCurveTo(x + w,y,x + w,y + r);
  ctx.lineTo(x + w,y + h - r);
  ctx.quadraticCurveTo(x + w,y + h,x + w - r,y + h);
  ctx.lineTo(x + r,y + h);
  ctx.quadraticCurveTo(x,y + h,x,y + h - r);
  ctx.lineTo(x,y + r);
  ctx.quadraticCurveTo(x,y,x + r,y);
  ctx.closePath();

  if(fill){
    ctx.fillStyle = fill;
    ctx.fill();
  }

  if(stroke){
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 4;
    ctx.stroke();
  }
}

function drawCoverImage(ctx,img,x,y,w,h){
  const iw = img.naturalWidth || img.width;
  const ih = img.naturalHeight || img.height;

  if(!iw || !ih){
    return;
  }

  const scale = Math.max(w / iw,h / ih);
  const sw = w / scale;
  const sh = h / scale;
  const sx = (iw - sw) / 2;
  const sy = (ih - sh) / 2;

  ctx.save();
  roundedClip(ctx,x,y,w,h,30);
  ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
  ctx.restore();
}

function roundedClip(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x + r,y);
  ctx.lineTo(x + w - r,y);
  ctx.quadraticCurveTo(x + w,y,x + w,y + r);
  ctx.lineTo(x + w,y + h - r);
  ctx.quadraticCurveTo(x + w,y + h,x + w - r,y + h);
  ctx.lineTo(x + r,y + h);
  ctx.quadraticCurveTo(x,y + h,x,y + h - r);
  ctx.lineTo(x,y + r);
  ctx.quadraticCurveTo(x,y,x + r,y);
  ctx.closePath();
  ctx.clip();
}

function wrapTextCenter(ctx,text,x,y,maxWidth,lineHeight){
  const safeText = getString(text);
  const paragraphs = safeText.split(/\n+/);
  const lines = [];

  paragraphs.forEach(function(paragraph){
    const chars = paragraph.split("");
    let line = "";

    chars.forEach(function(ch){
      const test = line + ch;
      const width = ctx.measureText(test).width;

      if(width > maxWidth && line){
        lines.push(line);
        line = ch;
      }else{
        line = test;
      }
    });

    if(line){
      lines.push(line);
    }
  });

  const startY = y - ((lines.length - 1) * lineHeight) / 2;

  lines.forEach(function(line,i){
    ctx.fillText(line,x,startY + i * lineHeight);
  });
}

function loadImageForCanvas(url){
  return new Promise(function(resolve,reject){
    const list = makeImageDisplayUrlList(url);
    let index = 0;

    function tryNext(){
      if(index >= list.length){
        reject(new Error("画像を読み込めませんでした。"));
        return;
      }

      const img = new Image();
      img.crossOrigin = "anonymous";

      img.onload = function(){
        resolve(img);
      };

      img.onerror = function(){
        index++;
        tryNext();
      };

      img.src = list[index];
    }

    tryNext();
  });
}

async function getJson(url){
  const response = await fetch(url,{
    method:"GET",
    cache:"no-store"
  });

  if(!response.ok){
    throw new Error("通信に失敗しました。");
  }

  const text = await response.text();

  try{
    return JSON.parse(text);
  }catch(e){
    const match = text.match(/^[^(]*\(([\s\S]*)\)\s*;?\s*$/);

    if(match && match[1]){
      return JSON.parse(match[1]);
    }

    throw new Error("データを読み込めませんでした。");
  }
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

function cleanText(value){
  return getString(value)
    .replace(/\\\//g,"/")
    .replace(/\\u0026/g,"&")
    .replace(/&amp;/g,"&");
}
