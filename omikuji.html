  <style>

    .logoBox {

    .card {
      margin: 16px 0;
      padding: 20px 14px;
      border-radius: 28px;

    .cardTitle {
      margin: 0 0 14px;

      color: #ffdf72;

    .statusBox {

    .resultTitle {
      margin: 0 0 12px;
      font-size: clamp(38px, 11vw, 72px);
      font-weight: 900;

      text-shadow:
        0 5px 5px rgba(0, 0, 0, 0.90),

    .resultSubTitle {

    .btnArea {

    .btn,
    .linkBtn {
      width: 100%;

    .btn:active,
    .linkBtn:active {
      transform: translateY(3px);

    .btn:disabled,
    .linkBtn.disabled {

    .goldBtn {

    .notice {

    canvas {

    @media (max-width: 420px) {
      .wrap {

<body>
  <div class="wrap">
    <header class="hero">

      <h1 class="siteTitle">開運おみくじ</h1>
      <div class="siteSub">田子山富士 168の縁プロジェクト</div>
    </header>

    <section class="card">
      <h2 class="cardTitle">⛩️ 今日のご縁</h2>

      <p class="cardText">
        田子山富士のご縁に願いを込めて、<br>
        おみくじを引いてください。
      </p>

      <div class="statusBox" id="statusBox">
        おみくじを引く準備ができました。
      </div>

      <div class="btnArea">
        <button class="btn goldBtn" id="drawBtn" onclick="drawOmikuji()">
          おみくじを引く
        </button>

    <section class="card hidden" id="resultSection">
      <h2 class="cardTitle">結果</h2>

      <div class="resultImageBox hidden" id="resultImageBox">
        <img id="resultImage" src="" alt="おみくじ画像">
      </div>

      <div class="resultBox hidden" aria-hidden="true">
        <h3 class="resultTitle" id="resultText">おみくじ</h3>
        <p class="resultSubTitle" id="titleText">今日の運勢</p>
        <p class="resultMessage" id="messageText">田子山富士のご縁を、みなさんにもおすそ分けします。</p>
      </div>

      <div class="btnArea">
        <button class="btn goldBtn" id="downloadBtn" onclick="downloadOmikujiImage()">
          画像をダウンロード
        </button>

        <button class="btn blueBtn" onclick="postFacebook()">
          Facebookに投稿
        </button>

        <button class="btn greenBtn" onclick="sendLine()">
          LINEで送る
        </button>

        <button class="btn blackBtn" onclick="postX()">
          Xで投稿
        </button>

        <button class="btn blueBtn" onclick="copyShareText()">
          結果をコピー
        </button>

        <a class="linkBtn blackBtn" id="backBtn2" href="index.html">

    <section class="card">
      <h2 class="cardTitle">戻る</h2>

        <a class="linkBtn goldBtn" id="certificateBtn" href="certificate.html">
          登頂記念証へ戻る
        </a>

        <a class="linkBtn blackBtn" id="backBtn" href="index.html">
          トップへ戻る
        </a>
      </div>
    </section>

    <div class="debugBox" id="debugBox"></div>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      開運おみくじ
    </footer>

    <canvas id="saveCanvas"></canvas>
  </div>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

    const HOME_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

    const CERTIFICATE_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

    const OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

    const SHARE_OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-omikuji.html";

    const DEFAULT_IMAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji-atari.jpg?v=20260702-atari-ogp";

    let currentUserId = "";
    let omikujiDrawFinished = false;

    let currentResult = {
      result: "",
      title: "",
      message: "",
      imageNo: "",
      imageName: "",
      imageUrl: "",
      displayImageUrl: ""
    };

    window.addEventListener("load", init);

    function init() {
      currentUserId = getUserId();

      if (currentUserId) {
        localStorage.setItem("tagoyamaUserId", currentUserId);
        localStorage.setItem("tagoyamaFujiUserId", currentUserId);
      }

      updateLinks();

      const sharedResult = readSharedOmikujiFromUrl();

      if (sharedResult) {
        currentResult = sharedResult;
        omikujiDrawFinished = true;
        renderResult(currentResult);
        lockDrawButton();

        const statusBox = document.getElementById("statusBox");

        if (statusBox) {
          statusBox.innerText = "共有されたおみくじ結果を表示しています。";
        }

        return;
      }

      const params = new URLSearchParams(location.search);

      if (params.get("draw") === "1") {
        setTimeout(function () {
          drawOmikuji();
        }, 300);
      }
    }

    function readSharedOmikujiFromUrl() {
      const p = new URLSearchParams(location.search);

      const isShared =
        p.get("shared") === "1" ||
        p.get("imgid") ||
        p.get("r") ||
        p.get("n");

      if (!isShared) {
        return null;
      }

      const result =
        getString(p.get("result")) ||
        getString(p.get("r"));

      const title =
        getString(p.get("title")) ||
        result;

      const message =
        getString(p.get("message")) ||
        "田子山富士のご縁を、みなさんにもおすそ分けします。";

      const imageNo =
        getString(p.get("imageNo")) ||
        getString(p.get("n"));

      const imageName =
        getString(p.get("imageName"));

      const imgid =
        getString(p.get("imgid"));

      const imageUrl = imgid
        ? "https://drive.google.com/thumbnail?id=" + encodeURIComponent(imgid) + "&sz=w1200"
        : cleanImageText(p.get("imageUrl"));

      if (!result && !title && !message && !imageUrl) {
        return null;
      }

      return {
        result: result || title || "おみくじ",
        title: title || result || "今日の運勢",
        message: message,
        imageNo: imageNo,
        imageName: imageName,
        imageUrl: imageUrl,
        displayImageUrl: ""
      };
    }

    function getUserId() {
      const params = new URLSearchParams(location.search);

      return getString(
        params.get("userId") ||
        params.get("id") ||
        params.get("uid") ||
        params.get("u") ||
        localStorage.getItem("tagoyamaUserId") ||
        localStorage.getItem("tagoyamaFujiUserId") ||
        ""
      );
    }

    function updateLinks() {
      const backBtn = document.getElementById("backBtn");
      const backBtn2 = document.getElementById("backBtn2");
      const certificateBtn = document.getElementById("certificateBtn");

      const indexUrl =
        currentUserId
          ? "index.html?userId=" + encodeURIComponent(currentUserId) + "&v=" + Date.now()
          : "index.html?v=" + Date.now();

      if (backBtn) {
        backBtn.href = indexUrl;
      }

      if (backBtn2) {
        backBtn2.href = indexUrl;
      }

      if (certificateBtn) {
        certificateBtn.href =
          currentUserId
            ? "certificate.html?userId=" + encodeURIComponent(currentUserId) + "&v=" + Date.now()
            : "certificate.html?v=" + Date.now();
      }
    }

    async function drawOmikuji() {
      if (omikujiDrawFinished) {
        const section = document.getElementById("resultSection");

        if (section) {
          section.scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
        }

        return;
      }

      const btn = document.getElementById("drawBtn");
      const statusBox = document.getElementById("statusBox");

      if (btn) {
        btn.disabled = true;
        btn.innerText = "引いています...";
      }

      if (statusBox) {
        statusBox.innerText = "おみくじを引いています。";
      }

      try {
        let url =
          GAS_URL +
          "?mode=omikuji" +
          "&t=" +
          Date.now();

        if (currentUserId) {
          url +=
            "&userId=" +
            encodeURIComponent(currentUserId);
        }

        const data = await getJson(url);

        if (!data || data.success === false) {
          throw new Error(
            data && data.message
              ? data.message
              : "おみくじを取得できませんでした。"
          );
        }

        currentResult = normalizeOmikujiData(data);

        if (!currentResult.result && currentResult.title) {
          currentResult.result = currentResult.title;
        }

        if (!currentResult.title && currentResult.result) {
          currentResult.title = currentResult.result;
        }

        if (!currentResult.result) {
          currentResult.result = "おみくじ";
        }

        if (!currentResult.title) {
          currentResult.title = "今日の運勢";
        }

        if (!currentResult.message) {
          currentResult.message =
            "田子山富士のご縁を、みなさんにもおすそ分けします。";
        }

        omikujiDrawFinished = true;

        renderResult(currentResult);
        lockDrawButton();

        if (statusBox) {
          statusBox.innerText = "おみくじを引きました。";
        }

      } catch (e) {
        console.error(e);

        if (statusBox) {
          statusBox.innerText =
            e && e.message
              ? e.message
              : "おみくじを取得できませんでした。";
        }

        if (btn) {
          btn.disabled = false;
          btn.innerText = "おみくじを引く";
        }
      }
    }

    function lockDrawButton() {
      const btn = document.getElementById("drawBtn");

      if (btn) {
        btn.disabled = true;
        btn.innerText = "おみくじを引きました";
        btn.style.display = "none";
      }
    }

    function normalizeOmikujiData(data) {
      const objects = collectObjectsDeep(data);

      const imageUrl =
        pickValue(objects, [
          "imageUrl",
          "imageURL",
          "img",
          "imgUrl",
          "url",
          "thumbnail",
          "thumbnailUrl",
          "image",
          "画像URL",
          "画像url",
          "画像",
          "URL"
        ]) || findImageUrlDeep(data);

      return {
        result: pickValue(objects, [
          "result",
          "luck",
          "fortune",
          "omikuji",
          "omikujiResult",
          "kuji",
          "運勢",
          "結果",
          "おみくじ"
        ]),

        title: pickValue(objects, [
          "title",
          "name",
          "subtitle",
          "imageName",
          "cardName",
          "タイトル",
          "名前",
          "見出し",
          "画像名"
        ]),

        message: pickValue(objects, [
          "message",
          "body",
          "text",
          "comment",
          "description",
          "本文",
          "メッセージ",
          "説明",
          "言葉"
        ]),

        imageNo: pickValue(objects, [
          "imageNo",
          "imageNumber",
          "no",
          "number",
          "画像番号",
          "番号"
        ]),

        imageName: pickValue(objects, [
          "imageName",
          "imageTitle",
          "画像名",
          "画像タイトル"
        ]),

        imageUrl: imageUrl,
        displayImageUrl: ""
      };
    }

    function collectObjectsDeep(value) {
      const result = [];
      const seen = [];

      function walk(v) {
        if (!v || typeof v !== "object") {
          return;
        }

        if (seen.indexOf(v) >= 0) {
          return;
        }

        seen.push(v);

        if (!Array.isArray(v)) {
          result.push(v);
        }

        const keys = Object.keys(v);

        for (let i = 0; i < keys.length; i++) {
          walk(v[keys[i]]);
        }
      }

      walk(value);

      return result;
    }

    function pickValue(objects, keys) {
      for (let i = 0; i < objects.length; i++) {
        for (let j = 0; j < keys.length; j++) {
          const key = keys[j];

          if (objects[i][key] !== null && objects[i][key] !== undefined) {
            const value = cleanImageText(String(objects[i][key]).trim());

            if (value) {
              return value;
            }
          }
        }
      }

      return "";
    }

    function cleanImageText(text) {
      return getString(text)
        .replace(/\\\//g, "/")
        .replace(/\\u0026/g, "&")
        .replace(/&amp;/g, "&");
    }

    function findImageUrlDeep(value) {
      const seen = [];

      function walk(v) {
        if (v === null || v === undefined) {
          return "";
        }

        if (typeof v === "string") {
          const text = cleanImageText(v);

          if (
            text.indexOf("drive.google.com") >= 0 ||
            text.indexOf("googleusercontent.com") >= 0 ||
            text.indexOf("thumbnail?id=") >= 0
          ) {
            const match = text.match(/https?:\/\/[^\s"'<>]+/);

            if (match && match[0]) {
              return match[0];
            }

            return text;
          }

          return "";
        }

        if (typeof v !== "object") {
          return "";
        }

        if (seen.indexOf(v) >= 0) {
          return "";
        }

        seen.push(v);

        if (Array.isArray(v)) {
          for (let i = 0; i < v.length; i++) {
            const found = walk(v[i]);

            if (found) {
              return found;
            }
          }

          return "";
        }

        const keys = Object.keys(v);

        for (let i = 0; i < keys.length; i++) {
          const found = walk(v[keys[i]]);

          if (found) {
            return found;
          }
        }

        return "";
      }

      return walk(value);
    }

    function renderResult(result) {
      const section = document.getElementById("resultSection");
      const resultText = document.getElementById("resultText");
      const titleText = document.getElementById("titleText");
      const messageText = document.getElementById("messageText");

      if (section) {
        section.classList.remove("hidden");
      }

      if (resultText) {
        resultText.innerText =
          result.result || "おみくじ";
      }

      if (titleText) {
        titleText.innerText =
          result.title || result.result || "今日の運勢";
      }

      if (messageText) {
        messageText.innerText =
          result.message ||
          "田子山富士のご縁を、みなさんにもおすそ分けします。";
      }

      setResultImage(result.imageUrl);

      updateLinks();

      setTimeout(function () {
        if (section) {
          section.scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
        }
      }, 120);
    }

    function setResultImage(url) {
      const imageBox = document.getElementById("resultImageBox");
      const image = document.getElementById("resultImage");

      if (!imageBox || !image) {
        return;
      }

      const candidates = makeImageDisplayUrlList(url);

      if (!candidates.length) {
        image.removeAttribute("src");
        imageBox.classList.add("hidden");
        return;
      }

      let index = 0;

      image.onload = function () {
        currentResult.displayImageUrl = image.src;
        imageBox.classList.remove("hidden");
      };

      image.onerror = function () {
        index++;

        if (index >= candidates.length) {
          image.removeAttribute("src");
          imageBox.classList.add("hidden");
          return;
        }

        image.src = candidates[index];
      };

      imageBox.classList.add("hidden");
      image.src = candidates[index];
    }

    function makeImageDisplayUrlList(url) {
      const text = cleanImageText(url);
      const id = getDriveFileId(text);
      const list = [];

      if (text) {
        list.push(text);
      }

      if (id) {
        list.push("https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w1200");
        list.push("https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w1600");
        list.push("https://lh3.googleusercontent.com/d/" + id + "=w1200");
        list.push("https://lh3.googleusercontent.com/d/" + id + "=w1600");
      }

      return list.filter(function (v, i, arr) {
        return v && arr.indexOf(v) === i;
      });
    }

    function getDriveFileId(url) {
      const text = cleanImageText(url);

      let m = text.match(/[?&]id=([^&]+)/);

      if (m && m[1]) {
        return decodeURIComponent(m[1]);
      }

      m = text.match(/\/d\/([^/]+)/);

      if (m && m[1]) {
        return decodeURIComponent(m[1]);
      }

      return "";
    }

    async function downloadOmikujiImage() {
      const btn = document.getElementById("downloadBtn");
      const img = document.getElementById("resultImage");

      const oldText = btn ? btn.innerText : "";

      const imageUrl = omikujiCleanSaveUrl(
        currentResult.displayImageUrl ||
        currentResult.imageUrl ||
        (img && (img.currentSrc || img.src)) ||
        ""
      );

      if (!imageUrl) {
        alert("保存するおみくじ画像がありません。");
        return;
      }

      const imageNo =
        currentResult.imageNo
          ? currentResult.imageNo
          : "result";

      const fileName =
        "tagoyama-omikuji-" +
        String(imageNo).replace(/[\\/:*?"<>|]/g, "") +
        ".png";

      if (btn) {
        btn.disabled = true;
        btn.innerText = "画像を準備中...";
      }

      try {
        const urls = omikujiMakeShareUrlList(imageUrl);
        const blob = await omikujiCreateShareBlob(urls);

        if (!blob) {
          alert("画像ファイルを作成できませんでした。もう一度押してください。");
          return;
        }

        const file = new File([blob], fileName, {
          type: "image/png"
        });

        if (
          navigator.canShare &&
          navigator.share &&
          navigator.canShare({
            files: [file]
          })
        ) {
          await navigator.share({
            files: [file],
            title: "田子山富士 開運おみくじ",
            text: "田子山富士 開運おみくじ"
          });

          return;
        }

        alert("このブラウザでは画像共有保存に対応していません。Safariで開いてください。");

      } catch (e) {
        console.error(e);
        alert("画像共有保存に失敗しました。もう一度押してください。");

      } finally {
        if (btn) {
          btn.disabled = false;
          btn.innerText = oldText || "画像をダウンロード";
        }
      }
    }

    function omikujiCleanSaveUrl(url) {
      return String(url || "")
        .trim()
        .replace(/\\\//g, "/")
        .replace(/\\u0026/g, "&")
        .replace(/&amp;/g, "&");
    }

    function omikujiGetDriveId(url) {
      const text = omikujiCleanSaveUrl(url);

      let m = text.match(/[?&]id=([^&]+)/);

      if (m && m[1]) {
        return decodeURIComponent(m[1]);
      }

      m = text.match(/\/d\/([^/]+)/);

      if (m && m[1]) {
        return decodeURIComponent(m[1]);
      }

      return "";
    }

    function omikujiMakeShareUrlList(url) {
      const text = omikujiCleanSaveUrl(url);
      const id = omikujiGetDriveId(text);
      const list = [];

      if (id) {
        list.push("https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w1600");
        list.push("https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w1200");
        list.push("https://lh3.googleusercontent.com/d/" + id + "=w1600");
        list.push("https://lh3.googleusercontent.com/d/" + id + "=w1200");
      }

      if (text) {
        list.push(text);
      }

      return list.filter(function (v, i, arr) {
        return v && arr.indexOf(v) === i;
      });
    }

    async function omikujiCreateShareBlob(urls) {
      let blob = await omikujiFetchShareBlob(urls);

      if (blob) {
        return blob;
      }

      blob = await omikujiCanvasShareBlob(urls);

      if (blob) {
        return blob;
      }

      return null;
    }

    async function omikujiFetchShareBlob(urls) {
      for (let i = 0; i < urls.length; i++) {
        try {
          const res = await fetch(urls[i], {
            method: "GET",
            cache: "no-store"
          });

          if (!res.ok) {
            continue;
          }

          const blob = await res.blob();

          if (!blob || blob.size < 1000) {
            continue;
          }

          if (blob.type && blob.type.indexOf("text/html") >= 0) {
            continue;
          }

          return blob;

        } catch (e) {
        }
      }

      return null;
    }

    async function omikujiCanvasShareBlob(urls) {
      for (let i = 0; i < urls.length; i++) {
        try {
          const image = await omikujiLoadImageForShare(urls[i]);

          const w = image.naturalWidth || image.width;
          const h = image.naturalHeight || image.height;

          if (!w || !h) {
            continue;
          }

          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(image, 0, 0, w, h);

          const blob = await new Promise(function (resolve) {
            canvas.toBlob(function (b) {
              resolve(b);
            }, "image/png");
          });

          if (!blob || blob.size < 1000) {
            continue;
          }

          return blob;

        } catch (e) {
        }
      }

      return null;
    }

    function omikujiLoadImageForShare(url) {
      return new Promise(function (resolve, reject) {
        const image = new Image();

        image.crossOrigin = "anonymous";

        image.onload = function () {
          resolve(image);
        };

        image.onerror = function () {
          reject(new Error("image load error"));
        };

        image.src = url;
      });
    }

    function makeShareText() {
      const result = currentResult.result || "おみくじ";

      return (
        "田子山富士 開運おみくじ\n" +
        "結果：" + result + "\n" +
        "田子山富士のご縁を、みなさんにもおすそ分けします。\n" +
        buildShareUrl()
      );
    }

    function buildShareUrl() {
      const p = new URLSearchParams();

      const id = getDriveFileId(currentResult.imageUrl || currentResult.displayImageUrl || "");

      if (currentUserId) {
        p.set("u", currentUserId);
      }

      if (currentResult.imageNo) {
        p.set("n", currentResult.imageNo);
      }

      if (id) {
        p.set("imgid", id);
      }

      if (currentResult.result) {
        p.set("r", currentResult.result);
      }

      p.set("v", String(Date.now()));

      return SHARE_OMIKUJI_PAGE + "?" + p.toString();
    }

    function postFacebook() {
      const shareUrl = buildShareUrl();

      copyText(makeShareText());

      const url =
        "https://www.facebook.com/sharer/sharer.php?u=" +
        encodeURIComponent(shareUrl);

      window.open(url, "_blank");

      alert("投稿文をコピーしました。Facebookの投稿欄に貼り付けてください。");
    }

    function sendLine() {
      const url =
        "https://line.me/R/msg/text/?" +
        encodeURIComponent(makeShareText());

      location.href = url;
    }

    function postX() {
      const result = currentResult.result || "おみくじ";

      const text =
        "田子山富士 開運おみくじ\n" +
        "結果：" + result + "\n" +
        "田子山富士のご縁を、みなさんにもおすそ分けします。";

      const url =
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(text) +
        "&url=" +
        encodeURIComponent(buildShareUrl());

      window.open(url, "_blank");
    }

    function copyShareText() {
      copyText(makeShareText());
      alert("おみくじ結果をコピーしました。");
    }

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text);
        return;
      }

      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    async function getJson(url) {
      const res = await fetch(url, {
        method: "GET",
        cache: "no-store",
        redirect: "follow"
      });

      const text = await res.text();

      if (!res.ok) {
        throw new Error("通信エラーが発生しました。");
      }

      if (!text) {
        throw new Error("空の応答です。");
      }

      const trimmed = text.trim();

      if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
        return JSON.parse(trimmed);
      }

      const jsonMatch = trimmed.match(/\{[\s\S]*\}/);

      if (jsonMatch) {
        return JSON.parse(jsonMatch[0]);
      }

      throw new Error("JSONを読み込めませんでした。");
    }

    function getFirst() {
      for (let i = 0; i < arguments.length; i++) {
        const v = arguments[i];

        if (v !== null && v !== undefined && String(v).trim() !== "") {
          return String(v).trim();
        }
      }

      return "";
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }
  </script>
