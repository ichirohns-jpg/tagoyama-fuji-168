<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyaFXdYWZ8tj0LSCBTSxXRFC_7XElgJ47bFcd-DSjGnpn2yWLq6l_O5eIwEkAl9yjiP/exec";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

const BOOK_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate-book.html";

let currentUserId = "";
let currentSavedFile = null;
let currentSavedUrl = "";
let items = [];

window.addEventListener(
"load",
init
);

async function init(){

  const params =
  new URLSearchParams(location.search);

  currentUserId =
  params.get("userId") ||
  params.get("id") ||
  params.get("uid") ||
  localStorage.getItem("tagoyamaUserId") ||
  "";

  if(currentUserId){

    localStorage.setItem(
      "tagoyamaUserId",
      currentUserId
    );

    document.getElementById("latestCertificateLink").href =
    CERTIFICATE_PAGE +
    "?userId=" +
    encodeURIComponent(currentUserId) +
    "&v=" +
    Date.now();

  }

  await loadBook();

}

async function loadBook(){

  const status =
  document.getElementById("status");

  const empty =
  document.getElementById("empty");

  const scroller =
  document.getElementById("bookScroller");

  scroller.innerHTML =
  "";

  empty.style.display =
  "none";

  if(!currentUserId){

    status.innerText =
    "QRからアクセスしてください。";

    empty.style.display =
    "block";

    return;

  }

  try{

    const data =
    await fetchJson(
      GAS_URL +
      "?mode=certificateBook" +
      "&userId=" +
      encodeURIComponent(currentUserId) +
      "&t=" +
      Date.now()
    );

    if(!data || !data.success){

      throw new Error(
        data && data.message
        ? data.message
        : "記念帳を取得できません"
      );

    }

    items =
    data.items ||
    data.records ||
    data.data ||
    [];

    items.sort(function(a,b){

      const bc =
      safeCount(
        b.count ||
        b.climbCount ||
        b.round
      );

      const ac =
      safeCount(
        a.count ||
        a.climbCount ||
        a.round
      );

      return bc - ac;

    });

    if(!items.length){

      status.innerText =
      "登頂記録がまだありません。";

      empty.style.display =
      "block";

      return;

    }

    status.innerText =
    "記念証 " +
    items.length +
    "枚を表示しています。";

    items.forEach(function(item,index){

      const card =
      createBookCard(item,index);

      scroller.appendChild(card);

    });

    const focusCount =
    safeCount(
      new URLSearchParams(location.search).get("count")
    );

    if(focusCount){

      setTimeout(function(){

        const target =
        document.getElementById("card-" + focusCount);

        if(target){

          target.scrollIntoView({
            behavior:"smooth",
            inline:"center",
            block:"nearest"
          });

        }

      },300);

    }

  }catch(err){

    status.innerText =
    err.message ||
    "記念帳を読み込めませんでした。";

    empty.style.display =
    "block";

  }

}

function createBookCard(item,index){

  const count =
  safeCount(
    item.count ||
    item.climbCount ||
    item.round
  ) || 1;

  const participantNo =
  safeCount(
    item.participantNo ||
    item.personNo ||
    ""
  ) ||
  participantNoFromSerial(
    item.serial ||
    item.serialNo ||
    item.certificateNo
  );

  const serial =
  pickSerial(
    item.serial ||
    item.serialNo ||
    item.certificateNo,
    count,
    participantNo
  );

  const date =
  pickDate(item);

  const imageSrc =
  pickImageSource(item);

  const shareUrl =
  BOOK_PAGE +
  "?userId=" +
  encodeURIComponent(currentUserId) +
  "&count=" +
  encodeURIComponent(count) +
  "&v=" +
  Date.now();

  const shareText =
  "田子山富士 登頂記念証\n" +
  "第" +
  count +
  "回 登頂記念\n" +
  "No." +
  serial;

  const div =
  document.createElement("div");

  div.className =
  "bookItem";

  div.id =
  "card-" + count;

  div.innerHTML =
  '<div class="certificateBox" id="certBox-' + index + '">' +
