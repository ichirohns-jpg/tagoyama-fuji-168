<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>田子山富士 登頂記念帳</title>

<meta property="og:title" content="田子山富士 登頂記念帳">

<meta name="twitter:title" content="田子山富士 登頂記念帳">

<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#050505;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}

body{
  background:
    radial-gradient(circle at 50% 0%,rgba(255,224,120,.28),rgba(0,0,0,0) 38%),
    linear-gradient(180deg,#1d1204 0%,#070707 48%,#000 100%);
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:24px 16px 54px;
}

.header{
  text-align:center;
  margin-bottom:24px;
}

.logoBox{
  width:100%;
  max-width:560px;
  margin:0 auto 18px;
  border-radius:28px;
  overflow:hidden;
  border:3px solid rgba(255,220,95,.78);
  background:#000;
  box-shadow:
    0 14px 30px rgba(0,0,0,.48),
    0 0 22px rgba(255,210,80,.20);
}

.logoBox img{
  display:block;
  width:100%;
  height:auto;
}

.title{
  margin:0;
  font-size:clamp(38px,10vw,72px);
  font-weight:900;
  line-height:1.12;
  color:#ffdf72;
  letter-spacing:.04em;
  text-shadow:
    0 4px 4px rgba(0,0,0,.9),
    0 0 18px rgba(255,210,80,.28);
}

.subTitle{
  margin:12px 0 0;
  font-size:clamp(18px,4.8vw,30px);
  font-weight:900;
  line-height:1.45;
  color:#fff3c4;
}

.card{
  margin:24px 0;
  padding:28px 18px;
  border-radius:30px;
  border:3px solid #d6b73c;
  background:
    radial-gradient(circle at 50% 0%,rgba(255,224,120,.18),rgba(0,0,0,0) 45%),
    rgba(20,20,20,.94);
  box-shadow:
    0 0 0 1px rgba(255,230,150,.10) inset,
    0 12px 28px rgba(0,0,0,.42);
}

.cardTitle{
  margin:0 0 16px;
  color:#ffdf72;
  font-size:clamp(28px,7.2vw,48px);
  font-weight:900;
  line-height:1.25;
}

.cardText{
  margin:0;
  font-size:clamp(19px,5vw,32px);
  font-weight:800;
  line-height:1.75;
  color:#fff;
  text-align:center;
}

.statusBox{
  margin-top:18px;
  padding:18px 14px;
  border-radius:20px;
  background:rgba(0,0,0,.34);
  border:1px solid rgba(255,220,140,.34);
  font-size:clamp(17px,4.6vw,28px);
  font-weight:900;
  line-height:1.65;
  color:#fff3c4;
  text-align:center;
  white-space:pre-wrap;
}

.list{
  display:grid;
  gap:24px;
  margin-top:24px;
}

.certCard{
  padding:18px;
  border-radius:26px;
  border:2px solid rgba(255,220,95,.72);
  background:
    radial-gradient(circle at 50% 0%,rgba(255,224,120,.18),rgba(0,0,0,0) 45%),
    rgba(0,0,0,.42);
  box-shadow:0 10px 22px rgba(0,0,0,.36);
}

.certImageBox{
  position:relative;
  width:100%;
  border-radius:22px;
  overflow:hidden;
  background:#000;
  border:2px solid rgba(255,220,95,.76);
  box-shadow:
    0 0 0 1px rgba(255,240,170,.12) inset,
    0 12px 24px rgba(0,0,0,.42);
}

.certImage{
  display:block;
  width:100%;
  height:auto;
  background:#000;
}

.certOverlay{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:18px 10px 20px;
  background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.82));
  text-align:center;
  pointer-events:none;
}

.certRound{
  font-size:clamp(24px,7vw,46px);
  font-weight:900;
  line-height:1.2;
  color:#fff;
  text-shadow:
    0 3px 4px #000,
    0 0 12px rgba(255,255,255,.35);
}

.certSerial{
  margin-top:8px;
  font-size:clamp(34px,10vw,64px);
  font-weight:900;
  line-height:1.1;
  color:#ffdf72;
  text-shadow:
    0 3px 4px #000,
    0 0 14px rgba(255,220,90,.38);
}

.certDate{
  margin-top:8px;
  font-size:clamp(20px,5.8vw,38px);
  font-weight:900;
  line-height:1.2;
  color:#fff;
  text-shadow:
    0 3px 4px #000,
    0 0 12px rgba(255,255,255,.28);
}

.info{
  margin-top:16px;
  text-align:center;
}

.infoTitle{
  margin:0;
  font-size:clamp(22px,6vw,38px);
  font-weight:900;
  color:#ffdf72;
  line-height:1.35;
}

.infoText{
  margin:8px 0 0;
  font-size:clamp(17px,4.6vw,26px);
  font-weight:900;
  color:#fff3c4;
  line-height:1.5;
}

.btnGrid{
  display:grid;
  gap:12px;
  margin-top:18px;
}

.btn,
.linkBtn{
  width:100%;
  min-height:66px;
  border:none;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:clamp(19px,5.4vw,32px);
  font-weight:900;
  letter-spacing:.02em;
  color:#fff;
  cursor:pointer;
  text-align:center;
  box-shadow:
    0 7px 0 rgba(0,0,0,.32),
    0 13px 22px rgba(0,0,0,.34);
}

.btn:active,
.linkBtn:active{
  transform:translateY(4px);
  box-shadow:
    0 3px 0 rgba(0,0,0,.32),
    0 8px 14px rgba(0,0,0,.30);
}

.goldBtn{
  background:linear-gradient(180deg,#ffe27a,#c79218);
  color:#251400;
}

.greenBtn{
  background:linear-gradient(180deg,#35df86,#19b75e);
}

.facebookBtn{
  background:linear-gradient(180deg,#1688ff,#075ec9);
}

.lineBtn{
  background:linear-gradient(180deg,#06d45f,#06b84f);
}

.xBtn{
  background:linear-gradient(180deg,#222,#030303);
}

.grayBtn{
  background:linear-gradient(180deg,#7f9aa8,#5f7d8d);
}

.blackBtn{
  background:linear-gradient(180deg,#232323,#050505);
}

.footer{
  margin-top:34px;
  padding:20px 0 0;
  text-align:center;
  font-size:14px;
  line-height:1.7;
  color:#c7b77a;
}

.hidden{
  display:none !important;
}

@media(max-width:480px){
  .wrap{
    padding:22px 14px 48px;
  }

  .card{
    padding:26px 16px;
    border-radius:28px;
  }

  .certCard{
    padding:14px;
  }

  .btn,
  .linkBtn{
    min-height:64px;
    border-radius:22px;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <header class="header">
    <div class="logoBox">
      <img src="logo.png" alt="田子山富士">
    </div>

    <h1 class="title">
      登頂記念帳
    </h1>

    <div class="subTitle">
      田子山富士168の縁プロジェクト
    </div>
  </header>

  <section class="card">
    <h2 class="cardTitle">
      登頂の記録
    </h2>

    <p class="cardText">
      これまでの登頂記念を<br>
      記念帳として表示します。
    </p>

    <div class="statusBox" id="statusBox">
      登頂記念帳を読み込み中です...
    </div>

    <div class="list" id="bookList"></div>

    <div class="btnGrid">
      <a class="linkBtn blackBtn" href="./">
        ← トップへ戻る
      </a>
    </div>
  </section>

  <footer class="footer">
    田子山富士 168の縁プロジェクト<br>
    登頂記念帳
  </footer>

</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzNDCMHEOagahZdJguPjuE5ecPbEF_UrXGb57lmDabLYcTORl71rK7gR8tFuwAMtuCB/exec";

const SITE_BASE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
SITE_BASE + "certificate.html";

let currentUserId =
"";

let historyItems =
[];

window.addEventListener("load",init);

function init(){
  currentUserId =
  getStableUserId();

  if(!currentUserId){
    setStatus(
      "登頂記念帳を表示するには、山頂QRコードから登頂受付をしてください。"
    );

    return;
  }

  loadBook();
}

function getStableUserId(){
  const params =
  new URLSearchParams(location.search);

  const urlUserId =
  getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    ""
  );

  if(urlUserId){
    localStorage.setItem("tagoyamaUserId",urlUserId);
    localStorage.setItem("tagoyamaFujiUserId",urlUserId);

    return urlUserId;
  }

  return getString(
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    ""
  );
}

async function loadBook(){
  setStatus(
    "登頂記念帳を読み込み中です..."
  );

  const list =
  document.getElementById("bookList");

  if(list){
    list.innerHTML =
    "";
  }

  try{
    const data =
    await fetchJson(
      GAS_URL +
      "?mode=climbHistory" +
      "&userId=" +
      encodeURIComponent(currentUserId) +
      "&t=" +
      Date.now()
    );

    if(!data || data.success === false){
      throw new Error(
        data && data.message
        ? data.message
        : "登頂記念帳を読み込めませんでした"
      );
    }

    const rows =
    data.history ||
    data.items ||
    data.rows ||
    [];

    historyItems =
    rows.map(function(row){
      return normalizeHistoryItem(row);
    });

    if(historyItems.length === 0){
      setStatus(
        "まだ登頂記念がありません。"
      );

      return;
    }

    setStatus(
      "登頂記念が " +
      historyItems.length +
      " 件あります。"
    );

    renderBook();

  }catch(err){
    historyItems =
    [];

    setStatus(
      err && err.message
      ? err.message
      : "登頂記念帳を読み込めませんでした"
    );
  }
}

function normalizeHistoryItem(row){
  row =
  row || {};

  const count =
  Number(
    row.count ||
    row.climbCount ||
    row.no ||
    row.imageNo ||
    0
  );

  const serial =
  getString(
    row.serial ||
    row.serialNo ||
    row.certificateNo ||
    (
      count
      ? count + "-0001"
      : ""
    )
  );

  const imageUrl =
  normalizeImageUrl(
    row.imageUrl ||
    row.image ||
    row.url ||
    (
      row.image && row.image.imageUrl
      ? row.image.imageUrl
      : ""
    )
  );

  const date =
  formatDateText(
    row.date ||
    row.datetime ||
    row.createdAt ||
    ""
  );

  return {
    userId:getString(row.userId || currentUserId),
    count:count,
    climbCount:count,
    imageNo:Number(row.imageNo || count || 1),
    serial:serial,
    serialNo:serial,
    certificateNo:serial,
    date:date,
    imageUrl:imageUrl
  };
}

function renderBook(){
  const list =
  document.getElementById("bookList");

  if(!list){
    return;
  }

  list.innerHTML =
  historyItems.map(function(item,index){
    return renderBookItem(item,index);
  }).join("");
}

function renderBookItem(item,index){
  const image =
  item.imageUrl ||
  "ogp-certificate.jpg";

  const countText =
  item.count
  ? "第" + item.count + "回 登頂記念"
  : "登頂記念";

  const serialText =
  item.serial
  ? "No." + item.serial
  : "";

  const dateText =
  item.date ||
  "";

  let html =
  '<div class="certCard">';

  html +=
  '<div class="certImageBox">';

  html +=
  '<img class="certImage" src="' +
  escapeHtml(image) +
  '" alt="' +
  escapeHtml(countText) +
  '" onerror="this.src=\'ogp-certificate.jpg\'">';

  html +=
  '<div class="certOverlay">';

  html +=
  '<div class="certRound">' +
  escapeHtml(countText) +
  '</div>';

  if(serialText){
    html +=
    '<div class="certSerial">' +
    escapeHtml(serialText) +
    '</div>';
  }

  if(dateText){
    html +=
    '<div class="certDate">' +
    escapeHtml(dateText) +
    '</div>';
  }

  html +=
  '</div>';

  html +=
  '</div>';

  html +=
  '<div class="info">';

  html +=
  '<h3 class="infoTitle">' +
  escapeHtml(countText) +
  '</h3>';

  html +=
  '<p class="infoText">' +
  escapeHtml(serialText) +
  '<br>' +
  escapeHtml(dateText) +
  '</p>';

  html +=
  '</div>';

  html +=
  '<div class="btnGrid">';

  html +=
  '<a class="linkBtn greenBtn" href="' +
  escapeHtml(buildCertificateUrl(item)) +
  '">記念証を開く</a>';

  html +=
  '<button class="btn grayBtn" onclick="copyCertificatePost(' +
  index +
  ')">投稿文コピー</button>';

  html +=
  '<button class="btn facebookBtn" onclick="shareCertificateBook(' +
  index +
  ',\'facebook\')">Facebookで共有</button>';

  html +=
  '<button class="btn lineBtn" onclick="shareCertificateBook(' +
  index +
  ',\'line\')">LINEで送る</button>';

  html +=
  '<button class="btn xBtn" onclick="shareCertificateBook(' +
  index +
  ',\'x\')">Xで投稿</button>';

  html +=
  '</div>';

  html +=
  '</div>';

  return html;
}

function buildCertificateUrl(item){
  const params =
  new URLSearchParams();

  params.set(
    "userId",
    item.userId || currentUserId
  );

  if(item.count){
    params.set(
      "count",
      item.count
    );
  }

  if(item.serial){
    params.set(
      "serial",
      item.serial
    );
  }

  params.set(
    "v",
    Date.now()
  );

  return CERTIFICATE_PAGE +
  "?" +
  params.toString();
}

function buildShareUrl(item){
  const params =
  new URLSearchParams();

  params.set(
    "mode",
    "shareCertificateBook"
  );

  params.set(
    "userId",
    item.userId || currentUserId
  );

  if(item.count){
    params.set(
      "count",
      item.count
    );
  }

  if(item.serial){
    params.set(
      "serial",
      item.serial
    );
  }

  return GAS_URL +
  "?" +
  params.toString();
}

function buildShareText(item){
  const lines =
  [];

  lines.push(
    "田子山富士168の縁プロジェクトの登頂記念です。"
  );

  if(item.count){
    lines.push(
      "第" + item.count + "回 登頂記念"
    );
  }

  if(item.serial){
    lines.push(
      "No." + item.serial
    );
  }

  if(item.date){
    lines.push(
      item.date
    );
  }

  lines.push(
    "#田子山富士"
  );

  lines.push(
    "#168の縁プロジェクト"
  );

  return lines.join("\n");
}

async function copyCertificatePost(index){
  const item =
  historyItems[index];

  if(!item){
    alert("登頂記念が見つかりません。");
    return;
  }

  const text =
  buildShareText(item) +
  "\n" +
  buildShareUrl(item);

  try{
    await copyText(text);
    alert("投稿文とリンクをコピーしました。");
  }catch(err){
    alert("コピーできませんでした。");
  }
}

async function shareCertificateBook(index,type){
  const item =
  historyItems[index];

  if(!item){
    alert("登頂記念が見つかりません。");
    return;
  }

  const url =
  buildShareUrl(item);

  const text =
  buildShareText(item);

  if(type === "facebook"){
    try{
      await copyText(text + "\n" + url);
    }catch(e){}

    location.href =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "line"){
    location.href =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "x"){
    location.href =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(text) +
    "&url=" +
    encodeURIComponent(url);

    return;
  }
}

async function fetchJson(url){
  const res =
  await fetch(
    url,
    {
      method:"GET",
      cache:"no-store"
    }
  );

  const text =
  await res.text();

  if(!res.ok){
    throw new Error("通信エラーが発生しました");
  }

  try{
    return JSON.parse(text);
  }catch(e){}

  const match =
  text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

  if(match && match[1]){
    return JSON.parse(match[1]);
  }

  throw new Error("データを読み込めませんでした");
}

function normalizeImageUrl(value){
  let url =
  getString(value);

  if(!url){
    return "";
  }

  url =
  url
  .replace(/\\u003d/g,"=")
  .replace(/\\u0026/g,"&")
  .replace(/\\\//g,"/")
  .replace(/&amp;/g,"&")
  .replace(/[),.;]+$/g,"")
  .trim();

  if(url.indexOf("data:image") === 0){
    return url;
  }

  if(url.indexOf("drive.google.com/thumbnail") >= 0){
    return url;
  }

  let match =
  url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);

  if(match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1600";
  }

  match =
  url.match(/[?&]id=([^&]+)/);

  if(url.indexOf("drive.google.com") >= 0 && match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1600";
  }

  return url;
}

function formatDateText(value){
  value =
  getString(value);

  if(!value){
    return "";
  }

  return value
  .replace("T15:00:00.000Z","")
  .replace("T00:00:00.000Z","")
  .replace(/-/g,"/");
}

async function copyText(text){
  text =
  getString(text);

  if(navigator.clipboard && navigator.clipboard.writeText){
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.setAttribute("readonly","readonly");
  textarea.style.position =
  "fixed";
  textarea.style.left =
  "-9999px";
  textarea.style.top =
  "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  const ok =
  document.execCommand("copy");

  document.body.removeChild(textarea);

  if(!ok){
    throw new Error("コピーできませんでした");
  }
}

function setStatus(text){
  const el =
  document.getElementById("statusBox");

  if(el){
    el.innerText =
    text;
  }
}

function escapeHtml(value){
  return getString(value)
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;")
  .replace(/'/g,"&#039;");
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
</script>

</body>
</html>
