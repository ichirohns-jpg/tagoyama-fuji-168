<body>

<div class="wrap">

  <header class="header">
    <div class="logoBox">
      <img src="logo.png" alt="田子山富士">
    </div>

    <h1 class="title">
      登頂記念帳
    </h1>

    <div class="lead">
      あなたの登頂記念証を<br>
      横にめくって見られます
    </div>

    <div class="subTitle">
      田子山富士168の縁プロジェクト
    </div>
  </header>

  <section class="card">
    <div class="statusBox" id="statusBox">
      記念帳を読み込んでいます...
    </div>

    <div class="bookScroller" id="bookList"></div>

    <div class="btnGrid">
      <a class="linkBtn blackBtn" href="./">
        ← トップへ戻る
      </a>

      <a class="linkBtn goldBtn" id="latestBtn" href="certificate.html">
        最新の記念証を見る
      </a>
    </div>

    <div class="note">
      横にスワイプすると、過去の登頂記念証を見られます。<br>
      各カードごとに画像保存・SNS共有ができます。
    </div>
  </section>

  <footer class="footer">
    田子山富士 168の縁プロジェクト<br>
    登頂記念帳
  </footer>

</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzNDCMHEOagahZdJguPjuE5ecPbEF_UrXGb57lmDabLYcTORl71rK7gR8tFuwAMtuCB/exec";

const SITE_BASE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
SITE_BASE + "certificate.html";

let currentUserId =
"";

let historyItems =
[];

window.addEventListener("load",init);

function init(){
  currentUserId =
  getStableUserId();

  const latestBtn =
  document.getElementById("latestBtn");

  if(latestBtn && currentUserId){
    latestBtn.href =
    CERTIFICATE_PAGE +
    "?userId=" +
    encodeURIComponent(currentUserId) +
    "&v=" +
    Date.now();
  }

  if(!currentUserId){
    setStatus(
      "登頂記念帳を表示するには、山頂QRコードから登頂受付をしてください。"
    );

    return;
  }

  loadBook();
}

function getStableUserId(){
  const params =
  new URLSearchParams(location.search);

  const urlUserId =
  getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    ""
  );

  if(urlUserId){
    localStorage.setItem("tagoyamaUserId",urlUserId);
    localStorage.setItem("tagoyamaFujiUserId",urlUserId);

    return urlUserId;
  }

  return getString(
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    ""
  );
}

async function loadBook(){
  setStatus(
    "記念帳を読み込んでいます..."
  );

  const list =
  document.getElementById("bookList");

  if(list){
    list.innerHTML =
    "";
  }

  try{
    const url =
    GAS_URL +
    "?mode=climbHistory" +
    "&userId=" +
    encodeURIComponent(currentUserId) +
    "&t=" +
    Date.now();

    const data =
    await getJson(url);

    const rows =
    extractRows(data);

    historyItems =
    rows.map(function(row){
      return normalizeHistoryItem(row);
    })
    .filter(function(item){
      return item.userId && item.imageUrl;
    });

    if(historyItems.length === 0){
      setStatus(
        "まだ登頂記念がありません。"
      );

      return;
    }

    setStatus(
      "登頂記念が " +
      historyItems.length +
      " 件あります。"
    );

    renderBook();

  }catch(err){
    historyItems =
    [];

    setStatus(
      "登頂記念帳を読み込めませんでした。\n" +
      (
        err && err.message
        ? err.message
        : "時間をおいて再度お試しください。"
      )
    );
  }
}

function extractRows(data){
  if(!data){
    return [];
  }

  if(Array.isArray(data)){
    return data;
  }

  if(Array.isArray(data.history)){
    return data.history;
  }

  if(Array.isArray(data.items)){
    return data.items;
  }

  if(Array.isArray(data.rows)){
    return data.rows;
  }

  if(Array.isArray(data.data)){
    return data.data;
  }

  if(Array.isArray(data.list)){
    return data.list;
  }

  if(
    data.userId &&
    (
      data.climbCount ||
      data.count ||
      data.serialNo ||
      data.serial ||
      data.imageUrl ||
      data.imageName
    )
  ){
    return [data];
  }

  return [];
}

function normalizeHistoryItem(row){
  row =
  row || {};

  const userId =
  getString(
    row.userId ||
    row.id ||
    row.uid ||
    currentUserId
  );

  const count =
  Number(
    row.climbCount ||
    row.count ||
    row.no ||
    0
  );

  const serial =
  getString(
    row.serialNo ||
    row.certificateNo ||
    row.serial ||
    ""
  );

  const imageName =
  getString(
    row.imageName ||
    row.title ||
    row.name ||
    (
      count
      ? "第" + count + "回登頂"
      : "登頂記念"
    )
  );

  const imageUrl =
  normalizeImageUrl(
    row.imageUrl ||
    row.imageURL ||
    row.image ||
    row.url ||
    ""
  );

  const date =
  formatDateText(
    row.climbDate ||
    row.lastDate ||
    row.date ||
    row.updatedAt ||
    ""
  );

  return {
    userId:userId,
    count:count,
    climbCount:count,
    serial:serial,
    serialNo:serial,
    certificateNo:serial,
    imageNo:getString(row.imageNo || ""),
    imageName:imageName,
    date:date,
    imageUrl:imageUrl
  };
}

function renderBook(){
  const list =
  document.getElementById("bookList");

  if(!list){
    return;
  }

  list.innerHTML =
  historyItems.map(function(item,index){
    return renderBookItem(item,index);
  }).join("");
}

function renderBookItem(item,index){
  const countText =
  item.count
  ? "第" + item.count + "回 登頂記念"
  : "登頂記念";

  const serialText =
  item.serial
  ? "No." + item.serial
  : "";

  const dateText =
  item.date ||
  "";

  let html =
  '<div class="certCard">';

  html +=
  '<div class="certImageBox">';

  html +=
  '<img class="certImage" src="' +
  escapeHtml(item.imageUrl) +
  '" alt="' +
  escapeHtml(item.imageName || countText) +
  '" onerror="this.src=\'ogp-certificate.jpg\'">';

  html +=
  '</div>';

  html +=
  '<div class="info">';

  html +=
  '<h3 class="infoTitle">' +
  escapeHtml(item.imageName || countText) +
  '</h3>';

  html +=
  '<p class="infoText">';

  html +=
  escapeHtml(countText);

  if(serialText){
    html +=
    '<br>' +
    escapeHtml(serialText);
  }

  if(dateText){
    html +=
    '<br>' +
    escapeHtml(dateText);
  }

  html +=
  '</p>';

  html +=
  '</div>';

  html +=
  '<div class="btnGrid">';

  html +=
  '<a class="linkBtn greenBtn" href="' +
  escapeHtml(buildCertificateUrl(item)) +
  '">記念証を開く</a>';

  html +=
  '<button class="btn grayBtn" onclick="copyCertificatePost(' +
  index +
  ')">投稿文コピー</button>';

  html +=
  '<button class="btn facebookBtn" onclick="shareCertificateBook(' +
  index +
  ',\'facebook\')">Facebookで共有</button>';

  html +=
  '<button class="btn lineBtn" onclick="shareCertificateBook(' +
  index +
  ',\'line\')">LINEで送る</button>';

  html +=
  '<button class="btn xBtn" onclick="shareCertificateBook(' +
  index +
  ',\'x\')">Xで投稿</button>';

  html +=
  '</div>';

  html +=
  '</div>';

  return html;
}

function buildCertificateUrl(item){
  const params =
  new URLSearchParams();

  params.set(
    "userId",
    item.userId || currentUserId
  );

  if(item.count){
    params.set(
      "count",
      item.count
    );
  }

  if(item.serial){
    params.set(
      "serial",
      item.serial
    );
  }

  params.set(
    "v",
    Date.now()
  );

  return CERTIFICATE_PAGE +
  "?" +
  params.toString();
}

function buildShareUrl(item){
  const params =
  new URLSearchParams();

  params.set(
    "mode",
    "shareCertificateBook"
  );

  params.set(
    "userId",
    item.userId || currentUserId
  );

  if(item.count){
    params.set(
      "count",
      item.count
    );
  }

  if(item.serial){
    params.set(
      "serial",
      item.serial
    );
  }

  return GAS_URL +
  "?" +
  params.toString();
}

function buildShareText(item){
  const lines =
  [];

  lines.push(
    "田子山富士168の縁プロジェクトの登頂記念です。"
  );

  if(item.imageName){
    lines.push(
      item.imageName
    );
  }

  if(item.count){
    lines.push(
      "第" + item.count + "回 登頂記念"
    );
  }

  if(item.serial){
    lines.push(
      "No." + item.serial
    );
  }

  if(item.date){
    lines.push(
      item.date
    );
  }

  lines.push(
    "#田子山富士"
  );

  lines.push(
    "#168の縁プロジェクト"
  );

  return lines.join("\n");
}

async function copyCertificatePost(index){
  const item =
  historyItems[index];

  if(!item){
    alert("登頂記念が見つかりません。");
    return;
  }

  const text =
  buildShareText(item) +
  "\n" +
  buildShareUrl(item);

  try{
    await copyText(text);
    alert("投稿文とリンクをコピーしました。");
  }catch(err){
    alert("コピーできませんでした。");
  }
}

async function shareCertificateBook(index,type){
  const item =
  historyItems[index];

  if(!item){
    alert("登頂記念が見つかりません。");
    return;
  }

  const url =
  buildShareUrl(item);

  const text =
  buildShareText(item);

  if(type === "facebook"){
    try{
      await copyText(text + "\n" + url);
    }catch(e){}

    location.href =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "line"){
    location.href =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "x"){
    location.href =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(text) +
    "&url=" +
    encodeURIComponent(url);

    return;
  }
}

async function getJson(url){
  try{
    return await fetchJson(url,12000);
  }catch(err){
    return await jsonp(url,15000);
  }
}

async function fetchJson(url,timeoutMs){
  const controller =
  new AbortController();

  const timer =
  setTimeout(function(){
    controller.abort();
  },timeoutMs || 12000);

  try{
    const res =
    await fetch(
      url,
      {
        method:"GET",
        cache:"no-store",
        signal:controller.signal
      }
    );

    const text =
    await res.text();

    if(!res.ok){
      throw new Error("通信エラーが発生しました");
    }

    try{
      return JSON.parse(text);
    }catch(e){}

    const match =
    text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

    if(match && match[1]){
      return JSON.parse(match[1]);
    }

    throw new Error("データを読み込めませんでした");

  }finally{
    clearTimeout(timer);
  }
}

function jsonp(url,timeoutMs){
  return new Promise(function(resolve,reject){
    const callbackName =
    "__tagoyamaBookCallback_" +
    Date.now() +
    "_" +
    Math.floor(Math.random() * 100000);

    const sep =
    url.indexOf("?") >= 0
    ? "&"
    : "?";

    const script =
    document.createElement("script");

    let done =
    false;

    const timer =
    setTimeout(function(){
      cleanup();

      reject(
        new Error("読み込みが時間切れになりました")
      );
    },timeoutMs || 15000);

    function cleanup(){
      if(done){
        return;
      }

      done =
      true;

      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(e){
        window[callbackName] =
        undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }

    window[callbackName] =
    function(data){
      cleanup();
      resolve(data);
    };

    script.onerror =
    function(){
      cleanup();

      reject(
        new Error("JSONP読み込みに失敗しました")
      );
    };

    script.src =
    url +
    sep +
    "callback=" +
    encodeURIComponent(callbackName);

    document.body.appendChild(script);
  });
}

function normalizeImageUrl(value){
  let url =
  getString(value);

  if(!url){
    return "";
  }

  url =
  url
  .replace(/\\u003d/g,"=")
  .replace(/\\u0026/g,"&")
  .replace(/\\\//g,"/")
  .replace(/&amp;/g,"&")
  .replace(/[),.;]+$/g,"")
  .trim();

  if(url.indexOf("data:image") === 0){
    return url;
  }

  if(url.indexOf("drive.google.com/thumbnail") >= 0){
    return url;
  }

  let match =
  url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);

  if(match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1600";
  }

  match =
  url.match(/[?&]id=([^&]+)/);

  if(url.indexOf("drive.google.com") >= 0 && match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1600";
  }

  return url;
}

function formatDateText(value){
  value =
  getString(value);

  if(!value){
    return "";
  }

  if(value.indexOf("GMT") >= 0){
    const d =
    new Date(value);

    if(!isNaN(d.getTime())){
      return d.getFullYear() +
      "/" +
      String(d.getMonth() + 1).padStart(2,"0") +
      "/" +
      String(d.getDate()).padStart(2,"0");
    }
  }

  return value
  .replace("T15:00:00.000Z","")
  .replace("T00:00:00.000Z","")
  .replace(/-/g,"/");
}

async function copyText(text){
  text =
  getString(text);

  if(navigator.clipboard && navigator.clipboard.writeText){
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.setAttribute("readonly","readonly");
  textarea.style.position =
  "fixed";
  textarea.style.left =
  "-9999px";
  textarea.style.top =
  "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  const ok =
  document.execCommand("copy");

  document.body.removeChild(textarea);

  if(!ok){
    throw new Error("コピーできませんでした");
  }
}

function setStatus(text){
  const el =
  document.getElementById("statusBox");

  if(el){
    el.innerText =
    text;
  }
}

function escapeHtml(value){
  return getString(value)
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;")
  .replace(/'/g,"&#039;");
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
</script>
