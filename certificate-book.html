<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#050505;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}

body{
  background:
    radial-gradient(circle at 50% 0%,rgba(255,224,120,.28),rgba(0,0,0,0) 38%),
    linear-gradient(180deg,#1d1204 0%,#070707 48%,#000 100%);
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:24px 16px 54px;
}

.header{
  text-align:center;
  margin-bottom:24px;
}

.logoBox{
  width:100%;
  max-width:560px;
  margin:0 auto 18px;
  border-radius:28px;
  overflow:hidden;
  border:3px solid rgba(255,220,95,.78);
  background:#000;
  box-shadow:
    0 14px 30px rgba(0,0,0,.48),
    0 0 22px rgba(255,210,80,.20);
}

.logoBox img{
  display:block;
  width:100%;
  height:auto;
}

.title{
  margin:0;
  font-size:clamp(40px,11vw,76px);
  font-weight:900;
  line-height:1.12;
  color:#ffdf72;
  letter-spacing:.04em;
  text-shadow:
    0 4px 4px rgba(0,0,0,.9),
    0 0 18px rgba(255,210,80,.28);
}

.lead{
  margin:20px 0 0;
  font-size:clamp(22px,6vw,38px);
  font-weight:900;
  line-height:1.55;
  color:#fff3c4;
  text-align:center;
}

.subTitle{
  margin:14px 0 0;
  font-size:clamp(18px,4.8vw,30px);
  font-weight:900;
  line-height:1.45;
  color:#fff3c4;
}

.card{
  margin:24px 0;
  padding:28px 18px;
  border-radius:30px;
  border:3px solid #d6b73c;
  background:
    radial-gradient(circle at 50% 0%,rgba(255,224,120,.18),rgba(0,0,0,0) 45%),
    rgba(20,20,20,.94);
  box-shadow:
    0 0 0 1px rgba(255,230,150,.10) inset,
    0 12px 28px rgba(0,0,0,.42);
}

.statusBox{
  margin-top:18px;
  padding:18px 14px;
  border-radius:20px;
  background:rgba(0,0,0,.34);
  border:1px solid rgba(255,220,140,.34);
  font-size:clamp(17px,4.6vw,28px);
  font-weight:900;
  line-height:1.65;
  color:#fff3c4;
  text-align:center;
  white-space:pre-wrap;
}

#certificate-container{
  display:flex;
  overflow-x:auto;
  white-space:nowrap;
  gap:18px;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  padding:22px 2px 10px;
}

.certificate-card{
  flex:0 0 100%;
  scroll-snap-align:center;
  white-space:normal;
  padding:18px;
  border-radius:26px;
  border:2px solid rgba(255,220,95,.72);
  background:
    radial-gradient(circle at 50% 0%,rgba(255,224,120,.18),rgba(0,0,0,0) 45%),
    rgba(0,0,0,.42);
  box-shadow:0 10px 22px rgba(0,0,0,.36);
  text-align:center;
}

.certificate-card img{
  display:block;
  width:100%;
  height:auto;
  border-radius:22px;
  border:2px solid rgba(255,220,95,.76);
  background:#000;
  box-shadow:
    0 0 0 1px rgba(255,240,170,.12) inset,
    0 12px 24px rgba(0,0,0,.42);
}

.certTitle{
  margin:18px 0 0;
  font-size:clamp(24px,6.4vw,40px);
  font-weight:900;
  color:#ffdf72;
  line-height:1.35;
}

.certInfo{
  margin:10px 0 0;
  font-size:clamp(18px,4.8vw,28px);
  font-weight:900;
  color:#fff3c4;
  line-height:1.6;
}

.cardBtnGrid{
  display:grid;
  gap:12px;
  margin-top:18px;
}

.btnGrid{
  display:grid;
  gap:12px;
  margin-top:18px;
}

.btn,
.linkBtn{
  width:100%;
  min-height:66px;
  border:none;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:clamp(19px,5.4vw,32px);
  font-weight:900;
  letter-spacing:.02em;
  color:#fff;
  cursor:pointer;
  text-align:center;
  box-shadow:
    0 7px 0 rgba(0,0,0,.32),
    0 13px 22px rgba(0,0,0,.34);
}

.goldBtn{
  background:linear-gradient(180deg,#ffe27a,#c79218);
  color:#251400;
}

.greenBtn{
  background:linear-gradient(180deg,#35df86,#19b75e);
}

.facebookBtn{
  background:linear-gradient(180deg,#1688ff,#075ec9);
}

.lineBtn{
  background:linear-gradient(180deg,#06d45f,#06b84f);
}

.xBtn{
  background:linear-gradient(180deg,#222,#030303);
}

.grayBtn{
  background:linear-gradient(180deg,#7f9aa8,#5f7d8d);
}

.blackBtn{
  background:linear-gradient(180deg,#232323,#050505);
}

.note{
  margin:22px 0 0;
  padding:20px 16px;
  border-radius:22px;
  border:1px solid rgba(255,220,140,.42);
  background:rgba(0,0,0,.30);
  color:#fff3c4;
  font-size:clamp(17px,4.6vw,26px);
  line-height:1.7;
  font-weight:900;
  text-align:center;
}

.footer{
  margin-top:34px;
  padding:20px 0 0;
  text-align:center;
  font-size:14px;
  line-height:1.7;
  color:#c7b77a;
}

@media(max-width:480px){
  .wrap{
    padding:22px 14px 48px;
  }

  .card{
    padding:26px 16px;
    border-radius:28px;
  }

  .certificate-card{
    padding:14px;
  }

  .btn,
  .linkBtn{
    min-height:64px;
    border-radius:22px;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <header class="header">
    <div class="logoBox">
      <img src="logo.png" alt="田子山富士">
    </div>

    <h1 class="title">
      登頂記念帳
    </h1>

    <div class="lead">
      あなたの登頂記念証を<br>
      横にめくって見られます
    </div>

    <div class="subTitle">
      田子山富士168の縁プロジェクト
    </div>
  </header>

  <section class="card">
    <div class="statusBox" id="statusBox">
      記念帳を読み込んでいます...
    </div>

    <div id="certificate-container"></div>

    <div class="btnGrid">
      <a class="linkBtn goldBtn" id="latestBtn" href="certificate.html">
        最新の記念証を見る
      </a>

      <a class="linkBtn blackBtn" href="./">
        ← トップへ戻る
      </a>
    </div>

    <div class="note">
      横にスワイプすると、過去の登頂記念証を見られます。<br>
      登頂記録シートにある実データだけを表示します。
    </div>
  </section>

  <footer class="footer">
    田子山富士 168の縁プロジェクト<br>
    登頂記念帳
  </footer>

</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzrbLiXwZj6pv35CdDjEdn1Rd13EGCsR4hB_k514_sgQBSSpEoPkNjN9yJ0tmHLnS3w/exec";

const SITE_BASE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

const CERTIFICATE_PAGE =
SITE_BASE + "certificate.html";

let currentUserId =
"";

let historyItems =
[];

window.addEventListener("load",loadCertificateBook);

function getStableUserId(){
  const params =
  new URLSearchParams(window.location.search);

  const id =
  getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    localStorage.getItem("tagoyamaUserId") ||
    localStorage.getItem("tagoyamaFujiUserId") ||
    localStorage.getItem("userId") ||
    ""
  );

  if(id){
    localStorage.setItem("tagoyamaUserId",id);
    localStorage.setItem("tagoyamaFujiUserId",id);
  }

  return id;
}

async function loadCertificateBook(){
  currentUserId =
  getStableUserId();

  const container =
  document.getElementById("certificate-container");

  const statusBox =
  document.getElementById("statusBox");

  const latestBtn =
  document.getElementById("latestBtn");

  if(latestBtn && currentUserId){
    latestBtn.href =
    CERTIFICATE_PAGE +
    "?userId=" +
    encodeURIComponent(currentUserId) +
    "&v=" +
    Date.now();
  }

  if(!currentUserId){
    statusBox.innerText =
    "ユーザーIDが不明です。山頂QRコードから登頂受付をしてください。";

    container.innerHTML =
    "";

    return;
  }

  statusBox.innerText =
  "記念帳を読み込んでいます...";

  try{
    const url =
    GAS_URL +
    "?mode=climbHistory" +
    "&userId=" +
    encodeURIComponent(currentUserId) +
    "&t=" +
    Date.now();

    const data =
    await getJson(url);

    if(!data || data.success === false){
      statusBox.innerText =
      data && data.message
      ? data.message
      : "データの読み込みに失敗しました。";

      container.innerHTML =
      "";

      return;
    }

    /*
      history配列以外は受け付けない。
      単体JSONは登頂記念として扱わない。
      participantNoを登頂回数にしない。
      serialNoを勝手に作らない。
    */
    if(!Array.isArray(data.history) || data.history.length === 0){
      statusBox.innerText =
      "まだ登頂記念がありません。";

      container.innerHTML =
      "";

      return;
    }

    historyItems =
    data.history.filter(function(item){
      return (
        item &&
        item.userId &&
        item.climbCount &&
        item.serialNo &&
        item.imageName &&
        item.imageUrl
      );
    });

    if(historyItems.length === 0){
      statusBox.innerText =
      "まだ登頂記念がありません。";

      container.innerHTML =
      "";

      return;
    }

    renderCertificates();

    statusBox.innerText =
    "登頂記念が " +
    historyItems.length +
    " 件あります。";

  }catch(error){
    statusBox.innerText =
    "データの読み込みに失敗しました。";

    container.innerHTML =
    "";
  }
}

function renderCertificates(){
  const container =
  document.getElementById("certificate-container");

  container.innerHTML =
  "";

  historyItems.forEach(function(item,index){
    const card =
    document.createElement("div");

    card.className =
    "certificate-card";

    const climbCount =
    escapeHtml(item.climbCount);

    const serialNo =
    escapeHtml(item.serialNo);

    const imageName =
    escapeHtml(item.imageName);

    const lastDate =
    escapeHtml(formatDate(item.lastDate));

    const imageUrl =
    escapeHtml(normalizeImageUrl(item.imageUrl));

    card.innerHTML =
    '<img src="' +
    imageUrl +
    '" alt="' +
    imageName +
    '" onerror="this.src=\'ogp-certificate.jpg\'">' +

    '<h3 class="certTitle">' +
    imageName +
    '</h3>' +

    '<p class="certInfo">' +
    '第' +
    climbCount +
    '回登頂記念' +
    '<br>' +
    'No.' +
    serialNo +
    '<br>' +
    '日付: ' +
    lastDate +
    '</p>' +

    '<div class="cardBtnGrid">' +

    '<a class="linkBtn greenBtn" href="' +
    escapeHtml(buildCertificateUrl(item)) +
    '">記念証を開く</a>' +

    '<a class="linkBtn goldBtn" href="' +
    imageUrl +
    '" target="_blank" rel="noopener">画像を開く・保存</a>' +

    '<button class="btn grayBtn" onclick="copyCertificatePost(' +
    index +
    ')">投稿文コピー</button>' +

    '<button class="btn facebookBtn" onclick="shareCertificateBook(' +
    index +
    ',\'facebook\')">Facebookで共有</button>' +

    '<button class="btn lineBtn" onclick="shareCertificateBook(' +
    index +
    ',\'line\')">LINEで送る</button>' +

    '<button class="btn xBtn" onclick="shareCertificateBook(' +
    index +
    ',\'x\')">Xで投稿</button>' +

    '</div>';

    container.appendChild(card);
  });
}

function buildCertificateUrl(item){
  const params =
  new URLSearchParams();

  params.set(
    "userId",
    item.userId || currentUserId
  );

  params.set(
    "climbCount",
    item.climbCount
  );

  params.set(
    "serialNo",
    item.serialNo
  );

  params.set(
    "v",
    Date.now()
  );

  return CERTIFICATE_PAGE +
  "?" +
  params.toString();
}

function buildShareUrl(item){
  const params =
  new URLSearchParams();

  params.set(
    "mode",
    "shareCertificateBook"
  );

  params.set(
    "userId",
    item.userId || currentUserId
  );

  params.set(
    "climbCount",
    item.climbCount
  );

  params.set(
    "serialNo",
    item.serialNo
  );

  return GAS_URL +
  "?" +
  params.toString();
}

function buildShareText(item){
  const lines =
  [];

  lines.push(
    "田子山富士168の縁プロジェクトの登頂記念です。"
  );

  lines.push(
    item.imageName
  );

  lines.push(
    "第" + item.climbCount + "回登頂記念"
  );

  lines.push(
    "No." + item.serialNo
  );

  if(item.lastDate){
    lines.push(
      formatDate(item.lastDate)
    );
  }

  lines.push(
    "#田子山富士"
  );

  lines.push(
    "#168の縁プロジェクト"
  );

  return lines.join("\n");
}

async function copyCertificatePost(index){
  const item =
  historyItems[index];

  if(!item){
    alert("登頂記念が見つかりません。");
    return;
  }

  const text =
  buildShareText(item) +
  "\n" +
  buildShareUrl(item);

  try{
    await copyText(text);
    alert("投稿文とリンクをコピーしました。");
  }catch(error){
    alert("コピーできませんでした。");
  }
}

async function shareCertificateBook(index,type){
  const item =
  historyItems[index];

  if(!item){
    alert("登頂記念が見つかりません。");
    return;
  }

  const url =
  buildShareUrl(item);

  const text =
  buildShareText(item);

  if(type === "facebook"){
    try{
      await copyText(text + "\n" + url);
    }catch(e){}

    location.href =
    "https://www.facebook.com/sharer/sharer.php?u=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "line"){
    location.href =
    "https://social-plugins.line.me/lineit/share?url=" +
    encodeURIComponent(url);

    return;
  }

  if(type === "x"){
    location.href =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(text) +
    "&url=" +
    encodeURIComponent(url);

    return;
  }
}

async function getJson(url){
  try{
    return await fetchJson(url,12000);
  }catch(error){
    return await jsonp(url,15000);
  }
}

async function fetchJson(url,timeoutMs){
  const controller =
  new AbortController();

  const timer =
  setTimeout(function(){
    controller.abort();
  },timeoutMs || 12000);

  try{
    const res =
    await fetch(
      url,
      {
        method:"GET",
        cache:"no-store",
        signal:controller.signal
      }
    );

    const text =
    await res.text();

    if(!res.ok){
      throw new Error("通信エラーが発生しました");
    }

    try{
      return JSON.parse(text);
    }catch(e){}

    const match =
    text.match(/^[\s\S]*?\(([\s\S]*)\)[\s;]*$/);

    if(match && match[1]){
      return JSON.parse(match[1]);
    }

    throw new Error("データを読み込めませんでした");

  }finally{
    clearTimeout(timer);
  }
}

function jsonp(url,timeoutMs){
  return new Promise(function(resolve,reject){
    const callbackName =
    "__tagoyamaBookCallback_" +
    Date.now() +
    "_" +
    Math.floor(Math.random() * 100000);

    const sep =
    url.indexOf("?") >= 0
    ? "&"
    : "?";

    const script =
    document.createElement("script");

    let done =
    false;

    const timer =
    setTimeout(function(){
      cleanup();

      reject(
        new Error("読み込みが時間切れになりました")
      );
    },timeoutMs || 15000);

    function cleanup(){
      if(done){
        return;
      }

      done =
      true;

      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(e){
        window[callbackName] =
        undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }

    window[callbackName] =
    function(data){
      cleanup();
      resolve(data);
    };

    script.onerror =
    function(){
      cleanup();

      reject(
        new Error("JSONP読み込みに失敗しました")
      );
    };

    script.src =
    url +
    sep +
    "callback=" +
    encodeURIComponent(callbackName);

    document.body.appendChild(script);
  });
}

function normalizeImageUrl(value){
  let url =
  getString(value);

  if(!url){
    return "";
  }

  url =
  url
  .replace(/\\u003d/g,"=")
  .replace(/\\u0026/g,"&")
  .replace(/\\\//g,"/")
  .replace(/&amp;/g,"&")
  .replace(/[),.;]+$/g,"")
  .trim();

  if(url.indexOf("data:image") === 0){
    return url;
  }

  if(url.indexOf("drive.google.com/thumbnail") >= 0){
    return url;
  }

  let match =
  url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);

  if(match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1600";
  }

  match =
  url.match(/[?&]id=([^&]+)/);

  if(url.indexOf("drive.google.com") >= 0 && match && match[1]){
    return "https://drive.google.com/thumbnail?id=" +
    encodeURIComponent(match[1]) +
    "&sz=w1600";
  }

  return url;
}

function formatDate(value){
  value =
  getString(value);

  if(!value){
    return "";
  }

  if(value.indexOf("GMT") >= 0){
    const d =
    new Date(value);

    if(!isNaN(d.getTime())){
      return d.getFullYear() +
      "/" +
      String(d.getMonth() + 1).padStart(2,"0") +
      "/" +
      String(d.getDate()).padStart(2,"0");
    }
  }

  return value
  .replace("T15:00:00.000Z","")
  .replace("T00:00:00.000Z","")
  .replace(/-/g,"/");
}

async function copyText(text){
  text =
  getString(text);

  if(navigator.clipboard && navigator.clipboard.writeText){
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea =
  document.createElement("textarea");

  textarea.value =
  text;

  textarea.setAttribute("readonly","readonly");
  textarea.style.position =
  "fixed";
  textarea.style.left =
  "-9999px";
  textarea.style.top =
  "0";

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  const ok =
  document.execCommand("copy");

  document.body.removeChild(textarea);

  if(!ok){
    throw new Error("コピーできませんでした");
  }
}

function escapeHtml(value){
  return getString(value)
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;")
  .replace(/'/g,"&#039;");
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}
</script>

</body>
