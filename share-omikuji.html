  <style>
    * {
      box-sizing: border-box;

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 225, 110, 0.18), rgba(0, 0, 0, 0) 36%),

      color: #fff7ca;
      font-family:
        -apple-system,
        BlinkMacSystemFont,

    }

    body {
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .wrap {
      width: 100%;

      margin: 0 auto;

    .logoBox {

    .siteTitle {

    .cardTitle {

    .omikujiWrap {

    .omikujiImage {
      display: block;

    .resultOverlay {
      position: absolute;
      left: 5.5%;

        0 0 18px rgba(255, 210, 80, 0.16);

    .fortuneText {
      margin: 0 0 8px;
      font-size: clamp(34px, 10vw, 72px);

        0 4px 4px rgba(0, 0, 0, 0.92),
        0 0 18px rgba(255, 210, 80, 0.24);
    }

    .titleText {
      margin: 0 0 10px;
      font-size: clamp(24px, 7vw, 48px);
      line-height: 1.22;

    }

    .messageText {
      margin: 0;
      font-size: clamp(18px, 5vw, 32px);
      line-height: 1.45;

      white-space: pre-wrap;
    }

    .notice {
      margin: 18px 0 0;
      padding: 20px 16px;
      border-radius: 24px;
      border: 2px solid rgba(214, 183, 60, 0.58);
      background: rgba(10, 10, 10, 0.78);
      color: #fff7ca;
      text-align: center;
      font-size: clamp(18px, 5vw, 29px);
      line-height: 1.65;
      font-weight: 900;
      white-space: pre-wrap;
    }

    .btnArea {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .btn,
    .linkBtn {
      width: 100%;
      min-height: 70px;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: clamp(20px, 5.5vw, 34px);
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      box-shadow:
        0 7px 0 rgba(0, 0, 0, 0.32),
        0 13px 22px rgba(0, 0, 0, 0.34);
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active,
    .linkBtn:active {
      transform: translateY(3px);
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.32),
        0 8px 14px rgba(0, 0, 0, 0.32);
    }

    .goldBtn {
      color: #271400;
      background: linear-gradient(180deg, #fff1a4 0%, #ffd84d 48%, #c89217 100%);
    }

    .greenBtn {

    .blueBtn {
      background: linear-gradient(180deg, #2e83ff 0%, #0b4fc4 100%);
    }

    .blackBtn {

    .footer {
      margin: 28px 0 0;

    }

    @media (max-width: 420px) {
      .wrap {
        padding-left: 12px;

      }

      .card {
        border-radius: 26px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .btn,
      .linkBtn {
        min-height: 66px;
        border-radius: 22px;
      }

      .logoBox {
        width: 122px;
        height: 122px;
      }

<body>
  <div class="wrap">

    <header class="hero">
      <div class="logoBox">
        <img
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
          alt="田子山富士"
          onerror="this.style.display='none'"
        >
      </div>

      <h1 class="siteTitle">田子山富士<br>開運おみくじ</h1>
      <p class="siteSub">田子山富士 168の縁プロジェクト</p>
    </header>

    <section class="card">
      <h2 class="cardTitle">開運おみくじ</h2>

      <p class="lead">
        田子山富士のご縁を、<br>
        みなさんにもおすそ分けします。
      </p>

      <div class="omikujiWrap">
        <img
          id="omikujiImage"
          class="omikujiImage"
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-omikuji.jpg?v=20260704-omikuji"
          alt="田子山富士 開運おみくじ"
          onerror="handleImageError()"
        >

        <div class="resultOverlay">
          <p class="fortuneText" id="fortuneText">おみくじ</p>
          <p class="titleText" id="titleText">今日の運勢</p>
          <p class="messageText" id="messageText">田子山富士のご縁を、みなさんにもおすそ分けします。</p>
        </div>
      </div>

      <div class="notice" id="noticeBox">
        田子山富士の開運おみくじです。
      </div>

      <div class="btnArea">
        <button class="btn blueBtn" type="button" onclick="postFacebook()">
          Facebookに投稿
        </button>

        <button class="btn greenBtn" type="button" onclick="sendLine()">
          LINEで送る
        </button>

        <button class="btn blackBtn" type="button" onclick="postX()">
          Xで投稿
        </button>

        <button class="btn blueBtn" type="button" onclick="copyShareLink()">
          リンクをコピー
        </button>

        <a class="linkBtn goldBtn" id="omikujiLink" href="omikuji.html">
          おみくじを開く
        </a>

        <a class="linkBtn blackBtn" id="topLink" href="index.html">
          トップへ戻る
        </a>
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      開運おみくじ
    </footer>
  </div>

  <script>
    const SHARE_OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/share-omikuji.html";

    const OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

    const HOME_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/index.html";

    const FALLBACK_LOGO =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png";

    const FALLBACK_OGP =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/ogp-omikuji.jpg?v=20260704-omikuji";

    let shareData = {
      userId: "",
      result: "",
      title: "",
      message: "",
      imageUrl: FALLBACK_OGP
    };

    document.addEventListener("DOMContentLoaded", function() {
      initShareOmikuji();
    });

    function initShareOmikuji() {
      shareData = readShareParams();
      renderShareOmikuji(shareData);
      setLinks(shareData);
    }

    function readShareParams() {
      const params = new URLSearchParams(window.location.search);

      const userId = getFirst(
        params.get("u"),
        params.get("userId"),
        params.get("uid"),
        params.get("id")
      );

      const result = getFirst(
        params.get("r"),
        params.get("result"),
        params.get("fortune"),
        params.get("unsei")
      );

      const title = getFirst(
        params.get("t"),
        params.get("title"),
        params.get("name")
      );

      const message = getFirst(
        params.get("m"),
        params.get("message"),
        params.get("text"),
        params.get("body")
      );

      const imgid = getFirst(
        params.get("imgid"),
        params.get("imageId"),
        params.get("driveId")
      );

      const rawImageUrl = getFirst(
        params.get("img"),
        params.get("image"),
        params.get("imageUrl"),
        params.get("url")
      );

      let imageUrl = "";

      if (imgid) {
        imageUrl =
          "https://lh3.googleusercontent.com/d/" +
          encodeURIComponent(imgid) +
          "=w2000";
      } else if (rawImageUrl) {
        imageUrl = normalizeImageUrl(rawImageUrl);
      } else {
        imageUrl = FALLBACK_OGP;
      }

      return {
        userId: userId,
        result: result || "おみくじ",
        title: title || "今日の運勢",
        message: message || "田子山富士のご縁を、みなさんにもおすそ分けします。",
        imageUrl: imageUrl || FALLBACK_OGP
      };
    }

    function renderShareOmikuji(data) {
      const fortuneText = document.getElementById("fortuneText");
      const titleText = document.getElementById("titleText");
      const messageText = document.getElementById("messageText");
      const image = document.getElementById("omikujiImage");
      const notice = document.getElementById("noticeBox");

      if (fortuneText) {
        fortuneText.innerText = data.result || "おみくじ";
      }

      if (titleText) {
        titleText.innerText = data.title || "今日の運勢";
      }

      if (messageText) {
        messageText.innerText =
          data.message ||
          "田子山富士のご縁を、みなさんにもおすそ分けします。";
      }

      if (image) {
        image.src = data.imageUrl || FALLBACK_OGP;
      }

      if (notice) {
        notice.innerText = makeShareText(data);
      }
    }

    function setLinks(data) {
      const omikujiLink = document.getElementById("omikujiLink");
      const topLink = document.getElementById("topLink");

      if (omikujiLink) {
        omikujiLink.href =
          data.userId
            ? OMIKUJI_PAGE + "?userId=" + encodeURIComponent(data.userId)
            : OMIKUJI_PAGE;
      }

      if (topLink) {
        topLink.href =
          data.userId
            ? HOME_PAGE + "?userId=" + encodeURIComponent(data.userId)
            : HOME_PAGE;
      }
    }

    function buildShareUrl(data) {
      data = data || shareData;

      const params = new URLSearchParams();

      if (data.userId) {
        params.set("u", data.userId);
      }

      if (data.result) {
        params.set("r", data.result);
      }

      if (data.title) {
        params.set("t", data.title);
      }

      if (data.message) {
        params.set("m", data.message);
      }

      const driveId = getDriveId(data.imageUrl);

      if (driveId) {
        params.set("imgid", driveId);
      }

      params.set("v", "20260704");

      return SHARE_OMIKUJI_PAGE + "?" + params.toString();
    }

    function makeShareText(data) {
      data = data || shareData;

      let text = "田子山富士 開運おみくじ";

      if (data.result) {
        text += "\n" + data.result;
      }

      if (data.title) {
        text += "\n" + data.title;
      }

      if (data.message) {
        text += "\n" + data.message;
      } else {
        text += "\n田子山富士のご縁を、みなさんにもおすそ分けします。";
      }

      return text;
    }

    function postFacebook() {
      const url = buildShareUrl(shareData);

      const shareUrl =
        "https://www.facebook.com/sharer/sharer.php?u=" +
        encodeURIComponent(url);

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    function sendLine() {
      const url = buildShareUrl(shareData);
      const text = makeShareText(shareData) + "\n" + url;

      const shareUrl =
        "https://social-plugins.line.me/lineit/share?url=" +
        encodeURIComponent(url) +
        "&text=" +
        encodeURIComponent(text);

      location.href = shareUrl;
    }

    function postX() {
      const url = buildShareUrl(shareData);

      const shareUrl =
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(makeShareText(shareData)) +
        "&url=" +
        encodeURIComponent(url);

      window.open(shareUrl, "_blank", "noopener,noreferrer");
    }

    async function copyShareLink() {
      const text = makeShareText(shareData) + "\n" + buildShareUrl(shareData);

      try {
        await navigator.clipboard.writeText(text);
        alert("おみくじのリンクをコピーしました。");
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = text;
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.focus();
        area.select();
        document.execCommand("copy");
        area.remove();
        alert("おみくじのリンクをコピーしました。");
      }
    }

    function handleImageError() {
      const image = document.getElementById("omikujiImage");

      if (!image) {
        return;
      }

      if (image.src !== FALLBACK_LOGO) {
        image.src = FALLBACK_LOGO;
      }
    }

    function normalizeImageUrl(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      if (
        value.indexOf("data:image") === 0 ||
        value.indexOf("blob:") === 0
      ) {
        return value;
      }

      const driveId = getDriveId(value);

      if (driveId) {
        return "https://lh3.googleusercontent.com/d/" +
          encodeURIComponent(driveId) +
          "=w2000";
      }

      return value;
    }

    function getDriveId(url) {
      const value = getString(url);

      if (!value) {
        return "";
      }

      let match = value.match(/\/file\/d\/([^/]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/[?&]id=([^&]+)/);

      if (match && match[1]) {
        return match[1];
      }

      match = value.match(/\/d\/([a-zA-Z0-9_-]{20,})/);

      if (match && match[1]) {
        return match[1];
      }

      if (/^[a-zA-Z0-9_-]{20,}$/.test(value)) {
        return value;
      }

      return "";
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }

    function getFirst() {
      for (let i = 0; i < arguments.length; i++) {
        const value = getString(arguments[i]);

        if (value) {
          return value;
        }
      }

      return "";
    }

    window.postFacebook = postFacebook;
    window.sendLine = sendLine;
    window.postX = postX;
    window.copyShareLink = copyShareLink;
  </script>
</body>
</html>
