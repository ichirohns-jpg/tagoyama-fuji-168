    .cardTitle {

      width: 100%;

      border-radius: 26px;

      background: linear-gradient(180deg, #323232 0%, #050505 100%);

      .linkBtn {
        min-height: 66px;

<body>
  <div class="wrap">
    <header class="hero">
      <div class="logoBox">
        <img
          src="logo.png"
          alt="田子山富士"
          onerror="this.onerror=null; this.src='https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png';"
        >
      </div>

      <h1 class="siteTitle">田子山富士<br>開運おみくじ</h1>
      <div class="siteSub">田子山富士 168の縁プロジェクト</div>
    </header>

    <section class="card">
      <h2 class="cardTitle">おみくじ結果</h2>

      <div class="resultImageBox" id="resultImageBox">
        <img
          id="resultImage"
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji-atari.jpg?v=20260702-atari-ogp"
          alt="おみくじ画像"
        >
      </div>

      <p class="resultText" id="resultText">
田子山富士のご縁を、みなさんにもおすそ分けします。
      </p>

      <div class="btnArea">
        <a class="linkBtn blackBtn" href="index.html">
          トップへ戻る
        </a>
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      開運おみくじ
    </footer>
  </div>

  <script>
    const DEFAULT_IMAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji-atari.jpg?v=20260702-atari-ogp";

    window.addEventListener("load", initShareOmikuji);

    function initShareOmikuji() {
      const data = readShareParams();

      renderSharePage(data);
    }

    function readShareParams() {
      const p = new URLSearchParams(location.search);

      const imgid = getString(p.get("imgid"));
      const result = getString(p.get("r")) || getString(p.get("result")) || "開運おみくじ";

      const imageUrl = imgid
        ? "https://drive.google.com/thumbnail?id=" + encodeURIComponent(imgid) + "&sz=w1600"
        : DEFAULT_IMAGE;

      return {
        result: result,
        imageUrl: imageUrl
      };
    }

    function renderSharePage(data) {
      const img = document.getElementById("resultImage");
      const text = document.getElementById("resultText");

      if (img) {
        img.onerror = function () {
          img.onerror = null;
          img.src = DEFAULT_IMAGE;
        };

        img.src = data.imageUrl || DEFAULT_IMAGE;
      }

      if (text) {
        text.innerText =
          "田子山富士 開運おみくじ\n" +
          "結果：" + data.result + "\n" +
          "田子山富士のご縁を、みなさんにもおすそ分けします。";
      }
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }
  </script>
</body>
