<body>

<div class="wrap">

<div class="card">

<div style="text-align:center;">
<div class="label">
田子山富士168の縁プロジェクト
</div>
</div>

<h1 class="title" id="title">
田子山富士おみくじ
</h1>

<div class="imageBox hidden" id="imageBox">
<img id="omikujiImage" src="" alt="田子山富士おみくじ画像">
</div>

<div class="message" id="message">
おみくじ結果を読み込んでいます。
</div>

<div class="date" id="date">
--
</div>

<div class="status" id="status">
少しお待ちください。
</div>

<div class="btnArea">

<button class="btn goldBtn hidden" id="shareImageBtn" onclick="shareImage()">
画像を共有する
</button>

<a class="btn greenBtn" id="openDxBtn" href="https://ichirohns-jpg.github.io/tagoyama-fuji-168/?open=omikuji">
田子山富士DXを開く
</a>

<a class="btn blackBtn" href="https://ichirohns-jpg.github.io/tagoyama-fuji-168/">
トップへ戻る
</a>

</div>

</div>

<div class="footer">
田子山富士 168の縁プロジェクト<br>
おみくじ結果
</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzvMzzESm9atr6QWKvFwVlVMFYSAsj_oF0ZTCE7L0ojrX1VJhRWGaoLCD1Judga8vSb/exec";

const HOME_PAGE =
"https://ichirohns-jpg.github.io/tagoyama-fuji-168/";

let currentUserId =
"";

let latestImageDataUrl =
"";

let latestImageUrl =
"";

let latestFile =
null;

window.addEventListener(
"load",
init
);

async function init(){

  currentUserId =
  getUserIdFromUrl();

  const openDxBtn =
  document.getElementById("openDxBtn");

  if(currentUserId){

    openDxBtn.href =
    HOME_PAGE +
    "?open=omikuji&userId=" +
    encodeURIComponent(currentUserId) +
    "&v=" +
    Date.now();

  }

  if(!currentUserId){

    showError(
      "おみくじ結果を表示できません。",
      "userId がありません。田子山富士DXから開いてください。"
    );

    return;

  }

  await loadOmikuji();

}

function getUserIdFromUrl(){

  const params =
  new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("id") ||
    params.get("uid") ||
    ""
  );

}

async function loadOmikuji(){

  const titleEl =
  document.getElementById("title");

  const messageEl =
  document.getElementById("message");

  const dateEl =
  document.getElementById("date");

  const statusEl =
  document.getElementById("status");

  const imageBox =
  document.getElementById("imageBox");

  const img =
  document.getElementById("omikujiImage");

  const shareBtn =
  document.getElementById("shareImageBtn");

  try{

    const data =
    await fetchJson(
      GAS_URL +
      "?mode=omikuji" +
      "&userId=" +
      encodeURIComponent(currentUserId) +
      "&t=" +
      Date.now()
    );

    const result =
    data.result ||
    data.omikuji ||
    data;

    if(!data.success){

      throw new Error(data.message || "おみくじ結果を取得できませんでした");

    }

    const isHit =
    data.hit === true ||
    data.isHit === true ||
    result.hit === true ||
    result.isHit === true ||
    result.type === "hit" ||
    data.type === "hit";

    titleEl.innerText =
    result.title ||
    data.title ||
    (
      isHit ?
      "大当たり" :
      "田子山富士おみくじ"
    );

    messageEl.innerText =
    result.message ||
    data.message ||
    (
      isHit ?
      "おめでとうございます！\n当たりです。\n田子山富士でご縁をいただきました。" :
      "田子山富士のおみくじ結果です。"
    );

    dateEl.innerText =
    todayText();

    latestImageDataUrl =
    getString(
      result.imageDataUrl ||
      data.imageDataUrl ||
      result.imageDataURL ||
      data.imageDataURL ||
      ""
    );

    latestImageUrl =
    getString(
      result.imageUrl ||
      data.imageUrl ||
      result.imageURL ||
      data.imageURL ||
      ""
    );

    const imageSource =
    latestImageDataUrl ||
    latestImageUrl;

    if(imageSource){

      img.src =
      imageSource;

      imageBox.classList.remove("hidden");

      shareBtn.classList.remove("hidden");

      statusEl.innerText =
      "このページは、あなたのおみくじ結果です。";

    }else{

      statusEl.innerText =
      "おみくじ結果は取得できましたが、画像がありません。";

    }

  }catch(err){

    showError(
      "おみくじ結果を表示できません。",
      err.message || "時間をおいてお試しください。"
    );

  }

}

async function shareImage(){

  try{

    await prepareFile();

    if(!latestFile){
      throw new Error("画像を準備できませんでした");
    }

    if(!navigator.share){

      alert("この端末では画像共有ができません。画像を長押しして保存してください。");

      return;

    }

    const data =
    {
      files:[latestFile],
      title:"田子山富士おみくじ",
      text:"田子山富士168の縁プロジェクトのおみくじ結果です。"
    };

    if(
      navigator.canShare &&
      !navigator.canShare({files:[latestFile]})
    ){

      alert("この端末では画像ファイル共有ができません。画像を長押しして保存してください。");

      return;

    }

    await navigator.share(data);

  }catch(e){

    alert("画像共有を開けませんでした。画像を長押しして保存してください。");

  }

}

async function prepareFile(){

  if(latestFile){
    return latestFile;
  }

  if(latestImageDataUrl){

    latestFile =
    dataUrlToFile(
      latestImageDataUrl,
      "tagoyama-omikuji.png"
    );

    return latestFile;

  }

  if(latestImageUrl){

    const res =
    await fetch(latestImageUrl,{
      cache:"no-store"
    });

    if(!res.ok){
      throw new Error("画像取得に失敗しました");
    }

    const blob =
    await res.blob();

    latestFile =
    new File(
      [blob],
      "tagoyama-omikuji.png",
      {
        type:blob.type || "image/png"
      }
    );

    return latestFile;

  }

  throw new Error("画像がありません");

}

function dataUrlToFile(dataUrl,fileName){

  const parts =
  dataUrl.split(",");

  const header =
  parts[0] || "";

  const base64 =
  parts[1] || "";

  const mimeMatch =
  header.match(/data:(.*?);base64/);

  const mime =
  mimeMatch && mimeMatch[1]
  ? mimeMatch[1]
  : "image/png";

  const binary =
  atob(base64);

  const length =
  binary.length;

  const bytes =
  new Uint8Array(length);

  for(let i=0;i<length;i++){

    bytes[i] =
    binary.charCodeAt(i);

  }

  return new File(
    [bytes],
    fileName,
    {
      type:mime
    }
  );

}

function showError(title,message){

  document.getElementById("title").innerText =
  title;

  document.getElementById("message").innerText =
  message;

  document.getElementById("date").innerText =
  todayText();

  document.getElementById("status").innerText =
  "田子山富士DXからもう一度お試しください。";

}

async function fetchJson(url){

  const res =
  await fetch(url,{
    method:"GET",
    cache:"no-store"
  });

  const text =
  await res.text();

  try{

    return JSON.parse(text);

  }catch(e){

    const m =
    text.match(/^[^(]+\((.*)\);?$/);

    if(m && m[1]){
      return JSON.parse(m[1]);
    }

    throw e;

  }

}

function todayText(){

  const d =
  new Date();

  const y =
  d.getFullYear();

  const m =
  String(d.getMonth() + 1).padStart(2,"0");

  const day =
  String(d.getDate()).padStart(2,"0");

  return y + "/" + m + "/" + day;

}

function getString(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();

}

</script>

</body>
</html>
