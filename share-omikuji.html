  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 225, 110, 0.18), rgba(0, 0, 0, 0) 36%),
        linear-gradient(180deg, #221600 0%, #070707 48%, #000000 100%);
      color: #fff7ca;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 12px 48px;
    }

    .hero {
      text-align: center;
      margin: 0 0 16px;
    }

    .logoBox {
      width: 100%;
      max-width: 620px;
      margin: 0 auto 14px;
      border-radius: 28px;
      overflow: hidden;
      border: 3px solid rgba(255, 220, 95, 0.80);
      background: #000000;
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.50),
        0 0 18px rgba(255, 210, 80, 0.22);
    }

    .logoBox img {
      display: block;
      width: 100%;
      height: auto;
    }

    .siteTitle {
      margin: 0;
      font-size: clamp(34px, 9vw, 62px);
      line-height: 1.18;
      font-weight: 900;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.92),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .siteSub {
      margin: 10px 0 0;
      font-size: clamp(18px, 5vw, 30px);
      line-height: 1.45;
      font-weight: 900;
      color: #fff3c4;
      text-shadow: 0 3px 3px rgba(0, 0, 0, 0.88);
    }

    .card {
      margin: 16px 0;
      padding: 20px 14px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(44, 28, 0, 0.92), rgba(10, 10, 10, 0.94));
      border: 2px solid rgba(255, 220, 95, 0.58);
      box-shadow:
        0 0 0 1px rgba(255, 230, 150, 0.10) inset,
        0 12px 28px rgba(0, 0, 0, 0.42);
    }

    .cardTitle {
      margin: 0 0 14px;
      font-size: clamp(30px, 8.4vw, 54px);
      font-weight: 900;
      text-align: center;
      line-height: 1.25;
      color: #ffdf72;
      text-shadow:
        0 4px 4px rgba(0, 0, 0, 0.90),
        0 0 18px rgba(255, 210, 80, 0.28);
    }

    .resultImageBox {
      width: 100%;
      margin: 18px auto 0;
      border-radius: 26px;
      overflow: hidden;
      border: 3px solid rgba(255, 220, 95, 0.78);
      background: #000000;
      box-shadow:
        0 12px 26px rgba(0, 0, 0, 0.45),
        0 0 20px rgba(255, 210, 80, 0.18);
    }

    .resultImageBox img {
      display: block;
      width: 100%;
      height: auto;
      background: #000000;
    }

    .text {
      margin: 18px 0 0;
      font-size: clamp(22px, 6vw, 36px);
      font-weight: 900;

    }

    .btnArea {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .linkBtn {
      width: 100%;
      min-height: 70px;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: clamp(20px, 5.5vw, 34px);
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      box-shadow:
        0 7px 0 rgba(0, 0, 0, 0.32),
        0 13px 22px rgba(0, 0, 0, 0.34);
      -webkit-tap-highlight-color: transparent;
    }

    .linkBtn:active {
      transform: translateY(3px);
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.32),
        0 8px 14px rgba(0, 0, 0, 0.32);
    }

    .goldBtn {
      color: #271400;
      background: linear-gradient(180deg, #fff1a4 0%, #ffd84d 48%, #c89217 100%);
    }

    .greenBtn {
      background: linear-gradient(180deg, #38e988 0%, #09b957 100%);
    }

    .blackBtn {
      background: linear-gradient(180deg, #323232 0%, #050505 100%);
    }

    .notice {
      margin: 18px 0 0;
      padding: 18px 14px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 220, 140, 0.30);
      color: #d9c886;
      font-size: clamp(16px, 4.4vw, 24px);
      font-weight: 800;
      line-height: 1.65;
      text-align: center;
    }

    .footer {
      margin: 28px 0 0;
      text-align: center;
      color: #c9b56b;
      font-weight: 800;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .wrap {
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        border-radius: 26px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .linkBtn {
        min-height: 66px;
        border-radius: 22px;
      }

<body>
  <div class="wrap">
    <header class="hero">
      <div class="logoBox">
        <img
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
          alt="田子山富士"
          onerror="this.style.display='none';"
        >
      </div>

      <h1 class="siteTitle">田子山富士<br>開運おみくじ</h1>
      <div class="siteSub">田子山富士 168の縁プロジェクト</div>
    </header>

    <section class="card">
      <h2 class="cardTitle">おみくじ結果</h2>

      <div class="resultImageBox" id="resultImageBox">
        <img id="resultImage" src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji-atari.jpg?v=20260702-atari-ogp" alt="おみくじ画像">
      </div>

      <p class="text" id="resultText">
        田子山富士168の縁プロジェクトで<br>
        開運おみくじを引きました。
      </p>

      <div class="btnArea">
        <a class="linkBtn goldBtn" id="openResultBtn" href="omikuji.html">
          おみくじ結果を開く
        </a>

        <a class="linkBtn greenBtn" id="drawBtn" href="omikuji.html">
          おみくじを引く
        </a>

        <a class="linkBtn blackBtn" href="index.html">
          トップへ戻る
        </a>
      </div>

      <div class="notice">
        画像が表示されない場合は、もう一度開いてください。
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      開運おみくじ
    </footer>
  </div>

  <script>
    const OMIKUJI_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji.html";

    const DEFAULT_IMAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/omikuji-atari.jpg?v=20260702-atari-ogp";

    window.addEventListener("load", initShareOmikuji);

    function initShareOmikuji() {
      const data = readShareParams();

      renderSharePage(data);
      updateOpenLinks(data);
    }

    function readShareParams() {
      const p = new URLSearchParams(location.search);

      const imgid = getString(p.get("imgid"));
      const n = getString(p.get("n"));
      const r = getString(p.get("r"));
      const u = getString(p.get("u"));

      const imageUrl = imgid
        ? "https://drive.google.com/thumbnail?id=" + encodeURIComponent(imgid) + "&sz=w1200"
        : DEFAULT_IMAGE;

      return {
        userId: u,
        imageNo: n,
        result: r || "開運おみくじ",
        imageUrl: imageUrl,
        imgid: imgid
      };
    }

    function renderSharePage(data) {
      const img = document.getElementById("resultImage");
      const text = document.getElementById("resultText");

      if (img) {
        img.onload = function () {};
        img.onerror = function () {
          img.src = DEFAULT_IMAGE;
        };

        img.src = data.imageUrl || DEFAULT_IMAGE;
      }

      if (text) {
        text.innerText =
          "田子山富士168の縁プロジェクトで\n" +
          data.result +
          "を引きました。";
      }
    }

    function updateOpenLinks(data) {
      const openResultBtn = document.getElementById("openResultBtn");
      const drawBtn = document.getElementById("drawBtn");

      const url = buildOmikujiResultUrl(data);

      if (openResultBtn) {
        openResultBtn.href = url;
      }

      if (drawBtn) {
        drawBtn.href =
          data.userId
            ? OMIKUJI_PAGE + "?userId=" + encodeURIComponent(data.userId)
            : OMIKUJI_PAGE;
      }
    }

    function buildOmikujiResultUrl(data) {
      const p = new URLSearchParams();

      p.set("shared", "1");

      if (data.userId) {
        p.set("userId", data.userId);
      }

      if (data.imageNo) {
        p.set("imageNo", data.imageNo);
      }

      if (data.result) {
        p.set("result", data.result);
      }

      if (data.imgid) {
        p.set("imgid", data.imgid);
      }

      p.set("v", String(Date.now()));

      return OMIKUJI_PAGE + "?" + p.toString();
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }
  </script>
</body>
