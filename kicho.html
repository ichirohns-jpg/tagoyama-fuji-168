<button
id="saveBtn"
class="btn"
onclick="saveKicho()">

記帳する

</button>

<div
id="msg"
class="message">

記帳ありがとうございました

</div>

<div class="goenBox">

<div class="goenTitle">

🌸 最近のご縁

</div>

<div id="goenList">

読込中...

</div>

</div>

<a
href="index.html"
class="homeBtn">

🏠 田子山富士へ戻る

</a>

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyJ0TePu884eFy8nfBYRjGrL6GCh8u0gfCE-L2MyytgVqa6JFj0uWQmhnucMLFnbdkOmA/exec";

let userId =
localStorage.getItem(
"tagoyamaUserId"
);

if(!userId){

userId =
"TGF-" +
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

localStorage.setItem(
"tagoyamaUserId",
userId
);

}

function saveKicho(){

const btn =
document.getElementById(
"saveBtn"
);

if(btn.disabled){
return;
}

btn.disabled = true;

btn.innerHTML =
"送信中...";

const area =
document.getElementById(
"area"
).value;

const name =
document.getElementById(
"name"
).value;

const text =
document.getElementById(
"messageText"
).value;

if(!text){

btn.disabled = false;

btn.innerHTML =
"記帳する";

alert(
"ひとことをご入力ください"
);

return;

}

fetch(
GAS_URL,
{
method:"POST",
body:JSON.stringify({
mode:"kicho",
userId:userId,
area:area,
name:name,
message:text
})
}
)
.then(
r=>r.text()
)
.then(txt=>{

btn.disabled = false;

btn.innerHTML =
"記帳する";

console.log(txt);

const data =
JSON.parse(txt);

if(!data.success){

alert(
data.error ||
"保存できませんでした"
);

return;

}

document.getElementById(
"msg"
).style.display =
"block";

document.getElementById(
"name"
).value = "";

document.getElementById(
"messageText"
).value = "";

loadGoen();

window.scrollTo({
top:0,
behavior:"smooth"
});

})
.catch(err=>{

btn.disabled = false;

btn.innerHTML =
"記帳する";

alert(
err.message
);

console.log(err);

});

}

function loadGoen(){
