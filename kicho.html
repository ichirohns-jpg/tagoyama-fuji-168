<style>

<body>
<main class="page">

<section class="card">
  <h1 class="pageTitle">参拝記帳</h1>

  <p class="lead">
    田子山富士へのご縁を<br>
    記帳できます。
  </p>

  <div class="statusBox" id="statusBox">
    ご縁の記帳をお願いします。
  </div>

  <div id="formArea" class="formArea">
    <label for="fromArea">どこから来ましたか</label>
    <select id="fromArea">
      <option value="">選択してください</option>
      <option value="志木市">志木市</option>
      <option value="朝霞市">朝霞市</option>
      <option value="新座市">新座市</option>
      <option value="和光市">和光市</option>
      <option value="富士見市">富士見市</option>
      <option value="ふじみ野市">ふじみ野市</option>
      <option value="さいたま市">さいたま市</option>
      <option value="東京都">東京都</option>
      <option value="埼玉県内">埼玉県内</option>
      <option value="その他">その他</option>
    </select>

    <label for="visitorName">お名前</label>
    <input id="visitorName" type="text" placeholder="未入力でも大丈夫です">

    <label for="visitorMessage">メッセージ</label>
    <textarea id="visitorMessage" placeholder="田子山富士への想いを書いてください"></textarea>
  </div>

  <div class="btnArea">
    <button class="btn goldBtn" id="saveBtn" type="button" onclick="saveKicho()">
      ご縁を記帳する
    </button>

    <a class="linkBtn blackBtn" id="topLink" href="index.html">
      田子山富士へ戻る
    </a>
  </div>
</section>

<footer class="footer">
  田子山富士保存会<br>
  168の縁プロジェクト
</footer>

</main>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzU9z9rY2Ii6fF921inOYUjkRZlBxsuw6yPPSPZm7UeX7jtb94699fQLCJJZz3KslG5/exec";

let currentUserId = "";

document.addEventListener("DOMContentLoaded", function(){
  initPage();
});

function initPage(){
  currentUserId = getUserIdFromUrl();

  if(currentUserId){
    localStorage.setItem("tagoyamaUserId", currentUserId);
    localStorage.setItem("tagoyamaFujiUserId", currentUserId);
  }else{
    currentUserId =
      localStorage.getItem("tagoyamaUserId") ||
      localStorage.getItem("tagoyamaFujiUserId") ||
      "";
  }

  updateLinks();
}

function getUserIdFromUrl(){
  const params = new URLSearchParams(location.search);

  return getString(
    params.get("userId") ||
    params.get("userid") ||
    params.get("uid") ||
    params.get("id") ||
    ""
  );
}

function updateLinks(){
  const topLink = document.getElementById("topLink");

  if(topLink){
    topLink.href =
      currentUserId
        ? "index.html?userId=" + encodeURIComponent(currentUserId)
        : "index.html";
  }
}

async function saveKicho(){
  const btn = document.getElementById("saveBtn");
  const oldText = btn ? btn.innerText : "";

  const area = getString(document.getElementById("fromArea").value);
  const name = getString(document.getElementById("visitorName").value);
  const message = getString(document.getElementById("visitorMessage").value);

  if(!area){
    alert("どこから来たか選んでください。");
    return;
  }

  if(!message){
    alert("メッセージを書いてください。");
    return;
  }

  if(btn){
    btn.disabled = true;
    btn.innerText = "記帳中...";
  }

  setStatus("ご縁を記帳しています。");

  try{
    const params = new URLSearchParams();
    params.set("area", area);
    params.set("from", area);
    params.set("name", name || "匿名");
    params.set("message", message);
    params.set("userId", currentUserId || "");
    params.set("t", String(Date.now()));

    await tryManyJson([
      GAS_URL + "?saveKicho=1&" + params.toString(),
      GAS_URL + "?mode=saveKicho&" + params.toString(),
      GAS_URL + "?action=saveKicho&" + params.toString(),
      GAS_URL + "?kicho=1&" + params.toString(),
      GAS_URL + "?mode=kicho&" + params.toString()
    ]);

    saveLocalKicho({
      date: todayText(),
      area: area,
      name: name || "匿名",
      message: message
    });

    document.getElementById("visitorName").value = "";
    document.getElementById("visitorMessage").value = "";

    setStatus(
      "ご縁を記帳しました。\nトップへ戻って、ご縁帳をご覧ください。"
    );

    alert("ご縁を記帳しました。");

  }catch(error){
    console.warn(error);

    saveLocalKicho({
      date: todayText(),
      area: area,
      name: name || "匿名",
      message: message
    });

    document.getElementById("visitorName").value = "";
    document.getElementById("visitorMessage").value = "";

    setStatus(
      "ご縁を記帳しました。\nトップへ戻って、ご縁帳をご覧ください。"
    );

    alert("ご縁を記帳しました。");
  }finally{
    if(btn){
      btn.disabled = false;
      btn.innerText = oldText || "ご縁を記帳する";
    }
  }
}

function saveLocalKicho(item){
  try{
    const key = "tagoyamaKichoList";
    const text = localStorage.getItem(key);
    let list = [];

    if(text){
      const parsed = JSON.parse(text);

      if(Array.isArray(parsed)){
        list = parsed;
      }
    }

    list.push(item);

    if(list.length > 20){
      list = list.slice(list.length - 20);
    }

    localStorage.setItem(key, JSON.stringify(list));
    localStorage.setItem("tagoyamaLastKicho", JSON.stringify(item));
  }catch(error){}
}

async function tryManyJson(urls){
  let lastError = null;

  for(let i = 0; i < urls.length; i++){
    try{
      const data = await getJson(urls[i]);

      if(data !== null && data !== undefined){
        return data;
      }
    }catch(error){
      lastError = error;
    }
  }

  throw lastError || new Error("通信に失敗しました。");
}

async function getJson(url){
  try{
    const res = await fetch(url, {
      method:"GET",
      cache:"no-store"
    });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    return parseJsonText(text);
  }catch(fetchError){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value = String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const start = value.indexOf("{");
    const end = value.lastIndexOf("}");

    if(start >= 0 && end > start){
      return JSON.parse(value.substring(start, end + 1));
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve, reject){
    const callbackName =
      "tagoyamaKichoCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script = document.createElement("script");
    const sep = url.indexOf("?") >= 0 ? "&" : "?";

    const timer = setTimeout(function(){
      cleanup();
      reject(new Error("JSONP timeout"));
    }, 12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src = url + sep + "callback=" + encodeURIComponent(callbackName);
    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

function setStatus(text){
  const el = document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }
}

function todayText(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");

  return y + "/" + m + "/" + day;
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

window.saveKicho = saveKicho;
</script>
</body>
