<body>
<main class="page">

<header class="hero">
  <div class="logoFrame">
    <img
      src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
      alt="田子山富士"
      onerror="this.style.display='none'"
    >
  </div>

  <h1 class="mainTitle">参拝記帳</h1>
  <p class="mainSubTitle">田子山富士 168の縁プロジェクト</p>
</header>

<section class="card">
  <h2 class="cardTitle">ご縁を記帳する</h2>

  <p class="cardText">
    田子山富士に参拝されたご縁を、<br>
    ひとこと残してください。
  </p>

  <div class="formBox">
    <label>
      <span class="labelText">どこから来ましたか</span>
      <select class="select" id="areaInput">
        <option value="">選んでください</option>
        <option value="志木市">志木市</option>
        <option value="朝霞市">朝霞市</option>
        <option value="新座市">新座市</option>
        <option value="和光市">和光市</option>
        <option value="富士見市">富士見市</option>
        <option value="ふじみ野市">ふじみ野市</option>
        <option value="さいたま市">さいたま市</option>
        <option value="埼玉県内">埼玉県内</option>
        <option value="東京都">東京都</option>
        <option value="その他">その他</option>
      </select>
    </label>

    <label>
      <span class="labelText">お名前・ニックネーム</span>
      <input
        class="input"
        id="nameInput"
        type="text"
        maxlength="40"
        placeholder="匿名でも大丈夫です"
      >
    </label>

    <label>
      <span class="labelText">メッセージ</span>
      <textarea
        class="textarea"
        id="messageInput"
        maxlength="300"
        placeholder="参拝のひとこと、ご縁の記録など"
      ></textarea>
    </label>
  </div>

  <div class="statusBox" id="statusBox">
    記帳内容を入力してください。
  </div>

  <div class="btnArea">
    <button class="btn goldBtn" id="submitBtn" type="button" onclick="submitKicho()">
      ご縁を記帳する
    </button>

    <a class="linkBtn blackBtn" id="topLink" href="index.html">
      トップへ戻る
    </a>
  </div>
</section>

<footer class="footer">
  田子山富士 168の縁プロジェクト<br>
  参拝記帳
</footer>

</main>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbxJh9lYhtQsTYASTa8jGvDDktcm9DeuMQcDn6B66q63FTReIFjBJuQikbY_Tt2iZ18/exec";

let currentUserId = "";

window.addEventListener("load", initKicho);

function initKicho(){
  currentUserId = getUserId();
  updateLinks();
}

function getUserId(){
  const params = new URLSearchParams(location.search);

  const value =
    getString(params.get("userId")) ||
    getString(params.get("userid")) ||
    getString(params.get("uid")) ||
    getString(localStorage.getItem("tagoyamaUserId")) ||
    getString(localStorage.getItem("tagoyamaFujiUserId"));

  if(value){
    localStorage.setItem("tagoyamaUserId", value);
    localStorage.setItem("tagoyamaFujiUserId", value);
  }

  return value;
}

function updateLinks(){
  const topLink =
    document.getElementById("topLink");

  const query =
    currentUserId
      ? "?userId=" + encodeURIComponent(currentUserId)
      : "";

  if(topLink){
    topLink.href =
      "index.html" + query;
  }
}

async function submitKicho(){
  const area =
    getString(
      document.getElementById("areaInput").value
    );

  const name =
    getString(
      document.getElementById("nameInput").value
    ) || "匿名";

  const message =
    getString(
      document.getElementById("messageInput").value
    );

  if(!area){
    setStatus("どこから来たかを選んでください。");
    return;
  }

  if(!message){
    setStatus("メッセージを書いてください。");
    return;
  }

  const btn =
    document.getElementById("submitBtn");

  const oldText =
    btn ? btn.innerText : "";

  if(btn){
    btn.disabled = true;
    btn.innerText = "記帳しています...";
  }

  setStatus("ご縁を記帳しています。");

  try{
    const params =
      new URLSearchParams();

    params.set("mode","saveKicho");
    params.set("area",area);
    params.set("name",name);
    params.set("message",message);

    if(currentUserId){
      params.set("userId",currentUserId);
    }

    params.set("t",Date.now());

    const data =
      await getJson(
        GAS_URL + "?" + params.toString()
      );

    if(!data || data.success === false){
      throw new Error(
        data && data.message
          ? data.message
          : "記帳できませんでした。"
      );
    }

    setStatus("ご縁を記帳しました。ありがとうございました。");

    document.getElementById("messageInput").value = "";

  }catch(error){
    console.warn(error);
    setStatus(
      error && error.message
        ? error.message
        : "記帳できませんでした。時間をおいて再度お試しください。"
    );
  }finally{
    if(btn){
      btn.disabled = false;
      btn.innerText = oldText || "ご縁を記帳する";
    }
  }
}

async function getJson(url){
  try{
    const res =
      await fetch(url,{
        method:"GET",
        cache:"no-store"
      });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text =
      await res.text();

    return parseJsonText(text);
  }catch(error){
    return await getJsonp(url);
  }
}

function parseJsonText(text){
  const value =
    String(text || "").trim();

  if(!value){
    throw new Error("empty response");
  }

  try{
    return JSON.parse(value);
  }catch(error){
    const objectStart =
      value.indexOf("{");

    const objectEnd =
      value.lastIndexOf("}");

    if(objectStart >= 0 && objectEnd > objectStart){
      return JSON.parse(
        value.substring(objectStart,objectEnd + 1)
      );
    }

    throw error;
  }
}

function getJsonp(url){
  return new Promise(function(resolve,reject){
    const callbackName =
      "tagoyamaKichoCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 1000000);

    const script =
      document.createElement("script");

    const sep =
      url.indexOf("?") >= 0
        ? "&"
        : "?";

    const timer =
      setTimeout(function(){
        cleanup();
        reject(new Error("JSONP timeout"));
      },12000);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error("JSONP error"));
    };

    script.src =
      url +
      sep +
      "callback=" +
      encodeURIComponent(callbackName);

    document.body.appendChild(script);

    function cleanup(){
      clearTimeout(timer);

      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }
  });
}

function setStatus(text){
  const el =
    document.getElementById("statusBox");

  if(el){
    el.innerText = text;
  }
}

function getString(value){
  if(value === null || value === undefined){
    return "";
  }

  return String(value).trim();
}

window.submitKicho = submitKicho;
</script>
</body>
