<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>ご縁帳</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
background:
linear-gradient(
180deg,
#fdfcf7,
#f7f2e5
);
color:#333;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
border-radius:24px;
padding:24px;
box-shadow:
0 8px 24px
rgba(0,0,0,.08);
}

.title{
font-size:34px;
font-weight:900;
text-align:center;
color:#b8860b;
margin-bottom:10px;
}

.sub{
text-align:center;
font-size:16px;
line-height:1.8;
color:#666;
margin-bottom:25px;
}

label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:700;
color:#444;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:14px;
font-size:16px;
background:#fffdf8;
}

textarea{
min-height:140px;
resize:vertical;
}

.btn{
width:100%;
margin-top:20px;
border:none;
border-radius:16px;
padding:18px;
font-size:20px;
font-weight:bold;
background:#d4af37;
color:#000;
cursor:pointer;
}

.btn:disabled{
opacity:.6;
cursor:not-allowed;
}

.message{
display:none;
margin-top:18px;
padding:16px;
background:#eef9ef;
border-radius:14px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.goenBox{
margin-top:40px;
}

.goenTitle{
font-size:28px;
font-weight:900;
color:#b8860b;
text-align:center;
margin-bottom:10px;
}

.goenSub{
text-align:center;
font-size:15px;
line-height:1.8;
color:#666;
margin-bottom:25px;
}

.goenCard{
background:
linear-gradient(
180deg,
#fffefb,
#fff8ea
);
border-left:6px solid #d4af37;
border-radius:18px;
padding:18px;
margin-bottom:16px;
box-shadow:
0 4px 12px
rgba(0,0,0,.06);
}

<div class="goenBox">

<div class="goenHead">

<div class="goenTitle">

🌸 最近のご縁

</div>

<div class="goenSub">

皆さまから寄せられた温かい言葉です。<br>

どうぞごゆっくりご覧ください。

</div>

</div>

<div
id="goenList"
class="goenList">

読込中...

</div>

<a
href="goen-archive.html"
class="archiveBtn">

📚 過去のご縁帳を見る

</a>

<a
href="index.html"
class="homeBtn">

🏠 田子山富士へ戻る

</a>

</div>

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyJ0TePu884eFy8nfBYRjGrL6GCh8u0gfCE-L2MyytgVqa6JFj0uWQmhnucMLFnbdkOmA/exec";

let userId =
localStorage.getItem(
"tagoyamaUserId"
);

if(!userId){

userId =
"TGF-" +
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

localStorage.setItem(
"tagoyamaUserId",
userId
);

}

function saveKicho(){

const btn =
document.getElementById(
"saveBtn"
);

if(btn.disabled){
return;
}

btn.disabled = true;

btn.innerHTML =
"送信中...";

const area =
document.getElementById(
"area"
).value;

const name =
document.getElementById(
"name"
).value.trim() || "匿名";

const text =
document.getElementById(
"messageText"
).value.trim();

if(!area){

alert(
"地域を選択してください"
);

btn.disabled=false;

btn.innerHTML=
"🌸 ご縁を記帳する";

return;

}

if(!text){

alert(
"ひとことをご入力ください"
);

btn.disabled=false;

btn.innerHTML=
"🌸 ご縁を記帳する";

return;

}

fetch(
GAS_URL,
{
method:"POST",
body:JSON.stringify({
mode:"kicho",
userId:userId,
area:area,
name:name,
message:text
})
}
)
.then(r=>r.text())
.then(txt=>{

btn.disabled=false;

btn.innerHTML=
"🌸 ご縁を記帳する";

const data=
JSON.parse(txt);

if(!data.success){

alert(
data.error ||
"保存できませんでした"
);

return;

}

document.getElementById(
"msg"
).style.display=
"block";

document.getElementById(
"name"
).value="";

document.getElementById(
"messageText"
).value="";

loadGoen();

})
.catch(err=>{

btn.disabled=false;

btn.innerHTML=
"🌸 ご縁を記帳する";

alert(
err.message
);

});

}

function loadGoen(){

fetch(
GAS_URL +
"?mode=goen"
)
.then(r=>r.json())
.then(data=>{

const list=
document.getElementById(
"goenList"
);

if(
!data.data ||
!data.data.length
){

list.innerHTML=
"まだご縁帳はありません";

return;

}

list.innerHTML=
data.data
.slice(0,30)
.map(item=>`

<div class="goenCard">

<div class="goenArea">

🌸 ${item.area||"地域未設定"}

</div>

<div class="goenName">

👤 ${item.name||"匿名"}

</div>

<div class="goenMessage">

${item.message||""}

</div>

<div class="goenDate">

📅 ${item.date||""}

</div>

</div>

`).join("");

})
.catch(err=>{

console.log(err);

document.getElementById(
"goenList"
).innerHTML=
"読込できませんでした";

});

}

loadGoen();

</script>
