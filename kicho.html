<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>田子山富士 ご縁帳</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;

background:
linear-gradient(
180deg,
#f8f4e8,
#efe3c2,
#fdfbf6
);

color:#3f3427;

}

.wrap{

max-width:920px;

margin:auto;

padding:24px;

}

.card{

background:#fffefb;

border:4px solid #c8a84d;

border-radius:32px;

padding:32px;

box-shadow:

0 20px 40px rgba(0,0,0,.15);

}

.title{

font-family:
"Yu Mincho",
serif;

font-size:44px;

font-weight:900;

text-align:center;

color:#7d5426;

letter-spacing:6px;

}

.sub{

margin-top:18px;

text-align:center;

font-size:22px;

line-height:2;

color:#6b5846;

font-weight:bold;

}

.story{

margin-top:28px;

padding:24px;

border-radius:24px;

background:

linear-gradient(
180deg,
#fffdf5,
#fff5dd
);

border-left:10px solid #d4af37;

font-size:21px;

line-height:2.2;

color:#5b4636;

font-weight:bold;

}

.story strong{

color:#8b5a2b;

font-size:24px;

}

.formBox{

margin-top:35px;

background:#fff;

border-radius:24px;

padding:28px;

border:2px solid #ecd8a0;

}

label{

display:block;

margin-top:18px;

margin-bottom:10px;

font-size:20px;

font-weight:bold;

color:#7d5426;

}

input,
select,
textarea{

width:100%;

padding:18px;

border:2px solid #d9c89a;

border-radius:18px;

background:#fffdf8;

font-size:18px;

color:#333;

transition:.2s;

}

input:focus,
select:focus,
textarea:focus{

outline:none;

border-color:#d4af37;

box-shadow:
0 0 10px
rgba(212,175,55,.35);

}

textarea{

min-height:180px;

resize:vertical;

line-height:1.9;

}

.mainBtn{

width:100%;

margin-top:28px;

padding:22px;

border:none;

border-radius:20px;

background:

linear-gradient(
180deg,
#e6c15a,
#cda233
);

color:#000;

font-size:26px;

font-weight:900;

cursor:pointer;

box-shadow:
0 8px 20px
rgba(0,0,0,.15);

}

.mainBtn:disabled{

opacity:.6;

}

.message{

display:none;

margin-top:22px;

padding:20px;

border-radius:18px;

background:
linear-gradient(
180deg,
#eefbe9,
#dff5d8
);

font-size:22px;

font-weight:bold;

text-align:center;

line-height:1.8;

color:#2e6b2e;

}

.goenBox{

margin-top:45px;

}

.goenTitle{

text-align:center;

font-family:
"Yu Mincho",
serif;

font-size:36px;

font-weight:900;

color:#8b5a2b;

}

.goenSub{

margin-top:15px;

text-align:center;

font-size:19px;

line-height:2;

color:#6b5846;

}

.goenCard{

background:
linear-gradient(
180deg,
#fffefb,
#fff8ea
);

border:2px solid #e3c46b;

border-left:10px solid #c99a22;

border-radius:24px;

padding:24px;

margin-top:22px;

box-shadow:
0 8px 20px
rgba(0,0,0,.08);

}

.goenArea{

display:inline-block;

padding:6px 16px;

border-radius:999px;

background:#d4af37;

color:#000;

font-size:14px;

font-weight:900;

margin-bottom:15px;

}

.goenName{

font-size:26px;

font-weight:900;

color:#7d5426;

margin-bottom:14px;

}

.goenMessage{

font-size:20px;

line-height:2.2;

white-space:pre-wrap;

color:#444;

padding:18px;

border-radius:18px;

background:#fffdf8;

border:1px solid #efe0b0;

}

.goenDate{

margin-top:15px;

text-align:right;

font-size:14px;

font-weight:bold;

color:#888;

}

.archiveBtn{

display:block;

width:100%;

margin-top:30px;

padding:20px;

border-radius:20px;

text-decoration:none;

text-align:center;

background:#8b5a2b;

color:#fff;

font-size:22px;

font-weight:900;

}

.homeBtn{

display:block;

width:100%;

margin-top:18px;

padding:20px;

border-radius:20px;

text-decoration:none;

text-align:center;

background:#d4af37;

color:#000;

font-size:24px;

font-weight:900;

}

</style>

</head>

<body>

<div class="wrap">

<div class="card">

<div class="title">

🌸 ご縁帳 🌸

</div>

<div class="sub">

あなたの一言が、
次に田子山富士を訪れる人の
元気や勇気になることがあります。

</div>

<div class="story">

<strong>ご縁は、人から人へ。</strong><br><br>

今日感じたこと。<br>

嬉しかったこと。<br>

誰かに伝えたい一言。<br><br>

ここに残された言葉は、
未来に訪れる人への贈り物になります。

</div>

<div class="formBox">

<label>

お住まいの地域

</label>

<select id="area">

<option value="">

選択してください

</option>

<option>志木市</option>

<option>朝霞市</option>

<option>新座市</option>

<option>和光市</option>

<option>その他</option>

</select>

<label>

お名前（匿名可）

</label>

<input

id="name"

type="text"

placeholder="匿名でも投稿できます">

<label>

未来へ届けるひとこと

</label>

<textarea

id="messageText"

placeholder="あなたの一言が、誰かの元気や勇気になることがあります。&#10;今日感じたことを自由にお書きください。">

</textarea>

<button

id="saveBtn"

class="mainBtn"

onclick="saveKicho()">

🌸 ご縁を記帳する

</button>

<div

id="msg"

class="message">

ありがとうございました🌸<br><br>

あなたの言葉は<br>

未来に訪れる方への<br>

大切な贈り物として<br>

ご縁帳へ刻まれました。

</div>

<div class="goenBox">

<div class="goenTitle">

🌸 最近のご縁 🌸

</div>

<div class="goenSub">

皆さまから寄せられた言葉です。<br>

誰かの一言が、誰かの元気になります。<br>

どうぞごゆっくりご覧ください。

</div>

<div

id="goenList">

読込中...

</div>

<a

href="goen-archive.html"

class="archiveBtn">

📖 すべてのご縁帳を見る

</a>

<a

href="index.html"

class="homeBtn">

🏠 田子山富士へ戻る

</a>

</div>

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyJ0TePu884eFy8nfBYRjGrL6GCh8u0gfCE-L2MyytgVqa6JFj0uWQmhnucMLFnbdkOmA/exec";

let userId =
localStorage.getItem(
"tagoyamaUserId"
);

if(!userId){

userId =
"TGF-" +
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

localStorage.setItem(
"tagoyamaUserId",
userId
);

}

function saveKicho(){

const btn =
document.getElementById(
"saveBtn"
);

if(btn.disabled){
return;
}

btn.disabled=true;

btn.innerHTML=
"🌸 ご縁を記帳中...";

const area=
document.getElementById(
"area"
).value;

const name=
document.getElementById(
"name"
).value.trim() || "匿名";

const text=
document.getElementById(
"messageText"
).value.trim();

if(!area){

alert(
"地域を選択してください"
);

btn.disabled=false;

btn.innerHTML=
"🌸 ご縁を記帳する";

return;

}

if(!text){

alert(
"ひとことをご入力ください"
);

btn.disabled=false;

btn.innerHTML=
"🌸 ご縁を記帳する";

return;

}

fetch(
GAS_URL,
{
method:"POST",
body:JSON.stringify({

mode:"kicho",

userId:userId,

area:area,

name:name,

message:text

})

}
)

.then(r=>r.json())

.then(data=>{

btn.disabled=false;

btn.innerHTML=
"🌸 ご縁を記帳する";

if(!data.success){

alert(
data.error ||
"保存できませんでした"
);

return;

}

document.getElementById(
"msg"
).style.display=
"block";

document.getElementById(
"area"
).selectedIndex=0;

document.getElementById(
"name"
).value="";

document.getElementById(
"messageText"
).value="";

loadGoen();

setTimeout(function(){

document.getElementById(
"msg"
).style.display=
"none";

},3000);

})

.catch(err=>{

btn.disabled=false;

btn.innerHTML=
"🌸 ご縁を記帳する";

alert(
err.message
);

});

}

function loadGoen(){

fetch(
GAS_URL+
"?mode=goen"
)

.then(r=>r.json())

.then(data=>{

const list=
document.getElementById(
"goenList"
);

if(
!data.data ||
!data.data.length
){

list.innerHTML=
`
<div class="goenCard">

<div class="goenMessage">

🌸 あなたの言葉が、
未来に訪れる方への
最初の贈り物になります。

</div>

</div>
`;

return;

}

list.innerHTML=
data.data
.slice(0,30)
.map(item=>`

<div class="goenCard">

<div class="goenArea">

🌸 ${item.area||"地域未設定"}

</div>

<div class="goenName">

👤 ${item.name||"匿名"}

</div>

<div class="goenMessage">

${item.message||""}

</div>

<div class="goenDate">

📅 ${item.date||""}

</div>

</div>

`).join("");

})

.catch(()=>{

document.getElementById(
"goenList"
).innerHTML=

'<div class="goenCard"><div class="goenMessage">現在ご縁帳を表示できません。</div></div>';

});

}

loadGoen();

</script>

</body>
</html>
