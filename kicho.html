<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>田子山富士 ご縁帳</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;

background:
linear-gradient(
180deg,
#f6f0de,
#efe3c0,
#faf8f3
);

color:#3d3123;

}

.wrap{

max-width:920px;

margin:auto;

padding:20px;

}

.card{

background:#fffefb;

border:3px solid #d4af37;

border-radius:30px;

overflow:hidden;

box-shadow:
0 15px 35px rgba(0,0,0,.15);

}

.header{

background:
linear-gradient(
180deg,
#d8b44c,
#b88d24
);

padding:28px 20px;

text-align:center;

color:#fff;

}

.header h1{

font-size:40px;

letter-spacing:6px;

font-family:
"Yu Mincho",
serif;

margin-bottom:10px;

}

.header p{

font-size:20px;

line-height:1.8;

font-weight:bold;

}

.menu{

padding:24px;

}

.menuBtn{

width:100%;

padding:24px;

border:none;

border-radius:22px;

background:
linear-gradient(
180deg,
#e5c15d,
#c79b28
);

color:#000;

font-size:30px;

font-weight:900;

cursor:pointer;

box-shadow:
0 8px 18px rgba(0,0,0,.18);

}

.menuBtn:active{

transform:scale(.98);

}

.formBox{

display:none;

margin-top:24px;

padding:24px;

background:#fffef8;

border:2px solid #ecd8a0;

border-radius:24px;

}

label{

display:block;

margin-top:18px;

margin-bottom:10px;

font-size:20px;

font-weight:900;

color:#7d5426;

}

input,
select,
textarea{

width:100%;

padding:18px;

font-size:18px;

border:2px solid #e6d4a3;

border-radius:18px;

background:#fff;

}

textarea{

min-height:180px;

resize:vertical;

line-height:1.9;

}

.saveBtn{

width:100%;

margin-top:24px;

padding:22px;

border:none;

border-radius:20px;

background:#2ebc5a;

color:#fff;

font-size:24px;

font-weight:900;

cursor:pointer;

}

.message{

display:none;

margin-top:18px;

padding:18px;

border-radius:18px;

background:
linear-gradient(
180deg,
#eefbe9,
#dff5d8
);

font-size:20px;

text-align:center;

font-weight:900;

line-height:1.8;

color:#2d6b2d;

}

.goenBox{

padding:24px;

background:#fdfaf2;

border-top:3px solid #e5c86c;

}

.goenTitle{

font-family:
"Yu Mincho",
serif;

font-size:34px;

font-weight:900;

text-align:center;

color:#8b5a2b;

margin-bottom:10px;

}

.goenCard{

background:#fff;

border-radius:24px;

padding:24px;

margin-bottom:22px;

border-left:10px solid #d4af37;

box-shadow:
0 8px 18px rgba(0,0,0,.08);

}

.goenArea{

display:inline-block;

background:#d4af37;

color:#000;

padding:6px 14px;

border-radius:999px;

font-size:14px;

font-weight:900;

margin-bottom:14px;

}

.goenName{

font-size:26px;

font-weight:900;

color:#8b5a2b;

margin-bottom:14px;

}

.goenMessage{

font-size:20px;

line-height:2;

color:#444;

padding:16px;

background:#fffdf7;

border-radius:18px;

white-space:pre-wrap;

}

.goenDate{

margin-top:14px;

text-align:right;

font-size:14px;

font-weight:bold;

color:#888;

}

.archiveBtn{

display:block;

width:100%;

margin-top:24px;

padding:20px;

border-radius:20px;

text-decoration:none;

text-align:center;

background:
linear-gradient(
180deg,
#8b5a2b,
#6f4518
);

color:#fff;

font-size:22px;

font-weight:900;

}

.homeBtn{

display:block;

width:100%;

margin-top:16px;

padding:20px;

border-radius:20px;

text-decoration:none;

text-align:center;

background:
linear-gradient(
180deg,
#e4c45b,
#c99b26
);

color:#000;

font-size:24px;

font-weight:900;

}

.footer{

padding:22px;

text-align:center;

font-size:15px;

color:#8c7b66;

background:#faf6ea;

border-top:1px solid #ead8a3;

}

</style>

</head>

<body>

<div class="wrap">

<div class="card">

<div class="header">

<h1>

🌸 ご縁帳 🌸

</h1>

<p>

あなたの一言が<br>

次に田子山富士を訪れる人への<br>

贈り物になります。

</p>

</div>

<div class="menu">

<button

class="menuBtn"

onclick="toggleForm()">

🌸 ご縁を記帳する

</button>

<div

id="formBox"

class="formBox">

<label>

お住まいの地域

</label>

<select id="area">

<option value="">
選択してください
</option>

<option>志木市</option>

<option>朝霞市</option>

<option>新座市</option>

<option>和光市</option>

<option>その他</option>

</select>

<label>

お名前（匿名可）

</label>

<input
id="name"
type="text"
placeholder="匿名でも投稿できます">

<label>

未来へ届けるひとこと

</label>

<textarea
id="messageText"
placeholder="今日感じたこと、ありがとうの気持ち、また来たい気持ちなど、ご自由にお書きください。">

</textarea>

<button
id="saveBtn"
class="saveBtn"
onclick="saveKicho()">

🌸 ご縁を記帳する

</button>

<div
id="msg"
class="message">

ありがとうございました🌸<br><br>

あなたの言葉を<br>

ご縁帳へ大切に刻みました。

</div>

</div>

</div>

<div class="goenBox">

<div class="goenTitle">

🌸 最近のご縁 🌸

</div>

<div
id="goenList"></div>

<a
href="goen-archive.html"
class="archiveBtn">

📖 すべてのご縁帳を見る

</a>

<a
href="index.html"
class="homeBtn">

🏠 田子山富士へ戻る

</a>

<div class="footer">

田子山富士保存会<br>

168の縁プロジェクト

</div>

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyJ0TePu884eFy8nfBYRjGrL6GCh8u0gfCE-L2MyytgVqa6JFj0uWQmhnucMLFnbdkOmA/exec";

let userId =
localStorage.getItem(
"tagoyamaUserId"
);

if(!userId){

userId=
"TGF-"+
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

localStorage.setItem(
"tagoyamaUserId",
userId
);

}

function toggleForm(){

const box=
document.getElementById(
"formBox"
);

box.style.display=
box.style.display==="block"
?
"none"
:
"block";

}

function saveKicho(){

/* 現在動作している
saveKicho() をそのまま使用 */

}

function loadGoen(){

/* 現在動作している
loadGoen() をそのまま使用 */

}

loadGoen();

</script>

</body>

</html>
