<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ご縁帳</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
background:#f7f4ea;
color:#333;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:
0 4px 20px rgba(0,0,0,.08);
}

.title{
font-size:32px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.sub{
text-align:center;
font-size:15px;
color:#666;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
margin-bottom:8px;
font-weight:700;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
}

textarea{
min-height:140px;
resize:vertical;
}

.btn{
width:100%;
margin-top:20px;
border:none;
border-radius:14px;
padding:16px;
font-size:18px;
font-weight:bold;
background:#ff7f50;
color:#fff;
cursor:pointer;
}

.btn:disabled{
opacity:.6;
cursor:not-allowed;
}

.message{
display:none;
margin-top:15px;
padding:15px;
background:#e8fff0;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.goenBox{
margin-top:30px;
}

.goenTitle{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.goenCard{
background:#fff;
border-radius:16px;
padding:16px;
margin-bottom:12px;
box-shadow:
0 2px 10px rgba(0,0,0,.06);
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="title">
🌸 ご縁帳
</div>

<div class="sub">
田子山富士へ訪れた記念に
ひとことお残しください
</div>

<label>
お住まいの地域
</label>

<select id="area">

<option value="">
選択してください
</option>

<option>
志木市
</option>

<option>
朝霞市
</option>

<option>
新座市
</option>

<option>
和光市
</option>

<option>
その他
</option>

</select>

<label>
お名前
</label>

<input
id="name"
type="text"
placeholder="匿名可">

<label>
ひとこと
</label>

<textarea
id="messageText"
placeholder="田子山富士への想い・感想など"></textarea>

<button
id="saveBtn"
class="btn"
onclick="saveKicho()">

記帳する

</button>

<div
id="msg"
class="message">

記帳ありがとうございました

</div>

<div class="goenBox">

<div class="goenTitle">

🌸 最近のご縁

</div>

<div id="goenList">

読込中...

</div>

<a
href="goen-archive.html"
class="btn"
style="
display:block;
text-align:center;
text-decoration:none;
margin-top:20px;">

過去のご縁帳を見る

</a>

</div>

<a
href="index.html"
class="btn"
style="
display:block;
text-align:center;
text-decoration:none;
margin-top:20px;">

🏠 田子山富士へ戻る

</a>

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyJ0TePu884eFy8nfBYRjGrL6GCh8u0gfCE-L2MyytgVqa6JFj0uWQmhnucMLFnbdkOmA/exec";

let userId =
localStorage.getItem(
"tagoyamaUserId"
);

if(!userId){

userId =
"TGF-" +
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

localStorage.setItem(
"tagoyamaUserId",
userId
);

}

function saveKicho(){

const btn =
document.getElementById(
"saveBtn"
);

if(btn.disabled){
return;
}

btn.disabled = true;

btn.innerHTML =
"送信中...";

const area =
document.getElementById(
"area"
).value;

const name =
document.getElementById(
"name"
).value;

const text =
document.getElementById(
"messageText"
).value;

if(!text){

btn.disabled = false;

btn.innerHTML =
"記帳する";

alert(
"ひとことをご入力ください"
);

return;

}

fetch(
GAS_URL,
{
method:"POST",
body:JSON.stringify({
mode:"kicho",
userId:userId,
area:area,
name:name,
message:text
})
}
)
.then(r=>r.text())
.then(txt=>{

btn.disabled = false;

btn.innerHTML =
"記帳する";

const data =
JSON.parse(txt);

if(!data.success){

alert(
data.error ||
"保存できませんでした"
);

return;

}

document.getElementById(
"msg"
).style.display =
"block";

document.getElementById(
"name"
).value = "";

document.getElementById(
"messageText"
).value = "";

loadGoen();

})
.catch(err=>{

btn.disabled = false;

btn.innerHTML =
"記帳する";

alert(err.message);

});

}

function loadGoen(){

fetch(
GAS_URL +
"?mode=goen"
)
.then(r=>r.json())
.then(data=>{

const list =
document.getElementById(
"goenList"
);

if(!data || !data.length){

list.innerHTML =
"まだご縁帳はありません";

return;

}

list.innerHTML =
data
.slice(0,10)
.map(item=>{

const d =
new Date(
item.date ||
item.createdAt ||
item.timestamp
);

const dateText =
isNaN(d)
? ""
: `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;

return `
<div class="goenCard">

<div style="font-weight:bold;margin-bottom:8px;">
${item.area || ""}
　${item.name || "匿名"}
</div>

<div style="margin-bottom:8px;">
${item.message || ""}
</div>

<div style="font-size:12px;color:#777;">
${dateText}
</div>

</div>
`;

})
.join("");

})
.catch(err=>{

console.log(err);

document.getElementById(
"goenList"
).innerHTML =
"読込できませんでした";

});

}

loadGoen();

</script>

</body>
</html>
