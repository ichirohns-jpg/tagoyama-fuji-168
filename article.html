<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>お知らせ記事</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:
"Hiragino Sans",
"Yu Gothic",
"Meiryo",
sans-serif;
color:#fff;
}

.hero img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
display:block;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.articleCard{
background:
linear-gradient(
180deg,
#1c1c1c,
#0f0f0f
);
border:2px solid #d4af37;
border-radius:24px;
padding:20px;
box-shadow:
0 12px 32px rgba(0,0,0,.45);
}

.articleTitle{
font-size:42px;
font-weight:900;
line-height:1.4;
margin-bottom:20px;
color:#fff;
}

.articleDate{
font-size:22px;
font-weight:900;
color:#d4af37;
margin-bottom:20px;
}

.articleText{
font-size:24px;
line-height:2;
color:#fff;
margin-top:20px;
margin-bottom:20px;
}

.slider img{
width:100%;
display:block;
border-radius:20px;
margin-bottom:12px;
border:2px solid #333;
}

.youtube{
margin-top:20px;
border-radius:20px;
overflow:hidden;
}

.youtube iframe{
width:100%;
height:260px;
border:none;
}

.linkBtn{
display:block;
width:100%;
padding:18px;
margin-top:20px;
background:#d4af37;
color:#000;
text-decoration:none;
text-align:center;
font-size:22px;
font-weight:900;
border-radius:16px;
}

.homeBtn{
display:block;
width:100%;
padding:20px;
margin-top:20px;
background:#263238;
color:#fff;
text-decoration:none;
text-align:center;
font-size:22px;
font-weight:900;
border-radius:16px;
}

.loading{
text-align:center;
font-size:28px;
font-weight:900;
padding:60px 0;
color:#d4af37;
}

</style>
</head>

<body>

<div class="hero">

<img
src="top.jpg"
alt="田子山富士">

</div>

<div class="wrap">

<div
id="loading"
class="loading">

読込中...

</div>

<div
id="article">

</div>

<a
href="news.html"
class="homeBtn">

📢 お知らせ一覧へ戻る

</a>

<a
href="index.html"
class="homeBtn">

🏠 田子山富士へ戻る

</a>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyJ0TePu884eFy8nfBYRjGrL6GCh8u0gfCE-L2MyytgVqa6JFj0uWQmhnucMLFnbdkOmA/exec";

const params =
new URLSearchParams(
location.search
);

const id =
parseInt(
params.get("id") || "0"
);

function youtubeEmbed(url){

if(!url) return "";

let videoId = "";

if(url.includes("watch?v=")){
videoId =
url.split("watch?v=")[1]
.split("&")[0];
}
else if(url.includes("youtu.be/")){
videoId =
url.split("youtu.be/")[1]
.split("?")[0];
}

if(!videoId) return "";

return `
<div class="youtube">
<iframe
src="https://www.youtube.com/embed/${videoId}"
allowfullscreen>
</iframe>
</div>
`;

}

fetch(
GAS_URL +
"?mode=news"
)
.then(
r=>r.json()
)
.then(
rows=>{

document.getElementById(
"loading"
).style.display =
"none";

const row =
rows[id];

if(!row){

document.getElementById(
"article"
).innerHTML =
"<div class='articleCard'>記事がありません</div>";

return;

}

let images = "";

[
row.image1,
row.image2,
row.image3,
row.image4,
row.image5
]
.forEach(img=>{

if(img){

images += `
<img src="${img}">
`;

}

});

document.getElementById(
"article"
).innerHTML =
`
<div class="articleCard">

<div class="articleTitle">
${row.title || ""}
</div>

<div class="slider">
${images}
</div>

<div class="articleDate">
${String(row.date || "")
.replace("T15:00:00.000Z","")
.replace(/-/g,"/")}
</div>

<div class="articleText">
${row.text || ""}
</div>

${youtubeEmbed(
row.youtube || ""
)}

${
row.link
?
`
<a
href="${row.link}"
target="_blank"
class="linkBtn">

詳しくはこちら

</a>
`
:
""
}

</div>
`;

})
.catch(err=>{

document.getElementById(
"loading"
).innerHTML =
"記事を読めません";

console.log(err);

});

</script>

</body>
</html>
