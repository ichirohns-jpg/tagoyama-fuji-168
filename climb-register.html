<body>
  <main class="page">

    <header class="hero">
      <div class="logoBox">
        <img
          src="https://ichirohns-jpg.github.io/tagoyama-fuji-168/logo.png"
          alt="田子山富士"
          onerror="this.style.display='none'"
        >
      </div>

      <h1 class="siteTitle">田子山富士</h1>
      <p class="siteSub">登頂登録中</p>
    </header>

    <section class="card">
      <h2 class="cardTitle">登頂受付へ進みます</h2>

      <p class="lead">
        登頂情報を準備しています。
        自動で登頂受付ページへ移動します。
      </p>

      <div class="statusBox" id="statusBox">
        移動先を確認しています。
      </div>

      <div class="btnArea">
        <a class="linkBtn goldBtn" id="mainLink" href="index.html">
          登頂受付へ進む
        </a>

        <a class="linkBtn blueBtn" id="certificateLink" href="certificate.html">
          登頂記念証を見る
        </a>

        <a class="linkBtn blackBtn" href="index.html">
          トップへ戻る
        </a>
      </div>
    </section>

    <footer class="footer">
      田子山富士 168の縁プロジェクト<br>
      登頂登録中
    </footer>
  </main>

  <script>
    const INDEX_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/index.html";

    const CERTIFICATE_PAGE =
      "https://ichirohns-jpg.github.io/tagoyama-fuji-168/certificate.html";

    let targetUrl = INDEX_PAGE;
    let certificateUrl = CERTIFICATE_PAGE;

    document.addEventListener("DOMContentLoaded", function() {
      initRegisterPage();
    });

    function initRegisterPage() {
      const userId = getOrCreateUserId();

      saveUserId(userId);

      targetUrl =
        INDEX_PAGE +
        "?userId=" +
        encodeURIComponent(userId) +
        "&from=climb-register" +
        "&v=20260703";

      certificateUrl =
        CERTIFICATE_PAGE +
        "?userId=" +
        encodeURIComponent(userId) +
        "&from=climb-register" +
        "&v=20260703";

      const mainLink = document.getElementById("mainLink");
      const certificateLink = document.getElementById("certificateLink");

      if (mainLink) {
        mainLink.href = targetUrl;
      }

      if (certificateLink) {
        certificateLink.href = certificateUrl;
      }

      setStatus("登頂受付ページへ移動します。\n\n" + targetUrl);

      setTimeout(function() {
        window.location.replace(targetUrl);
      }, 900);
    }

    function getOrCreateUserId() {
      const params = new URLSearchParams(window.location.search);

      const fromUrl =
        getString(
          params.get("userId") ||
          params.get("userid") ||
          params.get("uid") ||
          params.get("id") ||
          ""
        );

      if (fromUrl) {
        return fromUrl;
      }

      const saved =
        getString(
          localStorage.getItem("tagoyamaUserId") ||
          localStorage.getItem("tagoyamaFujiUserId") ||
          ""
        );

      if (saved) {
        return saved;
      }

      return createUserId();
    }

    function createUserId() {
      const now = Date.now();
      const rand = Math.random().toString(36).slice(2, 10);

      return "tagoyama-" + now + "-" + rand;
    }

    function saveUserId(userId) {
      if (!userId) {
        return;
      }

      try {
        localStorage.setItem("tagoyamaUserId", userId);
        localStorage.setItem("tagoyamaFujiUserId", userId);
      } catch (error) {
        console.warn(error);
      }
    }

    function setStatus(text) {
      const el = document.getElementById("statusBox");

      if (el) {
        el.innerText = text;
      }
    }

    function getString(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).trim();
    }
  </script>
